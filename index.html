            return;
          }
          if (element.type === "terminalStrip" || element.type === "connector") {
            const geo = terminalStripGeometry(element);
            for (let i = 0; i < (geo.nodes || geo.count); i++) {
              anchors.push({ ...terminalStripNodeGlobal(element, i), elementId: element.id, kind: "terminal" });
            }
            return;
          }
          elementConnectionAnchors(element).forEach(anchor => anchors.push({ ...anchor, elementId: element.id, kind: "terminal" }));
        });
        return anchors;
      }

      // 候補点群から半径内で最も近い1点を返す。
      function closestAnchor(anchors, x, y, radius = SNAP_RADIUS_MM) {
        let best = null;
        anchors.forEach(anchor => {
          const d = Math.hypot(anchor.x - x, anchor.y - y);
          if (d <= radius && (!best || d < best.d)) best = { ...anchor, d };
        });
        return best;
      }

      // 既存配線セグメント上への吸着点(垂線の足)を探す。
      function closestSegmentSnapPoint(page, x, y, activeIds = new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []))) {
        if (!page) return null;
        let best = null;
        page.elements.forEach(element => {
          if (activeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (!["wire", "line", "mechanicalLink", "arrow"].includes(element.type)) return;
          wireSegments(element).forEach(segment => {
            const point = closestPointOnSegment(x, y, segment);
            const d = Math.hypot(point.x - x, point.y - y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) best = { ...point, d };
          });
        });
        return best ? { x: round(best.x), y: round(best.y) } : null;
      }

      // 点→線分への最近点を計算。
      function closestPointOnSegment(x, y, segment) {
        const [x1, y1, x2, y2] = segment;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy;
        if (lengthSq < .0001) return { x: x1, y: y1 };
        const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / lengthSq));
        return { x: x1 + dx * t, y: y1 + dy * t };
      }

      // 要素種別ごとの接続点(配線が刺さる点)一覧。geoシンボルはgeoAnchors()を使用。
      function elementConnectionAnchors(element) {
        const fromGeo = geoAnchors(element);
        if (fromGeo) return fromGeo;
        const anchors = [];
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        const add = (x, y) => anchors.push(localAnchor(element, x, y));
        if (element.type === "terminal") {
          const cx = w / 2;
          const cy = h / 2;
          add(cx, cy);
          if (element.orientation === "vertical") {
            add(cx, 0);
            add(cx, h);
          } else {
            add(0, cy);
            add(w, cy);
          }
          return anchors;
        }
        if (["contactNO", "contactNC", "contactBlock", "pushButton", "selectorSwitch", "limitSwitch"].includes(element.type)) {
          if (element.orientation === "vertical") {
            add(w / 2, 0);
            add(w / 2, h);
          } else {
            add(0, h / 2);
            add(w, h / 2);
          }
          return anchors;
        }
        if (["fuse", "breaker"].includes(element.type) && element.orientation === "vertical") {
          add(w / 2, 0);
          add(w / 2, h);
          return anchors;
        }
        if (["coil", "fuse", "breaker", "lamp", "buzzer", "solenoidValve", "sensor", "transformer", "motor", "fan", "resistor", "capacitor", "diode", "thermalRelay", "cableMarker", "cableBundle"].includes(element.type)) {
          add(0, h / 2);
          add(w, h / 2);
          return anchors;
        }
        if (element.type === "terminalBox") {
          const rows = Math.max(2, Number(element.rows || 3));
          for (let i = 0; i < rows; i++) {
            const y = h * (i + .5) / rows;
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "ground") {
          add(w / 2, 0);
          return anchors;
        }
        if (element.type === "deviceBox") {
          const pins = Math.max(0, Number(element.pins || 4));
          for (let i = 0; i < pins; i++) {
            const y = h * (i + 1) / (pins + 1);
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "plcBlock") {
          if ((element.plcStyle || "grid") === "unit") {
            const rows = Math.max(1, Number(element.rows || 8));
            for (let i = 0; i < rows; i++) add(0, 9.5 * i + 4.75);
            return anchors;
          }
          const rows = Math.max(2, Number(element.rows || 8));
          for (let i = 1; i <= rows; i++) {
            const y = 8 + i * ((h - 10) / rows) - 3;
            add(0, y);
          }
          return anchors;
        }
        return anchors;
      }

      // 要素ローカル座標の接続点→絶対座標(回転考慮)。
      function localAnchor(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        return {
          x: Number(element.x || 0) + x * Math.cos(angle) - y * Math.sin(angle),
          y: Number(element.y || 0) + x * Math.sin(angle) + y * Math.cos(angle)
        };
      }

      // クリック点を中心に配置する種別集合(インライン部品など)。
      function centerPlacedTypes() {
        return new Set([
          "terminal",
          "contactNO",
          "contactNC",
          "contactBlock",
          "thermalElement",
          "pressureSwitch",
          "positionMark",
          "polarityMark",
          "pushButton",
          "selectorSwitch",
          "limitSwitch",
          "coil",
          "fuse",
          "breaker",
          "lamp",
          "buzzer",
          "resistor",
          "capacitor",
          "diode",
          "thermalRelay",
          "motor",
          "fan",
          "cableMarker",
          "cableBundle"
        ]);
      }

      // 既存配線上へ置いた時に配線を自動分割する種別集合。
      function wireBreakingTypes() {
        return new Set([
          "contactNO",
          "contactNC",
          "contactBlock",
          "thermalElement",
          "pressureSwitch",
          "terminal",
          "pushButton",
          "selectorSwitch",
          "limitSwitch",
          "coil",
          "fuse",
          "breaker",
          "lamp",
          "buzzer",
          "resistor",
          "capacitor",
          "diode",
          "thermalRelay",
          "motor",
          "fan"
        ]);
      }

      // 配置時の新規要素を生成(中心合わせ・向き自動判定込み)。
      function defaultElementAtPlacement(type, x, y) {
        const element = defaultElement(type, x, y);
        autoOrientElementForPlacement(element, x, y);
        if (centerPlacedTypes().has(type)) {
          const w = Number(element.w || defaultElement(type).w || 0);
          const h = Number(element.h || defaultElement(type).h || 0);
          element.x = round(x - w / 2);
          element.y = round(y - h / 2);
          // ピン高さが中心と異なる部品(押しボタン等)は、中心ではなく接続ピンの線を
          // スナップ点へ合わせる(グリッド・行と配線高さが一致するように)。
          const anchors = elementConnectionAnchors(element);
          if (anchors && anchors.length) {
            if (element.orientation === "vertical") {
              element.x = round(Number(element.x) + (x - anchors[0].x));
            } else {
              element.y = round(Number(element.y) + (y - anchors[0].y));
            }
          }
        } else if (type === "ground") {
          const w = Number(element.w || defaultElement(type).w || 0);
          element.x = round(x - w / 2);
          element.y = round(y);
        }
        return element;
      }

      // 配置先の近傍配線の向きから要素の縦横を自動決定。
      function autoOrientElementForPlacement(element, x, y) {
        if (!["fuse", "breaker", "resistor"].includes(element.type)) return;
        const segment = closestAxisSegment(currentPage(), x, y);
        if (!segment || !segment.vertical) return;
        element.orientation = "vertical";
        if (!resizeGeoElementForOrientation(element)) resizeProtectiveElementForOrientation(element);
      }

      // 配置点近傍の水平/垂直配線セグメントを探す(向き自動判定の下請け)。
      function closestAxisSegment(page, x, y) {
        if (!page) return null;
        let best = null;
        page.elements.forEach(element => {
          if (element.type !== "wire" || !isElementVisible(element)) return;
          wireSegments(element).forEach(segment => {
            const [x1, y1, x2, y2] = segment;
            const horizontal = Math.abs(y1 - y2) < .01;
            const vertical = Math.abs(x1 - x2) < .01;
            if (!horizontal && !vertical) return;
            const point = closestPointOnSegment(x, y, segment);
            const d = Math.hypot(point.x - x, point.y - y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) best = { horizontal, vertical, d };
          });
        });
        return best;
      }

      // パレット種別を用紙へ配置する入口。配線分割・スナップ・履歴記録まで行う。
      function placeElement(type, x, y) {
        const page = currentPage();
        if (!page) return;
        if (String(type).startsWith("custom:")) {
          placeCustomSymbol(type.slice("custom:".length), x, y);
          return;
        }
        if (type === "terminalSheet") {
          addTerminalSheet(page, x, y);
          commitHistory("端子配線セットを配置しました。");
          cancelPlacementMode(true);
          return;
        }
        const element = defaultElementAtPlacement(type, x, y);
        page.elements.push(element);
        breakWiresForInlineElement(page, element);
        selectSingle(element.id);
        commitHistory("要素を配置しました。");
        setActiveTool("select");
        render();
      }

      // インライン部品の左右端子位置で既存配線を2本へ分割(部品を線が貫通しないように)。
      function breakWiresForInlineElement(page, element) {
        if (!page || !element || !wireBreakingTypes().has(element.type)) return;
        const anchors = elementConnectionAnchors(element);
        if (anchors.length < 2) return;
        const a = anchors[0];
        const b = anchors[anchors.length - 1];
        const horizontal = Math.abs(a.y - b.y) < .35;
        const vertical = Math.abs(a.x - b.x) < .35;
        if (!horizontal && !vertical) return;
        const low = horizontal ? Math.min(a.x, b.x) : Math.min(a.y, b.y);
        const high = horizontal ? Math.max(a.x, b.x) : Math.max(a.y, b.y);
        const axis = horizontal ? a.y : a.x;
        const replacement = [];
        let changed = false;
        page.elements.forEach(item => {
          if (item.id === element.id || item.type !== "wire" || !Array.isArray(item.points) || item.points.length !== 2) {
            replacement.push(item);
            return;
          }
          const [p0, p1] = item.points;
          const wireHorizontal = Math.abs(p0[1] - p1[1]) < .01;
          const wireVertical = Math.abs(p0[0] - p1[0]) < .01;
          if ((horizontal && !wireHorizontal) || (vertical && !wireVertical)) {
            replacement.push(item);
            return;
          }
          const wireAxis = horizontal ? p0[1] : p0[0];
          if (Math.abs(wireAxis - axis) > .45) {
            replacement.push(item);
            return;
          }
          const start = horizontal ? p0[0] : p0[1];
          const end = horizontal ? p1[0] : p1[1];
          const min = Math.min(start, end);
          const max = Math.max(start, end);
          if (low <= min + .6 || high >= max - .6 || low >= high) {
            replacement.push(item);
            return;
          }
          const beforeEnd = horizontal ? [round(low), round(wireAxis)] : [round(wireAxis), round(low)];
          const afterStart = horizontal ? [round(high), round(wireAxis)] : [round(wireAxis), round(high)];
          const leftFirst = start <= end;
          const before = deepClone(item);
          const after = deepClone(item);
          before.id = uid("el");
          after.id = uid("el");
          before.points = leftFirst ? [p0, beforeEnd] : [p0, afterStart];
          after.points = leftFirst ? [afterStart, p1] : [beforeEnd, p1];
          before.points = before.points.map(point => [round(point[0]), round(point[1])]);
          after.points = after.points.map(point => [round(point[0]), round(point[1])]);
          after.hideWireNo = true;
          replacement.push(before, after);
          changed = true;
        });
        if (changed) page.elements = replacement;
      }

      // ユーザー部品(単品/回路スニペット)を配置。テンプレート列を相対座標のままオフセット展開。
      function placeCustomSymbol(id, x, y) {
        const symbol = (state.customSymbols || []).find(item => item.id === id);
        const page = currentPage();
        if (!symbol || !page) return;
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        const placed = templates.map(template => {
          const element = deepClone(template);
          element.id = uid("el");
          element.locked = false;
          if (element.points) {
            element.points = element.points.map(point => [point[0] + x, point[1] + y]);
          } else {
            element.x = Number(element.x || 0) + x;
            element.y = Number(element.y || 0) + y;
          }
          return element;
        });
        page.elements.push(...placed);
        setSelection(placed.map(element => element.id));
        commitHistory(placed.length > 1 ? "ユーザー回路を配置しました。" : "ユーザー部品を配置しました。");
        setActiveTool("select");
        render();
      }

      // 端子配線セット(既定値)を現在ページへ配置。
      function addTerminalSheet(page, x, y) {
        addReferenceTerminalWiringSet(page, x, y, {
          title: "",
          terminalPrefix: "",
          wirePrefix: "W",
          signalPrefix: "SIG"
        });
        setSelection([]);
      }

      // 端子配線セットの本体生成(横配線+端子小円+ユニット列端子台、線番は終点寄せ)。
      function addReferenceTerminalWiringSet(page, x, y, options = {}) {
        // 端子台配線図の型:
        // 左から横配線 → 端子小円 → ユニット列端子台(波形破断線+端子円)、線番は終点寄せ表示
        const count = Math.max(1, Number(options.count || 16));
        const startNo = Number(options.start || 1);
        const stripX = round(x + 96);
        const strip = {
          ...defaultElement("terminalStrip", stripX, y),
          x: stripX,
          y: round(y),
          w: 10.5,
          h: count * 9.5,
          count,
          start: startNo,
          prefix: options.terminalPrefix || "",
          orientation: "vertical",
          terminalShape: "circle",
          stripStyle: "unit",
          label: options.label || "TB1"
        };
        page.elements.push(strip);
        for (let i = 0; i < count; i++) {
          const cy = round(y + 9.5 * i + 4.75);
          const wireNo = (options.wirePrefix || "W") + String(startNo + i).padStart(2, "0");
          page.elements.push({
            ...defaultElement("wire", x, cy),
            points: [[round(x), cy], [round(stripX - 2.1), cy]],
            wireNo,
            wireNoAlign: "end"
          });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(stripX - 2.1), y: round(cy - 0.9), label: "" });
          if (options.signalPrefix) {
            page.elements.push(textElement(stripX + 21, cy - 1.2, options.signalPrefix + String(startNo + i).padStart(2, "0"), 2.3, 0, 42));
          }
        }
        if (options.title) {
          page.elements.push(textElement(x, y - 8, options.title, 3.4, 0, 92));
        }
      }

      // 端子配線セット用の端子台要素を生成。
      function referenceTerminalStrip(x, y, w, h, count, start, label, orientation = "horizontal") {
        return {
          ...defaultElement("terminalStrip", x, y),
          x,
          y,
          w,
          h,
          count,
          start,
          prefix: "",
          orientation,
          terminalShape: "circle",
          label,
          rotation: 0,
          layer: "symbols"
        };
      }

      // 横向き端子1個を生成。
      function horizontalTerminalAt(cx, cy, label, shape = "square") {
        const w = 9;
        const h = 6;
        return {
          ...defaultElement("terminal", cx - w / 2, cy - h / 2),
          x: round(cx - w / 2),
          y: round(cy - h / 2),
          w,
          h,
          label,
          orientation: "horizontal",
          terminalShape: shape,
          rotation: 0,
          layer: "symbols"
        };
      }

      // 縦向き端子1個を生成。
      function verticalTerminalAt(cx, cy, label, shape = "square") {
        const w = 6;
        const h = 10;
        return {
          ...defaultElement("terminal", cx - w / 2, cy - h / 2),
          x: round(cx - w / 2),
          y: round(cy - h / 2),
          w,
          h,
          label,
          orientation: "vertical",
          terminalShape: shape,
          rotation: 0,
          layer: "symbols"
        };
      }

      // 文字要素を生成(座標・サイズ・回転・幅)。テンプレート生成系で多用。
      function textElement(x, y, text, fontSize = 2.4, rotation = 0, w = 24) {
        return {
          id: uid("el"),
          type: "text",
          x: round(x),
          y: round(y),
          w,
          h: Math.max(5, fontSize * 1.7),
          text,
          fontSize,
          rotation,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      // アクティブツール切替(select/wire/種別名/custom:id)。パレットの強調表示も更新。
      function setActiveTool(tool) {
        activeTool = tool;
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === tool));
        qs("#selectOnlyBtn")?.classList.toggle("active", tool === "select");
        renderPalette();
        setStatus(tool === "select" ? "選択ツールです。" : paletteLabel(tool) + "を配置できます。");
      }

      // 配置モードを抜けて選択ツールへ戻る(Escや配置完了時)。
      function cancelPlacementMode(clearSelection = false) {
        activeTool = "select";
        if (clearSelection) setSelection([]);
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === "select"));
        render();
        setStatus("選択ツールです。");
      }

      // 標準プリセット/標準パックを適用(グリッド・線番書式など)。
      function applyStandard(id) {
        const pack = (state.standardPacks || []).find(item => item.id === id);
        if (pack) {
          state.settings.standard = id;
          applyStandardPack(pack);
          return;
        }
        const standard = STANDARDS.find(item => item.id === id) || STANDARDS[0];
        state.settings.standard = standard.id;
        state.settings.grid = standard.grid;
        state.settings.wireNumberFormat = standard.wireNumberFormat;
        state.settings.componentTagFormat = standard.componentTagFormat || "%F%N";
        if (standard.componentTagPrefixes) state.settings.componentTagPrefixes = { ...standard.componentTagPrefixes };
        const page = currentPage();
        if (page && !page.frameVariant) page.frameVariant = standard.frameVariant;
      }

      // 用紙全体が収まるようズームを自動調整。
      function fitPageToWorkspace() {
        const page = currentPage();
        if (!page) return;
        const size = pageSize(page);
        const workspace = qs("#workspace");
        const w = Math.max(240, workspace.clientWidth - 90);
        const h = Math.max(240, workspace.clientHeight - 90);
        state.settings.zoom = clampZoom(Math.min(w / size.w, h / size.h));
        commitHistory("用紙全体を表示しました。");
        render();
      }

      // 空ページを追加してアクティブ化。
      function addPage() {
        const base = currentPage();
        const page = createPage({
          name: "P" + (state.pages.length + 1),
          size: base?.size || "A4",
          orientation: base?.orientation || "portrait",
          frameVariant: base?.frameVariant || "detailed"
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("ページを追加しました。");
        render();
      }

      // 現在ページを複製(要素IDは振り直し)。
      function duplicatePage() {
        const page = currentPage();
        if (!page) return;
        const copy = deepClone(page);
        copy.id = uid("page");
        copy.name = page.name + " copy";
        copy.elements = copy.elements.map(element => ({ ...element, id: uid("el") }));
        state.pages.push(copy);
        state.activePageId = copy.id;
        setSelection([]);
        commitHistory("ページを複製しました。");
        render();
      }

      // 現在ページを削除(最後の1枚は不可)。
      function deletePage() {
        if (state.pages.length <= 1) {
          setStatus("最後の1ページは削除できません。");
          return;
        }
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        state.pages.splice(index, 1);
        state.activePageId = state.pages[Math.max(0, index - 1)].id;
        setSelection([]);
        commitHistory("ページを削除しました。");
        render();
      }

      // 現在ページを前後へ並び替え。
      function movePage(delta) {
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        const next = index + delta;
        if (index < 0 || next < 0 || next >= state.pages.length) {
          setStatus("これ以上ページを移動できません。");
          return;
        }
        const [page] = state.pages.splice(index, 1);
        state.pages.splice(next, 0, page);
        commitHistory("ページ順を変更しました。");
        render();
      }

      // 端子接続図ページ(端子配線セット入り)をテンプレートとして追加。
      function addSampleTerminalPage() {
        const page = createPage({
          name: "端子接続図" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "端子接続図"
        });
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        page.elements.push(textElement(40, 24.5, "(DC24V)", 1.9, 0, 20));
        addReferenceTerminalWiringSet(page, 32.5, 31.75, {
          label: "TB1",
          terminalPrefix: "",
          wirePrefix: "W",
          signalPrefix: "SIG",
          count: 16
        });
        for (let i = 0; i < 16; i++) {
          page.elements.push(defaultElement("junction", 32.5, round(36.5 + 9.5 * i)));
        }
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("端子接続図ページを追加しました。");
        render();
      }

      // 端子CSV/TSVを読み込み、端子接続図ページ群を生成する入口。
      function importTerminalCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const terminals = normalizeTerminalCsvRows(rows);
            if (!terminals.length) {
              setStatus("端子CSVに有効な行がありません。");
              return;
            }
            addTerminalCsvPages(terminals, file.name || "terminal.csv");
          } catch (error) {
            alert("端子CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      // PLC I/O CSV/TSVを読み込み、PLC接続図ページ群を生成する入口。
      function importPlcCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const ioRows = normalizePlcCsvRows(rows);
            if (!ioRows.length) {
              setStatus("PLC CSVに有効なI/O行がありません。");
              return;
            }
            addPlcCsvPages(ioRows, file.name || "plc.csv");
          } catch (error) {
            alert("PLC CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      // CSVバイト列をUTF-8/Shift_JIS判定つきで文字列化。
      function decodeTextBuffer(buffer) {
        const bytes = buffer instanceof ArrayBuffer ? buffer : new Uint8Array(buffer).buffer;
        const candidates = [];
        try {
          candidates.push(new TextDecoder("utf-8").decode(bytes));
        } catch (_) {
          // 旧ブラウザではTextDecoderが失敗することがある。
        }
        try {
          candidates.push(new TextDecoder("shift_jis").decode(bytes));
        } catch (_) {
          // 環境によってはShift_JISデコーダが無いことがある。
        }
        if (!candidates.length) return "";
        return candidates.sort((a, b) => textDecodeScore(b) - textDecodeScore(a))[0].replace(/^\uFEFF/, "");
      }

      // デコード結果の妥当性スコア(文字化け判定)。
      function textDecodeScore(text) {
        const bad = (text.match(/\uFFFD/g) || []).length * 20;
        const japanese = (text.match(/[ぁ-んァ-ン一-龠]/g) || []).length;
        const ascii = (text.match(/[A-Za-z0-9,\t\r\n_-]/g) || []).length;
        return japanese * 3 + ascii - bad;
      }

      // CSV/TSVパーサ(引用符・改行対応、区切りはタブ/カンマ自動判定)。
      function parseDelimitedRows(text) {
        const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const sample = source.split("\n").slice(0, 5).join("\n");
        const delimiter = (sample.match(/\t/g) || []).length > (sample.match(/,/g) || []).length ? "\t" : ",";
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let i = 0; i < source.length; i++) {
          const char = source[i];
          const next = source[i + 1];
          if (quoted) {
            if (char === '"' && next === '"') {
              cell += '"';
              i++;
            } else if (char === '"') {
              quoted = false;
            } else {
              cell += char;
            }
            continue;
          }
          if (char === '"' && cell === "") {
            quoted = true;
          } else if (char === delimiter) {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell);
        rows.push(row);
        return rows.map(cells => cells.map(cell => cell.trim())).filter(cells => cells.some(Boolean));
      }

      // 端子CSVの見出し(和英エイリアス対応)を正規化して行オブジェクト化。
      function normalizeTerminalCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          strip: ["strip", "terminalstrip", "tb", "端子台", "端子台名"],
          terminal: ["terminal", "term", "terminalno", "no", "番号", "端子", "端子番号", "端子no", "端子名"],
          wireNo: ["wireno", "wire", "wire_no", "wiring", "線番", "配線番号", "線番号"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          dest: ["dest", "destination", "to", "device", "接続先", "行先", "相手先", "機器"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          return {
            strip: value("strip") || "X1",
            terminal: value("terminal") || cells[0] || String(index + 1),
            wireNo: value("wireNo") || cells[1] || "",
            signal: value("signal") || cells[2] || "",
            dest: value("dest") || cells[3] || "",
            note: value("note") || cells[4] || ""
          };
        }).filter(row => row.terminal || row.wireNo || row.signal || row.dest || row.note);
      }

      // PLC CSVの見出しを正規化して行オブジェクト化。
      function normalizePlcCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          address: ["address", "addr", "io", "i/o", "point", "plc", "アドレス", "io番号", "入出力番号", "点数"],
          direction: ["direction", "type", "iotype", "io_type", "inout", "入出力", "種別", "方向"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          wireNo: ["wireno", "wire", "wire_no", "線番", "配線番号", "線番号"],
          device: ["device", "dest", "destination", "to", "from", "接続先", "機器", "相手先"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          const address = value("address") || cells[0] || "";
          const signal = value("signal") || cells[1] || "";
          const wireNo = value("wireNo") || cells[2] || "";
          const device = value("device") || cells[3] || "";
          const note = value("note") || cells[4] || "";
          const direction = normalizeIoDirection(value("direction") || address);
          return { address: address || (direction === "output" ? "O" : "I") + String(index).padStart(2, "0"), direction, signal, wireNo, device, note };
        }).filter(row => row.address || row.signal || row.wireNo || row.device || row.note);
      }

      // 入出力表記(in/out/入力/出力)をinput/outputへ正規化。
      function normalizeIoDirection(text) {
        const value = normalizeHeader(text);
        if (value.startsWith("o") || value.includes("out") || value.includes("出力")) return "output";
        return "input";
      }

      // 見出し文字列の正規化(小文字化・空白除去)。
      function normalizeHeader(text) {
        return String(text || "").toLowerCase().replace(/[()\[\]{} 　._\-\/\\:：]/g, "");
      }

      // 見出し行からエイリアス一致する列番号を探す。
      function findHeaderIndex(headers, aliases) {
        const normalizedAliases = aliases.map(normalizeHeader);
        return headers.findIndex(header => normalizedAliases.includes(header));
      }

      // 端子CSV行を17行/頁で分割し、端子接続図ページ群を生成。
      function addTerminalCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "端子接続図",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "端子接続図 " + pageNo + "/" + totalPages
          });
          populateTerminalCsvPage(page, chunk, pageNo, totalPages, fileName, offset);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("端子CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 端子台配線図の型: レール + 横配線(線番は終点寄せ) + 端子小円 + ユニット列端子台。
      // 端子名はCSVの値を terminalLabels として端子円内に表示する。
      function populateTerminalCsvPage(page, rows, pageNo, totalPages, fileName, offset) {
        const stripName = mostCommon(rows.map(row => row.strip).filter(Boolean)) || "TB1";
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        const strip = {
          ...defaultElement("terminalStrip", 130.5, 31.75),
          x: 130.5,
          y: 31.75,
          w: 10.5,
          h: rows.length * 9.5,
          count: rows.length,
          start: 1 + offset,
          prefix: "",
          orientation: "vertical",
          terminalShape: "circle",
          stripStyle: "unit",
          label: stripName,
          terminalLabels: rows.map(row => row.terminal || "").join("\n"),
          note: "取込元: " + fileName
        };
        page.elements.push(strip);
        rows.forEach((row, index) => {
          const y = round(36.5 + 9.5 * index);
          page.elements.push(defaultElement("junction", 32.5, y));
          page.elements.push({
            ...defaultElement("wire", 32.5, y),
            points: [[32.5, y], [128.4, y]],
            wireNo: row.wireNo || "",
            wireNoAlign: "end",
            note: row.note || ""
          });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: 128.4, y: round(y - 0.9), label: "" });
          const desc = [row.signal, row.dest].filter(Boolean).join(" ");
          if (desc) page.elements.push(textElement(149.5, y - 1.2, desc, 2.3, 0, 42));
        });
      }

      // PLC CSV行を17点/頁で分割し、PLC接続図ページ群を生成。
      function addPlcCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "制御盤",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "PLC I/O 接続図 " + pageNo + "/" + totalPages
          });
          populatePlcCsvPage(page, chunk, pageNo, totalPages, fileName);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("PLC CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 右にユニット列、左へ横配線+端子小円。行はラダー行グリッドに整列し、
      // 配線端点はユニットの端子アンカー位置と一致させる(ずれ無し)。
      function populatePlcCsvPage(page, rows, pageNo, totalPages, fileName) {
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        const unit = {
          ...defaultElement("plcBlock", 130.5, 31.75),
          plcStyle: "unit",
          rows: rows.length,
          w: 10.5,
          h: rows.length * 9.5,
          label: "PLC(" + pageNo + "/" + totalPages + ")",
          pinText: rows.map(row => row.address).join("\n"),
          note: "取込元: " + fileName
        };
        page.elements.push(unit);
        rows.forEach((row, index) => {
          const y = round(36.5 + 9.5 * index);
          const plcName = (unit.label || "PLC") + ":" + row.address;
          const deviceName = row.device || row.signal || "";
          const input = row.direction !== "output";
          page.elements.push(defaultElement("junction", 32.5, y));
          page.elements.push({
            ...defaultElement("wire", 32.5, y),
            points: [[32.5, y], [128.4, y]],
            wireNo: row.wireNo || row.address,
            wireNoAlign: "end",
            fromOverride: input ? deviceName : plcName,
            toOverride: input ? plcName : deviceName,
            note: row.note || ""
          });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: 128.4, y: round(y - 0.9), label: "" });
          page.elements.push(textElement(149.5, y - 1.2, [input ? "入力" : "出力", row.signal, deviceName].filter(Boolean).join(" "), 2.3, 0, 42));
        });
      }

      // 配列の最頻値(CSVのユニット名決定などに使用)。
      function mostCommon(values) {
        const counts = new Map();
        values.forEach(value => counts.set(value, (counts.get(value) || 0) + 1));
        return Array.from(counts.entries()).sort((a, b) => b[1] - a[1])[0]?.[0] || "";
      }

      function addLadderPage() {
        const page = createPage({
          name: "ラダー" + (state.pages.length + 1),

        });
        addLadderRails(page, cfg);
        for (let i = 0; i < 10; i++) {
          addLadderRungElements(page, cfg, cfg.startY + i * cfg.pitch, i + 1);
        }
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("ラダーページを追加しました。");
        render();

      // 現在のラダーページへラング(横1行)を追加。
      function addRungToCurrentPage() {
        const page = currentPage();
        if (!page) return;
        const cfg = ladderConfig(page);
        ensureLadderRails(page, cfg);
        const rungYs = collectLadderRungYs(page);
        const nextIndex = rungYs.length + 1;
        const y = rungYs.length ? Math.max(...rungYs) + cfg.pitch : cfg.startY;
        if (y > cfg.endY) {
          setStatus("このページにはラングを追加する余白がありません。");
          return;
        }
        addLadderRungElements(page, cfg, y, nextIndex);
        commitHistory("ラングを追加しました。");
        render();
      }

      // 汎用ラダーページの母線位置・行ピッチ設定を返す。
      function ladderConfig(page) {
        const size = pageSize(page);
        const portrait = size.h >= size.w;
        const leftRail = portrait ? 36 : 42;
        const rightRail = size.w - (portrait ? 34 : 58);
        const startY = portrait ? 54 : 46;
        const endY = size.h - (portrait ? 62 : 34);
        return { leftRail, rightRail, startY, endY, pitch: portrait ? 14 : 12 };
      }

      // 母線が無ければ追加(汎用ラダー用)。
      function ensureLadderRails(page, cfg) {
        if (page.elements.some(element => element.ladderRail)) return;
        addLadderRails(page, cfg);
      }

      // 左右母線(P1/N1縦線)を生成。
      function addLadderRails(page, cfg) {
        page.elements.push(ladderWire([[cfg.leftRail, cfg.startY - 10], [cfg.leftRail, cfg.endY + 6]], "L", { ladderRail: "left" }));
        page.elements.push(ladderWire([[cfg.rightRail, cfg.startY - 10], [cfg.rightRail, cfg.endY + 6]], "N", { ladderRail: "right" }));
        page.elements.push(ladderText("L", cfg.leftRail - 2, cfg.startY - 17, 3, "middle"));
        page.elements.push(ladderText("N", cfg.rightRail + 2, cfg.startY - 17, 3, "middle"));
      }

      // ラング1行分(横配線+線番)を生成。
      function addLadderRungElements(page, cfg, y, index) {
        const rungNo = String(index).padStart(3, "0");
        page.elements.push(ladderText(rungNo, cfg.leftRail - 18, y, 2.6, "end"));
        page.elements.push(ladderWire([[cfg.leftRail, y], [cfg.rightRail, y]], "R" + rungNo, { ladderRung: true, rungNo }));
      }

      // ラダー用配線要素の生成ヘルパ。
      function ladderWire(points, wireNo, extra = {}) {
        return {
          id: uid("el"),
          type: "wire",
          points,
          wireNo,
          wireType: state.settings.currentWireType,
          stroke: state.settings.stroke,
          layer: "wires",
          ...extra
        };
      }

      // ラダー用文字要素の生成ヘルパ。
      function ladderText(text, x, y, fontSize, anchor = "start") {
        return {
          id: uid("el"),
          type: "text",
          x,
          y,
          w: 24,
          h: 5,
          text,
          fontSize,
          align: anchor,
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      // 既存ラングのy座標一覧(次のラング位置決め用)。
      function collectLadderRungYs(page) {
        return page.elements
          .filter(element => element.ladderRung && element.points?.length)
          .map(element => Number(element.points[0][1]))
          .filter(value => Number.isFinite(value))
          .sort((a, b) => a - b);
      }

      // ===== 設備ラダーページ(複数レール対応) =====
      function facilityRailElements(name, x, sign, markY) {
        const items = [];
        items.push({ ...defaultElement("polarityMark", round(x - 1.3), markY), label: name, sign });
        items.push({
          ...defaultElement("wire", x, 30),
          points: [[x, 30], [x, 217]],
          wireNo: "",
          hideWireNo: true,
          ladderRail: name,
          wireType: state.settings.currentWireType
        });
        items.push({ ...defaultElement("arrow", x, 34), points: [[x, 34], [x, 30]], label: "", arrowStyle: "fork", ladderRail: name });

      // 設備ラダーページ追加ダイアログを開く(レール名/注記)。
      function showFacilityLadderDialog() {
        openDialog("設備ラダーページ", `

      function addPlcOutputCircuitPage(unitName, addresses) {
        const count = addresses.length;
        const page = createPage({

        page.elements.push({

          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(unitX + 10.5), y: round(y - 0.9), label: "" });
          page.elements.push({ ...defaultElement("wire", round(unitX + 12.3), y), points: [[round(unitX + 12.3), y], [134, y]], wireNo: address, wireNoAlign: "start" });
          page.elements.push({ ...defaultElement("coil", 134, round(y - 2.2)), label: "", tag: "" });
          page.elements.push({ ...defaultElement("wire", 144, y), points: [[144, y], [146.5, y]] });
        });

      // ダイアログ入力からPLC入力回路ページを生成(フィーダ母線+接点+端子+ユニット列右置き)。出力指定時はaddPlcOutputCircuitPageへ委譲。
      function addPlcInputCircuitPage() {
        const unitName = qs("#plcInUnit")?.value || "PLC";
        const direction = qs("#plcInDir")?.value || "input";
        const start = qs("#plcInStart")?.value || (direction === "output" ? "Y000" : "X000");
        const count = Math.max(1, Math.min(17, Math.floor(Number(qs("#plcInCount")?.value || 16))));
        const withContacts = (qs("#plcInContacts")?.value || "on") === "on";
        const addresses = plcAddressSequence(start, count);
        if (direction === "output") {
          addPlcOutputCircuitPage(unitName, addresses);
          return;
        }
        const page = createPage({
          name: "制御盤",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "入力回路(" + addresses[0] + ")"
        });
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        page.elements.push(textElement(40, 24.5, "(DC24V)", 1.9, 0, 20));
        const unit = {
          ...defaultElement("plcBlock", 130.5, 31.75),
          plcStyle: "unit",
          rows: count,
          w: 10.5,
          h: count * 9.5,
          label: unitName,
          pinText: addresses.join("\n")
        };
        page.elements.push(unit);
        const feederX = 46.5;
        if (withContacts && addresses.length) {
          const yFirst = round(36.5);
          const yLast = round(36.5 + 9.5 * (addresses.length - 1));
          page.elements.push(defaultElement("junction", 32.5, yFirst));
          page.elements.push({ ...defaultElement("wire", 32.5, yFirst), points: [[32.5, yFirst], [feederX, yFirst]] });
          if (addresses.length > 1) {
            page.elements.push({ ...defaultElement("wire", feederX, yFirst), points: [[feederX, yFirst], [feederX, yLast]] });
          }
        }
        addresses.forEach((address, i) => {
          const y = round(36.5 + 9.5 * i);
          if (withContacts) {
            page.elements.push(defaultElement("junction", feederX, y));
            page.elements.push({ ...defaultElement("contactNO", 52, y - 2.2), label: "" });
            page.elements.push({ ...defaultElement("wire", feederX, y), points: [[feederX, y], [52, y]] });
            page.elements.push({ ...defaultElement("wire", 60, y), points: [[60, y], [128.4, y]], wireNo: address, wireNoAlign: "end" });
          } else {
            page.elements.push(defaultElement("junction", 32.5, y));
            page.elements.push({ ...defaultElement("wire", 32.5, y), points: [[32.5, y], [128.4, y]], wireNo: address, wireNoAlign: "end" });
          }
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: 128.4, y: round(y - 0.9), label: "" });
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("PLC入力回路ページを追加しました。");
        render();
      }

      // ツイストペア表現(導体+交差線+楕円束マーク+シールド破線)の要素列を生成(配置は呼び出し側)。
      function makeTwistedPairElements(options) {
        const count = Math.max(2, Math.min(8, Math.floor(Number(options.count || 4))));
        const pitch = Number(options.pitch || 6.3);
        const x0 = Number(options.x0 || 40);
        const y0 = Number(options.y0 || 80);
        const span = Math.max(30, Number(options.span || 60));
        const labels = Array.isArray(options.labels) ? options.labels : [];
        const created = [];
        const yTop = y0;
        const yBot = y0 + pitch * (count - 1);
        const exL = x0 + 10;
        const exR = x0 + span - 10;
        for (let i = 0; i < count; i++) {
          const y = round(y0 + pitch * i);
          created.push({ ...defaultElement("wire", x0, y), points: [[x0, y], [round(x0 + span), y]] });
          created.push({ ...defaultElement("arrow", x0 - 4, y), points: [[x0 - 4, y], [x0, y]], label: "", arrowStyle: "chevron" });
          if (labels[i]) created.push(textElement(x0 - 12, y - 1.2, labels[i], 2.2, 0, 12));
        }
        const ellH = round((count - 1) * pitch + 5);
        [exL, exR].forEach(cx => {
          created.push({ ...defaultElement("circle", round(cx - 1.9), round(yTop - 2.5)), w: 3.8, h: ellH, label: "" });
        });
        const mid = (exL + exR) / 2;
        [[exL + 3, mid - 2], [mid + 2, exR - 3]].forEach(([xa, xb]) => {
          created.push({ ...defaultElement("line", xa, yTop), points: [[round(xa), yTop], [round(xb), yBot]], label: "" });
          created.push({ ...defaultElement("line", xa, yBot), points: [[round(xa), yBot], [round(xb), yTop]], label: "" });
        });
        created.push({ ...defaultElement("line", exL, yTop - 2), points: [[exL, round(yTop - 2)], [exR, round(yTop - 2)]], dash: "3 2", label: "" });
        created.push({ ...defaultElement("line", exL, yBot + 2), points: [[exL, round(yBot + 2)], [exR, round(yBot + 2)]], dash: "3 2", label: "" });
        return created;
      }

        page.elements.push(...created);

        closeDialog();
        commitHistory("ツイストペアを生成しました。");
        render();
      }

      // モータ分岐回路(遮断器3極+MC接点+サーマル+モータ+接地)の要素列を生成(配置は呼び出し側)。
      function makeMotorBranchElements(options) {
        const x0 = Number(options.x0 || 40);
        const y0 = Number(options.y0 || 65);
        const span = Math.max(70, Number(options.span || 96));
        const tag = options.tag || "M1";
        const pitch = 5.6;
        const withBreaker = options.withBreaker !== false;
        const withThermal = options.withThermal !== false;
        const withGround = options.withGround !== false;
        const contactTag = options.contactTag || "MC1";
        const thermalTag = options.thermalTag || "OL1";
        const created = [];
        const lineYs = [y0, y0 + pitch, y0 + pitch * 2];
        const motorX = x0 + span;
        const motor = { ...defaultElement("motor", motorX, round(y0 - 2.4)), label: tag, tag };
        created.push(motor);
        const stations = [];
        let cursor = x0 + 4;
        const breakers = [];
        if (withBreaker) {
          lineYs.forEach(y => {
            const el = { ...defaultElement("breaker", cursor, round(y - 3)), label: "", refNo: "" };
            breakers.push(el);
            created.push(el);
          });
          breakers[0].label = "CB-" + tag;
          stations.push([cursor, cursor + 12]);
          cursor += 22;
        }
        lineYs.forEach((y, i) => {
          created.push({ ...defaultElement("contactNO", cursor, round(y - 2.2)), label: i === 0 ? contactTag : "" });
        });
        stations.push([cursor, cursor + 8]);
        cursor += 18;
        if (withThermal) {
          lineYs.forEach((y, i) => {
            created.push({ ...defaultElement("thermalElement", cursor, round(y - 3)), label: i === 0 ? thermalTag : "" });
          });
          stations.push([cursor, cursor + 8]);
          cursor += 18;
        }
        lineYs.forEach(y => {
          let sx = x0;
          stations.forEach(([a, b]) => {
            created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), round(y)], [round(a), round(y)]] });
            sx = b;
          });
          created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), round(y)], [round(motorX + 0.9), round(y)]] });
        });
        if (withBreaker && breakers.length === 3) {
          const lx = round(breakers[0].x + 4.75);
          created.push({
            ...defaultElement("mechanicalLink", lx, 0),
            points: [[lx, round(breakers[0].y + 0.75)], [lx, round(breakers[2].y + 0.75)]]
          });
        }
        if (withGround) {
          const gx = round(motorX + 14.6);
          const gy = round(y0 - 2.4 + 14.6);
          created.push({ ...defaultElement("wire", gx, gy), points: [[gx, gy], [gx, gy + 8]] });
          created.push({ ...defaultElement("ground", round(gx - 2), gy + 8), label: "" });
        }
        return created;
      }

        const rails = String(qs("#acRails")?.value || "R01,S01,T01").split(",").map(s => s.trim()).filter(Boolean);

          title: "AC電源回路"
        });
        (rails.length ? rails : ["R01"]).forEach((name, i) => {
          const x = round(32.5 - 4 * i);
          page.elements.push(...facilityRailElements(name, x, "+", 22 + 3 * i));
          page.elements.push(textElement(x - 2, 219 + 3 * i, name, 2.2, 0, 12));
        });
        page.elements.push(...facilityRailElements(rightName, 146.5, "-", 22));

      // ダイアログ入力からラング回路(左レール→直列接点→コイル/ランプ→右レール)を行単位で生成。
      function buildRungCircuits() {
        const page = currentPage();
        if (!page) return;
        const row0 = Math.max(0, Math.min(20, Math.floor(Number(qs("#rcRow").value || 1))));
        const rows = Math.max(1, Math.min(20, Math.floor(Number(qs("#rcCount").value || 1))));

        const rightX = 146.5;
        for (let r = 0; r < rows && row0 + r <= 20; r++) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * (row0 + r));
          created.push(defaultElement("junction", leftX, y));
          let sx = leftX;
          for (let k = 0; k < nContacts; k++) {
            const cx = 44 + 18 * k;
            created.push({ ...defaultElement("contactNO", cx, round(y - 2.2)), label: "" });
            created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [round(cx), y]] });
            sx = cx + 8;
          }
          const endX = 134;
          created.push({ ...defaultElement(endType, endX, round(y - 2.2)), label: "" });
          created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [endX, y]] });
          created.push({ ...defaultElement("wire", endX + 10, y), points: [[endX + 10, y], [rightX, y]] });

        page.elements.push(...created);

        closeDialog();
        commitHistory(rows + "行のラング回路を生成しました。");
        render();
      }

      // ===== ページ間ネットリスト(信号矢印で結合した同電位グループ) =====
      function buildProjectNetlist() {
        const groups = [];
        state.pages.forEach(page => {
          buildWireNets(page).forEach(net => {
            const members = net.filter(wire => !wire.ladderRail);
            if (!members.length) return;
            groups.push({
              pages: [page],
              items: members.map(wire => ({ page, wire })),
              wireNos: new Set(members.map(wire => wire.wireNo).filter(Boolean)),
              signals: new Set(netArrowLabels(page, net)),
              merged: false
            });
          });
        });
        // 同じ信号ラベルに接するグループをページ横断で統合する
        const bySignal = new Map();
        groups.forEach(group => {
          group.signals.forEach(signal => {
            const list = bySignal.get(signal) || [];
            list.push(group);
            bySignal.set(signal, list);
          });
        });
        bySignal.forEach(list => {
          const base = list.find(group => !group.merged);
          if (!base) return;
          list.forEach(group => {
            if (group === base || group.merged) return;
            base.pages.push(...group.pages);
            base.items.push(...group.items);
            group.wireNos.forEach(no => base.wireNos.add(no));
            group.signals.forEach(signal => base.signals.add(signal));
            group.merged = true;
          });
        });
        return groups.filter(group => !group.merged).map(group => {
          const pageNames = Array.from(new Set(group.pages.map(page => page.name)));
          return {
            name: Array.from(group.wireNos).join(" / ") || Array.from(group.signals).join(" / ") || "(未採番)",
            signals: Array.from(group.signals).join(" / "),
            pages: pageNames,
            wireCount: group.items.length,
            first: group.items[0]
          };
        }).sort((a, b) => a.name.localeCompare(b.name));
      }

      // カタログCSVの見出し(和英エイリアス)を正規化して品目配列へ変換。
      function normalizeCatalogCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          family: ["family", "種別", "ファミリ", "接頭辞"],
          manufacturer: ["manufacturer", "メーカー", "メーカ", "maker"],
          catalog: ["catalog", "品番", "型式", "型番", "partno"],
          description: ["description", "説明", "名称", "品名"],
          rating: ["rating", "定格", "仕様"],
          maxNO: ["maxno", "a上限", "no上限"],
          maxNC: ["maxnc", "b上限", "nc上限"]
        };
        const headerCells = rows[0].map(cell => cell.toLowerCase().replace(/\s+/g, ""));
        const columns = {};
        Object.entries(aliases).forEach(([key, names]) => {
          const index = headerCells.findIndex(cell => names.includes(cell));
          if (index >= 0) columns[key] = index;
        });
        const hasHeader = columns.catalog !== undefined || columns.description !== undefined;
        const dataRows = hasHeader ? rows.slice(1) : rows;
        if (!hasHeader) {
          ["family", "manufacturer", "catalog", "description", "rating", "maxNO", "maxNC"].forEach((key, i) => { columns[key] = i; });
        }
        return dataRows.map(cells => {
          const pick = key => (columns[key] === undefined ? "" : (cells[columns[key]] || "").trim());
          const numeric = value => (value === "" ? undefined : Number(value));
          return {
            family: pick("family"),
            manufacturer: pick("manufacturer"),
            catalog: pick("catalog"),
            description: pick("description"),
            rating: pick("rating"),
            maxNO: numeric(pick("maxNO")),
            maxNC: numeric(pick("maxNC"))
          };
        }).filter(item => item.catalog || item.description);
      }

      // カタログCSVを取込(品番一致は上書き、他は追加)。
      function importCatalogCsvFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const items = normalizeCatalogCsvRows(parseDelimitedRows(String(reader.result || "")));
          if (!items.length) {
            setStatus("カタログCSVに取り込める行がありません。ヘッダ（品番/説明など）を確認してください。");
            return;
          }
          if (!Array.isArray(state.catalog)) state.catalog = [];
          let added = 0;
          let updated = 0;
          items.forEach(item => {
            const existing = item.catalog ? state.catalog.find(row => row.catalog === item.catalog) : null;
            if (existing) {
              Object.assign(existing, item);
              updated++;
            } else {
              state.catalog.push(item);
              added++;
            }
          });
          commitHistory("カタログCSVを取り込みました。");
          setStatus(`カタログCSVを取り込みました（追加${added}件・更新${updated}件）。`);
          showCatalogManager();
        };
        reader.readAsText(file);
      }

            if (!tagPrefix(element.type)) return;
            const key = [element.manufacturer || "", element.catalog || "", element.type].join("::");

      // ===== 端子台プラン表(端子ごとの配線・接続先一覧) =====
      function collectTerminalPlanRows() {
        const out = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => ["terminalStrip", "connector"].includes(element.type))
            .forEach(strip => {
              const count = Math.max(1, Number(strip.count || 1));
              const total = strip.stripStyle === "unit" && Number(strip.levels) === 2 ? count * 2 : count;
              const start = Number(strip.start || 1);
              const jumperPairs = terminalJumperPairs(strip);
              for (let i = 0; i < total; i++) {
                const node = terminalStripNodeGlobal(strip, i);
                // 端子小円を挟んで配線が届く構成があるため、許容は2.5mmとする
                const wires = page.elements.filter(wire => wire.type === "wire"
                  && wireEndpointsOf(wire).some(point => Math.hypot(point[0] - node.x, point[1] - node.y) <= 2.5));
                const wireNos = Array.from(new Set(wires.map(wire => wire.wireNo).filter(Boolean)));
                const dests = Array.from(new Set(wires.map(wire => {
                  const ends = wireEndpointsOf(wire);
                  const far = Math.hypot(ends[0][0] - node.x, ends[0][1] - node.y) <= 2.5 ? ends[1] : ends[0];
                  return nearestElementName(page, far[0], far[1], wire.id);
                }).filter(Boolean)));
                const no = start + i;
                const jumpers = i < count
                  ? jumperPairs.filter(([a, b]) => a === no || b === no).map(pair => pair.join("-")).join(",")
                  : "";
                out.push({
                  page: page.name,
                  strip: strip.label || paletteLabel(strip.type),
                  terminal: terminalLabel(strip, i),
                  wireNo: wireNos.join(" / "),
                  dest: dests.join(" / "),
                  jumpers
                });
              }
            });
        });
        return out;
      }

      // ===== 盤レイアウト連携 =====
      const FOOTPRINT_SIZES = {
        plcBlock: [46, 32], powerSupply: [42, 26], breaker: [16, 26], coil: [12, 22],
        transformer: [36, 30], terminalStrip: [58, 14], motor: [30, 30], deviceBox: [28, 20]
      };

      // 盤レイアウト連携ダイアログを開く(タグ付き部品→フットプリント挿入の選択)。
      function showPanelLayoutLinkDialog() {
        const rows = collectReportRows().filter(row => row.record === "component" && row.tag);
        if (!rows.length) {
          openDialog("盤レイアウト連携", '<p class="muted">タグ付きの部品がありません。部品タグを採番してください。</p>');
          return;
        }
        openDialog("盤レイアウト連携", `
          <p class="muted">チェックした部品をフットプリント（矩形+タグ）として現在ページへ挿入します。</p>
          <table class="report-table"><thead><tr><th></th><th>タグ</th><th>種別</th><th>ページ</th><th>設備</th><th>場所</th></tr></thead>
          <tbody>${rows.map((row, index) => `<tr>
            <td><input type="checkbox" data-panel-pick="${index}" checked style="width:auto;min-height:auto"></td>
            <td>${escapeHtml(row.tag)}</td><td>${escapeHtml(paletteLabel(row.type))}</td>
            <td>${escapeHtml(row.page)}</td><td>${escapeHtml(row.installation)}</td><td>${escapeHtml(row.location)}</td>
          </tr>`).join("")}</tbody></table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="panelInsertBtn" class="primary">挿入</button>
          </div>`);
        qs("#panelInsertBtn").addEventListener("click", () => {
          const picked = qsa("[data-panel-pick]", qs("#dialogBody"))
            .filter(input => input.checked)
            .map(input => rows[Number(input.dataset.panelPick)]);
          insertPanelFootprints(picked);
        });
      }

      // 選択したタグ部品のフットプリント(矩形+タグ)を機器配置ページへ挿入。
      function insertPanelFootprints(items) {
        const page = currentPage();
        if (!page || !items.length) return;
        const cols = 4, pitchX = 44, pitchY = 30, x0 = 30, y0 = 50;
        const created = items.map((row, index) => {
          const size = FOOTPRINT_SIZES[row.type] || [18, 14];
          return {
            id: uid("el"), type: "rect",
            x: x0 + (index % cols) * pitchX, y: y0 + Math.floor(index / cols) * pitchY,
            w: size[0], h: size[1],
            label: row.tag, panelRef: row.tag,
            rotation: 0, stroke: state.settings.stroke, layer: "layout"
          };
        });
        page.elements.push(...created);
        setSelection(created.map(item => item.id));
        closeDialog();
        commitHistory(created.length + "個のフットプリントを挿入しました。");
        render();
      }

      // ===== 標準パック外部化 =====
      function exportStandardPack() {
        const pack = {
          packVersion: 1,
          id: "pack-" + Date.now().toString(36),
          label: prompt("標準パック名", "カスタム標準") || "カスタム標準",
          grid: state.settings.grid,
          wireNumberFormat: state.settings.wireNumberFormat,
          componentTagFormat: state.settings.componentTagFormat,
          componentTagPrefixes: deepClone(state.settings.componentTagPrefixes || {}),
          wireTypes: deepClone(state.wireTypes),
          layers: deepClone(state.layers),
          auditRules: deepClone(state.settings.auditRules || {}),
          reportColumns: deepClone(state.settings.reportColumns || {}),
          customSymbols: deepClone(state.customSymbols || []),
          catalog: deepClone(state.catalog || []),
          plcModules: deepClone(state.plcModules || []),
          frameVariant: currentPage()?.frameVariant || "ladder"
        };
        download("standard-pack.json", JSON.stringify(pack, null, 2), "application/json");
        setStatus("標準パックを書き出しました。");
      }

      // 標準パックJSONを読み込み・検証して適用(packVersion=1のみ)。
      function importStandardPackFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const pack = JSON.parse(reader.result);
            if (!pack || pack.packVersion !== 1) throw new Error("packVersion が不正です。");
            state.standardPacks = state.standardPacks || [];
            state.standardPacks.push(pack);
            state.settings.standard = pack.id;
            applyStandardPack(pack);
            commitHistory("標準パック「" + (pack.label || pack.id) + "」を適用しました。");
            render();
          } catch (error) {
            setStatus("標準パックの取込に失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      // 標準パックをstateへ反映。設定値は上書き、ユーザー部品はID重複スキップ、カタログは品番一致を上書き統合、
      // PLCプリセットはラベル重複スキップ。新しいパック項目はexportStandardPack()と対で追加する。
      function applyStandardPack(pack) {
        if (pack.grid) state.settings.grid = pack.grid;
        if (pack.wireNumberFormat) state.settings.wireNumberFormat = pack.wireNumberFormat;
        if (pack.componentTagFormat) state.settings.componentTagFormat = pack.componentTagFormat;
        if (pack.componentTagPrefixes) state.settings.componentTagPrefixes = deepClone(pack.componentTagPrefixes);
        if (Array.isArray(pack.wireTypes) && pack.wireTypes.length) state.wireTypes = deepClone(pack.wireTypes);
        if (Array.isArray(pack.layers) && pack.layers.length) state.layers = deepClone(pack.layers);
        if (pack.auditRules && typeof pack.auditRules === "object") state.settings.auditRules = deepClone(pack.auditRules);
        if (pack.reportColumns && typeof pack.reportColumns === "object") state.settings.reportColumns = deepClone(pack.reportColumns);
        if (Array.isArray(pack.plcModules)) {
          state.plcModules = state.plcModules || [];
          pack.plcModules.forEach(preset => {
            if (!preset || !preset.label) return;
            if (state.plcModules.some(item => item.label === preset.label)) return;
            state.plcModules.push(deepClone(preset));
          });
        }
        if (Array.isArray(pack.customSymbols)) {
          state.customSymbols = state.customSymbols || [];
          pack.customSymbols.forEach(symbol => {
            if (!symbol || !symbol.id) return;
            if (state.customSymbols.some(item => item.id === symbol.id)) return;
            state.customSymbols.push(deepClone(symbol));
          });
        }
        if (Array.isArray(pack.catalog)) {
          state.catalog = state.catalog || [];
          pack.catalog.forEach(item => {
            if (!item) return;
            const existing = item.catalog ? state.catalog.find(row => row.catalog === item.catalog) : null;
            if (existing) Object.assign(existing, deepClone(item));
            else state.catalog.push(deepClone(item));
          });
        }
        if (pack.frameVariant) {
          const page = currentPage();
          if (page) page.frameVariant = pack.frameVariant;
        }
      }

      // ===== DXF取込 MVP(LINE/CIRCLE/TEXT/LWPOLYLINE) =====
      function importDxfFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const elements = dxfEntitiesToElements(String(reader.result || ""));
            if (!elements.length) {
              setStatus("DXFから取り込める要素がありません。");
              return;
            }
            const page = currentPage();
            page.elements.push(...elements);
            setSelection(elements.map(el => el.id));
            commitHistory("DXFから" + elements.length + "要素を取り込みました。");
            render();
          } catch (error) {
            setStatus("DXF取込に失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      // DXFテキストからLINE/CIRCLE/TEXT/LWPOLYLINE/ARC(12分割折れ線)を要素配列へ変換(トレース用)。
      function dxfEntitiesToElements(text) {
        const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        const page = currentPage();
        const H = pageSize(page).h;
        const flipY = y => round(H - Number(y || 0));
        const out = [];
        let inEntities = false;
        let current = null;
        const flush = () => {
          if (!current) return;
          const d = current.data;
          if (current.name === "LINE" && d[10] !== undefined && d[11] !== undefined) {
            out.push({ id: uid("el"), type: "line", points: [[round(d[10]), flipY(d[20])], [round(d[11]), flipY(d[21])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
          } else if (current.name === "CIRCLE" && d[40] !== undefined) {
            const r = Number(d[40]);
            out.push({ ...defaultElement("circle", round(d[10] - r), round(flipY(d[20]) - r)), w: round(r * 2), h: round(r * 2), label: "" });
          } else if (current.name === "TEXT" && d[1] !== undefined) {
            out.push({ ...defaultElement("text", round(d[10] || 0), flipY(d[20])), text: String(d[1]), fontSize: Number(d[40] || 2.5) });
          } else if (current.name === "ARC" && d[40] !== undefined) {
            // 円弧は12分割の折れ線として取り込む(CADのCCW角度→画面系へ変換)
            const r = Number(d[40]);
            const cx = Number(d[10] || 0);
            const cyCad = Number(d[20] || 0);
            let a0 = Number(d[50] || 0);
            let a1 = Number(d[51] || 0);
            if (a1 <= a0) a1 += 360;
            const steps = 12;
            let prev = null;
            for (let k = 0; k <= steps; k++) {
              const a = (a0 + (a1 - a0) * k / steps) * Math.PI / 180;
              const px = round(cx + r * Math.cos(a));
              const py = flipY(cyCad + r * Math.sin(a));
              if (prev) {
                out.push({ id: uid("el"), type: "line", points: [prev, [px, py]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
              }
              prev = [px, py];
            }
          } else if (current.name === "LWPOLYLINE" && (current.pts || []).filter(pt => pt.length === 2).length >= 2) {
            const pts = current.pts.filter(pt => pt.length === 2);
            for (let i = 1; i < pts.length; i++) {
              out.push({ id: uid("el"), type: "line", points: [[round(pts[i - 1][0]), flipY(pts[i - 1][1])], [round(pts[i][0]), flipY(pts[i][1])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
            }
          }
          current = null;
        };
        for (let i = 0; i + 1 < lines.length; i += 2) {
          const code = Number(lines[i].trim());
          const value = lines[i + 1].trim();
          if (code === 2 && value === "ENTITIES") {
            inEntities = true;
            continue;
          }
          if (code === 0) {
            if (value === "ENDSEC") {
              flush();
              inEntities = false;
              continue;
            }
            if (inEntities) {
              flush();
              current = { name: value, data: {}, pts: [] };
              continue;
            }
          }
          if (inEntities && current) {
            if (current.name === "LWPOLYLINE" && code === 10) current.pts.push([Number(value)]);
            else if (current.name === "LWPOLYLINE" && code === 20 && current.pts.length) current.pts[current.pts.length - 1].push(Number(value));
            else if (current.data[code] === undefined) current.data[code] = isNaN(Number(value)) ? value : Number(value);
          }
        }
        flush();
        return out;
      }

      // ===== グループ化 =====
      function groupSelected() {
        const selected = selectedElements();
        if (selected.length < 2) {
          setStatus("グループ化するには2つ以上の要素を選択してください。");
          return;
        }
        const groupId = uid("grp");
        selected.forEach(element => { element.group = groupId; });
        commitHistory(selected.length + "件をグループ化しました。");
        render();
      }

      // 選択要素のグループ解除(groupIdを除去)。
      function ungroupSelected() {
        const selected = selectedElements();
        let count = 0;
        selected.forEach(element => {
          if (element.group) {
            delete element.group;
            count += 1;
          }
        });
        if (!count) {
          setStatus("グループ化された要素がありません。");
          return;
        }
        commitHistory("グループを解除しました。");
        render();
      }

      // 選択に含まれる要素のグループ仲間まで選択を拡張(グループ単位の移動・削除用)。
      function expandSelectionToGroups() {
        const page = currentPage();
        if (!page) return;
        const groups = new Set(selectedElements().map(el => el.group).filter(Boolean));
        if (!groups.size) return;
        setSelection(page.elements
          .filter(el => selectedIds.includes(el.id) || groups.has(el.group))
          .map(el => el.id));
      }

      // ===== 左右ミラー・等間隔複製 =====
      function mirrorSelectedHorizontal() {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素はミラーできません。");
          return;
        }
        const target = unionBounds(selected.map(elementBounds).filter(Boolean));
        const axis = target.x + target.w / 2;
        selected.forEach(element => {
          if (element.points) {
            element.points = element.points.map(point => [round(axis * 2 - point[0]), point[1]]);
          } else {
            const box = elementBounds(element);
            element.x = round(axis * 2 - box.x - box.w);
          }
        });
        commitHistory("左右ミラーしました。");
        render();
      }

      // 配列複写ダイアログを開き、選択要素を行×列で等間隔複製。
      function showArrayCopyDialog() {
        openDialog("等間隔複製", `
          <div class="row">
            <div><label>複製数</label><input id="arrCount" type="number" min="1" step="1" value="3"></div>
            <div><label>間隔X mm</label><input id="arrDx" type="number" step="0.5" value="0"></div>
          </div>
          <label>間隔Y mm</label><input id="arrDy" type="number" step="0.5" value="9.5">
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="arrApplyBtn" class="primary">複製</button>
          </div>`);
        qs("#arrApplyBtn").addEventListener("click", () => {
          const page = currentPage();
          const selected = selectedElements();
          if (!page || !selected.length) {
            setStatus("複製する要素を選択してください。");
            return;
          }
          const count = Math.max(1, Math.floor(Number(qs("#arrCount").value || 1)));
          const dx = Number(qs("#arrDx").value || 0);
          const dy = Number(qs("#arrDy").value || 0);
          const created = [];
          for (let n = 1; n <= count; n++) {
            selected.forEach(element => {
              const copy = deepClone(element);
              copy.id = uid("el");
              copy.locked = false;
              delete copy.group;
              translateElement(copy, dx * n, dy * n);
              created.push(copy);
            });
          }
          page.elements.push(...created);
          setSelection(created.map(el => el.id));
          closeDialog();
          commitHistory(created.length + "件を等間隔複製しました。");
          render();
        });
      }

      // ===== 配線の結合・分割 =====
      function mergeSelectedWires() {
        const page = currentPage();
        const selected = selectedElements();
        if (selected.length !== 2 || selected.some(el => el.type !== "wire")) {
          setStatus("結合するには配線を2本選択してください。");
          return;
        }
        const [a, b] = selected;
        const pa = a.points || [];
        const pb = b.points || [];
        if (pa.length < 2 || pb.length < 2) return;
        const near = (p, q) => Math.abs(p[0] - q[0]) < .6 && Math.abs(p[1] - q[1]) < .6;
        let points = null;
        if (near(pa[pa.length - 1], pb[0])) points = [...pa, ...pb.slice(1)];
        else if (near(pa[pa.length - 1], pb[pb.length - 1])) points = [...pa, ...pb.slice(0, -1).reverse()];
        else if (near(pa[0], pb[0])) points = [...pa.slice().reverse(), ...pb.slice(1)];
        else if (near(pa[0], pb[pb.length - 1])) points = [...pb, ...pa.slice(1)];
        if (!points) {
          setStatus("端点が一致する配線を選択してください。");
          return;
        }
        a.points = orthogonalizePoints(points);
        page.elements = page.elements.filter(el => el.id !== b.id);
        selectSingle(a.id);
        commitHistory("配線を結合しました。");
        render();
      }

      // 終点側の線分を軸方向に伸ばし、最初に交差する他配線まで延長する
      function extendSelectedWireEnd() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [];
        if (points.length < 2) return;
        const a = points[points.length - 2];
        const b = points[points.length - 1];
        const horizontal = Math.abs(a[1] - b[1]) < .01;
        const vertical = Math.abs(a[0] - b[0]) < .01;
        if (!horizontal && !vertical) {
          setStatus("斜めの区間は延長できません。先に直交整形してください。");
          return;
        }
        const size = pageSize(page);
        const dir = horizontal ? Math.sign(b[0] - a[0]) || 1 : Math.sign(b[1] - a[1]) || 1;
        const ray = horizontal
          ? [b[0], b[1], dir > 0 ? size.w : 0, b[1]]
          : [b[0], b[1], b[0], dir > 0 ? size.h : 0];
        let best = null;
        page.elements.forEach(other => {
          if (other.id === element.id || other.type !== "wire") return;
          wireSegments(other).forEach(segment => {
            const hit = segmentIntersection(ray, segment);
            if (!hit) return;
            const dist = horizontal ? (hit.x - b[0]) * dir : (hit.y - b[1]) * dir;
            if (dist > .3 && (!best || dist < best.dist)) best = { hit, dist };
          });
        });
        if (!best) {
          setStatus("延長先の配線が見つかりません。");
          return;
        }
        points[points.length - 1] = [round(best.hit.x), round(best.hit.y)];
        commitHistory("配線を延長しました。");
        render();
      }

      // 終点側の線分を、他配線との最初の交差位置まで切り詰める
      function trimSelectedWireEnd() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [];
        if (points.length < 2) return;
        const a = points[points.length - 2];
        const b = points[points.length - 1];
        const segment = [a[0], a[1], b[0], b[1]];
        const horizontal = Math.abs(a[1] - b[1]) < .01;
        const dir = horizontal ? Math.sign(b[0] - a[0]) || 1 : Math.sign(b[1] - a[1]) || 1;
        let best = null;
        page.elements.forEach(other => {
          if (other.id === element.id || other.type !== "wire") return;
          wireSegments(other).forEach(otherSegment => {
            const hit = segmentIntersection(segment, otherSegment);
            if (!hit) return;
            const dist = horizontal ? (hit.x - a[0]) * dir : (hit.y - a[1]) * dir;
            const full = horizontal ? (b[0] - a[0]) * dir : (b[1] - a[1]) * dir;
            if (dist > .3 && dist < full - .3 && (!best || dist < best.dist)) best = { hit, dist };
          });
        });
        if (!best) {
          setStatus("トリムできる交差がありません。");
          return;
        }
        points[points.length - 1] = [round(best.hit.x), round(best.hit.y)];
        commitHistory("配線をトリムしました。");
        render();
      }

      // 選択配線を中点(または指定点)で2本へ分割。
      function splitSelectedWire() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [];
        if (points.length < 2) return;
        let before;
        let after;
        if (points.length === 2) {
          const mid = [round((points[0][0] + points[1][0]) / 2), round((points[0][1] + points[1][1]) / 2)];
          before = [points[0], mid];
          after = [mid, points[1]];
        } else {
          const cut = Math.floor(points.length / 2);
          before = points.slice(0, cut + 1);
          after = points.slice(cut);
        }
        const second = deepClone(element);
        second.id = uid("el");
        second.points = after;
        second.hideWireNo = true;
        element.points = before;
        page.elements.push(second);
        setSelection([element.id, second.id]);
        commitHistory("配線を分割しました。");
        render();
      }

      // 選択要素を削除(ロック中は除外)。
      function deleteSelected() {
        const page = currentPage();
        const selected = selectedElements();
        if (!page || !selected.length) return;
        const locked = selected.filter(isElementLocked);
        if (locked.length) {
          setStatus("ロックされた要素は削除できません。");
          return;
        }
        const ids = new Set(selected.map(element => element.id));
        page.elements = page.elements.filter(element => !ids.has(element.id));
        setSelection([]);
        commitHistory(selected.length + "件の要素を削除しました。");
        render();
      }

      // 選択要素を少しずらして複製。
      function duplicateSelected() {
        const page = currentPage();
        const selected = selectedElements();
        if (!selected.length || !page) return;
        const copies = selected.map(element => {
          const copy = deepClone(element);
          copy.id = uid("el");
          copy.locked = false;
          if (copy.points) copy.points = copy.points.map(point => [point[0] + 6, point[1] + 6]);
          else {
            copy.x = Number(copy.x || 0) + 6;
            copy.y = Number(copy.y || 0) + 6;
          }
          return copy;
        });
        page.elements.push(...copies);
        setSelection(copies.map(copy => copy.id));
        commitHistory(selected.length + "件の要素を複製しました。");
        render();
      }

      // 選択要素をアプリ内クリップボードへコピー。
      function copySelected() {
        const selected = selectedElements();
        if (!selected.length) return;
        clipboardElement = selected.map(element => deepClone(element));
        setStatus(selected.length + "件の要素をコピーしました。Ctrl+Vで貼り付けできます。");
      }

      // アプリ内クリップボードから貼り付け(IDは振り直し)。
      function pasteClipboard() {
        if (!clipboardElement) {
          setStatus("貼り付ける要素がありません。");
          return;
