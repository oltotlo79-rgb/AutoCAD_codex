          </div>
        `;
        openDialog("端子台エディタ", html);
        qs("#applyTerminalEditorBtn").addEventListener("click", applyTerminalEditor);
      }

      function applyTerminalEditor() {
        qsa("[data-terminal-row]").forEach(row => {
          const element = findElementById(row.dataset.terminalRow);
          if (!element) return;
          const beforeCount = Number(element.count || 1);
          const beforeOrientation = element.orientation || "horizontal";
          qsa("[data-terminal-field]", row).forEach(input => {
            const key = input.dataset.terminalField;
            element[key] = input.type === "number" ? Number(input.value || 0) : input.value;
          });
          if (Number(element.count || 1) !== beforeCount || (element.orientation || "horizontal") !== beforeOrientation) {
            resizeTerminalElementForOrientation(element);
          }
        });
        closeDialog();
        commitHistory("端子台情報を更新しました。");
        render();
      }

      function findElementById(id) {
        for (const page of state.pages) {
          const element = page.elements.find(item => item.id === id);
          if (element) return element;
        }
        return null;
      }

      function autoTagComponents() {
        const format = state.settings.componentTagFormat || "%F%N";
        const allPages = confirm("全ページの部品タグを付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存タグ/ラベルも上書きしますか？\nOK: 上書き / キャンセル: 未入力のみ");
        const startInput = prompt("開始番号", "1");
        if (startInput === null) return;
        const parsedStart = Number(startInput || 1);
        const startNumber = Number.isFinite(parsedStart) && parsedStart > 0 ? Math.floor(parsedStart) : 1;
        const pages = allPages ? state.pages : [currentPage()];
        const counters = {};
        let count = 0;
        pages.forEach(page => {
          page.elements.forEach(element => {
            const prefix = tagPrefix(element.type);
            if (!prefix) return;
            if (element.fixedTag) return;
            if (!overwrite && (element.tag || element.label)) return;
            counters[prefix] = (counters[prefix] || (startNumber - 1)) + 1;
            const tag = formatComponentTag(format, page, element, prefix, counters[prefix]);
            element.tag = tag;
            element.label = tag;
            count += 1;
          });
        });
        commitHistory(count + "個の部品タグを付与しました。");
        render();
      }

      function formatComponentTag(format, page, element, prefix, number) {
        const pageIndex = state.pages.findIndex(item => item.id === page.id) + 1;
        const raw = String(format || "%F%N");
        const pattern = raw.includes("%N") ? raw : raw + "%N";
        return pattern
          .replaceAll("%F", prefix || tagPrefix(element.type))
          .replaceAll("%S", page.title?.page || String(pageIndex))
          .replaceAll("%P", page.name || String(pageIndex))
          .replaceAll("%D", page.title?.drawingNo || "")
          .replaceAll("%I", page.title?.installation || element.installation || "")
          .replaceAll("%L", page.title?.location || element.location || "")
          .replaceAll("%R", String(elementLadderRow(element)).padStart(2, "0"))
          .replaceAll("%N", String(number).padStart(2, "0"));
      }

      function tagPrefix(type) {
        const custom = state.settings.componentTagPrefixes || {};
        if (Object.prototype.hasOwnProperty.call(custom, type)) return custom[type] || "";
        return DEFAULT_TAG_PREFIXES[type] || "";
      }

      function showComponentTagRulesDialog() {
        const custom = state.settings.componentTagPrefixes || {};
        const rows = Object.keys(DEFAULT_TAG_PREFIXES).map(type => {
          const hasCustom = Object.prototype.hasOwnProperty.call(custom, type);
          const value = hasCustom ? custom[type] : DEFAULT_TAG_PREFIXES[type];
          return `
            <tr>
              <td>${escapeHtml(paletteLabel(type))}</td>
              <td>${escapeHtml(DEFAULT_TAG_PREFIXES[type])}</td>
              <td><input data-tag-prefix-type="${escapeAttr(type)}" value="${escapeAttr(value)}"></td>
            </tr>
          `;
        }).join("");
        const html = `
          <p class="muted">部品タグ書式の %F に入るファミリ接頭辞を編集します。空欄にした種別は自動タグ対象外になります。</p>
          <table class="report-table">
            <thead><tr><th>部品種別</th><th>既定</th><th>接頭辞</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="resetComponentTagRulesBtn">既定に戻す</button>
            <button type="button" id="applyComponentTagRulesBtn" class="primary">適用</button>
          </div>
        `;
        openDialog("部品タグ規則", html);
        qs("#resetComponentTagRulesBtn").addEventListener("click", resetComponentTagRules);
        qs("#applyComponentTagRulesBtn").addEventListener("click", applyComponentTagRules);
      }

      function applyComponentTagRules() {
        const prefixes = {};
        qsa("[data-tag-prefix-type]", qs("#dialogBody")).forEach(input => {
          const type = input.dataset.tagPrefixType;
          const value = String(input.value || "").trim();
          if (value !== DEFAULT_TAG_PREFIXES[type]) prefixes[type] = value;
        });
        state.settings.componentTagPrefixes = prefixes;
        closeDialog();
        commitHistory("部品タグ規則を更新しました。");
        render();
      }

      function resetComponentTagRules() {
        state.settings.componentTagPrefixes = {};
        closeDialog();
        commitHistory("部品タグ規則を既定に戻しました。");
        render();
      }

      function componentTag(element) {
        return element.tag || element.label || "";
      }

      function electricalAttributeColumns(element) {
        return {
          tag: element.tag || "",
          description: element.description || "",
          installation: element.installation || "",
          location: element.location || "",
          manufacturer: element.manufacturer || "",
          catalog: element.catalog || "",
          rating: element.rating || "",
          item: element.item || ""
        };
      }

      function electricalAttributeDetail(element) {
        const labels = {
          tag: "tag",
          description: "description",
          installation: "installation",
          location: "location",
          manufacturer: "manufacturer",
          catalog: "catalog",
          rating: "rating",
          item: "item"
        };
        return Object.entries(electricalAttributeColumns(element))
          .filter(([, value]) => String(value || "").trim())
          .map(([key, value]) => labels[key] + "=" + String(value).replace(/\r?\n/g, " / "))
          .join("; ");
      }

      function noteDetail(element) {
        return element.note ? "note=" + String(element.note).replace(/\r?\n/g, " / ") : "";
      }

      function joinDetails(parts) {
        return parts.filter(part => String(part || "").trim()).join("; ");
      }

      function collectReportRows() {
        const rows = [];
        state.pages.forEach((page, pageIndex) => {
          page.elements.forEach(element => {
            if (element.reportTable) return;
            if (element.type === "underlayImage") return;
            const base = {
              pageId: page.id,
              page: page.name || "P" + (pageIndex + 1),
              sheet: page.title?.page || String(pageIndex + 1),
              type: element.type,
              id: element.id,
              ...electricalAttributeColumns(element)
            };
            if (element.type === "wire") {
              const endpoints = wireEndpointNames(page, element);
              const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
              rows.push({ record: "wire", ...base, name: element.wireNo || "", x: endpoints.p0[0], y: endpoints.p0[1], x2: endpoints.p1[0], y2: endpoints.p1[1], detail: joinDetails([wireStyle(element).label, "from=" + endpoints.from, "to=" + endpoints.to, endpoints.manual ? "sequence=manual" : "", element.fixedWireNo ? "fixed=true" : "", element.hideWireNo ? "hidden=true" : "", gapCount ? "gap=true" : "", gapCount ? "gapCount=" + gapCount : "", noteDetail(element)]) });
            } else if (element.type === "terminal") {
              rows.push({ record: "terminal", ...base, name: element.label || "", x: element.x || 0, y: element.y || 0, x2: "", y2: "", detail: joinDetails(["single", electricalAttributeDetail(element), noteDetail(element)]) });
            } else if (["terminalStrip", "connector"].includes(element.type)) {
              const count = Number(element.count || 1);
              for (let i = 0; i < count; i++) {
                rows.push({
                  record: "terminal",
                  ...base,
                  name: terminalLabel(element, i),
                  x: Number(element.x || 0),
                  y: Number(element.y || 0),
                  x2: "",
                  y2: "",
                  detail: joinDetails([element.label || element.type, electricalAttributeDetail(element), noteDetail(element)])
                });
              }
            } else {
              rows.push({
                record: "component",
                ...base,
                name: componentTag(element) || element.text || "",
                x: element.x || "",
                y: element.y || "",
                x2: "",
                y2: "",
                detail: componentDetail(element)
              });
            }
          });
        });
        return rows;
      }

      function componentDetail(element) {
        const details = [electricalAttributeDetail(element), noteDetail(element)];
        if (element.fixedTag) details.unshift("fixedTag=true");
        if (element.type === "arrow") details.unshift("role=" + signalRoleLabel(element.signalRole));
        if (element.type === "table") details.unshift("rows=" + (element.rows || ""), "cols=" + (element.cols || ""), element.colWidths ? "colWidths=" + element.colWidths : "", element.rowHeights ? "rowHeights=" + element.rowHeights : "", "cells=" + String(element.cellText || "").replace(/\r?\n/g, " / "));
        if (element.type === "plcBlock") details.unshift("rows=" + (element.rows || ""), "io=" + String(element.pinText || "").replace(/\r?\n/g, " / "));
        if (element.type === "deviceBox") details.unshift("pins=" + (element.pins || ""), "leftPins=" + String(element.pinText || "").replace(/\r?\n/g, " / "), "rightPins=" + String(element.rightPinText || "").replace(/\r?\n/g, " / "));
        if (["installationBox", "locationBox"].includes(element.type)) details.unshift("area=" + (element.type === "installationBox" ? "installation" : "location"), "value=" + (element.label || ""));
        return joinDetails(details);
      }

      function wireEndpointNames(page, element) {
        const p0 = element.points?.[0] || [0, 0];
        const p1 = element.points?.[element.points.length - 1] || [0, 0];
        const autoFrom = nearestElementName(page, p0[0], p0[1], element.id);
        const autoTo = nearestElementName(page, p1[0], p1[1], element.id);
        const from = String(element.fromOverride || "").trim() || autoFrom;
        const to = String(element.toOverride || "").trim() || autoTo;
        return {
          p0,
          p1,
          autoFrom,
          autoTo,
          from,
          to,
          manual: Boolean(String(element.fromOverride || "").trim() || String(element.toOverride || "").trim())
        };
      }

      function nearestElementName(page, x, y, selfId) {
        let best = null;
        page.elements.forEach(element => {
          if (element.id === selfId || element.type === "wire" || element.type === "line") return;
          const box = elementBounds(element);
          if (!box) return;
          const cx = Math.max(box.x, Math.min(x, box.x + box.w));
          const cy = Math.max(box.y, Math.min(y, box.y + box.h));
          const d = Math.hypot(cx - x, cy - y);
          if (d <= 4 && (!best || d < best.d)) {
            best = { d, name: componentTag(element) || element.text || element.wireNo || paletteLabel(element.type) };
          }
        });
        return best?.name || "";
      }

      function filterReportRows(kind, filters = {}) {
        let rows = collectReportRows();
        if (kind !== "all") rows = rows.filter(row => row.record === kind);

      function buildReportTableElement(page, kind, title, rows) {
        const headers = reportHeaders(kind);
        const body = rows.map(row => headers.map(header => reportCellValue(row, header)).join("\t"));
        const size = pageSize(page);
        const rowCount = rows.length + 1;
        return {
          id: uid("el"),
          type: "table",
          x: 22,
          y: 42,
          w: Math.min(size.w - 44, 180),
          h: Math.min(size.h - 86, Math.max(28, rowCount * 7)),
          rows: rowCount,
          cols: headers.length,
          label: title,
          cellText: [headers.join("\t"), ...body].join("\n"),
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes",
          reportTable: true
        };
      }

      function reportHeaders(kind) {
        if (kind === "wire") return ["ページ", "線番", "FROM", "TO"];
        if (kind === "terminal") return ["ページ", "端子", "種別", "詳細"];
        if (kind === "component") return ["ページ", "タグ/名称", "説明", "品番"];
        return ["種別", "ページ", "タグ/名称", "詳細"];
      }

      function reportCellValue(row, header) {
        const from = detailValue(row.detail, "from");
        const to = detailValue(row.detail, "to");
        const map = {
          "種別": row.record || row.type || "",
          "ページ": row.page || "",
          "タグ/名称": row.tag || row.name || "",
          "説明": row.description || "",
          "品番": row.catalog || "",
          "線番": row.name || "",
          "FROM": from,
          "TO": to,
          "端子": row.name || "",
          "詳細": row.detail || ""
        };
        return String(map[header] || "").replace(/\t/g, " ").replace(/\r?\n/g, " / ");
      }

      function detailValue(detail, key) {
        const match = String(detail || "").match(new RegExp(key + "=([^;]*)"));
        return match ? match[1].trim() : "";
      }

      function applyTitleBatch(scope = "all") {
        const values = titleBatchValues();
        const map = titleMapValues();
        const onlyBlank = qs("#batchOnlyBlank").checked;
        state.project = { ...ensureProjectDefaults(), ...values, titleMap: map };
        const total = state.pages.length;
        const targets = scope === "current" ? [currentPage()].filter(Boolean) : state.pages;
        targets.forEach(page => {
          if (!page.title) page.title = {};
          const index = state.pages.indexOf(page);
          TITLE_FIELDS.forEach(field => {
            const resolved = resolveTitleSource(page, map[field.key], values, index, total);
            if (!resolved.apply) return;
            if (onlyBlank && page.title[field.key]) return;
            page.title[field.key] = resolved.value;
          });
        });
        closeDialog();
        commitHistory(scope === "current" ? "現在ページの表題欄を更新しました。" : "表題欄を一括更新しました。");
        render();
      }

      function resolveTitleSource(page, source, values, index, total) {
        if (source === "keep") return { apply: false, value: "" };
        if (source === "empty") return { apply: true, value: "" };
        const projectKey = String(source || "").replace(/^project\./, "");
        if (source?.startsWith("project.")) {
          const value = values[projectKey] || "";
          return { apply: value !== "", value };
        }
        if (source === "page.name") return { apply: true, value: page.name || "" };
        if (source === "page.number") return { apply: true, value: String(index + 1) };
        if (source === "page.numberTotal") return { apply: true, value: String(index + 1) + " / " + String(total) };
        return { apply: false, value: "" };
      }

      function collectCrossReferences() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const entries = crossRefEntries(element);
            entries.forEach(entry => {
              const key = entry.kind + "::" + entry.key;
              const list = map.get(key) || { key: entry.key, kind: entry.kind, items: [] };
              const type = element.type === "arrow" ? paletteLabel(element.type) + "/" + signalRoleLabel(element.signalRole) : paletteLabel(element.type);
              list.items.push({ pageId: page.id, pageName: page.name, id: element.id, type });
              map.set(key, list);
            });
          });
        });
        return Array.from(map.values()).sort((a, b) => a.kind.localeCompare(b.kind) || a.key.localeCompare(b.key));
      }

      function crossRefEntries(element) {
        const entries = [];
        if (element.type === "wire" && element.wireNo) entries.push({ kind: "線番", key: element.wireNo });
        if (element.type === "arrow" && element.label) entries.push({ kind: "信号", key: element.label });
        const tag = componentTag(element);
        if (!["wire", "arrow", "text", "table", "rect", "circle", "line", "underlayImage", "installationBox", "locationBox", "junction"].includes(element.type) && tag) {
          entries.push({ kind: "部品", key: tag });
        }
        return entries;
      }

      function attachDialogSelection() {
        qsa("[data-select-id]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const pageId = button.dataset.selectPage;
            const elementId = button.dataset.selectId;
            if (pageId) state.activePageId = pageId;
            selectSingle(elementId);
            closeDialog();
            render();
            setStatus("一覧から要素を選択しました。");
          });
        });
      }

      function csvCell(value) {
        const text = String(value ?? "");
        if (/[",\r\n]/.test(text)) return '"' + text.replaceAll('"', '""') + '"';
        return text;
      }

      function showAudit() {
        const issues = auditProject();
        const body = issues.length
          ? `<table class="report-table"><thead><tr><th>重要度</th><th>ページ</th><th>内容</th><th>対象</th><th>選択</th></tr></thead><tbody>${issues.map(issue => `<tr><td>${issue.level}</td><td>${escapeHtml(issue.page)}</td><td>${escapeHtml(issue.message)}</td><td>${escapeHtml(issue.target)}</td><td>${auditSelectionButton(issue)}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">検出された問題はありません。</p>';
        openDialog("図面監査", body);
        attachDialogSelection();
      }

      function auditSelectionButton(issue) {
        if (!issue.elementId) return "";
        return `<button type="button" data-select-page="${escapeAttr(issue.pageId || "")}" data-select-id="${escapeAttr(issue.elementId)}">選択</button>`;
      }

      function auditProject() {
        const issues = [];
        const arrows = new Map();
        const terminalNames = new Map();
        const componentTags = new Map();
        state.pages.forEach(page => {
          const size = pageSize(page);
          if (!page.title?.title) {
            issues.push({ level: "注意", page: page.name, message: "図名が未入力です。", target: "表題欄" });
          }
          page.elements.forEach(element => {
            const label = componentTag(element) || element.text || element.wireNo || "";
            if (element.type === "wire") {
              if (!element.wireNo && !element.ladderRail && !wireStyle(element).noNumber) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "線番が未入力です。", target: element.id });
              }
            }
            if (["contactNO", "contactNC", "pushButton", "coil", "fuse", "breaker", "lamp", "buzzer", "powerSupply", "transformer", "ground", "motor", "fan", "resistor", "diode", "deviceBox", "plcBlock", "cableMarker"].includes(element.type) && !label) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "ラベルが未入力です。", target: element.type });
            }
            const prefix = tagPrefix(element.type);
            if (prefix) {
              if (!element.tag) {
                issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグが未採番です。", target: element.label || paletteLabel(element.type) });
              } else {
                const key = element.type + "::" + element.tag;
                const list = componentTags.get(key) || [];
                list.push({ page: page.name, pageId: page.id, elementId: element.id, type: paletteLabel(element.type), tag: element.tag });
                componentTags.set(key, list);
              }
              if (element.fixedTag && !element.tag) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグ固定ですがタグが空です。", target: element.label || paletteLabel(element.type) });
              }
            }
            if (["terminalStrip", "connector"].includes(element.type) && Number(element.count || 0) <= 0) {
              issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "端子数が不正です。", target: element.label || element.id });
            }
            if (["terminalStrip", "connector"].includes(element.type) && element.label) {
              const key = page.name + "::" + element.label;
              terminalNames.set(key, (terminalNames.get(key) || 0) + 1);
            }
            if (element.type === "arrow") {
              if (!element.label) {
                if (!element.ladderRail) issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "信号矢印の参照名が未入力です。", target: element.id });
              } else {
                const role = element.signalRole || "reference";
                const group = arrows.get(element.label) || { source: [], destination: [], reference: [] };
                (group[role] || group.reference).push(page.name);
                arrows.set(element.label, group);
              }
            }
            const box = elementBounds(element);
            if (box && (box.x < 0 || box.y < 0 || box.x + box.w > size.w || box.y + box.h > size.h)) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "用紙外にはみ出しています。", target: label || element.type });
            }
          });
          const pageNets = buildWireNets(page)
            .map(net => net.filter(wire => !wire.ladderRail && !wireStyle(wire).noNumber))
            .filter(net => net.length);
          const numberToNets = new Map();
          pageNets.forEach(net => {
            const values = Array.from(new Set(net.map(wire => wire.wireNo).filter(Boolean)));
            if (values.length > 1) {
              issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: net[0].id, message: "同一ネット内で線番が混在しています。", target: values.join(" / ") });
            }
            if (values.length === 1) {
              const list = numberToNets.get(values[0]) || [];
              list.push(net);
              numberToNets.set(values[0], list);
            }
          });
          numberToNets.forEach((nets, wireNo) => {
            if (nets.length > 1) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: nets[0][0].id, message: "同じ線番が接続されていない別ネットにあります。", target: wireNo + "(" + nets.length + "ネット)" });
            }
          });
          auditFloatingWireEnds(page).forEach(item => issues.push(item));
        });
        arrows.forEach((group, label) => {
          if (group.source.length && !group.destination.length) {
            issues.push({ level: "注意", page: group.source[0], message: "受信先の信号矢印がありません。", target: label });
          }
          if (group.destination.length && !group.source.length) {
            issues.push({ level: "注意", page: group.destination[0], message: "発信元の信号矢印がありません。", target: label });
          }
          if (!group.source.length && !group.destination.length && group.reference.length === 1) {
            issues.push({ level: "注意", page: group.reference[0], message: "対応する信号矢印がありません。", target: label });
          }
        });
        terminalNames.forEach((count, key) => {
          if (count > 1) {
            const [page, name] = key.split("::");
            issues.push({ level: "注意", page, message: "同一ページ内で端子台名称が重複しています。", target: name });
          }
        });
        componentTags.forEach(items => {
          if (items.length > 1) {
            const first = items[0];
            const pages = Array.from(new Set(items.map(item => item.page))).join(", ");
            issues.push({ level: "注意", page: first.page, pageId: first.pageId, elementId: first.elementId, message: "同一部品種別で部品タグが重複しています。", target: first.type + " " + first.tag + " (" + pages + ")" });
          }
        });
        const xref = buildCrossRefCache();
        xref.coils.forEach((coil, tag) => {
          const children = xref.contacts.get(tag) || [];
          if (!children.length) {
            issues.push({ level: "情報", page: coil.page.name, pageId: coil.page.id, elementId: coil.element.id, message: "コイルに対応する接点がありません。", target: tag });
          }
          const cat = (state.catalog || []).find(item => item.catalog && item.catalog === coil.element.catalog);
          const maxNO = Number(cat?.maxNO ?? 4);
          const maxNC = Number(cat?.maxNC ?? 4);
          const usedNO = children.filter(c => !c.closed).length;
          const usedNC = children.filter(c => c.closed).length;
          if (usedNO > maxNO) issues.push({ level: "警告", page: coil.page.name, pageId: coil.page.id, elementId: coil.element.id, message: "a接点の使用数が上限を超えています(" + usedNO + "/" + maxNO + ")。", target: tag });
          if (usedNC > maxNC) issues.push({ level: "警告", page: coil.page.name, pageId: coil.page.id, elementId: coil.element.id, message: "b接点の使用数が上限を超えています(" + usedNC + "/" + maxNC + ")。", target: tag });
        });
        xref.contacts.forEach((list, tag) => {
          if (xref.coils.has(tag)) return;
          if (list.every(item => item.element.type === "thermalRelay")) return;
          const first = list[0];
          issues.push({ level: "注意", page: first.page.name, pageId: first.page.id, elementId: first.element.id, message: "接点に対応するコイルがありません。", target: tag + "(" + list.length + "箇所)" });
        });
        const jumperTargets = [];
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            if (!["terminalStrip", "connector"].includes(element.type)) return;
            const count = Math.max(1, Number(element.count || 1));
            const start = Number(element.start || 1);
            terminalJumperPairs(element).forEach(([a, b]) => {
              if (a - start < 0 || b - start < 0 || a - start >= count || b - start >= count) {
                jumperTargets.push({ page, element, pair: a + "-" + b });
              }
            });
          });
        });
        jumperTargets.forEach(item => {
          issues.push({ level: "警告", page: item.page.name, pageId: item.page.id, elementId: item.element.id, message: "ジャンパの端子番号が範囲外です。", target: (item.element.label || item.element.id) + " " + item.pair });
        });
        const hasFootprints = state.pages.some(page => page.elements.some(element => element.panelRef));
        if (hasFootprints) {
          const placed = new Set();
          state.pages.forEach(page => page.elements.forEach(element => {
            if (element.panelRef) placed.add(element.panelRef);
          }));
          xref.coils.forEach((coil, tag) => {
            if (!placed.has(tag)) {
              issues.push({ level: "情報", page: coil.page.name, pageId: coil.page.id, elementId: coil.element.id, message: "盤レイアウトに未配置です。", target: tag });
            }
          });
        }
        return issues;
      }

      function auditFloatingWireEnds(page) {
        const issues = [];
        const endpointCounts = new Map();
        page.elements.filter(element => element.type === "wire").forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            endpointCounts.set(key, (endpointCounts.get(key) || 0) + 1);
          });
        });
        page.elements.filter(element => element.type === "wire" && !element.ladderRail).forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            if ((endpointCounts.get(key) || 0) > 1) return;
            if (hasConnectionTargetNear(page, point[0], point[1], wire.id)) return;
            issues.push({
              level: "注意",
              page: page.name,
              pageId: page.id,
              elementId: wire.id,
              message: "配線端点が未接続の可能性があります。",
              target: (wire.wireNo || wire.id) + " @ " + key
            });
          });
        });
        return issues;
      }

      function hasConnectionTargetNear(page, x, y, selfId) {
        return page.elements.some(element => {
          if (element.id === selfId) return false;
          if (element.type === "wire") {
            return wireSegments(element).some(segment => pointOnSegment(x, y, segment));
          }
          if (element.type === "junction") {
            return Math.abs((element.x || 0) - x) <= 1.2 && Math.abs((element.y || 0) - y) <= 1.2;
          }
          const box = elementBounds(element);
          if (!box) return false;
          return x >= box.x - 2 && x <= box.x + box.w + 2 && y >= box.y - 2 && y <= box.y + box.h + 2;
        });
      }

      function pointOnSegment(x, y, segment) {
        const vertical = Math.abs(segment[0] - segment[2]) < .001;
        if (vertical) return Math.abs(x - segment[0]) < .6 && between(y, segment[1], segment[3]);
        return Math.abs(y - segment[1]) < .6 && between(x, segment[0], segment[2]);
      }

      function openDialog(title, html) {
        qs("#dialogTitle").textContent = title;
        qs("#dialogBody").innerHTML = html;
        qs("#dialogBackdrop").classList.remove("hidden");
      }

      function closeDialog() {
        qs("#dialogBackdrop").classList.add("hidden");
      }

      function exportDxf() {
        const page = currentPage();
        const dxf = buildDxf(page);
        download((page.name || "page") + ".dxf", dxf, "application/dxf");
        setStatus("DXFを書き出しました。");
      }

      function buildDxf(page) {
        const out = [];
        dxfHeader(out);
        dxfFrame(out, page);
        page.elements.forEach(element => dxfElement(out, page, element));
        out.push("0", "ENDSEC", "0", "EOF");
        return out.join("\n") + "\n";
      }

      function dashLtypeName(dash) {
        const value = String(dash || "").trim();
        if (!value) return null;
        if (value === "6 1.5 1.5 1.5") return "CENTER";
        if (value === "8 1.5 1.5 1.5 1.5 1.5") return "PHANTOM";
        if (value === "1.4 1.2" || value === "1.2 1.4") return "DOTTED";
        return "DASHED";
      }

      function dxfHeader(out) {
        out.push(
          "0", "SECTION",
          "2", "HEADER",
          "9", "$INSUNITS",
          "70", "4",
          "0", "ENDSEC",
          "0", "SECTION",
          "2", "TABLES",
          "0", "TABLE",
          "2", "LTYPE",
          "70", "5",
          "0", "LTYPE", "2", "CONTINUOUS", "70", "0", "3", "Solid line", "72", "65", "73", "0", "40", "0",
          "0", "LTYPE", "2", "DASHED", "70", "0", "3", "Dashed __ __ __", "72", "65", "73", "2", "40", "4.5", "49", "3", "49", "-1.5",
          "0", "LTYPE", "2", "CENTER", "70", "0", "3", "Center ____ _ ____", "72", "65", "73", "4", "40", "10.5", "49", "6", "49", "-1.5", "49", "1.5", "49", "-1.5",
          "0", "LTYPE", "2", "PHANTOM", "70", "0", "3", "Phantom ____ _ _ ____", "72", "65", "73", "6", "40", "15.5", "49", "8", "49", "-1.5", "49", "1.5", "49", "-1.5", "49", "1.5", "49", "-1.5",
          "0", "LTYPE", "2", "DOTTED", "70", "0", "3", "Dotted . . .", "72", "65", "73", "2", "40", "2", "49", "0.5", "49", "-1.5",
          "0", "ENDTAB",
          "0", "ENDSEC",
          "0", "SECTION",
          "2", "ENTITIES"
        );
      }

      function dxfLadderFrame(out, page, size) {
        const L = 19, R = size.w - 19, T = 18, B = size.h - 24;
        dxfRect(out, page, "FRAME", L, T, R - L, B - T);
        for (let i = 0; i <= 20; i++) {
          dxfText(out, page, "FRAME", 23.7, 27 + 9.5 * i + 1, 3, String(i).padStart(2, "0"));
        }
        if (page.name) dxfText(out, page, "FRAME", (L + R) / 2 - String(page.name).length * 1.05, 23.7, 3.5, page.name);
        const tblTop = B - 49;
        const xrefR = 105.8;
        dxfRect(out, page, "FRAME", L, tblTop, xrefR - L, B - tblTop);
        for (let i = 1; i < 13; i++) {
          const x = L + (xrefR - L) * i / 13;
          dxfLine(out, page, "FRAME", x, tblTop, x, B);
        }
        [tblTop + 5, B - 11, B - 5.5].forEach(y => dxfLine(out, page, "FRAME", L, y, xrefR, y));
        const devTop = tblTop;
        const devBottom = tblTop + 28.5;
        dxfRect(out, page, "FRAME", xrefR, devTop, R - xrefR, devBottom - devTop);
        const gw = (R - xrefR) / 2;
        [0, 1].forEach(gi => {
          const gx = xrefR + gi * gw;
          dxfLine(out, page, "FRAME", gx + 11, devTop, gx + 11, devBottom);
          dxfLine(out, page, "FRAME", gx + gw - 4.5, devTop, gx + gw - 4.5, devBottom);
          dxfText(out, page, "FRAME", gx + 1, devTop + 2.2, 1.7, "機器符号");
          dxfText(out, page, "FRAME", gx + 13, devTop + 2.2, 1.7, "機器符号内容");
          dxfText(out, page, "FRAME", gx + gw - 3.6, devTop + 2.2, 1.7, "頁");
        });
        dxfLine(out, page, "FRAME", xrefR + gw, devTop, xrefR + gw, devBottom);
        for (let i = 1; i <= 10; i++) {
          const y = devTop + 2.6 + (devBottom - devTop - 2.6) * i / 10;
          dxfLine(out, page, "FRAME", xrefR, y, R, y);
        }
        const t1 = devBottom, t2 = t1 + 6, t3 = t2 + 8, t4 = B;
        dxfRect(out, page, "TITLE", xrefR, t1, R - xrefR, t4 - t1);
        dxfLine(out, page, "TITLE", xrefR, t2, R, t2);
        dxfLine(out, page, "TITLE", xrefR, t3, R, t3);
        dxfLine(out, page, "TITLE", 137, t1, 137, t2);
        dxfLine(out, page, "TITLE", 110, t2, 110, t4);
        dxfLine(out, page, "TITLE", 177, t2, 177, t3);
        dxfText(out, page, "TITLE", xrefR + 1.2, t1 + 2.4, 1.7, "客先機番");
        if (page.title.installation) dxfText(out, page, "TITLE", xrefR + 6, (t1 + t2) / 2 + 1.8, 2.4, page.title.installation);
        dxfText(out, page, "TITLE", 138.2, t1 + 2.4, 1.7, "装置区分");
        if (page.title.facility) dxfText(out, page, "TITLE", 144, (t1 + t2) / 2 + 1.8, 2.4, page.title.facility);
        dxfText(out, page, "TITLE", 106.6, t2 + 3.4, 1.9, "内");
        dxfText(out, page, "TITLE", 106.6, t2 + 6.2, 1.9, "容");
        if (page.title.title) dxfText(out, page, "TITLE", (110 + 177) / 2 - String(page.title.title).length * .96, (t2 + t3) / 2 + 1.1, 3.2, page.title.title);
        dxfText(out, page, "TITLE", 183.2, t2 + 2.4, 1.7, "頁");
        if (page.title.page) dxfText(out, page, "TITLE", 184 - String(page.title.page).length * 1.05, t3 - 1.2, 3.5, page.title.page);
        dxfText(out, page, "TITLE", 106.6, t3 + 3, 1.9, "図");
        dxfText(out, page, "TITLE", 106.6, t3 + 5.6, 1.9, "番");
        dxfText(out, page, "TITLE", (110 + R) / 2 - String(page.title.drawingNo || "−").length * .78, (t3 + t4) / 2 + .9, 2.6, page.title.drawingNo || "−");
        dxfText(out, page, "FRAME", L, size.h - 19.3, 1.9, "汎用図番:");
        dxfText(out, page, "FRAME", 55, size.h - 19.3, 1.9, "図番:");
        dxfText(out, page, "FRAME", 95, size.h - 19.3, 1.9, "出力日: " + (page.title.date || ""));
        dxfText(out, page, "FRAME", 125, size.h - 19.3, 1.9, "更新日: " + (state.project.date || ""));
        if (state.project.designer) dxfText(out, page, "FRAME", R - state.project.designer.length * 1.9, size.h - 19.3, 2.1, state.project.designer);
        if (page.title.sideNote) {
          dxfTextRotated(out, page, "FRAME", 17.3, size.h / 2, 2.2, page.title.sideNote, 90);
        }
        const colW = (xrefR - L) / 13;
        pageCoilXrefColumns(page).forEach((col, i) => {
          const x = L + colW * i;
          dxfText(out, page, "FRAME", x + 0.6, tblTop + 3.1, 1.8, col.tag);
          col.refs.slice(0, 12).forEach((ref, j) => {
            const y = tblTop + 7.5 + j * 2.6;
            dxfText(out, page, "FRAME", x + colW - 0.8 - String(ref.address).length * 1.06, y + .6, 1.7, ref.address);
            if (ref.closed) {
              const w = String(ref.address).length * 1.06;
              dxfLine(out, page, "FRAME", x + colW - 0.8 - w, y + 1.1, x + colW - 0.8, y + 1.1);
            }
          });
        });
        const rowH = (28.5 - 2.6) / 10;
        pageDeviceTableRows(page).forEach((row, index) => {
          const gi = Math.floor(index / 10);
          const gx = xrefR + gi * gw;
          const y = devTop + 2.6 + (index % 10) * rowH + rowH * 0.7 + .6;
          dxfText(out, page, "FRAME", gx + 0.6, y, 1.7, row.tag);
          if (row.desc) dxfText(out, page, "FRAME", gx + 11.6, y, 1.7, row.desc);
          if (row.page) dxfText(out, page, "FRAME", gx + gw - 3.2, y, 1.7, row.page);
        });
      }

      function dxfFrame(out, page) {
        const size = pageSize(page);
        const margin = frameMargin(size);
        if (page.frameVariant === "ladder") {
          dxfLadderFrame(out, page, size);
          return;
        }
        dxfRect(out, page, "FRAME", margin, margin, size.w - margin * 2, size.h - margin * 2);
        dxfRect(out, page, "FRAME", margin + 4, margin + 4, size.w - (margin + 4) * 2, size.h - (margin + 4) * 2);
        if (page.frameVariant !== "blank") {
          const titleW = page.frameVariant === "side" ? Math.min(44, Math.max(34, size.w * .15)) : Math.min(124, size.w - margin * 2 - 12);
          const titleH = page.frameVariant === "side" ? 88 : 48;
          const x = size.w - margin - titleW;
          const y = size.h - margin - titleH;
          dxfRect(out, page, "TITLE", x, y, titleW, titleH);
          dxfText(out, page, "TITLE", x + 3, y + 8, 2.8, page.title?.title || "");
          dxfText(out, page, "TITLE", x + 3, y + 16, 2.4, page.title?.drawingNo || "");
        }
      }

      function dxfElement(out, page, element) {
        if (element.type === "underlayImage") return;
        if (dxfGeoSymbol(out, page, element)) {
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "wire") {
          const layer = "WIRE_" + String(element.wireType || "control").toUpperCase();
          const wireLtype = dashLtypeName(wireStyle(element).dash);
          const points = element.points || [[0, 0], [20, 0]];

      function dxfContactLocal(out, page, element, closed) {

        dxfCircleLocal(out, page, "SYMBOL", element, right, cy, r);

      function dxfTerminalLocal(out, page, element) {
        const label = element.label || "1";

        const h = Number(element.h || 6);
        const r = Math.min(2.45, Math.max(1.8, Math.min(w, h) * .36));
        const cx = w / 2;
        const cy = h / 2;
        const shape = element.terminalShape || "circle";
        if (element.orientation === "vertical") {
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, cy - r);
          dxfLineLocal(out, page, "SYMBOL", element, cx, cy + r, cx, h);
          dxfTerminalNodeLocal(out, page, "SYMBOL", element, cx, cy, r, shape);
          dxfTextLocal(out, page, "TEXT", element, cx + r + .8, cy + .55, 1.8, label);

        }
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfTerminalNodeLocal(out, page, "SYMBOL", element, cx, cy, r, shape);

      function dxfPushButtonActuatorLocal(out, page, element) {
        const w = Number(element.w || (element.orientation === "vertical" ? 8 : 10));
        const h = Number(element.h || (element.orientation === "vertical" ? 14 : 8));
        if (element.orientation === "vertical") {
          const cx = w / 2;
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, 2.6);
          dxfLineLocal(out, page, "SYMBOL", element, Math.max(0, cx - 4), 0, Math.min(w, cx + 4), 0);
          return;
        }
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, Math.max(1.2, h / 2 - 1.8));
        dxfLineLocal(out, page, "SYMBOL", element, Math.max(0, cx - 4), 0, Math.min(w, cx + 4), 0);
      }

      function dxfSelectorSwitchActuatorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 9);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx - 2.7, 1, cx + 2.7, 4.2);
        dxfLineLocal(out, page, "SYMBOL", element, cx + 2.7, 1, cx - 2.7, 4.2);
        dxfLineLocal(out, page, "SYMBOL", element, cx, 1, cx, Math.max(2.8, h / 2 - 1));
      }

      function dxfLimitSwitchActuatorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 8);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx - 4.2, 1, cx + 4.2, 1);
        dxfLineLocal(out, page, "SYMBOL", element, cx, 1, cx, Math.max(2.6, h / 2 - .9));
        dxfCircleLocal(out, page, "SYMBOL", element, cx + 4.8, 1, .8);
      }

      function dxfFuseLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 4.5);
        if (element.orientation === "vertical") {
          const cx = w / 2;
          const lead = Math.min(3.5, Math.max(2.6, h * .24));
          const bodyY = lead;
          const bodyH = Math.max(5, h - lead * 2);
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, bodyY);
          dxfRectLocal(out, page, "SYMBOL", element, 0, bodyY, w, bodyH);
          dxfLineLocal(out, page, "SYMBOL", element, cx, bodyY + bodyH, cx, h);
          dxfLineLocal(out, page, "SYMBOL", element, .8, bodyY + bodyH - 1.1, w - .8, bodyY + 1.1);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w + 2.2, h / 2 + .7, 1.9, element.label);
          return;
        }
        const lead = Math.min(3.5, Math.max(2.6, w * .24));
        const bodyX = lead;
        const bodyW = Math.max(5, w - lead * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, bodyX, h / 2);
        dxfRectLocal(out, page, "SYMBOL", element, bodyX, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, h / 2, w, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + 1.1, h - .8, bodyX + bodyW - 1.1, .8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfBreakerLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        if (element.orientation === "vertical") {
          const cx = w / 2;
          const upper = Math.max(3, h * .32);
          const lower = Math.min(h - 3, h * .72);
          const bladeX = Math.max(1.1, cx - Math.min(2.25, w * .32));
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, upper - .65);
          dxfLineLocal(out, page, "SYMBOL", element, cx, lower + .65, cx, h);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, upper, .65);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, lower, .65);
          dxfLineLocal(out, page, "SYMBOL", element, cx + .2, upper + .7, bladeX, lower - .3);
          dxfLineLocal(out, page, "SYMBOL", element, cx + 1.7, lower - 1.1, cx + 1.7, lower + 1.1);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w + 2.2, h / 2 + .7, 1.9, element.label);
          return;
        }
        const cy = h / 2;
        const left = Math.max(3, w * .32);
        const right = Math.min(w - 3, w * .72);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, left - .65, cy);
        dxfLineLocal(out, page, "SYMBOL", element, right + .65, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, left, cy, .65);
        dxfCircleLocal(out, page, "SYMBOL", element, right, cy, .65);
        dxfLineLocal(out, page, "SYMBOL", element, left + .7, cy - .2, right - .3, Math.max(1.1, cy - 2.25));
        dxfLineLocal(out, page, "SYMBOL", element, right - 1.1, cy + 1.7, right + 1.1, cy + 1.7);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfCoilLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 6);
        const cy = h / 2;
        const bodyX = Math.max(2.6, w * .24);
        const bodyW = Math.max(6, w - bodyX * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, bodyX, .8, bodyW, h - 1.6);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .35, 1.1, bodyX + bodyW * .35, h - 1.1);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .65, 1.1, bodyX + bodyW * .65, h - 1.1);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfLampLocal(out, page, element) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 10);
        if ((element.lampVariant || "pilot") === "cylinder") {
          const cy = h / 2;
          const bodyX = Math.max(3.5, w * .3);
          const bodyW = Math.max(5.5, w - bodyX * 2);
          const bodyY = Math.max(1.6, h * .18);
          const bodyH = h - bodyY * 2;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX, bodyY + 1, bodyX, bodyY + bodyH - 1);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, bodyY + 1, bodyX + bodyW, bodyY + bodyH - 1);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + 1, bodyW / 2, 1.2);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + bodyH - 1, bodyW / 2, 1.2);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        const r = Number(element.r || Math.min(w, h) * .34);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfLineLocal(out, page, "SYMBOL", element, cx - r * .45, cy, cx, cy - r * .32);
        dxfLineLocal(out, page, "SYMBOL", element, cx, cy - r * .32, cx + r * .45, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfBuzzerLocal(out, page, element) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 9);
        const cy = h / 2;
        if ((element.buzzerVariant || "horn") === "horn") {
          const throat = Math.max(4.2, w * .26);
          const mouthX = w - .4;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, throat - .8, cy);
          dxfCircleLocal(out, page, "SYMBOL", element, throat, cy, .85);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy - 2.3, throat + 6.8, cy - 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy - 2.4, mouthX, cy - 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy + 2.3, throat + 6.8, cy + 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy + 2.4, mouthX, cy + 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, mouthX, cy - 4.9, w, cy - 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy - 2, w, cy + 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy + 2, mouthX, cy + 4.9);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .24, cy, w * .62, 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, 2.2, w * .62, h - 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, h - 2.2, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .72, h * .3, w * .86, h * .42);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .42, w * .86, h * .58);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .58, w * .72, h * .7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .84, h * .18, w, h * .38);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .38, w, h * .62);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .62, w * .84, h * .82);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfSolenoidValveLocal(out, page, element) {
        const w = Number(element.w || 26);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const coilW = Math.max(7, w * .28);
        const bodyX = coilW + 2;
        const bodyW = Math.max(8, w - bodyX - 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 2.5, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 2.5, 2, coilW, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, 2, bodyX + bodyW, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, bodyX, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, h - 2, bodyX, 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, 2, bodyX + bodyW, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfSensorLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 14);
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 4, 2, w - 8, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, 7, 5, w - 10, 5);
        dxfLineLocal(out, page, "SYMBOL", element, 7, h - 5, w - 7, h - 5);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy - 4, w, cy - 8);
        dxfLineLocal(out, page, "SYMBOL", element, w - 3, cy, w + 2, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy + 4, w, cy + 8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfCableBundleLocal(out, page, element) {
        const w = Number(element.w || 32);
        const h = Number(element.h || 18);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .2, w, h * .2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .5, w, h * .5);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .8, w, h * .8);
        dxfRectLocal(out, page, "SYMBOL", element, w * .42, 1.5, w * .18, h - 3);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfTerminalBoxLocal(out, page, element) {
        const w = Number(element.w || 22);
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        dxfRectLocal(out, page, "SYMBOL", element, 0, 0, w, h);
        for (let i = 1; i < rows; i++) dxfLineLocal(out, page, "SYMBOL", element, 0, h * i / rows, w, h * i / rows);
        for (let i = 0; i < rows; i++) {
          const y = h * (i + .5) / rows;
          dxfLineLocal(out, page, "SYMBOL", element, -5, y, 0, y);
          dxfLineLocal(out, page, "SYMBOL", element, w, y, w + 5, y);
        }
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfGroundLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 14);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .42, h * .45, cx + w * .42, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .28, h * .68, cx + w * .28, h * .68);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .14, h * .88, cx + w * .14, h * .88);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, h + 4, 2.3, element.label);
      }

      function dxfMotorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        const r = Number(element.r || Math.min(w, h) * .35);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfTextLocal(out, page, "TEXT", element, cx - 1.5, cy + .8, 3.4, "M");
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfResistorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 6);
        const lead = Math.min(4, Math.max(3, w * .22));
        const bodyW = Math.max(6, w - lead * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfRectLocal(out, page, "SYMBOL", element, lead, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, lead + bodyW, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfCapacitorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const leftPlate = w / 2 - 1.2;
        const rightPlate = w / 2 + 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, leftPlate, cy);
        dxfLineLocal(out, page, "SYMBOL", element, rightPlate, cy, w, cy);
        dxfLineLocal(out, page, "SYMBOL", element, leftPlate, 1, leftPlate, h - 1);
        dxfLineLocal(out, page, "SYMBOL", element, rightPlate, 1, rightPlate, h - 1);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfDiodeLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 10);
        const lead = Math.min(4, Math.max(3, w * .2));
        const barX = w - lead - 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, 1.2, barX, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, lead, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, h - 1.2, lead, 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, 1.2, barX, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfThermalRelayLocal(out, page, element) {
        dxfContactLocal(out, page, element, false);
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const y = h + 1.1;
        dxfLineLocal(out, page, "SYMBOL", element, w * .25, y, w * .38, y - 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .38, y - 1.7, w * .5, y + 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .5, y + 1.7, w * .63, y - 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .63, y - 1.7, w * .88, y);
      }

      function dxfFanLocal(out, page, element) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        const r = Number(element.r || Math.min(w, h) * .38);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .25, cy - r * .55, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .36, cy + r * .45, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx - r * .55, cy + r * .1, r * .36, r * .16);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfTransformerLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const leftX = Math.max(5, w * .3);
        const rightX = Math.min(w - 5, w * .7);
        const coreA = w / 2 - 1.2;
        const coreB = w / 2 + 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, leftX - 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, rightX + 4, cy, w, cy);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, leftX - 2.7, cy, 3.2, h / 2 - 2);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, rightX + 2.7, cy, 3.2, h / 2 - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreA, 2, coreA, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreB, 2, coreB, h - 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfVisibleAttributes(out, page, element) {
        if (!supportsElectricalAttributes(element)) return;
        const lines = visibleAttributeLines(element);
        if (!lines.length) return;
        const defaults = attributeDisplayDefaults(element);
        lines.forEach((line, index) => {
          dxfTextLocal(out, page, "ATTR", element, defaults.x, defaults.y + index * defaults.fontSize * 1.35, defaults.fontSize, line);
        });
      }

      function cadY(page, y) {
        return pageSize(page).h - y;
      }

      function dxfWireSegments(element) {
        const gaps = wireGapMarkers(element);
        if (!gaps.length) return wireSegments(element);
        return wireSegments(element).flatMap(segment => splitSegmentForDxfGaps(segment, gaps));
      }

      function splitSegmentForDxfGaps(segment, gaps) {
        const vertical = Math.abs(segment[0] - segment[2]) < .001;
        const fixed = vertical ? segment[0] : segment[1];
        const start = vertical ? segment[1] : segment[0];
        const end = vertical ? segment[3] : segment[2];
        const min = Math.min(start, end);
        const max = Math.max(start, end);
        const gapHalf = 3.2;
        const intervals = gaps
          .filter(gap => pointOnSegment(gap.x, gap.y, segment))
          .map(gap => {
            const center = vertical ? gap.y : gap.x;
            return { start: Math.max(min, center - gapHalf), end: Math.min(max, center + gapHalf) };
          })
          .filter(interval => interval.end > interval.start)
          .sort((a, b) => a.start - b.start);
        if (!intervals.length) return [segment];
        const merged = [];
        intervals.forEach(interval => {
          const last = merged[merged.length - 1];
          if (last && interval.start <= last.end) {
            last.end = Math.max(last.end, interval.end);
          } else {
            merged.push({ ...interval });
          }
        });
        const pieces = [];
        let cursor = min;
        merged.forEach(interval => {
          if (interval.start - cursor > .05) pieces.push([cursor, interval.start]);
          cursor = Math.max(cursor, interval.end);
        });
        if (max - cursor > .05) pieces.push([cursor, max]);
        return pieces.map(([a, b]) => vertical ? [fixed, a, fixed, b] : [a, fixed, b, fixed]);
      }

      function dxfLine(out, page, layer, x1, y1, x2, y2, ltype) {
        out.push("0", "LINE", "8", layer);
        if (ltype) out.push("6", ltype);
        out.push("10", round(x1), "20", round(cadY(page, y1)), "11", round(x2), "21", round(cadY(page, y2)));
      }

      function dxfText(out, page, layer, x, y, size, text) {
        String(text || "").split("\n").forEach((line, index) => {
          out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y + index * size * 1.25)), "40", round(size), "1", line);
        });
      }

      function dxfCircle(out, page, layer, x, y, r) {
        out.push("0", "CIRCLE", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(r));
      }

      function dxfRect(out, page, layer, x, y, w, h) {
        dxfLine(out, page, layer, x, y, x + w, y);
        dxfLine(out, page, layer, x + w, y, x + w, y + h);
        dxfLine(out, page, layer, x + w, y + h, x, y + h);
        dxfLine(out, page, layer, x, y + h, x, y);
      }

      function localPoint(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return [
          Number(element.x || 0) + x * cos - y * sin,
          Number(element.y || 0) + x * sin + y * cos
        ];
      }

      function dxfLineLocal(out, page, layer, element, x1, y1, x2, y2, ltype) {
        const a = localPoint(element, x1, y1);
        const b = localPoint(element, x2, y2);
        dxfLine(out, page, layer, a[0], a[1], b[0], b[1], ltype);
      }

      function dxfTextLocal(out, page, layer, element, x, y, size, text) {
        const p = localPoint(element, x, y);
        dxfText(out, page, layer, p[0], p[1], size, text);
      }

      function dxfCircleLocal(out, page, layer, element, x, y, r) {
        const p = localPoint(element, x, y);
        dxfCircle(out, page, layer, p[0], p[1], r);
      }

      function dxfRectLocal(out, page, layer, element, x, y, w, h, ltype) {
        dxfLineLocal(out, page, layer, element, x, y, x + w, y, ltype);
        dxfLineLocal(out, page, layer, element, x + w, y, x + w, y + h, ltype);
        dxfLineLocal(out, page, layer, element, x + w, y + h, x, y + h, ltype);
        dxfLineLocal(out, page, layer, element, x, y + h, x, y, ltype);
      }

      function dxfTerminalNodeLocal(out, page, layer, element, cx, cy, r, shape) {
        if (shape === "square") {
          dxfRectLocal(out, page, layer, element, cx - r, cy - r, r * 2, r * 2);
          return;
        }
        dxfCircleLocal(out, page, layer, element, cx, cy, r);
      }

      function dxfEllipseApproxLocal(out, page, layer, element, cx, cy, rx, ry) {
        const steps = 32;
        let prev = null;
        for (let i = 0; i <= steps; i++) {
          const angle = Math.PI * 2 * i / steps;
          const point = [cx + Math.cos(angle) * rx, cy + Math.sin(angle) * ry];
          if (prev) dxfLineLocal(out, page, layer, element, prev[0], prev[1], point[0], point[1]);
          prev = point;
        }
      }

        const svg = qs("#canvas");

        });

        svg.addEventListener("pointermove", onCanvasPointerMove);
        svg.addEventListener("pointerup", onCanvasPointerUp);
        svg.addEventListener("pointercancel", onCanvasPointerUp);
