<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electrical Drawing Studio</title>
  <style>
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-2: #f7f9fb;
      --line: #d6dde5;
      --line-dark: #aab5c1;
      --text: #17202a;
      --muted: #667483;
      --accent: #0f6f63;
      --accent-2: #d96332;
      --danger: #b42318;
      --shadow: 0 14px 36px rgba(20, 31, 44, .16);
      --mono: "Consolas", "Yu Gothic UI", monospace;
      --ui: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: var(--ui);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 9px;
      cursor: pointer;
      min-height: 32px;
    }

    button:hover { border-color: var(--line-dark); background: #f9fbfc; }
    button:active { transform: translateY(1px); }

    button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
      font-family: var(--mono);
    }

    button.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      min-height: 32px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 9px 0 4px;
    }

    details.attr-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 8px;
    }

    details.attr-panel summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      list-style-position: inside;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 48px 40px minmax(0, 1fr);
    }

    .topbar,
    .tabbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 210px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      position: relative;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--accent);
    }

    .brand-mark::before { width: 12px; height: 2px; left: 4px; top: 10px; }
    .brand-mark::after { width: 2px; height: 12px; left: 10px; top: 4px; }

    .top-actions,
    .tool-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .spacer { flex: 1; }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38vw;
    }

    .tabbar {
      padding: 5px 10px;
      overflow-x: auto;
      gap: 6px;
    }

    .page-tab {
      min-width: 92px;
      max-width: 190px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .page-tab.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 304px;
    }

    .palette,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 12px;
    }

    .inspector {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #334150;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 6px 0 10px;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .palette-item {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      grid-template-rows: 30px auto;
      align-items: center;
      justify-items: center;
      padding: 7px 6px;
      cursor: grab;
      user-select: none;
    }

    .palette-item:hover,
    .palette-item.active {
      border-color: var(--accent);
      background: #f1fbf8;
    }

    .palette-icon {
      width: 50px;
      height: 28px;
      color: #14202c;
    }

    .palette-label {
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .section {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 12px;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      position: relative;
      background:
        linear-gradient(90deg, rgba(40, 54, 70, .06) 1px, transparent 1px),
        linear-gradient(rgba(40, 54, 70, .06) 1px, transparent 1px),
        var(--bg);
      background-size: 20px 20px;
    }

    .stage {
      min-width: max-content;
      min-height: max-content;
      padding: 34px;
      display: grid;
      place-items: start center;
    }

    .drawing-page {
      background: #fff;
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
      overflow: visible;
    }

    .svg-text {
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      fill: #101820;
    }

    .frame-line { stroke: #141a20; stroke-width: .25; fill: none; vector-effect: non-scaling-stroke; }
    .frame-thick { stroke: #141a20; stroke-width: .45; fill: none; vector-effect: non-scaling-stroke; }
    .frame-light { stroke: #5e6872; stroke-width: .18; fill: none; vector-effect: non-scaling-stroke; }
    .wire-line { stroke: #111820; stroke-width: .38; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; }
    .dash-line { stroke-dasharray: 3 2; }
    .symbol-fill { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }
    .symbol-line { stroke: #111820; stroke-width: .32; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; stroke-linejoin: round; }
    .terminal-dot { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }

    .element:hover .symbol-line,
    .element:hover .wire-line,
    .element:hover .symbol-fill {
      stroke: var(--accent-2);
    }

    .selection-box {
      fill: none;
      stroke: var(--accent);
      stroke-width: .5;
      stroke-dasharray: 2 1.2;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle {
      fill: #fff;
      stroke: var(--accent);
      stroke-width: .45;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle.resize-handle {
      pointer-events: all;
      cursor: nwse-resize;
    }

    .point-handle {
      fill: #fff;
      stroke: var(--accent-2);
      stroke-width: .55;
      vector-effect: non-scaling-stroke;
      pointer-events: all;
      cursor: crosshair;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .danger { color: var(--danger); }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(20, 31, 44, .42);
      z-index: 10;
    }

    .dialog-backdrop.hidden { display: none; }

    .dialog {
      width: min(760px, calc(100vw - 48px));
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .dialog-title {
      font-weight: 700;
      font-size: 16px;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .report-table th,
    .report-table td {
      border: 1px solid var(--line);
      padding: 6px 7px;
      text-align: left;
      vertical-align: top;
    }

    .report-table th {
      background: var(--panel-2);
      color: #334150;
      font-weight: 700;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 7px;
    }

    .swatch {
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      cursor: pointer;
    }

    .swatch.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .print-sheets { display: none; }

    #fileInput,
    #terminalCsvInput,
    #plcCsvInput,
    #underlayInput,
    #underlayTwoUpInput,
    #dxfImportInput,
    #packImportInput { display: none; }

    @media print {
      @page { margin: 0; }
      @page a4p { size: 210mm 297mm; margin: 0; }
      @page a4l { size: 297mm 210mm; margin: 0; }
      @page a3p { size: 297mm 420mm; margin: 0; }
      @page a3l { size: 420mm 297mm; margin: 0; }

      html,
      body {
        width: auto;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .app { display: none; }
      .print-sheets { display: block; }

      .print-sheet {
        display: block;
        page-break-after: always;
        break-after: page;
        margin: 0;
      }

      .print-sheet.page-a4-portrait { page: a4p; }
      .print-sheet.page-a4-landscape { page: a4l; }
      .print-sheet.page-a3-portrait { page: a3p; }
      .print-sheet.page-a3-landscape { page: a3l; }

      .print-sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .print-sheet > svg {
        display: block;
        width: 100%;
        height: 100%;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Electrical Drawing Studio</span>
      </div>
      <div class="top-actions">
        <button type="button" id="newProjectBtn" title="新規プロジェクト">新規</button>
        <button type="button" id="openBtn" title="JSONを開く">開く</button>
        <button type="button" id="restoreBackupBtn" title="ブラウザ内の自動保存を復元">復元</button>
        <button type="button" id="saveBtn" class="primary" title="JSONで保存">保存</button>
        <button type="button" id="searchBtn" title="線番・タグ・文字を検索">検索</button>
        <button type="button" id="titleBatchBtn" title="全ページの表題欄を一括更新">表題欄</button>
        <button type="button" id="printBtn" title="全ページをPDF印刷">PDF印刷</button>
        <button type="button" id="printTwoUpBtn" title="A3縦に2ページずつ面付けして印刷">A3面付</button>
        <button type="button" id="exportSvgBtn" title="現在ページをSVG出力">SVG</button>
        <button type="button" id="exportPngBtn" title="現在ページをPNG出力">PNG</button>
      </div>
      <div class="spacer"></div>
      <div class="tool-actions" role="toolbar" aria-label="作図ツール">
        <button type="button" class="icon active" data-tool="select" title="選択/移動">S</button>
        <button type="button" class="icon" data-tool="wire" title="直交配線">W</button>
        <button type="button" class="icon" data-tool="text" title="文字">T</button>
        <button type="button" class="icon" id="undoBtn" title="元に戻す">U</button>
        <button type="button" class="icon" id="redoBtn" title="やり直し">R</button>
        <button type="button" class="icon" id="deleteBtn" title="削除">X</button>
      </div>
      <div class="status" id="status">A4縦の図枠付きページを作成しました。</div>
    </header>

    <nav class="tabbar" id="tabbar" aria-label="ページタブ"></nav>

    <main class="shell">
      <aside class="palette">
        <div class="panel-title">部品パレット</div>
        <button type="button" id="selectOnlyBtn" data-tool="select" style="width:100%;margin-bottom:8px">選択</button>
        <input id="paletteFilter" type="search" placeholder="部品検索" aria-label="部品検索">
        <div class="palette-grid" id="paletteGrid"></div>

        <div class="section">
          <div class="panel-title">表示</div>
          <label for="zoomRange">ズーム</label>
          <input id="zoomRange" type="range" min="0.8" max="8" step=".1" value="3.2">
          <div class="row-3" style="margin-top:8px">
            <button type="button" id="zoomOutBtn">縮小</button>
            <button type="button" id="zoomInBtn">拡大</button>
            <button type="button" id="actualSizeBtn">標準</button>
          </div>
          <button type="button" id="fitPageBtn" style="width:100%;margin-top:8px">全体表示</button>
          <div class="row">
            <div>
              <label for="gridSize">グリッド mm</label>
              <input id="gridSize" type="number" min="1" step="0.5" value="2.5">
            </div>
            <div>
              <label for="snapToggle">スナップ</label>
              <select id="snapToggle">
                <option value="on">ON</option>
                <option value="off">OFF</option>
              </select>
            </div>
          </div>
          <label for="objectSnapToggle">端点スナップ</label>
          <select id="objectSnapToggle">
            <option value="on">ON</option>
            <option value="off">OFF</option>
          </select>
          <label for="underlayOutputToggle">下絵をPDF/SVG/PNGに含める</label>
          <select id="underlayOutputToggle">
            <option value="off">OFF</option>
            <option value="on">ON</option>
          </select>
          <p class="muted">左の部品をドラッグして用紙に配置します。配線は W ツールでドラッグ、部品は選択後に移動できます。</p>
        </div>

        <div class="section">
          <div class="panel-title">配線・レイヤ</div>
          <label for="currentWireType">配線種別</label>
          <select id="currentWireType"></select>
          <label for="currentLayer">作図レイヤ</label>
          <select id="currentLayer"></select>
        </div>

        <div class="section">
          <div class="panel-title">自動処理・ツール</div>
          <label for="wireNumberFormat">線番書式</label>
          <input id="wireNumberFormat" type="text" value="%S-%N">
          <label for="componentTagFormat">部品タグ書式</label>
          <input id="componentTagFormat" type="text" value="%F%N">
          <div class="row" style="margin-top:8px">
            <button type="button" id="autoWireBtn">線番採番</button>
            <button type="button" id="auditBtn">監査</button>
          </div>
          <label for="actionMenu">機能メニュー</label>
          <select id="actionMenu">
            <option value="">選択してください…</option>
            <optgroup label="自動処理">
              <option value="terminalNo">端子番号の振り直し</option>
              <option value="tagComponents">部品タグ採番</option>
              <option value="autoJunction">接続点生成</option>
              <option value="wireSequence">配線順序(FROM/TO)</option>
              <option value="addRung">ラング追加</option>
            </optgroup>
            <optgroup label="一括生成">
              <option value="rungCircuit">ラング回路（接点+コイル/ランプ）</option>
              <option value="wireColumn">縦配線列</option>
              <option value="wireRow">横配線行</option>
              <option value="twistedPair">ツイストペア</option>
              <option value="motorCircuit">モータ分岐回路</option>
              <option value="plcUnit">PLCユニット</option>
              <option value="panelLink">盤レイアウト連携</option>
            </optgroup>
            <optgroup label="一覧・管理">
              <option value="terminalEditor">端子台エディタ</option>
              <option value="tagRules">部品タグ規則</option>
              <option value="wireTypeManager">配線種別管理</option>
              <option value="layerManager">レイヤ管理</option>
              <option value="catalog">部品カタログ</option>
              <option value="symbolManager">ユーザー部品管理</option>
            </optgroup>
            <optgroup label="帳票・確認">
              <option value="crossRef">クロスリファレンス</option>
              <option value="reportCsv">帳票CSV出力</option>
              <option value="reportTable">図面要素一覧</option>
              <option value="insertReport">帳票表挿入</option>
              <option value="bom">部品集計表(BOM)</option>
              <option value="terminalPlan">端子台プラン表</option>
            </optgroup>
            <optgroup label="取込・出力">
              <option value="terminalCsv">端子CSV取込</option>
              <option value="plcCsv">PLC CSV取込</option>
              <option value="importDxf">DXF取込</option>
              <option value="exportDxf">DXF出力</option>
              <option value="exportPack">標準パック出力</option>
              <option value="importPack">標準パック取込</option>
            </optgroup>
          </select>
        </div>
      </aside>

      <section class="workspace" id="workspace">
        <div class="stage">
          <svg id="canvas" class="drawing-page" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="図面キャンバス"></svg>
        </div>
      </section>

      <aside class="inspector">
        <div class="panel-title">ページ設定</div>
        <label for="drawingStandard">標準</label>
        <select id="drawingStandard"></select>
        <label for="pageName">ページ名</label>
        <input id="pageName" type="text">
        <div class="row">
          <div>
            <label for="paperSize">用紙</label>
            <select id="paperSize">
              <option value="A4">A4</option>
              <option value="A3">A3</option>
            </select>
          </div>
          <div>
            <label for="paperOrientation">向き</label>
            <select id="paperOrientation">
              <option value="portrait">縦</option>
              <option value="landscape">横</option>
            </select>
          </div>
        </div>
        <label for="frameVariant">図枠/表題欄</label>
        <select id="frameVariant">
          <option value="compact">基本: 右下表題欄</option>
          <option value="detailed">詳細: 右下+改訂欄</option>
          <option value="side">側面表題欄</option>
          <option value="index">目次/表紙: 大型表欄</option>
          <option value="ladder">設備標準: 行番号+機器符号表</option>
          <option value="blank">枠線のみ</option>
        </select>

        <div class="row">
          <div>
            <label for="drawingNo">図番</label>
            <input id="drawingNo" type="text">
          </div>
          <div>
            <label for="revision">改訂</label>
            <input id="revision" type="text">
          </div>
        </div>
        <label for="drawingTitle">図名</label>
        <input id="drawingTitle" type="text">
        <div class="row">
          <div>
            <label for="designer">作成</label>
            <input id="designer" type="text">
          </div>
          <div>
            <label for="drawDate">日付</label>
            <input id="drawDate" type="text">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="pageInstallation">設備コード</label>
            <input id="pageInstallation" type="text">
          </div>
          <div>
            <label for="pageLocation">場所コード</label>
            <input id="pageLocation" type="text">
          </div>
        </div>
        <label for="pageSideNote">側注記（左余白の縦書き）</label>
        <input id="pageSideNote" type="text" placeholder="設備名など">

        <div class="section">
          <div class="inline">
            <button type="button" id="addPageBtn">ページ追加</button>
            <button type="button" id="duplicatePageBtn">複製</button>
            <button type="button" id="deletePageBtn">削除</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="movePagePrevBtn">前へ</button>
            <button type="button" id="movePageNextBtn">後へ</button>
          </div>
          <label for="templateMenu">テンプレートからページ追加</label>
          <select id="templateMenu">
            <option value="">選択してください…</option>
            <option value="facilityLadder">設備ラダー</option>
            <option value="plcInput">PLC入力回路</option>
            <option value="terminalSheet">端子接続図</option>
            <option value="interlock">インターロック接続</option>
            <option value="ladder">ラダー（汎用）</option>
            <option value="index">目次</option>
            <option value="layout">機器配置</option>
          </select>

      function uid(prefix = "id") {
        return prefix + "-" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function currentPage() {
        return state.pages.find(page => page.id === state.activePageId) || state.pages[0];
      }

      function pageSize(page) {
        const paper = PAPER[page.size] || PAPER.A4;
        const pair = paper[page.orientation] || paper.portrait;
        return { w: pair[0], h: pair[1] };
      }

      function createPage(options = {}) {
        const id = uid("page");
        const index = pageCounter++;
        return {
          id,
          name: options.name || "P" + index,
          size: options.size || "A4",
          orientation: options.orientation || "portrait",
          frameVariant: options.frameVariant || "detailed",
          title: {
            drawingNo: options.drawingNo || "",
            title: options.title || "電気図面",
            revision: options.revision || "",
            designer: options.designer || "",
            date: options.date || today,
            facility: options.facility || "",
            installation: options.installation || "",
            location: options.location || "",
            page: String(index),
            total: "1"
          },
          elements: options.elements ? deepClone(options.elements) : []
        };
      }

      function ensureProjectDefaults() {
        state.settings = state.settings || {};
        if (!state.settings.componentTagFormat) state.settings.componentTagFormat = "%F%N";
        if (!state.settings.componentTagPrefixes || typeof state.settings.componentTagPrefixes !== "object") state.settings.componentTagPrefixes = {};
        if (typeof state.settings.outputUnderlays !== "boolean") state.settings.outputUnderlays = false;
        state.project = {
          title: "電気図面",
          drawingNo: "",
          revision: "",
          designer: "",
          date: today,
          facility: "",
          ...(state.project || {})
        };
        state.project.titleMap = { ...DEFAULT_TITLE_MAP, ...(state.project.titleMap || {}) };
        if (!Array.isArray(state.catalog)) state.catalog = [];
        if (!Array.isArray(state.standardPacks)) state.standardPacks = [];
        return state.project;
      }

      function initProject() {
        ensureProjectDefaults();
        state.pages = [createPage({ name: "P1", frameVariant: "detailed", title: "電気図面" })];
        state.activePageId = state.pages[0].id;
        setSelection([]);
        pageCounter = 2;
        syncPageTotals();
        resetHistory();
        render();
      }

      function syncPageTotals() {
        const total = String(state.pages.length);
        state.pages.forEach((page, index) => {
          page.title.page = String(index + 1);
          page.title.total = total;
        });
      }

      function resetHistory() {
        history = [];
        historyIndex = -1;
        commitHistory("初期化");
      }

      function commitHistory(reason = "") {
        syncPageTotals();
        const snapshot = JSON.stringify(state);
        if (history[historyIndex] === snapshot) return;
        history = history.slice(0, historyIndex + 1);
        history.push(snapshot);
        historyIndex = history.length - 1;
        try {
          localStorage.setItem("electricalDrawingStudio.backup", snapshot);
        } catch (_) {
          // Local backup can fail in restrictive browser modes.
        }
        setStatus(reason || "変更を記録しました。");
      }

      function restoreHistory(index) {
        if (index < 0 || index >= history.length) return;
        const restored = JSON.parse(history[index]);
        Object.assign(state, restored);
        ensureProjectDefaults();
        historyIndex = index;
        setSelection([]);
        render();
      }

      function setStatus(message) {
        qs("#status").textContent = message;
      }

      function svgEl(tag, attrs = {}, children = []) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([key, value]) => {
          if (value !== undefined && value !== null) el.setAttribute(key, String(value));
        });
        children.forEach(child => el.appendChild(child));
        return el;
      }

      function textEl(text, x, y, attrs = {}) {
        return svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": attrs.baseline || "middle",
          transform: attrs.transform || null
        }, [document.createTextNode(text || "")]);
      }

      function multilineText(parent, text, x, y, lineHeight, attrs = {}) {
        const lines = String(text || "").split("\n");
        const group = svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": "middle",
          transform: attrs.transform || null
        });
        lines.forEach((line, index) => {
          const tspan = svgEl("tspan", { x, dy: index === 0 ? 0 : lineHeight });
          tspan.textContent = line;
          group.appendChild(tspan);
        });
        parent.appendChild(group);
      }

      function renderPalette() {
        const grid = qs("#paletteGrid");
        grid.innerHTML = "";
        const filter = paletteFilterText.trim().toLowerCase();
        const items = [
          ...PALETTE,
          ...(state.customSymbols || []).map(symbol => ({
            type: "custom:" + symbol.id,
            label: symbol.label,
            icon: "box"
          }))
        ].filter(item => {
          if (!filter) return true;
          return String(item.label || "").toLowerCase().includes(filter)
            || String(item.type || "").toLowerCase().includes(filter);
        });
        if (!items.length) {
          grid.innerHTML = '<div class="muted" style="grid-column:1/-1">該当する部品がありません。</div>';
          return;
        }
        items.forEach(item => {
          const button = document.createElement("div");
          button.className = "palette-item" + (activeTool === item.type ? " active" : "");
          button.draggable = true;
          button.dataset.type = item.type;
          button.title = item.label + "を配置";
          button.innerHTML = iconSvg(item.icon) + '<div class="palette-label">' + item.label + "</div>";
          button.addEventListener("dragstart", event => {
            event.dataTransfer.setData("text/plain", item.type);
            event.dataTransfer.effectAllowed = "copy";
          });
          button.addEventListener("click", () => {
            setActiveTool(item.type);
          });
          grid.appendChild(button);
        });
      }

      }

      function renderTabs() {
        const tabbar = qs("#tabbar");
        tabbar.innerHTML = "";
        state.pages.forEach((page, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "page-tab" + (page.id === state.activePageId ? " active" : "");
          tab.textContent = page.name || "P" + (index + 1);
          tab.title = "ページ " + (index + 1);
          tab.addEventListener("click", () => {
            state.activePageId = page.id;
            setSelection([]);
            render();
          });
          tabbar.appendChild(tab);
        });
        const add = document.createElement("button");
        add.type = "button";
        add.className = "page-tab";
        add.textContent = "+ ページ";
        add.addEventListener("click", addPage);
        tabbar.appendChild(add);
      }

      function render() {
        crossRefCache = null;
        renderPalette();
        renderTabs();
        const page = currentPage();
        if (!page) return;
        const svg = qs("#canvas");
        drawPageSvg(svg, page, { selection: true, scaled: true, grid: true });
        syncInspector();
        syncPrintSheets();
      }

      function drawPageSvg(svg, page, options = {}) {
        const size = pageSize(page);
        const scaled = options.scaled !== false;
        svg.innerHTML = "";
        svg.setAttribute("viewBox", "0 0 " + size.w + " " + size.h);
        svg.setAttribute("width", size.w + "mm");
        svg.setAttribute("height", size.h + "mm");
        svg.style.width = scaled ? (size.w * state.settings.zoom) + "px" : "100%";
        svg.style.height = scaled ? (size.h * state.settings.zoom) + "px" : "100%";

        const includeUnderlays = options.output === true ? state.settings.outputUnderlays === true : true;
        const visibleElements = page.elements.filter(element => isElementVisible(element) && (includeUnderlays || element.type !== "underlayImage"));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "#fff" }));
        visibleElements.filter(element => element.type === "underlayImage").forEach(element => drawElement(svg, element));
        if (options.grid !== false) drawGrid(svg, size);
        if (isLayerVisible("frame")) drawFrame(svg, page, size);
        visibleElements.filter(element => element.type !== "underlayImage").forEach(element => drawElement(svg, element));
        if (options.selection) {
          drawSelection(svg);
          drawMarquee(svg);
        }
      }

      function layerFor(id) {
        return (state.layers || []).find(layer => layer.id === id) || null;
      }

      function isLayerVisible(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.visible !== false : true;
      }

      function isLayerLocked(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.locked === true : false;
      }

      function isElementVisible(element) {
        return isLayerVisible(element.layer || inferredLayerFor(element.type));
      }

      function isElementLocked(element) {
        return Boolean(element.locked || isLayerLocked(element.layer || inferredLayerFor(element.type)));
      }

      function drawGrid(svg, size) {
        const step = state.settings.grid || 2.5;
        const defs = svgEl("defs");
        const pattern = svgEl("pattern", {
          id: "gridPattern",
          width: step,
          height: step,
          patternUnits: "userSpaceOnUse"
        });
        pattern.appendChild(svgEl("path", {
          d: "M " + step + " 0 L 0 0 0 " + step,
          fill: "none",
          stroke: "#e4e9ee",
          "stroke-width": .13
        }));
        defs.appendChild(pattern);
        const major = svgEl("pattern", {
          id: "majorGridPattern",
          width: MAJOR_GRID_MM,
          height: MAJOR_GRID_MM,
          patternUnits: "userSpaceOnUse"
        });
        major.appendChild(svgEl("path", {
          d: "M " + MAJOR_GRID_MM + " 0 L 0 0 0 " + MAJOR_GRID_MM,
          fill: "none",
          stroke: "#cfd8e3",
          "stroke-width": .18
        }));
        defs.appendChild(major);
        svg.appendChild(defs);
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#gridPattern)", opacity: .62 }));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#majorGridPattern)", opacity: .48 }));
      }

      function drawFrame(svg, page, size) {
        const margin = frameMargin(size);
        const frame = svgEl("g", { class: "frame" });
        if (page.frameVariant === "ladder") {
          drawLadderFrame(frame, page, size);
          svg.appendChild(frame);
          return;
        }
        frame.appendChild(svgEl("rect", { x: margin, y: margin, width: size.w - margin * 2, height: size.h - margin * 2, class: "frame-thick" }));
        frame.appendChild(svgEl("rect", { x: margin + 4, y: margin + 4, width: size.w - (margin + 4) * 2, height: size.h - (margin + 4) * 2, class: "frame-line" }));
        drawCoordinateNumbers(frame, size, margin);
        if (page.frameVariant === "compact") drawCompactTitle(frame, page, size, margin);
        if (page.frameVariant === "detailed") drawDetailedTitle(frame, page, size, margin);
        if (page.frameVariant === "side") drawSideTitle(frame, page, size, margin);
        if (page.frameVariant === "index") drawIndexFrame(frame, page, size, margin);
        svg.appendChild(frame);
      }

      function frameMargin(size) {
        return Math.min(size.w, size.h) >= 297 ? 10 : 8;
      }

      function drawCoordinateNumbers(frame, size, margin) {
        const left = margin + 5;
        const bottom = size.h - margin - 5;
        const top = margin + 5;
        const usableW = size.w - margin * 2 - 10;
        const usableH = size.h - margin * 2 - 10;
        const count = 20;
        for (let i = 0; i <= count; i++) {
          const x = left + usableW * i / count;
          frame.appendChild(svgEl("line", { x1: x, y1: bottom - 1.7, x2: x, y2: bottom + 1.7, class: "frame-light" }));
          frame.appendChild(textEl(String(i).padStart(2, "0"), x, bottom + 4.2, { fontSize: 2, anchor: "middle" }));
        }
        for (let i = 0; i <= count; i++) {
          const y = bottom - usableH * i / count;
          frame.appendChild(svgEl("line", { x1: left - 1.7, y1: y, x2: left + 1.7, y2: y, class: "frame-light" }));
          frame.appendChild(textEl(String(i).padStart(2, "0"), left - 4.2, y, { fontSize: 2, anchor: "middle", transform: "rotate(-90 " + (left - 4.2) + " " + y + ")" }));
        }
      }

      function drawDetailedTitle(frame, page, size, margin) {

      }

      function drawSideTitle(frame, page, size, margin) {
        const w = Math.min(44, Math.max(34, size.w * .15));

        const y = margin + 4;

        drawCols(frame, x, y + h - 88, w, 88, [12, 18, w - 30]);

      function drawIndexFrame(frame, page, size, margin) {
        drawCompactTitle(frame, page, size, margin);
        const x = margin + 18;
        const y = margin + 22;
        const w = Math.min(size.w - margin * 2 - 36, 150);

        for (let i = 1; i < rows; i++) {
          frame.appendChild(svgEl("line", { x1: x, y1: y + h * i / rows, x2: x + w, y2: y + h * i / rows, class: "frame-light" }));
        }
        [18, 48, 118].forEach(dx => frame.appendChild(svgEl("line", { x1: x + dx, y1: y, x2: x + dx, y2: y + h, class: "frame-light" })));

      // ===== 設備標準図枠(行番号+機器符号表+表題欄) =====
      function drawLadderFrame(frame, page, size) {
        const L = 19, R = size.w - 19, T = 18, B = size.h - 24;

          frame.appendChild(textEl(String(i).padStart(2, "0"), 25.5, 27 + 9.5 * i, { fontSize: 3, anchor: "middle" }));
        }
        frame.appendChild(textEl(page.name || "", (L + R) / 2, 22.5, { fontSize: 3.5, anchor: "middle" }));
        const tblTop = B - 49;
        const xrefR = 105.8;
        frame.appendChild(svgEl("rect", { x: L, y: tblTop, width: xrefR - L, height: B - tblTop, class: "frame-line" }));
        for (let i = 1; i < 13; i++) {
          const x = L + (xrefR - L) * i / 13;
          frame.appendChild(svgEl("line", { x1: x, y1: tblTop, x2: x, y2: B, class: "frame-light" }));
        }
        [tblTop + 5, B - 11, B - 5.5].forEach(y => frame.appendChild(svgEl("line", { x1: L, y1: y, x2: xrefR, y2: y, class: "frame-light" })));
        const devTop = tblTop;
        const devBottom = tblTop + 28.5;
        frame.appendChild(svgEl("rect", { x: xrefR, y: devTop, width: R - xrefR, height: devBottom - devTop, class: "frame-line" }));
        const gw = (R - xrefR) / 2;
        [0, 1].forEach(gi => {
          const gx = xrefR + gi * gw;
          frame.appendChild(svgEl("line", { x1: gx + 11, y1: devTop, x2: gx + 11, y2: devBottom, class: "frame-light" }));
          frame.appendChild(svgEl("line", { x1: gx + gw - 4.5, y1: devTop, x2: gx + gw - 4.5, y2: devBottom, class: "frame-light" }));

          frame.appendChild(textEl("頁", gx + gw - 2.25, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
        });
        frame.appendChild(svgEl("line", { x1: xrefR + gw, y1: devTop, x2: xrefR + gw, y2: devBottom, class: "frame-line" }));
        for (let i = 1; i <= 10; i++) {

        }
        const t1 = devBottom;
        const t2 = t1 + 6;
        const t3 = t2 + 8;
        const t4 = B;
        frame.appendChild(svgEl("rect", { x: xrefR, y: t1, width: R - xrefR, height: t4 - t1, class: "frame-thick" }));
        frame.appendChild(svgEl("line", { x1: xrefR, y1: t2, x2: R, y2: t2, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: xrefR, y1: t3, x2: R, y2: t3, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: 137, y1: t1, x2: 137, y2: t2, class: "frame-line" }));
        frame.appendChild(textEl("客先機番", xrefR + 1.2, t1 + 1.8, { fontSize: 1.7 }));
        frame.appendChild(textEl(page.title.installation || "", (xrefR + 137) / 2, (t1 + t2) / 2 + 1, { fontSize: 2.4, anchor: "middle" }));
        frame.appendChild(textEl("装置区分", 138.2, t1 + 1.8, { fontSize: 1.7 }));
        frame.appendChild(textEl(page.title.facility || "", (137 + R) / 2, (t1 + t2) / 2 + 1, { fontSize: 2.4, anchor: "middle" }));
        frame.appendChild(svgEl("line", { x1: 110, y1: t2, x2: 110, y2: t4, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: 177, y1: t2, x2: 177, y2: t3, class: "frame-line" }));
        frame.appendChild(textEl("内", 107.9, t2 + 2.6, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl("容", 107.9, t2 + 5.4, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl(page.title.title || "", (110 + 177) / 2, (t2 + t3) / 2, { fontSize: 3.2, anchor: "middle" }));
        frame.appendChild(textEl("頁", 184, t2 + 1.8, { fontSize: 1.7, anchor: "middle" }));
        frame.appendChild(textEl(page.title.page || "", 184, t3 - 2.4, { fontSize: 3.5, anchor: "middle" }));
        frame.appendChild(textEl("図", 107.9, t3 + 2.2, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl("番", 107.9, t3 + 4.8, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl(page.title.drawingNo || "−", (110 + R) / 2, (t3 + t4) / 2, { fontSize: 2.6, anchor: "middle" }));
        frame.appendChild(textEl("汎用図番:", L, size.h - 20, { fontSize: 1.9 }));
        frame.appendChild(textEl("図番:", 55, size.h - 20, { fontSize: 1.9 }));
        frame.appendChild(textEl("出力日: " + (page.title.date || ""), 95, size.h - 20, { fontSize: 1.9 }));
        frame.appendChild(textEl("更新日: " + (state.project.date || ""), 125, size.h - 20, { fontSize: 1.9 }));
        if (state.project.designer) frame.appendChild(textEl(state.project.designer, R, size.h - 20, { fontSize: 2.1, anchor: "end" }));
        if (page.title.sideNote) {
          frame.appendChild(textEl(page.title.sideNote, 16.5, size.h / 2, {
            fontSize: 2.2,
            anchor: "middle",
            transform: "rotate(-90 16.5 " + (size.h / 2) + ")"
          }));
        }
        fillLadderXrefTable(frame, page, size);
        fillLadderDeviceTable(frame, page, size);
      }

      function pageCoilXrefColumns(page) {
        const data = crossRefData();
        const cols = [];
        page.elements.forEach(element => {
          if (!coilTypes().has(element.type)) return;
          const tag = componentTag(element);
          if (!tag) return;
          cols.push({ tag, refs: data.contacts.get(tag) || [] });
        });
        return cols.slice(0, 13);
      }

      function fillLadderXrefTable(frame, page, size) {
        const L = 19;
        const xrefR = 105.8;
        const B = size.h - 24;
        const tblTop = B - 49;
        const colW = (xrefR - L) / 13;
        pageCoilXrefColumns(page).forEach((col, i) => {
          const x = L + colW * i;
          frame.appendChild(textEl(col.tag, x + 0.6, tblTop + 2.5, { fontSize: 1.8 }));
          col.refs.slice(0, 12).forEach((ref, j) => {
            const y = tblTop + 7.5 + j * 2.6;
            frame.appendChild(textEl(ref.address, x + colW - 0.8, y, { fontSize: 1.7, anchor: "end" }));
            if (ref.closed) {
              const w = String(ref.address).length * 1.06;
              frame.appendChild(svgEl("line", { x1: x + colW - 0.8 - w, y1: y + 1.1, x2: x + colW - 0.8, y2: y + 1.1, class: "frame-light" }));
            }
          });
        });
      }

      function pageDeviceTableRows(page) {
        const data = crossRefData();
        const seen = new Set();
        const rows = [];
        page.elements.forEach(element => {
          const tag = componentTag(element);
          if (!tag || seen.has(tag)) return;
          if (!coilTypes().has(element.type) && !contactChildTypes().has(element.type)) return;
          seen.add(tag);
          const coil = data.coils.get(tag);
          rows.push({
            tag,
            desc: String(element.description || coil?.element.description || "").split(/\r?\n/)[0],
            page: coil && coil.page.id !== page.id ? String(pageSheetNumber(coil.page)) : ""
          });
        });
        return rows.slice(0, 20);
      }

      function fillLadderDeviceTable(frame, page, size) {
        const xrefR = 105.8;
        const R = size.w - 19;
        const B = size.h - 24;
        const devTop = B - 49;
        const gw = (R - xrefR) / 2;
        const rowH = (28.5 - 2.6) / 10;
        pageDeviceTableRows(page).forEach((row, index) => {
          const gi = Math.floor(index / 10);
          const gx = xrefR + gi * gw;
          const y = devTop + 2.6 + (index % 10) * rowH + rowH * 0.7;
          frame.appendChild(textEl(row.tag, gx + 0.6, y, { fontSize: 1.7 }));
          if (row.desc) frame.appendChild(textEl(row.desc, gx + 11.6, y, { fontSize: 1.7 }));
          if (row.page) frame.appendChild(textEl(row.page, gx + gw - 2.25, y, { fontSize: 1.7, anchor: "middle" }));
        });
      }

      function drawRows(parent, x, y, w, h, rowHeights) {
        let yy = y;
        rowHeights.slice(0, -1).forEach(row => {
          yy += row;
          parent.appendChild(svgEl("line", { x1: x, y1: yy, x2: x + w, y2: yy, class: "frame-light" }));
        });
      }

      function drawCols(parent, x, y, w, h, colWidths) {
        let xx = x;
        colWidths.slice(0, -1).forEach(col => {
          xx += col;
          parent.appendChild(svgEl("line", { x1: xx, y1: y, x2: xx, y2: y + h, class: "frame-light" }));
        });
      }

      function drawElement(svg, element) {
        const g = svgEl("g", {
          class: "element",
          "data-id": element.id,
          "data-type": element.type,
          cursor: "move",
          "pointer-events": element.type === "underlayImage" && element.locked ? "none" : null
        });
        if (element.type !== "wire" && element.type !== "arrow") {
          g.setAttribute("transform", "translate(" + (element.x || 0) + " " + (element.y || 0) + ") rotate(" + (element.rotation || 0) + ")");
        }
        const stroke = element.type === "wire" ? wireStyle(element).color : (element.stroke || state.settings.stroke);
        if (drawGeoSymbol(g, element, stroke)) {
          drawVisibleAttributes(g, element);
          svg.appendChild(g);
          return;
        }
        if (element.type === "underlayImage") drawUnderlayImage(g, element);
        if (element.type === "text") drawText(g, element);
        if (element.type === "wire") drawWire(g, element, stroke);
        if (element.type === "line" || element.type === "mechanicalLink") drawLineElement(g, element, stroke);
        if (element.type === "rect") drawRectElement(g, element, stroke);
        if (element.type === "circle") drawCircleElement(g, element, stroke);
        if (element.type === "installationBox" || element.type === "locationBox") drawAreaBox(g, element, stroke);
        if (element.type === "terminal") drawTerminal(g, element, stroke);
        if (element.type === "terminalStrip") drawTerminalStrip(g, element, stroke);
        if (element.type === "contactNO") drawContact(g, element, false, stroke);
        if (element.type === "contactNC") drawContact(g, element, true, stroke);
        if (element.type === "contactBlock") drawContactBlock(g, element, stroke);
        if (element.type === "pushButton") drawPushButton(g, element, stroke);
        if (element.type === "selectorSwitch") drawSelectorSwitch(g, element, stroke);
        if (element.type === "limitSwitch") drawLimitSwitch(g, element, stroke);
        if (element.type === "coil") drawCoil(g, element, stroke);
        if (element.type === "fuse") drawFuse(g, element, stroke);
        if (element.type === "breaker") drawBreaker(g, element, stroke);
        if (element.type === "lamp") drawLamp(g, element, stroke);
        if (element.type === "buzzer") drawBuzzer(g, element, stroke);
        if (element.type === "solenoidValve") drawSolenoidValve(g, element, stroke);
        if (element.type === "sensor") drawSensor(g, element, stroke);
        if (element.type === "powerSupply") drawPowerSupply(g, element, stroke);
        if (element.type === "transformer") drawTransformer(g, element, stroke);
        if (element.type === "ground") drawGround(g, element, stroke);
        if (element.type === "motor") drawMotor(g, element, stroke);
        if (element.type === "fan") drawFan(g, element, stroke);
        if (element.type === "resistor") drawResistor(g, element, stroke);
        if (element.type === "capacitor") drawCapacitor(g, element, stroke);
        if (element.type === "diode") drawDiode(g, element, stroke);
        if (element.type === "thermalRelay") drawThermalRelay(g, element, stroke);
        if (element.type === "deviceBox") drawDeviceBox(g, element, stroke);
        if (element.type === "plcBlock") drawPlcBlock(g, element, stroke);
        if (element.type === "connector") drawConnector(g, element, stroke);
        if (element.type === "cableMarker") drawCableMarker(g, element, stroke);
        if (element.type === "cableBundle") drawCableBundle(g, element, stroke);
        if (element.type === "terminalBox") drawTerminalBox(g, element, stroke);
        if (element.type === "table") drawTable(g, element, stroke);
        if (element.type === "arrow") drawArrow(g, element, stroke);
        if (element.type === "junction") drawJunction(g, element, stroke);
        drawVisibleAttributes(g, element);
        svg.appendChild(g);
      }

      function drawVisibleAttributes(g, element) {
        if (!supportsElectricalAttributes(element)) return;
        const lines = visibleAttributeLines(element);
        if (!lines.length) return;
        const w = Number(element.w || defaultElement(element.type).w || 18);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        const fontSize = Number(element.attrFontSize || 2.2);
        const x = Number(element.attrX ?? (w + 3));
        const y = Number(element.attrY ?? (h + 3));
        lines.forEach((line, index) => {
          g.appendChild(textEl(line, x, y + index * fontSize * 1.35, { fontSize }));
        });
      }

      function visibleAttributeLines(element) {
        return ATTRIBUTE_DISPLAY_FIELDS
          .filter(field => element[field.prop])
          .map(field => {
            const value = electricalAttributeValue(element, field.key);
            return value ? field.prefix + ": " + value : "";
          })
          .filter(Boolean);
      }

      function electricalAttributeValue(element, key) {
        if (key === "tag") return componentTag(element);
        return element[key] || "";
      }

      function drawText(g, element) {
        multilineText(g, element.text || "文字", 0, 0, (element.fontSize || 3.5) * 1.25, {
          fontSize: element.fontSize || 3.5,
          anchor: element.align || "start"
        });
        if (element.underline) {
          const size = Number(element.fontSize || 3.5);
          String(element.text || "").split("\n").forEach((line, index) => {
            if (!line.trim()) return;
            const w = line.length * size * 0.62;
            const y = index * size * 1.25 + size * 0.72;
            const anchor = element.align || "start";
            const x0 = anchor === "middle" ? -w / 2 : (anchor === "end" ? -w : 0);
            g.appendChild(svgEl("line", { x1: x0, y1: y, x2: x0 + w, y2: y, class: "symbol-line", stroke: element.stroke || state.settings.stroke }));
          });
        }
      }

      function drawUnderlayImage(g, element) {
        const w = Number(element.w || 100);
        const h = Number(element.h || 70);
        if (element.imageData) {
          const crop = underlayCropRect(element.cropPreset);
          const attrs = {
            href: element.imageData,
            x: crop.x ? -crop.x * w / crop.w : 0,
            y: crop.y ? -crop.y * h / crop.h : 0,
            width: w / crop.w,
            height: h / crop.h,
            opacity: Number(element.opacity ?? .35),
            preserveAspectRatio: "none"
          };
          if (crop.w < 1 || crop.h < 1) {
            const clipId = uid("clip");
            g.appendChild(svgEl("clipPath", { id: clipId }, [svgEl("rect", { x: 0, y: 0, width: w, height: h })]));
            attrs["clip-path"] = "url(#" + clipId + ")";
          }
          g.appendChild(svgEl("image", {
            ...attrs
          }));
        } else {
          g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-line", stroke: "#9aa4b2", fill: "#f8fafc" }));
          g.appendChild(textEl("下絵画像なし", w / 2, h / 2, { fontSize: 3, anchor: "middle" }));
        }
      }

      function underlayCropRect(preset) {
        const map = {
          top: { x: 0, y: 0, w: 1, h: .5 },
          bottom: { x: 0, y: .5, w: 1, h: .5 },
          left: { x: 0, y: 0, w: .5, h: 1 },
          right: { x: .5, y: 0, w: .5, h: 1 }
        };
        return map[preset] || { x: 0, y: 0, w: 1, h: 1 };
      }

      function drawWire(g, element, stroke) {
        const points = element.points || [[0, 0], [20, 0]];
        const path = wirePath(points);
        const style = wireStyle(element);
        g.appendChild(svgEl("path", {
          d: path,
          class: "wire-line",
          stroke: style.color,
          "stroke-width": style.width,
          "stroke-dasharray": style.dash || null
        }));
        wireGapMarkers(element).forEach(gap => drawWireGap(g, gap));
        if (element.wireNo && !element.hideWireNo) {
          const pos = wireNoAnchorPoint(element);
          g.appendChild(textEl(element.wireNo, pos.x, pos.y, { fontSize: 2.3, anchor: pos.anchor }));
          if (element.fixedWireNo) {
            g.appendChild(textEl("FIX", pos.x, pos.y + 4, { fontSize: 1.6, anchor: pos.anchor }));
          }
        }
      }

      function wireGapMarkers(element) {
        const markers = [];
        const seen = new Set();
        const addGap = (x, y, segment) => {
          if (!segment) return;
          const key = pointKey(x, y);
          if (seen.has(key)) return;
          seen.add(key);
          markers.push({ x: round(x), y: round(y), segment });
        };
        if (element.gapAtMid) {
          const points = element.points || [[0, 0], [20, 0]];
          const segment = wireMidSegment(points);
          const mid = pathMid([segment[0], segment[1]], [segment[2], segment[3]]);
          addGap(mid.x, mid.y, segment);
        }
        (element.gapPoints || []).forEach(point => {
          const x = Number(point[0]);
          const y = Number(point[1]);
          const segment = wireSegments(element).find(item => pointOnSegment(x, y, item));
          addGap(x, y, segment);
        });
        return markers;
      }

      function drawWireGap(g, gap) {
        const segment = gap.segment;
        const horizontal = Math.abs(segment[1] - segment[3]) <= Math.abs(segment[0] - segment[2]);
        g.appendChild(svgEl("rect", {
          x: gap.x - (horizontal ? 3.2 : 1.5),
          y: gap.y - (horizontal ? 1.5 : 3.2),
          width: horizontal ? 6.4 : 3,
          height: horizontal ? 3 : 6.4,
          fill: "#fff",
          stroke: "none"
        }));
      }

      function drawRectElement(g, element, stroke) {
        const w = Number(element.w || 30);
        const h = Number(element.h || 18);
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: w,
          height: h,
          class: "symbol-line",
          stroke,
          fill: element.fill || "none"
        }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, h / 2, { fontSize: 2.6, anchor: "middle" }));
      }

      function waveLinePoints(a, b) {
        const dx = b[0] - a[0];
        const dy = b[1] - a[1];
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        const amp = 2.2;
        const n = Math.max(1, Math.round(len / 7));
        const quads = [];
        for (let i = 0; i < n; i++) {
          const t0 = i / n;
          const t1 = (i + 1) / n;
          const sign = i % 2 ? -1 : 1;
          quads.push({
            from: [a[0] + dx * t0, a[1] + dy * t0],
            ctrl: [a[0] + dx * (t0 + t1) / 2 + nx * amp * sign, a[1] + dy * (t0 + t1) / 2 + ny * amp * sign],
            to: [a[0] + dx * t1, a[1] + dy * t1]
          });
        }
        return quads;
      }

      function drawLineElement(g, element, stroke) {
        const points = element.points || [[0, 0], [20, 0]];
        const a = points[0];
        const b = points[points.length - 1];
        if (element.lineKind === "wave") {
          const d = "M " + a[0] + " " + a[1] + waveLinePoints(a, b)
            .map(q => " Q " + round(q.ctrl[0]) + " " + round(q.ctrl[1]) + " " + round(q.to[0]) + " " + round(q.to[1]))
            .join("");
          g.appendChild(svgEl("path", {
            d,
            class: "symbol-line",
            stroke,
            "stroke-width": element.strokeWidth || .32,
            fill: "none"
          }));
        } else {
        g.appendChild(svgEl("line", {
          x1: a[0],
          y1: a[1],
          x2: b[0],
          y2: b[1],
          class: "symbol-line",
          stroke,
          "stroke-width": element.strokeWidth || .32,
          "stroke-dasharray": element.dash || null
        }));
        }
        if (element.label) {
          const mid = pathMid(a, b);
          g.appendChild(textEl(element.label, mid.x, mid.y - 3, { fontSize: 2.4, anchor: "middle" }));
        }
        if ((element.signalRole || "reference") !== "reference") {
          g.appendChild(textEl(signalRoleLabel(element.signalRole), b[0], b[1] + 4.5, { fontSize: 2.1, anchor: "middle" }));
        }
      }

      function drawCircleElement(g, element, stroke) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        g.appendChild(svgEl("ellipse", {
          cx: w / 2,
          cy: h / 2,
          rx: w / 2,
          ry: h / 2,
          class: "symbol-line",
          stroke,
          fill: element.fill || "none"
        }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, h / 2, { fontSize: 2.6, anchor: "middle" }));
      }

      function drawAreaBox(g, element, stroke) {
        const w = Number(element.w || 90);
        const h = Number(element.h || 60);
        const prefix = element.type === "installationBox" ? "INST" : "LOC";
        const label = element.label || (element.type === "installationBox" ? "設備" : "場所");
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: w,
          height: h,
          class: "symbol-line",
          stroke,
          fill: "none",
          "stroke-dasharray": element.dash || "4 2"
        }));
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: Math.min(w, Math.max(24, String(label).length * 3.1 + 14)),
          height: 7,
          fill: "#fff",
          stroke,
          "stroke-width": .25
        }));
        g.appendChild(textEl(prefix + ": " + label, 2, 4.8, { fontSize: 2.5 }));
      }

      function wireStyle(element) {
        const type = (state.wireTypes || []).find(item => item.id === element.wireType) || (state.wireTypes || [])[0];
        return {
          color: type?.color || element.stroke || state.settings.stroke,
          width: type?.width || .38,
          dash: type?.dash || "",
          label: type?.label || "",
          noNumber: Boolean(type?.noNumber)
        };
      }

      function orthogonalPath(a, b) {
        if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
          return "M " + a[0] + " " + a[1] + " L " + b[0] + " " + b[1];
        }
        return "M " + a[0] + " " + a[1] + " L " + a[0] + " " + b[1] + " L " + b[0] + " " + b[1];
      }

      function pathMid(a, b) {
        return { x: (a[0] + b[0]) / 2, y: (a[1] + b[1]) / 2 };
      }

      function wirePath(points) {
        if (!points || points.length < 2) return "M 0 0 L 20 0";
        if (points.length === 2) return orthogonalPath(points[0], points[1]);
        return points.map((point, index) => (index ? "L " : "M ") + point[0] + " " + point[1]).join(" ");
      }

      function wireLabelPoint(points) {
        const segment = wireMidSegment(points);
        return pathMid([segment[0], segment[1]], [segment[2], segment[3]]);
      }

      function wireMidSegment(points) {
        const segments = wireSegments({ points });
        if (!segments.length) return [0, 0, 20, 0];
        const lengths = segments.map(segment => Math.hypot(segment[2] - segment[0], segment[3] - segment[1]));
        const total = lengths.reduce((sum, length) => sum + length, 0);
        let walked = 0;
        for (let i = 0; i < segments.length; i += 1) {
          if (walked + lengths[i] >= total / 2) return segments[i];
          walked += lengths[i];
        }
        return segments[segments.length - 1];
      }

      function terminalStripGeometry(element) {
        const count = Math.max(1, Number(element.count || 8));
        const vertical = element.orientation === "vertical";
        const unit = element.type === "terminalStrip" && element.stripStyle === "unit" && vertical;
        const pitchSize = element.type === "connector" ? 7 : 8;
        const w = Number(element.w || (vertical ? 12 : count * pitchSize));
        const h = Number(element.h || (vertical ? count * pitchSize : 12));
        return {
          count,
          vertical,
          unit,
          w,
          h,
          pitch: (vertical ? h : w) / count,
          shape: element.terminalShape || "circle"
        };
      }

      function terminalStripNodeLocal(element, index) {
        const geo = terminalStripGeometry(element);
        if (geo.unit) return { x: 0, y: geo.pitch * index + geo.pitch / 2 };
        return geo.vertical
          ? { x: geo.w / 2, y: geo.pitch * index + geo.pitch / 2 }
          : { x: geo.pitch * index + geo.pitch / 2, y: geo.h / 2 };
      }

      function terminalStripNodeGlobal(element, index) {
        const node = terminalStripNodeLocal(element, index);
        return localAnchor(element, node.x, node.y);
      }

      function terminalLabel(element, index) {
        const custom = String(element.terminalLabels || "").split(/\r?\n/);
        if (custom[index] && custom[index].trim()) return custom[index].trim();
        return (element.prefix || "") + String(Number(element.start || 1) + index);
      }

      function drawTerminal(g, element, stroke) {
        const label = element.label || "1";
        const w = Number(element.w || 10);
        const h = Number(element.h || 6);
        const r = Math.min(2.45, Math.max(1.8, Math.min(w, h) * .36));
        const cx = w / 2;
        const cy = h / 2;
        const shape = element.terminalShape || "circle";
        if (element.orientation === "vertical") {
          g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: cy - r, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: cx, y1: cy + r, x2: cx, y2: h, class: "symbol-line", stroke }));
          drawTerminalNode(g, cx, cy, r, shape, stroke);
          g.appendChild(textEl(label, cx + r + 1.2, cy + .3, { fontSize: 1.8 }));
          return;
        }
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        drawTerminalNode(g, cx, cy, r, shape, stroke);
        g.appendChild(textEl(label, cx, cy + .12, { fontSize: 1.8, anchor: "middle" }));
      }

      function drawTerminalStrip(g, element, stroke) {
        const geo = terminalStripGeometry(element);
        if (geo.unit) {
          const w = geo.w;
          const wave = y => "M 0 " + y +
            " C " + round(w * .19) + " " + round(y - 2.2) + " " + round(w * .33) + " " + round(y - 2.2) + " " + round(w / 2) + " " + y +
            " C " + round(w * .67) + " " + round(y + 2.2) + " " + round(w * .81) + " " + round(y + 2.2) + " " + w + " " + y;
          g.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: geo.h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: w, y1: 0, x2: w, y2: geo.h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("path", { d: wave(0), class: "symbol-line", stroke, fill: "none" }));
          g.appendChild(svgEl("path", { d: wave(geo.h), class: "symbol-line", stroke, fill: "none" }));
          for (let i = 0; i < geo.count; i++) {
            const cy = geo.pitch * i + geo.pitch / 2;
            const r = Math.min(3.5, geo.pitch * .37);
            g.appendChild(svgEl("circle", { cx: w / 2, cy, r, class: "terminal-dot", stroke }));
            g.appendChild(textEl(terminalLabel(element, i), w / 2, cy, { fontSize: 2, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -2.4, { fontSize: 2.2 }));
          const unitJumperStart = Number(element.start || 1);
          terminalJumperPairs(element).forEach(([a, b]) => {
            const ia = a - unitJumperStart;
            const ib = b - unitJumperStart;
            if (ia < 0 || ib < 0 || ia >= geo.count || ib >= geo.count) return;
            const na = terminalStripNodeLocal(element, ia);
            const nb = terminalStripNodeLocal(element, ib);
            g.appendChild(svgEl("path", { d: "M " + na.x + " " + na.y + " Q " + (na.x - 3.6) + " " + ((na.y + nb.y) / 2) + " " + nb.x + " " + nb.y, class: "symbol-line", stroke, fill: "none" }));
          });
          return;
        }
        if (geo.vertical) {
          const bodyW = Math.max(geo.w, 8);
          g.appendChild(svgEl("rect", {
            x: (geo.w - bodyW) / 2,
            y: 0,
            width: bodyW,
            height: geo.h,
            rx: Math.min(bodyW / 2, 3.2),
            ry: Math.min(bodyW / 2, 3.2),
            class: "symbol-line",
            stroke,
            fill: "none"
          }));
          for (let i = 0; i < geo.count; i++) {
            const node = terminalStripNodeLocal(element, i);
            drawTerminalNode(g, node.x, node.y, Math.min(2.8, geo.pitch * .32), geo.shape, stroke);
            g.appendChild(textEl(terminalLabel(element, i), node.x, node.y + .1, { fontSize: 1.9, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, geo.w + 3, 0, { fontSize: 2.5 }));
        } else {
          const r = Math.min(geo.h / 2, 5.5);
          const notch = Math.min(4, geo.h * .34);
          const d = [
            "M", r, 0,
            "H", geo.w - notch,
            "C", geo.w - 1, 0, geo.w, 1.2, geo.w, 3,
            "L", geo.w - notch, geo.h / 2,
            "L", geo.w, geo.h - 3,
            "C", geo.w, geo.h - 1.2, geo.w - 1, geo.h, geo.w - notch, geo.h,
            "H", r,
            "C", 1.2, geo.h, 0, geo.h - 1.2, 0, geo.h / 2,
            "C", 0, 1.2, 1.2, 0, r, 0,
            "Z"
          ].join(" ");
          g.appendChild(svgEl("path", { d, class: "symbol-line", stroke, fill: "none" }));
          for (let i = 0; i < geo.count; i++) {
            const node = terminalStripNodeLocal(element, i);
            drawTerminalNode(g, node.x, node.y, Math.min(2.8, geo.pitch * .32), geo.shape, stroke);
            g.appendChild(textEl(terminalLabel(element, i), node.x, node.y + .1, { fontSize: 1.9, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -3.2, { fontSize: 2.5 }));
        }
        const jumperStart = Number(element.start || 1);
        terminalJumperPairs(element).forEach(([a, b]) => {
          const ia = a - jumperStart;
          const ib = b - jumperStart;
          if (ia < 0 || ib < 0 || ia >= geo.count || ib >= geo.count) return;
          const na = terminalStripNodeLocal(element, ia);
          const nb = terminalStripNodeLocal(element, ib);
          const cx = (na.x + nb.x) / 2 + (geo.vertical ? 3.6 : 0);
          const cy = (na.y + nb.y) / 2 + (geo.vertical ? 0 : 3.6);
          g.appendChild(svgEl("path", { d: "M " + na.x + " " + na.y + " Q " + cx + " " + cy + " " + nb.x + " " + nb.y, class: "symbol-line", stroke, fill: "none" }));
        });
      }

      function drawTerminalNode(g, cx, cy, r, shape, stroke) {

        }

      function drawContact(g, element, closed, stroke) {
        if (element.orientation === "vertical") {

          return;
        }
        drawHorizontalContact(g, element, closed, stroke);

      function drawHorizontalContact(g, element, closed, stroke) {
        const w = Number(element.w || 10);

        const cy = h / 2;
        const left = Math.max(2.4, w * .3);

        g.appendChild(svgEl("line", { x1: right + .7, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: left, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx: right, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: left + .55, y1: cy - .1, x2: right - .3, y2: closed ? cy + .05 : cy - 2.25, class: "symbol-line", stroke }));
        if (closed) {
          g.appendChild(svgEl("line", { x1: right - .35, y1: cy - 2.2, x2: right - .35, y2: cy + 2.2, class: "symbol-line", stroke }));

        const w = Number(element.w || 10);

        const cx = w / 2;
        const upper = Math.max(4.2, h * .34);
        const lower = Math.min(h - 4.2, h * .66);
        const r = Math.min(1.05, Math.max(.75, w * .1));
        const bladeX = Math.min(w - 1, cx + Math.max(2.5, w * .34));
        g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: upper - r, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx, y1: lower + r, x2: cx, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy: upper, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx, cy: lower, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: lower - .2, x2: bladeX, y2: upper + (closed ? .2 : 2.4), class: "symbol-line", stroke }));
        if (closed) {
