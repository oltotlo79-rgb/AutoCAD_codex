      // ページSVG1枚に必要な入力リスナー一式を付ける。
      // 単一表示の#canvasにも、並べて表示の各ページSVG生成時にも同じものを使う。
      function attachCanvasListeners(svg) {
        if (!svg) return;
        svg.addEventListener("dragover", event => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "copy";
        });
        svg.addEventListener("drop", event => {
          event.preventDefault();
          activatePageFromEvent(event);
          const type = event.dataTransfer.getData("text/plain");
          const point = canvasPoint(event);
          if (type) placeElement(type, point.x, point.y);
        });
        svg.addEventListener("pointerdown", onCanvasPointerDown);
        svg.addEventListener("pointermove", onCanvasPointerMove);
        svg.addEventListener("pointerup", onCanvasPointerUp);
        svg.addEventListener("pointercancel", onCanvasPointerUp);
        svg.addEventListener("dblclick", onCanvasDoubleClick);
        svg.addEventListener("contextmenu", onCanvasContextMenu);
        svg.addEventListener("wheel", onCanvasWheel, { passive: false });
        svg.addEventListener("pointercancel", event => {
          if (event.pointerType === "touch") {
            touchPoints.delete(event.pointerId);
            if (touchPoints.size < 2) pinchState = null;
          }
        });
      }

      // ===== タッチ操作(ピンチズーム+二本指パン) =====
      // 2本指タッチを検出したら作図・移動ドラッグを中断し、指間距離でズーム、
      // 中点の移動でワークスペースをパンする。1本指タッチは従来どおりマウスと同じ操作。
      const touchPoints = new Map();
      let pinchState = null;

      // タッチ用pointerdown前処理。2本指を検出したら進行中ドラッグを中断してピンチ開始状態を作る。
      // trueを返した場合、呼び出し元は通常のポインタ処理を行わない。
      function handleTouchDown(event) {
        if (event.pointerType !== "touch") return false;
        touchPoints.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (touchPoints.size === 2) {
          dragState = null; // 進行中の作図/移動はピンチ開始で中断
          const pts = [...touchPoints.values()];
          pinchState = {
            startDist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
            startZoom: state.settings.zoom,
            lastMid: { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 }
          };
          render();
          return true;
        }
        return false;
      }

      // ピンチ中の移動処理。指間距離の比でズーム、中点の移動量でワークスペースをパンする。
      // trueを返した場合、呼び出し元は通常のポインタ処理を行わない。
      function handleTouchMove(event) {
        if (event.pointerType !== "touch" || !touchPoints.has(event.pointerId)) return false;
        touchPoints.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (!pinchState || touchPoints.size < 2) return false;
        event.preventDefault();
        const pts = [...touchPoints.values()];
        const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const mid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        if (pinchState.startDist > 10) {
          state.settings.zoom = clampZoom(pinchState.startZoom * (dist / pinchState.startDist));
          setValue("zoomRange", state.settings.zoom);
          render({ light: true });
        }
        const workspace = qs(".workspace");
        if (workspace) {
          workspace.scrollLeft -= mid.x - pinchState.lastMid.x;
          workspace.scrollTop -= mid.y - pinchState.lastMid.y;
        }
        pinchState.lastMid = mid;
        return true;
      }

      // タッチ離しの後処理。2本未満になったらピンチを終了する。
      // ピンチ由来のupは作図確定処理へ流さない(trueで呼び出し元が中断)。
      function handleTouchUp(event) {
        if (event.pointerType !== "touch") return false;
        touchPoints.delete(event.pointerId);
        if (pinchState && touchPoints.size < 2) {
          pinchState = null;
          return true; // ピンチ終了。既存のpointerup処理(作図確定等)へは流さない
        }
        return !!pinchState;
      }

      // Ctrl+ホイールでズーム(カーソル位置基準)。
      function onCanvasWheel(event) {
        if (!event.ctrlKey && !event.metaKey) return;
        event.preventDefault();
        // 高倍率でも一定の体感になるよう比例ステップでズームする
        const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
        setZoom(state.settings.zoom * factor, false);
      }

      // キャンバス押下の入口。優先順: 点編集ハンドル → リサイズハンドル → 作図ツール(配線/直線等の開始) →
      // 部品配置 → 要素選択(移動開始) → 空白(範囲選択開始)。選択はevent.targetのdata-id基準。
      function onCanvasPointerDown(event) {
        if (handleTouchDown(event)) return; // 2本指=ピンチ開始(通常操作へ流さない)
        activatePageFromEvent(event); // 並べて表示: クリックしたページを編集対象へ
        const svg = qs("#canvas");
        const point = canvasPoint(event, { connectionOnly: activeTool === "wire", raw: activeTool === "select" });
        const pointHandle = event.target.closest("[data-point-index]");
        if (pointHandle) {
          const element = selectedElement();
          const pointIndex = Number(pointHandle.dataset.pointIndex);
          if (!element || !element.points?.[pointIndex]) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "point",
            elementId: element.id,
            pointIndex,
            start: point,
            original: deepClone(element)
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          event.stopPropagation();
          render();
          return;
        }
        const resizeHandle = event.target.closest("[data-resize-handle]");
        if (resizeHandle) {
          const element = selectedElement();
          if (!element || !canResizeElement(element)) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "resize",
            elementId: element.id,
            handle: resizeHandle.dataset.resizeHandle,
            start: point,
            original: deepClone(element),
            originalBox: elementBounds(element)
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          event.stopPropagation();
          render();
          return;
        }
        const targetElement = event.target.closest("[data-id]");
        if (activeTool === "wire" || activeTool === "arrow" || activeTool === "line" || activeTool === "mechanicalLink" || activeTool === "dimension") {
          const element = defaultElement(activeTool, point.x, point.y);
          element.points = [[point.x, point.y], [point.x, point.y]];
          currentPage().elements.push(element);
          selectSingle(element.id);
          dragState = { mode: "draw", elementId: element.id, start: point };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
          return;
        }
        if (activeTool !== "select" && activeTool !== "wire" && activeTool !== "arrow" && activeTool !== "mechanicalLink") {
          placeElement(activeTool, point.x, point.y);
          return;
        }
        if (targetElement) {
          const targetId = targetElement.dataset.id;
          if (event.shiftKey) {
            toggleSelection(targetId);
            render();
            return;
          }
          if (!selectedIds.includes(targetId)) selectSingle(targetId);
          expandSelectionToGroups();
          const element = selectedElement();
          if (isElementLocked(element)) {
            setStatus("ロックされた要素です。ロック解除すると移動できます。");
            render();
            return;
          }
          if (selectedElements().some(isElementLocked)) {
            setStatus("ロックされた要素が含まれています。ロック解除すると移動できます。");
            render();
            return;
          }
          dragState = {
            mode: "move",
            elementId: targetId,
            start: point,
            originals: selectedElements().map(item => deepClone(item)),
            attachedWires: currentPage().elements
              .filter(item => item.type === "wire" && !currentSelectionIdSet().has(item.id))
              .map(item => deepClone(item))
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
        } else {
          if (!event.shiftKey) setSelection([]);
          dragState = { mode: "marquee", start: point, current: point, append: event.shiftKey, originalIds: [...selectedIds] };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
        }
      }

      // ドラッグ中の処理。dragState.modeで分岐: draw=配線/直線の終点更新(直交スナップ)、move=選択移動
      // (グリッド/行スナップした差分で全要素+接続配線端点を追従)、resize/point/marqueeも同様。
      function snapLineEndpoint(start, target) {
        const dx = target.x - start[0];
        const dy = target.y - start[1];
        const angle = Math.atan2(dy, dx);
        const snappedAngle = Math.round(angle / (Math.PI / 12)) * (Math.PI / 12);
        const ux = Math.cos(snappedAngle);
        const uy = Math.sin(snappedAngle);
        const length = dx * ux + dy * uy;
        return [round(start[0] + length * ux), round(start[1] + length * uy)];
      }

      function onCanvasPointerMove(event) {
        if (handleTouchMove(event)) return; // ピンチ中はズーム/パンのみ
        if (!dragState) return;
        const page = currentPage();
        const activeDragElement = page?.elements.find(item => item.id === dragState.elementId);
        const point = canvasPoint(event, {
          excludeSelected: ["move", "resize", "point", "draw"].includes(dragState.mode),
          connectionOnly: activeDragElement?.type === "wire" && ["draw", "point"].includes(dragState.mode)
        });
        if (dragState.mode === "marquee") {
          dragState.current = point;
          render({ light: true });
          return;
        }
        if (dragState.mode === "resize") {
          applyResizeDrag(point);
          render({ light: true });
          return;
        }
        if (dragState.mode === "point") {
          applyPointDrag(point);
          render({ light: true });
          return;
        }
        const element = selectedElement();
        if (!element) return;
        if (dragState.mode === "draw") {
          if (element.type === "wire") {
            // 配線: Shift=折れ向き反転、スペース=L字/コの字(Z)巡回(onKeyDown側でbendCycle更新)
            dragState.lastPoint = [point.x, point.y];
            rebuildDrawingWire(element, dragState, event.shiftKey === true);
          } else if (element.type === "line") {
            const start = element.points[0];
            const rawPoint = canvasPoint(event, { raw: true });
            element.points[element.points.length - 1] = snapLineEndpoint(start, rawPoint);
          } else {
            element.points[element.points.length - 1] = [point.x, point.y];
          }
          render({ light: true });
          return;
        }
        if (dragState.mode === "move") {
          let dx = point.x - dragState.start.x;
          let dy = point.y - dragState.start.y;
          if (state.settings.snap) {
            const gridStep = Number(state.settings.grid || 2.5);
            const rawDy = dy;
            dx = Math.round(dx / gridStep) * gridStep;
            dy = Math.round(dy / gridStep) * gridStep;
            if (page && page.frameVariant === "ladder" && (dragState.originals || []).length) {
              // 行磁気スナップは要素中心ではなく接続ピンの高さを基準にする
              // (押しボタン等ピンが中心にない部品でも配線高さが行に乗るように)。
              const first = dragState.originals[0];
              const anchors0 = elementConnectionAnchors(first);
              const box0 = elementBounds(first);
              let cy0 = anchors0 && anchors0.length ? anchors0[0].y : (box0 ? box0.y + box0.h / 2 : null);
              if ((first.type === "terminalStrip" || first.type === "connector") && first.connStyle !== "pair") {
                cy0 = terminalStripNodeGlobal(first, 0).y;
              }
              if (cy0 !== null) {
                const targetY = cy0 + rawDy;
                const row = LADDER_GRID.top + LADDER_GRID.pitch * Math.round((targetY - LADDER_GRID.top) / LADDER_GRID.pitch);
                if (Math.abs(row - targetY) <= 2.5) dy = round(row - cy0);
              }
            }
          }
          const snapDelta = movementSnapDelta(dragState.originals || [], dx, dy);
          dx += snapDelta.dx;
          dy += snapDelta.dy;
          (dragState.originals || []).forEach(original => {
            const target = page.elements.find(item => item.id === original.id);
            if (!target) return;
            if (target.points) {
              target.points = original.points.map(p => [p[0] + dx, p[1] + dy]);
            } else {
              target.x = Number(original.x || 0) + dx;
              target.y = Number(original.y || 0) + dy;
            }
          });
          syncAttachedWireEndpoints(page, dragState.originals || [], dragState.attachedWires || [], dx, dy);
          updateAlignGuides(page);
          render({ light: true });
        }
      }

      // 作図中の配線の点列を現在の折れモードで組み立て直す。
      // bendCycle: 0=L字(縦→横) 1=L字(横→縦) 2=コの字(横→縦→横) 3=コの字(縦→横→縦)。
      // Shiftは現在モードの向き反転(L⇔逆L、コ⇔逆コ)。コの字は実点3セグメントとして
      // pointsへ直接構築するため、確定後は通常の多点配線(線番・分割・DXF等)として扱われる。
      function rebuildDrawingWire(element, drag, shift) {
        const a = element.points[0];
        const b = drag.lastPoint || element.points[element.points.length - 1];
        const straight = Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001;
        let mode = ["L", "L2", "Z", "Z2"][(drag.bendCycle || 0) % 4];
        if (shift) mode = { L: "L2", L2: "L", Z: "Z2", Z2: "Z" }[mode];
        if (straight || mode === "L" || mode === "L2") {
          element.points = [a, [b[0], b[1]]];
          element.orthoFlip = !straight && mode === "L2";
          return;
        }
        element.orthoFlip = false;
        if (mode === "Z") {
          const midX = round((a[0] + b[0]) / 2);
          element.points = [a, [midX, a[1]], [midX, b[1]], [b[0], b[1]]];
        } else {
          const midY = round((a[1] + b[1]) / 2);
          element.points = [a, [a[0], midY], [b[0], midY], [b[0], b[1]]];
        }
      }

      // ===== 整列ガイド(移動中のスマートガイド) =====
      // 移動中の部品の接続ピンが他部品のピンとX/Yで一致した瞬間、マゼンタ破線を表示する。
      // 比較先ピンはドラッグ開始後の初回に一度だけ収集(alignCache)し、毎moveの全要素走査を避ける。
      function updateAlignGuides(page) {
        if (!dragState || dragState.mode !== "move") return;
        if (!dragState.alignCache) {
          const movedIds = new Set((dragState.originals || []).map(original => original.id));
          const anchors = [];
          page.elements.forEach(el => {
            if (movedIds.has(el.id) || !isElementVisible(el)) return;
            if (el.points || el.type === "text") return; // 基準は部品ピンのみ(配線・文字は除外)
            (componentConnectionAnchors(el) || []).forEach(a => anchors.push({ x: round(a.x), y: round(a.y) }));
          });
          dragState.alignCache = anchors;
        }
        const movingAnchors = [];
        (dragState.originals || []).forEach(original => {
          const target = page.elements.find(item => item.id === original.id);
          if (!target || target.points) return;
          (componentConnectionAnchors(target) || []).forEach(a => movingAnchors.push({ x: round(a.x), y: round(a.y) }));
        });
        const guides = [];
        const seenV = new Set();
        const seenH = new Set();
        for (const m of movingAnchors) {
          if (guides.length >= 6) break;
          for (const o of dragState.alignCache) {
            if (guides.length >= 6) break;
            if (Math.abs(m.x - o.x) < .05 && !seenV.has(o.x)) {
              seenV.add(o.x);
              guides.push({ axis: "v", at: o.x, a: Math.min(m.y, o.y), b: Math.max(m.y, o.y) });
            }
            if (Math.abs(m.y - o.y) < .05 && !seenH.has(o.y)) {
              seenH.add(o.y);
              guides.push({ axis: "h", at: o.y, a: Math.min(m.x, o.x), b: Math.max(m.x, o.x) });
            }
          }
        }
        dragState.alignGuides = guides;
      }

      // 部品移動に合わせ、部品接続点に刺さっていた配線端点を追従させる。
      function syncAttachedWireEndpoints(page, originals, wireOriginals, dx, dy) {
        const pairs = [];
        originals.forEach(original => {
          if (!original || original.points) return;
          const oldAnchors = componentConnectionAnchors(original);
          if (!oldAnchors.length) return;
          const moved = deepClone(original);
          moved.x = Number(moved.x || 0) + dx;
          moved.y = Number(moved.y || 0) + dy;
          const newAnchors = componentConnectionAnchors(moved);
          oldAnchors.forEach((oldAnchor, index) => {
            const next = newAnchors[index];
            if (next) pairs.push({ oldAnchor, newAnchor: next });
          });
        });
        if (!pairs.length) return;
        const selectedSet = currentSelectionIdSet();
        wireOriginals.forEach(originalWire => {
          const wire = page.elements.find(item => item.id === originalWire.id);
          if (!wire || selectedSet.has(wire.id) || !wire.points) return;
          const lastIndex = originalWire.points.length - 1;
          wire.points = originalWire.points.map((point, index) => {
            if (index !== 0 && index !== lastIndex) return [round(point[0]), round(point[1])];
            let pair = null;
            pairs.forEach(item => {
              const d = Math.hypot(point[0] - item.oldAnchor.x, point[1] - item.oldAnchor.y);
              if (d <= SNAP_RADIUS_MM && (!pair || d < pair.d)) pair = { ...item, d };
            });
            return pair ? [round(pair.newAnchor.x), round(pair.newAnchor.y)] : [round(point[0]), round(point[1])];
          });
        });
      }

      // 移動追従で使う要素の接続点一覧(配線を除く)。
      function componentConnectionAnchors(element) {
        if (!element || element.points) return [];
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.nodes || geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        return elementConnectionAnchors(element);
      }

      // 移動差分をグリッド/設備標準行ピッチへスナップした値に補正(設置後のズレ防止)。
      function movementSnapDelta(originals, dx, dy) {
        if (!state.settings.objectSnap || !originals.length) return { dx: 0, dy: 0 };
        const page = currentPage();
        const excludeIds = new Set(originals.map(original => original.id));
        const targets = collectSnapAnchors(page, excludeIds);
        let best = null;
        originals.flatMap(original => movedElementAnchors(original, dx, dy)).forEach(source => {
          targets.forEach(target => {
            const d = Math.hypot(target.x - source.x, target.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: target.x - source.x, dy: target.y - source.y };
            }
          });
          const segmentTarget = closestSegmentSnapPoint(page, source.x, source.y, excludeIds);
          if (segmentTarget) {
            const d = Math.hypot(segmentTarget.x - source.x, segmentTarget.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: segmentTarget.x - source.x, dy: segmentTarget.y - source.y };
            }
          }
        });
        return best ? { dx: best.dx, dy: best.dy } : { dx: 0, dy: 0 };
      }

      // 移動後の接続点位置を計算(追従判定用)。
      function movedElementAnchors(original, dx, dy) {
        const element = deepClone(original);
        if (element.points) {
          element.points = element.points.map(point => [point[0] + dx, point[1] + dy]);
          return (element.points || []).map(point => ({ x: point[0], y: point[1] }));
        }
        element.x = Number(element.x || 0) + dx;
        element.y = Number(element.y || 0) + dy;
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        if (element.type === "arc") return arcEndpoints(element); // 弧は両端点を吸着基準にする
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.nodes || geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        const anchors = elementConnectionAnchors(element);
        if (anchors.length) return anchors;
        const box = elementBounds(element);
        return box ? [{ x: box.x + box.w / 2, y: box.y + box.h / 2 }] : [];
      }

      // 移動後の要素の接続点を近傍の配線端点へ吸着。
      function snapPointElementConnections(element, page) {
        if (!element || !page || !element.points?.length || !state.settings.objectSnap) return;
        const excludeIds = new Set([element.id]);
        const lastIndex = element.points.length - 1;
        const targetIndices = element.type === "wire" ? [0, lastIndex] : element.points.map((_, index) => index);
        targetIndices.forEach(index => {
          const point = element.points[index];
          if (!point) return;
          const snapped = snapConnectionPoint(page, point[0], point[1], excludeIds);
          element.points[index] = [round(snapped.x), round(snapped.y)];
        });
      }

      // 接続点候補への吸着(半径内で最近点)。
      function snapConnectionPoint(page, x, y, excludeIds = new Set()) {
        const anchor = closestAnchor(collectConnectionAnchors(page, excludeIds), x, y);
        if (anchor) return { x: anchor.x, y: anchor.y };
        const segment = closestSegmentSnapPoint(page, x, y, excludeIds);
        return segment || { x, y };
      }

      // ドラッグ確定。mode別に履歴記録し、marqueeなら範囲内要素を選択。
      function onCanvasPointerUp(event) {
        if (handleTouchUp(event)) return; // ピンチ終了処理(作図確定へ流さない)
        if (!dragState) return;
        const finishedDrag = dragState;
        try {
          qs("#canvas").releasePointerCapture(event.pointerId);
        } catch (_) {
          // ブラウザ側で既にポインタ解放済みの場合があるため失敗は無視する。
        }
        if (dragState.mode === "marquee") {
          applyMarqueeSelection(dragState);
          dragState = null;
          render();
          return;
        }
        const page = currentPage();
        const touchedIds = finishedDrag.mode === "move"
          ? (finishedDrag.originals || []).map(original => original.id)
          : [finishedDrag.elementId].filter(Boolean);
        touchedIds.forEach(id => snapPointElementConnections(page?.elements.find(item => item.id === id), page));
        const element = selectedElement();
        // ゼロ長の線・配線は破棄(多角形は始点≠終点が前提のため対象外)
        if (element && element.points && element.type !== "polygon") {
          const a = element.points[0];
          const b = element.points[element.points.length - 1];
          if (Math.abs(a[0] - b[0]) < .5 && Math.abs(a[1] - b[1]) < .5) {
            currentPage().elements = currentPage().elements.filter(item => item.id !== element.id);
            setSelection([]);
          }
        }
        dragState = null;
        commitHistory("作図を更新しました。");
        render();
      }

      // 範囲選択の確定(交差する表示中要素を選択、Shiftで追加)。
      function applyMarqueeSelection(marquee) {
        const page = currentPage();
        if (!page) return;
        const rect = normalizedRect(marquee.start, marquee.current || marquee.start);
        if (rect.w < .8 && rect.h < .8) {
          if (!marquee.append) setSelection([]);
          return;
        }
        const hits = page.elements
          .filter(element => element.type !== "underlayImage")
          .filter(isElementVisible)
          .filter(element => {
            const box = elementBounds(element);
            return box && boundsIntersect(rect, box);
          })
          .map(element => element.id);
        if (marquee.append) {
          setSelection(Array.from(new Set([...(marquee.originalIds || []), ...hits])));
        } else {
          setSelection(hits);
        }
      }

      // 角ハンドルドラッグによるリサイズ確定処理(最小寸法クランプ)。
      function applyResizeDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        const box = dragState.originalBox;
        if (!element || !box) return;
        const minSize = 2.5;
        let x = box.x;
        let y = box.y;
        let w = box.w;
        let h = box.h;
        const right = box.x + box.w;
        const bottom = box.y + box.h;
        if (dragState.handle.includes("e")) {
          w = Math.max(minSize, point.x - box.x);
        }
        if (dragState.handle.includes("s")) {
          h = Math.max(minSize, point.y - box.y);
        }
        if (dragState.handle.includes("w")) {
          x = Math.min(point.x, right - minSize);
          w = right - x;
        }
        if (dragState.handle.includes("n")) {
          y = Math.min(point.y, bottom - minSize);
          h = bottom - y;
        }
        element.x = round(x);
        element.y = round(y);
        element.w = round(w);
        element.h = round(h);
      }

      // 折れ点ハンドルのドラッグ反映。
      function applyPointDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        if (!element || !element.points?.[dragState.pointIndex]) return;
        element.points[dragState.pointIndex] = [round(point.x), round(point.y)];
      }

      // ===== その場編集(ダブルクリック: 文字=本文、配線=線番、他=ラベル) =====
      // 図面上にフローティング入力を重ねて直接編集する。Enter=確定 / Esc=取消 /
      // Tab・Shift+Tab=確定して同種の次(前)要素へ移動(線番・タグの連続入力用)。
      let inlineEdit = null; // { input, element, field, cleanup }

      // 要素種別→編集対象フィールドと表示名。
      function inlineEditFieldFor(element) {
        if (element.type === "text") return { field: "text", title: "文字" };
        if (element.type === "wire") return { field: "wireNo", title: "線番" };
        return { field: "label", title: "ラベル" };
      }

      // Tab移動の巡回対象(同種フィールドを持つ非ロック要素を上→下、左→右順で)。
      function inlineEditCandidates(current) {
        const page = currentPage();
        if (!page) return [current];
        const kindOf = el => el.type === "text" ? "text" : (el.type === "wire" ? "wire" : "label");
        const want = kindOf(current);
        const anchorOf = el => {
          if (el.type === "wire") return wireNoAnchorPoint(el);
          if (el.points) {
            const box = elementBounds(el);
            return box ? { x: box.x + box.w / 2, y: box.y + box.h / 2 } : { x: 0, y: 0 };
          }
          return { x: el.x || 0, y: el.y || 0 };
        };
        return page.elements
          .filter(el => kindOf(el) === want && !isElementLocked(el))
          .sort((a, b) => {
            const pa = anchorOf(a);
            const pb = anchorOf(b);
            return (pa.y - pb.y) || (pa.x - pb.x);
          });
      }

      // 編集を閉じる。commit=trueなら値が変わっていた場合のみ履歴に積んで反映。
      function closeInlineEdit(commit) {
        if (!inlineEdit) return;
        const { input, element, field, cleanup } = inlineEdit;
        inlineEdit = null;
        cleanup?.();
        const value = input.value;
        input.remove();
        if (!commit) return;
        const before = element[field] === undefined || element[field] === null ? "" : String(element[field]);
        if (value === before) return;
        element[field] = value;
        commitHistory(field === "text" ? "文字を更新しました。" : field === "wireNo" ? "線番を更新しました。" : "ラベルを更新しました。");
        render();
      }

      // 要素のそば(配線は線番位置、他は基準点)にフローティング入力を開く。
      function startInlineEdit(element) {
        if (!element) return;
        if (isElementLocked(element)) {
          setStatus("ロックされた要素は編集できません。ロック解除してから編集してください。");
          return;
        }
        closeInlineEdit(true);
        const { field, title } = inlineEditFieldFor(element);
        selectSingle(element.id);
        const svg = qs("#canvas");
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const vb = svg.viewBox.baseVal;
        if (!vb || !vb.width) return;
        const pxPerMm = rect.width / vb.width;
        const boundsMid = () => {
          const box = elementBounds(element);
          return box ? { x: box.x + box.w / 2, y: box.y + box.h / 2 } : { x: 0, y: 0 };
        };
        const anchorMm = element.type === "wire"
          ? wireNoAnchorPoint(element)
          : (element.points ? boundsMid() : { x: element.x || 0, y: element.y || 0 });
        const cx = rect.left + (anchorMm.x - vb.x) * pxPerMm;
        const cy = rect.top + (anchorMm.y - vb.y) * pxPerMm;
        const input = document.createElement("input");
        input.type = "text";
        input.className = "inline-editor";
        input.value = element[field] === undefined || element[field] === null ? "" : String(element[field]);
        input.placeholder = title;
        input.title = title + "（Enter=確定 / Esc=取消 / Tab=次へ / Shift+Tab=前へ）";
        const fontPx = Math.max(11, Math.min(22, 3.2 * pxPerMm));
        input.style.fontSize = fontPx + "px";
        const fitWidth = () => {
          input.style.width = Math.round(Math.max(56, (input.value.length + 2) * fontPx * .62)) + "px";
        };
        fitWidth();
        input.style.left = Math.round(Math.min(Math.max(cx, 8), window.innerWidth - 120)) + "px";
        input.style.top = Math.round(Math.min(Math.max(cy - fontPx * .9, 8), window.innerHeight - 48)) + "px";
        // スクロール・ズーム・リサイズで位置がずれるため、その時点の値で確定して閉じる
        const onViewChange = () => closeInlineEdit(true);
        const scrollHost = qs(".workspace") || window;
        scrollHost.addEventListener("scroll", onViewChange, { passive: true });
        window.addEventListener("resize", onViewChange);
        document.body.appendChild(input);
        inlineEdit = {
          input, element, field,
          cleanup() {
            scrollHost.removeEventListener("scroll", onViewChange);
            window.removeEventListener("resize", onViewChange);
          }
        };
        input.focus();
        input.select();
        input.addEventListener("input", fitWidth);
        // 入力中のキーはアプリ側ショートカット(Ctrl+Z等)へ流さない
        input.addEventListener("keydown", ev => {
          ev.stopPropagation();
          if (ev.key === "Enter") {
            ev.preventDefault();
            closeInlineEdit(true);
          } else if (ev.key === "Escape") {
            ev.preventDefault();
            closeInlineEdit(false);
          } else if (ev.key === "Tab") {
            ev.preventDefault();
            const dir = ev.shiftKey ? -1 : 1;
            const list = inlineEditCandidates(element);
            const index = list.findIndex(el => el.id === element.id);
            const next = list.length ? list[(index + dir + list.length) % list.length] : null;
            closeInlineEdit(true);
            if (next && next.id !== element.id) startInlineEdit(next);
          }
        });
        input.addEventListener("blur", () => closeInlineEdit(true));
        setStatus(title + "をその場で編集中: Enter=確定 / Esc=取消 / Tab=次の要素へ");
      }

      // ===== 右クリックコンテキストメニュー =====
      // 要素上=編集/複製/回転/ロック/同種選択/参照ジャンプ、空白上=貼付/全体表示。
      function hideContextMenu() {
        qs("#contextMenu")?.classList.add("hidden");
      }

      // 右クリックメニューを組み立てて表示する。items: {label, run, disabled}の配列("-"は区切り線)。
      // 画面端では位置を内側へ補正する。閉じる処理は外側クリック/スクロール/Esc(グローバル登録)。
      function showContextMenu(event, items) {
        const menu = qs("#contextMenu");
        if (!menu) return;
        menu.innerHTML = "";
        items.forEach(item => {
          if (item === "-") {
            const sep = document.createElement("div");
            sep.className = "context-sep";
            menu.appendChild(sep);
            return;
          }
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = item.label;
          if (item.disabled) button.disabled = true;
          button.addEventListener("click", () => {
            hideContextMenu();
            item.run();
          });
          menu.appendChild(button);
        });
        menu.classList.remove("hidden");
        menu.style.left = Math.round(Math.min(event.clientX, window.innerWidth - menu.offsetWidth - 8)) + "px";
        menu.style.top = Math.round(Math.min(event.clientY, window.innerHeight - menu.offsetHeight - 8)) + "px";
      }

      // キャンバス右クリックの入口。要素上=編集メニュー(コイル/接点なら参照ジャンプ付き)、
      // 空白=貼付/全体表示。並べて表示中は対象ページを先にアクティブ化してから組み立てる。
      function onCanvasContextMenu(event) {
        event.preventDefault();
        activatePageFromEvent(event);
        const page = currentPage();
        if (!page) return;
        const targetG = event.target.closest("[data-id]");
        if (!targetG) {
          showContextMenu(event, [
            { label: "貼付 (Ctrl+V)", run: pasteClipboard },
            { label: "全体表示 (0)", run: fitPageToWorkspace }
          ]);
          return;
        }
        const id = targetG.dataset.id;
        if (!selectedIds.includes(id)) {
          selectSingle(id);
          render();
        }
        const element = page.elements.find(item => item.id === id);
        if (!element) return;
        const locked = isElementLocked(element);
        const items = [
          { label: "その場編集（ラベル/線番/文字）", run: () => startInlineEdit(element), disabled: locked },
          "-",
          { label: "コピー (Ctrl+C)", run: copySelected },
          { label: "複製 (Ctrl+D)", run: duplicateSelected, disabled: locked },
          { label: "削除 (Delete)", run: deleteSelected, disabled: locked },
          "-",
          { label: "右90°回転", run: () => rotateSelected(90), disabled: locked },
          { label: "左右ミラー", run: mirrorSelectedHorizontal, disabled: locked },
          { label: locked ? "ロック解除" : "ロック", run: toggleSelectedLock },
          "-",
          { label: "同種をページ内全選択", run: selectAllOfSameType }
        ];
        const tag = componentTag(element);
        if (tag) {
          const data = crossRefData();
          if (contactChildTypes().has(element.type)) {
            const coil = data.coils.get(tag);
            if (coil && coil.element.id !== element.id) {
              items.push("-", { label: "親コイルへ移動（" + coil.address + "）", run: () => jumpToElement(coil.page.id, coil.element.id) });
            }
          } else if (coilTypes().has(element.type)) {
            const first = (data.contacts.get(tag) || [])[0];
            if (first) {
              items.push("-", { label: "接点へ移動（" + first.address + "）", run: () => jumpToElement(first.page.id, first.element.id) });
            }
          }
        }
        showContextMenu(event, items);
      }

      // ダブルクリックでその場編集を開始。
      function onCanvasDoubleClick(event) {
        activatePageFromEvent(event);
        const targetElement = event.target.closest("[data-id]");
        if (!targetElement) return;
        selectSingle(targetElement.dataset.id);
        const element = selectedElement();
        if (!element) return;
        event.preventDefault();
        startInlineEdit(element);
      }

      // キーボードショートカット。S/V=選択 W=配線 T=文字 L=直線 R=矩形 C=円、Ctrl+C/V/D/Z/Y/S、
      // Delete=削除、矢印=1mm移動(Shiftで5mm)、Esc=配置キャンセル。入力欄フォーカス中は無視。
      function onKeyDown(event) {
        const tag = document.activeElement?.tagName;
        const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(tag) || document.activeElement?.isContentEditable;
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          saveProject();
          return;
        }
        // Esc: メニュー → ダイアログ → (入力欄は既定動作) → ドラッグ取消 → 配置終了 → 選択解除
        if (event.key === "Escape") {
          const menu = qs("#contextMenu");
          if (menu && !menu.classList.contains("hidden")) {
            hideContextMenu();
            return;
          }
          const backdrop = qs("#dialogBackdrop");
          if (backdrop && !backdrop.classList.contains("hidden")) {
            closeDialog();
            return;
          }
          if (editing) return;
          if (dragState) {
            cancelActiveDrag();
            return;
          }
          if (activeTool !== "select") {
            cancelPlacementMode();
            return;
          }
          if (selectedIds.length) {
            setSelection([]);
            render();
            setStatus("選択を解除しました。");
          }
          return;
        }
        // 入力欄でのCtrl+Z/Y等は文字編集(ブラウザ既定)へ委ねる。図面Undoにしない。
        if (editing) return;
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          if (dragState) cancelActiveDrag();
          restoreHistory(historyIndex - 1);
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
          event.preventDefault();
          if (dragState) cancelActiveDrag();
          restoreHistory(historyIndex + 1);
          return;
        }
        // 配線ドラッグ中のスペース: L字⇔コの字(Z)の折れ形状を巡回
        if (event.key === " " && dragState && dragState.mode === "draw") {
          const drawing = selectedElement();
          if (drawing && drawing.type === "wire") {
            event.preventDefault();
            dragState.bendCycle = ((dragState.bendCycle || 0) + 1) % 4;
            rebuildDrawingWire(drawing, dragState, false);
            render({ light: true });
            setStatus(["L字（縦→横）", "L字（横→縦）", "コの字（横→縦→横）", "コの字（縦→横→縦）"][dragState.bendCycle] + "で作図中（スペースで切替）");
            return;
          }
        }
        if (!event.ctrlKey && !event.metaKey && !event.altKey) {
          const toolShortcuts = { s: "select", v: "select", w: "wire", t: "text", l: "line", r: "rect", c: "circle" };
          const tool = toolShortcuts[event.key.toLowerCase()];
          if (tool) {
            event.preventDefault();
            setActiveTool(tool);
            return;
          }
          // ズーム: + / - / 0(全体表示)
          if (event.key === "+" || event.key === "=") {
            event.preventDefault();
            setZoom(state.settings.zoom * 1.25, true);
            return;
          }
          if (event.key === "-") {
            event.preventDefault();
            setZoom(state.settings.zoom / 1.25, true);
            return;
          }
          if (event.key === "0") {
            event.preventDefault();
            fitPageToWorkspace();
            return;
          }
        }
        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
          event.preventDefault();
          copySelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v") {
          event.preventDefault();
          pasteClipboard();
        }
        const nudge = event.shiftKey ? 5 : 1;
        const arrows = { ArrowLeft: [-nudge, 0], ArrowRight: [nudge, 0], ArrowUp: [0, -nudge], ArrowDown: [0, nudge] };
        if (arrows[event.key] && selectedElement()) {
          event.preventDefault();
          moveSelected(arrows[event.key][0], arrows[event.key][1]);
          commitHistory("要素を移動しました。");
          render();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "d") {
          event.preventDefault();
          duplicateSelected();
        }
      }

      attachEvents();
      initProject();

      // 自動テスト用の内部フック(通常操作では使用しない)。接続点・移行・履歴の回帰検証に使う。
      window.__edsTest = {
        defaultElementAtPlacement,
        elementConnectionAnchors,
        primaryConnectionPoint,
        snapLineEndpoint,
        cableCoreRows,
        syncPanelFootprints,
        avoidWireNumberCollision,
        saveSelectedAsUserCircuit,
        defaultElement,
        SYMBOL_GEO,
        geoPrims,
        terminalStripNodeLocal,
        plcUnitGeometry,
        unitWavePoints,
        buildDxf,
        diffProjects,
        showDiffViewer,
        migrateProjectData: data => migrateProjectData(deepClone(data)),
        normalizeProjectData: data => normalizeProjectData(deepClone(data)),
        installProjectData: (data, message = "テストデータを読み込みました。") => installProjectData(deepClone(data), message),
        applyBackupSnapshot,
        readProjectStore,
        validateTitleLayouts,
        validateStandardPack,
        selectElement: id => { selectSingle(id); render(); },
        commitHistory,
        restoreHistory,
        state,
        historyDiagnostics: () => ({
          count: history.length,
          index: historyIndex,
          totalChars: historySnapshotChars(),
          imageAssetCount: historyImageAssets.size,
          imageAssetChars: Array.from(historyImageAssets.values()).reduce((sum, item) => sum + item.length, 0),
          historicalImageAssetChars: historicalImageAssetChars(),
          retainedChars: historyRetainedChars(),
          maxRetainedChars: HISTORY_MAX_CHARS + HISTORY_IMAGE_MAX_CHARS,
          maxHistoricalImageAssetChars: HISTORY_IMAGE_MAX_CHARS,
          snapshotsContainImageData: history.some(item => item.includes("data:image/"))
        })
      };
    })();
  </script>
</body>
</html>
