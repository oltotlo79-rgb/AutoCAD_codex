          created.push({ ...defaultElement("contactNO", cursor, round(y - 2.2)), label: i === 0 ? contactTag : "" });
        });
        stations.push([cursor, cursor + 10]);
        cursor += 17.5;
        if (withThermal) {
          lineYs.forEach((y, i) => {
            created.push({ ...defaultElement("thermalElement", cursor, round(y - 3)), label: i === 0 ? thermalTag : "" });

        }
        lineYs.forEach(y => {

            sx = b;
          });
          created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), round(y)], [round(motorX + 0.9), round(y)]] });

          const lx = round(breakers[0].x + 5); // 極中心(+4.75)の最寄りグリッド点

            ...defaultElement("mechanicalLink", lx, 0),

          created.push({ ...defaultElement("ground", round(gx - 2), gy + 7.5), label: "" });

        return created;
      }

      // ダイアログ入力から非常停止チェーン(キノコPB直列+局間端子/線番+送り矢印+局別表示灯+点線局枠)を生成。
      // 見本PDF頁14「リレー回路_非常停止」のレイアウトに合わせる。
      function buildEStopChains() {
        const page = currentPage();
        if (!page) return;
        const stations = Math.max(1, Math.min(4, Math.floor(Number(qs("#esCount").value || 3))));
        const chains = Math.max(1, Math.min(2, Math.floor(Number(qs("#esChains").value || 2))));
        const prefix = qs("#esPrefix").value || "PBE";
        const withLamps = (qs("#esLamps").value || "on") === "on";
        const created = [];
        const terminals = []; // 端子円は最後に積み、配線端(円中心)を白抜きで隠す
        const rails = ladderRailSpanX(page, true);
        // 4局時は開始位置を左へ寄せ、27.5mmピッチのまま左右母線内へ収める。
        const stationX = i => (stations === 4 ? 37.5 + 27.5 * i : 52.5 + 27.5 * i);
        const railL = rails.left;
        const railR = rails.right;
        // 局間の線番: 最終区間="Si{c}"、その手前は右から A,B,C…(見本: Si0B→Si0A→Si0)
        const segNo = (c, i) => "Si" + c + (i === stations - 1 ? "" : String.fromCharCode(65 + (stations - 2 - i)));
        for (let c = 0; c < chains; c++) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * (2 + 2 * c));
          created.push(defaultElement("junction", railL, y));
          let sx = railL;
          for (let i = 0; i < stations; i++) {
            const cx = stationX(i);
            created.push({
              ...defaultElement("pushButton", cx, round(y - 4.4)),
              pbStyle: "emergency",
              w: 10,
              h: 7, // キノコ形ジオメトリの本体寸法。既定(h5)のままだと中央寄せで接続点が1mm浮く
              label: c === 0 ? prefix + (i + 1) : "",
              tag: prefix + (i + 1)
            });
            // 前の局間線が次PB左端まで到達済みなら、同一点の0長配線を重ねない。
            if (Math.abs(sx - cx) > .001) {
              created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [round(cx), y]] });
            }
            // 局の右側に境界端子(○・中心cx+15=グリッド点)+線番。配線は円中心まで届かせる
            created.push({ ...defaultElement("wire", cx + 10, y), points: [[round(cx + 10), y], [round(cx + 15), y]] });
            terminals.push({ ...defaultElement("terminal", 0, 0), x: round(cx + 14.1), y: round(y - 0.9), label: "" });
            sx = cx + 15;
            if (i < stations - 1) {
              created.push({
                ...defaultElement("wire", sx, y),
                points: [[round(sx), y], [round(stationX(i + 1)), y]],
                wireNo: segNo(c, i),
                wireNoAlign: "start"
              });
              sx = stationX(i + 1);
            }
          }
          const arrowLength = stations === 4 ? 10 : 20;
          created.push({
            ...defaultElement("arrow", sx, y),
            points: [[round(sx), y], [round(sx + arrowLength), y]],
            label: segNo(c, stations - 1),
            arrowStyle: "open",
            signalRole: "source"
          });
        }
        if (withLamps) {
          // 表示灯行: 同じPBの別接点から下段のRランプへループ配線(見本の局内ループ形)
          for (let i = 0; i < stations; i++) {
            const cx = stationX(i);
            const yT = round(LADDER_GRID.top + LADDER_GRID.pitch * (2 + 2 * chains + 2 * i));
            const yL = round(yT + LADDER_GRID.pitch);
            // ランプ上ラベルより6.5mm以上上へ逃がし、ループ線がタグ文字を横切らないようにする。
            const yMid = round(Math.floor((yL - 6.5) / 2.5) * 2.5);
            created.push(defaultElement("junction", railL, yT));
            created.push({ ...defaultElement("wire", railL, yT), points: [[railL, yT], [round(cx), yT]] });
            created.push({
              ...defaultElement("pushButton", cx, round(yT - 4.4)),
              pbStyle: "emergency",
              w: 10,
              h: 7, // 同上: 接続点を行の高さに正確に載せる
              label: "",
              tag: prefix + (i + 1)
            });
            created.push({
              ...defaultElement("wire", cx + 10, yT),
              points: [[round(cx + 10), yT], [round(cx + 12.5), yT], [round(cx + 12.5), yMid], [round(cx - 2.5), yMid], [round(cx - 2.5), yL]]
            });
            created.push({ ...defaultElement("lamp", round(cx - 2.5), round(yL - 2.2)), label: prefix + (i + 1), tag: prefix + (i + 1), lampColor: "R" });
            created.push({ ...defaultElement("wire", cx + 7.5, yL), points: [[round(cx + 7.5), yL], [railR, yL]] });
            created.push(defaultElement("junction", railR, yL));
          }
          for (let i = 0; i < stations; i++) {
            const top = round(LADDER_GRID.top + LADDER_GRID.pitch * 2 - 6.5);
            const bottom = round(LADDER_GRID.top + LADDER_GRID.pitch * (2 + 2 * chains + 2 * i + 1) + 5);
            created.push({
              ...defaultElement("rect", round(stationX(i) - 3.75), top),
              w: 17.5,
              h: bottom - top,
              label: "",
              dash: "1.4 1.2"
            });
          }
        }
        created.push(...terminals);
        page.elements.push(...created);
        setSelection(created.map(el => el.id));
        closeDialog();
        commitHistory("非常停止チェーンを生成しました。");
        render();
      }

      // ダイアログ入力から電源投入回路(切替スイッチ行+準備PB+自己保持並列)を生成。
      function buildPowerOnCircuit() {
        const page = currentPage();
        if (!page) return;
        const row0 = Math.max(0, Math.min(17, Math.floor(Number(qs("#poRow").value || 1))));
        const ksTag = qs("#poKs").value || "KS1";
        const pbTag = qs("#poPb").value || "PB1";
        const crTags = String(qs("#poCr").value || "CR1,CR2").split(",").map(s => s.trim());
        const cr1 = crTags[0] || "CR1";
        const cr2 = crTags[1] || crTags[0] || "CR2";
        const created = [];
        const rails = ladderRailSpanX(page, true);
        const railL = rails.left;
        const railR = rails.right;
        const yA = round(LADDER_GRID.top + LADDER_GRID.pitch * row0);
        const yB = round(LADDER_GRID.top + LADDER_GRID.pitch * (row0 + 2));
        const yB2 = round(LADDER_GRID.top + LADDER_GRID.pitch * (row0 + 3));
        // 行A: 切替スイッチ + 入/切ポジション + コイル
        created.push(defaultElement("junction", railL, yA));
        created.push({ ...defaultElement("wire", railL, yA), points: [[railL, yA], [52.5, yA]] });
        created.push({ ...defaultElement("wire", 62.5, yA), points: [[62.5, yA], [135, yA]] });
        created.push({ ...defaultElement("selectorSwitch", 52.5, round(yA - 3.2)), label: ksTag });
        // 見本順: SS→切(線)→入(箱)。中心は2.5mmグリッド上、相互間隔10mm。
        created.push({ ...defaultElement("positionMark", 68, round(yA - 3)), label: "切", markStyle: "line" }); // アンカー=70
        created.push({ ...defaultElement("positionMark", 78, round(yA - 3)), label: "入", markStyle: "box" }); // アンカー=80
        created.push({ ...defaultElement("coil", 135, round(yA - 2.2)), label: cr1, tag: cr1 });
        created.push({ ...defaultElement("wire", 145, yA), points: [[145, yA], [railR, yA]] });
        created.push(defaultElement("junction", railR, yA));
        // 行B: 準備PB + 自己保持接点(並列) + コイル
        created.push(defaultElement("junction", railL, yB));
        created.push({ ...defaultElement("wire", railL, yB), points: [[railL, yB], [47.5, yB]] });
        created.push(defaultElement("junction", 47.5, yB));
        created.push({ ...defaultElement("pushButton", 52.5, round(yB - 3.5)), label: pbTag, tag: pbTag });
        created.push({ ...defaultElement("wire", 47.5, yB), points: [[47.5, yB], [52.5, yB]] });
        created.push({ ...defaultElement("wire", 62.5, yB), points: [[62.5, yB], [70, yB]] });
        created.push(defaultElement("junction", 70, yB));
        created.push({ ...defaultElement("wire", 70, yB), points: [[70, yB], [135, yB]] });
        created.push({ ...defaultElement("coil", 135, round(yB - 2.2)), label: cr2, tag: cr2 });
        created.push({ ...defaultElement("wire", 145, yB), points: [[145, yB], [railR, yB]] });
        created.push(defaultElement("junction", railR, yB));
        // 自己保持分岐(下段に a接点 cr2)
        created.push({ ...defaultElement("wire", 47.5, yB), points: [[47.5, yB], [47.5, yB2]] });
        created.push({ ...defaultElement("contactNO", 52.5, round(yB2 - 2.2)), label: cr2 });
        created.push({ ...defaultElement("wire", 47.5, yB2), points: [[47.5, yB2], [52.5, yB2]] });
        created.push({ ...defaultElement("wire", 62.5, yB2), points: [[62.5, yB2], [70, yB2]] });
        created.push({ ...defaultElement("wire", 70, yB2), points: [[70, yB2], [70, yB]] });
        page.elements.push(...created);
        setSelection(created.map(el => el.id));
        closeDialog();
        commitHistory("電源投入回路を生成しました。");
        render();
      }

      // ブレーキ/整流回路の行(接点→整流器箱→コイル→右レール)の要素列を生成(配置は呼び出し側)。
      function makeBrakeCircuitElements(options) {
        const row0 = Math.max(0, Math.min(19, Math.floor(Number(options.row0 || 2))));
        const count = Math.max(1, Math.min(4, Math.floor(Number(options.count || 2))));
        const contactPrefix = options.contactPrefix || "MSB";
        const coilPrefix = options.coilPrefix || "B";
        const railL = Number(options.railLeft ?? 32.5);
        const railR = Number(options.railRight ?? 147.5);
        const created = [];
        for (let i = 0; i < count && row0 + i * 2 <= 20; i++) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * (row0 + i * 2));
          created.push(defaultElement("junction", railL, y));
          created.push({ ...defaultElement("contactNO", 52.5, round(y - 2.2)), label: contactPrefix + (i + 1) });
          created.push({ ...defaultElement("wire", railL, y), points: [[railL, y], [52.5, y]] });
          created.push({ ...defaultElement("wire", 62.5, y), points: [[62.5, y], [92.5, y]] });
          created.push({
            ...defaultElement("deviceBox", 92.5, round(y - 6)),
            w: 25,
            h: 12,
            pins: 1,
            pinText: "2",
            rightPinText: "4",
            label: "整流器",
            tag: ""
          });
          created.push({ ...defaultElement("wire", 117.5, y), points: [[117.5, y], [135, y]] });
          created.push({ ...defaultElement("coil", 135, round(y - 2.2)), label: coilPrefix + (i + 1), tag: coilPrefix + (i + 1) });
          created.push({ ...defaultElement("wire", 145, y), points: [[145, y], [railR, y]] });
          created.push(defaultElement("junction", railR, y));
        }
        return created;
      }

      // ダイアログ入力からブレーキ/整流回路を現在ページへ生成。

        const page = currentPage();

          contactPrefix: qs("#bkContact").value || "MSB",
          coilPrefix: qs("#bkCoil").value || "B",

          railRight: rails.right

        commitHistory("ブレーキ/整流回路を生成しました。");

          <div class="row">

          </div>
          <div class="row">
            <div><label>電源表示灯（PL0）</label><select id="acPl"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
            <div><label>盤内照明回路（CP0＋SS0＋FL1）</label><select id="acLight"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
          </div>
          <div class="row">
            <div><label>ファン回路（CP01＋FAN1）</label><select id="acFan"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
            <div><label>REC（DC電源）送り</label><select id="acRec"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
          </div>
          <div class="row">
            <div><label>変圧器（200V時のみ・100V降圧）</label><select id="acTr"><option value="100VA">100VA</option><option value="500VA">500VA</option><option value="off">なし</option></select></div>

          </div>
          <div class="row">

            <div><label>GOT電源送り</label><select id="acGot"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
          </div>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="acBuildBtn" class="primary">ページ追加</button>
          </div>`);
        const syncVoltageDefaults = () => {
          const singlePhase = qs("#acVolt")?.value === "100";
          const replaceKnownDefault = (selector, threePhaseValue, singlePhaseValue) => {
            const input = qs(selector);
            if (!input) return;
            const value = String(input.value || "").replace(/\s+/g, "");
            const threePhase = threePhaseValue.replace(/\s+/g, "");
            const single = singlePhaseValue.replace(/\s+/g, "");
            if (singlePhase && value === threePhase) input.value = singlePhaseValue;
            if (!singlePhase && value === single) input.value = threePhaseValue;
          };
          replaceKnownDefault("#acInRails", "R,S,T", "R,N");

      function showAcMotorPageDialog() {
        openDialog("AC電源回路（モータ）ページ", `
          <p class="muted">モータ駆動のAC電源回路ページを新規追加します。駆動方式で構成が変わります:
          <b>サーボ</b>=CB→MC接点→サーボアンプ(2軸)→モータ＋エンコーダ送り＋ブレーキ回路、
          <b>インバータ</b>=遮断器3極→インバータ→MC接点→サーマル→モータ＋ブレーキ／整流＋CC-Linkツイストペア。</p>
          <div class="row">
            <div><label>駆動方式</label><select id="acDrive"><option value="servo">サーボアンプ</option><option value="inverter">インバータ</option></select></div>
            <div><label>接地レール名（空欄で省略）</label><input id="acGround" value="G"></div>
          </div>
          <div class="row">
            <div><label>相レール名（カンマ区切り）</label><input id="acRails" value="R1,S1,T1"></div>
            <div><label>遮断器タグ</label><input id="acCbTag" value="CB1"></div>
          </div>
          <div class="row">
            <div><label>MC接点タグ</label><input id="acContactTag" value="MS1M"></div>
            <div><label>軸数（サーボ時）</label><select id="acAxes"><option value="2">2軸</option><option value="1">1軸</option></select></div>
          </div>
          <div class="row">
            <div><label>アンプ型式（サーボ時）</label><input id="acAmpModel" value="MR-J4W2-22B"></div>
            <div><label>モータ型式・容量</label><input id="acMotorModel" value="0.2kW 三菱電機 HG-KR23BK"></div>
          </div>
          <div class="row">
            <div><label>モータ1名称</label><input id="acMotor1Name" value="マスチック走行"></div>
            <div><label>モータ2名称</label><input id="acMotor2Name" value="アドヒ走行"></div>
          </div>
          <div class="row">
            <div><label>ブレーキリレー接頭辞（サーボ時）</label><input id="acBrakeRelay" value="CRMBR"></div>
            <div><label>位置決めユニット名（サーボ時）</label><input id="acPosUnit" value="QD77MS2"></div>
          </div>
          <div class="row">
            <div><label>モータ先頭タグ（インバータ時M1／サーボ時SM1）</label><input id="acMotorTag" value="SM1"></div>
            <div><label>サーマルタグ（インバータ時）</label><input id="acThermalTag" value="OL1"></div>
          </div>
          <div class="row">
            <div><label>インバータタグ</label><input id="acInvTag" value="INV1"></div>
            <div><label>インバータ型式</label><input id="acInvModel" value="FR-E720 0.4K"></div>
          </div>
          <div class="row">
            <div><label>ブレーキ回路数（インバータ時・0で省略）</label><input id="acBrakeCount" type="number" min="0" max="4" step="1" value="2"></div>
            <div><label>ブレーキ接点接頭辞（インバータ時）</label><input id="acBrakePrefix" value="MSB"></div>
          </div>
          <div class="row">
            <div><label>通信ツイストペア（インバータ時）</label><select id="acTwisted"><option value="on">配置する</option><option value="off">配置しない</option></select></div>
            <div><label>信号名（カンマ区切り）</label><input id="acTwLabels" value="DA,DB,DG,SLD"></div>
          </div>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="acMotorBuildBtn" class="primary">ページ追加</button>
          </div>`);
        const syncDriveDefaults = () => {
          const inverter = (qs("#acDrive")?.value || "servo") === "inverter";
          const replaceKnownDefault = (selector, servoValue, inverterValue) => {
            const input = qs(selector);
            if (!input) return;
            const value = String(input.value || "").replace(/\s+/g, "");
            const servo = servoValue.replace(/\s+/g, "");
            const inv = inverterValue.replace(/\s+/g, "");
            if (inverter && value === servo) input.value = inverterValue;
            if (!inverter && value === inv) input.value = servoValue;
          };
          replaceKnownDefault("#acRails", "R1,S1,T1", "R01,S01,T01");
          replaceKnownDefault("#acContactTag", "MS1M", "MC2M1");
          replaceKnownDefault("#acMotorTag", "SM1", "M1");
        };
        qs("#acDrive").addEventListener("change", syncDriveDefaults);
        qs("#acMotorBuildBtn").addEventListener("click", () => {
          if ((qs("#acDrive")?.value || "servo") === "servo") buildAcServoPage();
          else buildAcMotorInverterPage();
        });
      }

      // レール名→分岐後の線番("R01"→"R1"のように番号の先頭0を落とす)。変換できない場合はそのまま返す。
      function acBranchWireNo(name) {
        const m = String(name || "").match(/^([A-Za-z]+)0*(\d+)([A-Za-z]*)$/);
        return m ? m[1] + m[2] + m[3] : String(name || "");
      }

      // ダイアログ入力からAC電源回路(モータ・インバータ方式)ページを一括生成。scan-001頁10/11のレイアウトに合わせ、
      // 全要素の接続点(アンカー)座標を一致させて配線が途切れないように配置する。
      function buildAcMotorInverterPage() {
        const rails = String(qs("#acRails")?.value || "R01,S01,T01").split(",").map(s => s.trim()).filter(Boolean);
        const railNames = rails.length ? rails.slice(0, 3) : ["R01", "S01", "T01"];
        while (railNames.length < 3) railNames.push("L" + (railNames.length + 1));
        const groundName = String(qs("#acGround")?.value ?? "G").trim();
        const motorTag = qs("#acMotorTag")?.value || "M1";
        const motorModel = qs("#acMotorModel")?.value || "";
        const contactTag = qs("#acContactTag")?.value || "MC2M1";
        const thermalTag = qs("#acThermalTag")?.value || "OL1";
        const cbTag = qs("#acCbTag")?.value || "CB1";
        const invTag = qs("#acInvTag")?.value || "INV1";
        const invModel = qs("#acInvModel")?.value || "FR-E720 0.4K";
        const brakeCount = Math.max(0, Math.min(4, Math.floor(Number(qs("#acBrakeCount")?.value || 0))));
        const brakePrefix = qs("#acBrakePrefix")?.value || "MSB";
        const withTwisted = (qs("#acTwisted")?.value || "on") === "on";
        const twLabels = String(qs("#acTwLabels")?.value || "DA,DB,DG,SLD").split(",").map(s => s.trim()).filter(Boolean);
        const page = createPage({
          name: "AC電源回路",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "AC電源_" + motorTag + "モータ"
        });
        const els = page.elements;
        // --- 縦レール(接地G+相3本)。見本と同じく上下に送り矢印+上下端ラベル、Gは下端に⊕ ---
        const phaseXs = [35, 40, 45];
        const railTop = (name, x) => {
          els.push({
            ...defaultElement("wire", x, 30),
            points: [[x, 30], [x, TEMPLATE_RAIL_BOTTOM]],
            wireNo: "", hideWireNo: true, ladderRail: name,
            wireType: state.settings.currentWireType
          });
          els.push({ ...defaultElement("arrow", x, 35), points: [[x, 35], [x, 30]], label: "", arrowStyle: "fork", ladderRail: name });
          els.push({ ...defaultElement("arrow", x, 212.5), points: [[x, 212.5], [x, TEMPLATE_RAIL_BOTTOM]], label: "", arrowStyle: "fork", ladderRail: name });
          els.push(textElement(round(x - name.length * 0.62), 22.6, name, 2.2, 0, 12));
        };
        if (groundName) {
          railTop(groundName, 30);
          // 下端は⊕(保安接地マーク)。ラベル重複を避けるためマーク自体のラベルは空にする。
          els.push({ ...defaultElement("polarityMark", 28.7, 219.9), label: "", sign: "+" }); // アンカー(x+1.3,y+2.6)=(30,222.5)
        }
        railNames.forEach((name, i) => {
          railTop(name, phaseXs[i]);
          els.push(textElement(round(phaseXs[i] - name.length * 0.62), 222.4, name, 2.2, 0, 12));
        });
        // --- モータ分岐の行位置(ブレーキ行の下)。相ピッチ5mmは現行モータ記号の端子間隔 ---
        const rCB = Math.max(3, brakeCount * 2 + 3); // ブレーキは行2から2行/回路+1行空き
        // 相ライン3本は2.5mmグリッドに乗せる: 開始行は行グリッド位置を最寄りのグリッド点へ丸め、
        // 相ピッチはモータ端子ピッチと同じ5mm(2.5mm×2)
        const yP0 = round(Math.round((LADDER_GRID.top + LADDER_GRID.pitch * rCB) / 2.5) * 2.5);
        const yP = [0, 1, 2].map(i => round(yP0 + 5 * i));
        // 各機器の左ピン・縦タップ線・箱の辺は2.5mmグリッドに乗せる(記号内部の実測幅由来の右ピンは除く)
        const xCB = 55;
        const xJA = 70;   // ブレーキ送り縦線1(相1タップ)
        const xJB = 72.5; // ブレーキ送り縦線2(相3タップ)
        const xInvL = 85;
        const xInvR = 117.5;
        const xMC = 120;
        const xOL = 130;
        const xTerm = 147.5; // モータ手前の端子中心（線番と端子円の離隔を確保）
        // --- 遮断器3極(連動破線)+レールからのタップ ---
        const breakers = [];
        yP.forEach((y, i) => {
          els.push(defaultElement("junction", phaseXs[i], y));
          els.push({ ...defaultElement("wire", phaseXs[i], y), points: [[phaseXs[i], y], [xCB, y]] });
          const cb = { ...defaultElement("breaker", xCB, round(y - 3)), label: i === 0 ? cbTag : "", refNo: "" };
          breakers.push(cb);
          els.push(cb);
        });
        els.push({
          // 機械連動線は標準遮断器のアーチ頂点(r=2.25)へ正確に接続する（電気グリッド検査の対象外）。
          ...defaultElement("mechanicalLink", round(xCB + 4.75), 0),
          points: [[round(xCB + 4.75), round(yP[0] - 2.25)], [round(xCB + 4.75), round(yP[2] - 2.25)]]
        });
        // --- 遮断器→インバータ(線番R1/S1/T1)。ブレーキ送りのタップ junction 付き ---
        const branchNos = railNames.map(acBranchWireNo);
        if (brakeCount > 0) {
          els.push({ ...defaultElement("wire", xCB + 12.5, yP[0]), points: [[round(xCB + 12.5), yP[0]], [xJA, yP[0]]] });
          els.push(defaultElement("junction", xJA, yP[0]));
          els.push({ ...defaultElement("wire", xJA, yP[0]), points: [[xJA, yP[0]], [xInvL, yP[0]]], wireNo: branchNos[0] });
          els.push({ ...defaultElement("wire", xCB + 12.5, yP[1]), points: [[round(xCB + 12.5), yP[1]], [xInvL, yP[1]]], wireNo: branchNos[1] });
          els.push({ ...defaultElement("wire", xCB + 12.5, yP[2]), points: [[round(xCB + 12.5), yP[2]], [xJB, yP[2]]] });
          els.push(defaultElement("junction", xJB, yP[2]));
          els.push({ ...defaultElement("wire", xJB, yP[2]), points: [[xJB, yP[2]], [xInvL, yP[2]]], wireNo: branchNos[2] });
        } else {
          yP.forEach((y, i) => {
            els.push({ ...defaultElement("wire", xCB + 12.5, y), points: [[round(xCB + 12.5), y], [xInvL, y]], wireNo: branchNos[i] });
          });
        }
        // --- ブレーキ/整流回路(見本頁10: 接点2段 → 整流器(2/1入・4出) → ブレーキコイル) ---
        for (let b = 0; b < brakeCount; b++) {
          // 接点2段は45/55起点の10mmピッチ(2.5mmグリッド)。コイル行は接点行の5mm上。
          // 整流器箱の上下マージンは2.5mm: 次ブレーキのコイル行(yA+20-5)と箱下辺(yB+2.5)が重ならない
          const yA = round(45 + 20 * b);
          const yB = round(yA + 10);
          const yC = round(yA - 5); // コイル行(接点行の上)
          const n = b + 1;
          // 送り縦線(相1→接点上段、相3→接点下段)。最初のブレーキで縦線本体を引く
          if (b === 0) {
            els.push({ ...defaultElement("wire", xJA, yA), points: [[xJA, yA], [xJA, yP[0]]] });
            els.push({ ...defaultElement("wire", xJB, yB), points: [[xJB, yB], [xJB, yP[2]]] });
          } else {
            els.push(defaultElement("junction", xJA, yA));
            els.push(defaultElement("junction", xJB, yB));
          }
          els.push({ ...defaultElement("wire", xJA, yA), points: [[xJA, yA], [75, yA]] });
          els.push({ ...defaultElement("wire", xJB, yB), points: [[xJB, yB], [75, yB]] });
          // ブレーキ接点(両段に同タグ)
          els.push({ ...defaultElement("contactNO", 75, round(yA - 2.2)), label: brakePrefix + n, tag: brakePrefix + n });
          els.push({ ...defaultElement("contactNO", 75, round(yB - 2.2)), label: brakePrefix + n, tag: brakePrefix + n });
          // 接点→整流器(線番B0n/Bn1は接点直後に前寄せ)。接点右ピン(75+10=85)がそのまま分岐junctionに乗る
          els.push(defaultElement("junction", 85, yA));
          els.push({ ...defaultElement("wire", 85, yA), points: [[85, yA], [92.5, yA]], wireNo: "B0" + n, wireNoAlign: "start" });
          els.push({ ...defaultElement("wire", 85, yB), points: [[85, yB], [92.5, yB]], wireNo: "B" + n + "1", wireNoAlign: "start" });
          // 整流器箱(ピン2/1=左、4=右上)
          els.push({ ...defaultElement("rect", 92.5, round(yA - 2.5)), w: 22.5, h: round(yB - yA + 5), label: "" });
          els.push(textElement(94, yA - 1.4, "2", 2.2, 0, 6));
          els.push(textElement(94, yB - 1.4, "1", 2.2, 0, 6));
          els.push(textElement(111.2, yA - 1.4, "4", 2.2, 0, 6));
          els.push(textElement(99, round((yA + yB) / 2 - 1.4), "整流器", 2.4, 0, 16));
          // ピン4→コイル右、上段線の分岐→コイル左(見本のループ配線)
          els.push({ ...defaultElement("wire", 85, yA), points: [[85, yA], [85, yC], [135, yC]] });
          els.push({ ...defaultElement("coil", 135, round(yC - 2.2)), label: "B" + n, tag: "B" + n });
          els.push({ ...defaultElement("wire", 115, yA), points: [[115, yA], [147.5, yA], [147.5, yC], [145, yC]], wireNo: "B" + n });
        }
        // --- インバータ箱(型式/タグ/L1L2L3・UVW・通信端子・接地) ---
        const sigCount = withTwisted ? Math.max(2, Math.min(8, twLabels.length || 4)) : 0;
        const ySig0 = round(yP[0] + 22.5);
        const yBoxTop = round(yP[0] - 7.5);
        const yBoxBottom = round(Math.max(yP[0] + 47.5, sigCount ? ySig0 + 5 * (sigCount - 1) + 7.5 : 0));
        els.push({ ...defaultElement("rect", xInvL, yBoxTop), w: round(xInvR - xInvL), h: round(yBoxBottom - yBoxTop), label: "" });
        els.push(textElement(94.5, yBoxTop + 0.8, invModel, 2.2, 0, 24));
        els.push(textElement(104.5, yBoxTop + 4.2, "CC-LINK", 1.8, 0, 10));
        // L1/L2/L3ピン箱(外箱の左辺に接する)
        els.push({ ...defaultElement("rect", xInvL, round(yP[0] - 2.5)), w: 7.5, h: round(yP[2] - yP[0] + 5), label: "" });
        ["L1", "L2", "L3"].forEach((t, i) => els.push(textElement(87.2, yP[i] - 1.4, t, 2.2, 0, 6)));
        els.push(textElement(93.8, yP[0] - 1.4, invTag, 2.2, 0, 12));
        // U/V/Wピン箱(外箱の右辺に接する)
        els.push({ ...defaultElement("rect", round(xInvR - 7.5), round(yP[0] - 2.5)), w: 7.5, h: round(yP[2] - yP[0] + 5), label: "" });
        ["U", "V", "W"].forEach((t, i) => els.push(textElement(113.2, yP[i] - 1.4, t, 2.2, 0, 6)));
        // 接地(箱の下辺中央101.25付近のグリッド点から)
        const gx = 100;
        els.push({ ...defaultElement("wire", gx, yBoxBottom), points: [[gx, yBoxBottom], [gx, round(yBoxBottom + 5)]] });
        els.push({ ...defaultElement("ground", round(gx - 2), round(yBoxBottom + 5)), label: "" });
        // --- 通信ツイストペア(チェブロン+信号名+撚り交差+端子で箱の左辺へ) ---
        if (withTwisted) {
          const labels = twLabels.length ? twLabels : ["DA", "DB", "DG", "SLD"];
          els.push(...makeTwistedPairElements({
            count: sigCount,
            pitch: 5,
            x0: 55,
            y0: ySig0,
            span: round(xInvL - 55), // 導体端=端子中心85(グリッド点)。端子円の白抜きが端を隠す
            labels
          }));
          for (let i = 0; i < sigCount; i++) {
            const y = round(ySig0 + 5 * i);
            els.push({ ...defaultElement("terminal", 0, 0), x: round(xInvL - 0.9), y: round(y - 0.9), label: "" });
            if (labels[i]) els.push(textElement(86.6, y - 1.1, labels[i], 1.8, 0, 8));
          }
        }
        // --- インバータ出力 → MC接点 → サーマル(相1/相3のみ) → 端子 → モータ ---
        const phaseNo = ["U", "V", "W"].map(p => p + String(motorTag).replace(/^[A-Za-z]+/, ""));
        yP.forEach((y, i) => {
          els.push({ ...defaultElement("wire", xInvR, y), points: [[xInvR, y], [xMC, y]] });
          els.push({ ...defaultElement("contactNO", xMC, round(y - 2.2)), label: i === 0 ? contactTag : "", tag: contactTag });
          // 端子は中心xTerm=グリッド点。配線は円中心まで届かせ、後から積む端子円が隠す
          if (i === 1) {
            els.push({ ...defaultElement("wire", xMC + 10, y), points: [[round(xMC + 10), y], [xTerm, y]], wireNo: phaseNo[i] });
          } else {
            // MC接点右ピン(xMC+10=130)がサーマル左ピン(xOL)と一致するため中間配線は不要
            els.push({ ...defaultElement("thermalElement", xOL, round(y - 3)), label: i === 0 ? thermalTag : "" });
            els.push({ ...defaultElement("wire", xOL + 10, y), points: [[round(xOL + 10), y], [xTerm, y]], wireNo: phaseNo[i] });
          }
          els.push({ ...defaultElement("wire", xTerm, y), points: [[xTerm, y], [155, y]] });
          els.push({ ...defaultElement("terminal", 0, 0), x: round(xTerm - 0.9), y: round(y - 0.9), label: "" });
        });
        els.push({ ...defaultElement("motor", 154.1, round(yP[0] - 3)), label: motorTag, tag: motorTag, description: motorModel });
        // モータ接地(右下端子→下へ→接地)。接地ピンは第1ピン+(12.5,12.5)=グリッド点
        const mgx = round(154.1 + 13.4);
        const mgy = round(yP[0] - 3 + 15.5);
        els.push({ ...defaultElement("wire", mgx, mgy), points: [[mgx, mgy], [mgx, round(mgy + 5)]] });
        els.push({ ...defaultElement("ground", round(mgx - 2), round(mgy + 5)), label: "" });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("AC電源回路ページを追加しました。");
        render();
      }

      // ダイアログ入力からAC電源回路(受電・分岐)ページを一括生成。見本.pdf頁4/頁12のレイアウトに合わせ、
      // 全接続点を2.5mmグリッド(行は行グリッド)へ乗せる。100V単相時は相2本・変圧器なしで分岐する。
      function buildAcPowerPage() {
        const volt = qs("#acVolt")?.value === "100" ? 100 : 200;
        const groundName = String(qs("#acGround")?.value ?? "G").trim();
        const phaseCount = volt === 200 ? 3 : 2;
        const rawInNames = String(qs("#acInRails")?.value || "");
        const rawOutNames = String(qs("#acOutRails")?.value || "");
        const normalizedInNames = rawInNames.replace(/\s+/g, "");
        const normalizedOutNames = rawOutNames.replace(/\s+/g, "");
        const effectiveInNames = volt === 100 && normalizedInNames === "R,S,T" ? "R,N" : rawInNames;
        const effectiveOutNames = volt === 100 && normalizedOutNames === "R01,S01,T01" ? "R01,N01" : rawOutNames;
        const inNames = effectiveInNames.split(",").map(s => s.trim()).filter(Boolean).slice(0, phaseCount);
        const outNames = effectiveOutNames.split(",").map(s => s.trim()).filter(Boolean).slice(0, phaseCount);
        while (inNames.length < phaseCount) inNames.push((volt === 200 ? ["R", "S", "T"] : ["R", "N"])[inNames.length]);
        while (outNames.length < phaseCount) outNames.push(inNames[outNames.length] + "01");
        const elbTag = qs("#acElbTag")?.value || "ELB0";
        const elbModel = qs("#acElbModel")?.value || "";
        const withPl = (qs("#acPl")?.value || "on") === "on";
        const withLight = (qs("#acLight")?.value || "on") === "on";
        const withFan = (qs("#acFan")?.value || "on") === "on";
        const withRec = (qs("#acRec")?.value || "on") === "on";
        const trVA = volt === 200 ? (qs("#acTr")?.value || "100VA") : "off";
        const withSc1 = (qs("#acSc1")?.value || "on") === "on";
        const withSc2 = (qs("#acSc2")?.value || "on") === "on";
        const withGot = (qs("#acGot")?.value || "on") === "on";
        const page = createPage({ name: "AC電源回路", size: "A4", orientation: "portrait", frameVariant: "ladder", title: "AC電源回路" });
        const els = page.elements;
        const phaseXs = [35, 40, 45].slice(0, phaseCount);
        // 各2線回路を10mm間隔にし、上下とも2.5mm方眼へ載せる。
        const pair = index => templateGridPair(index);
        const yElbTop = 52.5;
        const yElbBot = 65; // 縦向きCP(12.5mmピンピッチ)の下端
        // --- 接地レール+メインアースブロック(点線枠+端子2) ---
        if (groundName) {

      // ダイアログ入力からPLC電源回路ページを一括生成(全接続点グリッド整合)。
      function buildPlcPowerPage() {
        const baseName = qs("#plcpBase")?.value || "PLC BASE";
        const slots = String(qs("#plcpSlots")?.value || "").split(",").map(s => s.trim()).filter(Boolean);
        const pcr1 = String(qs("#plcpPcr1")?.value ?? "PCR1M,PCR1M1").split(",").map(s => s.trim()).filter(Boolean);
        const pcr2 = String(qs("#plcpPcr2")?.value ?? "PCR2M,PCR2M1").split(",").map(s => s.trim()).filter(Boolean);
        if (!slots.length || slots.length > 8) {
          setStatus("PLCスロット構成は1〜8件で入力してください。");
          return;
        }
        if (pcr1.length > 4 || pcr2.length > 4) {
          setStatus("PLC電源回路の接点タグは各列4件以内で入力してください。");
          return;
        }
        if ([...pcr1, ...pcr2].some(tag => tag.length > 12)) {
          setStatus("PLC電源回路の接点タグは12文字以内で入力してください。");
          return;
        }
        const page = createPage({ name: "PLC電源回路", size: "A4", orientation: "portrait", frameVariant: "ladder", title: "PLC電源回路" });
        const els = page.elements;
        [["G", 30], ["N1", 35], ["P0", 40]].forEach(([name, x]) => {
          els.push({ ...defaultElement("wire", x, 30), points: [[x, 30], [x, TEMPLATE_RAIL_BOTTOM]], wireNo: "", hideWireNo: true, ladderRail: name, wireType: state.settings.currentWireType });
          els.push({ ...defaultElement("arrow", x, 35), points: [[x, 35], [x, 30]], label: "", arrowStyle: "fork", ladderRail: name });
          els.push({ ...defaultElement("arrow", x, 212.5), points: [[x, 212.5], [x, TEMPLATE_RAIL_BOTTOM]], label: "", arrowStyle: "fork", ladderRail: name });
          els.push(textElement(round(x - name.length * 0.62), 22.6, name, 2.2, 0, 12));
        });
        els.push({ ...defaultElement("polarityMark", 28.7, 219.9), label: "", sign: "+" });
        els.push(textElement(50, 24.5, "(DC24V)", 1.9, 0, 16));
        // CP4 → P0A → ベースDC+
        const yIn = 102.5, yN = 107.5, yG = 112.5;
        els.push(defaultElement("junction", 40, yIn));
        els.push({ ...defaultElement("wire", 40, yIn), points: [[40, yIn], [55, yIn]] });
        els.push({ ...defaultElement("breaker", 55, round(yIn - 3)), w: 12.5, h: 5, symbolVariant: "cp", label: "CP4", refNo: "2A" });
        els.push({ ...defaultElement("wire", 67.5, yIn), points: [[67.5, yIn], [75, yIn]], wireNo: "P0A", wireNoAlign: "start" });
        els.push(defaultElement("junction", 35, yN));
        els.push({ ...defaultElement("wire", 35, yN), points: [[35, yN], [75, yN]] });
        els.push(defaultElement("junction", 30, yG));
        els.push({ ...defaultElement("wire", 30, yG), points: [[30, yG], [75, yG]] });
        // PLCベース箱+スロット
        const baseL = 75, baseR = 150, baseT = 90, baseB = 140;
        els.push({ ...defaultElement("rect", baseL, baseT), w: round(baseR - baseL), h: round(baseB - baseT), label: "" });
        els.push(textElement(baseL, 87.4, baseName, 2, 0, 60));
        const slotAreaL = baseL + 15;
        const totalGridUnits = Math.round((baseR - slotAreaL) / 2.5);
        const baseUnits = Math.floor(totalGridUnits / slots.length);
        const extraUnits = totalGridUnits % slots.length;
        let slotX = slotAreaL;
        slots.forEach((slot, i) => {
          const sx = round(slotX);
          const slotW = (baseUnits + (i < extraUnits ? 1 : 0)) * 2.5;
          if (i > 0) els.push({ ...defaultElement("line", sx, baseT), points: [[sx, baseT], [sx, baseB]], label: "" });
          els.push({ ...textElement(snapToGrid(sx + slotW / 2), baseT + 2.5, slot, 1.5, 90, baseB - baseT - 5), align: "start" });
          slotX += slotW;
        });
        els.push({ ...defaultElement("line", baseL + 15, baseT), points: [[round(baseL + 15), baseT], [round(baseL + 15), baseB]], label: "" });
        els.push(textElement(baseL + 1.5, round(yIn + 0.7), "DC+", 1.6, 0, 12));
        els.push(textElement(baseL + 1.5, round(yN + 0.7), "DC-", 1.6, 0, 12));
        els.push(textElement(baseL + 1.5, round(yG + 0.7), "⏚", 1.6, 0, 12));
        // 分岐行(入出力COM/制御電源/運転準備/動力供給)
        const row = i => round(templateGridRow(14) + TEMPLATE_CIRCUIT_PITCH * (i - 14));
        const pushOut = (y, cpTag, rating, contacts, wireNo, note) => {
          els.push(defaultElement("junction", 40, y));
          let sx = 40;
          if (cpTag) {
            els.push({ ...defaultElement("wire", 40, y), points: [[40, y], [55, y]] });
            els.push({ ...defaultElement("breaker", 55, round(y - 3)), w: 12.5, h: 5, symbolVariant: "cp", label: cpTag, refNo: rating });
            sx = 67.5;
          }
          let cx = 75;
          (contacts || []).forEach(tag => {
            els.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [round(cx), y]] });
            els.push({ ...defaultElement("contactNO", cx, round(y - 2.2)), label: tag, tag });
            sx = cx + 10;
            cx += 20;
          });
          els.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [147.5, y]] });
          els.push({ ...defaultElement("arrow", 147.5, y), points: [[147.5, y], [172.5, y]], label: wireNo, arrowStyle: "open", signalRole: "source" });
          els.push(textElement(155, round(y + 3.4), note, 1.8, 0, 20));
        };
        els.push(defaultElement("junction", 35, row(14)));
        els.push({ ...defaultElement("wire", 35, row(14)), points: [[35, row(14)], [147.5, row(14)]] });
        els.push({ ...defaultElement("arrow", 147.5, row(14)), points: [[147.5, row(14)], [172.5, row(14)]], label: "N1", arrowStyle: "open", signalRole: "source" });
        els.push(textElement(155, round(row(14) + 3.4), "入出力COM", 1.8, 0, 20));
        pushOut(row(15), "CP5", "2A", [], "P1", "制御電源");
        pushOut(row(16), "CP6", "2A", pcr1, "P3", "運転準備");
        pushOut(row(17), "CP7", "2A", pcr2, "P3M", "動力供給");
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("PLC電源回路ページを追加しました。");
        render();
      }

      // ダイアログ入力からラング回路(左レール→直列接点→コイル/ランプ→右レール)を行単位で生成。
      function buildRungCircuits() {
        const page = currentPage();
        if (!page) return;
        const row0 = Math.max(0, Math.min(20, Math.floor(Number(qs("#rcRow").value || 1))));
        const rows = Math.max(1, Math.min(20, Math.floor(Number(qs("#rcCount").value || 1))));
        const nContacts = Math.max(0, Math.min(4, Math.floor(Number(qs("#rcContacts").value || 2))));
        const endType = qs("#rcEnd").value === "lamp" ? "lamp" : "coil";
        const created = [];
        const rails = ladderRailSpanX(page, true);
        const leftX = rails.left;
        const rightX = rails.right;
        for (let r = 0; r < rows && row0 + r <= 20; r++) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * (row0 + r));
          created.push(defaultElement("junction", leftX, y));
          let sx = leftX;
          for (let k = 0; k < nContacts; k++) {
            const cx = 45 + 17.5 * k; // 接点ピッチ17.5=2.5mmグリッド整合(左ピンが乗る)
            created.push({ ...defaultElement("contactNO", cx, round(y - 2.2)), label: "" });
            created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [round(cx), y]] });
            sx = cx + 10;
          }
          const endX = 135;
          created.push({ ...defaultElement(endType, endX, round(y - 2.2)), label: "" });
          created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), y], [endX, y]] });
          created.push({ ...defaultElement("wire", endX + 10, y), points: [[endX + 10, y], [rightX, y]] });
          created.push(defaultElement("junction", rightX, y));
        }
        page.elements.push(...created);
        setSelection(created.map(el => el.id));
        closeDialog();
        commitHistory(rows + "行のラング回路を生成しました。");
        render();
      }

      // ===== ページ間ネットリスト(信号矢印で結合した同電位グループ) =====
      function buildProjectNetlist() {
        const groups = [];
        state.pages.forEach(page => {
          buildWireNets(page).forEach(net => {
            const members = net.filter(wire => !wire.ladderRail);
            if (!members.length) return;
            groups.push({
              pages: [page],
              items: members.map(wire => ({ page, wire })),
              wireNos: new Set(members.map(wire => wire.wireNo).filter(Boolean)),
              signals: new Set(netArrowLabels(page, net)),
              merged: false
            });
          });
        });
        // 同じ信号ラベルに接するグループをページ横断で統合する
        const bySignal = new Map();
        groups.forEach(group => {
          group.signals.forEach(signal => {
            const list = bySignal.get(signal) || [];
            list.push(group);
            bySignal.set(signal, list);
          });
        });
        bySignal.forEach(list => {
          const base = list.find(group => !group.merged);
          if (!base) return;
          list.forEach(group => {
            if (group === base || group.merged) return;
            base.pages.push(...group.pages);
            base.items.push(...group.items);
            group.wireNos.forEach(no => base.wireNos.add(no));
            group.signals.forEach(signal => base.signals.add(signal));
            group.merged = true;
          });
        });
        return groups.filter(group => !group.merged).map(group => {
          const pageNames = Array.from(new Set(group.pages.map(page => page.name)));
          return {
            name: Array.from(group.wireNos).join(" / ") || Array.from(group.signals).join(" / ") || "(未採番)",
            signals: Array.from(group.signals).join(" / "),
            pages: pageNames,
            wireCount: group.items.length,
            first: group.items[0]
          };
        }).sort((a, b) => a.name.localeCompare(b.name));
      }

      // 部品カタログをcatalog.csvへ出力(BOM付きUTF-8、Excel互換)。
      function exportCatalogCsv() {
        const header = ["family", "manufacturer", "catalog", "description", "rating", "maxNO", "maxNC"];
        const lines = [header.join(",")];
        (state.catalog || []).forEach(item => {
          lines.push(header.map(key => {

      // カタログCSVの見出し(和英エイリアス)を正規化して品目配列へ変換。
      function normalizeCatalogCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          family: ["family", "種別", "ファミリ", "接頭辞"],
          manufacturer: ["manufacturer", "メーカー", "メーカ", "maker"],
          catalog: ["catalog", "品番", "型式", "型番", "partno"],
          description: ["description", "説明", "名称", "品名"],
          rating: ["rating", "定格", "仕様"],
          maxNO: ["maxno", "a上限", "no上限"],
          maxNC: ["maxnc", "b上限", "nc上限"]
        };
        const headerCells = rows[0].map(cell => cell.toLowerCase().replace(/\s+/g, ""));
        const columns = {};
        Object.entries(aliases).forEach(([key, names]) => {
          const index = headerCells.findIndex(cell => names.includes(cell));
          if (index >= 0) columns[key] = index;
        });
        const hasHeader = columns.catalog !== undefined || columns.description !== undefined;
        const dataRows = hasHeader ? rows.slice(1) : rows;
        if (!hasHeader) {
          ["family", "manufacturer", "catalog", "description", "rating", "maxNO", "maxNC"].forEach((key, i) => { columns[key] = i; });
        }
        return dataRows.map(cells => {
          const pick = key => (columns[key] === undefined ? "" : (cells[columns[key]] || "").trim());
          const numeric = value => (value === "" ? undefined : Number(value));
          return {
            family: pick("family"),
            manufacturer: pick("manufacturer"),
            catalog: pick("catalog"),
            description: pick("description"),
            rating: pick("rating"),
            maxNO: numeric(pick("maxNO")),
            maxNC: numeric(pick("maxNC"))
          };
        }).filter(item => item.catalog || item.description);
      }

      // カタログCSVを取込(品番一致は上書き、他は追加)。
      function importCatalogCsvFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const items = normalizeCatalogCsvRows(parseDelimitedRows(String(reader.result || "")));
          if (!items.length) {
            setStatus("カタログCSVに取り込める行がありません。ヘッダ（品番/説明など）を確認してください。");
            return;
          }
          if (!Array.isArray(state.catalog)) state.catalog = [];
          let added = 0;
          let updated = 0;
          items.forEach(item => {
            const existing = item.catalog ? state.catalog.find(row => row.catalog === item.catalog) : null;
            if (existing) {
              Object.assign(existing, item);
              updated++;
            } else {
              state.catalog.push(item);
              added++;
            }
          });
          commitHistory("カタログCSVを取り込みました。");
          setStatus(`カタログCSVを取り込みました（追加${added}件・更新${updated}件）。`);
          showCatalogManager();
        };
        reader.readAsText(file);
      }

      // ===== BOM(部品集計表) =====
      function collectBomRows() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            if (!supportsElectricalAttributes(element)) return;
            if (!tagPrefix(element.type)) return;
            const key = [element.manufacturer || "", element.catalog || "", element.type].join("::");
            const row = map.get(key) || {
              type: paletteLabel(element.type),
              manufacturer: element.manufacturer || "",
              catalog: element.catalog || "",
              description: element.description || "",
              rating: element.rating || "",
              qty: 0,
              tags: []
            };
            row.qty += 1;
            const tag = componentTag(element);
            if (tag) row.tags.push(tag);
            map.set(key, row);
          });
        });
        return Array.from(map.values()).sort((a, b) =>
          a.type.localeCompare(b.type) || a.manufacturer.localeCompare(b.manufacturer) || a.catalog.localeCompare(b.catalog));
      }

      // ===== 端子台プラン表(端子ごとの配線・接続先一覧) =====
      function collectTerminalPlanRows() {
        const out = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => ["terminalStrip", "connector"].includes(element.type))
            .forEach(strip => {
              const count = Math.max(1, Number(strip.count || 1));
              const total = strip.stripStyle === "unit" && Number(strip.levels) === 2 ? count * 2 : count;
              const start = Number(strip.start || 1);
              const jumperPairs = terminalJumperPairs(strip);
              for (let i = 0; i < total; i++) {
                const node = terminalStripNodeGlobal(strip, i);
                // 端子小円を挟んで配線が届く構成があるため、許容は2.5mmとする
                const wires = page.elements.filter(wire => wire.type === "wire"
                  && wireEndpointsOf(wire).some(point => Math.hypot(point[0] - node.x, point[1] - node.y) <= 2.5));
                const wireNos = Array.from(new Set(wires.map(wire => wire.wireNo).filter(Boolean)));
                const dests = Array.from(new Set(wires.map(wire => {
                  const ends = wireEndpointsOf(wire);
                  const far = Math.hypot(ends[0][0] - node.x, ends[0][1] - node.y) <= 2.5 ? ends[1] : ends[0];
                  return nearestElementName(page, far[0], far[1], wire.id);
                }).filter(Boolean)));
                const no = start + i;
                const jumpers = i < count
                  ? jumperPairs.filter(([a, b]) => a === no || b === no).map(pair => pair.join("-")).join(",")
                  : "";
                out.push({
                  page: page.name,
                  strip: strip.label || paletteLabel(strip.type),
                  terminal: terminalLabel(strip, i),
                  wireNo: wireNos.join(" / "),
                  dest: dests.join(" / "),
                  jumpers
                });
              }
            });
        });
        return out;
      }

            rotation: 0, stroke: state.settings.stroke, layer: "layout"

      // ===== ケーブル・芯線管理 =====
      function cableCoreRows() {
        const stored = Array.isArray(state.cables) ? state.cables : [];
        const markers = [];
        state.pages.forEach(page => page.elements.filter(item => item.type === "cableMarker").forEach(element => {
          markers.push({
            tag: element.cableTag || element.label || "",
            core: element.coreNo || "", color: element.coreColor || "", gauge: element.gauge || "",
            status: element.coreStatus || "used", shielded: !!element.shielded,
            from: element.from || "", to: element.to || ""
          });
        }));
        const keyed = new Map();
        [...stored, ...markers].forEach(row => keyed.set([row.tag, row.core].join("\u0000"), { ...row }));
        return [...keyed.values()];
      }

          const rows = qsa("[data-cable-row]", qs("#dialogBody")).map(row => {

              status: value("status").value, from: value("from").value.trim(), to: value("to").value.trim(),
              shielded: value("shielded").checked

      // ===== ユーザー回路 =====
      function saveSelectedAsUserCircuit() {
        const selected = selectedElements();
        if (!selected.length) { setStatus("登録する回路要素を選択してください。"); return; }
        const name = prompt("ユーザー回路名", "回路" + ((state.userCircuits || []).length + 1));
        if (!name) return;
        const box = unionBounds(selected.map(elementBounds).filter(Boolean));

        elements.forEach(item => translateElement(item, -box.x, -box.y));
        state.userCircuits.push({ id: uid("circuit"), name, w: box.w, h: box.h, elements });
        commitHistory("ユーザー回路「" + name + "」を登録しました。"); setStatus("ユーザー回路を登録しました。");
      }

      function showUserCircuitInsertDialog() {
        const circuits = state.userCircuits || [];
        if (!circuits.length) { openDialog("ユーザー回路", '<p class="muted">登録済みのユーザー回路がありません。</p>'); return; }
        openDialog("ユーザー回路を挿入", `<label>回路</label><select id="userCircuitPick">${circuits.map((item, index) => `<option value="${index}">${escapeHtml(item.name)}</option>`).join("")}</select>

      function syncPanelFootprints(direction = "toPanel") {
        let count = 0;
        state.pages.forEach(page => page.elements.filter(item => item.type === "rect" && item.panelRef).forEach(footprint => {
          let source = null;
          state.pages.some(candidate => (source = candidate.elements.find(item => item.id !== footprint.id && componentTag(item) === footprint.panelRef)) || false);
          if (!source) return;
          if (direction === "toSchematic") {
            source.manufacturer = footprint.manufacturer || "";
            source.catalog = footprint.catalog || "";
            source.description = footprint.description || "";
            source.installation = footprint.installation || source.installation || "";
            source.location = footprint.location || source.location || "";
          } else {
            footprint.label = componentTag(source);
            footprint.panelRef = componentTag(source);
            footprint.manufacturer = source.manufacturer || "";
            footprint.catalog = source.catalog || "";
            footprint.description = source.description || "";
            footprint.installation = source.installation || "";
            footprint.location = source.location || "";
          }
          count += 1;
        }));
        if (!count) { setStatus("同期対象のフットプリントがありません。"); return; }
        commitHistory(count + "個の盤フットプリントを" + (direction === "toSchematic" ? "回路図へ反映しました。" : "同期しました。")); render();
      }

      // ===== 標準パック外部化 =====
      function exportStandardPack() {
        const pack = {
          packVersion: 1,
          id: "pack-" + Date.now().toString(36),
          label: prompt("標準パック名", "カスタム標準") || "カスタム標準",
          grid: state.settings.grid,
          wireNumberFormat: state.settings.wireNumberFormat,
          componentTagFormat: state.settings.componentTagFormat,
          componentTagPrefixes: deepClone(state.settings.componentTagPrefixes || {}),
          wireTypes: deepClone(state.wireTypes),
          layers: deepClone(state.layers),
          auditRules: deepClone(state.settings.auditRules || {}),
          reportColumns: deepClone(state.settings.reportColumns || {}),
          customSymbols: deepClone(state.customSymbols || []),
          catalog: deepClone(state.catalog || []),
          plcModules: deepClone(state.plcModules || []),
          frameVariant: currentPage()?.frameVariant || "ladder",
          titleLayouts: state.titleLayouts ? deepClone(state.titleLayouts) : undefined
        };
        download("standard-pack.json", JSON.stringify(pack, null, 2), "application/json");
        setStatus("標準パックを書き出しました。");
      }

      // 標準パックの形を検証する(不正パックで状態を壊さないための入口検査)。
      // エラーは「どの項目が」分かるようパス付きで返す。
      function validateStandardPack(pack) {
        const errors = [];
        if (!pack || typeof pack !== "object" || Array.isArray(pack)) return ["パック全体: オブジェクトではありません"];
        try {
          findUnsafeJsonKeyPath(pack, "パック全体");
        } catch (error) {
          return [error.message];
        }
        if (pack.packVersion !== 1) errors.push("packVersion: 1 のみ対応です");
        if (!pack.id || typeof pack.id !== "string") errors.push("id: 文字列が必要です");
        if (pack.grid !== undefined && (!Number.isFinite(pack.grid) || pack.grid <= 0)) errors.push("grid: 正の数値が必要です");
        if (pack.frameVariant !== undefined && typeof pack.frameVariant !== "string") errors.push("frameVariant: 文字列が必要です");
        const arrayChecks = [
          ["wireTypes", item => item && typeof item.id === "string" && typeof item.label === "string", "id/label付きの配列"],
          ["layers", item => item && typeof item.id === "string" && typeof item.label === "string", "id/label付きの配列"],
          ["customSymbols", item => isPlainObject(item) && typeof item.id === "string", "id付きの配列"],
          ["catalog", item => item && typeof item === "object" && !Array.isArray(item), "オブジェクトの配列"],
          ["plcModules", item => item && typeof item.label === "string", "label付きの配列"]
        ];
        arrayChecks.forEach(([key, isValid, description]) => {
          if (pack[key] === undefined) return;
          if (!Array.isArray(pack[key])) {
            errors.push(key + ": " + description + "が必要です");
            return;
          }
          pack[key].forEach((item, index) => {
            if (!isValid(item)) errors.push(key + "[" + index + "]: 形式が不正です");
          });
        });
        ["auditRules", "reportColumns", "componentTagPrefixes", "titleLayouts"].forEach(key => {
          if (pack[key] !== undefined && (typeof pack[key] !== "object" || Array.isArray(pack[key]))) {
            errors.push(key + ": オブジェクトが必要です");
          }
        });
        (Array.isArray(pack.customSymbols) ? pack.customSymbols : []).forEach((symbol, index) => errors.push(...validateCustomSymbol(symbol, "customSymbols[" + index + "]")));
        if (pack.titleLayouts !== undefined && isPlainObject(pack.titleLayouts)) errors.push(...validateTitleLayouts(pack.titleLayouts));
        return errors;
      }

      // 標準パックJSONを読み込み・検証して適用。
      // - 入口検証NGなら状態を一切変えず、項目パス付きで理由を表示する
      // - 同じidのパックは重複追加せず更新として置き換える
      // - 適用途中の失敗時は退避しておいた設定へ戻す(半分だけ適用された状態を残さない)
      function importStandardPackFile(file) {
        const reader = new FileReader();
        reader.onerror = () => setStatus("標準パックを読み込めませんでした: " + (file?.name || ""));
        reader.onload = () => {
          let pack;
          try {
            pack = JSON.parse(reader.result);
          } catch (error) {
            setStatus("標準パックの取込に失敗しました: JSONを解釈できません（" + error.message + "）");
            return;
          }
          const errors = validateStandardPack(pack);
          if (errors.length) {
            setStatus("標準パックの取込を中止しました: " + errors.slice(0, 3).join(" ／ ") + (errors.length > 3 ? " 他" + (errors.length - 3) + "件" : ""));
            return;
          }
          const rollback = {
            settings: deepClone(state.settings),
            wireTypes: deepClone(state.wireTypes),
            layers: deepClone(state.layers),
            plcModules: deepClone(state.plcModules || []),
            customSymbols: deepClone(state.customSymbols || []),
            catalog: deepClone(state.catalog || []),
            standardPacks: deepClone(state.standardPacks || []),
            titleLayouts: state.titleLayouts ? deepClone(state.titleLayouts) : undefined,
            frameVariants: state.pages.map(page => page.frameVariant)
          };
          try {
            state.standardPacks = state.standardPacks || [];
            const existingIndex = state.standardPacks.findIndex(item => item && item.id === pack.id);
            const isUpdate = existingIndex >= 0;
            if (isUpdate) state.standardPacks[existingIndex] = deepClone(pack);
            else state.standardPacks.push(deepClone(pack));
            state.settings.standard = pack.id;
            applyStandardPack(pack);
            render();
            commitHistory("標準パック「" + (pack.label || pack.id) + "」を" + (isUpdate ? "更新して" : "") + "適用しました。");
          } catch (error) {
            Object.assign(state, {
              settings: rollback.settings,
              wireTypes: rollback.wireTypes,
              layers: rollback.layers,
              plcModules: rollback.plcModules,
              customSymbols: rollback.customSymbols,
              catalog: rollback.catalog,
              standardPacks: rollback.standardPacks
            });
            if (rollback.titleLayouts) state.titleLayouts = rollback.titleLayouts; else delete state.titleLayouts;
            state.pages.forEach((page, index) => { page.frameVariant = rollback.frameVariants[index]; });
            render();
            setStatus("標準パックの適用中に失敗したため、取込前の設定へ戻しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      // 標準パックをstateへ反映。設定値は上書き、ユーザー部品はID重複スキップ、カタログは品番一致を上書き統合、
      // PLCプリセットはラベル重複スキップ。新しいパック項目はexportStandardPack()と対で追加する。
      function applyStandardPack(pack) {
        if (pack.grid) state.settings.grid = pack.grid;
        if (pack.wireNumberFormat) state.settings.wireNumberFormat = pack.wireNumberFormat;
        if (pack.componentTagFormat) state.settings.componentTagFormat = pack.componentTagFormat;
        if (pack.componentTagPrefixes) state.settings.componentTagPrefixes = deepClone(pack.componentTagPrefixes);
        if (Array.isArray(pack.wireTypes) && pack.wireTypes.length) state.wireTypes = deepClone(pack.wireTypes);
        if (Array.isArray(pack.layers) && pack.layers.length) state.layers = deepClone(pack.layers);
        if (pack.auditRules && typeof pack.auditRules === "object") state.settings.auditRules = deepClone(pack.auditRules);
        if (pack.reportColumns && typeof pack.reportColumns === "object") state.settings.reportColumns = deepClone(pack.reportColumns);
        if (Array.isArray(pack.plcModules)) {
          state.plcModules = state.plcModules || [];
          pack.plcModules.forEach(preset => {
            if (!preset || !preset.label) return;
            if (state.plcModules.some(item => item.label === preset.label)) return;
            state.plcModules.push(deepClone(preset));
          });
        }
        if (Array.isArray(pack.customSymbols)) {
          state.customSymbols = state.customSymbols || [];
          pack.customSymbols.forEach(symbol => {
            if (!symbol || !symbol.id) return;
            if (state.customSymbols.some(item => item.id === symbol.id)) return;
            state.customSymbols.push(deepClone(symbol));
          });
        }
        if (Array.isArray(pack.catalog)) {
          state.catalog = state.catalog || [];
          pack.catalog.forEach(item => {
            if (!item) return;
            const existingIndex = item.catalog ? state.catalog.findIndex(row => row.catalog === item.catalog) : -1;
            if (existingIndex >= 0) state.catalog[existingIndex] = { ...state.catalog[existingIndex], ...deepClone(item) };
            else state.catalog.push(deepClone(item));
          });
        }
        if (pack.frameVariant) {
          const page = currentPage();
          if (page) page.frameVariant = pack.frameVariant;
        }
        if (pack.titleLayouts && typeof pack.titleLayouts === "object") {
          state.titleLayouts = deepClone(pack.titleLayouts);
        }
      }

      // 表題欄レイアウト(compact/detailed)のJSON編集ダイアログ。
      // 有効中のレイアウトを表示し、編集して適用するとstate.titleLayoutsへ保存(標準パックにも同梱)。
      function showTitleLayoutEditor() {
        const effective = {
          compact: titleLayoutFor("compact"),
          detailed: titleLayoutFor("detailed")
        };
        openDialog("表題欄レイアウト編集（JSON）", `
          <p class="muted">「基本(compact)」「詳細(detailed)」表題欄の罫線とセル配置をJSONで調整できます。
          w/h=外形mm、rows/cols=罫線("rest"=残り幅)、cells=文字(label=固定文字、field=表題欄の値、revBlock=改訂欄)。
          既定へ戻すには「既定に戻す」を押します。設備標準図枠(行番号つき)は対象外です。</p>
          <textarea id="titleLayoutJson" style="width:100%;height:300px;font-family:ui-monospace,Consolas,monospace;font-size:11px">${escapeHtml(JSON.stringify(effective, null, 2))}</textarea>
          <div class="inline" style="justify-content:space-between;margin-top:12px">
            <button type="button" id="titleLayoutResetBtn">既定に戻す</button>
            <button type="button" id="titleLayoutApplyBtn" class="primary">適用</button>
          </div>`);
        qs("#titleLayoutApplyBtn").addEventListener("click", () => {
          try {
            const parsed = JSON.parse(qs("#titleLayoutJson").value);
            const errors = validateTitleLayouts(parsed);
            if (errors.length) throw new Error(errors.slice(0, 3).join(" ／ ") + (errors.length > 3 ? " 他" + (errors.length - 3) + "件" : ""));
            const hadLayouts = Object.prototype.hasOwnProperty.call(state, "titleLayouts");
            const previous = hadLayouts ? deepClone(state.titleLayouts) : undefined;
            try {
              state.titleLayouts = deepClone(parsed);
              render();
              commitHistory("表題欄レイアウトを更新しました。");
              closeDialog();
            } catch (error) {
              if (hadLayouts) state.titleLayouts = previous; else delete state.titleLayouts;
              try { render(); } catch (_) { /* 元レイアウトの再描画失敗より元の原因を優先する */ }
              throw error;
            }
          } catch (error) {
            setStatus("表題欄レイアウトの適用に失敗しました: " + error.message);
          }

        qs("#titleLayoutResetBtn").addEventListener("click", () => {

      // ===== 図面差分ビューア(旧版JSONと現在の比較) =====
      // 要素ID基準で 追加(現在のみ)/削除(旧のみ)/変更(両方にあるが内容差) を判定し、
      // ページごとのサマリ表+重ね描画(追加=緑枠、変更=橙枠、削除=赤ゴースト)で表示する。
      function startDiffViewer() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json,application/json";
        input.addEventListener("change", () => {
          const file = input.files && input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const oldData = normalizeProjectData(JSON.parse(reader.result));
              showDiffViewer(oldData, file.name);
            } catch (error) {
              setStatus("比較ファイルの読み込みに失敗しました: " + error.message);
            }
          };
          reader.readAsText(file);
        });
        input.click();
      }

      // 2版のページ/要素を突き合わせて差分マップを作る。
      function diffProjects(oldData) {
        const stripId = element => {
          const clone = deepClone(element);
          delete clone.id;
          return JSON.stringify(clone);
        };
        const result = [];
        const oldPages = new Map((oldData.pages || []).map(page => [page.id, page]));
        const newPages = new Map(state.pages.map(page => [page.id, page]));
        state.pages.forEach(page => {
          const oldPage = oldPages.get(page.id);
          const entry = { pageId: page.id, name: page.name || "", oldName: oldPage?.name || "", status: oldPage ? "common" : "added", added: [], removed: [], changed: [] };
          if (oldPage) {
            const oldEls = new Map((oldPage.elements || []).map(el => [el.id, el]));
            (page.elements || []).forEach(el => {
              const before = oldEls.get(el.id);
              if (!before) entry.added.push(el);
              else if (stripId(before) !== stripId(el)) entry.changed.push(el);
            });
            (oldPage.elements || []).forEach(el => {
              if (!(page.elements || []).some(item => item.id === el.id)) entry.removed.push(el);
            });
          } else {
            entry.added = (page.elements || []).slice();
          }
          result.push(entry);
        });
        (oldData.pages || []).forEach(page => {
          if (!newPages.has(page.id)) {
            result.push({ pageId: page.id, name: page.name || "", oldName: page.name || "", status: "removedPage", added: [], removed: (page.elements || []).slice(), changed: [] });
          }
        });
        return result;
      }

      // 差分ダイアログ本体。ページ選択+重ね描画+サマリ表。
      function showDiffViewer(oldData, fileName) {
        const diffs = diffProjects(oldData);
        const total = diffs.reduce((sum, d) => sum + d.added.length + d.removed.length + d.changed.length, 0);
        openDialog("図面差分（旧版との比較）", `
          <p class="muted">比較対象: ${escapeHtml(fileName || "旧版JSON")}（旧版）→ 現在の図面。
          <span style="color:#1b7f4d;font-weight:700">緑=追加</span> ／
          <span style="color:#b45309;font-weight:700">橙=変更</span> ／
          <span style="color:#b42318;font-weight:700">赤=削除（旧版の内容をうすく表示）</span>。差分合計: ${total}件</p>
          <table class="report-table">
            <thead><tr><th>ページ</th><th>追加</th><th>変更</th><th>削除</th><th></th></tr></thead>
            <tbody>${diffs.map((d, index) => `<tr>
              <td>${escapeHtml(d.name || d.oldName)}${d.status === "removedPage" ? "（ページ削除）" : d.status === "added" ? "（ページ追加）" : (d.oldName && d.oldName !== d.name ? "（旧名: " + escapeHtml(d.oldName) + "）" : "")}</td>
              <td>${d.added.length}</td><td>${d.changed.length}</td><td>${d.removed.length}</td>
              <td>${d.status !== "removedPage" ? `<button type="button" data-diff-page="${index}">表示</button>` : ""}</td>
            </tr>`).join("")}</tbody>
          </table>
          <div id="diffPreview" style="margin-top:12px;background:#e8ecf1;padding:12px;border-radius:6px;display:none">
            <div id="diffPreviewHost" style="background:#fff;box-shadow:0 2px 10px rgba(20,31,44,.18)"></div>
          </div>`, { wide: true });
        qsa("[data-diff-page]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const diff = diffs[Number(button.dataset.diffPage)];
            const page = state.pages.find(p => p.id === diff.pageId);
            if (!page) return;
            renderDiffPreview(page, diff, oldData);
          });
        });
        setStatus("差分を表示しました（追加" + diffs.reduce((s, d) => s + d.added.length, 0) + "・変更" + diffs.reduce((s, d) => s + d.changed.length, 0) + "・削除" + diffs.reduce((s, d) => s + d.removed.length, 0) + "）。");
      }

      // 1ページ分の差分重ね描画。現在版の上に、削除要素の赤ゴーストと差分枠を重ねる。
      function renderDiffPreview(page, diff, oldData) {
        const wrap = qs("#diffPreview");
        const host = qs("#diffPreviewHost");
        if (!wrap || !host) return;
        wrap.style.display = "block";
        host.innerHTML = "";
        const svg = svgEl("svg", {});
        drawPageSvg(svg, page, { selection: false, grid: false, scaled: false, output: true });
        svg.style.width = "100%";
        svg.style.height = "auto";
        svg.style.display = "block";
        // 削除要素: 旧版の姿を赤の半透明ゴーストで重ねる
        diff.removed.forEach(element => {
          const ghost = deepClone(element);
          ghost.id = "diff-ghost-" + ghost.id;
          ghost.stroke = "#b42318";
          const g = svgEl("g", { opacity: .45, "pointer-events": "none" });
          drawElement(g, ghost);
          svg.appendChild(g);
        });
        // 枠: 追加=緑 / 変更=橙 / 削除=赤
        const frameFor = (element, color) => {
          const box = elementBounds(element);
          if (!box) return;
          svg.appendChild(svgEl("rect", {
            x: box.x - 1.2, y: box.y - 1.2, width: box.w + 2.4, height: box.h + 2.4,
            fill: "none", stroke: color, "stroke-width": .4, "stroke-dasharray": "1.6 1",
            "pointer-events": "none"
          }));
        };
        diff.added.forEach(element => frameFor(element, "#1b7f4d"));
        diff.changed.forEach(element => frameFor(element, "#b45309"));
        diff.removed.forEach(element => frameFor(element, "#b42318"));
        host.appendChild(svg);
      }

      // ===== DXF取込 MVP(LINE/CIRCLE/TEXT/LWPOLYLINE) =====
      function importDxfFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const elements = dxfEntitiesToElements(String(reader.result || ""));
            if (!elements.length) {
              setStatus("DXFから取り込める要素がありません。");
              return;
            }
            const page = currentPage();
            page.elements.push(...elements);
            setSelection(elements.map(el => el.id));
            commitHistory("DXFから" + elements.length + "要素を取り込みました。");
            render();
          } catch (error) {
            setStatus("DXF取込に失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      // DXFテキストからLINE/CIRCLE/TEXT/LWPOLYLINE/ARC(12分割折れ線)を要素配列へ変換(トレース用)。
      function dxfEntitiesToElements(text) {
        const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        const page = currentPage();
        const H = pageSize(page).h;
        const flipY = y => round(H - Number(y || 0));
        const out = [];
        let inEntities = false;
        let current = null;
        const flush = () => {
          if (!current) return;
          const d = current.data;
          if (current.name === "LINE" && d[10] !== undefined && d[11] !== undefined) {
            out.push({ id: uid("el"), type: "line", points: [[round(d[10]), flipY(d[20])], [round(d[11]), flipY(d[21])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
          } else if (current.name === "CIRCLE" && d[40] !== undefined) {
            const r = Number(d[40]);
            out.push({ ...defaultElement("circle", round(d[10] - r), round(flipY(d[20]) - r)), w: round(r * 2), h: round(r * 2), label: "" });
          } else if (current.name === "TEXT" && d[1] !== undefined) {
            out.push({ ...defaultElement("text", round(d[10] || 0), flipY(d[20])), text: String(d[1]), fontSize: Number(d[40] || 2.5) });
          } else if (current.name === "ARC" && d[40] !== undefined) {
            // 円弧は12分割の折れ線として取り込む(CADのCCW角度→画面系へ変換)
            const r = Number(d[40]);
            const cx = Number(d[10] || 0);
            const cyCad = Number(d[20] || 0);
            let a0 = Number(d[50] || 0);
            let a1 = Number(d[51] || 0);
            if (a1 <= a0) a1 += 360;
            const steps = 12;
            let prev = null;
            for (let k = 0; k <= steps; k++) {
              const a = (a0 + (a1 - a0) * k / steps) * Math.PI / 180;
              const px = round(cx + r * Math.cos(a));
              const py = flipY(cyCad + r * Math.sin(a));
              if (prev) {
                out.push({ id: uid("el"), type: "line", points: [prev, [px, py]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
              }
              prev = [px, py];
            }
          } else if (current.name === "LWPOLYLINE" && (current.pts || []).filter(pt => pt.length === 2).length >= 2) {
            const pts = current.pts.filter(pt => pt.length === 2);
            for (let i = 1; i < pts.length; i++) {
              out.push({ id: uid("el"), type: "line", points: [[round(pts[i - 1][0]), flipY(pts[i - 1][1])], [round(pts[i][0]), flipY(pts[i][1])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
            }
          }
          current = null;
        };
        for (let i = 0; i + 1 < lines.length; i += 2) {
          const code = Number(lines[i].trim());
          const value = lines[i + 1].trim();
          if (code === 2 && value === "ENTITIES") {
            inEntities = true;
            continue;
          }
          if (code === 0) {
            if (value === "ENDSEC") {
              flush();
              inEntities = false;
              continue;
            }
            if (inEntities) {
              flush();
              current = { name: value, data: {}, pts: [] };
              continue;
            }
          }
          if (inEntities && current) {
            if (current.name === "LWPOLYLINE" && code === 10) current.pts.push([Number(value)]);
            else if (current.name === "LWPOLYLINE" && code === 20 && current.pts.length) current.pts[current.pts.length - 1].push(Number(value));
            else if (current.data[code] === undefined) current.data[code] = isNaN(Number(value)) ? value : Number(value);
          }
        }
        flush();
        return out;
      }

      // ===== グループ化 =====
      function groupSelected() {
        const selected = selectedElements();
        if (selected.length < 2) {
          setStatus("グループ化するには2つ以上の要素を選択してください。");
          return;
        }
        const groupId = uid("grp");
        selected.forEach(element => { element.group = groupId; });
        commitHistory(selected.length + "件をグループ化しました。");
        render();
      }

      // 選択要素のグループ解除(groupIdを除去)。
      function ungroupSelected() {
        const selected = selectedElements();
        let count = 0;
        selected.forEach(element => {
          if (element.group) {
            delete element.group;
            count += 1;
          }
        });
        if (!count) {
          setStatus("グループ化された要素がありません。");
          return;
        }
        commitHistory("グループを解除しました。");
        render();
      }

      // 選択に含まれる要素のグループ仲間まで選択を拡張(グループ単位の移動・削除用)。
      function expandSelectionToGroups() {
        const page = currentPage();
        if (!page) return;
        const groups = new Set(selectedElements().map(el => el.group).filter(Boolean));
        if (!groups.size) return;
        setSelection(page.elements
          .filter(el => selectedIds.includes(el.id) || groups.has(el.group))
          .map(el => el.id));
      }

      // ===== 左右ミラー・等間隔複製 =====
      function mirrorSelectedHorizontal() {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素はミラーできません。");
          return;
        }
        const target = unionBounds(selected.map(elementBounds).filter(Boolean));
        const axis = target.x + target.w / 2;
        selected.forEach(element => {
          if (element.points) {
            element.points = element.points.map(point => [round(axis * 2 - point[0]), point[1]]);
          } else {
            const box = elementBounds(element);
            element.x = round(axis * 2 - box.x - box.w);
            if (element.type === "arc") {
              // 左右反転で弧の向きも反転(θ→180-θ、掃引の時計回りを保つため入替)
              const a0 = Number(element.a0 ?? 0);
              const a1 = Number(element.a1 ?? 90);
              element.a0 = round(((180 - a1) % 360 + 360) % 360);
              element.a1 = round(((180 - a0) % 360 + 360) % 360);
            }
          }
        });
        commitHistory("左右ミラーしました。");
        render();
      }

      // 配列複写ダイアログを開き、選択要素を行×列で等間隔複製。
      function showArrayCopyDialog() {
        openDialog("等間隔複製", `
          <div class="row">
            <div><label>複製数</label><input id="arrCount" type="number" min="1" step="1" value="3"></div>
            <div><label>間隔X mm</label><input id="arrDx" type="number" step="0.5" value="0"></div>
          </div>
          <label>間隔Y mm</label><input id="arrDy" type="number" step="0.5" value="9.5">
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="arrApplyBtn" class="primary">複製</button>
          </div>`);
        qs("#arrApplyBtn").addEventListener("click", () => {
          const page = currentPage();
          const selected = selectedElements();
          if (!page || !selected.length) {
            setStatus("複製する要素を選択してください。");
            return;
          }
          const count = Math.max(1, Math.floor(Number(qs("#arrCount").value || 1)));
          const dx = Number(qs("#arrDx").value || 0);
          const dy = Number(qs("#arrDy").value || 0);
          const created = [];
          for (let n = 1; n <= count; n++) {
            selected.forEach(element => {
              const copy = deepClone(element);
              copy.id = uid("el");
              copy.locked = false;
              delete copy.group;
              translateElement(copy, dx * n, dy * n);
              created.push(copy);
            });
          }
          page.elements.push(...created);
          setSelection(created.map(el => el.id));
          closeDialog();
          commitHistory(created.length + "件を等間隔複製しました。");
          render();
        });
      }

      // ===== 配線の結合・分割 =====
      function mergeSelectedWires() {
        const page = currentPage();
        const selected = selectedElements();
        if (selected.length !== 2 || selected.some(el => el.type !== "wire")) {
          setStatus("結合するには配線を2本選択してください。");
          return;
        }
        const [a, b] = selected;
        const pa = a.points || [];
        const pb = b.points || [];
        if (pa.length < 2 || pb.length < 2) return;
        const near = (p, q) => Math.abs(p[0] - q[0]) < .6 && Math.abs(p[1] - q[1]) < .6;
        let points = null;
        if (near(pa[pa.length - 1], pb[0])) points = [...pa, ...pb.slice(1)];
        else if (near(pa[pa.length - 1], pb[pb.length - 1])) points = [...pa, ...pb.slice(0, -1).reverse()];
        else if (near(pa[0], pb[0])) points = [...pa.slice().reverse(), ...pb.slice(1)];
        else if (near(pa[0], pb[pb.length - 1])) points = [...pb, ...pa.slice(1)];
        if (!points) {
          setStatus("端点が一致する配線を選択してください。");
          return;
        }
        a.points = orthogonalizePoints(points);
        a.orthoFlip = false;
        page.elements = page.elements.filter(el => el.id !== b.id);
        selectSingle(a.id);
        commitHistory("配線を結合しました。");
        render();
      }

      // 終点側の線分を軸方向に伸ばし、最初に交差する他配線まで延長する
      function extendSelectedWireEnd() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [];
        if (points.length < 2) return;
        const a = points[points.length - 2];
        const b = points[points.length - 1];
        const horizontal = Math.abs(a[1] - b[1]) < .01;
        const vertical = Math.abs(a[0] - b[0]) < .01;
        if (!horizontal && !vertical) {
          setStatus("斜めの区間は延長できません。先に直交整形してください。");
          return;
        }
        const size = pageSize(page);
        const dir = horizontal ? Math.sign(b[0] - a[0]) || 1 : Math.sign(b[1] - a[1]) || 1;
        const ray = horizontal
          ? [b[0], b[1], dir > 0 ? size.w : 0, b[1]]
          : [b[0], b[1], b[0], dir > 0 ? size.h : 0];
        let best = null;
        page.elements.forEach(other => {
          if (other.id === element.id || other.type !== "wire") return;
          wireSegments(other).forEach(segment => {
