          ]
        },
        polarityMarkMinus: {
          w: 2.6, h: 2.6,
          anchors: [[1.3, 2.6]],
          prims: [
            { t: "circle", p: [1.3, 1.3, 1.1], fill: "white" },
            { t: "line", p: [0.55, 1.3, 2.05, 1.3] },
            { t: "text", p: [1.3, -1.4], size: 2.2, anchor: "middle", field: "label" }
          ]
        }
      };

      // 要素→SYMBOL_GEOキーの解決。ここでnull以外を返す種別は設備標準の固定形状で描かれ、
      // 角ハンドルでのリサイズ対象外になる(canResizeElement参照)。バリエーション(筒形ランプ等)はnull。
      function geoKeyFor(element) {
        switch (element.type) {
          case "contactNO": return "contactNO";
          case "contactNC": return "contactNC";
          case "thermalRelay": return "thermalRelay";
          case "thermalElement": return "thermalElement";
          case "breaker": return "breaker";
          case "coil": return "coil";
          case "lamp": return (element.lampVariant || "pilot") === "pilot" ? "lamp" : null;
          case "pushButton": return (element.pbStyle || "momentary") === "emergency" ? "pushButtonEmergency" : "pushButton";
          case "selectorSwitch": return "selectorSwitch";
          case "limitSwitch": return "limitSwitch";
          case "pressureSwitch": return "pressureSwitch";
          case "motor": return "motor";
          case "ground": return "ground";
          case "terminal": return (element.terminalShape || "circle") === "circle" ? "terminal" : null;
          case "resistor": return (element.resistorStyle || "box") === "varistor" ? "varistor" : "resistor";
          case "connector": return element.connStyle === "pair" ? "connectorPair" : null;
          case "contactBlock": return (element.blockContact || "NO") === "NC" ? "contactBlockNC" : "contactBlock";
          case "positionMark": return (element.markStyle || "box") === "box" ? "positionMarkBox" : "positionMarkLine";
          case "polarityMark": return (element.sign || "+") === "-" ? "polarityMarkMinus" : "polarityMarkPlus";
          default: return null;
        }
      }

      // 要素に対応するSYMBOL_GEO定義(無ければnull)。
      function geoFor(element) {
        const key = geoKeyFor(element);
        return key ? SYMBOL_GEO[key] || null : null;
      }

      // geoシンボルの本体寸法(縦向きは幅高を入替)。
      function geoBodySize(element) {
        const geo = geoFor(element);
        if (!geo) return null;
        const vertical = element.orientation === "vertical";
        return { w: vertical ? geo.h : geo.w, h: vertical ? geo.w : geo.h };
      }

      // geo定義のローカル座標→要素ローカル座標への変換。縦向きは90度回転し、
      // 要素枠(w/h)が本体より大きい場合は中央寄せする(旧データ互換のため)。
      function geoMapPoint(geo, element, x, y) {
        const vertical = element.orientation === "vertical";
        const bw = vertical ? geo.h : geo.w;
        const bh = vertical ? geo.w : geo.h;
        const ox = (Number(element.w || bw) - bw) / 2;
        const oy = (Number(element.h || bh) - bh) / 2;
        if (vertical) return [geo.h - y + ox, x + oy];
        return [x + ox, y + oy];
      }

      // geo定義のプリミティブ列(line/pline/rect/circle/arc/text)を要素ローカル座標へ展開。
      function geoPrims(element) {
        const geo = geoFor(element);
        if (!geo) return [];
        const map = (x, y) => geoMapPoint(geo, element, x, y);
        return geo.prims.map((prim, index) => {
          const q = deepClone(prim);
          if (prim.t === "line") {
            const a = map(prim.p[0], prim.p[1]);
            const b = map(prim.p[2], prim.p[3]);
            q.p = [a[0], a[1], b[0], b[1]];
          } else if (prim.t === "pline") {
            q.pts = prim.pts.map(pt => map(pt[0], pt[1]));
          } else if (prim.t === "rect") {
            const a = map(prim.p[0], prim.p[1]);
            const b = map(prim.p[0] + prim.p[2], prim.p[1] + prim.p[3]);
            q.p = [Math.min(a[0], b[0]), Math.min(a[1], b[1]), Math.abs(b[0] - a[0]), Math.abs(b[1] - a[1])];
          } else if (prim.t === "circle") {
            const c = map(prim.p[0], prim.p[1]);
            q.p = [c[0], c[1], prim.p[2]];
          } else if (prim.t === "arc") {
            const c = map(prim.p[0], prim.p[1]);
            const rot = element.orientation === "vertical" ? 90 : 0;
            q.p = [c[0], c[1], prim.p[2], prim.p[3] + rot, prim.p[4] + rot];
          } else if (prim.t === "text") {
            const c = map(prim.p[0], prim.p[1]);
            q.p = [c[0], c[1]];
          }
          if (element.type === "contactBlock" && element.blockFrame === "dashed" && index === 0 && q.t === "rect") {
            q.dash = "1.4 1.2";
          }
          return q;
        });
      }

      // geoのtextプリミティブのfield指定(label/refNo/descLine/catalog/lampColor)を実値へ解決。
      function geoTextValue(element, prim) {
        if (prim.field === "refNo" && contactChildTypes().has(element.type)) {
          return contactAutoRefNo(element);
        }
        if (prim.field === "descLine") {
          return String(element.description || "").split(/\r?\n/)[0];
        }
        if (prim.field) {
          const raw = element[prim.field];
          return raw === undefined || raw === null ? "" : String(raw);
        }
        return prim.value === undefined ? "" : String(prim.value);
      }

      // 中心・半径・開始/終了角(度, スクリーン座標系, 時計回り)からSVG円弧パスを生成。DXF側はdxfArcLocalが同じ角度規約。
      function svgArcPath(cx, cy, r, a0, a1) {
        const rad = d => d * Math.PI / 180;
        const x0 = cx + r * Math.cos(rad(a0));
        const y0 = cy + r * Math.sin(rad(a0));
        const x1 = cx + r * Math.cos(rad(a1));
        const y1 = cy + r * Math.sin(rad(a1));
        const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
        return "M " + round(x0) + " " + round(y0) + " A " + r + " " + r + " 0 " + large + " 1 " + round(x1) + " " + round(y1);
      }

      // SYMBOL_GEO定義による描画。対応要素ならgへ描いてtrue、対象外ならfalseを返す。
      function drawGeoSymbol(g, element, stroke) {
        const geo = geoFor(element);
        if (!geo) return false;
        geoPrims(element).forEach(prim => {
          if (prim.t === "line") {
            g.appendChild(svgEl("line", { x1: prim.p[0], y1: prim.p[1], x2: prim.p[2], y2: prim.p[3], class: "symbol-line", stroke, "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "pline") {
            g.appendChild(svgEl("path", { d: prim.pts.map((pt, i) => (i ? "L " : "M ") + pt[0] + " " + pt[1]).join(" "), class: "symbol-line", stroke, "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "rect") {
            g.appendChild(svgEl("rect", { x: prim.p[0], y: prim.p[1], width: prim.p[2], height: prim.p[3], class: prim.fill === "white" ? "symbol-fill" : "symbol-line", stroke, fill: prim.fill === "white" ? "#fff" : "none", "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "circle") {
            if (prim.fill === "solid") g.appendChild(svgEl("circle", { cx: prim.p[0], cy: prim.p[1], r: prim.p[2], fill: stroke }));
            else g.appendChild(svgEl("circle", { cx: prim.p[0], cy: prim.p[1], r: prim.p[2], class: prim.fill === "white" ? "terminal-dot" : "symbol-line", stroke, fill: prim.fill === "white" ? "#fff" : "none" }));
          } else if (prim.t === "arc") {
            g.appendChild(svgEl("path", { d: svgArcPath(prim.p[0], prim.p[1], prim.p[2], prim.p[3], prim.p[4]), class: "symbol-line", stroke, fill: "none" }));
          } else if (prim.t === "text") {
            const value = geoTextValue(element, prim);
            if (value) g.appendChild(textEl(value, prim.p[0], prim.p[1], { fontSize: prim.size || 2, anchor: prim.anchor || "middle" }));
          }
        });
        return true;
      }

      // SYMBOL_GEO定義によるDXF出力(SVGと同一のプリミティブ列から生成=見た目の単一定義)。
      function dxfGeoSymbol(out, page, element) {
        const geo = geoFor(element);
        if (!geo) return false;
        geoPrims(element).forEach(prim => {
          const primLtype = dashLtypeName(prim.dash);
          if (prim.t === "line") {
            dxfLineLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], primLtype);
          } else if (prim.t === "pline") {
            for (let i = 1; i < prim.pts.length; i++) {
              dxfLineLocal(out, page, "SYMBOL", element, prim.pts[i - 1][0], prim.pts[i - 1][1], prim.pts[i][0], prim.pts[i][1], primLtype);
            }
          } else if (prim.t === "rect") {
            dxfRectLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], primLtype);
          } else if (prim.t === "circle") {
            dxfCircleLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2]);
          } else if (prim.t === "arc") {
            dxfArcLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], prim.p[4]);
          } else if (prim.t === "text") {
            const value = geoTextValue(element, prim);
            if (!value) return;
            const size = prim.size || 2;
            const dx = prim.anchor === "middle" ? value.length * size * .3 : (prim.anchor === "end" ? value.length * size * .6 : 0);
            dxfTextLocal(out, page, "TEXT", element, prim.p[0] - dx, prim.p[1] + size * .35, size, value);
          }
        });
        return true;
      }

      // ARCエンティティ出力。スクリーン角(時計回り)→CAD角(反時計回り)へ変換(start=-a1, end=-a0)。
      function dxfArcLocal(out, page, layer, element, cx, cy, r, a0, a1) {
        const c = localPoint(element, cx, cy);
        const rot = Number(element.rotation || 0);
        const s = ((-(a1 + rot)) % 360 + 360) % 360;
        const e = ((-(a0 + rot)) % 360 + 360) % 360;
        out.push("0", "ARC", "8", layer, "10", round(c[0]), "20", round(cadY(page, c[1])), "40", round(r), "50", round(s), "51", round(e));
      }

      // 2次ベジェを8分割の折れ線でDXF近似出力。
      function dxfQuadApproxLocal(out, page, layer, element, x0, y0, cx, cy, x1, y1) {
        const steps = 8;
        let prev = [x0, y0];
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const mt = 1 - t;
          const px = mt * mt * x0 + 2 * mt * t * cx + t * t * x1;
          const py = mt * mt * y0 + 2 * mt * t * cy + t * t * y1;
          dxfLineLocal(out, page, layer, element, prev[0], prev[1], px, py);
          prev = [px, py];
        }
      }

      // 回転角つきTEXTエンティティ出力。
      function dxfTextRotated(out, page, layer, x, y, size, text, angle) {
        out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(size), "1", String(text || ""), "50", String(angle));
      }

      // geoシンボルの接続点(配線吸着点)一覧。geo定義のanchors配列をローカル→絶対座標へ変換。
      function geoAnchors(element) {
        const geo = geoFor(element);
        if (!geo) return null;
        return geo.anchors.map(a => {
          const p = geoMapPoint(geo, element, a[0], a[1]);
          return localAnchor(element, p[0], p[1]);
        });
      }

      // geoシンボルの向き変更時にw/hを本体寸法へ合わせ直す。
      function resizeGeoElementForOrientation(element) {
        const size = geoBodySize(element);
        if (!size) return false;
        element.w = size.w;
        element.h = size.h;
        return true;
      }

      // ===== 配線ラベル配置(mid/start/end) =====
      function wireNoAnchorPoint(element) {
        const points = element.points || [[0, 0], [20, 0]];
        const align = element.wireNoAlign || "mid";
        const dx = Number(element.wireNoDx || 0);
        const dy = Number(element.wireNoDy || 0);
        if (align === "mid") {
          const mid = wireLabelPoint(points);
          return { x: mid.x + 1.6 + dx, y: mid.y - 1.8 + dy, anchor: "start" };
        }
        const end = align === "end" ? points[points.length - 1] : points[0];
        return {
          x: end[0] + (align === "end" ? -1.2 : 1.2) + dx,
          y: end[1] - 1.6 + dy,
          anchor: align === "end" ? "end" : "start"
        };
      }

      // ===== 表の斜線セル =====
      function tableDiagonalCells(element) {
        return String(element.cellDiagonals || "")
          .split(";")
          .map(pair => pair.split(",").map(Number))
          .filter(p => p.length === 2 && p.every(Number.isFinite));
      }

      // ===== 端子台ジャンパ =====
      function terminalJumperPairs(element) {
        return String(element.jumpers || "")
          .split(";")
          .map(pair => pair.split("-").map(n => Number(n.trim())))
          .filter(p => p.length === 2 && p.every(Number.isFinite));
      }

      // ===== PLC 16進アドレス連番 =====
      function splitPlcAddress(address) {
        const match = String(address || "").trim().match(/^(.*?)([0-9A-Fa-f]{1,4})$/);
        return match ? { prefix: match[1], digits: match[2] } : null;
      }

      // 開始アドレス(例X000)から16進連番でn個のアドレス配列を生成。
      function plcAddressSequence(start, count) {
        const parts = splitPlcAddress(start);
        if (!parts) return Array.from({ length: count }, (_, i) => String(start) + i);
        const base = parseInt(parts.digits, 16);
        return Array.from({ length: count }, (_, i) =>
          parts.prefix + (base + i).toString(16).toUpperCase().padStart(parts.digits.length, "0"));
      }

      // ===== 信号矢印のペア注記 =====
      function arrowCounterpartNote(element) {
        const role = element.signalRole || "reference";
        if (!element.label || role === "reference") return "";
        const targetRole = role === "source" ? "destination" : "source";
        for (const page of state.pages) {
          for (const item of page.elements) {
            if (item.type === "arrow" && item.id !== element.id && item.label === element.label
              && (item.signalRole || "reference") === targetRole) {
              return "頁" + pageSheetNumber(page);
            }
          }
        }
        return "";
      }

      // ===== PLCユニット列(波形破断線+端子円) =====
      function plcUnitWavePoints(w, y) {
        return [[0, y], [1.8, y - 1.6], [3.6, y - 1.6], [w / 2, y], [w / 2 + 1.65, y + 1.6], [w - 1.8, y + 1.6], [w, y]];
      }

      // PLCユニット列(縦カラム+上下波形破断線+アドレス円)の描画。行ピッチ9.5mm固定。
      function drawPlcUnitColumn(g, element, stroke) {
        const rows = Math.max(1, Number(element.rows || 8));
        const w = 10.5;
        const h = rows * 9.5;
        const labels = String(element.pinText || "").split(/\r?\n/);
        const wave = y => "M 0 " + y +
          " C 2 " + (y - 2.2) + " 3.5 " + (y - 2.2) + " 5.25 " + y +
          " C 7 " + (y + 2.2) + " 8.5 " + (y + 2.2) + " 10.5 " + y;
        g.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: w, y1: 0, x2: w, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: wave(0), class: "symbol-line", stroke, fill: "none" }));
        g.appendChild(svgEl("path", { d: wave(h), class: "symbol-line", stroke, fill: "none" }));
        for (let i = 0; i < rows; i++) {
          const cy = 9.5 * i + 4.75;
          g.appendChild(svgEl("circle", { cx: w / 2, cy, r: 3.2, class: "terminal-dot", stroke }));
          if (labels[i]) g.appendChild(textEl(labels[i], w / 2, cy, { fontSize: 2, anchor: "middle" }));
        }
        if (element.label) g.appendChild(textEl(element.label, 0, -2.4, { fontSize: 2.2 }));
      }

      // 選択枠・リサイズハンドル・点編集ハンドルの描画(選択中のみ)。
      function drawSelection(svg) {
        const selected = selectedElements();
        const boxes = selected.map(elementBounds).filter(Boolean);
        if (!boxes.length) return;
        boxes.forEach(box => {
          svg.appendChild(svgEl("rect", {
            x: box.x - 2,
            y: box.y - 2,
            width: box.w + 4,
            height: box.h + 4,
            class: "selection-box"
          }));
        });
        const box = boxes.length === 1 ? boxes[0] : unionBounds(boxes);
        const handles = [
          [box.x - 2, box.y - 2],
          [box.x + box.w + 2, box.y - 2],
          [box.x - 2, box.y + box.h + 2],
          [box.x + box.w + 2, box.y + box.h + 2]
        ];
        const resizeHandles = ["nw", "ne", "sw", "se"];
        const resizable = selected.length === 1 && canResizeElement(selected[0]) && !isElementLocked(selected[0]);
        handles.forEach(([x, y], index) => {
          svg.appendChild(svgEl("rect", {
            x: x - 1.5,
            y: y - 1.5,
            width: 3,
            height: 3,
            class: "selection-handle" + (resizable ? " resize-handle" : ""),
            "data-resize-handle": resizable ? resizeHandles[index] : null
          }));
        });
        if (selected.length === 1 && selected[0].points && !isElementLocked(selected[0])) {
          selected[0].points.forEach((point, index) => {
            svg.appendChild(svgEl("rect", {
              x: point[0] - 1.7,
              y: point[1] - 1.7,
              width: 3.4,
              height: 3.4,
              class: "point-handle",
              "data-point-index": index
            }));
          });
        }
      }

      // 角ハンドルリサイズ可否。points系/接続点/geoシンボル(固定形状)は不可。
      function canResizeElement(element) {
        return !!element && !element.points && element.type !== "junction" && !geoFor(element);
      }

      // ドラッグ範囲選択の矩形を描画。
      function drawMarquee(svg) {
        if (!dragState || dragState.mode !== "marquee") return;
        const rect = normalizedRect(dragState.start, dragState.current || dragState.start);
        if (rect.w < .5 && rect.h < .5) return;
        svg.appendChild(svgEl("rect", {
          x: rect.x,
          y: rect.y,
          width: rect.w,
          height: rect.h,
          class: "selection-box"
        }));
      }

      // 2点から正規化矩形{x,y,w,h}を作る。
      function normalizedRect(a, b) {
        const x1 = Math.min(a.x, b.x);
        const y1 = Math.min(a.y, b.y);
        const x2 = Math.max(a.x, b.x);
        const y2 = Math.max(a.y, b.y);
        return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
      }

      // 矩形同士の交差判定。
      function boundsIntersect(a, b) {
        return a.x <= b.x + b.w && a.x + a.w >= b.x && a.y <= b.y + b.h && a.y + a.h >= b.y;
      }

      // 複数矩形の外接矩形。
      function unionBounds(boxes) {
        const minX = Math.min(...boxes.map(box => box.x));
        const minY = Math.min(...boxes.map(box => box.y));
        const maxX = Math.max(...boxes.map(box => box.x + box.w));
        const maxY = Math.max(...boxes.map(box => box.y + box.h));
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
      }

      // 要素の外接矩形(mm)。points系は点列から、その他はx/y/w/h(既定値で補完)。
      function elementBounds(element) {
        if (element.type === "wire" || element.type === "arrow" || element.type === "line" || element.type === "mechanicalLink" || element.type === "dimension") {
          const points = element.points || [[0, 0], [0, 0]];
          const xs = points.map(p => p[0]);
          const ys = points.map(p => p[1]);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          return { x: minX, y: minY, w: Math.max(1, Math.max(...xs) - minX), h: Math.max(1, Math.max(...ys) - minY) };
        }
        if (element.type === "junction") {
          const r = Number(element.r || 1.45);
          return { x: element.x - r, y: element.y - r, w: r * 2, h: r * 2 };
        }
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return { x: Number(element.x || 0), y: Number(element.y || 0), w, h };
      }

      // 選択IDリストを更新(先頭が主選択selectedId)。
      function setSelection(ids) {
        selectedIds = Array.from(new Set(ids.filter(Boolean)));
        selectedId = selectedIds.length ? selectedIds[0] : null;
      }

      // 単一選択に置き換え。
      function selectSingle(id) {
        setSelection(id ? [id] : []);
      }

      // Shiftクリック用の選択トグル。
      function toggleSelection(id) {
        if (!id) return;
        if (selectedIds.includes(id)) setSelection(selectedIds.filter(item => item !== id));
        else setSelection([...selectedIds, id]);
      }

      // 選択中の要素オブジェクト配列(現在ページ内)。
      function selectedElements() {
        const page = currentPage();
        if (!page) return [];
        const ids = selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []);
        return ids.map(id => page.elements.find(element => element.id === id)).filter(Boolean);
      }

      // 主選択の要素(なければnull)。
      function selectedElement() {
        return selectedElements()[0] || null;
      }

      // 右パネル全体(ページ設定+選択パネル)を現在stateへ同期。
      function syncInspector() {
        const page = currentPage();
        if (!page) return;
        renderStandardSelect();
        setValue("drawingStandard", state.settings.standard || "general");
        setValue("pageName", page.name);
        setValue("paperSize", page.size);
        setValue("paperOrientation", page.orientation);
        setValue("frameVariant", page.frameVariant);
        setValue("drawingNo", page.title.drawingNo);
        setValue("revision", page.title.revision);
        setValue("drawingTitle", page.title.title);
        setValue("designer", page.title.designer);
        setValue("drawDate", page.title.date);
        setValue("pageInstallation", page.title.installation || "");
        setValue("pageLocation", page.title.location || "");
        setValue("pageSideNote", page.title.sideNote || "");
        setValue("zoomRange", state.settings.zoom);
        setValue("gridSize", state.settings.grid);
        setValue("snapToggle", state.settings.snap ? "on" : "off");
        setValue("objectSnapToggle", state.settings.objectSnap ? "on" : "off");
        setValue("underlayOutputToggle", state.settings.outputUnderlays ? "on" : "off");
        setValue("wireNumberFormat", state.settings.wireNumberFormat || "%S-%N");
        setValue("componentTagFormat", state.settings.componentTagFormat || "%F%N");
        renderWireTypeSelect();
        setValue("currentWireType", state.settings.currentWireType || "control");
        renderLayerSelect();
        setValue("currentLayer", state.settings.currentLayer || "symbols");
        renderSelectionPanel();
      }

      // ズーム倍率を許容範囲へ丸める。
      function clampZoom(value) {
        const input = qs("#zoomRange");
        const min = Number(input?.min || .8);
        const max = Number(input?.max || 8);
        const zoom = Number(value);
        return Math.max(min, Math.min(max, Number.isFinite(zoom) ? zoom : 3.2));
      }

      // ズーム設定+再描画(save=trueで履歴にも記録)。
      function setZoom(value, save = false) {
        state.settings.zoom = clampZoom(value);
        setValue("zoomRange", state.settings.zoom);
        if (save) commitHistory("ズームを変更しました。");
        render();
      }

      // 標準セレクタの選択肢を構築(組込+取込済み標準パック)。
      function renderStandardSelect() {
        const select = qs("#drawingStandard");
        if (!select) return;
        const all = [...STANDARDS, ...(state.standardPacks || [])];
        const html = all.map(standard => `<option value="${escapeAttr(standard.id)}">${escapeHtml(standard.label || standard.id)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      // 配線種別セレクタを構築。
      function renderWireTypeSelect() {
        const select = qs("#currentWireType");
        if (!select) return;
        const html = (state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}">${escapeHtml(type.label)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      // 作図レイヤセレクタを構築。
      function renderLayerSelect() {
        const select = qs("#currentLayer");
        if (!select) return;
        const html = (state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}">${escapeHtml(layer.label)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      // input/selectへ値を設定(フォーカス中は上書きしない)。
      function setValue(id, value) {
        const el = qs("#" + id);
        if (el && el.value !== String(value ?? "")) el.value = value ?? "";
      }

      // 右パネル下部「選択中の要素」を構築。共通(位置寸法)+種別固有(specificFields)+電気属性+
      // スタイル/メモのアコーディオンで構成。入力はdata-bind属性経由でupdateSelectedFromInputへ流れる。
      function renderSelectionPanel() {
        const panel = qs("#selectionPanel");
        const selected = selectedElements();
        if (selected.length > 1) {
          panel.innerHTML = `
            <div class="panel-title">複数選択: ${selected.length}件</div>
            <p class="muted">Shiftクリックで選択を追加/解除できます。選択中の要素をまとめて移動、コピー、複製、削除できます。</p>
            <div class="row" style="margin-top:8px">
              <button type="button" id="copyElementBtn">コピー</button>
              <button type="button" id="pasteElementBtn">貼付</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="duplicateElementBtn">複製</button>
              <button type="button" id="deleteElementBtn">削除</button>
            </div>
            <button type="button" id="pasteInstallLocationBtn" style="width:100%;margin-top:8px" ${installLocationClipboard ? "" : "disabled"}>設備/場所貼付</button>
            <label>所属レイヤ一括変更</label>
            <select id="bulkLayerSelect">
              <option value="">変更しない…</option>
              ${(state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}">${escapeHtml(layer.label)}</option>`).join("")}
            </select>
            <label>配線種別一括変更（配線のみ）</label>
            <select id="bulkWireTypeSelect">
              <option value="">変更しない…</option>
              ${(state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}">${escapeHtml(type.label)}</option>`).join("")}
            </select>
            <div class="row" style="margin-top:8px">
              <button type="button" id="bringForwardBtn">前面へ</button>
              <button type="button" id="sendBackwardBtn">背面へ</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="groupBtn">グループ化</button>
              <button type="button" id="ungroupBtn">グループ解除</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="mirrorBtn">左右ミラー</button>
              <button type="button" id="arrayCopyBtn">等間隔複製</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="rotateLeftBtn">左90°(全体)</button>
              <button type="button" id="rotateRightBtn">右90°(全体)</button>
            </div>
            <button type="button" id="mergeWiresBtn" style="width:100%;margin-top:8px">配線を結合(2本選択時)</button>
            <button type="button" id="registerSymbolBtn" style="width:100%;margin-top:8px">回路として登録</button>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-align="left">左揃え</button>
              <button type="button" data-align="hcenter">中揃え</button>
              <button type="button" data-align="right">右揃え</button>
            </div>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-align="top">上揃え</button>
              <button type="button" data-align="vcenter">中央</button>
              <button type="button" data-align="bottom">下揃え</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" data-distribute="x">横均等</button>
              <button type="button" data-distribute="y">縦均等</button>
            </div>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-nudge="-1,0">←</button>
              <button type="button" data-nudge="0,-1">↑</button>
              <button type="button" data-nudge="1,0">→</button>
            </div>
            <button type="button" data-nudge="0,1" style="width:100%;margin-top:8px">↓ 1mm移動</button>
          `;
          attachSelectionActionButtons(panel);
          qs("#pasteInstallLocationBtn", panel)?.addEventListener("click", pasteInstallLocationToSelection);
          qs("#registerSymbolBtn", panel)?.addEventListener("click", registerSelectedAsSymbol);
          qs("#groupBtn", panel)?.addEventListener("click", groupSelected);
          qs("#ungroupBtn", panel)?.addEventListener("click", ungroupSelected);
          qs("#mirrorBtn", panel)?.addEventListener("click", mirrorSelectedHorizontal);
          qs("#arrayCopyBtn", panel)?.addEventListener("click", showArrayCopyDialog);
          qs("#mergeWiresBtn", panel)?.addEventListener("click", mergeSelectedWires);
          qs("#rotateLeftBtn", panel)?.addEventListener("click", () => rotateSelected(-90));
          qs("#rotateRightBtn", panel)?.addEventListener("click", () => rotateSelected(90));
          qs("#bulkLayerSelect", panel)?.addEventListener("change", event => {
            const value = event.target.value;
            if (!value) return;
            selectedElements().forEach(el => { el.layer = value; });
            commitHistory("所属レイヤを一括変更しました。");
            render();
          });
          qs("#bulkWireTypeSelect", panel)?.addEventListener("change", event => {
            const value = event.target.value;
            if (!value) return;
            let changed = 0;
            selectedElements().forEach(el => {
              if (el.type === "wire") {
                el.wireType = value;
                changed += 1;
              }
            });
            if (!changed) {
              setStatus("選択の中に配線がありません。");
              return;
            }
            commitHistory(changed + "本の配線種別を一括変更しました。");
            render();
          });
          return;
        }
        const element = selectedElement();
        if (!element) {
          panel.innerHTML = '<div class="panel-title">選択中の要素</div><p class="muted">図形を選択すると、位置・寸法・記号名・線番を編集できます。</p>';
          return;
        }
        const typeName = paletteLabel(element.type);
        const isWireLike = element.type === "wire" || element.type === "arrow" || element.type === "line" || element.type === "dimension";
        panel.innerHTML = `
          <div class="panel-title">選択中: ${typeName}</div>
          ${isWireLike ? wireFields(element) : normalFields(element)}
          ${labelFields(element)}
          ${specificFields(element)}
          ${electricalAttributeFields(element)}
          <details class="attr-panel">
            <summary>スタイル・メモ（レイヤ／線色／属性メモ）</summary>
            <label>所属レイヤ</label>
            <select data-bind="layer">${layerOptions(element.layer || inferredLayerFor(element.type))}</select>

            <textarea data-bind="note">${escapeHtml(element.note || "")}</textarea>

              ${["#111820", "#0f6f63", "#b42318", "#1f5fbf", "#6f42c1", "#5b626b"].map(color => `<button type="button" class="swatch${(element.stroke || state.settings.stroke) === color ? " active" : ""}" data-color="${color}" style="background:${color}" title="${color}"></button>`).join("")}
            </div>
          </details>
          <button type="button" id="registerSymbolBtn" style="width:100%;margin-top:12px">ユーザー部品に登録</button>
          <button type="button" id="toggleLockBtn" style="width:100%;margin-top:8px" ${isLayerLocked(element.layer || inferredLayerFor(element.type)) ? "disabled" : ""}>${isLayerLocked(element.layer || inferredLayerFor(element.type)) ? "レイヤロック中" : (element.locked ? "ロック解除" : "ロック")}</button>
          <div class="row" style="margin-top:8px">
            <button type="button" id="copyElementBtn">コピー</button>
            <button type="button" id="pasteElementBtn">貼付</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="duplicateElementBtn">複製</button>
            <button type="button" id="deleteElementBtn">削除</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="bringForwardBtn">前面へ</button>
            <button type="button" id="sendBackwardBtn">背面へ</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="rotateLeftBtn">左90°</button>
            <button type="button" id="rotateRightBtn">右90°</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="mirrorBtn">左右ミラー</button>
            <button type="button" id="arrayCopyBtn">等間隔複製</button>
          </div>
          <div class="row-3" style="margin-top:8px">
            <button type="button" data-nudge="-1,0">←</button>
            <button type="button" data-nudge="0,-1">↑</button>
            <button type="button" data-nudge="1,0">→</button>
          </div>
          <button type="button" data-nudge="0,1" style="width:100%;margin-top:8px">↓ 1mm移動</button>
        `;
        qsa("[data-bind]", panel).forEach(input => {
          input.addEventListener("change", () => updateSelectedFromInput(input));
          input.addEventListener("input", () => {
            if (input.tagName === "TEXTAREA" || input.dataset.live === "true") updateSelectedFromInput(input, false);
          });
        });
        qsa(".swatch", panel).forEach(button => {
          button.addEventListener("click", () => {
            const selected = selectedElement();
            if (!selected) return;
            selected.stroke = button.dataset.color;
            commitHistory("線色を変更しました。");
            render();
          });
        });
        qs("#registerSymbolBtn", panel)?.addEventListener("click", registerSelectedAsSymbol);
        qs("#toggleLockBtn", panel)?.addEventListener("click", toggleSelectedLock);
        qs("#toggleWireGapBtn", panel)?.addEventListener("click", toggleSelectedWireGap);
        qs("#addIntersectionGapsBtn", panel)?.addEventListener("click", addIntersectionGapsToSelectedWire);
        qs("#clearWireGapsBtn", panel)?.addEventListener("click", clearSelectedWireGaps);
        qs("#addWirePointBtn", panel)?.addEventListener("click", addSelectedWirePoint);
        qs("#removeWirePointBtn", panel)?.addEventListener("click", removeSelectedWirePoint);
        qs("#orthogonalizeWireBtn", panel)?.addEventListener("click", orthogonalizeSelectedWire);
        qs("#splitWireBtn", panel)?.addEventListener("click", splitSelectedWire);
        qs("#extendWireBtn", panel)?.addEventListener("click", extendSelectedWireEnd);
        qs("#trimWireBtn", panel)?.addEventListener("click", trimSelectedWireEnd);
        qs("#catalogPickBtn", panel)?.addEventListener("click", showCatalogPicker);
        qs("#mirrorBtn", panel)?.addEventListener("click", mirrorSelectedHorizontal);
        qs("#arrayCopyBtn", panel)?.addEventListener("click", showArrayCopyDialog);
        qs("#lineStylePreset", panel)?.addEventListener("change", event => {
          const target = selectedElement();
          if (!target) return;
          target.dash = event.target.value;
          commitHistory("線種を変更しました。");
          render();
        });
        qs("#applyAreaAttributesBtn", panel)?.addEventListener("click", applySelectedAreaAttributes);
        qs("#copyInstallLocationBtn", panel)?.addEventListener("click", copySelectedInstallLocation);
        qs("#pasteInstallLocationBtn", panel)?.addEventListener("click", pasteInstallLocationToSelection);
        attachSelectionActionButtons(panel);
        qs("#rotateLeftBtn", panel)?.addEventListener("click", () => rotateSelected(-90));
        qs("#rotateRightBtn", panel)?.addEventListener("click", () => rotateSelected(90));
      }

      // 選択パネル内の操作ボタン群(複製/削除/回転/整列/グループ等)へハンドラを付ける。
      function attachSelectionActionButtons(panel) {
        qs("#copyElementBtn", panel)?.addEventListener("click", copySelected);
        qs("#pasteElementBtn", panel)?.addEventListener("click", pasteClipboard);
        qs("#duplicateElementBtn", panel)?.addEventListener("click", duplicateSelected);
        qs("#deleteElementBtn", panel)?.addEventListener("click", deleteSelected);
        qs("#bringForwardBtn", panel)?.addEventListener("click", bringSelectedForward);
        qs("#sendBackwardBtn", panel)?.addEventListener("click", sendSelectedBackward);
        qsa("[data-align]", panel).forEach(button => {
          button.addEventListener("click", () => alignSelected(button.dataset.align));
        });
        qsa("[data-distribute]", panel).forEach(button => {
          button.addEventListener("click", () => distributeSelected(button.dataset.distribute));
        });
        qsa("[data-nudge]", panel).forEach(button => {
          button.addEventListener("click", () => {
            const [dx, dy] = button.dataset.nudge.split(",").map(Number);
            moveSelected(dx, dy);
            commitHistory("要素を移動しました。");
            render();
          });
        });
      }

      // レイヤ選択肢のHTMLを生成。
      function layerOptions(current) {
        return (state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}"${current === layer.id ? " selected" : ""}>${escapeHtml(layer.label)}</option>`).join("");
      }

      // 要素種別→日本語表示名(PALETTE定義から)。
      function paletteLabel(type) {
        if (String(type).startsWith("custom:")) {
          const id = String(type).slice("custom:".length);
          return (state.customSymbols || []).find(symbol => symbol.id === id)?.label || "ユーザー部品";
        }
        if (type === "underlayImage") return "下絵画像";
        return (PALETTE.find(item => item.type === type) || { label: type }).label;
      }

      // 位置・寸法など全要素共通の編集フィールド定義。
      function normalFields(element) {
        return `
          <div class="row">
            <div><label>X mm</label><input data-bind="x" data-kind="number" type="number" step="0.5" value="${round(element.x || 0)}"></div>
            <div><label>Y mm</label><input data-bind="y" data-kind="number" type="number" step="0.5" value="${round(element.y || 0)}"></div>
          </div>
          <div class="row">
            <div><label>幅 mm</label><input data-bind="w" data-kind="number" type="number" step="0.5" value="${round(element.w || defaultElement(element.type).w || 20)}"></div>
            <div><label>高さ mm</label><input data-bind="h" data-kind="number" type="number" step="0.5" value="${round(element.h || defaultElement(element.type).h || 10)}"></div>
          </div>
          <label>回転 deg</label>
          <input data-bind="rotation" data-kind="number" type="number" step="90" value="${round(element.rotation || 0)}">
        `;
      }

      // 配線専用フィールド(線番/種別/ギャップ/FROM/TO等)。
      function wireFields(element) {
        const points = element.points || [[0, 0], [20, 0]];
        const options = (state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}"${element.wireType === type.id ? " selected" : ""}>${escapeHtml(type.label)}</option>`).join("");
        const pointRows = points.map((point, index) => {
          const label = index === 0 ? "始点" : (index === points.length - 1 ? "終点" : "中間" + index);
          return `
            <div class="row">
              <div><label>${label} X</label><input data-bind="p${index}x" data-kind="number" type="number" step="0.5" value="${round(point[0])}"></div>
              <div><label>${label} Y</label><input data-bind="p${index}y" data-kind="number" type="number" step="0.5" value="${round(point[1])}"></div>
            </div>
          `;
        }).join("");
        return `
          ${element.type === "wire" ? `<label>配線種別</label><select data-bind="wireType">${options}</select>` : ""}
          ${pointRows}
        `;
      }

      // ラベル/文字系フィールド。
      function labelFields(element) {
        if (element.type === "text") {
          return `
            <label>文字</label>
            <textarea data-bind="text">${escapeHtml(element.text || "")}</textarea>
            <label>文字サイズ mm</label>
            <input data-bind="fontSize" data-kind="number" type="number" step="0.2" value="${round(element.fontSize || 3.5)}">
            <label><input data-bind="underline" type="checkbox" ${element.underline ? "checked" : ""} style="width:auto;min-height:auto"> 下線</label>
          `;
        }
        if (element.type === "wire") {
          const align = element.wireNoAlign || "mid";
          return `
            <label>線番</label>
            <input data-bind="wireNo" type="text" value="${escapeAttr(element.wireNo || "")}">
            <label><input data-bind="fixedWireNo" type="checkbox" ${element.fixedWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番固定</label>
            <label><input data-bind="hideWireNo" type="checkbox" ${element.hideWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番非表示</label>
            <label>線番位置</label>
            <select data-bind="wireNoAlign">
              <option value="mid"${align === "mid" ? " selected" : ""}>中央</option>
              <option value="start"${align === "start" ? " selected" : ""}>始点寄せ</option>
              <option value="end"${align === "end" ? " selected" : ""}>終点寄せ</option>
            </select>
            <div class="row">
              <div><label>線番調整X</label><input data-bind="wireNoDx" data-kind="number" type="number" step="0.5" value="${round(element.wireNoDx || 0)}"></div>
              <div><label>線番調整Y</label><input data-bind="wireNoDy" data-kind="number" type="number" step="0.5" value="${round(element.wireNoDy || 0)}"></div>
            </div>
            <div class="row">
              <div><label>FROM</label><input data-bind="fromOverride" type="text" value="${escapeAttr(element.fromOverride || "")}"></div>
              <div><label>TO</label><input data-bind="toOverride" type="text" value="${escapeAttr(element.toOverride || "")}"></div>
            </div>
          `;
        }
        if (element.type === "line") {
          return `
            <label>線ラベル</label>
            <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
          `;
        }
        return `
          <label>ラベル</label>
          <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
        `;
      }

      // 種別固有の編集フィールド(接点方向、端子台段数、表の行列、下絵クロップ等)を返す大型分岐。
      function specificFields(element) {
        if (element.type === "wire") {
          const pointCount = element.points?.length || 2;
          const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
          return `
            <div class="row" style="margin-top:8px">
              <button type="button" id="addWirePointBtn">中間点追加</button>
              <button type="button" id="removeWirePointBtn" ${pointCount <= 2 ? "disabled" : ""}>中間点削除</button>
            </div>
            <button type="button" id="orthogonalizeWireBtn" style="width:100%;margin-top:8px">直交整形</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="extendWireBtn">終点を延長</button>
              <button type="button" id="trimWireBtn">終点をトリム</button>
            </div>
            <button type="button" id="splitWireBtn" style="width:100%;margin-top:8px">配線を分割</button>
            <button type="button" id="toggleWireGapBtn" style="width:100%;margin-top:8px">${element.gapAtMid ? "中央ギャップ解除" : "中央ギャップ追加"}</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="addIntersectionGapsBtn">交差ギャップ追加</button>
              <button type="button" id="clearWireGapsBtn" ${gapCount ? "" : "disabled"}>全解除</button>
            </div>
            <p class="muted">ギャップ数: ${gapCount}</p>
          `;
        }
        if (element.type === "underlayImage") {
          const crop = element.cropPreset || "full";
          return `
            <label>透明度</label>
            <input data-bind="opacity" data-kind="number" type="number" min="0.05" max="1" step="0.05" value="${round(element.opacity ?? .35)}">
            <label>表示範囲</label>
            <select data-bind="cropPreset">
              <option value="full"${crop === "full" ? " selected" : ""}>全体</option>
              <option value="top"${crop === "top" ? " selected" : ""}>上半分</option>
              <option value="bottom"${crop === "bottom" ? " selected" : ""}>下半分</option>
              <option value="left"${crop === "left" ? " selected" : ""}>左半分</option>
              <option value="right"${crop === "right" ? " selected" : ""}>右半分</option>
            </select>
            <p class="muted">下絵は初期状態でロックされます。位置やサイズを調整する場合はロック解除してください。</p>
          `;
        }
        if (element.type === "installationBox" || element.type === "locationBox") {
          const target = element.type === "installationBox" ? "設備" : "場所";
          return `
            <label>枠線破線（一点鎖線: 6 1.5 1.5 1.5）</label>
            <input data-bind="dash" type="text" value="${escapeAttr(element.dash || "4 2")}" placeholder="4 2 / 6 1.5 1.5 1.5">
            <button type="button" id="applyAreaAttributesBtn" style="width:100%;margin-top:8px">枠内へ${target}属性を適用</button>
          `;
        }
        if (element.type === "arrow") {
          const role = element.signalRole || "reference";
          const arrowStyle = element.arrowStyle || "open";
          return `
            <label>信号矢印種別</label>
            <select data-bind="signalRole">
              <option value="reference"${role === "reference" ? " selected" : ""}>参照</option>
              <option value="source"${role === "source" ? " selected" : ""}>発信元</option>
              <option value="destination"${role === "destination" ? " selected" : ""}>受信先</option>
            </select>
            <label>矢印スタイル</label>
            <select data-bind="arrowStyle">
              <option value="open"${arrowStyle === "open" ? " selected" : ""}>開き(送り先)</option>
              <option value="solid"${arrowStyle === "solid" ? " selected" : ""}>塗り(ページ継続)</option>
              <option value="fork"${arrowStyle === "fork" ? " selected" : ""}>フォーク(母線端)</option>
              <option value="chevron"${arrowStyle === "chevron" ? " selected" : ""}>シェブロン(継続&gt;)</option>
            </select>
            <label><input data-bind="arrowAtStart" type="checkbox" ${element.arrowAtStart ? "checked" : ""} style="width:auto;min-height:auto"> 始点側にも矢印</label>
          `;
        }
        if (["contactNO", "contactNC", "pushButton"].includes(element.type)) {
          const orientation = element.orientation || "horizontal";
          const pbStyle = element.pbStyle || "momentary";
          return `
            <label>接点方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横向き標準</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦配線上の回転配置用</option>
            </select>
            ${element.type === "pushButton" ? `
            <label>PB形状</label>
            <select data-bind="pbStyle">
              <option value="momentary"${pbStyle === "momentary" ? " selected" : ""}>標準(モーメンタリ)</option>
              <option value="emergency"${pbStyle === "emergency" ? " selected" : ""}>非常停止(キノコ)</option>
            </select>` : `
            <label>参照番号(空欄=コイルから自動)</label>
            <input data-bind="refNo" type="text" value="${escapeAttr(element.refNo || "")}">`}
          `;
        }
        if (element.type === "thermalRelay") {
          const orientation = element.orientation || "horizontal";
          return `
            <label>接点方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横向き標準</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦配線上の回転配置用</option>
            </select>
            <label>参照番号(空欄=コイルから自動)</label>
            <input data-bind="refNo" type="text" value="${escapeAttr(element.refNo || "")}">
          `;
        }
        if (element.type === "contactBlock") {
          const kind = element.blockContact || "NO";
          const frame = element.blockFrame || "solid";
          return `
            <label>ブロック内接点</label>
            <select data-bind="blockContact">
              <option value="NO"${kind === "NO" ? " selected" : ""}>a接点</option>
              <option value="NC"${kind === "NC" ? " selected" : ""}>b接点</option>
            </select>
            <label>ブロック枠</label>
            <select data-bind="blockFrame">
              <option value="solid"${frame === "solid" ? " selected" : ""}>実線</option>
              <option value="dashed"${frame === "dashed" ? " selected" : ""}>点線</option>
            </select>
            <label>参照番号(空欄=コイルから自動)</label>
            <input data-bind="refNo" type="text" value="${escapeAttr(element.refNo || "")}">
          `;
        }
        if (["fuse", "breaker"].includes(element.type)) {
          const orientation = element.orientation || "horizontal";
          return `
            <label>保護部品方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横配線用</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦配線用</option>
            </select>
            ${element.type === "breaker" ? `
            <label>定格表示(トリップ素子上)</label>
            <input data-bind="refNo" type="text" value="${escapeAttr(element.refNo || "")}" placeholder="10A">` : ""}
          `;
        }
        if (element.type === "resistor") {
          const style = element.resistorStyle || "box";
          const orientation = element.orientation || "horizontal";
          return `
            <label>抵抗形状</label>
            <select data-bind="resistorStyle">
              <option value="box"${style === "box" ? " selected" : ""}>標準(枠)</option>
              <option value="varistor"${style === "varistor" ? " selected" : ""}>バリスタ(斜線)</option>
            </select>
            <label>方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦</option>
            </select>
          `;
        }
        if (element.type === "positionMark") {
          const style = element.markStyle || "box";
          return `
            <label>マーク形状</label>
            <select data-bind="markStyle">
              <option value="box"${style === "box" ? " selected" : ""}>縦線+小箱(入)</option>
              <option value="line"${style === "line" ? " selected" : ""}>縦線のみ(切)</option>
            </select>
          `;
        }
        if (element.type === "polarityMark") {
          const sign = element.sign || "+";
          return `
            <label>極性</label>
            <select data-bind="sign">
              <option value="+"${sign === "+" ? " selected" : ""}>⊕ プラス</option>
              <option value="-"${sign === "-" ? " selected" : ""}>⊖ マイナス</option>
            </select>
          `;
        }
        if (element.type === "lamp") {
          const variant = element.lampVariant || "pilot";
          return `
            <label>ランプ形状</label>
            <select data-bind="lampVariant">
              <option value="pilot"${variant === "pilot" ? " selected" : ""}>丸形パイロット</option>
              <option value="cylinder"${variant === "cylinder" ? " selected" : ""}>筒形表示灯</option>
            </select>
            <label>ランプ色文字(W/R/G等)</label>
            <input data-bind="lampColor" type="text" value="${escapeAttr(element.lampColor || "")}" placeholder="W">
          `;
        }
        if (element.type === "buzzer") {
          const variant = element.buzzerVariant || "horn";
          return `
            <label>ブザー形状</label>
            <select data-bind="buzzerVariant">
              <option value="horn"${variant === "horn" ? " selected" : ""}>ホーン</option>
              <option value="speaker"${variant === "speaker" ? " selected" : ""}>スピーカー</option>
            </select>
          `;
        }
        if (element.type === "terminal") {
          const shape = element.terminalShape || "circle";
          const orientation = element.orientation || "horizontal";
          return `
            <label>方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦</option>
            </select>
            <label>端子形状</label>
            <select data-bind="terminalShape">
              <option value="circle"${shape === "circle" ? " selected" : ""}>丸</option>
              <option value="square"${shape === "square" ? " selected" : ""}>角</option>
            </select>
          `;
        }
        if (["terminalStrip", "connector"].includes(element.type)) {
          const orientation = element.orientation || "horizontal";
          const shape = element.terminalShape || "circle";
          const connStyle = element.connStyle || "strip";
          const stripStyle = element.stripStyle || "";
          return `
            ${element.type === "terminalStrip" ? `
            <label>端子台形状</label>
            <select data-bind="stripStyle">
              <option value="unit"${stripStyle === "unit" ? " selected" : ""}>ユニット列（縦・端子円）</option>
              <option value=""${stripStyle !== "unit" ? " selected" : ""}>ピル形</option>
            </select>` : ""}
            ${element.type === "connector" ? `
            <label>コネクタ形状</label>
            <select data-bind="connStyle">
              <option value="strip"${connStyle !== "pair" ? " selected" : ""}>端子列</option>
              <option value="pair"${connStyle === "pair" ? " selected" : ""}>コネクタ対(プラグ/ソケット)</option>
            </select>` : ""}
            <div class="row">
              <div><label>端子数</label><input data-bind="count" data-kind="number" type="number" min="1" step="1" value="${Number(element.count || 8)}"></div>
              <div><label>開始番号</label><input data-bind="start" data-kind="number" type="number" step="1" value="${Number(element.start || 1)}"></div>
            </div>
            <label>方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦</option>
            </select>
            <label>端子形状</label>
            <select data-bind="terminalShape">
              <option value="circle"${shape === "circle" ? " selected" : ""}>丸</option>
              <option value="square"${shape === "square" ? " selected" : ""}>角</option>
            </select>
            <label>接頭辞</label>
            <input data-bind="prefix" type="text" value="${escapeAttr(element.prefix || "")}">
            <label>ジャンパ(例: 1-2;3-5)</label>
            <input data-bind="jumpers" type="text" value="${escapeAttr(element.jumpers || "")}" placeholder="1-2;3-5">
            ${element.type === "terminalStrip" ? `
            <label>段数（ユニット列のみ）</label>
            <select data-bind="levels" data-kind="number">
              <option value="1"${Number(element.levels) !== 2 ? " selected" : ""}>1段</option>
              <option value="2"${Number(element.levels) === 2 ? " selected" : ""}>2段（左右2列）</option>
            </select>
            <div class="row">
              <div><label>2段目開始</label><input data-bind="start2" data-kind="number" type="number" step="1" value="${Number(element.start2 || element.start || 1)}"></div>
              <div><label>2段目接頭辞</label><input data-bind="prefix2" type="text" value="${escapeAttr(element.prefix2 || "")}"></div>
            </div>` : ""}
            <label>端子名（1行1点・空行は自動番号）</label>
            <textarea data-bind="terminalLabels">${escapeHtml(element.terminalLabels || "")}</textarea>
          `;
        }
        if (element.type === "table") {
          return `
            <div class="row">
              <div><label>行</label><input data-bind="rows" data-kind="number" type="number" min="1" step="1" value="${Number(element.rows || 6)}"></div>
              <div><label>列</label><input data-bind="cols" data-kind="number" type="number" min="1" step="1" value="${Number(element.cols || 4)}"></div>
            </div>
            <label>列幅（カンマ区切り）</label>
            <input data-bind="colWidths" type="text" value="${escapeAttr(element.colWidths || "")}" placeholder="15,45,20,20">
            <label>行高（カンマ区切り）</label>
            <input data-bind="rowHeights" type="text" value="${escapeAttr(element.rowHeights || "")}" placeholder="8,5,5,5">
            <label>斜線セル（行,列;行,列）</label>
            <input data-bind="cellDiagonals" type="text" value="${escapeAttr(element.cellDiagonals || "")}" placeholder="2,3;3,3">
            <label>表文字サイズ mm</label>
            <input data-bind="tableFontSize" data-kind="number" type="number" min="1" step="0.1" value="${round(element.tableFontSize || 2.2)}">
            <label>セル文字（タブ/カンマ区切り）</label>
            <textarea data-bind="cellText">${escapeHtml(element.cellText || "")}</textarea>
          `;
        }
        if (element.type === "plcBlock") {
          const plcStyle = element.plcStyle || "grid";
          return `
            <label>PLC表示形式</label>
            <select data-bind="plcStyle">
              <option value="grid"${plcStyle === "grid" ? " selected" : ""}>格子ボックス</option>
              <option value="unit"${plcStyle === "unit" ? " selected" : ""}>ユニット列(端子円+破断線)</option>
            </select>
            <label>I/O行数</label>
            <input data-bind="rows" data-kind="number" type="number" min="1" step="1" value="${Number(element.rows || 8)}">
            <label>I/O名（1行1点）</label>
            <textarea data-bind="pinText">${escapeHtml(element.pinText || "")}</textarea>
          `;
        }
        if (element.type === "deviceBox") {
          return `
            <label>左右ピン数</label>
            <input data-bind="pins" data-kind="number" type="number" min="0" step="1" value="${Number(element.pins || 4)}">
            <label>左端子文字（1行1点）</label>
            <textarea data-bind="pinText">${escapeHtml(element.pinText || "")}</textarea>
            <label>右端子文字（1行1点）</label>
            <textarea data-bind="rightPinText">${escapeHtml(element.rightPinText || "")}</textarea>
          `;
        }
        if (["rect", "circle"].includes(element.type)) {
          const fill = element.fill || "";
          return `
            <label>塗りつぶし</label>
            <select data-bind="fill">
              <option value=""${!fill ? " selected" : ""}>なし</option>
              <option value="#fff"${fill === "#fff" ? " selected" : ""}>白（下を隠す）</option>
              <option value="#111820"${fill === "#111820" ? " selected" : ""}>黒</option>
            </select>
            ${element.type === "rect" ? `
            <label>枠線破線（例: 1.4 1.2）</label>
            <input data-bind="dash" type="text" value="${escapeAttr(element.dash || "")}" placeholder="実線のまま=空欄">` : ""}
          `;
        }
        if (element.type === "dimension") {
          return `
            <label>寸法線オフセット mm</label>
            <input data-bind="dimOffset" data-kind="number" type="number" step="0.5" value="${round(element.dimOffset ?? 6)}">
            <p class="muted">寸法値は2点間の実寸(mm)を自動表示します。「ラベル」に入力すると上書きできます。</p>
          `;
        }
        if (element.type === "line") {
          const lineKind = element.lineKind || "straight";
          return `
            <label>線形状</label>
            <select data-bind="lineKind">
              <option value="straight"${lineKind !== "wave" ? " selected" : ""}>直線</option>
              <option value="wave"${lineKind === "wave" ? " selected" : ""}>波形（破断線）</option>
            </select>
            <label>線種プリセット</label>
            <select id="lineStylePreset">
              <option value="">実線</option>
              <option value="3 2">破線</option>
              <option value="6 1.5 1.5 1.5">一点鎖線</option>
              <option value="8 1.5 1.5 1.5 1.5 1.5">二点鎖線</option>
              <option value="1.4 1.2">細点線</option>
            </select>
            <div class="row">
              <div><label>線幅</label><input data-bind="strokeWidth" data-kind="number" type="number" min="0.1" step="0.1" value="${round(element.strokeWidth || .32)}"></div>
              <div><label>破線</label><input data-bind="dash" type="text" value="${escapeAttr(element.dash || "")}" placeholder="3 2"></div>
            </div>
          `;
        }
        return "";
      }

      // 信号矢印の役割(発信/受信)表示名。
      function signalRoleLabel(role) {
        const labels = { source: "発信元", destination: "受信先", reference: "参照" };
        return labels[role || "reference"] || labels.reference;
      }

      // 電気属性(タグ/説明/設備/場所/メーカー/品番/定格/項目)の編集フィールド定義。
      function electricalAttributeFields(element) {
        if (!supportsElectricalAttributes(element)) return "";
        return `
          <details class="attr-panel" open>
            <summary>電気属性</summary>
            <label>タグ</label>
            <input data-bind="tag" type="text" value="${escapeAttr(element.tag || "")}">
            <label><input data-bind="fixedTag" type="checkbox" ${element.fixedTag ? "checked" : ""} style="width:auto;min-height:auto"> 部品タグ固定</label>
            <label>説明</label>
            <textarea data-bind="description">${escapeHtml(element.description || "")}</textarea>
            <div class="row">
              <div><label>設備</label><input data-bind="installation" type="text" value="${escapeAttr(element.installation || "")}"></div>
              <div><label>場所</label><input data-bind="location" type="text" value="${escapeAttr(element.location || "")}"></div>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="copyInstallLocationBtn">設備/場所コピー</button>
              <button type="button" id="pasteInstallLocationBtn" ${installLocationClipboard ? "" : "disabled"}>設備/場所貼付</button>
            </div>
            <div class="row">
              <div><label>メーカー</label><input data-bind="manufacturer" type="text" value="${escapeAttr(element.manufacturer || "")}"></div>
              <div><label>品番</label><input data-bind="catalog" type="text" value="${escapeAttr(element.catalog || "")}"></div>
            </div>
            <button type="button" id="catalogPickBtn" style="width:100%;margin-top:8px">カタログから選択</button>
            <div class="row">
              <div><label>定格</label><input data-bind="rating" type="text" value="${escapeAttr(element.rating || "")}"></div>
              <div><label>項目</label><input data-bind="item" type="text" value="${escapeAttr(element.item || "")}"></div>
            </div>
            ${attributeDisplayControls(element)}
          </details>
        `;
      }

      // 属性の図面表示ON/OFFと位置・サイズ調整UIの定義。
      function attributeDisplayControls(element) {
        const defaults = attributeDisplayDefaults(element);
        const checkboxes = ATTRIBUTE_DISPLAY_FIELDS.map(field => `<label><input data-bind="${escapeAttr(field.prop)}" type="checkbox" ${element[field.prop] ? "checked" : ""} style="width:auto;min-height:auto"> ${escapeHtml(field.label)}</label>`);
        const rows = [];
        for (let i = 0; i < checkboxes.length; i += 2) {
          rows.push(`<div class="row">${checkboxes.slice(i, i + 2).map(item => `<div>${item}</div>`).join("")}</div>`);
        }
        return `
          <label>図面表示</label>
          ${rows.join("")}
          <div class="row">
            <div><label>表示X</label><input data-bind="attrX" data-kind="number" type="number" step="0.5" value="${round(defaults.x)}"></div>
            <div><label>表示Y</label><input data-bind="attrY" data-kind="number" type="number" step="0.5" value="${round(defaults.y)}"></div>
          </div>
          <label>表示文字サイズ mm</label>
          <input data-bind="attrFontSize" data-kind="number" type="number" min="1" step="0.2" value="${round(defaults.fontSize)}">
        `;
      }

      // 属性表示の既定(表示項目・位置)。
      function attributeDisplayDefaults(element) {
        const w = Number(element.w || defaultElement(element.type).w || 18);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return {
          x: element.attrX ?? (w + 3),
          y: element.attrY ?? (h + 3),
          fontSize: element.attrFontSize || 2.2
        };
      }

      // 電気属性を持てる種別か(帳票・カタログ・タグ採番の対象判定)。
      function supportsElectricalAttributes(element) {
        if (!element) return false;
        return !["text", "wire", "line", "rect", "circle", "underlayImage", "installationBox", "locationBox", "table", "arrow", "junction", "positionMark", "polarityMark", "mechanicalLink", "dimension"].includes(element.type);
      }

      // 右パネル入力→選択要素への反映(data-bindのキーで分岐)。save=trueで履歴記録。
      function updateSelectedFromInput(input, save = true) {
        const element = selectedElement();
        if (!element) return;
        const key = input.dataset.bind;
        const value = input.type === "checkbox" ? input.checked : (input.dataset.kind === "number" ? Number(input.value) : input.value);
        const pointMatch = key.match(/^p(\d+)(x|y)$/);
        if (pointMatch && element.points?.[Number(pointMatch[1])]) {
          element.points[Number(pointMatch[1])][pointMatch[2] === "x" ? 0 : 1] = value;
        } else {
          element[key] = value;
          if (key === "tag" && supportsElectricalAttributes(element) && !element.label) element.label = value;
          if (key === "tag" && value) {
            const dup = state.pages.some(page => page.elements.some(item =>
              item.id !== element.id && item.type === element.type && componentTag(item) === value));
            if (dup) setStatus("注意: 同種部品でタグ「" + value + "」が重複しています。");
          }
          if (["orientation", "count", "stripStyle", "levels"].includes(key) && ["terminalStrip", "connector"].includes(element.type) && element.connStyle !== "pair") resizeTerminalElementForOrientation(element);
          if (key === "orientation" && element.type === "terminal" && !resizeGeoElementForOrientation(element)) resizeSingleTerminalForOrientation(element);
          if (key === "orientation" && ["contactNO", "contactNC", "pushButton", "selectorSwitch", "limitSwitch", "pressureSwitch", "thermalRelay", "thermalElement", "contactBlock"].includes(element.type) && !resizeGeoElementForOrientation(element)) resizeContactElementForOrientation(element);
          if (key === "orientation" && ["fuse", "breaker", "resistor"].includes(element.type) && !resizeGeoElementForOrientation(element)) resizeProtectiveElementForOrientation(element);
          if (["pbStyle", "resistorStyle", "markStyle", "sign", "lampVariant", "terminalShape", "connStyle", "blockContact"].includes(key)) {
            if (!resizeGeoElementForOrientation(element)) {
              if (element.type === "terminal") resizeSingleTerminalForOrientation(element);
              if (["terminalStrip", "connector"].includes(element.type)) resizeTerminalElementForOrientation(element);
              if (element.type === "lamp") { element.w = 10; element.h = 10; }
            }
          }
          if (element.type === "plcBlock" && ["plcStyle", "rows"].includes(key)) {
            if ((element.plcStyle || "grid") === "unit") {
              element.w = 10.5;
              element.h = Math.max(1, Number(element.rows || 8)) * 9.5;
            } else if (key === "plcStyle") {
              element.w = 50;
              element.h = Math.max(2, Number(element.rows || 8)) * 6 + 10;
            }
          }
        }
        if (save) commitHistory("要素を更新しました。");
        render();
      }

      // 接点の向き変更時にw/hを入れ替える(旧経路互換)。
      function resizeContactElementForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 10;
          element.h = element.type === "pushButton" ? 18 : 16;
          return;
        }
        element.w = 14;
        element.h = element.type === "pushButton" ? 12 : 10;
      }

      // 保護素子(ヒューズ等)の向き変更時の寸法調整。
      function resizeProtectiveElementForOrientation(element) {
        if (element.type === "fuse") {
          element.w = element.orientation === "vertical" ? 4.5 : 12;
          element.h = element.orientation === "vertical" ? 12 : 4.5;
          return;
        }
        if (element.type === "breaker") {
          element.w = element.orientation === "vertical" ? 7 : 12;
          element.h = element.orientation === "vertical" ? 12 : 7;
        }
      }

      // 端子台の向き変更時の寸法調整。
      function resizeTerminalElementForOrientation(element) {
        const count = Math.max(1, Number(element.count || 8));
        if (element.type === "terminalStrip" && element.stripStyle === "unit" && element.orientation === "vertical") {
          element.w = Number(element.levels) === 2 ? 16 : 10.5;
          element.h = count * 9.5;
          return;
        }
        const pitch = element.type === "connector" ? 7 : 8;
        if (element.orientation === "vertical") {
          element.w = element.type === "connector" ? 10 : 12;
          element.h = count * pitch;
        } else {
          element.w = count * pitch;
          element.h = element.type === "connector" ? 10 : 12;
        }
      }

      // 単独端子の向き変更時の寸法調整。
      function resizeSingleTerminalForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 6;
          element.h = 10;
          return;
        }
        element.w = 10;
        element.h = 6;
      }

      // HTML特殊文字のエスケープ(ダイアログ組み立て用)。
      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }

      // 属性値用エスケープ(escapeHtml+引用符)。
      function escapeAttr(text) {
        return escapeHtml(text).replace(/\n/g, " ");
      }

      // mm座標を0.01mm精度へ丸める(座標比較の安定化)。
      function round(value) {
        return Math.round(Number(value || 0) * 100) / 100;
      }

      // 種別ごとの新規要素の既定値(寸法・ラベル・レイヤ)。新種別はここへ追加する。
      function defaultElement(type, x = 30, y = 30) {
        const base = { id: uid("el"), type, x, y, rotation: 0, stroke: state.settings.stroke, layer: defaultLayerFor(type) };
        const defaults = {
          text: { ...base, w: 40, h: 8, text: "文字", fontSize: 3.5 },
          line: { id: uid("el"), type: "line", points: [[x, y], [x + 30, y]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: defaultLayerFor("line") },
          mechanicalLink: { id: uid("el"), type: "mechanicalLink", points: [[x, y], [x, y + 30]], label: "", strokeWidth: .26, dash: "1.2 1.4", stroke: state.settings.stroke, layer: "symbols" },
          rect: { ...base, w: 34, h: 22, label: "" },
          circle: { ...base, w: 22, h: 22, label: "" },
          cloud: { ...base, w: 40, h: 20, label: "" },
          underlayImage: { ...base, w: 160, h: 110, label: "下絵", imageData: "", opacity: .35, cropPreset: "full", locked: true, layer: "layout" },
          installationBox: { ...base, w: 120, h: 80, label: "INST1", dash: "4 2", layer: "layout" },
          locationBox: { ...base, w: 120, h: 80, label: "LOC1", dash: "4 2", layer: "layout" },
          terminal: { ...base, w: 1.8, h: 1.8, label: "1", orientation: "horizontal", terminalShape: "circle" },
          terminalStrip: { ...base, w: 10.5, h: 152, count: 16, start: 1, prefix: "", orientation: "vertical", terminalShape: "circle", stripStyle: "unit", label: "TB1", jumpers: "" },
          contactNO: { ...base, w: 8, h: 4.4, label: "NO", orientation: "horizontal", refNo: "" },
          contactNC: { ...base, w: 8, h: 4.4, label: "NC", orientation: "horizontal", refNo: "" },
          contactBlock: { ...base, w: 14, h: 8, label: "CR", orientation: "horizontal", blockContact: "NO", blockFrame: "solid", refNo: "" },
          pushButton: { ...base, w: 10, h: 5, label: "PB", orientation: "horizontal", pbStyle: "momentary" },
          selectorSwitch: { ...base, w: 10, h: 5, label: "SS", orientation: "horizontal" },
          limitSwitch: { ...base, w: 10, h: 4.6, label: "LS", orientation: "horizontal" },
          pressureSwitch: { ...base, w: 10, h: 6, label: "PS", orientation: "horizontal" },
          coil: { ...base, w: 10, h: 4.4, label: "CR" },
          fuse: { ...base, w: 12, h: 4.5, label: "F", orientation: "horizontal" },
          breaker: { ...base, w: 12, h: 5, label: "CB", orientation: "horizontal", refNo: "" },
          lamp: { ...base, w: 10, h: 4.4, label: "PL", lampVariant: "pilot", lampColor: "W" },
          buzzer: { ...base, w: 14, h: 9, label: "BZ", buzzerVariant: "horn" },
          solenoidValve: { ...base, w: 26, h: 16, label: "SOL" },
          sensor: { ...base, w: 24, h: 14, label: "SEN" },
          powerSupply: { ...base, w: 34, h: 24, label: "PS" },
          transformer: { ...base, w: 24, h: 16, label: "T" },
          ground: { ...base, w: 4, h: 5, label: "E" },
          motor: { ...base, w: 16, h: 16, label: "M" },
          fan: { ...base, w: 14, h: 14, r: 5, label: "FAN" },
          resistor: { ...base, w: 10, h: 2.6, label: "R", orientation: "horizontal", resistorStyle: "box" },
          capacitor: { ...base, w: 12, h: 7, label: "C" },
          diode: { ...base, w: 12, h: 7, label: "D" },
          thermalRelay: { ...base, w: 8, h: 4, label: "THR", orientation: "horizontal", refNo: "" },
          thermalElement: { ...base, w: 8, h: 3, label: "OL", orientation: "horizontal" },
          positionMark: { ...base, w: 4, h: 6, label: "入", markStyle: "box" },
          polarityMark: { ...base, w: 2.6, h: 2.6, label: "", sign: "+" },
          deviceBox: { ...base, w: 28, h: 20, label: "機器", pins: 4, pinText: "1\n2\n3\n4", rightPinText: "" },
          plcBlock: { ...base, w: 50, h: 60, label: "PLC", rows: 8, pinText: "I00\nI01\nI02\nI03\nO00\nO01\nO02\nO03" },
          connector: { ...base, w: 70, h: 10, count: 10, start: 1, prefix: "", orientation: "horizontal", terminalShape: "circle", label: "CN" },
          cableMarker: { ...base, w: 28, h: 12, label: "C" },
          cableBundle: { ...base, w: 32, h: 18, label: "CBL" },
          terminalBox: { ...base, w: 22, h: 18, label: "TB", rows: 3 },
          table: { ...base, w: 86, h: 48, rows: 6, cols: 4, label: "表", colWidths: "", rowHeights: "", tableFontSize: 2.2, cellText: "No.\t項目\t内容\t備考" },
          junction: { ...base, w: 2, h: 2, r: 0.5, label: "" },
          arrow: { id: uid("el"), type: "arrow", points: [[x, y], [x + 30, y]], label: "REF", signalRole: "reference", arrowStyle: "open", arrowAtStart: false, stroke: state.settings.stroke, layer: defaultLayerFor("arrow") },
          dimension: { id: uid("el"), type: "dimension", points: [[x, y], [x + 30, y]], label: "", dimOffset: 6, stroke: state.settings.stroke, layer: "notes" },
          wire: { id: uid("el"), type: "wire", points: [[x, y], [x + 30, y]], wireNo: "", wireNoAlign: "mid", fixedWireNo: false, hideWireNo: false, gapAtMid: false, fromOverride: "", toOverride: "", wireType: state.settings.currentWireType, stroke: state.settings.stroke, layer: "wires" }
        };
        return deepClone(defaults[type] || defaults.deviceBox);
      }

      // 種別→既定レイヤ(settings.currentLayerを優先しつつ推定)。
      function defaultLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return state.settings.currentLayer || "layout";
        if (type === "mechanicalLink") return state.settings.currentLayer || "symbols";
        return state.settings.currentLayer || "symbols";
      }

      // 種別→推定レイヤ(配線=wires、注記=notes等)。
      function inferredLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return "layout";
        if (type === "mechanicalLink") return "symbols";
        return "symbols";
      }

      // ポインタイベント→用紙mm座標へ変換(getScreenCTMの逆行列)。raw指定でスナップなしの生座標。
      function canvasPoint(event, options = {}) {
        const svg = qs("#canvas");
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
        if (options.raw) return { x: transformed.x, y: transformed.y };
        return snapPoint(transformed.x, transformed.y, options);
      }

      // 1値をグリッドへスナップ(設定OFF時は素通し)。
      function snap(value) {
        if (!state.settings.snap) return value;
        const grid = Number(state.settings.grid || 2.5);
        return Math.round(value / grid) * grid;
      }

      // 座標スナップの本体。優先順: 接続点/端点吸着(objectSnap) → 設備標準ページの行磁気(9.5mmピッチ) → グリッド。
      // optionsで接続点限定(connectionOnly)などを制御。
      function snapPoint(x, y, options = {}) {
        const gridPoint = { x: snap(x), y: snap(y) };
        const activePage = currentPage();
        if (activePage && activePage.frameVariant === "ladder" && state.settings.snap) {
          const row = LADDER_GRID.top + LADDER_GRID.pitch * Math.round((y - LADDER_GRID.top) / LADDER_GRID.pitch);
          if (Math.abs(row - y) <= 2 && row >= LADDER_GRID.top && row <= LADDER_GRID.top + LADDER_GRID.pitch * LADDER_GRID.rows) {
            gridPoint.y = round(row);
          }
        }
        if (!state.settings.objectSnap) return gridPoint;
        const excludeIds = options.excludeIds || (options.excludeSelected ? currentSelectionIdSet() : new Set());
        const anchors = options.connectionOnly
          ? collectConnectionAnchors(currentPage(), excludeIds)
          : collectSnapAnchors(currentPage(), excludeIds);
        const best = closestAnchor(anchors, x, y);
        if (best) return { x: best.x, y: best.y };
        const segmentSnap = closestSegmentSnapPoint(currentPage(), x, y, excludeIds);
        return segmentSnap || gridPoint;
      }

      // 選択中ID集合をSetで返す(スナップ除外などの下請け)。
      function currentSelectionIdSet() {
        return new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []));
      }

      // 端点スナップ候補(配線端点・図形角など)を収集。excludeIdsは除外(自分自身への吸着防止)。
      function collectSnapAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = collectConnectionAnchors(page, excludeIds);
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.points || element.type === "junction" || element.type === "terminalStrip" || element.type === "connector") return;
          const box = elementBounds(element);
          if (!box) return;
          anchors.push({ x: box.x, y: box.y });
          anchors.push({ x: box.x + box.w, y: box.y });
          anchors.push({ x: box.x, y: box.y + box.h });
          anchors.push({ x: box.x + box.w, y: box.y + box.h });
          anchors.push({ x: box.x + box.w / 2, y: box.y + box.h / 2 });
        });
        return anchors;
      }

      // 接続点スナップ候補(端子・シンボル接続点・端子台ノード)を収集。
      function collectConnectionAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = [];
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.type === "wire" || element.type === "line" || element.type === "mechanicalLink" || element.type === "arrow") {
            (element.points || []).forEach(point => anchors.push({ x: point[0], y: point[1], elementId: element.id, kind: "point" }));
            return;
          }
          if (element.type === "junction") {
            anchors.push({ x: element.x || 0, y: element.y || 0, elementId: element.id, kind: "junction" });
