<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electrical Drawing Studio</title>
  <style>
    /* ===== デザイントークン(配色・影・フォント) ===== */
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-2: #f7f9fb;
      --line: #d6dde5;
      --line-dark: #aab5c1;
      --text: #17202a;
      --muted: #667483;
      --accent: #0f6f63;
      --accent-2: #d96332;
      --danger: #b42318;
      --shadow: 0 14px 36px rgba(20, 31, 44, .16);
      --mono: "Consolas", "Yu Gothic UI", monospace;
      --ui: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: var(--ui);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 9px;
      cursor: pointer;
      min-height: 32px;
    }

    button:hover { border-color: var(--line-dark); background: #f9fbfc; }
    button:active { transform: translateY(1px); }

    button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
      font-family: var(--mono);
    }

    button.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      min-height: 32px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 9px 0 4px;
    }

    details.attr-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 8px;
    }

    details.attr-panel summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      list-style-position: inside;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 48px 40px minmax(0, 1fr);
    }

    /* ===== 上部ツールバー・ページタブ(共通の帯スタイル) ===== */
    .topbar,
    .tabbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 210px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      position: relative;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--accent);
    }

    .brand-mark::before { width: 12px; height: 2px; left: 4px; top: 10px; }
    .brand-mark::after { width: 2px; height: 12px; left: 10px; top: 4px; }

    .top-actions,
    .tool-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .spacer { flex: 1; }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38vw;
    }

    .tabbar {
      padding: 5px 10px;
      overflow-x: auto;
      gap: 6px;
    }

    .page-tab {
      min-width: 92px;
      max-width: 190px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .page-tab.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    /* ===== 3カラムレイアウト(左パレット/中央キャンバス/右パネル) ===== */
    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 304px;
    }

    /* ===== 左パネル(部品パレット)・右パネル共通のスクロール領域 ===== */
    .palette,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 12px;
    }

    .inspector {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #334150;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 6px 0 10px;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    details.palette-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px 8px;
      margin-top: 8px;
    }

    details.palette-group summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: #334150;
      user-select: none;
    }

    details.palette-group .palette-grid { margin-top: 8px; }

    .palette-item {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      grid-template-rows: 30px auto;
      align-items: center;
      justify-items: center;
      padding: 7px 6px;
      cursor: grab;
      user-select: none;
    }

    .palette-item:hover,
    .palette-item.active {
      border-color: var(--accent);
      background: #f1fbf8;
    }

    .palette-icon {
      width: 50px;
      height: 28px;
      color: #14202c;
    }

    /* 実描画アイコン: 図面用クラスはvector-effect併用のため、アイコン内では線幅を画面px固定にする */
    .palette-icon [class] { stroke-width: 1.35; }
    /* アイコンではタグ等の入力文字を表示しない(文字部品のアイコンのみ例外) */
    .palette-icon text { display: none; }
    .palette-icon.icon-keep-text text { display: initial; }

    .palette-label {
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .section {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 12px;
    }

    /* ===== 中央キャンバス ===== */
    .workspace {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      position: relative;
      background:
        linear-gradient(90deg, rgba(40, 54, 70, .06) 1px, transparent 1px),
        linear-gradient(rgba(40, 54, 70, .06) 1px, transparent 1px),
        var(--bg);
      background-size: 20px 20px;
    }

    .stage {
      min-width: max-content;
      min-height: max-content;
      padding: 34px;
      display: grid;
      place-items: start center;
    }

    .drawing-page {
      background: #fff;
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
      overflow: visible;
    }

    .svg-text {
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      fill: #101820;
    }

    .frame-line { stroke: #141a20; stroke-width: .25; fill: none; vector-effect: non-scaling-stroke; }
    .frame-thick { stroke: #141a20; stroke-width: .45; fill: none; vector-effect: non-scaling-stroke; }
    .frame-light { stroke: #5e6872; stroke-width: .18; fill: none; vector-effect: non-scaling-stroke; }
    .wire-line { stroke: #111820; stroke-width: .38; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; }
    .dash-line { stroke-dasharray: 3 2; }
    .symbol-fill { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }
    .symbol-line { stroke: #111820; stroke-width: .32; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; stroke-linejoin: round; }
    .terminal-dot { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }

    .element:hover .symbol-line,
    .element:hover .wire-line,
    .element:hover .symbol-fill {
      stroke: var(--accent-2);
    }

    .selection-box {
      fill: none;
      stroke: var(--accent);
      stroke-width: .5;
      stroke-dasharray: 2 1.2;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle {
      fill: #fff;
      stroke: var(--accent);
      stroke-width: .45;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle.resize-handle {
      pointer-events: all;
      cursor: nwse-resize;
    }

    .point-handle {
      fill: #fff;
      stroke: var(--accent-2);
      stroke-width: .55;
      vector-effect: non-scaling-stroke;
      pointer-events: all;
      cursor: crosshair;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .danger { color: var(--danger); }

    /* ===== 共通ダイアログ ===== */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(20, 31, 44, .42);
      z-index: 10;
    }

    .dialog-backdrop.hidden { display: none; }

    .dialog {
      width: min(760px, calc(100vw - 48px));
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .dialog-title {
      font-weight: 700;
      font-size: 16px;
    }

    /* ===== ダイアログ内の一覧表 ===== */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .report-table th,
    .report-table td {
      border: 1px solid var(--line);
      padding: 6px 7px;
      text-align: left;
      vertical-align: top;
    }

    .report-table th {
      background: var(--panel-2);
      color: #334150;
      font-weight: 700;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 7px;
    }

    .swatch {
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      cursor: pointer;
    }

    .swatch.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ===== 印刷用シート(通常時は非表示) ===== */
    .print-sheets { display: none; }

    #fileInput,
    #terminalCsvInput,
    #plcCsvInput,
    #underlayInput,
    #underlayTwoUpInput,
    #dxfImportInput,
    #packImportInput { display: none; }

    /* ===== 印刷時: 画面UIを隠して印刷シートのみ表示 ===== */
    @media print {
      @page { margin: 0; }
      @page a4p { size: 210mm 297mm; margin: 0; }
      @page a4l { size: 297mm 210mm; margin: 0; }
      @page a3p { size: 297mm 420mm; margin: 0; }
      @page a3l { size: 420mm 297mm; margin: 0; }

      html,
      body {
        width: auto;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .app { display: none; }
      .print-sheets { display: block; }

      .print-sheet {
        display: block;
        page-break-after: always;
        break-after: page;
        margin: 0;
      }

      .print-sheet.page-a4-portrait { page: a4p; }
      .print-sheet.page-a4-landscape { page: a4l; }
      .print-sheet.page-a3-portrait { page: a3p; }
      .print-sheet.page-a3-landscape { page: a3l; }

      .print-sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .print-sheet > svg {
        display: block;
        width: 100%;
        height: 100%;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 上部ツールバー: 新規/開く/復元/保存・検索・ヘルプ・表題欄・印刷/出力・ツール切替 -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Electrical Drawing Studio</span>
      </div>
      <div class="top-actions">
        <button type="button" id="newProjectBtn" title="新規プロジェクト">新規</button>
        <button type="button" id="openBtn" title="JSONを開く">開く</button>
        <button type="button" id="restoreBackupBtn" title="ブラウザ内の自動保存を復元">復元</button>
        <button type="button" id="saveBtn" class="primary" title="JSONで保存">保存</button>
        <button type="button" id="searchBtn" title="線番・タグ・文字を検索/置換">検索</button>
        <button type="button" id="helpBtn" title="使い方とショートカット">ヘルプ</button>
        <button type="button" id="titleBatchBtn" title="全ページの表題欄を一括更新">表題欄</button>
        <button type="button" id="printBtn" title="全ページをPDF印刷">PDF印刷</button>
        <button type="button" id="printTwoUpBtn" title="A3縦に2ページずつ面付けして印刷">A3面付</button>
        <button type="button" id="exportSvgBtn" title="現在ページをSVG出力">SVG</button>
        <button type="button" id="exportPngBtn" title="現在ページをPNG出力">PNG</button>
      </div>
      <div class="spacer"></div>
      <div class="tool-actions" role="toolbar" aria-label="作図ツール">
        <button type="button" class="icon active" data-tool="select" title="選択/移動">S</button>
        <button type="button" class="icon" data-tool="wire" title="直交配線">W</button>
        <button type="button" class="icon" data-tool="text" title="文字">T</button>
        <button type="button" class="icon" id="undoBtn" title="元に戻す">U</button>
        <button type="button" class="icon" id="redoBtn" title="やり直し">R</button>
        <button type="button" class="icon" id="deleteBtn" title="削除">X</button>
      </div>
      <div class="status" id="status">A4縦の図枠付きページを作成しました。</div>
    </header>

    <!-- ページタブ(renderTabs()が中身を生成。ダブルクリックで改名) -->
    <nav class="tabbar" id="tabbar" aria-label="ページタブ"></nav>

    <!-- 本体3カラム。左=パレット/設定/機能メニュー、中央=SVGキャンバス、右=ページ設定/選択編集 -->
    <main class="shell">
      <!-- 左パネル: 部品パレット(renderPalette)・表示設定・配線/レイヤ・自動処理/機能メニュー -->
      <aside class="palette">
        <div class="panel-title">部品パレット</div>
        <button type="button" id="selectOnlyBtn" data-tool="select" style="width:100%;margin-bottom:8px">選択</button>
        <input id="paletteFilter" type="search" placeholder="部品検索" aria-label="部品検索">
        <div id="paletteGrid"></div>

        <div class="section">
          <div class="panel-title">表示</div>
          <label for="zoomRange">ズーム</label>
          <input id="zoomRange" type="range" min="0.8" max="8" step=".1" value="3.2">
          <div class="row-3" style="margin-top:8px">
            <button type="button" id="zoomOutBtn">縮小</button>
            <button type="button" id="zoomInBtn">拡大</button>
            <button type="button" id="actualSizeBtn">標準</button>
          </div>
          <button type="button" id="fitPageBtn" style="width:100%;margin-top:8px">全体表示</button>
          <div class="row">
            <div>
              <label for="gridSize">グリッド mm</label>
              <input id="gridSize" type="number" min="1" step="0.5" value="2.5">
            </div>
            <div>
              <label for="snapToggle">スナップ</label>
              <select id="snapToggle">
                <option value="on">ON</option>
                <option value="off">OFF</option>
              </select>
            </div>
          </div>
          <label for="objectSnapToggle">端点スナップ</label>
          <select id="objectSnapToggle">
            <option value="on">ON</option>
            <option value="off">OFF</option>
          </select>
          <label for="underlayOutputToggle">下絵をPDF/SVG/PNGに含める</label>
          <select id="underlayOutputToggle">
            <option value="off">OFF</option>
            <option value="on">ON</option>
          </select>
          <p class="muted">左の部品をドラッグして用紙に配置します。配線は W ツールでドラッグ、部品は選択後に移動できます。</p>
        </div>

        <div class="section">
          <div class="panel-title">配線・レイヤ</div>
          <label for="currentWireType">配線種別</label>
          <select id="currentWireType"></select>
          <label for="currentLayer">作図レイヤ</label>
          <select id="currentLayer"></select>
        </div>

        <div class="section">
          <div class="panel-title">自動処理・ツール</div>
          <label for="wireNumberFormat">線番書式</label>
          <input id="wireNumberFormat" type="text" value="%S-%N">
          <label for="componentTagFormat">部品タグ書式</label>
          <input id="componentTagFormat" type="text" value="%F%N">
          <div class="row" style="margin-top:8px">
            <button type="button" id="autoWireBtn">線番採番</button>
            <button type="button" id="auditBtn">監査</button>
          </div>
          <label for="actionMenu">機能メニュー</label>
          <select id="actionMenu">
            <option value="">選択してください…</option>
            <optgroup label="自動処理">
              <option value="terminalNo">端子番号の振り直し</option>
              <option value="tagComponents">部品タグ採番</option>
              <option value="autoJunction">接続点生成</option>
              <option value="rotateAbout">指定回転（中心指定）</option>
              <option value="wireSequence">配線順序(FROM/TO)</option>
              <option value="addRung">ラング追加</option>
            </optgroup>
            <optgroup label="一括生成">
              <option value="rungCircuit">ラング回路（接点+コイル/ランプ）</option>
              <option value="estopChain">非常停止チェーン</option>
              <option value="powerOn">電源投入回路（自己保持）</option>
              <option value="brake">ブレーキ/整流回路</option>
              <option value="wireColumn">縦配線列</option>
              <option value="wireRow">横配線行</option>
              <option value="twistedPair">ツイストペア</option>
              <option value="motorCircuit">モータ分岐回路</option>
              <option value="plcUnit">PLCユニット</option>
              <option value="panelLink">盤レイアウト連携</option>
            </optgroup>
            <optgroup label="一覧・管理">
              <option value="projects">プロジェクト管理（ブラウザ内保存）</option>
              <option value="terminalEditor">端子台エディタ</option>
              <option value="tagRules">部品タグ規則</option>
              <option value="wireTypeManager">配線種別管理</option>
              <option value="layerManager">レイヤ管理</option>
              <option value="catalog">部品カタログ</option>
              <option value="symbolManager">ユーザー部品管理</option>
              <option value="symbolBuilder">シンボルビルダー（簡易）</option>
              <option value="revisionHistory">改訂履歴</option>
            </optgroup>
            <optgroup label="帳票・確認">
              <option value="crossRef">クロスリファレンス</option>
              <option value="reportCsv">帳票CSV出力</option>
              <option value="reportTable">図面要素一覧</option>
              <option value="insertReport">帳票表挿入</option>
              <option value="bom">部品集計表(BOM)</option>
              <option value="terminalPlan">端子台プラン表</option>
              <option value="indexGen">目次生成（全ページ一覧）</option>
              <option value="netlist">ネットリスト（ページ間統合）</option>
            </optgroup>
            <optgroup label="取込・出力">
              <option value="terminalCsv">端子CSV取込</option>
              <option value="plcCsv">PLC CSV取込</option>
              <option value="importDxf">DXF取込</option>
              <option value="exportDxf">DXF出力（現在ページ）</option>
              <option value="exportDxfAll">DXF出力（全ページ）</option>
              <option value="exportPack">標準パック出力</option>
              <option value="importPack">標準パック取込</option>
            </optgroup>
          </select>
        </div>
      </aside>

      <!-- 中央: 図面キャンバス。drawPageSvg()がSVGを再構築し、pointerイベントで作図/選択する -->
      <section class="workspace" id="workspace">
        <div class="stage">
          <svg id="canvas" class="drawing-page" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="図面キャンバス"></svg>
        </div>
      </section>

      <!-- 右パネル: ページ設定・表題欄・テンプレート/下絵メニュー・選択中要素の編集(renderSelectionPanel) -->
      <aside class="inspector">

      // JSON往復による深いコピー(関数や循環参照は不可の前提)。
      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      // アクティブページを返す(見つからなければ先頭ページ)。
      function currentPage() {
        return state.pages.find(page => page.id === state.activePageId) || state.pages[0];
      }

      // ページの用紙寸法{w,h}をmmで返す。
      function pageSize(page) {
        const paper = PAPER[page.size] || PAPER.A4;
        const pair = paper[page.orientation] || paper.portrait;
        return { w: pair[0], h: pair[1] };
      }

      // 新規ページオブジェクトを生成(図枠種別・表題欄の既定値込み)。stateへは呼び出し側がpushする。
      function createPage(options = {}) {
        const id = uid("page");
        const index = pageCounter++;
        return {
          id,
          name: options.name || "P" + index,
          size: options.size || "A4",
          orientation: options.orientation || "portrait",
          frameVariant: options.frameVariant || "detailed",
          title: {
            drawingNo: options.drawingNo || "",
            title: options.title || "電気図面",
            revision: options.revision || "",
            designer: options.designer || "",
            date: options.date || today,
            facility: options.facility || "",
            installation: options.installation || "",
            location: options.location || "",
            page: String(index),
            total: "1"
          },
          elements: options.elements ? deepClone(options.elements) : []
        };
      }

      // 読込・復元したstateに不足キーを補う(後方互換のための正規化)。新しい配列/設定はここに追加する。
      function ensureProjectDefaults() {
        state.settings = state.settings || {};
        if (!state.settings.componentTagFormat) state.settings.componentTagFormat = "%F%N";
        if (!state.settings.componentTagPrefixes || typeof state.settings.componentTagPrefixes !== "object") state.settings.componentTagPrefixes = {};
        if (typeof state.settings.outputUnderlays !== "boolean") state.settings.outputUnderlays = false;
        state.project = {
          title: "電気図面",
          drawingNo: "",
          revision: "",
          designer: "",
          date: today,
          facility: "",
          ...(state.project || {})
        };
        state.project.titleMap = { ...DEFAULT_TITLE_MAP, ...(state.project.titleMap || {}) };
        if (!Array.isArray(state.project.revisions)) state.project.revisions = [];
        if (!state.settings.auditRules || typeof state.settings.auditRules !== "object") state.settings.auditRules = {};
        if (!Array.isArray(state.catalog)) state.catalog = [];
        if (!Array.isArray(state.standardPacks)) state.standardPacks = [];
        if (!Array.isArray(state.plcModules)) state.plcModules = [];
        if (!state.settings.reportColumns || typeof state.settings.reportColumns !== "object") state.settings.reportColumns = {};
        return state.project;
      }

      // アプリ初期化: 既定1ページを作って履歴をリセットし初回描画。
      function initProject() {
        ensureProjectDefaults();
        state.pages = [createPage({ name: "P1", frameVariant: "detailed", title: "電気図面" })];
        state.activePageId = state.pages[0].id;
        setSelection([]);
        pageCounter = 2;
        syncPageTotals();
        resetHistory();
        render();
      }

      // 全ページの表題欄の頁番号/総頁数を振り直す(ページ追加・削除・並替後に呼ぶ)。
      function syncPageTotals() {
        const total = String(state.pages.length);
        state.pages.forEach((page, index) => {
          page.title.page = String(index + 1);
          page.title.total = total;
        });
      }

      // Undo履歴を破棄して現在stateを初期スナップショットとして積む。
      function resetHistory() {
        history = [];
        historyIndex = -1;
        commitHistory("初期化");
      }

      // Undo履歴へ現在stateのスナップショットを積み、localStorageへ自動バックアップする。
      // 変更を伴う操作は必ず最後にこれを呼ぶ(直前と同一なら何もしない)。reasonはステータスバー表示。
      function commitHistory(reason = "") {
        syncPageTotals();
        const snapshot = JSON.stringify(state);
        if (history[historyIndex] === snapshot) return;
        history = history.slice(0, historyIndex + 1);
        history.push(snapshot);
        historyIndex = history.length - 1;
        try {
          localStorage.setItem("electricalDrawingStudio.backup", snapshot);
        } catch (_) {
          // プライベートモード等ではlocalStorageが使えないことがあるため失敗は無視する。
        }
        setStatus(reason || "変更を記録しました。");
      }

      // 履歴インデックスのスナップショットへstateを差し替える(Undo/Redoの実体)。
      function restoreHistory(index) {
        if (index < 0 || index >= history.length) return;
        const restored = JSON.parse(history[index]);
        Object.assign(state, restored);
        ensureProjectDefaults();
        historyIndex = index;
        setSelection([]);
        render();
      }

      // 画面右上のステータスバーへメッセージを表示。
      function setStatus(message) {
        qs("#status").textContent = message;
      }

      // SVG要素を属性・子要素つきで生成するヘルパ。null/undefinedの属性はスキップ。
      function svgEl(tag, attrs = {}, children = []) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([key, value]) => {
          if (value !== undefined && value !== null) el.setAttribute(key, String(value));
        });
        children.forEach(child => el.appendChild(child));
        return el;
      }

      // SVGテキスト要素を生成(既定: 中央ベースライン)。fontSize/anchor/transformをattrsで指定。
      function textEl(text, x, y, attrs = {}) {
        return svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": attrs.baseline || "middle",
          transform: attrs.transform || null
        }, [document.createTextNode(text || "")]);
      }

      // 改行つき文字列をtspanの並びとして描画(行送りはlineHeight)。
      function multilineText(parent, text, x, y, lineHeight, attrs = {}) {
        const lines = String(text || "").split("\n");
        const group = svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": "middle",
          transform: attrs.transform || null
        });
        lines.forEach((line, index) => {
          const tspan = svgEl("tspan", { x, dy: index === 0 ? 0 : lineHeight });
          tspan.textContent = line;
          group.appendChild(tspan);
        });
        parent.appendChild(group);
      }

      // 左パネルの部品パレットを再構築。検索文字列があればフラット表示、無ければカテゴリ別アコーディオン。
      // ユーザー部品(customSymbols)は type=custom:<id> の項目として合流する。
      function renderPalette() {
        const grid = qs("#paletteGrid");
        grid.innerHTML = "";
        const filter = paletteFilterText.trim().toLowerCase();
        const allItems = [
          ...PALETTE,
          ...(state.customSymbols || []).map(symbol => ({
            type: "custom:" + symbol.id,
            label: symbol.label,
            icon: "box",
            group: "custom"
          }))
        ];
        const matches = allItems.filter(item => {
          if (!filter) return true;
          return String(item.label || "").toLowerCase().includes(filter)
            || String(item.type || "").toLowerCase().includes(filter);
        });
        if (!matches.length) {
          grid.innerHTML = '<div class="muted">該当する部品がありません。</div>';
          return;
        }
        const makeItem = item => {
          const button = document.createElement("div");
          button.className = "palette-item" + (activeTool === item.type ? " active" : "");
          button.draggable = true;
          button.dataset.type = item.type;
          button.title = item.label + "を配置（ドラッグ or クリック→用紙クリック）";
          button.innerHTML = paletteIconHtml(item) + '<div class="palette-label">' + item.label + "</div>";
          button.addEventListener("dragstart", event => {
            event.dataTransfer.setData("text/plain", item.type);
            event.dataTransfer.effectAllowed = "copy";
          });
          button.addEventListener("click", () => {
            setActiveTool(item.type);
          });
          return button;
        };
        if (filter) {
          const flat = document.createElement("div");
          flat.className = "palette-grid";
          matches.forEach(item => flat.appendChild(makeItem(item)));
          grid.appendChild(flat);
          return;
        }
        PALETTE_GROUPS.forEach(group => {
          const items = matches.filter(item => (item.group || PALETTE_GROUP_BY_TYPE[item.type] || "device") === group.id);
          if (!items.length) return;
          const details = document.createElement("details");
          details.className = "palette-group";
          details.open = paletteOpenGroups.has(group.id);
          const summary = document.createElement("summary");
          summary.textContent = group.label + "（" + items.length + "）";
          details.appendChild(summary);
          const inner = document.createElement("div");
          inner.className = "palette-grid";
          items.forEach(item => inner.appendChild(makeItem(item)));
          details.appendChild(inner);
          details.addEventListener("toggle", () => {
            if (details.open) paletteOpenGroups.add(group.id);
            else paletteOpenGroups.delete(group.id);
          });
          grid.appendChild(details);
        });
      }

      // パレットアイコンの見本要素。実配置と同じ描画関数で描くため、置いた時の形と常に一致する。
      // 点列系・大型部品のみ、アイコンとして読める代表形状にサイズ/点数を調整する。
      function paletteIconElement(type) {
        if (type === "text") return { ...defaultElement("text", 0, 0), w: 16, h: 7 };
        if (type === "wire") return { ...defaultElement("wire", 0, 0), points: [[0, 8], [11, 8], [11, 0], [22, 0]], wireNo: "" };
        if (type === "line") return { ...defaultElement("line", 0, 0), points: [[0, 8], [22, 0]] };
        if (type === "mechanicalLink") return { ...defaultElement("mechanicalLink", 0, 0), points: [[0, 10], [16, 0]] };
        if (type === "dimension") return { ...defaultElement("dimension", 0, 0), points: [[0, 5], [20, 5]] };
        if (type === "arrow") return { ...defaultElement("arrow", 0, 0), points: [[0, 4], [16, 4]], label: "" };
        if (type === "terminalStrip") return { ...defaultElement("terminalStrip", 0, 0), count: 3, h: 28.5, label: "", start: 1 };
        if (type === "plcBlock") {
          const element = defaultElement("plcBlock", 0, 0);
          return { ...element, plcStyle: "unit", rows: 3, w: 10.5, h: 28.5, label: "", pinText: "" };
        }
        if (type === "table") return { ...defaultElement("table", 0, 0), rows: 3, cols: 3, w: 24, h: 14, label: "", cellText: "" };
        if (type === "installationBox" || type === "locationBox") return { ...defaultElement(type, 0, 0), w: 40, h: 26 };
        if (type === "underlayImage" || type === "terminalSheet") return null;
        return defaultElement(type, 0, 0);
      }

      // 実描画によるパレットアイコンHTML(種別ごとにキャッシュ)。生成不可の種別は手描きアイコンへ退避。
      const paletteIconCache = new Map();
      function paletteIconHtml(item) {
        if (String(item.type).startsWith("custom:")) return iconSvg(item.icon);
        if (paletteIconCache.has(item.type)) return paletteIconCache.get(item.type);
        let html = "";
        try {
          const element = paletteIconElement(item.type);
          if (!element) throw new Error("no sample");
          const box = elementBounds(element);
          const pad = Math.max(1.4, Math.min(box.w, box.h) * 0.18);
          const svg = svgEl("svg", {
            xmlns: svgNS,
            class: "palette-icon" + (item.type === "text" ? " icon-keep-text" : ""),
            viewBox: (box.x - pad) + " " + (box.y - pad) + " " + (box.w + pad * 2) + " " + (box.h + pad * 2)
          });
          drawElement(svg, element);
          html = svg.outerHTML;
        } catch (_) {
          html = iconSvg(item.icon);
        }
        paletteIconCache.set(item.type, html);
        return html;
      }

          terminalBox: `<svg ${common}><rect x="22" y="10" width="36" height="24" ${stroke}/><path ${thin} d="M8 18h14M8 27h14M58 18h14M58 27h14M32 10v24M44 10v24"/></svg>`,

          arrow: `<svg ${common}><path ${stroke} d="M10 22h50M50 12l12 10-12 10"/></svg>`,
          dimension: `<svg ${common}><path ${stroke} d="M14 34V12M66 34V12M14 24h52"/><path d="M14 24l8-3v6zM66 24l-8-3v6z" fill="currentColor"/></svg>`,
          dot: `<svg ${common}><path ${stroke} d="M8 22h64M40 8v28"/><circle cx="40" cy="22" r="5" fill="currentColor"/></svg>`
        };
        return map[name] || map.box;
      }

      // 上部ページタブを再構築(クリック=切替、ダブルクリック=ページ名変更、+ページ=追加)。
      function renderTabs() {
        const tabbar = qs("#tabbar");
        tabbar.innerHTML = "";
        state.pages.forEach((page, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "page-tab" + (page.id === state.activePageId ? " active" : "");
          tab.textContent = page.name || "P" + (index + 1);
          tab.title = "ページ " + (index + 1) + "（ダブルクリックで名前変更）";
          tab.addEventListener("click", () => {
            state.activePageId = page.id;
            setSelection([]);
            render();
          });
          tab.addEventListener("dblclick", () => {
            const name = prompt("ページ名", page.name || "");
            if (name === null) return;
            page.name = name.trim() || page.name;
            commitHistory("ページ名を変更しました。");
            render();
          });
          tabbar.appendChild(tab);
        });
        const add = document.createElement("button");
        add.type = "button";
        add.className = "page-tab";
        add.textContent = "+ ページ";
        add.addEventListener("click", addPage);
        tabbar.appendChild(add);
      }

      // 全体再描画のエントリポイント。クロス参照キャッシュを無効化し、パレット/タブ/キャンバス/右パネルを更新。
      // state変更後はcommitHistory()と併せてこれを呼ぶのが基本パターン。
      function render() {
        crossRefCache = null;
        renderPalette();
        renderTabs();
        const page = currentPage();
        if (!page) return;
        const svg = qs("#canvas");
        drawPageSvg(svg, page, { selection: true, scaled: true, grid: true });
        syncInspector();
        syncPrintSheets();
      }

      // 1ページ分のSVGを組み立てる中核。options: selection=選択枠, scaled=画面表示用ズーム, grid=グリッド,
      // output=出力用(下絵や補助を除外)。印刷/SVG/PNG出力もこの関数を共用する。
      function drawPageSvg(svg, page, options = {}) {
        const size = pageSize(page);
        const scaled = options.scaled !== false;
        svg.innerHTML = "";
        svg.setAttribute("viewBox", "0 0 " + size.w + " " + size.h);
        svg.setAttribute("width", size.w + "mm");
        svg.setAttribute("height", size.h + "mm");
        svg.style.width = scaled ? (size.w * state.settings.zoom) + "px" : "100%";
        svg.style.height = scaled ? (size.h * state.settings.zoom) + "px" : "100%";

        const includeUnderlays = options.output === true ? state.settings.outputUnderlays === true : true;
        const visibleElements = page.elements.filter(element => isElementVisible(element) && (includeUnderlays || element.type !== "underlayImage"));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "#fff" }));
        visibleElements.filter(element => element.type === "underlayImage").forEach(element => drawElement(svg, element));
        if (options.grid !== false) drawGrid(svg, size);
        if (isLayerVisible("frame")) drawFrame(svg, page, size);
        visibleElements.filter(element => element.type !== "underlayImage").forEach(element => drawElement(svg, element));
        if (options.selection) {
          drawSelection(svg);
          drawMarquee(svg);
        }
        if (options.selection && !page.elements.length) {
          const cx = size.w / 2;
          const cy = size.h / 2;
          [["左のパレットから部品をドラッグして配置できます", -4], ["右の「テンプレートからページ追加」から始めるのも簡単です", 3]].forEach(([msg, dy]) => {
            const hint = textEl(msg, cx, cy + dy, { fontSize: 3, anchor: "middle" });
            hint.setAttribute("style", "fill:#a5b0bd");
            hint.setAttribute("pointer-events", "none");
            svg.appendChild(hint);
          });
        }
      }

      // レイヤidからレイヤ定義を返す。
      function layerFor(id) {
        return (state.layers || []).find(layer => layer.id === id) || null;
      }

      // レイヤ表示フラグ(未定義レイヤはtrue)。
      function isLayerVisible(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.visible !== false : true;
      }

      // レイヤロックフラグ。
      function isLayerLocked(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.locked === true : false;
      }

      // 要素の所属レイヤが表示中か。
      function isElementVisible(element) {
        return isLayerVisible(element.layer || inferredLayerFor(element.type));
      }

      // 要素自身のlockedまたは所属レイヤのロックで編集不可か。
      function isElementLocked(element) {
        return Boolean(element.locked || isLayerLocked(element.layer || inferredLayerFor(element.type)));
      }

      // 作図補助グリッド(細+太)をパターンとして敷く。印刷・出力には含めない。
      function drawGrid(svg, size) {
        const step = state.settings.grid || 2.5;
        const defs = svgEl("defs");
        const pattern = svgEl("pattern", {
          id: "gridPattern",
          width: step,
          height: step,
          patternUnits: "userSpaceOnUse"
        });
        pattern.appendChild(svgEl("path", {
          d: "M " + step + " 0 L 0 0 0 " + step,
          fill: "none",
          stroke: "#e4e9ee",
          "stroke-width": .13
        }));
        defs.appendChild(pattern);
        const major = svgEl("pattern", {
          id: "majorGridPattern",
          width: MAJOR_GRID_MM,
          height: MAJOR_GRID_MM,
          patternUnits: "userSpaceOnUse"
        });
        major.appendChild(svgEl("path", {
          d: "M " + MAJOR_GRID_MM + " 0 L 0 0 0 " + MAJOR_GRID_MM,
          fill: "none",
          stroke: "#cfd8e3",
          "stroke-width": .18
        }));
        defs.appendChild(major);
        svg.appendChild(defs);
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#gridPattern)", opacity: .62 }));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#majorGridPattern)", opacity: .48 }));
      }

      // 図枠の振り分け: frameVariantに応じて各図枠描画関数を呼ぶ。
      function drawFrame(svg, page, size) {
        const margin = frameMargin(size);
        const frame = svgEl("g", { class: "frame" });
        if (page.frameVariant === "ladder") {
          drawLadderFrame(frame, page, size);
          svg.appendChild(frame);
          return;
        }
        frame.appendChild(svgEl("rect", { x: margin, y: margin, width: size.w - margin * 2, height: size.h - margin * 2, class: "frame-thick" }));
        frame.appendChild(svgEl("rect", { x: margin + 4, y: margin + 4, width: size.w - (margin + 4) * 2, height: size.h - (margin + 4) * 2, class: "frame-line" }));
        // 表題欄と重ならないよう、図枠種別ごとに下辺目盛の除外開始位置を求める。
        let rulerExclude;
        if (page.frameVariant === "compact" || page.frameVariant === "index") {
          rulerExclude = size.w - margin - Math.min(94, size.w - margin * 2 - 18);
        } else if (page.frameVariant === "detailed") {
          rulerExclude = size.w - margin - Math.min(124, size.w - margin * 2 - 12);
        } else if (page.frameVariant === "side") {
          rulerExclude = size.w - margin - Math.min(44, Math.max(34, size.w * .15));
        }
        drawCoordinateNumbers(frame, size, margin, rulerExclude);
        if (page.frameVariant === "compact") drawCompactTitle(frame, page, size, margin);
        if (page.frameVariant === "detailed") drawDetailedTitle(frame, page, size, margin);
        if (page.frameVariant === "side") drawSideTitle(frame, page, size, margin);
        if (page.frameVariant === "index") drawIndexFrame(frame, page, size, margin);
        svg.appendChild(frame);
      }

      // 図枠の余白(mm)。用紙サイズによらず固定。
      function frameMargin(size) {
        return Math.min(size.w, size.h) >= 297 ? 10 : 8;
      }

      // 表題欄などの下に白地を敷き、作図グリッドが透けて見にくくなるのを防ぐ。
      function frameWhiteUnderlay(frame, x, y, w, h) {
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, fill: "#fff", stroke: "none" }));
      }

      // 図枠外周の座標目盛を描画。目盛は太グリッド(10mm)の絶対座標に一致させ、
      // ラベルは「mm座標÷10」(例: x=120mm → 12)。bottomExcludeFromX以降の下辺目盛は
      // 表題欄と重なるため描かない。
      function drawCoordinateNumbers(frame, size, margin, bottomExcludeFromX) {
        const rulerX = margin + 5;
        const rulerY = size.h - margin - 5;
        const start = Math.ceil((margin + 5) / MAJOR_GRID_MM) * MAJOR_GRID_MM;
        for (let x = start; x <= size.w - margin - 5; x += MAJOR_GRID_MM) {
          if (bottomExcludeFromX !== undefined && x > bottomExcludeFromX - 3) break;
          frame.appendChild(svgEl("line", { x1: x, y1: rulerY - 1.7, x2: x, y2: rulerY + 1.7, class: "frame-light" }));
          frame.appendChild(textEl(String(Math.round(x / MAJOR_GRID_MM)).padStart(2, "0"), x, rulerY + 4.2, { fontSize: 2, anchor: "middle" }));
        }
        for (let y = start; y <= size.h - margin - 5; y += MAJOR_GRID_MM) {
          frame.appendChild(svgEl("line", { x1: rulerX - 1.7, y1: y, x2: rulerX + 1.7, y2: y, class: "frame-light" }));
          frame.appendChild(textEl(String(Math.round(y / MAJOR_GRID_MM)).padStart(2, "0"), rulerX - 4.2, y, { fontSize: 2, anchor: "middle", transform: "rotate(-90 " + (rulerX - 4.2) + " " + y + ")" }));
        }
      }

      // 簡易表題欄(右下小型)を描画。
      function drawCompactTitle(frame, page, size, margin) {
        const w = Math.min(94, size.w - margin * 2 - 18);
        const h = 32;
        const x = size.w - margin - w;
        const y = size.h - margin - h;
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, class: "frame-thick" }));
        drawRows(frame, x, y, w, h, [8, 8, 8, 8]);
        drawCols(frame, x, y, w, h, [18, 46, 18, w - 82]);
        frame.appendChild(textEl("図名", x + 2, y + 4, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.title, x + 20, y + 4, { fontSize: 2.7 }));
        frame.appendChild(textEl("図番", x + 2, y + 12, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.drawingNo, x + 20, y + 12, { fontSize: 2.5 }));
        frame.appendChild(textEl("作成", x + 2, y + 20, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.designer, x + 20, y + 20, { fontSize: 2.5 }));

        frame.appendChild(textEl(page.title.date, x + 70, y + 20, { fontSize: 2.5 }));
        frame.appendChild(textEl("SHEET", x + 2, y + 28, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.page + " / " + page.title.total, x + 20, y + 28, { fontSize: 2.5 }));
      }

      // 詳細表題欄(右下+改訂欄つき)を描画。project.revisionsの末尾5件を改訂欄へ表示。
      function drawDetailedTitle(frame, page, size, margin) {
        const w = Math.min(124, size.w - margin * 2 - 12);
        const h = 48;
        const x = size.w - margin - w;
        const y = size.h - margin - h;
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, class: "frame-thick" }));
        drawRows(frame, x, y, w, h, [8, 8, 8, 8, 8, 8]);
        drawCols(frame, x, y, w, h, [18, 44, 16, 24, 22]);
        const revX = x + w - 28;

        frame.appendChild(textEl("REV", revX + 14, y + 4, { fontSize: 2.1, anchor: "middle" }));
        for (let i = 1; i < 6; i++) frame.appendChild(svgEl("line", { x1: revX, y1: y + 8 * i, x2: x + w, y2: y + 8 * i, class: "frame-light" }));
        const revisions = (state.project.revisions || []).slice(-5);
        if (revisions.length) {
          revisions.forEach((entry, index) => {

          });

        }
        frame.appendChild(textEl("図名", x + 2, y + 4, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.title, x + 20, y + 4, { fontSize: 2.7 }));
        frame.appendChild(textEl("設備", x + 2, y + 12, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.facility || "", x + 20, y + 12, { fontSize: 2.5 }));
        frame.appendChild(textEl("図番", x + 2, y + 20, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.drawingNo, x + 20, y + 20, { fontSize: 2.5 }));
        frame.appendChild(textEl("作成", x + 2, y + 28, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.designer, x + 20, y + 28, { fontSize: 2.5 }));
        frame.appendChild(textEl("日付", x + 64, y + 28, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.date, x + 82, y + 28, { fontSize: 2.5 }));
        frame.appendChild(textEl("SHEET", x + 2, y + 44, { fontSize: 2.2 }));
        frame.appendChild(textEl(page.title.page + " / " + page.title.total, x + 20, y + 44, { fontSize: 2.5 }));
      }

      // 側帯型表題欄(左側縦帯)を描画。
      function drawSideTitle(frame, page, size, margin) {
        const w = Math.min(44, Math.max(34, size.w * .15));
        const x = size.w - margin - w;
        const y = margin + 4;
        const h = size.h - margin * 2 - 8;
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("line", { x1: x, y1: y, x2: x, y2: y + h, class: "frame-thick" }));
        frame.appendChild(svgEl("rect", { x, y: y + h - 88, width: w, height: 88, class: "frame-thick" }));
        drawRows(frame, x, y + h - 88, w, 88, [8, 8, 8, 8, 8, 8, 8, 8, 8, 8, 8]);
        drawCols(frame, x, y + h - 88, w, 88, [12, 18, w - 30]);
        frame.appendChild(textEl("図名", x + 2, y + h - 84, { fontSize: 2 }));

        frame.appendChild(textEl(page.title.drawingNo, x + 14, y + h - 76, { fontSize: 2.3 }));

        frame.appendChild(textEl("SHEET", x + 2, y + h - 12, { fontSize: 2 }));
        frame.appendChild(textEl(page.title.page + "/" + page.title.total, x + 18, y + h - 12, { fontSize: 2.5 }));
        const revY = y + 8;
        frame.appendChild(svgEl("rect", { x, y: revY, width: w, height: 58, class: "frame-line" }));
        for (let i = 1; i < 8; i++) frame.appendChild(svgEl("line", { x1: x, y1: revY + i * 7, x2: x + w, y2: revY + i * 7, class: "frame-light" }));
        frame.appendChild(textEl("改訂履歴", x + w / 2, revY + 4, { fontSize: 2.2, anchor: "middle" }));
      }

      // 目次ページ用の図枠を描画。
      function drawIndexFrame(frame, page, size, margin) {
        drawCompactTitle(frame, page, size, margin);
        const x = margin + 18;
        const y = margin + 22;
        const w = Math.min(size.w - margin * 2 - 36, 150);
        const h = Math.min(size.h - margin * 2 - 76, 170);
        frame.appendChild(textEl("図面目次", x + w / 2, y - 8, { fontSize: 4, anchor: "middle" }));
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, class: "frame-thick" }));
        const rows = 16;
        for (let i = 1; i < rows; i++) {
          frame.appendChild(svgEl("line", { x1: x, y1: y + h * i / rows, x2: x + w, y2: y + h * i / rows, class: "frame-light" }));
        }
        [18, 48, 118].forEach(dx => frame.appendChild(svgEl("line", { x1: x + dx, y1: y, x2: x + dx, y2: y + h, class: "frame-light" })));
        frame.appendChild(textEl("No.", x + 9, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
        frame.appendChild(textEl("図番", x + 33, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
        frame.appendChild(textEl("図名", x + 83, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
      }

      // ===== 設備標準図枠(行番号+機器符号表+表題欄) =====
      function drawLadderFrame(frame, page, size) {
        const L = 19, R = size.w - 19, T = 18, B = size.h - 24;
        frame.appendChild(svgEl("rect", { x: L, y: T, width: R - L, height: B - T, class: "frame-thick" }));
        for (let i = 0; i <= 20; i++) {
          frame.appendChild(textEl(String(i).padStart(2, "0"), 25.5, 27 + 9.5 * i, { fontSize: 3, anchor: "middle" }));
        }
        frame.appendChild(textEl(page.name || "", (L + R) / 2, 22.5, { fontSize: 3.5, anchor: "middle" }));
        const tblTop = B - 49;
        const xrefR = 105.8;
        frameWhiteUnderlay(frame, L, tblTop, R - L, B - tblTop);
        frame.appendChild(svgEl("rect", { x: L, y: tblTop, width: xrefR - L, height: B - tblTop, class: "frame-line" }));
        for (let i = 1; i < 13; i++) {
          const x = L + (xrefR - L) * i / 13;
          frame.appendChild(svgEl("line", { x1: x, y1: tblTop, x2: x, y2: B, class: "frame-light" }));
        }
        [tblTop + 5, B - 11, B - 5.5].forEach(y => frame.appendChild(svgEl("line", { x1: L, y1: y, x2: xrefR, y2: y, class: "frame-light" })));
        const devTop = tblTop;
        const devBottom = tblTop + 28.5;
        frame.appendChild(svgEl("rect", { x: xrefR, y: devTop, width: R - xrefR, height: devBottom - devTop, class: "frame-line" }));
        const gw = (R - xrefR) / 2;
        [0, 1].forEach(gi => {
          const gx = xrefR + gi * gw;
          frame.appendChild(svgEl("line", { x1: gx + 11, y1: devTop, x2: gx + 11, y2: devBottom, class: "frame-light" }));
          frame.appendChild(svgEl("line", { x1: gx + gw - 4.5, y1: devTop, x2: gx + gw - 4.5, y2: devBottom, class: "frame-light" }));
          frame.appendChild(textEl("機器符号", gx + 5.5, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
          frame.appendChild(textEl("機 器 符 号 内 容", gx + 11 + (gw - 15.5) / 2, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
          frame.appendChild(textEl("頁", gx + gw - 2.25, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
        });
        frame.appendChild(svgEl("line", { x1: xrefR + gw, y1: devTop, x2: xrefR + gw, y2: devBottom, class: "frame-line" }));
        for (let i = 1; i <= 10; i++) {
