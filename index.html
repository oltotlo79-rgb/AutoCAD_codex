                element.y = round(move.after[1]);
              }
            });

            const removeTerminals = new Set();
            const isGeneratedBlankTerminal = element => typeof element.id === "string" && /^el-/.test(element.id)
              && element.type === "terminal"
              && near(element.w, 1.8) && near(element.h, 1.8)
              && element.label === ""
              && element.orientation === "horizontal"
              && element.terminalShape === "circle"
              && near(element.rotation || 0, 0);
            const completeTerminalCluster = targets => {
              const used = new Set();
              for (const target of targets) {
                const match = terminals.find(terminal => !used.has(terminal)
                  && isGeneratedBlankTerminal(terminal)
                  && pointNear(terminalCenter(terminal), target, .02));
                if (!match) return [];
                used.add(match);
              }
              return Array.from(used);
            };
            const endpointScore = targets => targets.reduce((score, target) =>
              score + (pathEndpoints.some(point => pointNear(point, target, .02)) ? 1 : 0), 0);
            const terminalScore = targets => targets.reduce((score, target) =>
              score + (terminals.some(terminal => pointNear(terminalCenter(terminal), target, .02)) ? 1 : 0), 0);

            elements.forEach(element => {
              if (!isPlainObject(element)) return;
              const terminalUnit = element.type === "terminalStrip" && element.stripStyle === "unit"
                && element.orientation === "vertical";
              if (terminalUnit && Number(element.levels) === 2 && near(element.w, 16)) {
                // v3の2段式は左右境界が正式なアンカーだった。明示値がない旧要素だけ保持指定を付ける。
                if (element.terminalNodeInset === undefined) element.terminalNodeInset = 0;
                return;
              }
              const oneLevelStrip = terminalUnit && Number(element.levels || 1) !== 2 && near(element.w, 10.5);
              const plcUnit = element.type === "plcBlock" && element.plcStyle === "unit" && near(element.w, 10.5);
              if (!oneLevelStrip && !plcUnit) return;

              const count = Math.max(1, Math.floor(Number(plcUnit ? element.rows : element.count) || 1));
              const pitch = plcUnit ? 9.5 : Number(element.h || count * 9.5) / count;
              const rowY = index => pitch * index + pitch / 2;
              const leftTargets = Array.from({ length: count }, (_, index) => globalAt(element, 0, rowY(index)));
              const rightTargets = Array.from({ length: count }, (_, index) => globalAt(element, 10.5, rowY(index)));
              const leftRank = endpointScore(leftTargets) * 100 + terminalScore(leftTargets);
              const rightRank = endpointScore(rightTargets) * 100 + terminalScore(rightTargets);
              // 根拠が同数/無い場合は、旧ダイアログの「配置X=端子中心」という意味を維持する。
              const centerLocalX = rightRank > leftRank ? 10.5 : 0;
              const centerTargets = centerLocalX ? rightTargets : leftTargets;

              // 旧生成器が重ねた小端子は、全行が既定値・既定位置で揃う場合だけ削除する。
              // PLC出力だけはv3生成器に+1mmの既知ずれがあったため、右端判定かつ全行一致時に限り扱う。
              let cluster = completeTerminalCluster(centerTargets);
              if (!cluster.length && plcUnit && centerLocalX === 10.5) {
                const outputBugTargets = Array.from({ length: count }, (_, index) => globalAt(element, 11.5, rowY(index)));
                cluster = completeTerminalCluster(outputBugTargets);
              }
              cluster.forEach(terminal => removeTerminals.add(terminal));

              const angle = Number(element.rotation || 0) * Math.PI / 180;
              const shift = centerLocalX - 5;
              element.x = round(Number(element.x || 0) + shift * Math.cos(angle));
              element.y = round(Number(element.y || 0) + shift * Math.sin(angle));
              element.w = 10;
            });
            if (removeTerminals.size) {
              for (let index = elements.length - 1; index >= 0; index--) {
                if (removeTerminals.has(elements[index])) elements.splice(index, 1);
              }
            }
          });
          return data;
        }
      };

      // 読み込んだプロジェクトデータを現行スキーマへ移行して返す。
      function migrateProjectData(data) {
        if (!isPlainObject(data)) throw new Error("プロジェクト全体がオブジェクトではありません。");
        findUnsafeJsonKeyPath(data);
        const rawVersion = data.schemaVersion === undefined ? 1 : Number(data.schemaVersion);
        if (!Number.isInteger(rawVersion) || rawVersion < 1) throw new Error("schemaVersion は1以上の整数である必要があります。");
        let version = rawVersion;
        if (version > SCHEMA_VERSION) {
          throw new Error("このデータは新しい形式 (v" + version + ") です。v" + SCHEMA_VERSION + "対応の本アプリでは上書きせず、新しい版のアプリで開いてください。");
        }
        while (version < SCHEMA_VERSION) {
          const step = MIGRATIONS[version];
          if (!step) throw new Error("schemaVersion " + version + " からの移行処理がありません。");
          data = step(data) || data;
          version += 1;
        }
        data = alignLegacyTransformerTopTapConnections(data);
        data.schemaVersion = SCHEMA_VERSION;
        return data;
      }

      // settings=描画/採番設定、layers=レイヤ定義、wireTypes=配線種別、customSymbols=ユーザー部品、
      // catalog=部品カタログ、plcModules=PLCプリセット、project=表題欄などのプロジェクト情報。
      const state = {
        app: "Electrical Drawing Studio",
        version: "0.1.0",
        schemaVersion: SCHEMA_VERSION,
        activePageId: "",
        settings: {
          zoom: 3.2,
          grid: 2.5,
          snap: true,
          objectSnap: true,
          stroke: "#111820",
          wireNumberFormat: "%S-%N",
          componentTagFormat: "%F%N",
          componentTagPrefixes: {},
          currentWireType: "control",
          standard: "general",
          currentLayer: "symbols",
          outputUnderlays: false,
          showPageName: false
        },
        layers: [
          { id: "frame", label: "図枠", visible: true, locked: true, color: "#141a20" },
          { id: "wires", label: "配線", visible: true, locked: false, color: "#111820" },
          { id: "symbols", label: "記号", visible: true, locked: false, color: "#111820" },
          { id: "notes", label: "注記", visible: true, locked: false, color: "#111820" },
          { id: "layout", label: "配置", visible: true, locked: false, color: "#5b626b" }
        ],
        wireTypes: [
          { id: "control", label: "制御線", color: "#111820", width: .38, dash: "", noNumber: false },
          { id: "power", label: "動力線", color: "#b42318", width: .5, dash: "", noNumber: false },
          { id: "safety", label: "安全線", color: "#0f6f63", width: .45, dash: "", noNumber: false },
          { id: "external", label: "盤外/参考線", color: "#5b626b", width: .35, dash: "3 2", noNumber: true }
        ],
        customSymbols: [],
        project: {
          title: "電気図面",
          drawingNo: "",
          revision: "",
          designer: "",
          date: today,
          facility: "",
          titleMap: { ...DEFAULT_TITLE_MAP }
        },
        pages: []
      };
      // 外部データの欠落項目は現在開いている図面ではなく、この起動時既定値から補う。
      const INITIAL_STATE_JSON = JSON.stringify(state);

      let selectedId = null;
      let selectedIds = [];
      let activeTool = "select";
      let paletteFilterText = "";
      let dragState = null;
      let clipboardElement = null;
      let installLocationClipboard = null;
      let history = [];
      let historyReasons = []; // historyと同じ並びの{reason, at}(履歴タイムライン表示用)
      let historyImageRefs = []; // 各履歴スナップショットが参照する下絵アセットID集合
      const historyImageAssets = new Map(); // 下絵data URLは履歴ごとに複製せず1回だけ保持
      const historyImageRefByData = new Map(); // 同一画像を複数要素で使う場合も同じアセットを共有
      let historyIndex = -1;
      let pageCounter = 1;
      let printMode = "single";

      // ランダム+時刻ベースの一意ID生成(要素・ページ・部品などの識別子)。
      function uid(prefix = "id") {
        return prefix + "-" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
      }

      // JSON往復による深いコピー(関数や循環参照は不可の前提)。
      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      // 配列やnullを除く通常のJSONオブジェクトかを判定する。
      function isPlainObject(value) {
        if (value === null || typeof value !== "object" || Array.isArray(value)) return false;
        const prototype = Object.getPrototypeOf(value);
        return prototype === Object.prototype || prototype === null;
      }

      // JSON内のprototype汚染につながるキーを階層を問わず拒否する。
      function findUnsafeJsonKeyPath(root, rootPath = "プロジェクト全体") {
        const unsafeKeys = new Set(["__proto__", "constructor", "prototype"]);
        const stack = [{ value: root, path: rootPath }];
        while (stack.length) {
          const { value, path } = stack.pop();
          if (Array.isArray(value)) {
            value.forEach((item, index) => stack.push({ value: item, path: path + "[" + index + "]" }));
            continue;
          }
          if (!isPlainObject(value)) continue;
          Object.keys(value).forEach(key => {
            if (unsafeKeys.has(key)) throw new Error(path + "." + key + ": 使用できないキーです。");
            stack.push({ value: value[key], path: path + "." + key });
          });
        }
      }

      // stateの参照自体は維持しつつ、任意キーを含め内容を完全に入れ替える。
      function replaceStateContents(next) {
        Object.setPrototypeOf(state, Object.prototype);
        Object.keys(state).forEach(key => { delete state[key]; });
        Object.keys(next).forEach(key => {
          Object.defineProperty(state, key, {
            value: next[key],
            enumerable: true,
            writable: true,
            configurable: true
          });
        });
      }

      // 表題欄レイアウトの全階層を検証し、描画中の例外や履歴汚染を防ぐ。
      function validateTitleLayouts(layouts, path = "titleLayouts") {
        const errors = [];
        if (!isPlainObject(layouts)) return [path + ": オブジェクトが必要です"];
        try {
          findUnsafeJsonKeyPath(layouts, path);
        } catch (error) {
          return [error.message];
        }
        const positiveNumber = (value, itemPath, allowZero = false) => {
          if (value === undefined) return;
          if (!Number.isFinite(value) || (allowZero ? value < 0 : value <= 0)) errors.push(itemPath + ": 正の数値が必要です");
        };
        Object.entries(layouts).forEach(([variant, layout]) => {
          const basePath = path + "." + variant;
          if (!isPlainObject(layout)) {
            errors.push(basePath + ": オブジェクトが必要です");
            return;
          }
          positiveNumber(layout.w, basePath + ".w");
          positiveNumber(layout.h, basePath + ".h");
          positiveNumber(layout.maxWidthInset, basePath + ".maxWidthInset", true);
          ["rows", "cols"].forEach(key => {
            if (layout[key] === undefined) return;
            if (!Array.isArray(layout[key])) {
              errors.push(basePath + "." + key + ": 配列が必要です");
              return;
            }
            layout[key].forEach((value, index) => {
              if (key === "cols" && value === "rest") return;
              if (!Number.isFinite(value) || value <= 0) errors.push(basePath + "." + key + "[" + index + "]: 正の数値が必要です");
            });
          });
          if (!Array.isArray(layout.cells)) {
            errors.push(basePath + ".cells: 配列が必要です");
            return;
          }
          layout.cells.forEach((cell, index) => {
            const cellPath = basePath + ".cells[" + index + "]";
            if (!isPlainObject(cell)) {
              errors.push(cellPath + ": オブジェクトが必要です");
              return;
            }
            if (!["label", "field", "revBlock"].includes(cell.t)) errors.push(cellPath + ".t: label/field/revBlock のいずれかが必要です");
            if (cell.t === "label" && typeof cell.text !== "string") errors.push(cellPath + ".text: 文字列が必要です");
            if (cell.t === "field" && typeof cell.field !== "string") errors.push(cellPath + ".field: 文字列が必要です");
            ["dx", "dy"].forEach(key => {
              if (cell[key] !== undefined && !Number.isFinite(cell[key])) errors.push(cellPath + "." + key + ": 数値が必要です");
            });
            positiveNumber(cell.size, cellPath + ".size");
            if (cell.anchor !== undefined && !["start", "middle", "end"].includes(cell.anchor)) errors.push(cellPath + ".anchor: start/middle/end のいずれかが必要です");
            if (cell.t === "revBlock") {
              positiveNumber(cell.wFromRight, cellPath + ".wFromRight");
              positiveNumber(cell.rowH, cellPath + ".rowH");
              if (cell.rows !== undefined && (!Number.isInteger(cell.rows) || cell.rows <= 0)) errors.push(cellPath + ".rows: 正の整数が必要です");
            }
          });
        });
        return errors;
      }

      // 要素レコードを検証する。ユーザー部品テンプレートではidを省略可能とする。
      function validateElementRecord(element, path, requireId = true) {
        const errors = [];
        if (!isPlainObject(element)) return [path + ": オブジェクトが必要です"];
        if (requireId && (typeof element.id !== "string" || !element.id)) errors.push(path + ".id: 空でない文字列が必要です");
        if (typeof element.type !== "string" || !element.type) errors.push(path + ".type: 空でない文字列が必要です");
        if (element.points !== undefined) {
          if (!Array.isArray(element.points)) errors.push(path + ".points: 配列が必要です");
          else element.points.forEach((point, index) => {
            if (!Array.isArray(point) || point.length < 2 || !Number.isFinite(point[0]) || !Number.isFinite(point[1])) {
              errors.push(path + ".points[" + index + "]: 有限数2値の配列が必要です");
            }
          });
        }
        ["x", "y", "w", "h", "rotation", "pitch"].forEach(key => {
          if (element[key] !== undefined && !Number.isFinite(element[key])) errors.push(path + "." + key + ": 有限数が必要です");
        });
        if (element.pitch !== undefined && Number(element.pitch) < 2.5) {
          errors.push(path + ".pitch: 2.5以上の有限数が必要です。");
        }
        if (element.type === "underlayImage" && element.imageData !== undefined && typeof element.imageData !== "string") {
          errors.push(path + ".imageData: 文字列が必要です");
        }
        return errors;
      }

      // ユーザー部品のテンプレート配列を検証する。
      function validateCustomSymbol(symbol, path) {
        const errors = [];
        if (!isPlainObject(symbol)) return [path + ": オブジェクトが必要です"];
        if (typeof symbol.id !== "string" || !symbol.id) errors.push(path + ".id: 空でない文字列が必要です");
        if (symbol.templates !== undefined && !Array.isArray(symbol.templates)) errors.push(path + ".templates: 配列が必要です");
        if (symbol.template !== undefined && !isPlainObject(symbol.template)) errors.push(path + ".template: オブジェクトが必要です");
        const templates = Array.isArray(symbol.templates) ? symbol.templates : (isPlainObject(symbol.template) ? [symbol.template] : []);
        if (!templates.length) errors.push(path + ": template または空でないtemplatesが必要です");
        templates.forEach((template, index) => errors.push(...validateElementRecord(template, path + ".templates[" + index + "]", false)));
        return errors;
      }

      // 移行済みプロジェクトのJSON形状を検証する。型違反は補完せず読込を中止する。
      function validateProjectData(data) {
        const errors = [];
        if (!isPlainObject(data)) return ["プロジェクト全体: オブジェクトが必要です"];
        if (!Array.isArray(data.pages) || !data.pages.length) return ["pages: 1件以上の配列が必要です"];
        const pageIds = new Set();
        data.pages.forEach((page, pageIndex) => {
          const pagePath = "pages[" + pageIndex + "]";
          if (!isPlainObject(page)) {
            errors.push(pagePath + ": オブジェクトが必要です");
            return;
          }
          if (typeof page.id !== "string" || !page.id) errors.push(pagePath + ".id: 空でない文字列が必要です");
          else if (pageIds.has(page.id)) errors.push(pagePath + ".id: 重複しています");
          else pageIds.add(page.id);
          if (page.title !== undefined && !isPlainObject(page.title)) errors.push(pagePath + ".title: オブジェクトが必要です");
          if (!Array.isArray(page.elements)) {
            errors.push(pagePath + ".elements: 配列が必要です");
            return;
          }
          const elementIds = new Set();
          page.elements.forEach((element, elementIndex) => {
            const elementPath = pagePath + ".elements[" + elementIndex + "]";
            errors.push(...validateElementRecord(element, elementPath));
            if (isPlainObject(element) && typeof element.id === "string") {
              if (elementIds.has(element.id)) errors.push(elementPath + ".id: 同一ページ内で重複しています");
              elementIds.add(element.id);
            }
          });
        });
        ["settings", "project"].forEach(key => {
          if (data[key] !== undefined && !isPlainObject(data[key])) errors.push(key + ": オブジェクトが必要です");
        });
        ["layers", "wireTypes", "customSymbols", "catalog", "standardPacks", "plcModules", "cables", "userCircuits"].forEach(key => {
          if (data[key] !== undefined && !Array.isArray(data[key])) errors.push(key + ": 配列が必要です");
        });
        (Array.isArray(data.layers) ? data.layers : []).forEach((item, index) => {
          if (!isPlainObject(item) || typeof item.id !== "string" || typeof item.label !== "string") errors.push("layers[" + index + "]: id/label付きオブジェクトが必要です");
        });
        (Array.isArray(data.wireTypes) ? data.wireTypes : []).forEach((item, index) => {
          if (!isPlainObject(item) || typeof item.id !== "string" || typeof item.label !== "string") errors.push("wireTypes[" + index + "]: id/label付きオブジェクトが必要です");
        });
        (Array.isArray(data.customSymbols) ? data.customSymbols : []).forEach((symbol, index) => errors.push(...validateCustomSymbol(symbol, "customSymbols[" + index + "]")));
        (Array.isArray(data.catalog) ? data.catalog : []).forEach((item, index) => { if (!isPlainObject(item)) errors.push("catalog[" + index + "]: オブジェクトが必要です"); });
        (Array.isArray(data.plcModules) ? data.plcModules : []).forEach((item, index) => { if (!isPlainObject(item)) errors.push("plcModules[" + index + "]: オブジェクトが必要です"); });
        (Array.isArray(data.standardPacks) ? data.standardPacks : []).forEach((pack, index) => validateStandardPack(pack).forEach(error => errors.push("standardPacks[" + index + "]." + error)));
        if (data.titleLayouts !== undefined) errors.push(...validateTitleLayouts(data.titleLayouts));
        if (isPlainObject(data.project)) {
          if (data.project.titleMap !== undefined && !isPlainObject(data.project.titleMap)) errors.push("project.titleMap: オブジェクトが必要です");
          if (data.project.revisions !== undefined && !Array.isArray(data.project.revisions)) errors.push("project.revisions: 配列が必要です");
          (Array.isArray(data.project.revisions) ? data.project.revisions : []).forEach((item, index) => {
            if (!isPlainObject(item)) errors.push("project.revisions[" + index + "]: オブジェクトが必要です");
          });
        }
        if (isPlainObject(data.settings)) {
          ["componentTagPrefixes", "auditRules", "reportColumns"].forEach(key => {
            if (data.settings[key] !== undefined && !isPlainObject(data.settings[key])) errors.push("settings." + key + ": オブジェクトが必要です");
          });
        }
        return errors;
      }

      // 外部JSONを現在スキーマへ移行し、起動時既定値と合成した完全な候補stateを返す。
      function normalizeProjectData(raw) {
        // rawは各読込経路でJSON.parseした直後の専用オブジェクトなので、巨大な下絵文字列を再複製せずそのまま移行する。
        const migrated = migrateProjectData(raw);
        const errors = validateProjectData(migrated);
        if (errors.length) throw new Error(errors.slice(0, 3).join(" ／ ") + (errors.length > 3 ? " 他" + (errors.length - 3) + "件" : ""));
        const base = JSON.parse(INITIAL_STATE_JSON);
        const candidate = { ...base, ...migrated };
        candidate.schemaVersion = SCHEMA_VERSION;
        candidate.settings = { ...base.settings, ...(migrated.settings || {}) };
        candidate.layers = migrated.layers === undefined ? base.layers : migrated.layers;
        candidate.wireTypes = migrated.wireTypes === undefined ? base.wireTypes : migrated.wireTypes;
        candidate.customSymbols = migrated.customSymbols || [];
        candidate.catalog = migrated.catalog || [];
        candidate.standardPacks = migrated.standardPacks || [];
        candidate.plcModules = migrated.plcModules || [];
        candidate.cables = migrated.cables || [];
        candidate.userCircuits = migrated.userCircuits || [];
        candidate.project = {
          ...base.project,
          ...(migrated.project || {}),
          titleMap: { ...base.project.titleMap, ...(migrated.project?.titleMap || {}) }
        };
        if (!Array.isArray(candidate.project.revisions)) candidate.project.revisions = [];
        candidate.pages = migrated.pages.map((page, index) => ({
          ...page,
          name: typeof page.name === "string" && page.name ? page.name : "P" + (index + 1),
          size: typeof page.size === "string" ? page.size : "A4",
          orientation: typeof page.orientation === "string" ? page.orientation : "portrait",
          frameVariant: typeof page.frameVariant === "string" ? page.frameVariant : "ladder",
          title: {
            drawingNo: candidate.project.drawingNo || "",
            title: candidate.project.title || "電気図面",
            revision: candidate.project.revision || "",
            designer: candidate.project.designer || "",
            date: candidate.project.date || today,
            facility: candidate.project.facility || "",
            installation: "",
            location: "",
            page: String(index + 1),
            total: String(migrated.pages.length),
            ...(page.title || {})
          },
          elements: page.elements
        }));
        candidate.activePageId = candidate.pages.some(page => page.id === migrated.activePageId)
          ? migrated.activePageId
          : candidate.pages[0].id;
        if (migrated.titleLayouts !== undefined) candidate.titleLayouts = migrated.titleLayouts;
        else delete candidate.titleLayouts;
        return candidate;
      }

      // アクティブページを返す(見つからなければ先頭ページ)。
      function currentPage() {
        return state.pages.find(page => page.id === state.activePageId) || state.pages[0];
      }

      // ページの用紙寸法{w,h}をmmで返す。
      function pageSize(page) {
        const paper = PAPER[page.size] || PAPER.A4;
        const pair = paper[page.orientation] || paper.portrait;
        return { w: pair[0], h: pair[1] };
      }

      // 新規ページオブジェクトを生成(図枠種別・表題欄の既定値込み)。stateへは呼び出し側がpushする。
      function createPage(options = {}) {
        const id = uid("page");
        const index = pageCounter++;
        return {
          id,
          name: options.name || "P" + index,
          size: options.size || "A4",
          orientation: options.orientation || "portrait",
          // 既定図枠は参照様式と同じ「設備標準」(行番号+機器符号表)
          frameVariant: options.frameVariant || "ladder",
          title: {
            drawingNo: options.drawingNo || "",
            title: options.title || "電気図面",
            revision: options.revision || "",
            designer: options.designer || "",
            date: options.date || today,
            facility: options.facility || "",
            installation: options.installation || "",
            location: options.location || "",
            page: String(index),
            total: "1"
          },
          elements: options.elements ? deepClone(options.elements) : []
        };
      }

      // 読込・復元したstateに不足キーを補う(後方互換のための正規化)。新しい配列/設定はここに追加する。
      function ensureProjectDefaults() {
        state.settings = state.settings || {};
        if (!state.settings.componentTagFormat) state.settings.componentTagFormat = "%F%N";
        if (!state.settings.componentTagPrefixes || typeof state.settings.componentTagPrefixes !== "object") state.settings.componentTagPrefixes = {};
        if (typeof state.settings.outputUnderlays !== "boolean") state.settings.outputUnderlays = false;
        if (typeof state.settings.showPageName !== "boolean") state.settings.showPageName = false;
        state.project = {
          title: "電気図面",
          drawingNo: "",
          revision: "",
          designer: "",
          date: today,
          facility: "",
          ...(state.project || {})
        };
        state.project.titleMap = { ...DEFAULT_TITLE_MAP, ...(state.project.titleMap || {}) };
        if (!Array.isArray(state.project.revisions)) state.project.revisions = [];
        if (!state.settings.auditRules || typeof state.settings.auditRules !== "object") state.settings.auditRules = {};
        if (!Array.isArray(state.catalog)) state.catalog = [];
        if (!Array.isArray(state.standardPacks)) state.standardPacks = [];
        if (!Array.isArray(state.plcModules)) state.plcModules = [];
        if (!Array.isArray(state.cables)) state.cables = [];
        if (!Array.isArray(state.userCircuits)) state.userCircuits = [];
        if (!state.settings.reportColumns || typeof state.settings.reportColumns !== "object") state.settings.reportColumns = {};
        return state.project;
      }

      // アプリ初期化: 既定1ページを作って履歴をリセットし初回描画。
      function initProject() {
        ensureProjectDefaults();
        state.schemaVersion = SCHEMA_VERSION; // 新規図面は現行版(将来版データを開いた後の版数を引き継がない)
        state.pages = [createPage({ name: "P1", frameVariant: "ladder", title: "電気図面" })];
        state.activePageId = state.pages[0].id;
        setSelection([]);
        pageCounter = 2;
        syncPageTotals();
        resetHistory();
        render();
      }

      // 全ページの表題欄の頁番号/総頁数を振り直す(ページ追加・削除・並替後に呼ぶ)。
      function syncPageTotals() {
        const total = String(state.pages.length);
        state.pages.forEach((page, index) => {
          if (!page.title || typeof page.title !== "object") page.title = {};
          page.title.page = String(index + 1);
          page.title.total = total;
        });
      }

      // Undo履歴を破棄して現在stateを初期スナップショットとして積む。
      function resetHistory() {
        history = [];
        historyReasons = [];
        historyImageRefs = [];
        historyImageAssets.clear();
        historyImageRefByData.clear();
        historyIndex = -1;
        commitHistory("初期化");
      }

      // Undo履歴へ現在stateのスナップショットを積み、localStorageへ自動バックアップする。
      // 変更を伴う操作は必ず最後にこれを呼ぶ(直前と同一なら何もしない)。reasonはステータスバー表示。
      // Undo履歴の保持上限。全量スナップショット方式のため、下絵入り大規模図面での
      // メモリ肥大を防ぐ(超過分は古い方から破棄)。
      const HISTORY_LIMIT = 60;
      const HISTORY_MAX_CHARS = 16 * 1024 * 1024;
      // 現在stateが参照する画像は不可避なので除外し、過去履歴だけが保持する画像を別枠で制限する。
      // 25MB入力（data URL約33MB）を少なくとも1世代Undoできるよう64MBとする。
      const HISTORY_IMAGE_MAX_CHARS = 64 * 1024 * 1024;
      const HISTORY_IMAGE_REF_KEY = "__edsHistoryImageRef";
      let backupFailureWarned = false;

      // ===== 自動バックアップの世代管理 =====
      // 最新(BACKUP_KEY)に加え、約5分おきに直前の最新を世代1〜3へ繰り下げて保存する。
      // 「誤操作に気づかず上書きし続けた」場合でも、少し前の状態へ戻れるようにする保険。
      const BACKUP_KEY = "electricalDrawingStudio.backup";
      const BACKUP_GEN_PREFIX = "electricalDrawingStudio.backupGen";
      const BACKUP_GEN_META_KEY = "electricalDrawingStudio.backupGenMeta";
      const BACKUP_GEN_COUNT = 3;
      const BACKUP_GEN_INTERVAL_MS = 5 * 60 * 1000;

      // 世代メタ(各世代の保存日時の配列。[0]=世代1)を読む。壊れていれば空。
      function readBackupGenMeta() {
        try {
          const parsed = JSON.parse(localStorage.getItem(BACKUP_GEN_META_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }

      // 前回の世代化から一定時間経っていたら、現在の最新バックアップを世代1へ繰り下げる。
      // 失敗しても最新バックアップの保存(呼び出し元)には影響させない。
      function rotateBackupGenerations() {
        try {
          const meta = readBackupGenMeta();
          if (meta[0] && Date.now() - new Date(meta[0].at).getTime() < BACKUP_GEN_INTERVAL_MS) return;
          const current = localStorage.getItem(BACKUP_KEY);
          if (!current) return;
          for (let i = Math.min(meta.length, BACKUP_GEN_COUNT - 1); i >= 1; i--) {
            const older = localStorage.getItem(BACKUP_GEN_PREFIX + i);
            if (older !== null) localStorage.setItem(BACKUP_GEN_PREFIX + (i + 1), older);
          }
          localStorage.setItem(BACKUP_GEN_PREFIX + 1, current);
          const nextMeta = [{ at: new Date().toISOString() }, ...meta].slice(0, BACKUP_GEN_COUNT);
          localStorage.setItem(BACKUP_GEN_META_KEY, JSON.stringify(nextMeta));
        } catch (_) {
          // 容量超過時は世代を諦めて最新のみ保護する(古い世代から削除して空きを作る)
          try {
            for (let i = BACKUP_GEN_COUNT; i >= 1; i--) localStorage.removeItem(BACKUP_GEN_PREFIX + i);
            localStorage.removeItem(BACKUP_GEN_META_KEY);
          } catch (_) { /* ここまで失敗したら何もできない */ }
        }
      }

      // 下絵画像だけをアセット参照へ置き換えたUndo用スナップショットを作る。
      // JSON保存・localStorageバックアップにはこの省略形式を使わず、完全なstateを書き込む。
      function serializeHistorySnapshot() {
        const refs = new Set();
        const snapshot = JSON.stringify(state, function(key, value) {
          if (key !== "imageData" || this?.type !== "underlayImage" || typeof value !== "string" || !value) return value;
          let ref = typeof this.imageAssetId === "string" ? this.imageAssetId : "";
          const sharedRef = historyImageRefByData.get(value);
          if (sharedRef) {
            ref = sharedRef;
          } else if (!ref || (historyImageAssets.has(ref) && historyImageAssets.get(ref) !== value)) {
            ref = uid("asset");
          }
          historyImageAssets.set(ref, value);
          historyImageRefByData.set(value, ref);
          refs.add(ref);
          return { [HISTORY_IMAGE_REF_KEY]: ref };
        });
        return { snapshot, refs };
      }

      // Undo用参照を実data URLへ戻す。アセット欠落時はstateを触る前に失敗させる。
      function parseHistorySnapshot(snapshot) {
        return JSON.parse(snapshot, function(key, value) {
          if (key !== "imageData" || this?.type !== "underlayImage"
              || !isPlainObject(value) || Object.keys(value).length !== 1
              || typeof value[HISTORY_IMAGE_REF_KEY] !== "string") return value;
          const ref = value[HISTORY_IMAGE_REF_KEY];
          if (!historyImageAssets.has(ref)) throw new Error("履歴の下絵画像が見つかりません: " + ref);
          return historyImageAssets.get(ref);
        });
      }

      // 分岐切捨て・件数/容量上限で参照されなくなった下絵を解放する。
      function pruneHistoryImageAssets() {
        const used = new Set();
        historyImageRefs.forEach(refs => refs.forEach(ref => used.add(ref)));
        historyImageAssets.forEach((value, ref) => { if (!used.has(ref)) historyImageAssets.delete(ref); });
        historyImageRefByData.clear();
        historyImageAssets.forEach((value, ref) => historyImageRefByData.set(value, ref));
      }

      // Undo履歴のコンパクトJSON文字数。
      function historySnapshotChars() {
        return history.reduce((sum, item) => sum + item.length, 0);
      }

      // 最新stateではなく過去履歴だけが参照する一意な下絵画像の文字数。
      function historicalImageAssetChars() {
        const currentRefs = historyImageRefs[historyImageRefs.length - 1] || new Set();
        let total = 0;
        historyImageAssets.forEach((value, ref) => {
          if (!currentRefs.has(ref)) total += value.length;
        });
        return total;
      }

      // Undo保持の追加負担（コンパクトJSON＋過去だけが持つ画像）。
      function historyRetainedChars() {
        return historySnapshotChars() + historicalImageAssetChars();
      }

      // 最新の完全スナップショットを自動バックアップへ保存する。
      function persistAutomaticBackup(snapshot) {
        rotateBackupGenerations();
        localStorage.setItem(BACKUP_KEY, snapshot);
      }

      // Undo履歴へ現在stateを積み、localStorageへ自動バックアップする。
      // 変更操作は必ず最後にこれを呼ぶ(直前と同一なら何もしない)。
      // reasonはステータス表示と履歴タイムラインの操作名に使う。
      function commitHistory(reason = "") {
        syncPageTotals();
        const compact = serializeHistorySnapshot();
        const snapshot = compact.snapshot;
        if (history[historyIndex] === snapshot) return;
        history = history.slice(0, historyIndex + 1);
        historyReasons = historyReasons.slice(0, historyIndex + 1);
        historyImageRefs = historyImageRefs.slice(0, historyIndex + 1);
        history.push(snapshot);
        historyReasons.push({ reason: reason || "変更", at: new Date().toISOString() });
        historyImageRefs.push(compact.refs);
        // Redo分岐を切った直後の未参照画像を、容量判定より先に解放する。
        pruneHistoryImageAssets();
        while (history.length > 1 && (history.length > HISTORY_LIMIT
            || historySnapshotChars() > HISTORY_MAX_CHARS
            || historicalImageAssetChars() > HISTORY_IMAGE_MAX_CHARS)) {
          history.shift();
          historyReasons.shift();
          historyImageRefs.shift();
          pruneHistoryImageAssets();
        }
        historyIndex = history.length - 1;
        pruneHistoryImageAssets();
        try {
          persistAutomaticBackup(JSON.stringify(state));
          backupFailureWarned = false;
        } catch (_) {
          // 容量超過やプライベートモードで失敗し得る。無言で止めず一度だけ警告する。
          if (!backupFailureWarned) {
            backupFailureWarned = true;
            reason = (reason ? reason + " " : "") +
              "※自動バックアップを保存できません（容量超過の可能性）。上部「保存」でJSON保存してください。";
          }
        }
        setStatus(reason || "変更を記録しました。");
      }

      // 履歴タイムライン: Undo履歴を一覧し、任意の時点へワンクリックで移動する。
      // restoreHistory(index移動)を使うため、移動後もCtrl+Y(やり直し)で前へ戻れる。
      function showHistoryTimeline() {
        if (!history.length) {
          setStatus("履歴がありません。");
          return;
        }
        const formatAt = iso => {
          try { return new Date(iso).toLocaleTimeString("ja-JP"); } catch (_) { return ""; }
        };
        const rows = [];
        for (let index = history.length - 1; index >= 0; index--) {
          const meta = historyReasons[index] || {};
          const isCurrent = index === historyIndex;
          rows.push(`<tr${isCurrent ? ' style="background:#e6f4f1;font-weight:700"' : ""}>
            <td>${index + 1}</td>
            <td>${escapeHtml(formatAt(meta.at))}</td>
            <td>${escapeHtml(meta.reason || "変更")}</td>
            <td>${isCurrent ? "◀ 現在" : `<button type="button" data-history-jump="${index}">この時点へ</button>`}</td>
          </tr>`);
        }
        openDialog("履歴タイムライン", `
          <p class="muted">操作の履歴（最大${HISTORY_LIMIT}件）です。任意の時点へ戻れます。
          戻った後も <b>Ctrl+Y</b>（やり直し）や、この一覧から新しい側の時点を選べば元に戻せます。
          ※新しい時点へ進めるのは、戻った後に<b>別の編集をするまで</b>です（編集するとそこから先の履歴は作り直されます）。</p>
          <table class="report-table">
            <thead><tr><th>#</th><th>時刻</th><th>操作</th><th></th></tr></thead>
            <tbody>${rows.join("")}</tbody>
          </table>`);
        qsa("[data-history-jump]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            restoreHistory(Number(button.dataset.historyJump));
            closeDialog();
            setStatus("履歴の時点へ移動しました（Ctrl+Y または履歴タイムラインで前へ戻せます）。");
          });
        });
      }

      // 履歴インデックスのスナップショットへstateを差し替える(Undo/Redoの実体)。
      function restoreHistory(index) {
        if (index < 0 || index >= history.length) return;
        const previous = {
          state: { ...state },
          historyIndex,
          pageCounter,
          selectedId,
          selectedIds: selectedIds.slice()
        };
        try {
          const restored = parseHistorySnapshot(history[index]);
          replaceStateContents(restored);
          ensureProjectDefaults();
          if (!state.pages.some(page => page.id === state.activePageId)) state.activePageId = state.pages[0]?.id || "";
          pageCounter = state.pages.length + 1;
          historyIndex = index;
          setSelection([]);
          render();
          try {
            persistAutomaticBackup(JSON.stringify(state));
            backupFailureWarned = false;
          } catch (_) {
            if (!backupFailureWarned) {
              backupFailureWarned = true;
              setStatus("履歴は復元しましたが、自動バックアップを保存できません。上部「保存」でJSON保存してください。");
            }
          }
        } catch (error) {
          replaceStateContents(previous.state);
          historyIndex = previous.historyIndex;
          pageCounter = previous.pageCounter;
          selectedId = previous.selectedId;
          selectedIds = previous.selectedIds;
          try { render(); } catch (_) { /* 元状態の再描画失敗より元の原因を優先する */ }
          setStatus("履歴の復元に失敗しました: " + error.message);
        }
      }

      // 検証済み候補stateを一括反映する。描画まで成功しなければstate・履歴・選択を完全に戻す。
      function installProjectData(raw, successMessage) {
        const candidate = normalizeProjectData(raw);
        const previous = {
          state: { ...state },
          history,
          historyReasons,
          historyImageRefs,
          historyImageAssets: new Map(historyImageAssets),
          historyImageRefByData: new Map(historyImageRefByData),
          historyIndex,
          pageCounter,
          selectedId,
          selectedIds: selectedIds.slice()
        };
        try {
          replaceStateContents(candidate);
          ensureProjectDefaults();
          pageCounter = state.pages.length + 1;
          setSelection([]);
          syncPageTotals();
          render();
          resetHistory();
          setStatus(successMessage);
          return true;
        } catch (error) {
          replaceStateContents(previous.state);
          history = previous.history;
          historyReasons = previous.historyReasons;
          historyImageRefs = previous.historyImageRefs;
          historyImageAssets.clear();
          previous.historyImageAssets.forEach((value, key) => historyImageAssets.set(key, value));
          historyImageRefByData.clear();
          previous.historyImageRefByData.forEach((value, key) => historyImageRefByData.set(key, value));
          historyIndex = previous.historyIndex;
          pageCounter = previous.pageCounter;
          selectedId = previous.selectedId;
          selectedIds = previous.selectedIds;
          try { render(); } catch (_) { /* 元状態の再描画失敗より元の原因を優先する */ }
          throw error;
        }
      }

      // 画面右上のステータスバーへメッセージを表示。長文は省略表示になるためtitleで全文も持たせる。
      function setStatus(message) {
        const status = qs("#status");
        status.textContent = message;
        status.title = message;
        // 更新を視覚的に知らせるワンショットアニメ(classを付け直して再生)
        status.classList.remove("pop");
        void status.offsetWidth;
        status.classList.add("pop");
      }

      // アクティブツール/選択状態に応じた表示名(パレット種別・回路・ユーザー部品対応)。
      function toolDisplayLabel(tool) {
        if (String(tool).startsWith("circuit:")) {
          return BUILTIN_CIRCUITS.find(c => "circuit:" + c.id === tool)?.label || "回路";
        }
        if (String(tool).startsWith("custom:")) {
          return (state.customSymbols || []).find(s => "custom:" + s.id === tool)?.label || "ユーザー部品";
        }
        return paletteLabel(tool) || tool;
      }

      // キャンバス上部のヒントピルを現在の状態に合わせて更新する(初心者向けの常時ガイド)。
      function updateCanvasHint() {
        const hint = qs("#canvasHint");
        if (!hint) return;
        let text = "";
        if (activeTool === "wire") {
          text = "配線: 始点から終点へドラッグ（端子・接点へ自動吸着／直交配線）。Shift=折れ反転／スペース=コの字切替、Esc で選択へ戻る";
        } else if (activeTool === "line") {
          text = "直線: ドラッグで作図（任意角度）。Esc で選択へ戻る";
        } else if (activeTool === "mechanicalLink") {
          text = "連動破線: ドラッグで作図。Esc で選択へ戻る";
        } else if (activeTool === "dimension") {
          text = "寸法: 測りたい2点をドラッグ（実寸を自動記入）。Esc で選択へ戻る";
        } else if (activeTool === "arrow") {
          text = "信号矢印: ドラッグで作図。ラベルに信号名を入れると相手頁と自動参照。Esc で戻る";
        } else if (activeTool !== "select") {
          text = toolDisplayLabel(activeTool) + ": 用紙をクリックで配置（連続配置可）。Esc で終了";
        } else if (selectedIds.length > 1) {
          text = "複数選択中: ドラッグで一括移動 ／ Ctrl+D 複製 ／ Delete 削除 ／ 右パネルで整列・回転";
        } else if (selectedIds.length === 1) {
          text = "選択中: ドラッグで移動 ／ ダブルクリックでその場編集 ／ Ctrl+D 複製 ／ Delete 削除 ／ 詳細は右パネル";
        } else {
          text = "部品: 左パレットからドラッグ ／ 配線: W ／ 範囲選択: 空白からドラッグ ／ ズーム: Ctrl+ホイール";
        }
        // 文言が変わった時だけワンショットのポップを再生(毎renderでの再生を防ぐ)
        if (hint.textContent !== text) {
          hint.textContent = text;
          hint.title = text;
          hint.classList.remove("pop");
          void hint.offsetWidth;
          hint.classList.add("pop");
        }
      }

      // パレット「最近使用」: 配置した種別を新しい順に保持(セッション内)。
      const recentPaletteTypes = [];
      // 配置した種別を「最近使用」の先頭へ積む(重複は繰上げ、最大件数はrenderPalette側で切る)。
      function noteRecentPaletteType(type) {
        if (!type || type === "select") return;
        const index = recentPaletteTypes.indexOf(type);
        if (index >= 0) recentPaletteTypes.splice(index, 1);
        recentPaletteTypes.unshift(type);
        if (recentPaletteTypes.length > 6) recentPaletteTypes.pop();
      }

      // SVG要素を属性・子要素つきで生成するヘルパ。null/undefinedの属性はスキップ。
      function svgEl(tag, attrs = {}, children = []) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([key, value]) => {
          if (value !== undefined && value !== null) el.setAttribute(key, String(value));
        });
        children.forEach(child => el.appendChild(child));
        return el;
      }

      // SVGテキスト要素を生成(既定: 中央ベースライン)。fontSize/anchor/transformをattrsで指定。
      function textEl(text, x, y, attrs = {}) {
        return svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": attrs.baseline || "middle",
          transform: attrs.transform || null
        }, [document.createTextNode(text || "")]);
      }

      // 改行つき文字列をtspanの並びとして描画(行送りはlineHeight)。
      function multilineText(parent, text, x, y, lineHeight, attrs = {}) {
        const lines = String(text || "").split("\n");
        const group = svgEl("text", {
          x,
          y,
          class: "svg-text",
          "font-size": attrs.fontSize || 3,
          "text-anchor": attrs.anchor || "start",
          "dominant-baseline": "middle",
          transform: attrs.transform || null
        });
        lines.forEach((line, index) => {
          const tspan = svgEl("tspan", { x, dy: index === 0 ? 0 : lineHeight });
          tspan.textContent = line;
          group.appendChild(tspan);
        });
        parent.appendChild(group);
      }

      // 左パネルの部品パレットを再構築。検索文字列があればフラット表示、無ければカテゴリ別アコーディオン。
      // ユーザー部品(customSymbols)は type=custom:<id> の項目として合流する。
      function renderPalette() {
        const grid = qs("#paletteGrid");
        grid.innerHTML = "";
        const filter = paletteFilterText.trim().toLowerCase();
        const allItems = [
          ...recentPaletteTypes.map(type => ({
            type,
            label: toolDisplayLabel(type),
            icon: "box",
            group: "recent"
          })),
          ...PALETTE,
          ...BUILTIN_CIRCUITS.map(circuit => ({
            type: "circuit:" + circuit.id,
            label: circuit.label,
            icon: "box",
            group: "circuits"
          })),
          ...(state.customSymbols || []).map(symbol => ({
            type: "custom:" + symbol.id,
            label: symbol.label,
            icon: "box",
            group: "custom"
          }))
        ];
        const matchedTypes = new Set();
        const matches = allItems.filter(item => {
          if (!filter) return true;
          const matched = String(item.label || "").toLowerCase().includes(filter)
            || String(item.type || "").toLowerCase().includes(filter);
          if (!matched || matchedTypes.has(item.type)) return false;
          matchedTypes.add(item.type);
          return true;
        });
        if (!matches.length) {
          grid.innerHTML = '<div class="muted">該当する部品がありません。</div>';
          return;
        }
        const makeItem = item => {
          const label = String(item.label || item.type || "部品");
          const button = document.createElement("div");
          button.className = "palette-item" + (activeTool === item.type ? " active" : "");
          button.draggable = true;
          button.dataset.type = item.type;
          button.setAttribute("role", "button");
          button.tabIndex = 0;
          button.setAttribute("aria-label", label + "を配置");
          button.title = label + "を配置（ドラッグ or クリック→用紙クリック）";
          button.innerHTML = paletteIconHtml(item);
          const labelElement = document.createElement("div");
          labelElement.className = "palette-label";
          labelElement.textContent = label;
          button.appendChild(labelElement);
          button.addEventListener("dragstart", event => {
            event.dataTransfer.setData("text/plain", item.type);
            event.dataTransfer.effectAllowed = "copy";
          });
          button.addEventListener("click", () => {
            setActiveTool(item.type);
          });
          button.addEventListener("keydown", event => {
            if (event.key !== "Enter" && event.key !== " ") return;
            event.preventDefault();
            setActiveTool(item.type);
          });
          return button;
        };
        if (filter) {
          const flat = document.createElement("div");
          flat.className = "palette-grid";
          matches.forEach(item => flat.appendChild(makeItem(item)));
          grid.appendChild(flat);
          return;
        }
        PALETTE_GROUPS.forEach(group => {
          const items = matches.filter(item => (item.group || PALETTE_GROUP_BY_TYPE[item.type] || "device") === group.id);
          if (!items.length) return;
          const details = document.createElement("details");
          details.className = "palette-group";
          details.open = paletteOpenGroups.has(group.id);
          const summary = document.createElement("summary");
          summary.textContent = group.label + "（" + items.length + "）";
          details.appendChild(summary);
          const inner = document.createElement("div");
          inner.className = "palette-grid";
          items.forEach(item => inner.appendChild(makeItem(item)));
          details.appendChild(inner);
          details.addEventListener("toggle", () => {
            if (details.open) paletteOpenGroups.add(group.id);
            else paletteOpenGroups.delete(group.id);
          });
          grid.appendChild(details);
        });
      }

      // パレットアイコンの見本要素。実配置と同じ描画関数で描くため、置いた時の形と常に一致する。
      // 点列系・大型部品のみ、アイコンとして読める代表形状にサイズ/点数を調整する。
      function paletteIconElement(type) {
        if (type === "text") return { ...defaultElement("text", 0, 0), w: 16, h: 7 };
        if (type === "wire") return { ...defaultElement("wire", 0, 0), points: [[0, 8], [11, 8], [11, 0], [22, 0]], wireNo: "" };
        if (type === "line") return { ...defaultElement("line", 0, 0), points: [[0, 8], [22, 0]] };
        if (type === "mechanicalLink") return { ...defaultElement("mechanicalLink", 0, 0), points: [[0, 10], [16, 0]] };
        if (type === "dimension") return { ...defaultElement("dimension", 0, 0), points: [[0, 5], [20, 5]] };
        if (type === "arrow") return { ...defaultElement("arrow", 0, 0), points: [[0, 4], [16, 4]], label: "" };
        if (type === "terminalStrip") return { ...defaultElement("terminalStrip", 0, 0), count: 3, h: 28.5, label: "", start: 1 };
        if (type === "plcBlock") {
          const element = defaultElement("plcBlock", 0, 0);
          return { ...element, plcStyle: "unit", rows: 3, w: 10, h: 28.5, label: "", pinText: "" };
        }
        if (type === "table") return { ...defaultElement("table", 0, 0), rows: 3, cols: 3, w: 24, h: 14, label: "", cellText: "" };
        if (type === "installationBox" || type === "locationBox") return { ...defaultElement(type, 0, 0), w: 40, h: 26 };
        if (type === "underlayImage" || type === "terminalSheet") return null;
        return defaultElement(type, 0, 0);
      }

      // 実描画によるパレットアイコンHTML(種別ごとにキャッシュ)。生成不可の種別は手描きアイコンへ退避。
      const paletteIconCache = new Map();
      // パレット項目のアイコンHTMLを返す。静的SVG辞書を優先し、無い種別は実描画で生成してキャッシュする。
      function paletteIconHtml(item) {
        if (String(item.type).startsWith("custom:")) return iconSvg(item.icon);
        if (paletteIconCache.has(item.type)) return paletteIconCache.get(item.type);
        // 回路ライブラリは登録テンプレート全体を実描画してアイコン化する
        if (String(item.type).startsWith("circuit:")) {
          const circuit = BUILTIN_CIRCUITS.find(c => "circuit:" + c.id === item.type);
          let html = iconSvg("box");
          if (circuit) {
            try {
              const boxes = circuit.templates.map(t => elementBounds({ ...t, x: t.x || 0, y: t.y || 0 })).filter(Boolean);
              const b = unionBounds(boxes);
              const pad = 2;
              const svg = svgEl("svg", {
                xmlns: svgNS,
                class: "palette-icon",
                viewBox: (b.x - pad) + " " + (b.y - pad) + " " + (b.w + pad * 2) + " " + (b.h + pad * 2)
              });
              circuit.templates.forEach(t => drawElement(svg, { ...deepClone(t), id: uid("pv") }));
              html = svg.outerHTML;
            } catch (_) { /* 失敗時は既定アイコン */ }
          }
          paletteIconCache.set(item.type, html);
          return html;
        }
        let html = "";
        try {
          const element = paletteIconElement(item.type);
          if (!element) throw new Error("no sample");
          const box = elementBounds(element);
          const pad = Math.max(1.4, Math.min(box.w, box.h) * 0.18);
          const svg = svgEl("svg", {
            xmlns: svgNS,
            class: "palette-icon" + (item.type === "text" ? " icon-keep-text" : ""),
            viewBox: (box.x - pad) + " " + (box.y - pad) + " " + (box.w + pad * 2) + " " + (box.h + pad * 2)
          });
          drawElement(svg, element);
          html = svg.outerHTML;
        } catch (_) {
          html = iconSvg(item.icon);
        }
        paletteIconCache.set(item.type, html);
        return html;
      }

          thermalElement: `<svg ${common}><path ${stroke} d="M8 30h16V14h32v16h16"/></svg>`,

          polarityMark: `<svg ${common}><circle cx="40" cy="22" r="11" ${stroke}/><path ${thin} d="M32 22h16M40 14v16"/></svg>`,
          box: `<svg ${common}><rect x="18" y="10" width="44" height="26" ${stroke}/><path ${thin} d="M8 18h10M8 28h10M62 18h10M62 28h10"/></svg>`,
          plc: `<svg ${common}><rect x="16" y="8" width="48" height="30" ${stroke}/><path ${thin} d="M24 8v30M16 16h48M16 24h48M16 32h48"/></svg>`,
          connector: `<svg ${common}><path ${stroke} d="M10 22h60"/><circle cx="22" cy="22" r="5" ${thin}/><circle cx="40" cy="22" r="5" ${thin}/><circle cx="58" cy="22" r="5" ${thin}/></svg>`,
          cableMarker: `<svg ${common}><path ${stroke} d="M8 22h64"/><ellipse cx="40" cy="22" rx="16" ry="9" ${thin}/></svg>`,
          cableBundle: `<svg ${common}><path ${thin} d="M12 12h20c13 0 16 20 32 20M12 22h18c13 0 17 0 38 0M12 32h20c13 0 16-20 32-20"/><rect x="30" y="9" width="18" height="26" ${stroke}/></svg>`,
          terminalBox: `<svg ${common}><rect x="22" y="10" width="36" height="24" ${stroke}/><path ${thin} d="M8 18h14M8 27h14M58 18h14M58 27h14M32 10v24M44 10v24"/></svg>`,
          table: `<svg ${common}><rect x="12" y="10" width="56" height="26" ${stroke}/><path ${thin} d="M12 18h56M12 27h56M30 10v26M50 10v26"/></svg>`,
          arrow: `<svg ${common}><path ${stroke} d="M10 22h50M50 12l12 10-12 10"/></svg>`,
          dimension: `<svg ${common}><path ${stroke} d="M14 34V12M66 34V12M14 24h52"/><path d="M14 24l8-3v6zM66 24l-8-3v6z" fill="currentColor"/></svg>`,
          dot: `<svg ${common}><path ${stroke} d="M8 22h64M40 8v28"/><circle cx="40" cy="22" r="5" fill="currentColor"/></svg>`
        };
        return map[name] || map.box;
      }

      // 上部ページタブを再構築(クリック=切替、ダブルクリック=ページ名変更、+ページ=追加)。
      function renderTabs() {
        const tabbar = qs("#tabbar");
        tabbar.innerHTML = "";
        state.pages.forEach((page, index) => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "page-tab" + (page.id === state.activePageId ? " active" : "");
          tab.textContent = page.name || "P" + (index + 1);
          tab.title = "ページ " + (index + 1) + "（ダブルクリックで名前変更）";
          tab.addEventListener("click", () => {
            state.activePageId = page.id;
            setSelection([]);
            render();
            // 並べて表示中はタブクリックで該当ページへスクロール
            if (isMultiPageView()) pageSvgPool.get(page.id)?.slot.scrollIntoView({ block: "start", behavior: "smooth" });
          });
          tab.addEventListener("dblclick", () => {
            const name = prompt("ページ名", page.name || "");
            if (name === null) return;
            page.name = name.trim() || page.name;
            commitHistory("ページ名を変更しました。");
            render();
          });
          tabbar.appendChild(tab);
        });
        const add = document.createElement("button");
        add.type = "button";
        add.className = "page-tab";
        add.textContent = "+ ページ";
        add.addEventListener("click", addPage);
        tabbar.appendChild(add);
      }

      // 全体再描画のエントリポイント。クロス参照キャッシュを無効化し、パレット/タブ/キャンバス/右パネルを更新。
      // state変更後はcommitHistory()と併せてこれを呼ぶのが基本パターン。
      // 全体再描画。options.light=true(ドラッグ中)はキャンバスのみ更新し、
      // パレット/タブ/右パネルの再構築を省いて描画コストを下げる。
      // 印刷用シートはここでは作らない(印刷直前にrenderPrintSheets()が生成する)。
      function render(options = {}) {
        wireLabelAvoidCache.clear();
        crossRefCache = null;
        if (!options.light) {
          renderPalette();
          renderTabs();
        }
        renderCanvasView(options);
        if (!options.light) syncInspector();
        updateCanvasHint();
      }

      // ===== ページ表示モード(タブ=1ページずつ / 並べて表示=全ページを縦に並べて直接編集) =====
      // 並べて表示では各ページが専用SVGを持ち、クリックしたページが自動的に編集対象(アクティブ)になる。
      // 既存コードの qs("#canvas") 参照を壊さないよう、常にアクティブページのSVGへ id="canvas" を付け替える。
      const pageSvgPool = new Map(); // pageId -> { slot, header, svg }
      let stageMode = "single"; // 初期HTMLは単一#canvas構成

      // ページ表示モードが「並べて表示」か(タブ表示=false)。
      function isMultiPageView() {
        return state.settings.multiPageView === true;
      }

      // アクティブページを切り替える(選択解除+id付替え+タブ強調のみ。再描画は呼び出し側)。
      function activatePage(pageId, opts = {}) {
        if (!pageId || state.activePageId === pageId) return false;
        state.activePageId = pageId;
        if (opts.clearSelection !== false) setSelection([]);
        syncCanvasIds();
        renderTabs();
        return true;
      }

      // 並べて表示中: アクティブページのSVGだけに id="canvas" を持たせ、枠を強調する。
      function syncCanvasIds() {
        if (!isMultiPageView()) return;
        pageSvgPool.forEach((entry, pageId) => {
          const active = pageId === state.activePageId;
          if (active) entry.svg.id = "canvas";
          else entry.svg.removeAttribute("id");
          entry.slot.classList.toggle("active", active);
        });
      }

      // 表示モードに応じてstage直下のDOM構成を作り直す(モード切替時のみ)。
      function ensureStageMode() {
        const stage = qs(".stage");
        const want = isMultiPageView() ? "multi" : "single";
        if (stageMode === want) return stage;
        stage.innerHTML = "";
        pageSvgPool.clear();
        if (want === "single") {
          const svg = svgEl("svg", { id: "canvas", class: "drawing-page", role: "img", "aria-label": "図面キャンバス" });
          attachCanvasListeners(svg);
          stage.appendChild(svg);
        }
        stageMode = want;
        return stage;
      }

      // 並び方向。既定は横(row)。
      function multiPageDirection() {
        return state.settings.multiPageDirection === "column" ? "column" : "row";
      }

      // 並べて表示中のページ並び替え(見出しの◀▶/▲▼ボタンから)。
      function movePageBySlot(pageId, delta) {
        const index = state.pages.findIndex(page => page.id === pageId);
        const target = index + delta;
        if (index < 0 || target < 0 || target >= state.pages.length) return;
        const [page] = state.pages.splice(index, 1);
        state.pages.splice(target, 0, page);
        syncPageTotals();
        commitHistory("ページの並び順を変更しました。");
        render();
        pageSvgPool.get(pageId)?.slot.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
      }

      // キャンバス描画の入口。単一=従来どおり、並べて表示=全ページのスロットを順序同期して描画。
      // lightレンダ(ドラッグ中)は編集中ページのSVGだけを再描画してコストを抑える。
      function renderCanvasView(options = {}) {
        const stage = ensureStageMode();
        const multi = isMultiPageView();
        const direction = multiPageDirection();
        stage.classList.toggle("multi-row", multi && direction === "row");
        stage.classList.toggle("multi-col", multi && direction === "column");
        if (!multi) {
          const page = currentPage();
          if (page) drawPageSvg(qs("#canvas"), page, { selection: true, scaled: true, grid: true });
          return;
        }
        const alive = new Set();
        state.pages.forEach((page, index) => {
          alive.add(page.id);
          let entry = pageSvgPool.get(page.id);
          if (!entry) {
            const slot = document.createElement("div");
            slot.className = "page-slot";
            const header = document.createElement("div");
            header.className = "page-slot-head";
            const prevBtn = document.createElement("button");
            prevBtn.type = "button";
            prevBtn.className = "slot-move";
            prevBtn.title = "このページを前へ";
            const label = document.createElement("span");
            label.className = "slot-label";
            label.title = "クリックでこのページを編集対象にします";
            const nextBtn = document.createElement("button");
            nextBtn.type = "button";
            nextBtn.className = "slot-move";
            nextBtn.title = "このページを後へ";
            header.appendChild(prevBtn);
            header.appendChild(label);
            header.appendChild(nextBtn);
            const svg = svgEl("svg", { class: "drawing-page", "data-page-id": page.id, role: "img" });
            attachCanvasListeners(svg);
            header.addEventListener("click", () => {
              activatePage(page.id);
              render();
            });
            prevBtn.addEventListener("click", event => {
              event.stopPropagation();
              movePageBySlot(page.id, -1);
            });
            nextBtn.addEventListener("click", event => {
              event.stopPropagation();
              movePageBySlot(page.id, 1);
            });
            slot.appendChild(header);
            slot.appendChild(svg);
            entry = { slot, header, label, prevBtn, nextBtn, svg };
            pageSvgPool.set(page.id, entry);
          }
          entry.label.textContent = (index + 1) + " / " + state.pages.length + "　" + (page.name || "P" + (index + 1));
          entry.prevBtn.textContent = direction === "column" ? "▲" : "◀";
          entry.nextBtn.textContent = direction === "column" ? "▼" : "▶";
          entry.prevBtn.disabled = index === 0;
          entry.nextBtn.disabled = index === state.pages.length - 1;
          stage.appendChild(entry.slot); // append順でページ並びを常に同期
          const isActive = page.id === state.activePageId;
          if (options.light && !isActive) return;
          drawPageSvg(entry.svg, page, { selection: isActive, scaled: true, grid: true });
        });
        pageSvgPool.forEach((entry, pageId) => {
          if (!alive.has(pageId)) {
            entry.slot.remove();
            pageSvgPool.delete(pageId);
          }
        });
        syncCanvasIds();
      }

      // ポインタ操作の対象ページを解決し、未アクティブなら切り替える(並べて表示用)。
      function activatePageFromEvent(event) {
        const pageSvg = event.target && event.target.closest ? event.target.closest("svg.drawing-page") : null;
        const pageId = pageSvg?.dataset?.pageId;
        if (pageId && pageId !== state.activePageId) activatePage(pageId);
      }

      // 1ページ分のSVGを組み立てる中核。options: selection=選択枠, scaled=画面表示用ズーム, grid=グリッド,
      // output=出力用(下絵や補助を除外)。印刷/SVG/PNG出力もこの関数を共用する。
      function drawPageSvg(svg, page, options = {}) {
        const size = pageSize(page);
        const scaled = options.scaled !== false;
        svg.innerHTML = "";
        svg.setAttribute("viewBox", "0 0 " + size.w + " " + size.h);
        svg.setAttribute("width", size.w + "mm");
        svg.setAttribute("height", size.h + "mm");
        svg.style.width = scaled ? (size.w * state.settings.zoom) + "px" : "100%";
        svg.style.height = scaled ? (size.h * state.settings.zoom) + "px" : "100%";

        const includeUnderlays = options.output === true ? state.settings.outputUnderlays === true : true;
        const visibleElements = page.elements.filter(element => isElementVisible(element) && (includeUnderlays || element.type !== "underlayImage"));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "#fff" }));
        visibleElements.filter(element => element.type === "underlayImage").forEach(element => drawElement(svg, element));
        if (options.grid !== false) drawGrid(svg, size);
        if (isLayerVisible("frame")) drawFrame(svg, page, size);
        visibleElements.filter(element => element.type !== "underlayImage").forEach(element => drawElement(svg, element));
        if (options.selection) {
          drawSelection(svg);
          drawMarquee(svg);
          drawAlignGuides(svg);
        }
        if (options.selection && !page.elements.length) {
          // 空ページの「はじめかた」カード(画面表示のみ。印刷・出力には含まれない)
          const cx = size.w / 2;
          const cy = size.h / 2;
          const card = svgEl("g", { "pointer-events": "none" });
          card.appendChild(svgEl("rect", {
            x: cx - 52, y: cy - 26, width: 104, height: 52, rx: 3,
            fill: "#f7fafc", stroke: "#c3ccd6", "stroke-width": 0.4
          }));
          const title = textEl("はじめかた", cx, cy - 19, { fontSize: 4, anchor: "middle" });
          title.setAttribute("style", "fill:#5b626b; font-weight:bold");
          card.appendChild(title);
          [
            ["1. 右の「テンプレートからページ追加」で骨組みを作る", -10],
            ["2. 左のパレットから部品をドラッグして配置", -3],
            ["3. W キー(または「配線」)でドラッグして配線", 4],
            ["回路ライブラリ(パレット下部)なら1クリックで回路ごと配置", 13],
            ["困ったら上部の「ヘルプ」へ", 20]
          ].forEach(([msg, dy], index) => {
            const hint = textEl(msg, cx - 47, cy + dy, { fontSize: index < 3 ? 2.9 : 2.4, anchor: "start" });
            hint.setAttribute("style", index < 3 ? "fill:#66727f" : "fill:#93a0ad");
            card.appendChild(hint);
          });
          svg.appendChild(card);
        }
      }

      // レイヤidからレイヤ定義を返す。
      function layerFor(id) {
        return (state.layers || []).find(layer => layer.id === id) || null;
      }

      // レイヤ表示フラグ(未定義レイヤはtrue)。
      function isLayerVisible(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.visible !== false : true;
      }

      // レイヤロックフラグ。
      function isLayerLocked(id) {
        const layer = layerFor(id || "symbols");
        return layer ? layer.locked === true : false;
      }

      // 要素の所属レイヤが表示中か。
      function isElementVisible(element) {
        return isLayerVisible(element.layer || inferredLayerFor(element.type));
      }

      // 要素自身のlockedまたは所属レイヤのロックで編集不可か。
      function isElementLocked(element) {
        return Boolean(element.locked || isLayerLocked(element.layer || inferredLayerFor(element.type)));
      }

      // 作図補助グリッド(細+太)をパターンとして敷く。印刷・出力には含めない。
      function drawGrid(svg, size) {
        const step = state.settings.grid || 2.5;
        const gridPatternId = uid("gridPattern");
        const majorGridPatternId = uid("majorGridPattern");
        const defs = svgEl("defs");
        const pattern = svgEl("pattern", {
          id: gridPatternId,
          width: step,
          height: step,
          patternUnits: "userSpaceOnUse"
        });
        pattern.appendChild(svgEl("path", {
          d: "M " + step + " 0 L 0 0 0 " + step,
          fill: "none",
          stroke: "#e4e9ee",
          "stroke-width": .13
        }));
        defs.appendChild(pattern);
        const major = svgEl("pattern", {
          id: majorGridPatternId,
          width: MAJOR_GRID_MM,
          height: MAJOR_GRID_MM,
          patternUnits: "userSpaceOnUse"
        });
        major.appendChild(svgEl("path", {
          d: "M " + MAJOR_GRID_MM + " 0 L 0 0 0 " + MAJOR_GRID_MM,
          fill: "none",
          stroke: "#cfd8e3",
          "stroke-width": .18
        }));
        defs.appendChild(major);
        svg.appendChild(defs);
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#" + gridPatternId + ")", opacity: .62 }));
        svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size.w, height: size.h, fill: "url(#" + majorGridPatternId + ")", opacity: .48 }));
      }

      // 図枠の振り分け: frameVariantに応じて各図枠描画関数を呼ぶ。
      function drawFrame(svg, page, size) {
        const margin = frameMargin(size);
        const frame = svgEl("g", { class: "frame" });
        if (page.frameVariant === "ladder") {
          drawLadderFrame(frame, page, size);
          svg.appendChild(frame);
          return;
        }
        frame.appendChild(svgEl("rect", { x: margin, y: margin, width: size.w - margin * 2, height: size.h - margin * 2, class: "frame-thick" }));
        frame.appendChild(svgEl("rect", { x: margin + 4, y: margin + 4, width: size.w - (margin + 4) * 2, height: size.h - (margin + 4) * 2, class: "frame-line" }));
        // 参照様式に座標目盛は存在しないため描画しない(行番号は設備標準図枠が持つ)。
        if (page.frameVariant === "compact") drawCompactTitle(frame, page, size, margin);
        if (page.frameVariant === "detailed") drawDetailedTitle(frame, page, size, margin);
        if (page.frameVariant === "side") drawSideTitle(frame, page, size, margin);
        if (page.frameVariant === "index") drawIndexFrame(frame, page, size, margin);
        svg.appendChild(frame);
      }

      // 図枠の余白(mm)。用紙サイズによらず固定。
      function frameMargin(size) {
        return Math.min(size.w, size.h) >= 297 ? 10 : 8;
      }

      // 表題欄などの下に白地を敷き、作図グリッドが透けて見にくくなるのを防ぐ。
      function frameWhiteUnderlay(frame, x, y, w, h) {
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, fill: "#fff", stroke: "none" }));
      }

      // ===== 表題欄レイアウト定義(データ駆動) =====
      // compact(基本)/detailed(詳細)の表題欄はこのJSONレイアウトをdrawTitleBlockLayoutが解釈して描く。
      // 各項目の意味:
      //   w/h            = 欄の外形(mm)。wはmaxWidthInsetにより用紙幅へ収まるよう縮む
      //   rows/cols      = 罫線(行高さ・列幅の並び。最後の1件の後には線を引かない。"rest"=残り全部)
      //   cells          = 描画要素の並び(DOM順=定義順)
      //     { t:"label", text, dx, dy, size? }            固定文字(既定サイズ2.2)
      //     { t:"field", field, dx, dy, size? }           page.titleの値("sheet"=頁/総頁)
      //     { t:"revBlock", wFromRight, rows, rowH }      改訂欄(project.revisions末尾rows件)
      // state.titleLayoutsに同形のオブジェクトを入れると既定を上書きできる(標準パックで持ち運び可)。
      // 設備標準(ladder)図枠は実測固定のため対象外。
      const DEFAULT_TITLE_LAYOUTS = {
        compact: {
          w: 94, h: 32, maxWidthInset: 18,
          rows: [8, 8, 8, 8],
          cols: [18, 46, 18, "rest"],
          cells: [
            { t: "label", text: "図名", dx: 2, dy: 4 },
            { t: "field", field: "title", dx: 20, dy: 4, size: 2.7 },
            { t: "label", text: "図番", dx: 2, dy: 12 },
            { t: "field", field: "drawingNo", dx: 20, dy: 12 },
            { t: "label", text: "作成", dx: 2, dy: 20 },
            { t: "field", field: "designer", dx: 20, dy: 20 },
            { t: "label", text: "日付", dx: 52, dy: 20 },
            { t: "field", field: "date", dx: 70, dy: 20 },
            { t: "label", text: "SHEET", dx: 2, dy: 28 },
            { t: "field", field: "sheet", dx: 20, dy: 28 }
          ]
        },
        detailed: {
          w: 124, h: 48, maxWidthInset: 12,
          rows: [8, 8, 8, 8, 8, 8],
          cols: [18, 44, 16, 24, 22],
          cells: [
            { t: "revBlock", wFromRight: 28, rows: 5, rowH: 8 },
            { t: "label", text: "図名", dx: 2, dy: 4 },
            { t: "field", field: "title", dx: 20, dy: 4, size: 2.7 },
            { t: "label", text: "設備", dx: 2, dy: 12 },
            { t: "field", field: "facility", dx: 20, dy: 12 },
            { t: "label", text: "図番", dx: 2, dy: 20 },
            { t: "field", field: "drawingNo", dx: 20, dy: 20 },
            { t: "label", text: "作成", dx: 2, dy: 28 },
            { t: "field", field: "designer", dx: 20, dy: 28 },
            { t: "label", text: "日付", dx: 64, dy: 28 },
            { t: "field", field: "date", dx: 82, dy: 28 },
            { t: "label", text: "SHEET", dx: 2, dy: 44 },
            { t: "field", field: "sheet", dx: 20, dy: 44 }
          ]
        }
      };

      // 有効な表題欄レイアウト(プロジェクトの上書き→既定の順)。
      function titleLayoutFor(variant) {
        const custom = state.titleLayouts && state.titleLayouts[variant];
        return custom && typeof custom === "object" ? custom : DEFAULT_TITLE_LAYOUTS[variant];
      }

      // page.titleのフィールド値を解決("sheet"は頁/総頁の合成)。
      function titleFieldValue(page, field) {
        if (field === "sheet") return page.title.page + " / " + page.title.total;
        const raw = page.title[field];
        return raw === undefined || raw === null ? "" : raw;
      }

      // 改訂欄(REV列)を描画。project.revisionsの末尾N件、無ければpage.title.revisionを1行目へ。
      function drawRevisionBlock(frame, page, x, y, w, h, cell) {
        const revW = Number(cell.wFromRight || 28);
        const rowH = Number(cell.rowH || 8);
        const rowCount = Math.max(1, Number(cell.rows || 5));
        const revX = x + w - revW;
        frame.appendChild(svgEl("line", { x1: revX, y1: y, x2: revX, y2: y + h, class: "frame-line" }));
        frame.appendChild(textEl("REV", revX + revW / 2, y + 4, { fontSize: 2.1, anchor: "middle" }));
        for (let i = 1; i <= rowCount; i++) frame.appendChild(svgEl("line", { x1: revX, y1: y + rowH * i, x2: x + w, y2: y + rowH * i, class: "frame-light" }));
        const revisions = (state.project.revisions || []).slice(-rowCount);
        if (revisions.length) {
          revisions.forEach((entry, index) => {
            frame.appendChild(textEl(((entry.rev || "") + " " + (entry.date || "")).trim(), revX + revW / 2, y + rowH + 4 + rowH * index, { fontSize: 2, anchor: "middle" }));
          });
        } else {
          frame.appendChild(textEl(page.title.revision || "", revX + revW / 2, y + rowH + 4, { fontSize: 2.4, anchor: "middle" }));
        }
      }

      // 表題欄レイアウトのインタープリタ。外形→罫線→セルの順に描画する。
      function drawTitleBlockLayout(frame, page, size, margin, layout) {
        if (!layout) return;
        const w = Math.min(Number(layout.w || 94), size.w - margin * 2 - Number(layout.maxWidthInset ?? 12));
        const h = Number(layout.h || 32);
        const x = size.w - margin - w;
        const y = size.h - margin - h;
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, class: "frame-thick" }));
        if (Array.isArray(layout.rows)) drawRows(frame, x, y, w, h, layout.rows);
        if (Array.isArray(layout.cols)) {
          const fixed = layout.cols.filter(col => typeof col === "number").reduce((sum, col) => sum + col, 0);
          drawCols(frame, x, y, w, h, layout.cols.map(col => col === "rest" ? Math.max(0, w - fixed) : col));
        }
        (layout.cells || []).forEach(cell => {
          if (cell.t === "revBlock") {
            drawRevisionBlock(frame, page, x, y, w, h, cell);
            return;
          }
          const text = cell.t === "label" ? cell.text : titleFieldValue(page, cell.field);
          const opts = { fontSize: Number(cell.size || (cell.t === "label" ? 2.2 : 2.5)) };
          if (cell.anchor) opts.anchor = cell.anchor;
          frame.appendChild(textEl(text, x + Number(cell.dx || 0), y + Number(cell.dy || 0), opts));
        });
      }

      // 簡易表題欄(右下小型)を描画(レイアウト定義から)。
      function drawCompactTitle(frame, page, size, margin) {
        drawTitleBlockLayout(frame, page, size, margin, titleLayoutFor("compact"));
      }

      // 詳細表題欄(右下+改訂欄つき)を描画(レイアウト定義から)。
      function drawDetailedTitle(frame, page, size, margin) {
        drawTitleBlockLayout(frame, page, size, margin, titleLayoutFor("detailed"));
      }

      // 側帯型表題欄(左側縦帯)を描画。
      function drawSideTitle(frame, page, size, margin) {
        const w = Math.min(44, Math.max(34, size.w * .15));
        const x = size.w - margin - w;
        const y = margin + 4;
        const h = size.h - margin * 2 - 8;
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("line", { x1: x, y1: y, x2: x, y2: y + h, class: "frame-thick" }));
        frame.appendChild(svgEl("rect", { x, y: y + h - 88, width: w, height: 88, class: "frame-thick" }));
        drawRows(frame, x, y + h - 88, w, 88, [8, 8, 8, 8, 8, 8, 8, 8, 8, 8, 8]);
        drawCols(frame, x, y + h - 88, w, 88, [12, 18, w - 30]);
        frame.appendChild(textEl("図名", x + 2, y + h - 84, { fontSize: 2 }));
        frame.appendChild(textEl(page.title.title, x + 14, y + h - 84, { fontSize: 2.4 }));
        frame.appendChild(textEl("図番", x + 2, y + h - 76, { fontSize: 2 }));
        frame.appendChild(textEl(page.title.drawingNo, x + 14, y + h - 76, { fontSize: 2.3 }));
        frame.appendChild(textEl("REV", x + 2, y + h - 68, { fontSize: 2 }));
        frame.appendChild(textEl(page.title.revision, x + 14, y + h - 68, { fontSize: 2.3 }));
        frame.appendChild(textEl("SHEET", x + 2, y + h - 12, { fontSize: 2 }));
        frame.appendChild(textEl(page.title.page + "/" + page.title.total, x + 18, y + h - 12, { fontSize: 2.5 }));
        const revY = y + 8;
        frame.appendChild(svgEl("rect", { x, y: revY, width: w, height: 58, class: "frame-line" }));
        for (let i = 1; i < 8; i++) frame.appendChild(svgEl("line", { x1: x, y1: revY + i * 7, x2: x + w, y2: revY + i * 7, class: "frame-light" }));
        frame.appendChild(textEl("改訂履歴", x + w / 2, revY + 4, { fontSize: 2.2, anchor: "middle" }));
      }

      // 目次ページ用の図枠を描画。
      function drawIndexFrame(frame, page, size, margin) {
        drawCompactTitle(frame, page, size, margin);
        const x = margin + 18;
        const y = margin + 22;
        const w = Math.min(size.w - margin * 2 - 36, 150);
        const h = Math.min(size.h - margin * 2 - 76, 170);
        frame.appendChild(textEl("図面目次", x + w / 2, y - 8, { fontSize: 4, anchor: "middle" }));
        frameWhiteUnderlay(frame, x, y, w, h);
        frame.appendChild(svgEl("rect", { x, y, width: w, height: h, class: "frame-thick" }));
        const rows = 16;
        for (let i = 1; i < rows; i++) {
          frame.appendChild(svgEl("line", { x1: x, y1: y + h * i / rows, x2: x + w, y2: y + h * i / rows, class: "frame-light" }));
        }
        [18, 48, 118].forEach(dx => frame.appendChild(svgEl("line", { x1: x + dx, y1: y, x2: x + dx, y2: y + h, class: "frame-light" })));
        frame.appendChild(textEl("No.", x + 9, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
        frame.appendChild(textEl("図番", x + 33, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
        frame.appendChild(textEl("図名", x + 83, y + h / rows / 2, { fontSize: 2.5, anchor: "middle" }));
      }

      // ===== 設備標準図枠(行番号+機器符号表+表題欄) =====
      function drawLadderFrame(frame, page, size) {
        const L = 19, R = size.w - 19, T = 18, B = size.h - 24;
        frame.appendChild(svgEl("rect", { x: L, y: T, width: R - L, height: B - T, class: "frame-thick" }));
        for (let i = 0; i <= 20; i++) {
          frame.appendChild(textEl(String(i).padStart(2, "0"), 25.5, 27 + 9.5 * i, { fontSize: 3, anchor: "middle" }));
        }
        if (state.settings.showPageName === true) {
          frame.appendChild(textEl(page.name || "", (L + R) / 2, 22.5, { fontSize: 3.5, anchor: "middle" }));
        }
        const tblTop = B - 49;
        const xrefR = 105.8;
        frameWhiteUnderlay(frame, L, tblTop, R - L, B - tblTop);
        frame.appendChild(svgEl("rect", { x: L, y: tblTop, width: xrefR - L, height: B - tblTop, class: "frame-line" }));
        for (let i = 1; i < 13; i++) {
          const x = L + (xrefR - L) * i / 13;
          frame.appendChild(svgEl("line", { x1: x, y1: tblTop, x2: x, y2: B, class: "frame-light" }));
        }
        [tblTop + 5, B - 11, B - 5.5].forEach(y => frame.appendChild(svgEl("line", { x1: L, y1: y, x2: xrefR, y2: y, class: "frame-light" })));
        const devTop = tblTop;
        const devBottom = tblTop + 28.5;
        frame.appendChild(svgEl("rect", { x: xrefR, y: devTop, width: R - xrefR, height: devBottom - devTop, class: "frame-line" }));
        const gw = (R - xrefR) / 2;
        [0, 1].forEach(gi => {
          const gx = xrefR + gi * gw;
          frame.appendChild(svgEl("line", { x1: gx + 11, y1: devTop, x2: gx + 11, y2: devBottom, class: "frame-light" }));
          frame.appendChild(svgEl("line", { x1: gx + gw - 4.5, y1: devTop, x2: gx + gw - 4.5, y2: devBottom, class: "frame-light" }));
          frame.appendChild(textEl("機器符号", gx + 5.5, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
          frame.appendChild(textEl("機 器 符 号 内 容", gx + 11 + (gw - 15.5) / 2, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
          frame.appendChild(textEl("頁", gx + gw - 2.25, devTop + 1.6, { fontSize: 1.7, anchor: "middle" }));
        });
        frame.appendChild(svgEl("line", { x1: xrefR + gw, y1: devTop, x2: xrefR + gw, y2: devBottom, class: "frame-line" }));
        for (let i = 1; i <= 10; i++) {
          const y = devTop + 2.6 + (devBottom - devTop - 2.6) * i / 10;
          frame.appendChild(svgEl("line", { x1: xrefR, y1: y, x2: R, y2: y, class: "frame-light" }));
        }
        const t1 = devBottom;
        const t2 = t1 + 6;
        const t3 = t2 + 8;
        const t4 = B;
        frame.appendChild(svgEl("rect", { x: xrefR, y: t1, width: R - xrefR, height: t4 - t1, class: "frame-thick" }));
        frame.appendChild(svgEl("line", { x1: xrefR, y1: t2, x2: R, y2: t2, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: xrefR, y1: t3, x2: R, y2: t3, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: 137, y1: t1, x2: 137, y2: t2, class: "frame-line" }));
        frame.appendChild(textEl("客先機番", xrefR + 1.2, t1 + 1.8, { fontSize: 1.7 }));
        frame.appendChild(textEl(page.title.installation || "", (xrefR + 137) / 2, (t1 + t2) / 2 + 1, { fontSize: 2.4, anchor: "middle" }));
        frame.appendChild(textEl("装置区分", 138.2, t1 + 1.8, { fontSize: 1.7 }));
        frame.appendChild(textEl(page.title.facility || "", (137 + R) / 2, (t1 + t2) / 2 + 1, { fontSize: 2.4, anchor: "middle" }));
        frame.appendChild(svgEl("line", { x1: 110, y1: t2, x2: 110, y2: t4, class: "frame-line" }));
        frame.appendChild(svgEl("line", { x1: 177, y1: t2, x2: 177, y2: t3, class: "frame-line" }));
        frame.appendChild(textEl("内", 107.9, t2 + 2.6, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl("容", 107.9, t2 + 5.4, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl(page.title.title || "", (110 + 177) / 2, (t2 + t3) / 2, { fontSize: 3.2, anchor: "middle" }));
        frame.appendChild(textEl("頁", 184, t2 + 1.8, { fontSize: 1.7, anchor: "middle" }));
        frame.appendChild(textEl(page.title.page || "", 184, t3 - 2.4, { fontSize: 3.5, anchor: "middle" }));
        frame.appendChild(textEl("図", 107.9, t3 + 2.2, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl("番", 107.9, t3 + 4.8, { fontSize: 1.9, anchor: "middle" }));
        frame.appendChild(textEl(page.title.drawingNo || "−", (110 + R) / 2, (t3 + t4) / 2, { fontSize: 2.6, anchor: "middle" }));
        frame.appendChild(textEl("汎用図番:", L, size.h - 20, { fontSize: 1.9 }));
