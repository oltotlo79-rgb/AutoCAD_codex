          const L = 2.6;
          const H = .28;
          const q1 = [tip[0] - L * Math.cos(angle - H), tip[1] - L * Math.sin(angle - H)];
          const q2 = [tip[0] - L * Math.cos(angle + H), tip[1] - L * Math.sin(angle + H)];
          g.appendChild(svgEl("path", { d: "M " + q1[0] + " " + q1[1] + " L " + tip[0] + " " + tip[1] + " L " + q2[0] + " " + q2[1] + " Z", fill: stroke, stroke: "none" }));
        };
        if (horizontal) {
          const y = Math.min(a[1], b[1]) - off;
          const x1 = Math.min(a[0], b[0]);
          const x2 = Math.max(a[0], b[0]);
          seg(a[0], a[1], a[0], y - 1.4);
          seg(b[0], b[1], b[0], y - 1.4);
          seg(x1, y, x2, y);
          tri([x1, y], Math.PI);
          tri([x2, y], 0);
          const value = element.label || String(round(x2 - x1));
          g.appendChild(textEl(value, (x1 + x2) / 2, y - 1.8, { fontSize: 2.4, anchor: "middle" }));
        } else {
          const x = Math.min(a[0], b[0]) - off;
          const y1 = Math.min(a[1], b[1]);
          const y2 = Math.max(a[1], b[1]);
          seg(a[0], a[1], x - 1.4, a[1]);
          seg(b[0], b[1], x - 1.4, b[1]);
          seg(x, y1, x, y2);
          tri([x, y1], -Math.PI / 2);
          tri([x, y2], Math.PI / 2);
          const value = element.label || String(round(y2 - y1));
          g.appendChild(textEl(value, x - 1.8, (y1 + y2) / 2, { fontSize: 2.4, anchor: "middle", transform: "rotate(-90 " + (x - 1.8) + " " + ((y1 + y2) / 2) + ")" }));
        }
      }

      // ===== ラダー行グリッドと行アドレス(頁番号+行番号2桁) =====
      const LADDER_GRID = { top: 27, pitch: 9.5, rows: 20 };
      // 設備図枠の行番号は9.5mm間隔だが、テンプレートの電気接続点は作図方眼(2.5mm)へ載せる。
      // 旧保存図面の行座標は変更せず、新規生成時だけこの固定方眼へ丸める。
      const TEMPLATE_GRID_STEP = 2.5;
      const TEMPLATE_CIRCUIT_PITCH = 10;
      const TEMPLATE_RAIL_BOTTOM = 217.5;
      const TEMPLATE_UNIT_MAX_ROWS = 19;

      function templateGridCoordinate(value) {
        return round(Math.round(Number(value || 0) / TEMPLATE_GRID_STEP) * TEMPLATE_GRID_STEP);
      }

      function templateGridRow(index) {
        return templateGridCoordinate(LADDER_GRID.top + LADDER_GRID.pitch * Number(index || 0));
      }

      function templateGridPair(index) {
        const first = templateGridRow(index);
        return [first, round(first + TEMPLATE_CIRCUIT_PITCH)];
      }

      // y座標→最寄りの行番号(00-20)。
      function ladderRowAt(y) {
        const row = Math.round((y - LADDER_GRID.top) / LADDER_GRID.pitch);
        return Math.max(0, Math.min(LADDER_GRID.rows, row));
      }

      // 要素の代表y→行番号。クロス参照のアドレス計算に使用。
      function elementLadderRow(element) {
        const box = elementBounds(element);
        if (!box) return 0;
        return ladderRowAt(box.y + box.h / 2);
      }

      // ページのシート番号(表題欄page値または並び順)。
      function pageSheetNumber(page) {
        const n = Number(page.title?.page);
        return Number.isFinite(n) && n > 0 ? n : state.pages.indexOf(page) + 1;
      }

      // クロス参照アドレス文字列 = シート番号+行番号2桁(例: 頁2行05→"205")。
      function elementAddress(page, element) {
        return String(pageSheetNumber(page)) + String(elementLadderRow(element)).padStart(2, "0");
      }

      // ===== コイル↔接点クロスリファレンス =====

        return new Set(["contactNO", "contactNC", "timerContactNO", "timerContactNC", "contactBlock", "thermalRelay"]);

      // 接点下の自動参照番号・図枠クロス参照表・監査(コイル/接点ルール)が共用する。
      function buildCrossRefCache() {
        const coils = new Map();
        const contacts = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const tag = componentTag(element);
            if (!tag) return;
            if (coilTypes().has(element.type)) {
              if (!coils.has(tag)) coils.set(tag, { page, element, address: elementAddress(page, element) });
            } else if (contactChildTypes().has(element.type)) {
              const list = contacts.get(tag) || [];
              list.push({
                page,
                element,
                address: elementAddress(page, element),
                closed: element.type === "contactNC" || element.type === "timerContactNC" || element.type === "thermalRelay" || element.blockContact === "NC"
              });
              contacts.set(tag, list);
            }
          });
        });
        return { coils, contacts };
      }

        return crossRefCache;

      // 要素→SYMBOL_GEOキーの解決。ここでnull以外を返す種別は設備標準の固定形状で描かれ、
      // 角ハンドルでのリサイズ対象外になる(canResizeElement参照)。バリエーション(筒形ランプ等)はnull。
      function geoKeyFor(element) {
        const variant = element.symbolVariant || "standard";
        switch (element.type) {
          case "contactNO": {
            if (variant === "jis") return "contactNOJis";
            if (variant === "iec") return "contactNOIec";
            if (variant === "changeover") return "contactChangeover";
            return "contactNO";
          }
          case "contactNC": return variant === "jis" ? "contactNCJis" : (variant === "iec" ? "contactNCIec" : "contactNC");
          case "thermalRelay": return variant === "box" ? "thermalRelayBox" : "thermalRelay";
          case "disconnector": return "disconnector";
          case "outlet": {
            if (variant === "boxGrid10") return "outletBoxGrid10";
            return variant === "box" ? "outletBox" : "outlet";
          }
          case "beacon": return "beacon";
          case "thermalElement": return "thermalElement";
          case "breaker": {
            if (variant === "elb") return "breakerElb";
            if (variant === "iec") return "breakerIec";
            if (variant === "arc") return "breakerArc";
            if (variant === "mccb") return "breakerMccb";
            if (variant === "cp") return "breakerCp";
            return "breaker";
          }
          case "coil": {
            if (variant === "box") return "coilBox";
            if (variant === "ac") return "coilAc";
            if (variant === "latch") return "coilLatch";
            if (variant === "timer") return "coilTimer";
            if (variant === "counter") return "coilCounter";
            if (variant === "flicker") return "coilFlicker";
            if (variant === "interface") return "coilInterface";
            return "coil";
          }
          case "lamp": {
            const lv = element.lampVariant || "pilot";
            if (lv === "pilot") return "lamp";
            if (lv === "cross") return "lampCross";
            if (lv === "fluor") return "lampFluor";
            return null;
          }
          case "diode": {
            if (variant === "led") return "diodeLed";
            if (variant === "zener") return "diodeZener";
            if (variant === "thyristor") return "diodeThyristor";
            if (variant === "bridge") return "diodeBridge";
            return "diode";
          }
          case "transistor": return variant === "pnp" ? "transistorPnp" : "transistorNpn";
          case "capacitor": return variant === "polarized" ? "capacitorPolarized" : (variant === "variable" ? "capacitorVariable" : "capacitor");
          case "pushButton":
            if ((element.pbStyle || "momentary") === "emergency") {
              // 既定(standard)は一般形。旧来の設備標準(キノコ+ひねり解除環)はfacilityで選択。
              if (variant === "facility") return "pushButtonEmergency";
              if (variant === "bar") return "pushButtonEmergencyBar";
              if (variant === "gridMulti2") return "pushButtonEmergencyGridMulti2";
              if (variant === "multi2") return "pushButtonEmergencyMulti2";
              if (variant === "multi3") return "pushButtonEmergencyMulti3";
              if (variant === "jis") return "pushButtonEmergencyJis";
              if (variant === "jisMulti2") return "pushButtonEmergencyJisMulti2";
              if (variant === "jisMulti3") return "pushButtonEmergencyJisMulti3";
              return "pushButtonEmergencyGeneral";
            }
            if (variant === "pull") return "pushButtonPull";
            if (variant === "twist") return "pushButtonTwist";
            if (variant === "nc") return "pushButtonNC";
            if (variant === "jis") return "pushButtonJis";
            if (variant === "jisNc") return "pushButtonJisNC";
            if (variant === "illuminated") return "pushButtonIlluminated";
            if (variant === "palm") return "pushButtonPalm";
            return "pushButton";
          case "selectorSwitch": {
            if (variant === "onOff") return "selectorSwitchOnOff";
            if (variant === "three") return "selectorSwitch3";
            if (variant === "key") return "selectorSwitchKey";
            if (variant === "jis") return "selectorSwitchJis";
            return "selectorSwitch";
          }
          case "flowSwitch": return variant === "nc" ? "flowSwitchNC" : "flowSwitch";
          case "footSwitch": return variant === "nc" ? "footSwitchNC" : "footSwitch";
          case "logicGate": {
            if (variant === "or") return "gateOr";
            if (variant === "not") return "gateNot";
            return "gateAnd";
          }
          case "photocoupler": return "photocoupler";
          case "limitSwitch": {
            if (variant === "roller") return "limitSwitchRoller";
            if (variant === "rollerNc") return "limitSwitchRollerNC";
            if (variant === "nc") return "limitSwitchNC";
            return "limitSwitch";
          }
          case "pressureSwitch": return variant === "nc" ? "pressureSwitchNC" : "pressureSwitch";
          case "motor": return variant === "double" ? "motorDouble" : "motor";
          case "transformer": {
            if (variant === "grid10") return "transformerGrid10";
            return variant === "circles" ? "transformerCircles" : (variant === "circlesCore" ? "transformerCirclesCore" : "transformer");
          }
          case "meter": {
            if (variant === "box") return "meterBox";
            if (variant === "double") return "meterDouble";
            if (variant === "needle") return "meterNeedle";
            return "meter";
          }
          case "inductor": return variant === "core" ? "inductorCore" : (variant === "box" ? "inductorBox" : "inductor");
          case "heater": return variant === "plain" ? "heaterPlain" : "heater";
          case "ground": {
            if (variant === "bars") return "groundBars";
            if (variant === "circle") return "groundClean";
            if (variant === "chassis") return "groundChassis";
            return "ground";
          }
          case "terminal": {
            const shape = element.terminalShape || "circle";
            if (shape === "circle") return "terminal";
            if (shape === "double") return "terminalDouble";
            return null;
          }
          case "resistor": {
            const rs = element.resistorStyle || "box";
            if (rs === "varistor") return "varistor";
            if (rs === "variable") return "resistorVariable";
            if (rs === "thermistor") return "resistorThermistor";
            if (rs === "zigzag") return "resistorZigzag";
            return "resistor";
          }
          case "timerContactNO": {
            if (variant === "off") return "timerContactNOOff";
            if (variant === "iec") return "timerContactNOIec";
            if (variant === "iecOff") return "timerContactNOIecOff";
            return "timerContactNO";
          }
          case "timerContactNC": {
            if (variant === "off") return "timerContactNCOff";
            if (variant === "iec") return "timerContactNCIec";
            if (variant === "iecOff") return "timerContactNCIecOff";
            return "timerContactNC";
          }
          case "fuse": return variant === "blank" ? "fuseBlank" : (variant === "wave" ? "fuseWave" : "fuse");
          case "floatSwitch": return variant === "nc" ? "floatSwitchNC" : "floatSwitch";
          case "thermoSwitch": return variant === "nc" ? "thermoSwitchNC" : "thermoSwitch";
          case "bell": return "bell";
          case "battery": return variant === "single" ? "batterySingle" : "battery";
          case "rectifierBox": return "rectifierBox";
          case "currentTransformer": return variant === "zct" ? "currentTransformerZct" : (variant === "coil" ? "currentTransformerCoil" : "currentTransformer");
          case "arrester": return variant === "gap" ? "arresterGap" : "arrester";
          case "connector": return element.connStyle === "pair" ? "connectorPair" : null;
          case "contactBlock": return (element.blockContact || "NO") === "NC" ? "contactBlockNC" : "contactBlock";
          case "positionMark": return (element.markStyle || "box") === "box" ? "positionMarkBox" : "positionMarkLine";
          case "revisionMark": return "revisionMark";
          case "polarityMark": return (element.sign || "+") === "-" ? "polarityMarkMinus" : "polarityMarkPlus";
          default: return null;
        }
      }

      // 要素に対応するSYMBOL_GEO定義(無ければnull)。
      function geoFor(element) {
        const key = geoKeyFor(element);
        return key ? SYMBOL_GEO[key] || null : null;
      }

      // geoシンボルの本体寸法(縦向きは幅高を入替)。
      function geoBodySize(element) {
        const geo = geoFor(element);
        if (!geo) return null;
        const vertical = element.orientation === "vertical";
        return { w: vertical ? geo.h : geo.w, h: vertical ? geo.w : geo.h };
      }

      // geo定義のローカル座標→要素ローカル座標への変換。縦向きは90度回転し、
      // 要素枠(w/h)が本体より大きい場合は中央寄せする(旧データ互換のため)。
      function geoMapPoint(geo, element, x, y) {
        const vertical = element.orientation === "vertical";
        const bw = vertical ? geo.h : geo.w;
        const bh = vertical ? geo.w : geo.h;
        const ox = (Number(element.w || bw) - bw) / 2;
        const oy = (Number(element.h || bh) - bh) / 2;
        if (vertical) return [geo.h - y + ox, x + oy];
        return [x + ox, y + oy];
      }

      // geo定義のプリミティブ列(line/pline/rect/circle/arc/text)を要素ローカル座標へ展開。
      function geoPrims(element) {
        const geo = geoFor(element);
        if (!geo) return [];
        const map = (x, y) => geoMapPoint(geo, element, x, y);
        return geo.prims.filter(prim => !prim.when || Boolean(element[prim.when])).map((prim, index) => {
          const q = deepClone(prim);
          if (prim.t === "line") {
            const a = map(prim.p[0], prim.p[1]);
            const b = map(prim.p[2], prim.p[3]);
            q.p = [a[0], a[1], b[0], b[1]];
          } else if (prim.t === "pline") {
            q.pts = prim.pts.map(pt => map(pt[0], pt[1]));
          } else if (prim.t === "rect") {
            const a = map(prim.p[0], prim.p[1]);
            const b = map(prim.p[0] + prim.p[2], prim.p[1] + prim.p[3]);
            q.p = [Math.min(a[0], b[0]), Math.min(a[1], b[1]), Math.abs(b[0] - a[0]), Math.abs(b[1] - a[1])];
          } else if (prim.t === "circle") {
            const c = map(prim.p[0], prim.p[1]);
            q.p = [c[0], c[1], prim.p[2]];
          } else if (prim.t === "arc") {
            const c = map(prim.p[0], prim.p[1]);
            const rot = element.orientation === "vertical" ? 90 : 0;
            q.p = [c[0], c[1], prim.p[2], prim.p[3] + rot, prim.p[4] + rot];
          } else if (prim.t === "text") {
            const c = map(prim.p[0], prim.p[1]);
            q.p = [c[0], c[1]];
          }
          if (element.type === "contactBlock" && element.blockFrame === "dashed" && index === 0 && q.t === "rect") {
            q.dash = "1.4 1.2";
          }
          return q;
        });
      }

      // geoのtextプリミティブのfield指定(label/refNo/descLine/catalog/lampColor)を実値へ解決。
      function geoTextValue(element, prim) {
        if (prim.field === "refNo" && contactChildTypes().has(element.type)) {
          return contactAutoRefNo(element);
        }
        if (prim.field === "descLine") {
          return String(element.description || "").split(/\r?\n/)[0];
        }
        if (prim.field) {
          const raw = element[prim.field];
          return raw === undefined || raw === null ? "" : String(raw);
        }
        return prim.value === undefined ? "" : String(prim.value);
      }

      // 中心・半径・開始/終了角(度, スクリーン座標系, 時計回り)からSVG円弧パスを生成。DXF側はdxfArcLocalが同じ角度規約。
      function svgArcPath(cx, cy, r, a0, a1) {
        const rad = d => d * Math.PI / 180;
        const x0 = cx + r * Math.cos(rad(a0));
        const y0 = cy + r * Math.sin(rad(a0));
        const x1 = cx + r * Math.cos(rad(a1));
        const y1 = cy + r * Math.sin(rad(a1));
        const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
        return "M " + round(x0) + " " + round(y0) + " A " + r + " " + r + " 0 " + large + " 1 " + round(x1) + " " + round(y1);
      }

      // SYMBOL_GEO定義による描画。対応要素ならgへ描いてtrue、対象外ならfalseを返す。
      function drawGeoSymbol(g, element, stroke) {
        const geo = geoFor(element);
        if (!geo) return false;
        geoPrims(element).forEach(prim => {
          if (prim.t === "line") {
            g.appendChild(svgEl("line", { x1: prim.p[0], y1: prim.p[1], x2: prim.p[2], y2: prim.p[3], class: "symbol-line", stroke, "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "pline") {
            g.appendChild(svgEl("path", { d: prim.pts.map((pt, i) => (i ? "L " : "M ") + pt[0] + " " + pt[1]).join(" "), class: "symbol-line", stroke, "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "rect") {
            g.appendChild(svgEl("rect", { x: prim.p[0], y: prim.p[1], width: prim.p[2], height: prim.p[3], class: prim.fill === "white" ? "symbol-fill" : "symbol-line", stroke, fill: prim.fill === "white" ? "#fff" : "none", "stroke-dasharray": prim.dash || null }));
          } else if (prim.t === "circle") {
            if (prim.fill === "solid") g.appendChild(svgEl("circle", { cx: prim.p[0], cy: prim.p[1], r: prim.p[2], fill: stroke }));
            else g.appendChild(svgEl("circle", { cx: prim.p[0], cy: prim.p[1], r: prim.p[2], class: prim.fill === "white" ? "terminal-dot" : "symbol-line", stroke, fill: prim.fill === "white" ? "#fff" : "none" }));
          } else if (prim.t === "arc") {
            g.appendChild(svgEl("path", { d: svgArcPath(prim.p[0], prim.p[1], prim.p[2], prim.p[3], prim.p[4]), class: "symbol-line", stroke, fill: "none" }));
          } else if (prim.t === "text") {
            const value = geoTextValue(element, prim);
            if (value) g.appendChild(textEl(value, prim.p[0], prim.p[1], { fontSize: prim.size || 2, anchor: prim.anchor || "middle" }));
          }
        });
        return true;
      }

      // SYMBOL_GEO定義によるDXF出力(SVGと同一のプリミティブ列から生成=見た目の単一定義)。
      function dxfGeoSymbol(out, page, element) {
        const geo = geoFor(element);
        if (!geo) return false;
        geoPrims(element).forEach(prim => {
          const primLtype = dashLtypeName(prim.dash);
          if (prim.t === "line") {
            dxfLineLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], primLtype);
          } else if (prim.t === "pline") {
            for (let i = 1; i < prim.pts.length; i++) {
              dxfLineLocal(out, page, "SYMBOL", element, prim.pts[i - 1][0], prim.pts[i - 1][1], prim.pts[i][0], prim.pts[i][1], primLtype);
            }
          } else if (prim.t === "rect") {
            dxfRectLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], primLtype);
          } else if (prim.t === "circle") {
            dxfCircleLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2]);
          } else if (prim.t === "arc") {
            dxfArcLocal(out, page, "SYMBOL", element, prim.p[0], prim.p[1], prim.p[2], prim.p[3], prim.p[4]);
          } else if (prim.t === "text") {
            const value = geoTextValue(element, prim);
            if (!value) return;
            const size = prim.size || 2;
            const dx = prim.anchor === "middle" ? value.length * size * .3 : (prim.anchor === "end" ? value.length * size * .6 : 0);
            dxfTextLocal(out, page, "TEXT", element, prim.p[0] - dx, prim.p[1] + size * .35, size, value);
          }
        });
        return true;
      }

      // ARCエンティティ出力。スクリーン角(時計回り)→CAD角(反時計回り)へ変換(start=-a1, end=-a0)。
      function dxfArcLocal(out, page, layer, element, cx, cy, r, a0, a1) {
        const c = localPoint(element, cx, cy);
        const rot = Number(element.rotation || 0);
        const s = ((-(a1 + rot)) % 360 + 360) % 360;
        const e = ((-(a0 + rot)) % 360 + 360) % 360;
        out.push("0", "ARC", "8", layer, "10", round(c[0]), "20", round(cadY(page, c[1])), "40", round(r), "50", round(s), "51", round(e));
      }

      // 2次ベジェを8分割の折れ線でDXF近似出力。
      function dxfQuadApproxLocal(out, page, layer, element, x0, y0, cx, cy, x1, y1) {
        const steps = 8;
        let prev = [x0, y0];
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const mt = 1 - t;
          const px = mt * mt * x0 + 2 * mt * t * cx + t * t * x1;
          const py = mt * mt * y0 + 2 * mt * t * cy + t * t * y1;
          dxfLineLocal(out, page, layer, element, prev[0], prev[1], px, py);
          prev = [px, py];
        }
      }

      // 回転角つきTEXTエンティティ出力。
      function dxfTextRotated(out, page, layer, x, y, size, text, angle) {
        out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(size), "1", String(text || ""), "50", String(angle));
      }

      // geoシンボルの接続点(配線吸着点)一覧。geo定義のanchors配列をローカル→絶対座標へ変換。
      function geoAnchors(element) {
        const geo = geoFor(element);
        if (!geo) return null;
        return geo.anchors.map(a => {
          const p = geoMapPoint(geo, element, a[0], a[1]);
          return localAnchor(element, p[0], p[1]);
        });
      }

      // geoシンボルの向き変更時にw/hを本体寸法へ合わせ直す。
      function resizeGeoElementForOrientation(element) {
        const size = geoBodySize(element);
        if (!size) return false;
        element.w = size.w;
        element.h = size.h;
        return true;
      }

      // ===== 配線ラベル配置(mid/start/end) =====
      function wireNoAnchorPoint(element) {
        const points = element.points || [[0, 0], [20, 0]];
        const align = element.wireNoAlign || "mid";
        const dx = Number(element.wireNoDx || 0);
        const dy = Number(element.wireNoDy || 0);
        if (align === "mid") {
          const mid = wireLabelPoint(points, element.orthoFlip);
          return { x: mid.x + 1.6 + dx, y: mid.y - 1.8 + dy, anchor: "start" };
        }
        const end = align === "end" ? points[points.length - 1] : points[0];
        return {
          x: end[0] + (align === "end" ? -1.2 : 1.2) + dx,
          y: end[1] - 1.6 + dy,
          anchor: align === "end" ? "end" : "start"
        };
      }

      // ===== 表の斜線セル =====
      function tableDiagonalCells(element) {
        return String(element.cellDiagonals || "")
          .split(";")
          .map(pair => pair.split(",").map(Number))
          .filter(p => p.length === 2 && p.every(Number.isFinite));
      }

      // ===== 端子台ジャンパ =====
      function terminalJumperPairs(element) {
        return String(element.jumpers || "")
          .split(";")
          .map(pair => pair.split("-").map(n => Number(n.trim())))
          .filter(p => p.length === 2 && p.every(Number.isFinite));
      }

      // ===== PLC 16進アドレス連番 =====
      function splitPlcAddress(address) {
        const match = String(address || "").trim().match(/^(.*?)([0-9A-Fa-f]{1,4})$/);
        return match ? { prefix: match[1], digits: match[2] } : null;
      }

      // 開始アドレス(例X000)から16進連番でn個のアドレス配列を生成。
      function plcAddressSequence(start, count) {
        const parts = splitPlcAddress(start);
        if (!parts) return Array.from({ length: count }, (_, i) => String(start) + i);
        const base = parseInt(parts.digits, 16);
        return Array.from({ length: count }, (_, i) =>
          parts.prefix + (base + i).toString(16).toUpperCase().padStart(parts.digits.length, "0"));
      }

      // ===== 信号矢印のペア注記 =====
      function arrowCounterpartNote(element) {
        const role = element.signalRole || "reference";
        if (!element.label || role === "reference") return "";
        const targetRole = role === "source" ? "destination" : "source";
        for (const page of state.pages) {
          for (const item of page.elements) {
            if (item.type === "arrow" && item.id !== element.id && item.label === element.label
              && (item.signalRole || "reference") === targetRole) {
              return "頁" + pageSheetNumber(page);
            }
          }
        }
        return "";
      }

      // ===== PLCユニット列(波形破断線+端子円) =====
      function unitWavePoints(w, y, segmentsPerHalf = 8) {
        const sampleCubic = (p0, p1, p2, p3, count, includeStart) => {
          const points = [];
          for (let i = includeStart ? 0 : 1; i <= count; i++) {
            const t = i / count;
            const u = 1 - t;
            points.push([
              round(u * u * u * p0[0] + 3 * u * u * t * p1[0] + 3 * u * t * t * p2[0] + t * t * t * p3[0]),
              round(u * u * u * p0[1] + 3 * u * u * t * p1[1] + 3 * u * t * t * p2[1] + t * t * t * p3[1])
            ]);
          }
          return points;
        };
        const mid = [w / 2, y];
        return [
          ...sampleCubic([0, y], [w * .19, y - 2.2], [w * .33, y - 2.2], mid, segmentsPerHalf, true),
          ...sampleCubic(mid, [w * .67, y + 2.2], [w * .81, y + 2.2], [w, y], segmentsPerHalf, false)
        ];
      }

      // PLCユニット列の描画・接続点・DXFで共有する幾何。端子中心は列中央に固定する。
      function plcUnitGeometry(element) {
        const rows = Math.max(1, Number(element.rows || 8));
        const w = Number(element.w || 10);
        // 旧保存要素は9.5mmのまま、新規テンプレートはelement.pitch=10で方眼整合する。
        const pitch = Math.max(2.5, Number(element.pitch || 9.5));
        return { rows, w, pitch, h: rows * pitch, cx: w / 2 };
      }

      // PLCユニット列(縦カラム+上下波形破断線+アドレス円)の描画。旧要素9.5mm、新規テンプレート10mm。
      function drawPlcUnitColumn(g, element, stroke) {
        const geo = plcUnitGeometry(element);
        const { rows, w, h, pitch, cx } = geo;
        const labels = String(element.pinText || "").split(/\r?\n/);
        const wave = y => unitWavePoints(w, y).map((point, index) => (index ? "L " : "M ") + point[0] + " " + point[1]).join(" ");
        g.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: w, y1: 0, x2: w, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: wave(0), class: "symbol-line", stroke, fill: "none" }));
        g.appendChild(svgEl("path", { d: wave(h), class: "symbol-line", stroke, fill: "none" }));
        for (let i = 0; i < rows; i++) {
          const cy = pitch * i + pitch / 2;
          g.appendChild(svgEl("circle", { cx, cy, r: 3.2, class: "terminal-dot", stroke }));
          if (labels[i]) g.appendChild(textEl(labels[i], cx, cy, { fontSize: 2, anchor: "middle" }));
        }
        if (element.label) g.appendChild(textEl(element.label, 0, -2.4, { fontSize: 2.2 }));
      }

      // 選択枠・リサイズハンドル・点編集ハンドルの描画(選択中のみ)。
      function drawSelection(svg) {
        const selected = selectedElements();
        const boxes = selected.map(elementBounds).filter(Boolean);
        if (!boxes.length) return;
        boxes.forEach(box => {
          svg.appendChild(svgEl("rect", {
            x: box.x - 2,
            y: box.y - 2,
            width: box.w + 4,
            height: box.h + 4,
            class: "selection-box"
          }));
        });
        const box = boxes.length === 1 ? boxes[0] : unionBounds(boxes);
        const handles = [
          [box.x - 2, box.y - 2],
          [box.x + box.w + 2, box.y - 2],
          [box.x - 2, box.y + box.h + 2],
          [box.x + box.w + 2, box.y + box.h + 2]
        ];
        const resizeHandles = ["nw", "ne", "sw", "se"];
        const resizable = selected.length === 1 && canResizeElement(selected[0]) && !isElementLocked(selected[0]);
        handles.forEach(([x, y], index) => {
          svg.appendChild(svgEl("rect", {
            x: x - 1.5,
            y: y - 1.5,
            width: 3,
            height: 3,
            class: "selection-handle" + (resizable ? " resize-handle" : ""),
            "data-resize-handle": resizable ? resizeHandles[index] : null
          }));
        });
        if (selected.length === 1 && selected[0].points && !isElementLocked(selected[0])) {
          selected[0].points.forEach((point, index) => {
            const isStart = index === 0;
            const isEnd = index === selected[0].points.length - 1;
            svg.appendChild(svgEl("rect", {
              x: point[0] - 1.7,
              y: point[1] - 1.7,
              width: 3.4,
              height: 3.4,
              class: "point-handle",
              fill: isStart ? "#1976d2" : (isEnd ? "#e65100" : null),
              "data-point-index": index
            }));
            if (selected[0].type === "line" && (isStart || isEnd)) {
              svg.appendChild(svgEl("text", {
                x: point[0],
                y: point[1] - 3.2,
                class: "svg-text",
                "font-size": 2.4,
                "text-anchor": "middle",
                "dominant-baseline": "middle",
                fill: isStart ? "#1976d2" : "#e65100",
                "font-weight": "700",
                "pointer-events": "none",
                "data-endpoint-role": isStart ? "start" : "end"
              }, [document.createTextNode(isStart ? "始" : "終")]));
            }
          });
        }
      }

      // 角ハンドルリサイズ可否。points系/接続点/geoシンボル(固定形状)は不可。
      function canResizeElement(element) {
        return !!element && !element.points && element.type !== "junction" && !geoFor(element);
      }

      // ドラッグ範囲選択の矩形を描画。
      function drawMarquee(svg) {
        if (!dragState || dragState.mode !== "marquee") return;
        const rect = normalizedRect(dragState.start, dragState.current || dragState.start);
        if (rect.w < .5 && rect.h < .5) return;
        svg.appendChild(svgEl("rect", {
          x: rect.x,
          y: rect.y,
          width: rect.w,
          height: rect.h,
          class: "selection-box"
        }));
      }

      // 移動中の整列ガイド線を描く(画面表示のみ。印刷・出力には含まれない)。
      function drawAlignGuides(svg) {
        const guides = dragState && dragState.alignGuides;
        if (!guides || !guides.length) return;
        const pad = 6;
        guides.forEach(guide => {
          const attrs = guide.axis === "v"
            ? { x1: guide.at, y1: guide.a - pad, x2: guide.at, y2: guide.b + pad }
            : { x1: guide.a - pad, y1: guide.at, x2: guide.b + pad, y2: guide.at };
          svg.appendChild(svgEl("line", Object.assign(attrs, {
            stroke: "#e0218a", "stroke-width": .25, "stroke-dasharray": "1.6 1.1",
            opacity: .85, "pointer-events": "none"
          })));
        });
      }

      // 2点から正規化矩形{x,y,w,h}を作る。
      function normalizedRect(a, b) {
        const x1 = Math.min(a.x, b.x);
        const y1 = Math.min(a.y, b.y);
        const x2 = Math.max(a.x, b.x);
        const y2 = Math.max(a.y, b.y);
        return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
      }

      // 矩形同士の交差判定。
      function boundsIntersect(a, b) {
        return a.x <= b.x + b.w && a.x + a.w >= b.x && a.y <= b.y + b.h && a.y + a.h >= b.y;
      }

      // 複数矩形の外接矩形。
      function unionBounds(boxes) {
        const minX = Math.min(...boxes.map(box => box.x));
        const minY = Math.min(...boxes.map(box => box.y));
        const maxX = Math.max(...boxes.map(box => box.x + box.w));
        const maxY = Math.max(...boxes.map(box => box.y + box.h));
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
      }

      // 要素の外接矩形(mm)。points系は点列から、その他はx/y/w/h(既定値で補完)。
      function elementBounds(element) {
        if (element.type === "wire" || element.type === "arrow" || element.type === "line" || element.type === "mechanicalLink" || element.type === "dimension" || element.type === "polygon") {
          const points = element.points || [[0, 0], [0, 0]];
          const xs = points.map(p => p[0]);
          const ys = points.map(p => p[1]);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          return { x: minX, y: minY, w: Math.max(1, Math.max(...xs) - minX), h: Math.max(1, Math.max(...ys) - minY) };
        }
        if (element.type === "junction") {
          const r = Number(element.r || 1.45);
          return { x: element.x - r, y: element.y - r, w: r * 2, h: r * 2 };
        }
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return { x: Number(element.x || 0), y: Number(element.y || 0), w, h };
      }

      // 選択IDリストを更新(先頭が主選択selectedId)。
      function setSelection(ids) {
        selectedIds = Array.from(new Set(ids.filter(Boolean)));
        selectedId = selectedIds.length ? selectedIds[0] : null;
      }

      // 単一選択に置き換え。
      function selectSingle(id) {
        setSelection(id ? [id] : []);
      }

      // Shiftクリック用の選択トグル。
      function toggleSelection(id) {
        if (!id) return;
        if (selectedIds.includes(id)) setSelection(selectedIds.filter(item => item !== id));
        else setSelection([...selectedIds, id]);
      }

      // 選択中の要素オブジェクト配列(現在ページ内)。
      function selectedElements() {
        const page = currentPage();
        if (!page) return [];
        const ids = selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []);
        return ids.map(id => page.elements.find(element => element.id === id)).filter(Boolean);
      }

      // 主選択の要素(なければnull)。
      function selectedElement() {
        return selectedElements()[0] || null;
      }

      // 右パネル全体(ページ設定+選択パネル)を現在stateへ同期。

        setValue("designer", page.title.designer);
        setValue("drawDate", page.title.date);
        setValue("pageInstallation", page.title.installation || "");
        setValue("pageLocation", page.title.location || "");
        setValue("pageSideNote", page.title.sideNote || "");
        setValue("zoomRange", state.settings.zoom);
        setValue("gridSize", state.settings.grid);
        setValue("snapToggle", state.settings.snap ? "on" : "off");
        setValue("pageViewMode", state.settings.multiPageView ? (state.settings.multiPageDirection === "column" ? "column" : "row") : "tab");
        setValue("objectSnapToggle", state.settings.objectSnap ? "on" : "off");
        setValue("underlayOutputToggle", state.settings.outputUnderlays ? "on" : "off");
        setValue("wireNumberFormat", state.settings.wireNumberFormat || "%S-%N");
        setValue("componentTagFormat", state.settings.componentTagFormat || "%F%N");
        renderWireTypeSelect();
        setValue("currentWireType", state.settings.currentWireType || "control");
        renderLayerSelect();
        setValue("currentLayer", state.settings.currentLayer || "symbols");
        renderSelectionPanel();
      }

      // ズーム倍率を許容範囲へ丸める。
      function clampZoom(value) {
        const input = qs("#zoomRange");
        const min = Number(input?.min || .8);
        const max = Number(input?.max || 24);
        const zoom = Number(value);
        return Math.max(min, Math.min(max, Number.isFinite(zoom) ? zoom : 3.2));
      }

      // ズーム設定+再描画(save=trueで履歴にも記録)。
      function setZoom(value, save = false) {
        state.settings.zoom = clampZoom(value);

      // 標準セレクタの選択肢を構築(組込+取込済み標準パック)。
      function renderStandardSelect() {

          render();
        });
        qs("#applyAreaAttributesBtn", panel)?.addEventListener("click", applySelectedAreaAttributes);
        qs("#copyInstallLocationBtn", panel)?.addEventListener("click", copySelectedInstallLocation);
        qs("#pasteInstallLocationBtn", panel)?.addEventListener("click", pasteInstallLocationToSelection);
        attachSelectionActionButtons(panel);
        qs("#rotateLeftBtn", panel)?.addEventListener("click", () => rotateSelected(-90));
        qs("#rotateRightBtn", panel)?.addEventListener("click", () => rotateSelected(90));
      }

      // 選択パネル内の操作ボタン群(複製/削除/回転/整列/グループ等)へハンドラを付ける。
      function attachSelectionActionButtons(panel) {
        qs("#copyElementBtn", panel)?.addEventListener("click", copySelected);
        qs("#pasteElementBtn", panel)?.addEventListener("click", pasteClipboard);
        qs("#duplicateElementBtn", panel)?.addEventListener("click", duplicateSelected);
        qs("#deleteElementBtn", panel)?.addEventListener("click", deleteSelected);
        qs("#bringForwardBtn", panel)?.addEventListener("click", bringSelectedForward);
        qs("#sendBackwardBtn", panel)?.addEventListener("click", sendSelectedBackward);
        qsa("[data-align]", panel).forEach(button => {
          button.addEventListener("click", () => alignSelected(button.dataset.align));
        });
        qsa("[data-distribute]", panel).forEach(button => {
          button.addEventListener("click", () => distributeSelected(button.dataset.distribute));
        });
        qsa("[data-nudge]", panel).forEach(button => {
          button.addEventListener("click", () => {
            const [dx, dy] = button.dataset.nudge.split(",").map(Number);
            moveSelected(dx, dy);
            commitHistory("要素を移動しました。");
            render();
          });
        });
      }

      // レイヤ選択肢のHTMLを生成。
      function layerOptions(current) {
        return (state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}"${current === layer.id ? " selected" : ""}>${escapeHtml(layer.label)}</option>`).join("");
      }

      // 要素種別→日本語表示名(PALETTE定義から)。
      function paletteLabel(type) {
        if (String(type).startsWith("custom:")) {
          const id = String(type).slice("custom:".length);
          return (state.customSymbols || []).find(symbol => symbol.id === id)?.label || "ユーザー部品";
        }
        if (type === "underlayImage") return "下絵画像";
        return (PALETTE.find(item => item.type === type) || { label: type }).label;
      }

      // 位置・寸法など全要素共通の編集フィールド定義。
      function normalFields(element) {
        const anchor = primaryConnectionPoint(element) || { x: Number(element.x || 0), y: Number(element.y || 0) };
        return `
          <div class="row">
            <div><label>接続点 X mm</label><input data-bind="x" data-anchor-coordinate="true" data-kind="number" type="number" step="0.5" value="${round(anchor.x)}"></div>
            <div><label>接続点 Y mm（上が＋）</label><input data-bind="y" data-anchor-coordinate="true" data-coordinate-y="true" data-kind="number" type="number" step="0.5" value="${round(pageSize(currentPage()).h - anchor.y)}"></div>
          </div>
          <div class="row">
            <div><label>幅 mm</label><input data-bind="w" data-kind="number" type="number" step="0.5" value="${round(element.w || defaultElement(element.type).w || 20)}"></div>
            <div><label>高さ mm</label><input data-bind="h" data-kind="number" type="number" step="0.5" value="${round(element.h || defaultElement(element.type).h || 10)}"></div>
          </div>
          <label>回転 deg</label>
          <input data-bind="rotation" data-kind="number" type="number" step="90" value="${round(element.rotation || 0)}">
        `;
      }

      // 配線専用フィールド(線番/種別/ギャップ/FROM/TO等)。
      function wireFields(element) {
        const points = element.points || [[0, 0], [20, 0]];
        const options = (state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}"${element.wireType === type.id ? " selected" : ""}>${escapeHtml(type.label)}</option>`).join("");
        const pointRows = points.map((point, index) => {
          const label = index === 0 ? "始点" : (index === points.length - 1 ? "終点" : "中間" + index);
          return `
            <div class="row">
              <div><label>${label} X</label><input data-bind="p${index}x" data-kind="number" type="number" step="0.5" value="${round(point[0])}"></div>
              <div><label>${label} Y（上が＋）</label><input data-bind="p${index}y" data-coordinate-y="true" data-kind="number" type="number" step="0.5" value="${round(pageSize(currentPage()).h - point[1])}"></div>
            </div>
          `;
        }).join("");
        return `
          ${element.type === "wire" ? `<label>配線種別</label><select data-bind="wireType">${options}</select>` : ""}
          ${pointRows}
        `;
      }

      // ラベル/文字系フィールド。
      function labelFields(element) {
        if (element.type === "text") {
          return `
            <label>文字</label>
            <textarea data-bind="text">${escapeHtml(element.text || "")}</textarea>
            <label>文字サイズ mm</label>
            <input data-bind="fontSize" data-kind="number" type="number" step="0.2" value="${round(element.fontSize || 3.5)}">
            <label>横位置</label>
            <select data-bind="align">
              <option value="start"${(element.align || "start") === "start" ? " selected" : ""}>左</option>
              <option value="middle"${element.align === "middle" ? " selected" : ""}>中央</option>
              <option value="end"${element.align === "end" ? " selected" : ""}>右</option>
            </select>
            <label>縦位置</label>
            <select data-bind="verticalAlign">
              <option value="top"${(element.verticalAlign || "top") === "top" ? " selected" : ""}>上</option>
              <option value="middle"${element.verticalAlign === "middle" ? " selected" : ""}>中央</option>
              <option value="bottom"${element.verticalAlign === "bottom" ? " selected" : ""}>下</option>
            </select>
            <label><input data-bind="underline" type="checkbox" ${element.underline ? "checked" : ""} style="width:auto;min-height:auto"> 下線</label>
          `;
        }
        if (element.type === "wire") {
          const align = element.wireNoAlign || "mid";
          return `
            <label>線番</label>
            <input data-bind="wireNo" type="text" value="${escapeAttr(element.wireNo || "")}">
            <label><input data-bind="fixedWireNo" type="checkbox" ${element.fixedWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番固定</label>
            <label><input data-bind="hideWireNo" type="checkbox" ${element.hideWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番非表示</label>
            <label>線番位置</label>
            <select data-bind="wireNoAlign">
              <option value="mid"${align === "mid" ? " selected" : ""}>中央</option>
              <option value="start"${align === "start" ? " selected" : ""}>始点寄せ</option>
              <option value="end"${align === "end" ? " selected" : ""}>終点寄せ</option>
            </select>
            <div class="row">
              <div><label>線番調整X</label><input data-bind="wireNoDx" data-kind="number" type="number" step="0.5" value="${round(element.wireNoDx || 0)}"></div>
              <div><label>線番調整Y</label><input data-bind="wireNoDy" data-kind="number" type="number" step="0.5" value="${round(element.wireNoDy || 0)}"></div>
            </div>
            <div class="row">
              <div><label>FROM</label><input data-bind="fromOverride" type="text" value="${escapeAttr(element.fromOverride || "")}"></div>
              <div><label>TO</label><input data-bind="toOverride" type="text" value="${escapeAttr(element.toOverride || "")}"></div>
            </div>
          `;
        }
        if (element.type === "line") {
          return `
            <label>線ラベル</label>
            <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
            <div class="row">
              <div><label>ラベル位置 X</label><input data-bind="labelDx" data-kind="number" type="number" step="0.5" value="${round(element.labelDx || 0)}"></div>
              <div><label>ラベル位置 Y（上が＋）</label><input data-bind="labelDy" data-kind="number" type="number" step="0.5" value="${round(element.labelDy || 0)}"></div>
            </div>
            <label>ラベル文字サイズ mm</label>
            <input data-bind="labelFontSize" data-kind="number" type="number" min="0.5" step="0.2" value="${round(element.labelFontSize || 2.4)}">
            <label><input data-bind="showStartConnection" type="checkbox" ${element.showStartConnection ? "checked" : ""} style="width:auto;min-height:auto"> 始点に接続点を表示</label>
            <label><input data-bind="showEndConnection" type="checkbox" ${element.showEndConnection ? "checked" : ""} style="width:auto;min-height:auto"> 終点に接続点を表示</label>
          `;
        }
        return `
          <label>ラベル</label>
          <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
          <div class="row">
            <div><label>ラベル位置 X</label><input data-bind="labelDx" data-kind="number" type="number" step="0.5" value="${round(element.labelDx || 0)}"></div>
            <div><label>ラベル位置 Y（上が＋）</label><input data-bind="labelDy" data-kind="number" type="number" step="0.5" value="${round(element.labelDy || 0)}"></div>
          </div>
          <label>ラベル文字サイズ mm</label>
          <input data-bind="labelFontSize" data-kind="number" type="number" min="0.5" step="0.2" value="${round(element.labelFontSize || 2.2)}">
        `;
      }

      // シンボルデザインの選択肢。同一種別の別デザインで、寸法・接続点(アンカー)は共通に揃える。
      const SYMBOL_VARIANT_OPTIONS = {
        contactNO: [["standard", "縦バー（設備標準）"], ["jis", "円端子＋開き線"], ["iec", "斜め線のみ（IEC）"], ["changeover", "切替接点（c接点・1入2出）"]],
        contactNC: [["standard", "縦バー＋斜線（設備標準）"], ["jis", "円端子＋閉じ線"], ["iec", "斜め線＋止め（IEC）"]],
        timerContactNO: [["standard", "オンディレー（∩・縦バー）"], ["off", "オフディレー（∪・縦バー）"], ["iec", "オンディレー（∩・IEC斜線）"], ["iecOff", "オフディレー（∪・IEC斜線）"]],
        timerContactNC: [["standard", "オンディレー（∩・縦バー）"], ["off", "オフディレー（∪・縦バー）"], ["iec", "オンディレー（∩・IEC斜線）"], ["iecOff", "オフディレー（∪・IEC斜線）"]],
        coil: [["standard", "円（設備標準）"], ["box", "箱形"], ["ac", "交流（円＋〜）"], ["latch", "ラッチ（箱＋斜線）"], ["timer", "限時（円＋T）"], ["counter", "カウンタ（円＋C）"], ["flicker", "フリッカ（円＋F）"], ["interface", "盤間中継（小四角2連）"]],
        ground: [["standard", "斜線ハッチ（設備標準）"], ["bars", "横棒3本"], ["circle", "清浄接地（円囲み）"], ["chassis", "シャーシ接地（櫛形）"]],
        diode: [["standard", "標準"], ["led", "LED（矢印つき）"], ["zener", "ツェナー"], ["thyristor", "サイリスタ（ゲート線）"], ["bridge", "ブリッジ整流（◇4端子）"]],
        capacitor: [["standard", "標準（平行板）"], ["polarized", "有極（＋と曲板）"], ["variable", "可変（貫通矢印）"]],
        fuse: [["standard", "箱＋貫通線（設備標準）"], ["blank", "箱のみ（IEC）"], ["wave", "S字（旧JIS）"]],
        breaker: [["standard", "実測形（円＋アーク＋トリップ）"], ["arc", "円＋アーク（トリップなし）"], ["mccb", "配線用遮断器（箱形）"], ["elb", "漏電（E表示つき）"], ["iec", "×＋開き線（IEC）"]],
        pushButton: [["standard", "押しa接点（設備標準）"], ["nc", "押しb接点（NC）"], ["jis", "押しa接点（JIS C 0617）"], ["jisNc", "押しb接点（JIS C 0617）"], ["illuminated", "照光式（ランプ内蔵）"], ["palm", "パーム（キノコ・a接点）"], ["pull", "引きボタン"], ["twist", "ひねりボタン"]],
        transistor: [["npn", "NPN"], ["pnp", "PNP"]],
        meter: [["standard", "円形"], ["box", "角形"], ["double", "二重円（積算計）"], ["needle", "円＋針（アナログ）"]],
        motor: [["standard", "円（設備標準）"], ["double", "二重円（発電機等）"]],
        thermalRelay: [["standard", "○✕○（設備標準）"], ["box", "箱形（内部⊓）"]],
        inductor: [["standard", "コブ3個"], ["core", "鉄心入り（上線2本）"], ["box", "箱形（IEC）"]],
        currentTransformer: [["standard", "円（CT）"], ["zct", "二重円（ZCT）"], ["coil", "貫通線＋コブ2（旧JIS）"]],
        selectorSwitch: [["standard", "2位置（設備標準）"], ["onOff", "入・切表示付き（見本形）"], ["jis", "2位置（JIS C 0617）"], ["three", "3位置"], ["key", "鍵付き"]],
        logicGate: [["and", "AND（&）"], ["or", "OR（≥1）"], ["not", "NOT（1＋否定丸）"]],
        limitSwitch: [["standard", "箱形アクチュエータ（NO）"], ["nc", "箱形・下側（NC/オーバーラン）"], ["roller", "ローラーレバー（NO）"], ["rollerNc", "ローラーレバー（NC）"]],
        transformer: [["standard", "巻線バー＋タップ（設備標準）"], ["circles", "二巻線円形（JIS）"], ["circlesCore", "二巻線円形＋鉄心（JIS）"]],
        heater: [["standard", "箱＋斜線（設備標準）"], ["plain", "箱のみ（JIS抵抗器形）"]],
        arrester: [["standard", "箱＋矢印（設備標準）"], ["gap", "ギャップ形（対向三角）"]],
        outlet: [["standard", "半円＋差込口"], ["box", "箱形（スロット2＋接地）"]],
        pushButtonEmergency: [["standard", "キノコ＋b接点（一般形）"], ["jis", "キノコ＋b接点（JIS C 0617）"], ["multi2", "縦連結2接点（連動）"], ["multi3", "縦連結3接点（連動）"], ["jisMulti2", "JIS縦連結2接点（連動）"], ["jisMulti3", "JIS縦連結3接点（連動）"], ["facility", "キノコ＋ひねり解除環（設備標準）"], ["bar", "バー押込式"]],
        pressureSwitch: [["standard", "ダイヤフラム形（設備標準）"], ["nc", "b接点（閉じ線＋止め）"]],
        floatSwitch: [["standard", "a接点＋フロート"], ["nc", "b接点＋フロート"]],
        thermoSwitch: [["standard", "a接点（t°）"], ["nc", "b接点（t°）"]],
        flowSwitch: [["standard", "a接点＋流路パドル"], ["nc", "b接点＋流路パドル"]],
        footSwitch: [["standard", "a接点＋踏板"], ["nc", "b接点＋踏板"]],
        battery: [["standard", "2セル（長短2組）"], ["single", "単セル（長短1組）"]]
      };

      // 要素→SYMBOL_VARIANT_OPTIONSのキー解決(押しボタンは非常停止か否かで分岐)。
      function variantOptionsKeyFor(element) {
        return element.type === "pushButton"
          ? ((element.pbStyle || "momentary") === "emergency" ? "pushButtonEmergency" : "pushButton")
          : element.type;
      }

      // シンボルデザインを1要素へ適用する(寸法補正+第1ピン位置保存)。一括変更用。
      // 単一要素の切替はupdateSelectedFromInputのGEOMETRY_KEYS経路が同じ規則で処理する。
      function applySymbolVariantTo(element, value) {
        const firstPinOf = target => {
          if (target.points) return null;
          if ((target.type === "terminalStrip" || target.type === "connector") && target.connStyle !== "pair") {
            return terminalStripNodeGlobal(target, 0);
          }
          const anchors = elementConnectionAnchors(target);
          return anchors && anchors.length ? anchors[0] : null;
        };
        const pinBefore = firstPinOf(element);
        element.symbolVariant = value;
        if (!resizeGeoElementForOrientation(element)) {
          if (element.type === "terminal") resizeSingleTerminalForOrientation(element);
          if (["terminalStrip", "connector"].includes(element.type)) resizeTerminalElementForOrientation(element);
          if (element.type === "lamp") { element.w = 10; element.h = 10; }
        }
        if (pinBefore) {
          const pinAfter = firstPinOf(element);
          if (pinAfter && (Math.abs(pinAfter.x - pinBefore.x) > 0.001 || Math.abs(pinAfter.y - pinBefore.y) > 0.001)) {
            element.x = round(Number(element.x || 0) + (pinBefore.x - pinAfter.x));
            element.y = round(Number(element.y || 0) + (pinBefore.y - pinAfter.y));
          }
        }
      }

      // 選択中要素に対応する「シンボルデザイン」セレクトHTML(バリエーションが無い種別は空文字)。
      function symbolVariantSelectHtml(element) {
        const key = variantOptionsKeyFor(element);
        const current = element.symbolVariant || "standard";
        const baseOptions = SYMBOL_VARIANT_OPTIONS[key];
        if (!baseOptions) return "";
        // 自動生成した10mm形状を別形状と取り違えず、変更後も選び直せるよう専用候補を明示する。
        const templateVariantOptions = {
          transformer: ["grid10", "巻線バー＋タップ（テンプレート専用10mm）"],
          outlet: ["boxGrid10", "箱形（テンプレート専用10mm）"],
          pushButtonEmergency: ["gridMulti2", "縦連結2接点（テンプレート専用10mm）"]
        };
        const templateOption = templateVariantOptions[key];
        let options = templateOption && !baseOptions.some(([value]) => value === templateOption[0])
          ? [...baseOptions, templateOption]
          : baseOptions;
        if (!options.some(([value]) => value === current)) options = [[current, current], ...options];
        return `
            <label>シンボルデザイン（規格・様式切替）</label>
            <select data-bind="symbolVariant">
              ${options.map(([value, label]) => `<option value="${escapeAttr(value)}"${current === value ? " selected" : ""}>${escapeHtml(label)}</option>`).join("")}
            </select>`;
      }

      // 種別固有の編集フィールド(接点方向、端子台段数、表の行列、下絵クロップ等)を返す大型分岐。
      function specificFields(element) {
        if (element.type === "wire") {
          const pointCount = element.points?.length || 2;
          const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
          return `
            <div class="row" style="margin-top:8px">
              <button type="button" id="addWirePointBtn">中間点追加</button>
              <button type="button" id="removeWirePointBtn" ${pointCount <= 2 ? "disabled" : ""}>中間点削除</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="orthogonalizeWireBtn">直交整形</button>
              <button type="button" id="flipWireBendBtn" title="L字の折れ向き(縦先行/横先行)を切り替えます。作図中はShiftでも切替できます。">折れ向き反転</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="extendWireBtn">終点を延長</button>
              <button type="button" id="trimWireBtn">終点をトリム</button>
            </div>
            <button type="button" id="splitWireBtn" style="width:100%;margin-top:8px">配線を分割</button>
            <button type="button" id="toggleWireGapBtn" style="width:100%;margin-top:8px">${element.gapAtMid ? "中央ギャップ解除" : "中央ギャップ追加"}</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="addIntersectionGapsBtn">交差ギャップ追加</button>
              <button type="button" id="clearWireGapsBtn" ${gapCount ? "" : "disabled"}>全解除</button>
            </div>
            <p class="muted">ギャップ数: ${gapCount}</p>
          `;
        }
        if (element.type === "arc") {
          return `
            <div class="row" style="margin-top:8px">
              <div><label>開始角（0=右・時計回り）</label><input data-bind="a0" data-kind="number" type="number" step="5" value="${round(Number(element.a0 ?? 0))}"></div>
              <div><label>終了角（度）</label><input data-bind="a1" data-kind="number" type="number" step="5" value="${round(Number(element.a1 ?? 90))}"></div>
            </div>
            <p class="muted">幅=高さなら円弧、異なれば楕円弧になります。開始角=終了角で全周(楕円)です。弧の両端点は移動時に配線・端子・直線端点へ吸着します。</p>
          `;
        }
        if (element.type === "polygon") {
          const pointCount = element.points?.length || 0;
          return `
            <div class="row" style="margin-top:8px">
              <div><label>辺数（3〜12）</label><input id="polySides" type="number" min="3" max="12" step="1" value="${Math.max(3, Math.min(12, Number(element.sides || pointCount || 6)))}"></div>
              <div><label>外接半径 mm</label><input id="polyRadius" type="number" min="1" step="0.5" value="${round(Number(element.radius || 8))}"></div>
            </div>
            <button type="button" id="polyRegenBtn" style="width:100%;margin-top:8px">正多角形として作り直す</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="polyAddPointBtn">頂点追加</button>
              <button type="button" id="polyRemovePointBtn" ${pointCount <= 3 ? "disabled" : ""}>頂点削除</button>
            </div>
            <button type="button" id="polyExplodeBtn" style="width:100%;margin-top:8px">分解（直線にばらす）</button>
            <p class="muted">頂点数: ${pointCount}。頂点は図面上のハンドルをドラッグで自由に動かせます（端子・配線・直線の端点へ吸着）。</p>
          `;
        }
        if (element.type === "underlayImage") {
          const crop = element.cropPreset || "full";
          return `
            <label>透明度</label>
            <input data-bind="opacity" data-kind="number" type="number" min="0.05" max="1" step="0.05" value="${round(element.opacity ?? .35)}">
            <label>表示範囲</label>
            <select data-bind="cropPreset">
              <option value="full"${crop === "full" ? " selected" : ""}>全体</option>
              <option value="top"${crop === "top" ? " selected" : ""}>上半分</option>

      // 信号矢印の役割(発信/受信)表示名。

            ${attributeDisplayControls(element)}
          </details>
        `;
      }

      // 属性の図面表示ON/OFFと位置・サイズ調整UIの定義。
      function attributeDisplayControls(element) {
        const defaults = attributeDisplayDefaults(element);
        const checkboxes = ATTRIBUTE_DISPLAY_FIELDS.map(field => `<label><input data-bind="${escapeAttr(field.prop)}" type="checkbox" ${element[field.prop] ? "checked" : ""} style="width:auto;min-height:auto"> ${escapeHtml(field.label)}</label>`);
        const rows = [];
        for (let i = 0; i < checkboxes.length; i += 2) {
          rows.push(`<div class="row">${checkboxes.slice(i, i + 2).map(item => `<div>${item}</div>`).join("")}</div>`);
        }
        return `
          <label>図面表示</label>
          ${rows.join("")}
          <div class="row">
            <div><label>表示X</label><input data-bind="attrX" data-kind="number" type="number" step="0.5" value="${round(defaults.x)}"></div>
            <div><label>表示Y</label><input data-bind="attrY" data-kind="number" type="number" step="0.5" value="${round(defaults.y)}"></div>
          </div>
          <label>表示文字サイズ mm</label>
          <input data-bind="attrFontSize" data-kind="number" type="number" min="1" step="0.2" value="${round(defaults.fontSize)}">
        `;
      }

      // 属性表示の既定(表示項目・位置)。
      function attributeDisplayDefaults(element) {
        const w = Number(element.w || defaultElement(element.type).w || 18);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return {
          x: element.attrX ?? (w + 3),
          y: element.attrY ?? (h + 3),
          fontSize: element.attrFontSize || 2.2
        };
      }

      // 電気属性を持てる種別か(帳票・カタログ・タグ採番の対象判定)。
      function supportsElectricalAttributes(element) {
        if (!element) return false;
        return !["text", "wire", "line", "rect", "circle", "underlayImage", "installationBox", "locationBox", "table", "arrow", "junction", "positionMark", "polarityMark", "mechanicalLink", "dimension"].includes(element.type);
      }

      // 右パネル入力→選択要素への反映(data-bindのキーで分岐)。save=trueで履歴記録。
      function updateSelectedFromInput(input, save = true) {
        const element = selectedElement();
        if (!element) return;
        const key = input.dataset.bind;
        let value = input.type === "checkbox" ? input.checked : (input.dataset.kind === "number" ? Number(input.value) : input.value);
        if (input.dataset.coordinateY === "true") value = pageSize(currentPage()).h - value;
        const pointMatch = key.match(/^p(\d+)(x|y)$/);
        // 形状・向き・デザイン等の切替で要素寸法が変わる可能性のあるキー。
        // 切替の前後で第1接続ピンの絶対位置を保存し、寸法変更によるピンのズレを常に打ち消す。
        const GEOMETRY_KEYS = ["orientation", "pbStyle", "resistorStyle", "markStyle", "sign", "lampVariant", "terminalShape", "connStyle", "blockContact", "symbolVariant", "count", "stripStyle", "levels", "plcStyle", "rows", "pins"];
        const firstPinOf = target => {
          if (target.points) return null;
          if ((target.type === "terminalStrip" || target.type === "connector") && target.connStyle !== "pair") {
            return terminalStripNodeGlobal(target, 0);
          }
          const anchors = elementConnectionAnchors(target);
          return anchors && anchors.length ? anchors[0] : null;
        };
        const pinBefore = !pointMatch && GEOMETRY_KEYS.includes(key) ? firstPinOf(element) : null;
        if (key === "rows" && element.type === "plcBlock" && (element.plcStyle || "grid") === "unit"
          && Number(element.pitch || 9.5) >= TEMPLATE_CIRCUIT_PITCH) {
          value = Math.max(1, Math.min(TEMPLATE_UNIT_MAX_ROWS, Math.floor(Number(value || 1))));
          input.value = String(value);
        }
        if (input.dataset.anchorCoordinate === "true" && (key === "x" || key === "y")) {
          const anchor = firstPinOf(element);
          if (anchor) {
            const current = key === "x" ? anchor.x : anchor.y;
            element[key] = round(Number(element[key] || 0) + value - current);
          } else {
            element[key] = value;
          }
        } else if (pointMatch && element.points?.[Number(pointMatch[1])]) {
          element.points[Number(pointMatch[1])][pointMatch[2] === "x" ? 0 : 1] = value;
        } else {
          element[key] = value;
          if (key === "tag" && supportsElectricalAttributes(element) && !element.label) element.label = value;
          if (key === "tag" && value) {
            const dup = state.pages.some(page => page.elements.some(item =>
              item.id !== element.id && item.type === element.type && componentTag(item) === value));
            if (dup) setStatus("注意: 同種部品でタグ「" + value + "」が重複しています。");
          }
          if (["orientation", "count", "stripStyle", "levels"].includes(key) && ["terminalStrip", "connector"].includes(element.type) && element.connStyle !== "pair") resizeTerminalElementForOrientation(element);
          if (key === "orientation" && element.type === "terminal" && !resizeGeoElementForOrientation(element)) resizeSingleTerminalForOrientation(element);
          if (key === "orientation" && ["contactNO", "contactNC", "pushButton", "selectorSwitch", "limitSwitch", "pressureSwitch", "thermalRelay", "thermalElement", "contactBlock"].includes(element.type) && !resizeGeoElementForOrientation(element)) resizeContactElementForOrientation(element);
          if (key === "orientation" && ["fuse", "breaker", "resistor"].includes(element.type) && !resizeGeoElementForOrientation(element)) resizeProtectiveElementForOrientation(element);
          if (["pbStyle", "resistorStyle", "markStyle", "sign", "lampVariant", "terminalShape", "connStyle", "blockContact", "symbolVariant"].includes(key)) {
            if (!resizeGeoElementForOrientation(element)) {
              if (element.type === "terminal") resizeSingleTerminalForOrientation(element);
              if (["terminalStrip", "connector"].includes(element.type)) resizeTerminalElementForOrientation(element);
              if (element.type === "lamp") { element.w = 10; element.h = 10; }
            }
          }
          if (element.type === "plcBlock" && ["plcStyle", "rows"].includes(key)) {
            if ((element.plcStyle || "grid") === "unit") {
              element.w = 10;
              element.h = Math.max(1, Number(element.rows || 8)) * Math.max(2.5, Number(element.pitch || 9.5));
            } else if (key === "plcStyle") {
              element.w = 50;
              element.h = Math.max(2, Number(element.rows || 8)) * 6 + 10;
            }
          }
          // 第1ピンを切替前の位置へ戻す(配線・グリッドとの整合を維持)
          if (pinBefore) {
            const pinAfter = firstPinOf(element);
            if (pinAfter && (Math.abs(pinAfter.x - pinBefore.x) > 0.001 || Math.abs(pinAfter.y - pinBefore.y) > 0.001)) {
              element.x = round(Number(element.x || 0) + (pinBefore.x - pinAfter.x));
              element.y = round(Number(element.y || 0) + (pinBefore.y - pinAfter.y));
            }
          }
        }
        if (save) commitHistory("要素を更新しました。");
        render(save ? {} : { light: true });
      }

      // 接点の向き変更時にw/hを入れ替える(旧経路互換)。
      function resizeContactElementForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 10;
          element.h = element.type === "pushButton" ? 18 : 16;
          return;
        }
        element.w = 14;
        element.h = element.type === "pushButton" ? 12 : 10;
      }

      // 保護素子(ヒューズ等)の向き変更時の寸法調整。
      function resizeProtectiveElementForOrientation(element) {
        if (element.type === "fuse") {
          element.w = element.orientation === "vertical" ? 4.5 : 12;
          element.h = element.orientation === "vertical" ? 12 : 4.5;
          return;
        }
        if (element.type === "breaker") {
          element.w = element.orientation === "vertical" ? 7 : 12;
          element.h = element.orientation === "vertical" ? 12 : 7;
        }
      }

      // 端子台の向き変更時の寸法調整。
      function resizeTerminalElementForOrientation(element) {
        const count = Math.max(1, Number(element.count || 8));
        if (element.type === "terminalStrip" && element.stripStyle === "unit" && element.orientation === "vertical") {
          element.w = Number(element.levels) === 2 ? 20 : 10;
          element.h = count * Math.max(2.5, Number(element.pitch || 9.5));
          return;
        }
        const pitch = element.type === "connector" ? 7 : 8;
        if (element.orientation === "vertical") {
          element.w = element.type === "connector" ? 10 : 12;
          element.h = count * pitch;
        } else {
          element.w = count * pitch;
          element.h = element.type === "connector" ? 10 : 12;
        }
      }

      // 単独端子の向き変更時の寸法調整。
      function resizeSingleTerminalForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 6;
          element.h = 10;
          return;
        }
        element.w = 10;
        element.h = 6;
      }

      // HTML特殊文字のエスケープ(ダイアログ組み立て用)。
      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }

      // 属性値用エスケープ(escapeHtml+引用符)。
      function escapeAttr(text) {
        return escapeHtml(text).replace(/\n/g, " ");
      }

      // mm座標を0.01mm精度へ丸める(座標比較の安定化)。
      function round(value) {
        return Math.round(Number(value || 0) * 100) / 100;
      }

      // 正多角形の頂点列(中心cx,cy・外接半径r・辺数n。頂点1つを真上に置く)。
      function regularPolygonPoints(cx, cy, r, n) {
        const count = Math.max(3, Math.min(12, Math.floor(Number(n) || 6)));
        return Array.from({ length: count }, (_, index) => {
          const angle = (-90 + 360 * index / count) * Math.PI / 180;
          return [round(cx + r * Math.cos(angle)), round(cy + r * Math.sin(angle))];
        });
      }

      // 種別ごとの新規要素の既定値(寸法・ラベル・レイヤ)。新種別はここへ追加する。
      function defaultElement(type, x = 30, y = 30) {
        // 別名: パレットの「非常停止ボタン」は押しボタンの非常停止スタイルとして生成する。
        if (type === "pushButtonEmergency") {
          return { ...defaultElement("pushButton", x, y), pbStyle: "emergency", label: "PBE" };
        }
        // 別名: 楕円=幅高さ違いの円、楕円弧=幅高さ違いの円弧として生成する(機能は同一)。
        if (type === "ellipse") {
          return { ...defaultElement("circle", x, y), w: 24, h: 14 };
        }
        if (type === "ellipseArc") {
          return { ...defaultElement("arc", x, y), w: 24, h: 12 };
        }
        const base = { id: uid("el"), type, x, y, rotation: 0, stroke: state.settings.stroke, layer: defaultLayerFor(type) };
        const defaults = {
          text: { ...base, w: 40, h: 8, text: "文字", fontSize: 3.5 },
          line: { id: uid("el"), type: "line", points: [[x, y], [x + 30, y]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: defaultLayerFor("line") },
          mechanicalLink: { id: uid("el"), type: "mechanicalLink", points: [[x, y], [x, y + 30]], label: "", strokeWidth: .26, dash: "1.2 1.4", stroke: state.settings.stroke, layer: "symbols" },
          rect: { ...base, w: 34, h: 22, label: "" },
          circle: { ...base, w: 22, h: 22, label: "" },
          arc: { ...base, w: 16, h: 16, a0: 180, a1: 270, label: "" },
          polygon: { id: uid("el"), type: "polygon", points: regularPolygonPoints(x, y, 8, 6), sides: 6, radius: 8, label: "", strokeWidth: .32, stroke: state.settings.stroke, layer: defaultLayerFor("polygon") },
          cloud: { ...base, w: 40, h: 20, label: "" },
          revisionMark: { ...base, w: 6, h: 5.4, label: String((state.project?.revisions || []).slice(-1)[0]?.rev || "1"), layer: "notes" },
          underlayImage: { ...base, w: 160, h: 110, label: "下絵", imageData: "", opacity: .35, cropPreset: "full", locked: true, layer: "layout" },
          installationBox: { ...base, w: 120, h: 80, label: "INST1", dash: "4 2", layer: "layout" },
          locationBox: { ...base, w: 120, h: 80, label: "LOC1", dash: "4 2", layer: "layout" },
          terminal: { ...base, w: 1.8, h: 1.8, label: "1", orientation: "horizontal", terminalShape: "circle" },
          terminalStrip: { ...base, w: 10, h: 152, count: 16, start: 1, prefix: "", orientation: "vertical", terminalShape: "circle", stripStyle: "unit", label: "TB1", jumpers: "" },
          contactNO: { ...base, w: 10, h: 4.4, label: "NO", orientation: "horizontal", refNo: "" },
          contactNC: { ...base, w: 10, h: 4.4, label: "NC", orientation: "horizontal", refNo: "" },
          contactBlock: { ...base, w: 15, h: 8, label: "CR", orientation: "horizontal", blockContact: "NO", blockFrame: "solid", refNo: "" },
          pushButton: { ...base, w: 10, h: 5, label: "PB", orientation: "horizontal", pbStyle: "momentary" },
          selectorSwitch: { ...base, w: 10, h: 5, label: "SS", orientation: "horizontal" },
          limitSwitch: { ...base, w: 10, h: 4.6, label: "LS", orientation: "horizontal" },
          pressureSwitch: { ...base, w: 10, h: 6, label: "PS", orientation: "horizontal" },
          coil: { ...base, w: 10, h: 4.4, label: "CR" },
          fuse: { ...base, w: 10, h: 4.4, label: "F", orientation: "horizontal" },
          breaker: { ...base, w: 12.5, h: 5, label: "CB", orientation: "horizontal", refNo: "" },
          lamp: { ...base, w: 10, h: 4.4, label: "PL", lampVariant: "pilot", lampColor: "W" },
