        frame.appendChild(textEl("図番:", 55, size.h - 20, { fontSize: 1.9 }));
        frame.appendChild(textEl("出力日: " + (page.title.date || ""), 95, size.h - 20, { fontSize: 1.9 }));
        frame.appendChild(textEl("更新日: " + (state.project.date || ""), 125, size.h - 20, { fontSize: 1.9 }));
        if (state.project.designer) frame.appendChild(textEl(state.project.designer, R, size.h - 20, { fontSize: 2.1, anchor: "end" }));
        if (page.title.sideNote) {
          frame.appendChild(textEl(page.title.sideNote, 16.5, size.h / 2, {
            fontSize: 2.2,
            anchor: "middle",
            transform: "rotate(-90 16.5 " + (size.h / 2) + ")"
          }));
        }
        fillLadderXrefTable(frame, page, size);
        fillLadderDeviceTable(frame, page, size);
      }

      // 設備標準図枠の左下クロス参照表に載せるコイル列(タグ+接点アドレス一覧)を集計。
      function pageCoilXrefColumns(page) {
        const data = crossRefData();
        const cols = [];
        page.elements.forEach(element => {
          if (!coilTypes().has(element.type)) return;
          const tag = componentTag(element);
          if (!tag) return;
          cols.push({ tag, refs: data.contacts.get(tag) || [] });
        });
        return cols.slice(0, 13);
      }

      // 設備標準図枠: 左下クロス参照表へコイル→接点位置を記入(b接点は下線)。
      function fillLadderXrefTable(frame, page, size) {
        const L = 19;
        const xrefR = 105.8;
        const B = size.h - 24;
        const tblTop = B - 49;
        const colW = (xrefR - L) / 13;
        pageCoilXrefColumns(page).forEach((col, i) => {
          const x = L + colW * i;
          frame.appendChild(textEl(col.tag, x + 0.6, tblTop + 2.5, { fontSize: 1.8 }));
          col.refs.slice(0, 12).forEach((ref, j) => {
            const y = tblTop + 7.5 + j * 2.6;
            frame.appendChild(textEl(ref.address, x + colW - 0.8, y, { fontSize: 1.7, anchor: "end" }));
            if (ref.closed) {
              const w = String(ref.address).length * 1.06;
              frame.appendChild(svgEl("line", { x1: x + colW - 0.8 - w, y1: y + 1.1, x2: x + colW - 0.8, y2: y + 1.1, class: "frame-light" }));
            }
          });
        });
      }

      // 設備標準図枠の右下機器符号表に載せる行(タグ一覧)を集計。
      function pageDeviceTableRows(page) {
        const data = crossRefData();
        const seen = new Set();
        const rows = [];
        page.elements.forEach(element => {
          const tag = componentTag(element);
          if (!tag || seen.has(tag)) return;
          if (!coilTypes().has(element.type) && !contactChildTypes().has(element.type)) return;
          seen.add(tag);
          const coil = data.coils.get(tag);
          rows.push({
            tag,
            desc: String(element.description || coil?.element.description || "").split(/\r?\n/)[0],
            page: coil && coil.page.id !== page.id ? String(pageSheetNumber(coil.page)) : ""
          });
        });
        return rows.slice(0, 20);
      }

      // 設備標準図枠: 右下機器符号表へ機器タグを自動記入。
      function fillLadderDeviceTable(frame, page, size) {
        const xrefR = 105.8;
        const R = size.w - 19;
        const B = size.h - 24;
        const devTop = B - 49;
        const gw = (R - xrefR) / 2;
        const rowH = (28.5 - 2.6) / 10;
        pageDeviceTableRows(page).forEach((row, index) => {
          const gi = Math.floor(index / 10);
          const gx = xrefR + gi * gw;
          const y = devTop + 2.6 + (index % 10) * rowH + rowH * 0.7;
          frame.appendChild(textEl(row.tag, gx + 0.6, y, { fontSize: 1.7 }));
          if (row.desc) frame.appendChild(textEl(row.desc, gx + 11.6, y, { fontSize: 1.7 }));
          if (row.page) frame.appendChild(textEl(row.page, gx + gw - 2.25, y, { fontSize: 1.7, anchor: "middle" }));
        });
      }

      // 等分/指定比率の横罫線群を描画(表題欄・表用の下請け)。
      function drawRows(parent, x, y, w, h, rowHeights) {
        let yy = y;
        rowHeights.slice(0, -1).forEach(row => {
          yy += row;
          parent.appendChild(svgEl("line", { x1: x, y1: yy, x2: x + w, y2: yy, class: "frame-light" }));
        });
      }

      // 等分/指定比率の縦罫線群を描画。
      function drawCols(parent, x, y, w, h, colWidths) {
        let xx = x;
        colWidths.slice(0, -1).forEach(col => {
          xx += col;
          parent.appendChild(svgEl("line", { x1: xx, y1: y, x2: xx, y2: y + h, class: "frame-light" }));
        });
      }

      // 要素1個の描画ディスパッチャ。まずdrawGeoSymbol(SYMBOL_GEO定義)を試し、処理されなければ
      // 種別ごとのdrawXxx()へ振り分ける。g要素にdata-id属性を付け、クリック判定にも使う。
      function drawElement(svg, element) {
        const g = svgEl("g", {
          class: "element",
          "data-id": element.id,
          "data-type": element.type,
          cursor: "move",
          "pointer-events": element.type === "underlayImage" && element.locked ? "none" : null
        });
        if (element.type !== "wire" && element.type !== "arrow" && element.type !== "dimension") {
          g.setAttribute("transform", "translate(" + (element.x || 0) + " " + (element.y || 0) + ") rotate(" + (element.rotation || 0) + ")");
        }
        const stroke = element.type === "wire" ? wireStyle(element).color : (element.stroke || state.settings.stroke);
        // クリック当たり判定を広げる不可視ヒット領域。細線シンボルでも掴みやすくする。
        // 枠系(設備枠/矩形等)は内部の部品を選べるように縁のみ、他は外接矩形全体を対象にする。
        if (element.type !== "underlayImage") {
          if (element.points && element.points.length > 1) {
            g.appendChild(svgEl("path", {
              // 多角形は閉パスでヒット(縁のみ。内側クリックで下の要素を選べる)
              d: element.type === "polygon" ? polygonPath(element.points) : wirePath(element.points, element.orthoFlip),
              fill: "none", stroke: "#000", "stroke-opacity": 0,
              "stroke-width": 2.4, "pointer-events": "stroke"
            }));
          } else if (!element.points) {
            const hitW = Number(element.w || defaultElement(element.type).w || 4);
            const hitH = Number(element.h || defaultElement(element.type).h || 4);
            if (["installationBox", "locationBox", "rect", "cloud"].includes(element.type)) {
              g.appendChild(svgEl("rect", {
                x: 0, y: 0, width: hitW, height: hitH,
                fill: "none", stroke: "#000", "stroke-opacity": 0,
                "stroke-width": 2.4, "pointer-events": "stroke"
              }));
            } else if (element.type === "circle") {
              g.appendChild(svgEl("ellipse", {
                cx: hitW / 2, cy: hitH / 2, rx: hitW / 2, ry: hitH / 2,
                fill: "none", stroke: "#000", "stroke-opacity": 0,
                "stroke-width": 2.4, "pointer-events": "stroke"
              }));
            } else if (element.type === "arc") {
              // 弧の曲線に沿ったヒット(外接箱全体だと下の要素が選べないため)
              g.appendChild(svgEl("path", {
                d: ellipseArcPath(hitW / 2, hitH / 2, hitW / 2, hitH / 2, Number(element.a0 ?? 0), Number(element.a1 ?? 90)),
                fill: "none", stroke: "#000", "stroke-opacity": 0,
                "stroke-width": 2.4, "pointer-events": "stroke"
              }));
            } else {
              g.appendChild(svgEl("rect", {
                x: -0.8, y: -0.8, width: hitW + 1.6, height: hitH + 1.6,
                fill: "none", stroke: "none", "pointer-events": "all"
              }));
            }
          }
        }
        if (drawGeoSymbol(g, element, stroke)) {
          applyLabelPresentation(g, element);
          drawVisibleAttributes(g, element);
          svg.appendChild(g);
          return;
        }
        if (element.type === "underlayImage") drawUnderlayImage(g, element);
        if (element.type === "text") drawText(g, element);
        if (element.type === "wire") drawWire(g, element, stroke);
        if (element.type === "line" || element.type === "mechanicalLink") drawLineElement(g, element, stroke);
        if (element.type === "rect") drawRectElement(g, element, stroke);
        if (element.type === "circle") drawCircleElement(g, element, stroke);
        if (element.type === "arc") drawArcElement(g, element, stroke);
        if (element.type === "polygon") drawPolygonElement(g, element, stroke);
        if (element.type === "cloud") drawCloudElement(g, element, stroke);
        if (element.type === "installationBox" || element.type === "locationBox") drawAreaBox(g, element, stroke);
        if (element.type === "terminal") drawTerminal(g, element, stroke);
        if (element.type === "terminalStrip") drawTerminalStrip(g, element, stroke);
        if (element.type === "contactNO") drawContact(g, element, false, stroke);
        if (element.type === "contactNC") drawContact(g, element, true, stroke);
        if (element.type === "contactBlock") drawContactBlock(g, element, stroke);
        if (element.type === "pushButton") drawPushButton(g, element, stroke);
        if (element.type === "selectorSwitch") drawSelectorSwitch(g, element, stroke);
        if (element.type === "limitSwitch") drawLimitSwitch(g, element, stroke);
        if (element.type === "coil") drawCoil(g, element, stroke);
        if (element.type === "fuse") drawFuse(g, element, stroke);
        if (element.type === "breaker") drawBreaker(g, element, stroke);
        if (element.type === "lamp") drawLamp(g, element, stroke);
        if (element.type === "buzzer") drawBuzzer(g, element, stroke);
        if (element.type === "solenoidValve") drawSolenoidValve(g, element, stroke);
        if (element.type === "sensor") drawSensor(g, element, stroke);
        if (element.type === "powerSupply") drawPowerSupply(g, element, stroke);
        if (element.type === "transformer") drawTransformer(g, element, stroke);
        if (element.type === "ground") drawGround(g, element, stroke);
        if (element.type === "motor") drawMotor(g, element, stroke);
        if (element.type === "fan") drawFan(g, element, stroke);
        if (element.type === "resistor") drawResistor(g, element, stroke);
        if (element.type === "capacitor") drawCapacitor(g, element, stroke);
        if (element.type === "diode") drawDiode(g, element, stroke);
        if (element.type === "thermalRelay") drawThermalRelay(g, element, stroke);
        if (element.type === "deviceBox") drawDeviceBox(g, element, stroke);
        if (element.type === "plcBlock") drawPlcBlock(g, element, stroke);
        if (element.type === "connector") drawConnector(g, element, stroke);
        if (element.type === "cableMarker") drawCableMarker(g, element, stroke);
        if (element.type === "cableBundle") drawCableBundle(g, element, stroke);
        if (element.type === "terminalBox") drawTerminalBox(g, element, stroke);
        if (element.type === "table") drawTable(g, element, stroke);
        if (element.type === "arrow") drawArrow(g, element, stroke);
        if (element.type === "dimension") drawDimension(g, element, stroke);
        if (element.type === "junction") drawJunction(g, element, stroke);
        applyLabelPresentation(g, element);
        drawVisibleAttributes(g, element);
        svg.appendChild(g);
      }

      // シンボル固有の既定ラベル位置を基準に、利用者指定の移動量と文字サイズを適用する。
      function applyLabelPresentation(g, element) {
        if (!element?.label || element.type === "text" || element.type === "wire" || element.type === "line") return;
        const matches = Array.from(g.querySelectorAll("text"))
          .filter(node => node.textContent === String(element.label));
        if (!matches.length) return;
        const dx = Number(element.labelDx || 0);
        const dy = -Number(element.labelDy || 0);
        const fontSize = Number(element.labelFontSize || 0);
        matches.forEach(node => {
          if (dx || dy) {
            const x = Number(node.getAttribute("x") || 0);
            const y = Number(node.getAttribute("y") || 0);
            node.setAttribute("x", String(round(x + dx)));
            node.setAttribute("y", String(round(y + dy)));
            node.querySelectorAll("tspan").forEach(tspan => {
              if (tspan.hasAttribute("x")) tspan.setAttribute("x", String(round(Number(tspan.getAttribute("x") || 0) + dx)));
            });
          }
          if (fontSize > 0) node.setAttribute("font-size", String(fontSize));
        });
      }

      // 電気属性(タグ/説明など)のうち表示ONの行を要素脇へ描画。位置はattrX/attrYで調整可。
      function drawVisibleAttributes(g, element) {
        if (!supportsElectricalAttributes(element)) return;
        const lines = visibleAttributeLines(element);
        if (!lines.length) return;
        const w = Number(element.w || defaultElement(element.type).w || 18);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        const fontSize = Number(element.attrFontSize || 2.2);
        const x = Number(element.attrX ?? (w + 3));
        const y = Number(element.attrY ?? (h + 3));
        lines.forEach((line, index) => {
          g.appendChild(textEl(line, x, y + index * fontSize * 1.35, { fontSize }));
        });
      }

      // 表示対象の属性行(文字列配列)を組み立てる。
      function visibleAttributeLines(element) {
        return ATTRIBUTE_DISPLAY_FIELDS
          .filter(field => element[field.prop])
          .map(field => {
            const value = electricalAttributeValue(element, field.key);
            return value ? field.prefix + ": " + value : "";
          })
          .filter(Boolean);
      }

      // 属性キー→表示文字列(タグはcomponentTag()経由)。
      function electricalAttributeValue(element, key) {
        if (key === "tag") return componentTag(element);
        return element[key] || "";
      }

      // 文字要素の描画(複数行・回転・下線対応)。
      function drawText(g, element) {
        const align = element.align || "start";
        const verticalAlign = element.verticalAlign || "top";
        const x = align === "middle" ? Number(element.w || 40) / 2 : (align === "end" ? Number(element.w || 40) : 0);
        const lineCount = Math.max(1, String(element.text || "").split("\n").length);
        const textHeight = (lineCount - 1) * (element.fontSize || 3.5) * 1.25;
        const y = verticalAlign === "middle"
          ? (Number(element.h || 8) - textHeight) / 2
          : (verticalAlign === "bottom" ? Number(element.h || 8) - textHeight : 0);
        multilineText(g, element.text || "文字", x, y, (element.fontSize || 3.5) * 1.25, {
          fontSize: element.fontSize || 3.5,
          anchor: align
        });
        if (element.underline) {
          const size = Number(element.fontSize || 3.5);
          String(element.text || "").split("\n").forEach((line, index) => {
            if (!line.trim()) return;
            const w = line.length * size * 0.62;
            const lineY = y + index * size * 1.25 + size * 0.72;
            const x0 = align === "middle" ? x - w / 2 : (align === "end" ? x - w : x);
            g.appendChild(svgEl("line", { x1: x0, y1: lineY, x2: x0 + w, y2: lineY, class: "symbol-line", stroke: element.stroke || state.settings.stroke }));
          });
        }
      }

      // 下絵画像の描画(透明度・クロップ表示・ロック時は淡色枠)。
      function drawUnderlayImage(g, element) {
        const w = Number(element.w || 100);
        const h = Number(element.h || 70);
        if (element.imageData) {
          const crop = underlayCropRect(element.cropPreset);
          const attrs = {
            href: element.imageData,
            x: crop.x ? -crop.x * w / crop.w : 0,
            y: crop.y ? -crop.y * h / crop.h : 0,
            width: w / crop.w,
            height: h / crop.h,
            opacity: Number(element.opacity ?? .35),
            preserveAspectRatio: "none"
          };
          if (crop.w < 1 || crop.h < 1) {
            const clipId = uid("clip");
            g.appendChild(svgEl("clipPath", { id: clipId }, [svgEl("rect", { x: 0, y: 0, width: w, height: h })]));
            attrs["clip-path"] = "url(#" + clipId + ")";
          }
          g.appendChild(svgEl("image", {
            ...attrs
          }));
        } else {
          g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-line", stroke: "#9aa4b2", fill: "#f8fafc" }));
          g.appendChild(textEl("下絵画像なし", w / 2, h / 2, { fontSize: 3, anchor: "middle" }));
        }
      }

      // 下絵クロッププリセット(全体/上下左右半分)→表示領域の対応。
      function underlayCropRect(preset) {
        const map = {
          top: { x: 0, y: 0, w: 1, h: .5 },
          bottom: { x: 0, y: .5, w: 1, h: .5 },
          left: { x: 0, y: 0, w: .5, h: 1 },
          right: { x: .5, y: 0, w: .5, h: 1 }
        };
        return map[preset] || { x: 0, y: 0, w: 1, h: 1 };
      }

      // 配線の描画。折れ点列をポリラインで結び、線番文字(位置=wireNoAnchorPoint)とギャップを描く。
      function drawWire(g, element, stroke) {
        const points = element.points || [[0, 0], [20, 0]];
        const path = wirePath(points, element.orthoFlip);
        const style = wireStyle(element);
        g.appendChild(svgEl("path", {
          d: path,
          class: "wire-line",
          stroke: style.color,
          "stroke-width": style.width,
          "stroke-dasharray": style.dash || null
        }));
        wireGapMarkers(element).forEach(gap => drawWireGap(g, gap));
        if (element.wireNo && !element.hideWireNo) {
          const originalPos = wireNoAnchorPoint(element);
          const pos = avoidWireNumberCollision(element, originalPos);
          if (pos.leader) {
            g.appendChild(svgEl("line", {
              x1: originalPos.x, y1: originalPos.y + 1,
              x2: pos.x, y2: pos.y + 1,
              class: "symbol-line", stroke: style.color, "stroke-width": .22
            }));
          }
          g.appendChild(textEl(element.wireNo, pos.x, pos.y, { fontSize: 2.3, anchor: pos.anchor }));
          if (element.fixedWireNo) {
            g.appendChild(textEl("FIX", pos.x, pos.y + 4, { fontSize: 1.6, anchor: pos.anchor }));
          }
        }
      }

      // 配線の交差ギャップ(ホップ)位置一覧を返す(gapAtMid/gapPoints)。
      function wireGapMarkers(element) {
        const markers = [];
        const seen = new Set();
        const addGap = (x, y, segment) => {
          if (!segment) return;
          const key = pointKey(x, y);
          if (seen.has(key)) return;
          seen.add(key);
          markers.push({ x: round(x), y: round(y), segment });
        };
        if (element.gapAtMid) {
          const points = element.points || [[0, 0], [20, 0]];
          const segment = wireMidSegment(points, element.orthoFlip);
          const mid = pathMid([segment[0], segment[1]], [segment[2], segment[3]]);
          addGap(mid.x, mid.y, segment);
        }
        (element.gapPoints || []).forEach(point => {
          const x = Number(point[0]);
          const y = Number(point[1]);
          const segment = wireSegments(element).find(item => pointOnSegment(x, y, item));
          addGap(x, y, segment);
        });
        return markers;
      }

      // 交差ギャップ1個(半円ホップ)を描画。
      function drawWireGap(g, gap) {
        const segment = gap.segment;
        const horizontal = Math.abs(segment[1] - segment[3]) <= Math.abs(segment[0] - segment[2]);
        g.appendChild(svgEl("rect", {
          x: gap.x - (horizontal ? 3.2 : 1.5),
          y: gap.y - (horizontal ? 1.5 : 3.2),
          width: horizontal ? 6.4 : 3,
          height: horizontal ? 3 : 6.4,
          fill: "#fff",
          stroke: "none"
        }));
      }

      // 矩形要素の描画(塗り/破線/ラベル対応)。
      function drawRectElement(g, element, stroke) {
        const w = Number(element.w || 30);
        const h = Number(element.h || 18);
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: w,
          height: h,
          class: "symbol-line",
          stroke,
          fill: element.fill || "none",
          "stroke-dasharray": element.dash || null
        }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, h / 2, { fontSize: 2.6, anchor: "middle" }));
      }

      // 雲マーク(改訂範囲)の縁飾り: 各辺を約6mmピッチの外向き半円弧に分割する
      function cloudScallopArcs(w, h) {
        const arcs = [];
        const edge = (x0, y0, x1, y1, a0, a1) => {
          const len = Math.hypot(x1 - x0, y1 - y0);
          const n = Math.max(1, Math.round(len / 6));
          const dx = (x1 - x0) / n;
          const dy = (y1 - y0) / n;
          const r = Math.hypot(dx, dy) / 2;
          for (let i = 0; i < n; i++) {
            arcs.push({ cx: x0 + dx * (i + 0.5), cy: y0 + dy * (i + 0.5), r, a0, a1 });
          }
        };
        edge(0, 0, w, 0, 180, 360);
        edge(w, 0, w, h, 270, 450);
        edge(w, h, 0, h, 0, 180);
        edge(0, h, 0, 0, 90, 270);
        return arcs;
      }

      // 雲マーク(改訂範囲)の描画。cloudScallopArcs()の半円弧列をパスとして並べる。
      function drawCloudElement(g, element, stroke) {
        const w = Number(element.w || 40);
        const h = Number(element.h || 20);
        cloudScallopArcs(w, h).forEach(arc => {
          g.appendChild(svgEl("path", {
            d: svgArcPath(arc.cx, arc.cy, arc.r, arc.a0, arc.a1),
            class: "symbol-line",
            stroke,
            fill: "none"
          }));
        });
        if (element.label) g.appendChild(textEl(element.label, w / 2, h / 2, { fontSize: 2.6, anchor: "middle" }));
      }

      // 直線の波形(破断線)表示用の制御点列を生成(2次ベジェの連なり)。
      function waveLinePoints(a, b) {
        const dx = b[0] - a[0];
        const dy = b[1] - a[1];
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len;
        const ny = dx / len;
        const amp = 2.2;
        const n = Math.max(1, Math.round(len / 7));
        const quads = [];
        for (let i = 0; i < n; i++) {
          const t0 = i / n;
          const t1 = (i + 1) / n;
          const sign = i % 2 ? -1 : 1;
          quads.push({
            from: [a[0] + dx * t0, a[1] + dy * t0],
            ctrl: [a[0] + dx * (t0 + t1) / 2 + nx * amp * sign, a[1] + dy * (t0 + t1) / 2 + ny * amp * sign],
            to: [a[0] + dx * t1, a[1] + dy * t1]
          });
        }
        return quads;
      }

      // 直線要素の描画(線種プリセット/波形/太さ対応)。
      function drawLineElement(g, element, stroke) {
        const points = element.points || [[0, 0], [20, 0]];
        const a = points[0];
        const b = points[points.length - 1];
        if (element.lineKind === "wave") {
          const d = "M " + a[0] + " " + a[1] + waveLinePoints(a, b)
            .map(q => " Q " + round(q.ctrl[0]) + " " + round(q.ctrl[1]) + " " + round(q.to[0]) + " " + round(q.to[1]))
            .join("");
          g.appendChild(svgEl("path", {
            d,
            class: "symbol-line",
            stroke,
            "stroke-width": element.strokeWidth || .32,
            fill: "none"
          }));
        } else {
        g.appendChild(svgEl("line", {
          x1: a[0],
          y1: a[1],
          x2: b[0],
          y2: b[1],
          class: "symbol-line",
          stroke,
          "stroke-width": element.strokeWidth || .32,
          "stroke-dasharray": element.dash || null
        }));
        }
        if (element.showStartConnection) {
          g.appendChild(svgEl("circle", { cx: a[0], cy: a[1], r: 0.75, fill: stroke, stroke: "none" }));
        }
        if (element.showEndConnection) {
          g.appendChild(svgEl("circle", { cx: b[0], cy: b[1], r: 0.75, fill: stroke, stroke: "none" }));
        }
        if (element.label) {
          const mid = pathMid(a, b);
          g.appendChild(textEl(element.label, mid.x + Number(element.labelDx || 0), mid.y - 3 - Number(element.labelDy || 0), { fontSize: Number(element.labelFontSize || 2.4), anchor: "middle" }));
        }
        if ((element.signalRole || "reference") !== "reference") {
          g.appendChild(textEl(signalRoleLabel(element.signalRole), b[0], b[1] + 4.5, { fontSize: 2.1, anchor: "middle" }));
        }
      }

      // 円・楕円要素の描画(w≠hで楕円、塗り対応)。
      function drawCircleElement(g, element, stroke) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        g.appendChild(svgEl("ellipse", {
          cx: w / 2,
          cy: h / 2,
          rx: w / 2,
          ry: h / 2,
          class: "symbol-line",
          stroke,
          fill: element.fill || "none"
        }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, h / 2, { fontSize: 2.6, anchor: "middle" }));
      }

      // 楕円弧パス(中心cx,cy・半径rx,ry・角度a0→a1度)。角度は0=右・時計回り(svgArcPathと同規約)。
      // 円弧はrx==ryで使う。a0==a1(または360以上の掃引)は全周として2本の半弧で描く。
      function ellipseArcPath(cx, cy, rx, ry, a0, a1) {
        const rad = d => d * Math.PI / 180;
        const px = a => round(cx + rx * Math.cos(rad(a)));
        const py = a => round(cy + ry * Math.sin(rad(a)));
        let sweep = ((a1 - a0) % 360 + 360) % 360;
        if (sweep < .01) sweep = 360;
        if (sweep >= 360) {
          const mid = a0 + 180;
          return "M " + px(a0) + " " + py(a0)
            + " A " + rx + " " + ry + " 0 0 1 " + px(mid) + " " + py(mid)
            + " A " + rx + " " + ry + " 0 0 1 " + px(a0) + " " + py(a0);
        }
        const large = sweep > 180 ? 1 : 0;
        return "M " + px(a0) + " " + py(a0) + " A " + rx + " " + ry + " 0 " + large + " 1 " + px(a1) + " " + py(a1);
      }

      // 多角形の閉パス(頂点列→M..L..Z)。
      function polygonPath(points) {
        if (!points || points.length < 2) return "M 0 0";
        return points.map((point, index) => (index ? "L " : "M ") + point[0] + " " + point[1]).join(" ") + " Z";
      }

      // 多角形要素の描画(頂点列は絶対座標。ラベルは重心へ)。
      function drawPolygonElement(g, element, stroke) {
        const points = element.points || [];
        g.appendChild(svgEl("path", {
          d: polygonPath(points),
          class: "symbol-line",
          stroke,
          "stroke-width": element.strokeWidth || .32,
          fill: element.fill || "none"
        }));
        if (element.label && points.length) {
          const cx = points.reduce((sum, p) => sum + p[0], 0) / points.length;
          const cy = points.reduce((sum, p) => sum + p[1], 0) / points.length;
          g.appendChild(textEl(element.label, cx, cy, { fontSize: 2.6, anchor: "middle" }));
        }
      }

      // 円弧・楕円弧要素の描画。x/y/w/h=外接楕円の箱、a0/a1=開始/終了角(度)。
      function drawArcElement(g, element, stroke) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        g.appendChild(svgEl("path", {
          d: ellipseArcPath(w / 2, h / 2, w / 2, h / 2, Number(element.a0 ?? 0), Number(element.a1 ?? 90)),
          class: "symbol-line",
          stroke,
          fill: "none"
        }));
      }

      // 円弧・楕円弧の両端点(絶対座標)。移動スナップの基準・吸着先の両方で使う。
      function arcEndpoints(element) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        const rx = w / 2;
        const ry = h / 2;
        const cx = Number(element.x || 0) + rx;
        const cy = Number(element.y || 0) + ry;
        const rad = d => d * Math.PI / 180;
        const a0 = Number(element.a0 ?? 0);
        const a1 = Number(element.a1 ?? 90);
        return [
          { x: round(cx + rx * Math.cos(rad(a0))), y: round(cy + ry * Math.sin(rad(a0))) },
          { x: round(cx + rx * Math.cos(rad(a1))), y: round(cy + ry * Math.sin(rad(a1))) }
        ];
      }

      // 設備枠/場所枠(破線枠+名称帯)の描画。枠内部品への属性一括適用の対象になる。
      function drawAreaBox(g, element, stroke) {
        const w = Number(element.w || 90);
        const h = Number(element.h || 60);
        const prefix = element.type === "installationBox" ? "INST" : "LOC";
        const label = element.label || (element.type === "installationBox" ? "設備" : "場所");
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: w,
          height: h,
          class: "symbol-line",
          stroke,
          fill: "none",
          "stroke-dasharray": element.dash || "4 2"
        }));
        g.appendChild(svgEl("rect", {
          x: 0,
          y: 0,
          width: Math.min(w, Math.max(24, String(label).length * 3.1 + 14)),
          height: 7,
          fill: "#fff",
          stroke,
          "stroke-width": .25
        }));
        g.appendChild(textEl(prefix + ": " + label, 2, 4.8, { fontSize: 2.5 }));
      }

      // 配線の見た目(色/太さ/破線)をwireTypes定義から解決。
      function wireStyle(element) {
        const type = (state.wireTypes || []).find(item => item.id === element.wireType) || (state.wireTypes || [])[0];
        return {
          color: type?.color || element.stroke || state.settings.stroke,
          width: type?.width || .38,
          dash: type?.dash || "",
          label: type?.label || "",
          noNumber: Boolean(type?.noNumber)
        };
      }

      // 2点間の直交L字経路(中間点1つ)を返す。配線作図時の既定経路。
      // flip=trueでL字の折れ向きを反転(縦→横 を 横→縦 に)。作図中はShiftで切替。
      function orthogonalPath(a, b, flip) {
        if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
          return "M " + a[0] + " " + a[1] + " L " + b[0] + " " + b[1];
        }
        const c = flip ? [b[0], a[1]] : [a[0], b[1]];
        return "M " + a[0] + " " + a[1] + " L " + c[0] + " " + c[1] + " L " + b[0] + " " + b[1];
      }

      // L字経路の中間点。
      function pathMid(a, b) {
        return { x: (a[0] + b[0]) / 2, y: (a[1] + b[1]) / 2 };
      }

      // 折れ点列→SVGパス文字列。
      function wirePath(points, flip) {
        if (!points || points.length < 2) return "M 0 0 L 20 0";
        if (points.length === 2) return orthogonalPath(points[0], points[1], flip);
        return points.map((point, index) => (index ? "L " : "M ") + point[0] + " " + point[1]).join(" ");
      }

      // 線番ラベルの既定位置(最長セグメント中央)を返す。
      function wireLabelPoint(points, flip) {
        const segment = wireMidSegment(points, flip);
        return pathMid([segment[0], segment[1]], [segment[2], segment[3]]);
      }

      // 折れ点列中の最長セグメントを返す(線番配置・ギャップ既定位置用)。
      function wireMidSegment(points, flip) {
        const segments = wireSegments({ points, orthoFlip: flip });
        if (!segments.length) return [0, 0, 20, 0];
        const lengths = segments.map(segment => Math.hypot(segment[2] - segment[0], segment[3] - segment[1]));
        const total = lengths.reduce((sum, length) => sum + length, 0);
        let walked = 0;
        for (let i = 0; i < segments.length; i += 1) {
          if (walked + lengths[i] >= total / 2) return segments[i];
          walked += lengths[i];
        }
        return segments[segments.length - 1];
      }

      // 端子台のスタイル(unit/pill)・段数・端子数から node配置などの幾何情報を計算。
      function terminalStripGeometry(element) {
        const count = Math.max(1, Number(element.count || 8));
        const vertical = element.orientation === "vertical";
        const unit = element.type === "terminalStrip" && element.stripStyle === "unit" && vertical;
        const levels = unit && Number(element.levels) === 2 ? 2 : 1;
        const pitchSize = element.type === "connector" ? 7 : 8;
        const w = Number(element.w || (vertical ? 12 : count * pitchSize));
        const h = Number(element.h || (vertical ? count * pitchSize : 12));
        return {
          count,
          vertical,
          unit,
          levels,
          nodes: count * levels,
          w,
          h,
          pitch: (vertical ? h : w) / count,
          shape: element.terminalShape || "circle"
        };
      }

      // index が count 以上のときは2段目(右列)のノードを返す
      function terminalStripNodeLocal(element, index) {
        const geo = terminalStripGeometry(element);
        if (geo.unit) {
          const level2 = index >= geo.count;
          // 端子円の描画中心と、吸着・配線・帳票で使う接続点を必ず同じ座標にする。
          // 1段は列中央、2段は左右5mm内側（既定幅20mmならx=5/15）に置く。
          const inset = element.terminalNodeInset === undefined ? 5 : Number(element.terminalNodeInset);
          const x = geo.levels === 2 ? (level2 ? geo.w - inset : inset) : geo.w / 2;
          return { x, y: geo.pitch * (index % geo.count) + geo.pitch / 2 };
        }
        return geo.vertical
          ? { x: geo.w / 2, y: geo.pitch * index + geo.pitch / 2 }
          : { x: geo.pitch * index + geo.pitch / 2, y: geo.h / 2 };
      }

      // 端子台のn番端子の絶対座標(配線吸着・プラン表で使用)。
      function terminalStripNodeGlobal(element, index) {
        const node = terminalStripNodeLocal(element, index);
        return localAnchor(element, node.x, node.y);
      }

      // 端子台のn番端子の表示名(prefix+開始番号、2段はprefix2/start2)。
      function terminalLabel(element, index) {
        const custom = String(element.terminalLabels || "").split(/\r?\n/);
        if (custom[index] && custom[index].trim()) return custom[index].trim();
        const count = Math.max(1, Number(element.count || 8));
        if (element.stripStyle === "unit" && Number(element.levels) === 2 && index >= count) {
          const prefix2 = element.prefix2 !== undefined && element.prefix2 !== "" ? element.prefix2 : (element.prefix || "");
          return prefix2 + String(Number(element.start2 || element.start || 1) + (index - count));
        }
        return (element.prefix || "") + String(Number(element.start || 1) + index);
      }

      // 単独端子(小円/角)の描画。SYMBOL_GEO対象外の形状(square等)用フォールバック。
      function drawTerminal(g, element, stroke) {
        const label = element.label || "1";
        const w = Number(element.w || 10);
        const h = Number(element.h || 6);
        const r = Math.min(2.45, Math.max(1.8, Math.min(w, h) * .36));
        const cx = w / 2;
        const cy = h / 2;
        const shape = element.terminalShape || "circle";
        if (element.orientation === "vertical") {
          g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: cy - r, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: cx, y1: cy + r, x2: cx, y2: h, class: "symbol-line", stroke }));
          drawTerminalNode(g, cx, cy, r, shape, stroke);
          g.appendChild(textEl(label, cx + r + 1.2, cy + .3, { fontSize: 1.8 }));
          return;
        }
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        drawTerminalNode(g, cx, cy, r, shape, stroke);
        g.appendChild(textEl(label, cx, cy + .12, { fontSize: 1.8, anchor: "middle" }));
      }

      // 端子台の描画(ユニット列=波形破断線+端子円/旧ピル形、2段対応、ジャンパ弧つき)。
      function drawTerminalStrip(g, element, stroke) {
        const geo = terminalStripGeometry(element);
        if (geo.unit) {
          const w = geo.w;
          const wave = y => unitWavePoints(w, y).map((point, index) => (index ? "L " : "M ") + point[0] + " " + point[1]).join(" ");
          g.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: geo.h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: w, y1: 0, x2: w, y2: geo.h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("path", { d: wave(0), class: "symbol-line", stroke, fill: "none" }));
          g.appendChild(svgEl("path", { d: wave(geo.h), class: "symbol-line", stroke, fill: "none" }));
          for (let i = 0; i < geo.nodes; i++) {
            const node = terminalStripNodeLocal(element, i);
            // ユニット列の端子円は実測⌀6.4(r3.2)
            const r = Math.min(3.2, geo.pitch * .35);
            g.appendChild(svgEl("circle", { cx: node.x, cy: node.y, r, class: "terminal-dot", stroke }));
            g.appendChild(textEl(terminalLabel(element, i), node.x, node.y, { fontSize: 2, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -2.4, { fontSize: 2.2 }));
          const unitJumperStart = Number(element.start || 1);
          terminalJumperPairs(element).forEach(([a, b]) => {
            const ia = a - unitJumperStart;
            const ib = b - unitJumperStart;
            if (ia < 0 || ib < 0 || ia >= geo.count || ib >= geo.count) return;
            const na = terminalStripNodeLocal(element, ia);
            const nb = terminalStripNodeLocal(element, ib);
            g.appendChild(svgEl("path", { d: "M " + na.x + " " + na.y + " Q " + (na.x - 3.6) + " " + ((na.y + nb.y) / 2) + " " + nb.x + " " + nb.y, class: "symbol-line", stroke, fill: "none" }));
          });
          return;
        }
        if (geo.vertical) {
          const bodyW = Math.max(geo.w, 8);
          g.appendChild(svgEl("rect", {
            x: (geo.w - bodyW) / 2,
            y: 0,
            width: bodyW,
            height: geo.h,
            rx: Math.min(bodyW / 2, 3.2),
            ry: Math.min(bodyW / 2, 3.2),
            class: "symbol-line",
            stroke,
            fill: "none"
          }));
          for (let i = 0; i < geo.count; i++) {
            const node = terminalStripNodeLocal(element, i);
            drawTerminalNode(g, node.x, node.y, Math.min(2.8, geo.pitch * .32), geo.shape, stroke);
            g.appendChild(textEl(terminalLabel(element, i), node.x, node.y + .1, { fontSize: 1.9, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, geo.w + 3, 0, { fontSize: 2.5 }));
        } else {
          const r = Math.min(geo.h / 2, 5.5);
          const notch = Math.min(4, geo.h * .34);
          const d = [
            "M", r, 0,
            "H", geo.w - notch,
            "C", geo.w - 1, 0, geo.w, 1.2, geo.w, 3,
            "L", geo.w - notch, geo.h / 2,
            "L", geo.w, geo.h - 3,
            "C", geo.w, geo.h - 1.2, geo.w - 1, geo.h, geo.w - notch, geo.h,
            "H", r,
            "C", 1.2, geo.h, 0, geo.h - 1.2, 0, geo.h / 2,
            "C", 0, 1.2, 1.2, 0, r, 0,
            "Z"
          ].join(" ");
          g.appendChild(svgEl("path", { d, class: "symbol-line", stroke, fill: "none" }));
          for (let i = 0; i < geo.count; i++) {
            const node = terminalStripNodeLocal(element, i);
            drawTerminalNode(g, node.x, node.y, Math.min(2.8, geo.pitch * .32), geo.shape, stroke);
            g.appendChild(textEl(terminalLabel(element, i), node.x, node.y + .1, { fontSize: 1.9, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -3.2, { fontSize: 2.5 }));
        }
        const jumperStart = Number(element.start || 1);
        terminalJumperPairs(element).forEach(([a, b]) => {
          const ia = a - jumperStart;
          const ib = b - jumperStart;
          if (ia < 0 || ib < 0 || ia >= geo.count || ib >= geo.count) return;
          const na = terminalStripNodeLocal(element, ia);
          const nb = terminalStripNodeLocal(element, ib);
          const cx = (na.x + nb.x) / 2 + (geo.vertical ? 3.6 : 0);
          const cy = (na.y + nb.y) / 2 + (geo.vertical ? 0 : 3.6);
          g.appendChild(svgEl("path", { d: "M " + na.x + " " + na.y + " Q " + cx + " " + cy + " " + nb.x + " " + nb.y, class: "symbol-line", stroke, fill: "none" }));
        });
      }

      // 端子1点(円/角)の描画プリミティブ。
      function drawTerminalNode(g, cx, cy, r, shape, stroke) {
        if (shape === "square") {
          g.appendChild(svgEl("rect", { x: cx - r, y: cy - r, width: r * 2, height: r * 2, class: "terminal-dot", stroke }));
          return;
        }
        g.appendChild(svgEl("circle", { cx, cy, r, class: "terminal-dot", stroke }));
      }

      // a/b接点の描画入口。向き(横/縦)で分岐。標準形状はSYMBOL_GEOが先に処理するためここは補助経路。
      function drawContact(g, element, closed, stroke) {
        if (element.orientation === "vertical") {
          drawVerticalContact(g, element, closed, stroke);
          return;
        }
        drawHorizontalContact(g, element, closed, stroke);
      }

      // 横向き接点の描画(縦バー2本+リード、bは斜線)。
      function drawHorizontalContact(g, element, closed, stroke) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const left = Math.max(2.4, w * .3);
        const right = Math.min(w - 2.4, w * .7);
        const r = Math.min(.7, Math.max(.5, h * .09));
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: left - .7, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: right + .7, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: left, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx: right, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: left + .55, y1: cy - .1, x2: right - .3, y2: closed ? cy + .05 : cy - 2.25, class: "symbol-line", stroke }));
        if (closed) {
          g.appendChild(svgEl("line", { x1: right - .35, y1: cy - 2.2, x2: right - .35, y2: cy + 2.2, class: "symbol-line", stroke }));
        }
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 縦向き接点の描画。
      function drawVerticalContact(g, element, closed, stroke) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 16);
        const cx = w / 2;
        const upper = Math.max(4.2, h * .34);
        const lower = Math.min(h - 4.2, h * .66);
        const r = Math.min(1.05, Math.max(.75, w * .1));
        const bladeX = Math.min(w - 1, cx + Math.max(2.5, w * .34));
        g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: upper - r, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx, y1: lower + r, x2: cx, y2: h, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy: upper, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx, cy: lower, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: lower - .2, x2: bladeX, y2: upper + (closed ? .2 : 2.4), class: "symbol-line", stroke }));
        if (closed) {
          g.appendChild(svgEl("line", { x1: bladeX - .1, y1: lower - .9, x2: cx + r, y2: upper + .9, class: "symbol-line", stroke }));
        }
        if (element.label) g.appendChild(textEl(element.label, -2.4, h / 2 + .8, { fontSize: 2.2, anchor: "end" }));
      }

      // 接点ブロック(箱+内部接点)の描画。
      function drawContactBlock(g, element, stroke) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 12);
        const cy = h / 2;
        const closed = (element.blockContact || "NO") === "NC";
        const left = Math.max(4.2, w * .36);
        const right = Math.min(w - 4.2, w * .64);
        g.appendChild(svgEl("rect", {
          x: .6,
          y: .6,
          width: w - 1.2,
          height: h - 1.2,
          class: "symbol-line",
          stroke,
          fill: "none",
          "stroke-dasharray": "1.4 1.2"
        }));
        g.appendChild(svgEl("line", { x1: -4, y1: cy, x2: left - .7, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: right + .7, y1: cy, x2: w + 4, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: left, cy, r: .62, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx: right, cy, r: .62, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: left + .55, y1: cy - .1, x2: right - .25, y2: closed ? cy + .05 : cy - 2.1, class: "symbol-line", stroke }));
        if (closed) g.appendChild(svgEl("line", { x1: right - .3, y1: cy - 2.1, x2: right - .3, y2: cy + 2.1, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.8, anchor: "middle" }));
      }

      // 押しボタンの描画(標準/非常停止キノコ)。SYMBOL_GEOのフォールバック。
      function drawPushButton(g, element, stroke) {
        drawContact(g, element, false, stroke);
        const w = Number(element.w || (element.orientation === "vertical" ? 8 : 10));
        if (element.orientation === "vertical") {
          const cx = w / 2;
          g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: 2.6, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: Math.max(0, cx - 4), y1: 0, x2: Math.min(w, cx + 4), y2: 0, class: "symbol-line", stroke }));
          return;
        }
        const h = Number(element.h || 10);
        const cx = w / 2;
        g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: Math.max(1.2, h / 2 - 1.8), class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: Math.max(0, cx - 4), y1: 0, x2: Math.min(w, cx + 4), y2: 0, class: "symbol-line", stroke }));
      }

      // 切替スイッチの描画フォールバック。
      function drawSelectorSwitch(g, element, stroke) {
        drawContact(g, element, false, stroke);
        const w = Number(element.w || 12);
        const h = Number(element.h || 9);
        const cx = w / 2;
        g.appendChild(svgEl("line", { x1: cx - 2.7, y1: 1, x2: cx + 2.7, y2: 4.2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + 2.7, y1: 1, x2: cx - 2.7, y2: 4.2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx, y1: 1, x2: cx, y2: Math.max(2.8, h / 2 - 1), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // リミットスイッチの描画フォールバック。
      function drawLimitSwitch(g, element, stroke) {
        drawContact(g, element, false, stroke);
        const w = Number(element.w || 12);
        const h = Number(element.h || 8);
        const cx = w / 2;
        g.appendChild(svgEl("line", { x1: cx - 4.2, y1: 1, x2: cx + 4.2, y2: 1, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx, y1: 1, x2: cx, y2: Math.max(2.6, h / 2 - .9), class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: cx + 4.8, cy: 1, r: .8, class: "symbol-fill", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // ヒューズ(箱+貫通線)の描画。
      function drawFuse(g, element, stroke) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 4.5);
        if (element.orientation === "vertical") {
          const cx = w / 2;
          const lead = Math.min(3.5, Math.max(2.6, h * .24));
          const bodyY = lead;
          const bodyH = Math.max(5, h - lead * 2);
          g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: bodyY, class: "symbol-line", stroke }));
          g.appendChild(svgEl("rect", { x: 0, y: bodyY, width: w, height: bodyH, class: "symbol-fill", stroke }));
          g.appendChild(svgEl("line", { x1: cx, y1: bodyY + bodyH, x2: cx, y2: h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: .8, y1: bodyY + bodyH - 1.1, x2: w - .8, y2: bodyY + 1.1, class: "symbol-line", stroke }));
          if (element.label) g.appendChild(textEl(element.label, w + 2.2, h / 2 + .7, { fontSize: 1.9 }));
          return;
        }
        const lead = Math.min(3.5, Math.max(2.6, w * .24));
        const bodyX = lead;
        const bodyW = Math.max(5, w - lead * 2);
        g.appendChild(svgEl("line", { x1: 0, y1: h / 2, x2: bodyX, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: bodyX, y: 0, width: bodyW, height: h, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: h / 2, x2: w, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + 1.1, y1: h - .8, x2: bodyX + bodyW - 1.1, y2: .8, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 遮断器の描画フォールバック(標準形状はSYMBOL_GEO)。
      function drawBreaker(g, element, stroke) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        if (element.orientation === "vertical") {
          const cx = w / 2;
          const upper = Math.max(3, h * .32);
          const lower = Math.min(h - 3, h * .72);
          const bladeX = Math.max(1.1, cx - Math.min(2.25, w * .32));
          g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: upper - .65, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: cx, y1: lower + .65, x2: cx, y2: h, class: "symbol-line", stroke }));
          g.appendChild(svgEl("circle", { cx, cy: upper, r: .65, class: "symbol-fill", stroke }));
          g.appendChild(svgEl("circle", { cx, cy: lower, r: .65, class: "symbol-fill", stroke }));
          g.appendChild(svgEl("line", { x1: cx + .2, y1: upper + .7, x2: bladeX, y2: lower - .3, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: cx + 1.7, y1: lower - 1.1, x2: cx + 1.7, y2: lower + 1.1, class: "symbol-line", stroke }));
          if (element.label) g.appendChild(textEl(element.label, w + 2.2, h / 2 + .7, { fontSize: 1.9 }));
          return;
        }
        const cy = h / 2;
        const left = Math.max(3, w * .32);
        const right = Math.min(w - 3, w * .72);
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: left - .65, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: right + .65, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: left, cy, r: .65, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("circle", { cx: right, cy, r: .65, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: left + .7, y1: cy - .2, x2: right - .3, y2: Math.max(1.1, cy - 2.25), class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: right - 1.1, y1: cy + 1.7, x2: right + 1.1, y2: cy + 1.7, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // コイルの描画フォールバック(標準は無印円のSYMBOL_GEO)。
      function drawCoil(g, element, stroke) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 6);
        const cy = h / 2;
        const bodyX = Math.max(2.6, w * .24);
        const bodyW = Math.max(6, w - bodyX * 2);
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: bodyX, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: bodyX, y: .8, width: bodyW, height: h - 1.6, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW * .35, y1: 1.1, x2: bodyX + bodyW * .35, y2: h - 1.1, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW * .65, y1: 1.1, x2: bodyX + bodyW * .65, y2: h - 1.1, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 電源(丸+極性)の描画。
      function drawPowerSupply(g, element, stroke) {
        const w = Number(element.w || 34);
        const h = Number(element.h || 24);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        g.appendChild(textEl("+", w * .3, h * .4, { fontSize: 4, anchor: "middle" }));
        g.appendChild(textEl("-", w * .7, h * .4, { fontSize: 4, anchor: "middle" }));
        g.appendChild(textEl(element.label || "PS", w / 2, h - 5, { fontSize: 2.4, anchor: "middle" }));
      }

      // トランス(コイル2組)の描画。
      function drawTransformer(g, element, stroke) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const leftX = Math.max(5, w * .3);
        const rightX = Math.min(w - 5, w * .7);
        const coreA = w / 2 - 1.2;
        const coreB = w / 2 + 1.2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: leftX - 4, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: rightX + 4, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + leftX + " 2 C " + (leftX - 7) + " 2 " + (leftX - 7) + " " + (h - 2) + " " + leftX + " " + (h - 2), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + rightX + " 2 C " + (rightX + 7) + " 2 " + (rightX + 7) + " " + (h - 2) + " " + rightX + " " + (h - 2), class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: coreA, y1: 2, x2: coreA, y2: h - 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: coreB, y1: 2, x2: coreB, y2: h - 2, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // 接地の描画フォールバック(標準は縦線+斜めハッチのSYMBOL_GEO)。
      function drawGround(g, element, stroke) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 14);
        const cx = w / 2;
        g.appendChild(svgEl("line", { x1: cx, y1: 0, x2: cx, y2: h * .45, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx - w * .42, y1: h * .45, x2: cx + w * .42, y2: h * .45, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx - w * .28, y1: h * .68, x2: cx + w * .28, y2: h * .68, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx - w * .14, y1: h * .88, x2: cx + w * .14, y2: h * .88, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, h + 4, { fontSize: 2.3, anchor: "middle" }));
      }

      // モータの描画フォールバック(標準は円内タグ+端子小円のSYMBOL_GEO)。
      function drawMotor(g, element, stroke) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        const r = Number(element.r || Math.min(w, h) * .35);
        const cx = w / 2;
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(textEl("M", cx, cy + .3, { fontSize: 4, anchor: "middle" }));
        if (element.label) g.appendChild(textEl(element.label, cx, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // ファン(円+羽根)の描画。
      function drawFan(g, element, stroke) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        const r = Number(element.r || Math.min(w, h) * .38);
        const cx = w / 2;
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + cx + " " + cy + " C " + (cx - r * .6) + " " + (cy - r * .9) + " " + (cx - r * .05) + " " + (cy - r * 1.08) + " " + (cx + r * .56) + " " + (cy - r * .56), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + cx + " " + cy + " C " + (cx + r * 1.05) + " " + (cy - r * .2) + " " + (cx + r * .85) + " " + (cy + r * .46) + " " + (cx + r * .12) + " " + (cy + r * .78), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + cx + " " + cy + " C " + (cx - r * .34) + " " + (cy + r * 1.02) + " " + (cx - r * .96) + " " + (cy + r * .62) + " " + (cx - r * .74) + " " + (cy - r * .2), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // 抵抗(箱形)の描画フォールバック(標準/バリスタはSYMBOL_GEO)。
      function drawResistor(g, element, stroke) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 6);
        const lead = Math.min(4, Math.max(3, w * .22));
        const bodyW = Math.max(6, w - lead * 2);
        g.appendChild(svgEl("line", { x1: 0, y1: h / 2, x2: lead, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: lead, y: 0, width: bodyW, height: h, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: lead + bodyW, y1: h / 2, x2: w, y2: h / 2, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // コンデンサ(平行2線)の描画。
      function drawCapacitor(g, element, stroke) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const leftPlate = w / 2 - 1.2;
        const rightPlate = w / 2 + 1.2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: leftPlate, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: rightPlate, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: leftPlate, y1: 1, x2: leftPlate, y2: h - 1, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: rightPlate, y1: 1, x2: rightPlate, y2: h - 1, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // ダイオード(三角+バー)の描画。
      function drawDiode(g, element, stroke) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 10);
        const lead = Math.min(4, Math.max(3, w * .2));
        const barX = w - lead - 1.2;
        g.appendChild(svgEl("line", { x1: 0, y1: h / 2, x2: lead, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + lead + " 1.2 L " + barX + " " + h / 2 + " L " + lead + " " + (h - 1.2) + " Z", class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: barX, y1: 1.2, x2: barX, y2: h - 1.2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: barX, y1: h / 2, x2: w, y2: h / 2, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // サーマルリレーの描画フォールバック(標準は○✕○のSYMBOL_GEO)。
      function drawThermalRelay(g, element, stroke) {
        drawHorizontalContact(g, element, false, stroke);
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const y = h + 1.1;
        g.appendChild(svgEl("path", { d: "M " + (w * .25) + " " + y + " C " + (w * .37) + " " + (y - 3) + " " + (w * .48) + " " + (y + 3) + " " + (w * .6) + " " + y + " S " + (w * .78) + " " + (y + 3) + " " + (w * .88) + " " + y, class: "symbol-line", stroke, fill: "none" }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 表示灯の描画。丸形パイロットはSYMBOL_GEO、筒形はdrawCylinderLamp()。
      function drawLamp(g, element, stroke) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 10);
        if ((element.lampVariant || "pilot") === "cylinder") {
          drawCylinderLamp(g, element, stroke, w, h);
          return;
        }
        const r = Number(element.r || Math.min(w, h) * .34);
        const cx = w / 2;
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (cx - r * .45) + " " + cy + " C " + (cx - r * .15) + " " + (cy - r * .45) + " " + (cx + r * .15) + " " + (cy - r * .45) + " " + (cx + r * .45) + " " + cy, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 筒形表示灯(角胴+口金)の描画。
      function drawCylinderLamp(g, element, stroke, w, h) {
        const cy = h / 2;
        const bodyX = Math.max(3.5, w * .3);
        const bodyW = Math.max(5.5, w - bodyX * 2);
        const bodyY = Math.max(1.6, h * .18);
        const bodyH = h - bodyY * 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: bodyX, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " " + (bodyY + 1) + " C " + bodyX + " " + (bodyY - .4) + " " + (bodyX + bodyW) + " " + (bodyY - .4) + " " + (bodyX + bodyW) + " " + (bodyY + 1), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " " + (bodyY + 1) + " V " + (bodyY + bodyH - 1) + " C " + bodyX + " " + (bodyY + bodyH + .4) + " " + (bodyX + bodyW) + " " + (bodyY + bodyH + .4) + " " + (bodyX + bodyW) + " " + (bodyY + bodyH - 1) + " V " + (bodyY + 1), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // ブザーの描画(ホーン形)。スピーカー形はdrawSpeakerBuzzer()。
      function drawBuzzer(g, element, stroke) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 9);
        if ((element.buzzerVariant || "horn") === "speaker") {
          drawSpeakerBuzzer(g, element, stroke, w, h);
          return;
        }
        const cy = h / 2;
        const throat = Math.max(4.2, w * .26);
        const mouthX = w - .4;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: throat - .8, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: throat, cy, r: .85, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (throat + .7) + " " + (cy - 2.3) + " C " + (throat + 2.6) + " " + (cy - 4.5) + " " + (throat + 5.2) + " " + (cy - 4.2) + " " + (throat + 6.8) + " " + (cy - 2.4) + " L " + mouthX + " " + (cy - 4.9), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (throat + .7) + " " + (cy + 2.3) + " C " + (throat + 2.6) + " " + (cy + 4.5) + " " + (throat + 5.2) + " " + (cy + 4.2) + " " + (throat + 6.8) + " " + (cy + 2.4) + " L " + mouthX + " " + (cy + 4.9), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + mouthX + " " + (cy - 4.9) + " C " + w + " " + (cy - 2) + " " + w + " " + (cy + 2) + " " + mouthX + " " + (cy + 4.9), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // スピーカー形ブザーの描画。
      function drawSpeakerBuzzer(g, element, stroke, w, h) {
        const cy = h / 2;
        g.appendChild(svgEl("path", { d: "M 0 " + cy + " H " + (w * .24) + " L " + (w * .62) + " 2.2 V " + (h - 2.2) + " L " + (w * .24) + " " + cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w * .72) + " " + (h * .3) + " C " + (w * .9) + " " + (h * .42) + " " + (w * .9) + " " + (h * .58) + " " + (w * .72) + " " + (h * .7), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w * .84) + " " + (h * .18) + " C " + w + " " + (h * .38) + " " + w + " " + (h * .62) + " " + (w * .84) + " " + (h * .82), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      // 電磁弁(箱+ばね/コイル)の描画。
      function drawSolenoidValve(g, element, stroke) {
        const w = Number(element.w || 26);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const coilW = Math.max(7, w * .28);
        const bodyX = coilW + 2;
        const bodyW = Math.max(8, w - bodyX - 2);
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: 2.5, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: 2.5, y: 2, width: coilW, height: h - 4, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " 2 L " + (bodyX + bodyW) + " " + cy + " L " + bodyX + " " + (h - 2) + " Z", class: "symbol-line", stroke, fill: "none" }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: 2, x2: bodyX + bodyW, y2: h - 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // センサ(丸+リード)の描画。
      function drawSensor(g, element, stroke) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 14);
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: 4, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: w - 4, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: 4, y: 2, width: w - 8, height: h - 4, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: 7, y1: 5, x2: w - 10, y2: 5, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: 7, y1: h - 5, x2: w - 7, y2: h - 5, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w - 4) + " " + (cy - 4) + " l 4 -4 M " + (w - 3) + " " + cy + " h 5 M " + (w - 4) + " " + (cy + 4) + " l 4 4", class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // 機器箱(汎用ボックス)の描画。pins/pinText/rightPinTextで左右の端子番号文字を表示。
      function cleanConnectionOffset(value) {
        return round(Math.round(Number(value || 0) / 2.5) * 2.5);
      }

      const wireLabelAvoidCache = new Map();
      function avoidWireNumberCollision(element, position) {
        if (state.settings.autoWireLabelAvoid === false || element.wireNoManualPosition) return position;
        const cacheKey = element.id + ":" + round(position.x) + ":" + round(position.y);
        if (wireLabelAvoidCache.has(cacheKey)) return wireLabelAvoidCache.get(cacheKey);
        const page = currentPage();
        if (!page) return position;
        const width = Math.max(4, String(element.wireNo || "").length * 1.45);
        const elementIndex = page.elements.findIndex(item => item.id === element.id);
        const collides = y => page.elements.some((item, itemIndex) => {
          if (item.type === "wire" && item.id !== element.id && itemIndex < elementIndex && item.wireNo && !item.hideWireNo) {
            const other = avoidWireNumberCollision(item, wireNoAnchorPoint(item));
            const otherWidth = Math.max(4, String(item.wireNo).length * 1.45);
            return position.x + width > other.x - 1 && position.x < other.x + otherWidth + 1
              && y + 1.7 > other.y - 1.7 && y - 1.7 < other.y + 1.7;
          }
          if (item.id === element.id || item.type === "wire" || item.type === "junction") return false;
          const box = elementBounds(item);
          if (!box) return false;
          return position.x + width > box.x - 5 && position.x < box.x + box.w + 5
            && y + 1.5 > box.y - 5 && y - 1.5 < box.y + box.h + 5;
        });
        for (const offset of [0, -4, 4, -8, 8, -12, 12, -16, 16, -20, 20]) {
          if (!collides(position.y + offset)) {
            const resolved = { ...position, y: position.y + offset, leader: offset !== 0 };
            wireLabelAvoidCache.set(cacheKey, resolved);
            return resolved;
          }
        }
        wireLabelAvoidCache.set(cacheKey, position);
        return position;
      }

      function deviceBoxPinY(element, index) {
        const h = Number(element.h || 20);
        const pins = Math.max(0, Number(element.pins || 4));
        return cleanConnectionOffset(h * (index + 1) / (pins + 1));
      }

      function terminalBoxPinY(element, index) {
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        return cleanConnectionOffset(h * (index + .5) / rows);
      }

      function plcGridPinY(element, index) {
        const rows = Math.max(2, Number(element.rows || 8));
        const h = Number(element.h || rows * 6 + 10);
        return cleanConnectionOffset(5 + (index + 1) * ((h - 10) / rows));
      }

      function drawDeviceBox(g, element, stroke) {
        const w = Number(element.w || 28);
        const h = Number(element.h || 20);
        const pins = Math.max(0, Number(element.pins || 4));
        const leftLabels = String(element.pinText || "").split(/\r?\n/);
        const rightLabels = String(element.rightPinText || "").split(/\r?\n/);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        if (element.label) multilineText(g, element.label, w / 2, h / 2 - 1.2, 3.1, { fontSize: 2.1, anchor: "middle" });
        for (let i = 0; i < pins; i++) {
          const y = deviceBoxPinY(element, i);
          if (leftLabels[i]) {
            g.appendChild(textEl(leftLabels[i], 1.5, y, { fontSize: 2.2 }));
          }
          if (rightLabels[i]) {
            g.appendChild(textEl(rightLabels[i], w - 1.5, y, { fontSize: 2.2, anchor: "end" }));
          }
        }
      }

      // PLCブロックの描画。plcStyle=unitはdrawPlcUnitColumn(ユニット列)、boxは端子文字つき箱。
      function drawPlcBlock(g, element, stroke) {
        if ((element.plcStyle || "grid") === "unit") {
          drawPlcUnitColumn(g, element, stroke);
          return;
        }
        const w = Number(element.w || 48);
        const rows = Math.max(2, Number(element.rows || 8));
        const h = Number(element.h || rows * 6 + 10);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        g.appendChild(textEl(element.label || "PLC", w / 2, 5, { fontSize: 2.5, anchor: "middle" }));
        const labels = String(element.pinText || "").split(/\r?\n/);
        for (let i = 1; i <= rows; i++) {
          const pinY = plcGridPinY(element, i - 1);
          const y = pinY + 3;
          g.appendChild(svgEl("line", { x1: 0, y1: y, x2: w, y2: y, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: -8, y1: y - 3, x2: 0, y2: y - 3, class: "symbol-line", stroke }));
          g.appendChild(textEl(labels[i - 1] || String(i).padStart(2, "0"), 3, y - 3, { fontSize: 2 }));
        }
      }

      // コネクタの描画(pair形状はSYMBOL_GEO、その他はここ)。
      function drawConnector(g, element, stroke) {
        const count = Math.max(1, Number(element.count || 8));
        const vertical = element.orientation === "vertical";
        const shape = element.terminalShape || "circle";
        const w = Number(element.w || (vertical ? 10 : count * 7));
        const h = Number(element.h || (vertical ? count * 7 : 10));
        if (vertical) {
          const pitch = h / count;
          g.appendChild(svgEl("line", { x1: w / 2, y1: 0, x2: w / 2, y2: h, class: "symbol-line", stroke }));
          for (let i = 0; i < count; i++) {
            const cy = pitch * i + pitch / 2;
            drawTerminalNode(g, w / 2, cy, Math.min(2.7, pitch * .33), shape, stroke);
            g.appendChild(textEl(String(i + 1), w + 3, cy, { fontSize: 2 }));
          }
          if (element.label) g.appendChild(textEl(element.label, w + 3, -3, { fontSize: 2.4 }));
        } else {
          const pitch = w / count;
          g.appendChild(svgEl("line", { x1: 0, y1: h / 2, x2: w, y2: h / 2, class: "symbol-line", stroke }));
          for (let i = 0; i < count; i++) {
            const cx = pitch * i + pitch / 2;
            drawTerminalNode(g, cx, h / 2, Math.min(2.7, pitch * .33), shape, stroke);
            g.appendChild(textEl(String(i + 1), cx, h + 4, { fontSize: 2, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -3, { fontSize: 2.4 }));
        }
      }

      // ケーブルマーカ(小判形ラベル)の描画。
      function drawCableMarker(g, element, stroke) {
        const w = Number(element.w || 28);
        const h = Number(element.h || 12);
        g.appendChild(svgEl("line", { x1: -12, y1: h / 2, x2: w + 12, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("ellipse", { cx: w / 2, cy: h / 2, rx: w / 2, ry: h / 2, class: "symbol-fill", stroke }));
        const tag = element.cableTag || element.label || "C";
        const detail = [element.coreNo, element.coreColor, element.gauge].filter(Boolean).join("/");
        g.appendChild(textEl(tag, w / 2, detail ? h / 2 - 1.5 : h / 2, { fontSize: 2.4, anchor: "middle" }));
        if (detail) g.appendChild(textEl(detail, w / 2, h / 2 + 2, { fontSize: 1.7, anchor: "middle" }));
      }

      // ケーブル束(束線+結束マーク)の描画。
      function drawCableBundle(g, element, stroke) {
        const w = Number(element.w || 32);
        const h = Number(element.h || 18);
        const mid = h / 2;
        g.appendChild(svgEl("rect", { x: w * .38, y: 1.5, width: w * .22, height: h - 3, class: "symbol-fill", stroke }));
        [-5, 0, 5].forEach(offset => {
          g.appendChild(svgEl("path", {
            d: "M 0 " + (mid + offset) + " C " + (w * .3) + " " + (mid + offset) + " " + (w * .62) + " " + (mid - offset) + " " + w + " " + (mid - offset),
            class: "symbol-line",
            stroke
          }));
        });
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      // 端子箱(箱+端子行)の描画。
      function drawTerminalBox(g, element, stroke) {
        const w = Number(element.w || 22);
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        for (let i = 1; i < rows; i++) {
          g.appendChild(svgEl("line", { x1: 0, y1: h * i / rows, x2: w, y2: h * i / rows, class: "symbol-line", stroke }));
        }
        for (let i = 0; i < rows; i++) {
          const y = terminalBoxPinY(element, i);
          g.appendChild(svgEl("line", { x1: -6, y1: y, x2: 0, y2: y, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: w, y1: y, x2: w + 6, y2: y, class: "symbol-line", stroke }));
        }
        if (element.label) g.appendChild(textEl(element.label, w / 2, h + 4, { fontSize: 2.2, anchor: "middle" }));
      }

      // 表の描画。colWidths/rowHeights(カンマ区切り比率)、cellText(タブ区切り)、斜線セル対応。
      function drawTable(g, element, stroke) {
        const rows = Math.max(1, Number(element.rows || 6));
        const cols = Math.max(1, Number(element.cols || 4));
        const w = Number(element.w || 78);
        const h = Number(element.h || 44);
        const colWidths = tableSizes(element.colWidths, cols, w);
        const rowHeights = tableSizes(element.rowHeights, rows, h);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        let y = 0;
        for (let i = 1; i < rows; i++) {
          y += rowHeights[i - 1];
          g.appendChild(svgEl("line", { x1: 0, y1: y, x2: w, y2: y, class: "symbol-line", stroke }));
        }
        let x = 0;
        for (let i = 1; i < cols; i++) {
          x += colWidths[i - 1];
          g.appendChild(svgEl("line", { x1: x, y1: 0, x2: x, y2: h, class: "symbol-line", stroke }));
        }
        drawTableCells(g, element, rows, cols, colWidths, rowHeights);
        const diagonals = tableDiagonalCells(element);
        if (diagonals.length) {
          const xs = [0];
          colWidths.forEach(cw => xs.push(xs[xs.length - 1] + cw));
          const ys = [0];
          rowHeights.forEach(rh => ys.push(ys[ys.length - 1] + rh));
          diagonals.forEach(([r, c]) => {
            if (r >= 1 && r <= rows && c >= 1 && c <= cols) {
              g.appendChild(svgEl("line", { x1: xs[c - 1], y1: ys[r], x2: xs[c], y2: ys[r - 1], class: "symbol-line", stroke }));
            }
          });
        }
        if (element.label) g.appendChild(textEl(element.label, w / 2, -4, { fontSize: 2.5, anchor: "middle" }));
      }

      // 表の列幅/行高の比率文字列を実寸配列へ変換(不足分は等分)。
      function tableSizes(value, count, total) {
        const values = String(value || "").split(/[,\s]+/).map(Number).filter(number => Number.isFinite(number) && number > 0);
        if (values.length !== count) return Array.from({ length: count }, () => total / count);
        const sum = values.reduce((acc, number) => acc + number, 0);
        if (sum <= 0) return Array.from({ length: count }, () => total / count);
        return values.map(number => total * number / sum);
      }

      // 表のセル文字と斜線セルを描画。
      function drawTableCells(g, element, rows, cols, colWidths, rowHeights) {
        const text = String(element.cellText || "");
        if (!text.trim()) return;
        const rowData = text.split(/\r?\n/).slice(0, rows);
        const fontSize = Number(element.tableFontSize || 2.2);
        let y = 0;
        rowData.forEach((line, rowIndex) => {
          const cells = line.includes("\t") ? line.split("\t") : line.split(",");
          let x = 0;
          cells.slice(0, cols).forEach((cell, colIndex) => {
            g.appendChild(textEl(cell.trim(), x + 1.5, y + rowHeights[rowIndex] / 2 + fontSize * .28, { fontSize }));
            x += colWidths[colIndex];
          });
          y += rowHeights[rowIndex];
        });
      }

      // 信号矢印の矢頭形状(開き/塗り/フォーク/シェブロン)の定義を返す。
      function arrowHeadSpec(style) {
        return { open: [3, .35], solid: [3.4, .26], fork: [3.2, .44], chevron: [2.2, .49] }[style] || [3, .35];
      }

      // 信号矢印の描画(始点側矢頭・ラベル・相手頁注記arrowCounterpartNote対応)。
      function drawArrow(g, element, stroke) {
        const points = element.points || [[element.x || 0, element.y || 0], [(element.x || 0) + 30, element.y || 0]];
        const a = points[0];
        const b = points[points.length - 1];
        const style = element.arrowStyle || "open";
        if (style !== "chevron") {
          g.appendChild(svgEl("line", { x1: a[0], y1: a[1], x2: b[0], y2: b[1], class: "symbol-line", stroke }));
        }
        const angle = Math.atan2(b[1] - a[1], b[0] - a[0]);
        const head = (tip, dirAngle) => {
          const [len, half] = arrowHeadSpec(style);
          const sgn = style === "fork" ? 1 : -1;
          const q1 = [tip[0] + sgn * len * Math.cos(dirAngle - half), tip[1] + sgn * len * Math.sin(dirAngle - half)];
          const q2 = [tip[0] + sgn * len * Math.cos(dirAngle + half), tip[1] + sgn * len * Math.sin(dirAngle + half)];
          if (style === "solid") {
            g.appendChild(svgEl("path", { d: "M " + q1[0] + " " + q1[1] + " L " + tip[0] + " " + tip[1] + " L " + q2[0] + " " + q2[1] + " Z", fill: stroke, stroke: "none" }));
          } else {
            g.appendChild(svgEl("path", { d: "M " + q1[0] + " " + q1[1] + " L " + tip[0] + " " + tip[1] + " L " + q2[0] + " " + q2[1], class: "symbol-line", stroke, fill: "none" }));
          }
        };
        head(b, angle);
        if (element.arrowAtStart) head(a, angle + Math.PI);
        if (element.label) {
          const mid = pathMid(a, b);
          g.appendChild(textEl(element.label, mid.x, mid.y - 3, { fontSize: 2.4, anchor: "middle" }));
        }
        const note = arrowCounterpartNote(element);
        if (note) {
          g.appendChild(textEl(note, b[0], b[1] - 3, { fontSize: 1.8, anchor: "end" }));
        }
      }

      // 接続点(塗り小円)の描画。ネット結合の見た目でもある。
      function drawJunction(g, element, stroke) {
        g.appendChild(svgEl("circle", { cx: 0, cy: 0, r: Number(element.r || 0.5), fill: stroke }));
      }

      // ===== 寸法記入(直線寸法・水平/垂直自動) =====
      function drawDimension(g, element, stroke) {
        const pts = element.points || [[0, 0], [30, 0]];
        const a = pts[0];
        const b = pts[pts.length - 1];
        const horizontal = Math.abs(b[0] - a[0]) >= Math.abs(b[1] - a[1]);
        const off = Math.abs(Number(element.dimOffset ?? 6)) || 6;
        const seg = (x1, y1, x2, y2) => g.appendChild(svgEl("line", { x1, y1, x2, y2, class: "symbol-line", stroke }));
        const tri = (tip, angle) => {
