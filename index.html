        }
        const page = currentPage();
        if (!page) return;
        const source = Array.isArray(clipboardElement) ? clipboardElement : [clipboardElement];
        const copies = source.map(element => {
          const copy = deepClone(element);
          copy.id = uid("el");
          copy.locked = false;
          if (copy.points) copy.points = copy.points.map(point => [point[0] + 6, point[1] + 6]);
          else {
            copy.x = Number(copy.x || 0) + 6;
            copy.y = Number(copy.y || 0) + 6;
          }
          return copy;
        });
        page.elements.push(...copies);
        setSelection(copies.map(copy => copy.id));
        clipboardElement = copies.map(copy => deepClone(copy));
        commitHistory(copies.length + "件の要素を貼り付けました。");
        render();
      }

      // 選択要素を描画順で1つ前面へ。
      function bringSelectedForward() {
        const page = currentPage();
        const ids = new Set(selectedElements().map(element => element.id));
        if (!page || !ids.size) return;
        for (let i = page.elements.length - 2; i >= 0; i--) {
          if (ids.has(page.elements[i].id) && !ids.has(page.elements[i + 1].id)) {
            const item = page.elements[i];
            page.elements[i] = page.elements[i + 1];
            page.elements[i + 1] = item;
          }
        }
        commitHistory("要素を前面へ移動しました。");
        render();
      }

      // 選択要素を描画順で1つ背面へ。
      function sendSelectedBackward() {
        const page = currentPage();
        const ids = new Set(selectedElements().map(element => element.id));
        if (!page || !ids.size) return;
        for (let i = 1; i < page.elements.length; i++) {
          if (ids.has(page.elements[i].id) && !ids.has(page.elements[i - 1].id)) {
            const item = page.elements[i];
            page.elements[i] = page.elements[i - 1];
            page.elements[i - 1] = item;
          }
        }
        commitHistory("要素を背面へ移動しました。");
        render();
      }

      // 選択全体の境界中心を回転中心として剛体回転する(複数選択対応)
      function rotateSelected(degrees, center) {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は回転できません。");
          return;
        }
        const boxes = selected.map(elementBounds).filter(Boolean);
        if (!boxes.length) return;
        const target = unionBounds(boxes);
        const cx = center ? Number(center[0]) : target.x + target.w / 2;
        const cy = center ? Number(center[1]) : target.y + target.h / 2;
        const angle = degrees * Math.PI / 180;
        const rot = point => [
          round(cx + (point[0] - cx) * Math.cos(angle) - (point[1] - cy) * Math.sin(angle)),
          round(cy + (point[0] - cx) * Math.sin(angle) + (point[1] - cy) * Math.cos(angle))
        ];
        selected.forEach(element => {
          if (element.points) {
            element.points = element.points.map(rot);
          } else {
            const p = rot([Number(element.x || 0), Number(element.y || 0)]);
            element.x = p[0];
            element.y = p[1];
            element.rotation = ((Number(element.rotation || 0) + degrees) % 360 + 360) % 360;
          }
        });
        commitHistory("要素を回転しました。");
        render();
      }

      // 指定回転ダイアログを開く(角度90/180/270+回転中心=選択枠中心/座標指定)。
      function showRotateAboutDialog() {
        const selected = selectedElements();
        if (!selected.length) {
          setStatus("回転する要素を選択してください。");
          return;
        }
        const boxes = selected.map(elementBounds).filter(Boolean);
        const target = unionBounds(boxes);
        const cx = round(target.x + target.w / 2);
        const cy = round(target.y + target.h / 2);
        openDialog("指定回転", `
          <p class="muted">選択中の${selected.length}要素を、指定した中心のまわりに回転します。</p>
          <div class="row">
            <div><label>角度</label><select id="rotAngle">
              <option value="90">90°</option>
              <option value="180">180°</option>
              <option value="270">270°</option>
            </select></div>
            <div><label>回転中心</label><select id="rotCenter">
              <option value="bbox">選択枠の中心</option>
              <option value="point">座標を指定</option>
            </select></div>
          </div>
          <div class="row" id="rotPointRow" style="display:none">
            <div><label>中心X mm</label><input id="rotCx" type="number" step="0.5" value="${cx}"></div>
            <div><label>中心Y mm</label><input id="rotCy" type="number" step="0.5" value="${cy}"></div>
          </div>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="rotApplyBtn" class="primary">回転</button>
          </div>`);
        qs("#rotCenter").addEventListener("change", () => {
          qs("#rotPointRow").style.display = qs("#rotCenter").value === "point" ? "" : "none";
        });
        qs("#rotApplyBtn").addEventListener("click", () => {
          const degrees = Number(qs("#rotAngle").value || 90);
          const usePoint = qs("#rotCenter").value === "point";
          const center = usePoint ? [Number(qs("#rotCx").value || cx), Number(qs("#rotCy").value || cy)] : null;
          closeDialog();
          rotateSelected(degrees, center);
        });
      }

      // 選択要素のロック/解除を切替。
      function toggleSelectedLock() {
        const element = selectedElement();
        if (!element) return;
        element.locked = !element.locked;
        commitHistory(element.locked ? "要素をロックしました。" : "要素のロックを解除しました。");
        render();
      }

      // 選択配線の中央ギャップ(ホップ)を切替。
      function toggleSelectedWireGap() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        element.gapAtMid = !element.gapAtMid;
        commitHistory(element.gapAtMid ? "配線ギャップを追加しました。" : "配線ギャップを解除しました。");
        render();
      }

      // 選択配線と他配線の交差点すべてへギャップを追加。
      function addIntersectionGapsToSelectedWire() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const gaps = new Map((element.gapPoints || []).map(point => [pointKey(point[0], point[1]), [round(point[0]), round(point[1])]]));
        const segments = wireSegments(element);
        page.elements
          .filter(other => other.type === "wire" && other.id !== element.id)
          .forEach(other => {
            segments.forEach(segment => {
              wireSegments(other).forEach(otherSegment => {
                const point = segmentIntersection(segment, otherSegment);
                if (!point) return;
                if (segmentEndpointNear(segment, point.x, point.y) || segmentEndpointNear(otherSegment, point.x, point.y)) return;
                if (hasJunctionNear(page, point.x, point.y)) return;
                gaps.set(pointKey(point.x, point.y), [round(point.x), round(point.y)]);
              });
            });
          });
        const before = element.gapPoints?.length || 0;
        element.gapPoints = Array.from(gaps.values()).sort((a, b) => a[1] - b[1] || a[0] - b[0]);
        const added = element.gapPoints.length - before;
        if (!added) {
          setStatus("追加できる交差ギャップはありません。接続点がある交点は対象外です。");
          render();
          return;
        }
        commitHistory(added + "か所の交差ギャップを追加しました。");
        render();
      }

      // 選択配線のギャップを全消去。
      function clearSelectedWireGaps() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const hadGap = element.gapAtMid || (element.gapPoints && element.gapPoints.length);
        element.gapAtMid = false;
        element.gapPoints = [];
        if (!hadGap) return;
        commitHistory("配線ギャップを全解除しました。");
        render();
      }

      // 線分端点が指定点の近傍かを判定。
      function segmentEndpointNear(segment, x, y) {
        return (Math.abs(segment[0] - x) < .6 && Math.abs(segment[1] - y) < .6)
          || (Math.abs(segment[2] - x) < .6 && Math.abs(segment[3] - y) < .6);
      }

      // 選択配線へ折れ点を追加(L字なら既存折れ位置へ)。
      function addSelectedWirePoint() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [[0, 0], [20, 0]];
        const insertAt = Math.max(1, points.length - 1);
        const a = points[insertAt - 1];
        const b = points[insertAt];
        const point = points.length === 2 && Math.abs(a[0] - b[0]) > .001 && Math.abs(a[1] - b[1]) > .001
          ? [round(a[0]), round(b[1])]
          : [round((a[0] + b[0]) / 2), round((a[1] + b[1]) / 2)];
        points.splice(insertAt, 0, point);
        element.points = points;
        commitHistory("配線の中間点を追加しました。");
        render();
      }

      // 選択配線の最後の折れ点を削除。
      function removeSelectedWirePoint() {
        const element = selectedElement();
        if (!element || element.type !== "wire" || !element.points || element.points.length <= 2) return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        element.points.splice(element.points.length - 2, 1);
        commitHistory("配線の中間点を削除しました。");
        render();
      }

      // 選択配線を水平/垂直だけの経路へ整形(直交整形ボタン)。
      function orthogonalizeSelectedWire() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const original = element.points || [[0, 0], [20, 0]];
        const normalized = orthogonalizePoints(original);
        if (JSON.stringify(original) === JSON.stringify(normalized)) {
          setStatus("この配線はすでに直交しています。");
          return;
        }
        element.points = normalized;
        commitHistory("配線を直交整形しました。");
        render();
      }

      // 点列を直交化した新しい点列を返す。
      function orthogonalizePoints(points) {
        const result = [];
        const addPoint = point => {
          const rounded = [round(point[0]), round(point[1])];
          const last = result[result.length - 1];
          if (!last || Math.abs(last[0] - rounded[0]) > .001 || Math.abs(last[1] - rounded[1]) > .001) result.push(rounded);
        };
        addPoint(points[0] || [0, 0]);
        for (let i = 1; i < points.length; i += 1) {
          const prev = result[result.length - 1];
          const target = points[i];
          if (Math.abs(prev[0] - target[0]) < .001 || Math.abs(prev[1] - target[1]) < .001) {
            addPoint(target);
          } else {
            addPoint([prev[0], target[1]]);
            addPoint(target);
          }
        }
        return result;
      }

      // 設備枠/場所枠の名称を枠内の部品の設備/場所属性へ一括適用。
      function applySelectedAreaAttributes() {
        const area = selectedElement();
        if (!area || !["installationBox", "locationBox"].includes(area.type)) return;
        if (isElementLocked(area)) {
          setStatus("ロックされた枠は変更できません。");
          return;
        }
        const value = String(area.label || "").trim();
        if (!value) {
          setStatus("枠のラベルを入力してください。");
          return;
        }
        const key = area.type === "installationBox" ? "installation" : "location";
        const box = elementBounds(area);
        const page = currentPage();
        let count = 0;
        page.elements.forEach(element => {
          if (element.id === area.id || !supportsElectricalAttributes(element) || isElementLocked(element)) return;
          const bounds = elementBounds(element);
          if (!bounds) return;
          const cx = bounds.x + bounds.w / 2;
          const cy = bounds.y + bounds.h / 2;
          if (cx < box.x || cx > box.x + box.w || cy < box.y || cy > box.y + box.h) return;
          element[key] = value;
          count += 1;
        });
        commitHistory(count + "個の部品へ" + (key === "installation" ? "設備" : "場所") + "属性を適用しました。");
        render();
      }

      // 選択部品の設備/場所属性をコピー。
      function copySelectedInstallLocation() {
        const element = selectedElement();
        if (!element || !supportsElectricalAttributes(element)) return;
        const data = {};
        if (String(element.installation || "").trim()) data.installation = String(element.installation).trim();
        if (String(element.location || "").trim()) data.location = String(element.location).trim();
        if (!Object.keys(data).length) {
          setStatus("コピーできる設備/場所属性がありません。");
          return;
        }
        installLocationClipboard = data;
        setStatus("設備/場所属性をコピーしました。");
        render();
      }

      // コピー済み設備/場所属性を選択部品群へ貼付。
      function pasteInstallLocationToSelection() {
        if (!installLocationClipboard) {
          setStatus("貼り付ける設備/場所属性がありません。");
          return;
        }
        const selected = selectedElements().filter(element => supportsElectricalAttributes(element) && !isElementLocked(element));
        let count = 0;
        selected.forEach(element => {
          let changed = false;
          Object.entries(installLocationClipboard).forEach(([key, value]) => {
            if (element[key] !== value) {
              element[key] = value;
              changed = true;
            }
          });
          if (changed) count += 1;
        });
        if (!count) {
          setStatus("設備/場所属性を貼り付ける対象がありません。");
          return;
        }
        commitHistory(count + "個の部品へ設備/場所属性を貼り付けました。");
        render();
      }

      // 選択要素群をユーザー部品(回路スニペット)として登録(相対座標へ正規化)。
      function registerSelectedAsSymbol() {
        const selected = selectedElements();
        if (!selected.length) {
          setStatus("登録する要素を選択してください。");
          return;
        }
        const defaultName = selected.length === 1
          ? (selected[0].label || selected[0].text || paletteLabel(selected[0].type) || "ユーザー部品").toString()
          : "ユーザー回路" + selected.length + "要素";
        const label = prompt("ユーザー部品名", defaultName);
        if (!label) return;
        const boxes = selected.map(elementBounds).filter(Boolean);
        const origin = unionBounds(boxes);
        const templates = selected.map(element => normalizeSymbolTemplate(element, origin.x, origin.y));
        state.customSymbols.push({
          id: uid("sym"),
          label,
          template: deepClone(templates[0]),
          templates
        });
        commitHistory(selected.length > 1 ? "ユーザー回路を登録しました。" : "ユーザー部品を登録しました。");
        render();
      }

      // 要素を原点基準の相対座標テンプレートへ変換(ユーザー部品登録の下請け)。
      function normalizeSymbolTemplate(element, originX, originY) {
        const template = deepClone(element);
        delete template.id;
        delete template.locked;
        if (template.points) {
          template.points = template.points.map(point => [round(point[0] - originX), round(point[1] - originY)]);
        } else {
          template.x = round(Number(template.x || 0) - originX);
          template.y = round(Number(template.y || 0) - originY);
        }
        return template;
      }

      // 選択要素を指定量だけ平行移動(矢印キー移動)。
      function moveSelected(dx, dy) {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は移動できません。");
          return;
        }
        selected.forEach(element => translateElement(element, dx, dy));
      }

      // 要素1個の平行移動(points系/x,y系の両対応)。
      function translateElement(element, dx, dy) {
        if (element.points) {
          element.points = element.points.map(point => [round(point[0] + dx), round(point[1] + dy)]);
        } else {
          element.x = round(Number(element.x || 0) + dx);
          element.y = round(Number(element.y || 0) + dy);
        }
      }

      // 選択要素の整列(左/右/上/下/中央)。
      function alignSelected(mode) {
        const selected = selectedElements();
        if (selected.length < 2) {
          setStatus("整列するには2つ以上の要素を選択してください。");
          return;
        }
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は整列できません。");
          return;
        }
        const items = selected.map(element => ({ element, box: elementBounds(element) })).filter(item => item.box);
        const target = unionBounds(items.map(item => item.box));
        items.forEach(item => {
          let dx = 0;
          let dy = 0;
          if (mode === "left") dx = target.x - item.box.x;
          if (mode === "hcenter") dx = target.x + target.w / 2 - (item.box.x + item.box.w / 2);
          if (mode === "right") dx = target.x + target.w - (item.box.x + item.box.w);
          if (mode === "top") dy = target.y - item.box.y;
          if (mode === "vcenter") dy = target.y + target.h / 2 - (item.box.y + item.box.h / 2);
          if (mode === "bottom") dy = target.y + target.h - (item.box.y + item.box.h);
          translateElement(item.element, dx, dy);
        });
        commitHistory("要素を整列しました。");
        render();
      }

      // 選択要素の等間隔分布(横/縦)。
      function distributeSelected(axis) {
        const selected = selectedElements();
        if (selected.length < 3) {
          setStatus("均等配置するには3つ以上の要素を選択してください。");
          return;
        }
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は均等配置できません。");
          return;
        }
        const items = selected
          .map(element => ({ element, box: elementBounds(element) }))
          .filter(item => item.box)
          .sort((a, b) => centerOfBox(a.box, axis) - centerOfBox(b.box, axis));
        const first = centerOfBox(items[0].box, axis);
        const last = centerOfBox(items[items.length - 1].box, axis);
        const step = (last - first) / (items.length - 1);
        items.forEach((item, index) => {
          const delta = first + step * index - centerOfBox(item.box, axis);
          translateElement(item.element, axis === "x" ? delta : 0, axis === "y" ? delta : 0);
        });
        commitHistory("要素を均等配置しました。");
        render();
      }

      // 矩形の中心座標(軸指定)。
      function centerOfBox(box, axis) {
        return axis === "x" ? box.x + box.w / 2 : box.y + box.h / 2;
      }

      // 現在ページを出力用SVG文字列へシリアライズ(SVG保存・PNG変換の元)。
      function serializeActiveSvg() {
        const page = currentPage();
        const size = pageSize(page);
        const svg = svgEl("svg", { xmlns: svgNS, viewBox: "0 0 " + size.w + " " + size.h, width: size.w + "mm", height: size.h + "mm" });
        drawPageSvg(svg, page, { selection: false, scaled: false, grid: false, output: true });
        svg.style.width = null;
        svg.style.height = null;
        svg.setAttribute("width", size.w + "mm");
        svg.setAttribute("height", size.h + "mm");
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
      }

      // Blob+aタグクリックによるファイルダウンロード共通処理。
      function download(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      // state全体をJSONファイルとして保存(ファイル名にタイムスタンプ)。
      function saveProject() {
        ensureProjectDefaults();
        syncPageTotals();
        const name = "electrical-drawing-" + new Date().toISOString().replace(/[:.]/g, "-") + ".json";
        download(name, JSON.stringify(state, null, 2), "application/json");
        setStatus("JSONを保存しました。");
      }

      // localStorage自動バックアップからの復元(確認ダイアログつき)。
      function restoreLocalBackup() {
        let snapshot = "";
        try {
          snapshot = localStorage.getItem("electricalDrawingStudio.backup") || "";
        } catch (_) {
          setStatus("ブラウザ内バックアップを読めません。");
          return;
        }
        if (!snapshot) {
          setStatus("復元できるバックアップがありません。");
          return;
        }
        if (!confirm("ブラウザ内の自動保存データを復元しますか？\n現在の画面内容は置き換わります。")) return;
        try {
          const restored = JSON.parse(snapshot);
          if (!restored.pages || !Array.isArray(restored.pages)) throw new Error("pages が見つかりません。");
          Object.assign(state, restored);
          ensureProjectDefaults();
          setSelection([]);
          pageCounter = state.pages.length + 1;
          resetHistory();
          render();
          setStatus("ブラウザ内バックアップを復元しました。");
        } catch (error) {
          setStatus("復元に失敗しました: " + error.message);
        }
      }

      // ===== ブラウザ内プロジェクト管理(localStorageへ複数図面を名前付き保存) =====
      const PROJECT_STORE_KEY = "electricalDrawingStudio.projects";

      // ブラウザ内プロジェクト保管庫(localStorage)を読み出す(壊れていれば空)。
      function readProjectStore() {
        try {
          const parsed = JSON.parse(localStorage.getItem(PROJECT_STORE_KEY) || "{}");
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      // プロジェクト保管庫を書き戻す(容量超過は失敗を通知してfalse)。
      function writeProjectStore(store) {
        try {
          localStorage.setItem(PROJECT_STORE_KEY, JSON.stringify(store));
          return true;
        } catch (error) {
          setStatus("ブラウザ内プロジェクトの保存に失敗しました（容量超過の可能性）: " + error.message);
          return false;
        }
      }

      // 保存済みプロジェクト一覧を保存日時の新しい順で返す。
      function projectStoreEntries() {
        return Object.values(readProjectStore())
          .sort((a, b) => String(b.savedAt || "").localeCompare(String(a.savedAt || "")));
      }

      // 現在の図面を保管庫へ保存(existingId指定で上書き)。メタ(名称/頁数/日時)+スナップショットを持つ。
      function storeCurrentProject(label, existingId) {
        ensureProjectDefaults();
        syncPageTotals();
        const store = readProjectStore();
        const id = existingId || uid("proj");
        store[id] = {
          id,
          label: label || state.project.title || "無題",
          savedAt: new Date().toISOString(),
          pages: state.pages.length,
          snapshot: JSON.stringify(state)
        };
        if (!writeProjectStore(store)) return false;
        setStatus("プロジェクト「" + store[id].label + "」をブラウザ内へ保存しました。");
        return true;
      }

      // 保管庫のプロジェクトを確認の上で読込(現在内容は置換、履歴はリセット)。
      function loadStoredProject(id) {
        const entry = readProjectStore()[id];
        if (!entry) return;
        if (!confirm("プロジェクト「" + (entry.label || "") + "」を読み込みますか？\n現在の画面内容は置き換わります（必要ならJSON保存してください）。")) return;
        try {
          const restored = JSON.parse(entry.snapshot);
          if (!restored.pages || !Array.isArray(restored.pages)) throw new Error("pages が見つかりません。");
          Object.assign(state, restored);
          ensureProjectDefaults();
          setSelection([]);
          pageCounter = state.pages.length + 1;
          resetHistory();
          render();
          setStatus("プロジェクト「" + (entry.label || "") + "」を読み込みました。");
          closeDialog();
        } catch (error) {
          setStatus("プロジェクトの読込に失敗しました: " + error.message);
        }
      }

      // プロジェクト管理ダイアログを開く(新規保存/読込/上書き/改名/削除)。
      function showProjectManager() {
        const entries = projectStoreEntries();
        const rows = entries.map(entry => `
          <tr>
            <td>${escapeHtml(entry.label || "")}</td>
            <td>${entry.pages || "?"}</td>
            <td>${escapeHtml(String(entry.savedAt || "").replace("T", " ").slice(0, 16))}</td>
            <td>
              <button type="button" data-proj-load="${escapeAttr(entry.id)}">読込</button>
              <button type="button" data-proj-overwrite="${escapeAttr(entry.id)}">上書き</button>
              <button type="button" data-proj-rename="${escapeAttr(entry.id)}">改名</button>
              <button type="button" data-proj-delete="${escapeAttr(entry.id)}">削除</button>
            </td>
          </tr>`).join("");
        openDialog("プロジェクト管理（ブラウザ内保存）", `
          <p class="muted">このブラウザの localStorage に複数の図面を名前付きで保存し、切り替えできます。
          ブラウザのデータ消去で失われるため、恒久保存には従来どおり JSON 保存を併用してください。</p>
          <div class="row">
            <div><label>保存名</label><input id="projSaveName" value="${escapeAttr(state.project.title || "無題")}"></div>
            <div style="display:flex;align-items:flex-end"><button type="button" id="projSaveBtn" class="primary" style="width:100%">現在の図面を新規保存</button></div>
          </div>
          ${entries.length
            ? `<table class="report-table" style="margin-top:10px"><thead><tr><th>名称</th><th>頁数</th><th>保存日時</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`
            : '<p class="muted" style="margin-top:10px">保存済みプロジェクトはまだありません。</p>'}
        `);
        qs("#projSaveBtn").addEventListener("click", () => {
          if (storeCurrentProject(qs("#projSaveName").value.trim())) showProjectManager();
        });
        qsa("[data-proj-load]", qs("#dialogBody")).forEach(button =>
          button.addEventListener("click", () => loadStoredProject(button.dataset.projLoad)));
        qsa("[data-proj-overwrite]", qs("#dialogBody")).forEach(button =>
          button.addEventListener("click", () => {
            const entry = readProjectStore()[button.dataset.projOverwrite];
            if (!entry) return;
            if (!confirm("プロジェクト「" + (entry.label || "") + "」を現在の図面で上書きしますか？")) return;
            if (storeCurrentProject(entry.label, entry.id)) showProjectManager();
          }));
        qsa("[data-proj-rename]", qs("#dialogBody")).forEach(button =>
          button.addEventListener("click", () => {
            const store = readProjectStore();
            const entry = store[button.dataset.projRename];
            if (!entry) return;
            const label = prompt("プロジェクト名", entry.label || "");
            if (!label) return;
            entry.label = label;
            if (writeProjectStore(store)) showProjectManager();
          }));
        qsa("[data-proj-delete]", qs("#dialogBody")).forEach(button =>
          button.addEventListener("click", () => {
            const store = readProjectStore();
            const entry = store[button.dataset.projDelete];
            if (!entry) return;
            if (!confirm("プロジェクト「" + (entry.label || "") + "」を削除しますか？（元に戻せません）")) return;
            delete store[button.dataset.projDelete];
            if (writeProjectStore(store)) showProjectManager();
          }));
      }

      // 下絵画像1枚を現在ページへ挿入する入口。
      function importUnderlayImageFile(file) {
        return readUnderlayImageFile(file, (dataUrl, imageWidth, imageHeight) => addUnderlayImageElement(file.name, dataUrl, imageWidth, imageHeight));
      }

      // A3二面スキャン画像→A4縦2ページの下絵ページ生成の入口。
      function importTwoUpUnderlayImageFile(file) {
        return readUnderlayImageFile(file, (dataUrl, imageWidth, imageHeight) => addTwoUpUnderlayPages(file.name, dataUrl, imageWidth, imageHeight));
      }

      // 画像ファイルをdataURL化し寸法を得てコールバックへ渡す共通処理。
      function readUnderlayImageFile(file, onLoad) {
        return new Promise(resolve => {
          if (!file || !String(file.type || "").startsWith("image/")) {
            setStatus("PNG/JPEG/WebP/SVG画像を選択してください。");
            resolve(false);
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            const dataUrl = String(reader.result || "");
            const image = new Image();
            image.onload = () => {
              Promise.resolve(onLoad(dataUrl, image.naturalWidth || image.width || 1, image.naturalHeight || image.height || 1))
                .then(() => resolve(true))
                .catch(error => {
                  setStatus("下絵画像の処理に失敗しました: " + error.message);
                  resolve(false);
                });
            };
            image.onerror = () => {
              Promise.resolve(onLoad(dataUrl, 16, 11))
                .then(() => resolve(true))
                .catch(error => {
                  setStatus("下絵画像の処理に失敗しました: " + error.message);
                  resolve(false);
                });
            };
            image.src = dataUrl;
          };
          reader.onerror = () => {
            setStatus("下絵画像を読み込めませんでした。");
            resolve(false);
          };
          reader.readAsDataURL(file);
        });
      }

      // 下絵画像要素を現在ページへ追加(用紙内へ収まる寸法で配置、初期ロック)。
      function addUnderlayImageElement(name, dataUrl, imageWidth, imageHeight) {
        const page = currentPage();
        if (!page) return;
        const element = buildUnderlayImageElement(page, name, dataUrl, imageWidth, imageHeight, "full");
        page.elements.unshift(element);
        selectSingle(element.id);
        commitHistory("下絵画像を挿入しました。");
        render();
      }

      async function addTwoUpUnderlayPages(name, dataUrl, imageWidth, imageHeight) {
        const base = currentPage();
        const baseTitle = base?.title || {};
        const baseIndex = state.pages.length + 1;
        const splitImages = await rotatedA3TwoUpImages(dataUrl);
        const pages = splitImages.map((item, index) => {
          const page = createPage({
            name: "P" + (baseIndex + index) + "-" + item.suffix,
            size: "A4",
            orientation: "portrait",
            frameVariant: base?.frameVariant || "detailed",
            title: baseTitle.title || "電気図面",
            drawingNo: baseTitle.drawingNo || "",
            revision: baseTitle.revision || "",
            designer: baseTitle.designer || "",
            date: baseTitle.date || today,
            facility: baseTitle.facility || "",
            installation: baseTitle.installation || "",
            location: baseTitle.location || ""
          });
          page.elements.unshift(buildUnderlayImageElement(page, name + " " + item.suffix, item.dataUrl, item.width, item.height, "full"));
          return page;
        });
        state.pages.push(...pages);
        state.activePageId = pages[0].id;
        setSelection([pages[0].elements[0].id]);
        commitHistory("2面下絵ページを作成しました。");
        render();
      }

      // A3横スキャンを90度回転→左右半分の2枚のdataURLへ分割(canvas使用)。
      function rotatedA3TwoUpImages(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            try {
              const sourceW = image.naturalWidth || image.width || 1;
              const sourceH = image.naturalHeight || image.height || 1;
              const rotated = document.createElement("canvas");
              rotated.width = sourceH;
              rotated.height = sourceW;
              const ctx = rotated.getContext("2d");
              ctx.translate(rotated.width, 0);
              ctx.rotate(Math.PI / 2);
              ctx.drawImage(image, 0, 0);
              const halfW = Math.floor(rotated.width / 2);
              const items = [
                { suffix: "1", sx: 0, sw: halfW },
                { suffix: "2", sx: halfW, sw: rotated.width - halfW }
              ].map(item => {
                const canvas = document.createElement("canvas");
                canvas.width = item.sw;
                canvas.height = rotated.height;
                canvas.getContext("2d").drawImage(rotated, item.sx, 0, item.sw, rotated.height, 0, 0, item.sw, rotated.height);
                return {
                  suffix: item.suffix,
                  dataUrl: canvas.toDataURL("image/png"),
                  width: item.sw,
                  height: rotated.height
                };
              });
              resolve(items);
            } catch (error) {
              reject(error);
            }
          };
          image.onerror = () => reject(new Error("画像を回転分割できません。"));
          image.src = dataUrl;
        });
      }

      // ロック中でも下絵を選択状態にする(位置調整の入口)。
      function selectCurrentUnderlay() {
        const page = currentPage();
        if (!page) return;
        const underlay = page.elements.find(element => element.type === "underlayImage");
        if (!underlay) {
          setStatus("このページに下絵画像はありません。");
          return;
        }
        selectSingle(underlay.id);
        setStatus("下絵を選択しました。位置調整する場合はロック解除してください。");
        render();
      }

      // 下絵画像要素オブジェクトを生成(ページ寸法へフィット)。
      function buildUnderlayImageElement(page, name, dataUrl, imageWidth, imageHeight, cropPreset) {
        const size = pageSize(page);
        const margin = 12;
        const crop = underlayCropRect(cropPreset);
        const sourceWidth = Math.max(1, Number(imageWidth || 1) * crop.w);
        const sourceHeight = Math.max(1, Number(imageHeight || 1) * crop.h);
        let w = Math.max(20, size.w - margin * 2);
        let h = w * (sourceHeight / sourceWidth);
        if (h > size.h - margin * 2) {
          h = Math.max(20, size.h - margin * 2);
          w = h * (sourceWidth / sourceHeight);
        }
        return {
          id: uid("el"),
          type: "underlayImage",
          x: round((size.w - w) / 2),
          y: round((size.h - h) / 2),
          w: round(w),
          h: round(h),
          label: name || "下絵",
          imageData: dataUrl,
          opacity: .35,
          cropPreset: cropPreset || "full",
          rotation: 0,
          locked: true,
          stroke: "#5b626b",
          layer: "layout"
        };
      }

      // JSONファイルを読み込みstateへ復元(検証+履歴リセット)。
      function openProjectFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const loaded = JSON.parse(reader.result);
            if (!loaded.pages || !Array.isArray(loaded.pages)) throw new Error("pages が見つかりません。");
            state.app = loaded.app || state.app;
            state.version = loaded.version || state.version;
            state.settings = { ...state.settings, ...(loaded.settings || {}) };
            state.layers = loaded.layers || state.layers;
            state.wireTypes = loaded.wireTypes || state.wireTypes;
            state.customSymbols = loaded.customSymbols || [];
            state.project = { ...state.project, ...(loaded.project || {}) };
            ensureProjectDefaults();
            state.pages = loaded.pages;
            state.activePageId = loaded.activePageId || state.pages[0].id;
            pageCounter = state.pages.length + 1;
            setSelection([]);
            resetHistory();
            render();
            setStatus("JSONを読み込みました。");
          } catch (error) {
            setStatus("読み込みに失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      // 現在ページをSVGファイルへ出力。
      function exportSvg() {
        download((currentPage().name || "page") + ".svg", serializeActiveSvg(), "image/svg+xml");
        setStatus("SVGを書き出しました。");
      }

      // 現在ページをPNGへ出力(SVG→canvas経由、3倍解像度)。
      function exportPng() {
        const svg = serializeActiveSvg();
        const page = currentPage();
        const size = pageSize(page);
        const scale = 4;
        const image = new Image();
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(size.w * scale);
          canvas.height = Math.round(size.h * scale);
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(pngBlob => {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(pngBlob);
            link.download = (page.name || "page") + ".png";
            link.click();
            URL.revokeObjectURL(link.href);
          }, "image/png");
        };
        image.src = url;
        setStatus("PNGを書き出しました。");
      }

      // 印刷用シートDOM(全ページ)を構築(等倍1面/ A3二面付けはprintModeで切替)。
      function syncPrintSheets() {
        const container = qs("#printSheets");
        container.innerHTML = "";
        if (printMode === "two-up") {
          syncPrintSheetsTwoUp(container);
          return;
        }
        state.pages.forEach(page => {
          const size = pageSize(page);
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-" + String(page.size || "A4").toLowerCase() + "-" + String(page.orientation || "portrait");
          sheet.style.width = size.w + "mm";
          sheet.style.height = size.h + "mm";
          const svg = svgEl("svg", { xmlns: svgNS, role: "img", "aria-label": page.name || "page" });
          drawPageSvg(svg, page, { selection: false, scaled: false, grid: false, output: true });
          sheet.appendChild(svg);
          container.appendChild(sheet);
        });
      }

      // A3二面付けの印刷シートを構築(A4縦2頁を横並び)。
      function syncPrintSheetsTwoUp(container) {
        for (let i = 0; i < state.pages.length; i += 2) {
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-a3-portrait";
          sheet.style.width = "297mm";
          sheet.style.height = "420mm";
          const svg = svgEl("svg", { xmlns: svgNS, viewBox: "0 0 297 420", width: "297mm", height: "420mm", role: "img", "aria-label": "A3 two-up" });
          svg.appendChild(svgEl("rect", { x: 0, y: 0, width: 297, height: 420, fill: "#fff" }));
          addTwoUpPageSvg(svg, state.pages[i], 10, 10, 277, 195);
          if (state.pages[i + 1]) addTwoUpPageSvg(svg, state.pages[i + 1], 10, 215, 277, 195);
          sheet.appendChild(svg);
          container.appendChild(sheet);
        }
      }

      // 二面付けシートへ1ページ分のSVGを配置。
      function addTwoUpPageSvg(parent, page, x, y, w, h) {
        const size = pageSize(page);
        const scale = Math.min(w / size.w, h / size.h);
        const drawW = size.w * scale;
        const drawH = size.h * scale;
        const nested = svgEl("svg", {
          x: x + (w - drawW) / 2,
          y: y + (h - drawH) / 2,
          width: drawW,
          height: drawH,
          viewBox: "0 0 " + size.w + " " + size.h
        });
        drawPageSvg(nested, page, { selection: false, scaled: false, grid: false, output: true });
        nested.style.width = null;
        nested.style.height = null;
        nested.setAttribute("x", x + (w - drawW) / 2);
        nested.setAttribute("y", y + (h - drawH) / 2);
        nested.setAttribute("width", drawW);
        nested.setAttribute("height", drawH);
        parent.appendChild(nested);
      }

      // 印刷直前にシートを最新化。
      function renderPrintSheets() {
        syncPrintSheets();
      }

      // 等倍印刷(全ページ)を実行。
      function printProject() {
        printMode = "single";
        renderPrintSheets();
        setStatus("印刷ダイアログでPDF保存を選択してください。");
        window.print();
      }

      // A3二面付け印刷を実行。
      function printProjectTwoUp() {
        printMode = "two-up";
        renderPrintSheets();
        setStatus("A3縦2面付けで印刷します。印刷ダイアログでPDF保存を選択してください。");
        window.print();
        printMode = "single";
      }

      // ===== ワイヤーネット解析(同電位グループ) =====
      function wireEndpointsOf(wire) {
        const points = wire.points || [];
        if (!points.length) return [];
        return [points[0], points[points.length - 1]];
      }

      // 配線同士の電気的接触判定(端点一致±0.6mm/端点が相手線分上=T分岐)。
      function wiresTouch(a, b) {
        const ea = wireEndpointsOf(a);
        const eb = wireEndpointsOf(b);
        for (const p of ea) {
          for (const q of eb) {
            if (Math.abs(p[0] - q[0]) < .6 && Math.abs(p[1] - q[1]) < .6) return true;
          }
        }
        const segsA = wireSegments(a);
        const segsB = wireSegments(b);
        for (const p of ea) {
          if (segsB.some(segment => pointOnSegment(p[0], p[1], segment))) return true;
        }
        for (const q of eb) {
          if (segsA.some(segment => pointOnSegment(q[0], q[1], segment))) return true;
        }
        return false;
      }

      // ページ内の配線を電気的な接続グループ(ネット)に分割する。
      // 端点一致・T分岐(端点が他配線の線上)・接続点上の交差で結合する。
      function buildWireNets(page) {
        const wires = page.elements.filter(element => element.type === "wire");
        const parent = new Map();
        wires.forEach(wire => parent.set(wire.id, wire.id));
        const find = id => {
          while (parent.get(id) !== id) {
            parent.set(id, parent.get(parent.get(id)));
            id = parent.get(id);
          }
          return id;
        };
        const union = (a, b) => {
          const ra = find(a);
          const rb = find(b);
          if (ra !== rb) parent.set(ra, rb);
        };
        for (let i = 0; i < wires.length; i++) {
          for (let j = i + 1; j < wires.length; j++) {
            if (wiresTouch(wires[i], wires[j])) union(wires[i].id, wires[j].id);
          }
        }
        page.elements
          .filter(element => element.type === "junction")
          .forEach(junction => {
            const touching = wires.filter(wire =>
              wireSegments(wire).some(segment => pointOnSegment(junction.x || 0, junction.y || 0, segment)));
            for (let k = 1; k < touching.length; k++) union(touching[0].id, touching[k].id);
          });
        const nets = new Map();
        wires.forEach(wire => {
          const root = find(wire.id);
          const list = nets.get(root) || [];
          list.push(wire);
          nets.set(root, list);
        });
        return Array.from(nets.values());
      }

      // ネットの並び順キー(最上端点のy優先)。線番採番の順序を安定化。
      function netSortKey(net) {
        let best = Infinity;
        net.forEach(wire => {
          wireEndpointsOf(wire).forEach(point => {
            const key = point[1] * 1000 + point[0];
            if (key < best) best = key;
          });
        });
        return best;
      }

      // ネットに接している信号矢印ラベル集合(ページ間ネット統合のキー)。
      function netArrowLabels(page, net) {
        const labels = new Set();
        page.elements
          .filter(element => element.type === "arrow" && element.label && !element.ladderRail)
          .forEach(arrow => {
            const points = arrow.points || [];
            const touches = points.some(point =>
              net.some(wire => wireSegments(wire).some(segment => pointOnSegment(point[0], point[1], segment))
                || wireEndpointsOf(wire).some(end => Math.abs(end[0] - point[0]) < 4 && Math.abs(end[1] - point[1]) < 4)));
            if (touches) labels.add(arrow.label);
          });
        return labels;
      }

      // 線番自動採番の本体。ページごとにbuildWireNets()でネット化し、ネット単位で同一線番を割当。
      // 代表(最長)1本のみ表示し他はhideWireNo。固定線番(wireNoFixed)とnoNumber種別は尊重する。
      function autoWireNumbers() {
        const format = state.settings.wireNumberFormat || "%S-%N";
        const allPages = confirm("全ページに線番を付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存の線番も上書きしますか？\nOK: 上書き / キャンセル: 未採番のみ");
        const startInput = prompt("開始番号", "1");
        if (startInput === null) return;
        let next = Number(startInput || 1);
        const pages = allPages ? state.pages : [currentPage()];
        let netCount = 0;
        const signalGroups = new Map(); // 信号矢印ラベル -> { value, members: [{net}] }
        const numberedNets = [];
        pages.forEach(page => {
          const nets = buildWireNets(page)
            .map(net => ({ net, key: netSortKey(net) }))
            .sort((a, b) => a.key - b.key)
            .map(item => item.net);
          nets.forEach(net => {
            const members = net.filter(wire => !wireStyle(wire).noNumber && !wire.ladderRail);
            if (!members.length) return;
            const fixed = members.find(wire => wire.fixedWireNo && wire.wireNo);
            const existing = members.find(wire => wire.wireNo);
            let value = null;
            if (fixed) value = fixed.wireNo;
            else if (!overwrite && existing) value = existing.wireNo;
            if (value === null) {
              value = formatWireNumber(format, page, next, members[0]);
              next += 1;
              netCount += 1;
            }
            members.forEach(wire => {
              if (!wire.fixedWireNo) wire.wireNo = value;
            });
            // ネット内は代表1本のみ表示(最長の配線)。他は自動的に非表示
            const visible = members.slice().sort((a, b) => {
              const lengthOf = wire => wireSegments(wire).reduce((sum, s) => sum + Math.hypot(s[2] - s[0], s[3] - s[1]), 0);
              return lengthOf(b) - lengthOf(a);
            });
            visible.forEach((wire, index) => {
              if (!wire.fixedWireNo) wire.hideWireNo = index !== 0;
            });
            const record = { page, net, members, fixed: Boolean(fixed) };
            numberedNets.push(record);
            netArrowLabels(page, net).forEach(label => {
              const group = signalGroups.get(label) || { value: null, members: [] };
              group.members.push(record);
              if (group.value === null) group.value = value;
              signalGroups.set(label, group);
            });
          });
        });
        // 信号矢印ラベルで結ばれたネットはページをまたいで同一線番を共有する
        let linked = 0;
        signalGroups.forEach(group => {
          if (group.members.length < 2 || group.value === null) return;
          group.members.forEach(record => {
            record.members.forEach(wire => {
              if (!wire.fixedWireNo && wire.wireNo !== group.value) {
                wire.wireNo = group.value;
                linked += 1;
              }
            });
          });
        });
        commitHistory(netCount + "ネットへ線番を付与しました。" + (linked ? "(信号リンクで" + linked + "本を共有)" : ""));
        render();
      }

      // 線番書式(%S=シート,%N=連番,%R=行番号2桁)を展開。
      function formatWireNumber(format, page, number, element) {
        const pageIndex = state.pages.findIndex(item => item.id === page.id) + 1;
        return String(format || "%S-%N")
          .replaceAll("%S", page.title?.page || String(pageIndex))
          .replaceAll("%P", page.name || String(pageIndex))
          .replaceAll("%D", page.title?.drawingNo || "")
          .replaceAll("%I", page.title?.installation || "")
          .replaceAll("%L", page.title?.location || "")
          .replaceAll("%R", element ? String(elementLadderRow(element)).padStart(2, "0") : "")
          .replaceAll("%N", String(number).padStart(2, "0"));
      }

      // 端子番号の振り直し(端子台ごとに開始番号から連番)。
      function renumberTerminals() {
        const page = currentPage();
        const selected = selectedElement();
        const target = selected && ["terminal", "terminalStrip", "connector"].includes(selected.type)
          ? [selected]
          : page.elements.filter(element => ["terminal", "terminalStrip", "connector"].includes(element.type));
        if (!target.length) {
          setStatus("端子または端子台がありません。");
          return;
        }
        const startInput = prompt("端子開始番号", "1");
        if (startInput === null) return;
        const prefix = prompt("端子接頭辞", target[0].prefix || "") ?? "";
        let next = Number(startInput || 1);
        target.forEach(element => {
          if (element.type === "terminal") {
            element.label = prefix + String(next);
            next += 1;
          } else {
            element.prefix = prefix;
            element.start = next;
            next += Number(element.count || 1);
          }
        });
        commitHistory("端子番号を更新しました。");
        render();
      }

      // T分岐へ接続点を自動生成(全ページ/現在ページを確認で選択)。既存接続点の近傍はスキップ。
      function autoJunctions() {
        const allPages = confirm("全ページで接続点を生成しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const pages = allPages ? state.pages : [currentPage()];
        let added = 0;
        pages.forEach(page => {
          const points = detectJunctionPoints(page);
          points.forEach(point => {
            if (hasJunctionNear(page, point.x, point.y)) return;
            page.elements.push({
              id: uid("el"),
              type: "junction",
              x: point.x,
              y: point.y,
              w: 2,
              h: 2,
              r: 0.5,
              rotation: 0,
              stroke: state.settings.stroke
            });
            added += 1;
          });
        });
        commitHistory(added + "個の接続点を生成しました。");
        render();
      }

      // 接続点を置くべきT分岐点(端点が他配線の線分中間に接触)を検出。
      function detectJunctionPoints(page) {
        const wires = page.elements.filter(element => element.type === "wire");
        const segments = [];
        wires.forEach(wire => {
          wireSegments(wire).forEach(segment => segments.push({ wire, segment }));
        });
        const hits = new Map();
        const endpoints = new Map();
        wires.forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            endpoints.set(key, (endpoints.get(key) || 0) + 1);
          });
        });
        endpoints.forEach((count, key) => {
          if (count > 1) hits.set(key, true);
        });
        for (let i = 0; i < segments.length; i++) {
          for (let j = i + 1; j < segments.length; j++) {
            if (segments[i].wire.id === segments[j].wire.id) continue;
            const point = segmentIntersection(segments[i].segment, segments[j].segment);
            if (point) hits.set(pointKey(point.x, point.y), true);
          }
        }
        return Array.from(hits.keys()).map(key => {
          const [x, y] = key.split(",").map(Number);
          return { x, y };
        });
      }

      // 配線の折れ点列→線分配列。
      function wireSegments(wire) {
        const points = wire.points || [[0, 0], [20, 0]];
        if (points.length > 2) {
          const segments = [];
          for (let i = 1; i < points.length; i += 1) {
            segments.push([points[i - 1][0], points[i - 1][1], points[i][0], points[i][1]]);
          }
          return segments;
        }
        const a = points[0];
        const b = points[points.length - 1];
        if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
          return [[a[0], a[1], b[0], b[1]]];
        }
        const c = [a[0], b[1]];
        return [
          [a[0], a[1], c[0], c[1]],
          [c[0], c[1], b[0], b[1]]
        ];
      }

      // 線分同士の交点(直交前提の簡易判定)。
      function segmentIntersection(a, b) {
        const aVertical = Math.abs(a[0] - a[2]) < .001;
        const bVertical = Math.abs(b[0] - b[2]) < .001;
        if (aVertical === bVertical) return null;
        const v = aVertical ? a : b;
        const h = aVertical ? b : a;
        const x = v[0];
        const y = h[1];
        if (between(x, h[0], h[2]) && between(y, v[1], v[3])) return { x: round(x), y: round(y) };
        return null;
      }

      // 値が区間内(端を含む)かの判定。
      function between(value, a, b) {
        return value >= Math.min(a, b) - .001 && value <= Math.max(a, b) + .001;
      }

      // 座標→重複判定用の文字列キー(0.1mm量子化)。
      function pointKey(x, y) {
        return round(x) + "," + round(y);
      }

      // 指定点近傍に既存接続点があるか。
      function hasJunctionNear(page, x, y) {
        return page.elements.some(element => element.type === "junction" && Math.abs((element.x || 0) - x) < .6 && Math.abs((element.y || 0) - y) < .6);
      }

      // 端子台エディタダイアログを開く(端子数/開始/接頭辞/ジャンパ等の一覧編集)。
      function showTerminalEditor() {
        const rows = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => ["terminalStrip", "connector"].includes(element.type))
            .forEach(element => rows.push({ page, element }));
        });
        if (!rows.length) {
          openDialog("端子台エディタ", '<p class="muted">端子台またはコネクタがありません。</p>');
          return;
        }
        const html = `
          <table class="report-table">
            <thead><tr><th>ページ</th><th>種別</th><th>名称</th><th>端子数</th><th>開始</th><th>方向</th><th>形状</th><th>接頭辞</th><th>ジャンパ</th></tr></thead>
            <tbody>
              ${rows.map(({ page, element }) => `
                <tr data-terminal-row="${element.id}">
                  <td>${escapeHtml(page.name)}</td>
                  <td>${escapeHtml(paletteLabel(element.type))}</td>
                  <td><input data-terminal-field="label" value="${escapeAttr(element.label || "")}"></td>
                  <td><input data-terminal-field="count" type="number" min="1" step="1" value="${Number(element.count || 1)}"></td>
                  <td><input data-terminal-field="start" type="number" step="1" value="${Number(element.start || 1)}"></td>
                  <td><select data-terminal-field="orientation"><option value="horizontal"${(element.orientation || "horizontal") === "horizontal" ? " selected" : ""}>横</option><option value="vertical"${element.orientation === "vertical" ? " selected" : ""}>縦</option></select></td>
                  <td><select data-terminal-field="terminalShape"><option value="circle"${(element.terminalShape || "circle") === "circle" ? " selected" : ""}>丸</option><option value="square"${element.terminalShape === "square" ? " selected" : ""}>角</option></select></td>
                  <td><input data-terminal-field="prefix" value="${escapeAttr(element.prefix || "")}"></td>
                  <td><input data-terminal-field="jumpers" value="${escapeAttr(element.jumpers || "")}" placeholder="1-2;3-5"></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="applyTerminalEditorBtn" class="primary">適用</button>
          </div>
        `;
        openDialog("端子台エディタ", html);
        qs("#applyTerminalEditorBtn").addEventListener("click", applyTerminalEditor);
      }

      // 端子台エディタの入力を要素へ反映。
      function applyTerminalEditor() {
        qsa("[data-terminal-row]").forEach(row => {
          const element = findElementById(row.dataset.terminalRow);
          if (!element) return;
          const beforeCount = Number(element.count || 1);
          const beforeOrientation = element.orientation || "horizontal";
          qsa("[data-terminal-field]", row).forEach(input => {
            const key = input.dataset.terminalField;
            element[key] = input.type === "number" ? Number(input.value || 0) : input.value;
          });
          if (Number(element.count || 1) !== beforeCount || (element.orientation || "horizontal") !== beforeOrientation) {
            resizeTerminalElementForOrientation(element);
          }
        });
        closeDialog();
        commitHistory("端子台情報を更新しました。");
        render();
      }

      // 全ページから要素IDで検索し{page,element}を返す。
      function findElementById(id) {
        for (const page of state.pages) {
          const element = page.elements.find(item => item.id === id);
          if (element) return element;
        }
        return null;
      }

      // 部品タグ自動採番(種別接頭辞+書式、タグ固定は尊重)。
      function autoTagComponents() {
        const format = state.settings.componentTagFormat || "%F%N";
        const allPages = confirm("全ページの部品タグを付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存タグ/ラベルも上書きしますか？\nOK: 上書き / キャンセル: 未入力のみ");
        const startInput = prompt("開始番号", "1");
        if (startInput === null) return;
        const parsedStart = Number(startInput || 1);
        const startNumber = Number.isFinite(parsedStart) && parsedStart > 0 ? Math.floor(parsedStart) : 1;
        const pages = allPages ? state.pages : [currentPage()];
        const counters = {};
        let count = 0;
        pages.forEach(page => {
          page.elements.forEach(element => {
            const prefix = tagPrefix(element.type);
            if (!prefix) return;
            if (element.fixedTag) return;
            if (!overwrite && (element.tag || element.label)) return;
            counters[prefix] = (counters[prefix] || (startNumber - 1)) + 1;
            const tag = formatComponentTag(format, page, element, prefix, counters[prefix]);
            element.tag = tag;
            element.label = tag;
            count += 1;
          });
        });
        commitHistory(count + "個の部品タグを付与しました。");
        render();
      }

      // 部品タグ書式(%F=接頭辞,%N=連番,%S=シート,%R=行)を展開。
      function formatComponentTag(format, page, element, prefix, number) {
        const pageIndex = state.pages.findIndex(item => item.id === page.id) + 1;
        const raw = String(format || "%F%N");
        const pattern = raw.includes("%N") ? raw : raw + "%N";
        return pattern
          .replaceAll("%F", prefix || tagPrefix(element.type))
          .replaceAll("%S", page.title?.page || String(pageIndex))
          .replaceAll("%P", page.name || String(pageIndex))
          .replaceAll("%D", page.title?.drawingNo || "")
          .replaceAll("%I", page.title?.installation || element.installation || "")
          .replaceAll("%L", page.title?.location || element.location || "")
          .replaceAll("%R", String(elementLadderRow(element)).padStart(2, "0"))
          .replaceAll("%N", String(number).padStart(2, "0"));
      }

      // 種別→タグ接頭辞(ユーザー上書き優先、空文字は採番対象外)。
      function tagPrefix(type) {
        const custom = state.settings.componentTagPrefixes || {};
        if (Object.prototype.hasOwnProperty.call(custom, type)) return custom[type] || "";
        return DEFAULT_TAG_PREFIXES[type] || "";
      }

      // 部品タグ規則(種別ごとの接頭辞)編集ダイアログを開く。
      function showComponentTagRulesDialog() {
        const custom = state.settings.componentTagPrefixes || {};
        const rows = Object.keys(DEFAULT_TAG_PREFIXES).map(type => {
          const hasCustom = Object.prototype.hasOwnProperty.call(custom, type);
          const value = hasCustom ? custom[type] : DEFAULT_TAG_PREFIXES[type];
          return `
            <tr>
              <td>${escapeHtml(paletteLabel(type))}</td>
              <td>${escapeHtml(DEFAULT_TAG_PREFIXES[type])}</td>
              <td><input data-tag-prefix-type="${escapeAttr(type)}" value="${escapeAttr(value)}"></td>
            </tr>
          `;
        }).join("");
        const html = `
          <p class="muted">部品タグ書式の %F に入るファミリ接頭辞を編集します。空欄にした種別は自動タグ対象外になります。</p>
          <table class="report-table">
            <thead><tr><th>部品種別</th><th>既定</th><th>接頭辞</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="resetComponentTagRulesBtn">既定に戻す</button>
            <button type="button" id="applyComponentTagRulesBtn" class="primary">適用</button>
          </div>
        `;
        openDialog("部品タグ規則", html);
        qs("#resetComponentTagRulesBtn").addEventListener("click", resetComponentTagRules);
        qs("#applyComponentTagRulesBtn").addEventListener("click", applyComponentTagRules);
      }

      // タグ規則ダイアログの入力をsettingsへ反映。
      function applyComponentTagRules() {
        const prefixes = {};
        qsa("[data-tag-prefix-type]", qs("#dialogBody")).forEach(input => {
          const type = input.dataset.tagPrefixType;
          const value = String(input.value || "").trim();
          if (value !== DEFAULT_TAG_PREFIXES[type]) prefixes[type] = value;
        });
        state.settings.componentTagPrefixes = prefixes;
        closeDialog();
        commitHistory("部品タグ規則を更新しました。");
        render();
      }

      // タグ規則を既定値へ戻す。
      function resetComponentTagRules() {
        state.settings.componentTagPrefixes = {};
        closeDialog();
        commitHistory("部品タグ規則を既定に戻しました。");
        render();
      }

      // 要素の表示用タグ(tag属性、無ければlabel)。
      function componentTag(element) {
        return element.tag || element.label || "";
      }

      // 帳票CSV用に電気属性を列オブジェクトへ展開。
      function electricalAttributeColumns(element) {
        return {
          tag: element.tag || "",
          description: element.description || "",
          installation: element.installation || "",
          location: element.location || "",
          manufacturer: element.manufacturer || "",
          catalog: element.catalog || "",
          rating: element.rating || "",
          item: element.item || ""
        };
      }

      // 電気属性を「キー=値」連結の詳細文字列へ整形。
      function electricalAttributeDetail(element) {
        const labels = {
          tag: "tag",
          description: "description",
          installation: "installation",
          location: "location",
          manufacturer: "manufacturer",
          catalog: "catalog",
          rating: "rating",
          item: "item"
        };
        return Object.entries(electricalAttributeColumns(element))
          .filter(([, value]) => String(value || "").trim())
          .map(([key, value]) => labels[key] + "=" + String(value).replace(/\r?\n/g, " / "))
          .join("; ");
      }

      // 属性メモの詳細文字列(note=...)。
      function noteDetail(element) {
        return element.note ? "note=" + String(element.note).replace(/\r?\n/g, " / ") : "";
      }

      // 詳細断片を「 / 」で連結(空は除外)。
      function joinDetails(parts) {
        return parts.filter(part => String(part || "").trim()).join("; ");
      }

      // 帳票の全行を収集(部品/配線/端子を種別recordつきで列挙)。CSV・一覧・表挿入が共用。
      function collectReportRows() {
        const rows = [];
        state.pages.forEach((page, pageIndex) => {
          const netIndexByWire = new Map();
          const signalByWire = new Map();
          buildWireNets(page).forEach((net, netIdx) => {
            const labels = Array.from(netArrowLabels(page, net)).join("/");
            net.forEach(wire => {
              netIndexByWire.set(wire.id, netIdx + 1);
              if (labels) signalByWire.set(wire.id, labels);
            });
          });
          const sheetNo = page.title?.page || String(pageIndex + 1);
          page.elements.forEach(element => {
            if (element.reportTable) return;
            if (element.type === "underlayImage") return;
            const base = {
              pageId: page.id,
              page: page.name || "P" + (pageIndex + 1),
              sheet: page.title?.page || String(pageIndex + 1),
              type: element.type,
              id: element.id,
              ...electricalAttributeColumns(element)
            };
            if (element.type === "wire") {
              const endpoints = wireEndpointNames(page, element);
              const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
              rows.push({ record: "wire", ...base, name: element.wireNo || "", x: endpoints.p0[0], y: endpoints.p0[1], x2: endpoints.p1[0], y2: endpoints.p1[1], detail: joinDetails([wireStyle(element).label, "net=" + sheetNo + "-" + (netIndexByWire.get(element.id) || ""), signalByWire.get(element.id) ? "signal=" + signalByWire.get(element.id) : "", "from=" + endpoints.from, "to=" + endpoints.to, endpoints.manual ? "sequence=manual" : "", element.fixedWireNo ? "fixed=true" : "", element.hideWireNo ? "hidden=true" : "", gapCount ? "gap=true" : "", gapCount ? "gapCount=" + gapCount : "", noteDetail(element)]) });
            } else if (element.type === "terminal") {
              rows.push({ record: "terminal", ...base, name: element.label || "", x: element.x || 0, y: element.y || 0, x2: "", y2: "", detail: joinDetails(["single", electricalAttributeDetail(element), noteDetail(element)]) });
            } else if (["terminalStrip", "connector"].includes(element.type)) {
              const count = Number(element.count || 1);
              const totalNodes = element.stripStyle === "unit" && Number(element.levels) === 2 ? count * 2 : count;
              for (let i = 0; i < totalNodes; i++) {
                rows.push({
                  record: "terminal",
                  ...base,
                  name: terminalLabel(element, i),
                  x: Number(element.x || 0),
                  y: Number(element.y || 0),
                  x2: "",
                  y2: "",
                  detail: joinDetails([element.label || element.type, electricalAttributeDetail(element), noteDetail(element)])
                });
              }
            } else {
              rows.push({
                record: "component",
                ...base,
                name: componentTag(element) || element.text || "",
                x: element.x || "",
                y: element.y || "",
                x2: "",
                y2: "",
                detail: componentDetail(element)
              });
            }
          });
        });
        return rows;
      }

      // 部品1個の詳細文字列(種別+属性)。
      function componentDetail(element) {
        const details = [electricalAttributeDetail(element), noteDetail(element)];
        if (element.fixedTag) details.unshift("fixedTag=true");
        if (element.type === "arrow") details.unshift("role=" + signalRoleLabel(element.signalRole));
        if (element.type === "table") details.unshift("rows=" + (element.rows || ""), "cols=" + (element.cols || ""), element.colWidths ? "colWidths=" + element.colWidths : "", element.rowHeights ? "rowHeights=" + element.rowHeights : "", "cells=" + String(element.cellText || "").replace(/\r?\n/g, " / "));
        if (element.type === "plcBlock") details.unshift("rows=" + (element.rows || ""), "io=" + String(element.pinText || "").replace(/\r?\n/g, " / "));
        if (element.type === "deviceBox") details.unshift("pins=" + (element.pins || ""), "leftPins=" + String(element.pinText || "").replace(/\r?\n/g, " / "), "rightPins=" + String(element.rightPinText || "").replace(/\r?\n/g, " / "));
        if (["installationBox", "locationBox"].includes(element.type)) details.unshift("area=" + (element.type === "installationBox" ? "installation" : "location"), "value=" + (element.label || ""));
        return joinDetails(details);
      }

      // 配線両端の自動FROM/TO名(近傍要素名)を推定。
      function wireEndpointNames(page, element) {
        const p0 = element.points?.[0] || [0, 0];
        const p1 = element.points?.[element.points.length - 1] || [0, 0];
        const autoFrom = nearestElementName(page, p0[0], p0[1], element.id);
        const autoTo = nearestElementName(page, p1[0], p1[1], element.id);
        const from = String(element.fromOverride || "").trim() || autoFrom;
        const to = String(element.toOverride || "").trim() || autoTo;
        return {
          p0,
          p1,
          autoFrom,
          autoTo,
          from,
          to,
          manual: Boolean(String(element.fromOverride || "").trim() || String(element.toOverride || "").trim())
        };
      }

      // 指定点から4mm以内で最も近い要素の表示名(タグ/文字/線番)。
      function nearestElementName(page, x, y, selfId) {
        let best = null;
        page.elements.forEach(element => {
          if (element.id === selfId || element.type === "wire" || element.type === "line") return;
          const box = elementBounds(element);
          if (!box) return;
          const cx = Math.max(box.x, Math.min(x, box.x + box.w));
          const cy = Math.max(box.y, Math.min(y, box.y + box.h));
          const d = Math.hypot(cx - x, cy - y);
          if (d <= 4 && (!best || d < best.d)) {
            best = { d, name: componentTag(element) || element.text || element.wireNo || paletteLabel(element.type) };
          }
        });
        return best?.name || "";
      }

      // 配線順序(FROM/TO)ダイアログを開く(自動推定の確認+手動上書き、全ページFrom-To CSVつき)。
      function showWireSequenceDialog() {
        const page = currentPage();
        const wires = (page?.elements || []).filter(element => element.type === "wire");
        const html = wires.length
          ? `<table class="report-table"><thead><tr><th>線番</th><th>自動FROM</th><th>FROM</th><th>自動TO</th><th>TO</th><th>選択</th></tr></thead><tbody>${wires.map(element => {
              const endpoints = wireEndpointNames(page, element);
              return `<tr data-wire-sequence-row data-id="${escapeAttr(element.id)}">
                <td>${escapeHtml(element.wireNo || "")}</td>
                <td>${escapeHtml(endpoints.autoFrom || "")}</td>
                <td><input data-wire-sequence-field="fromOverride" value="${escapeAttr(element.fromOverride || "")}"></td>
                <td>${escapeHtml(endpoints.autoTo || "")}</td>
                <td><input data-wire-sequence-field="toOverride" value="${escapeAttr(element.toOverride || "")}"></td>
                <td><button type="button" data-select-page="${escapeAttr(page.id)}" data-select-id="${escapeAttr(element.id)}">選択</button></td>
              </tr>`;
            }).join("")}</tbody></table>
            <div class="inline" style="justify-content:flex-end;margin-top:12px">
              <button type="button" id="wireFromToCsvBtn">From-To一覧CSV（全ページ）</button>
              <button type="button" id="applyWireSequenceBtn" class="primary">配線順序を更新</button>
            </div>`
          : `<p class="muted">現在ページに配線がありません。</p>
             <div class="inline" style="justify-content:flex-end;margin-top:12px">
               <button type="button" id="wireFromToCsvBtn">From-To一覧CSV（全ページ）</button>
             </div>`;

        attachDialogSelection();

        qs("#wireFromToCsvBtn")?.addEventListener("click", exportWireFromToCsv);

      // 全ページの配線From-To行(手動上書き優先)を収集。
      function collectWireFromToRows() {
        const rows = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => element.type === "wire" && !element.ladderRail)
            .forEach(wire => {
              const endpoints = wireEndpointNames(page, wire);
              rows.push({
                page: page.name || "",
                wireNo: wire.wireNo || "",
                from: wire.fromOverride || endpoints.autoFrom || "",
                to: wire.toOverride || endpoints.autoTo || "",
                wireType: wire.wireType || ""
              });
            });
        });
        return rows;
      }

      // 配線From-To一覧をwire-from-to.csvへ出力。
      function exportWireFromToCsv() {
        const rows = collectWireFromToRows();
        if (!rows.length) {
          setStatus("配線がないため From-To 一覧を出力できません。");
          return;
        }
        const headers = ["page", "wireNo", "from", "to", "wireType"];
        const csv = [headers.join(","), ...rows.map(row => headers.map(h => csvCell(row[h])).join(","))].join("\r\n");
        download("wire-from-to.csv", csv, "text/csv;charset=utf-8");
        setStatus(`From-To一覧CSVを書き出しました（${rows.length}行）。`);
      }

      // 配線順序ダイアログの手動FROM/TOを要素へ反映。
      function applyWireSequenceDialog() {
        const page = currentPage();
        if (!page) return;
        qsa("[data-wire-sequence-row]", qs("#dialogBody")).forEach(row => {
          const element = page.elements.find(item => item.id === row.dataset.id);
          if (!element || element.type !== "wire") return;
          qsa("[data-wire-sequence-field]", row).forEach(input => {
            element[input.dataset.wireSequenceField] = input.value;
          });
        });
        closeDialog();
        commitHistory("配線順序を更新しました。");
        render();
      }

      // 全要素帳票をelectrical-report.csvへ出力(列は固定の英語キー)。

        const rows = collectReportRows();
        const csv = [
          headers.join(","),
          ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))

      // 帳票種別ごとの選択可能な列の一覧(先頭側=既定でON)。
      const REPORT_COLUMN_POOL = {
        all: ["種別", "ページ", "タグ/名称", "詳細", "設備", "場所"],
        component: ["ページ", "タグ/名称", "説明", "品番", "メーカー", "定格", "設備", "場所"],

      // ダイアログ入力から帳票行を絞り込み、表要素として現在ページへ挿入。
      function insertReportTableFromDialog() {
        const page = currentPage();
        if (!page) return;
        const kind = qs("#insertReportKind").value;
        const maxRows = Math.max(3, Math.min(30, Number(qs("#insertReportRows").value || 12)));
        const title = qs("#insertReportTitle").value || "帳票";
        const filters = {
          installation: qs("#insertReportInstallation").value.trim(),
          location: qs("#insertReportLocation").value.trim()
        };
        const rows = filterReportRows(kind, filters).slice(0, maxRows);
        if (!rows.length) {
          setStatus("挿入できる帳票行がありません。");
          return;
        }
        const table = buildReportTableElement(page, kind, title, rows);
        page.elements.push(table);
        selectSingle(table.id);
        closeDialog();
        commitHistory("帳票表を挿入しました。");
        render();
      }

      // 帳票行を種別・設備・場所で絞り込む。
      function filterReportRows(kind, filters = {}) {
        let rows = collectReportRows();
        if (kind !== "all") rows = rows.filter(row => row.record === kind);
        if (filters.installation) rows = rows.filter(row => String(row.installation || "") === filters.installation);
        if (filters.location) rows = rows.filter(row => String(row.location || "") === filters.location);
        return rows;
      }

      // 帳票行→表要素(ヘッダ行+タブ区切りセル)を構築。列はreportHeaders()に従う。
      function buildReportTableElement(page, kind, title, rows) {
        const headers = reportHeaders(kind);
        const body = rows.map(row => headers.map(header => reportCellValue(row, header)).join("\t"));
        const size = pageSize(page);
        const rowCount = rows.length + 1;
        return {
          id: uid("el"),
          type: "table",
          x: 22,
          y: 42,
          w: Math.min(size.w - 44, 180),
          h: Math.min(size.h - 86, Math.max(28, rowCount * 7)),
          rows: rowCount,
          cols: headers.length,
          label: title,
          cellText: [headers.join("\t"), ...body].join("\n"),
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes",
          reportTable: true
        };
      }

      // 帳票列: プロジェクト設定(reportColumns)に有効な選択があればそれを、なければ既定を返す。
      function reportHeaders(kind) {
        const pool = REPORT_COLUMN_POOL[kind] || REPORT_COLUMN_POOL.all;
        const saved = (state.settings.reportColumns || {})[kind];
        if (Array.isArray(saved)) {
          const valid = saved.filter(column => pool.includes(column));
          if (valid.length) return valid;
        }
        return [...(REPORT_DEFAULT_COLUMNS[kind] || REPORT_DEFAULT_COLUMNS.all)];
      }

      // 帳票行×列名→セル文字列(タブ・改行は無害化)。列を増やす時はこの対応表へ追加する。
      function reportCellValue(row, header) {
        const from = detailValue(row.detail, "from");
        const to = detailValue(row.detail, "to");
        const map = {
          "種別": row.record || row.type || "",
          "ページ": row.page || "",
          "タグ/名称": row.tag || row.name || "",
          "説明": row.description || "",
          "品番": row.catalog || "",
          "メーカー": row.manufacturer || "",
          "定格": row.rating || "",
          "設備": row.installation || "",
          "場所": row.location || "",
          "線番": row.name || "",
          "FROM": from,
          "TO": to,
          "端子": row.name || "",
          "詳細": row.detail || ""
        };
        return String(map[header] || "").replace(/\t/g, " ").replace(/\r?\n/g, " / ");
      }

      // 詳細文字列から「key=値」を取り出す。
      function detailValue(detail, key) {
        const match = String(detail || "").match(new RegExp(key + "=([^;]*)"));
        return match ? match[1].trim() : "";
      }

      // 検索・置換ダイアログを開く(線番/タグ/文字/属性メモ対象)。

        const html = `
          <label for="searchQuery">検索語</label>

            <input id="searchQuery" placeholder="線番、タグ、説明、品番、端子名">
