<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electrical Drawing Studio</title>
  <style>
    /* ===== デザイントークン(配色・影・フォント) ===== */
    :root {
      --bg: #eef1f4;
      --panel: #ffffff;
      --panel-2: #f7f9fb;
      --line: #d6dde5;
      --line-dark: #aab5c1;
      --text: #17202a;
      --muted: #667483;
      --accent: #0f6f63;
      --accent-2: #d96332;
      --danger: #b42318;
      --shadow: 0 14px 36px rgba(20, 31, 44, .16);
      --mono: "Consolas", "Yu Gothic UI", monospace;
      --ui: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: var(--ui);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 9px;
      cursor: pointer;
      min-height: 32px;
      /* ボタン文言の途中改行を防ぐ(見た目崩れ対策)。長文はボタン側でなく行側で折り返す */
      white-space: nowrap;
    }

    button:hover { border-color: var(--line-dark); background: #f9fbfc; }
    button:active { transform: translateY(1px); }

    button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
      font-family: var(--mono);
    }

    button.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      min-height: 32px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 9px 0 4px;
    }

    details.attr-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      padding: 8px;
    }

    details.attr-panel summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      list-style-position: inside;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 48px 40px minmax(0, 1fr);
    }

    /* ===== 上部ツールバー・ページタブ(共通の帯スタイル) ===== */
    .topbar,
    .tabbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 210px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      position: relative;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      /* inset+margin:autoで枠線の太さに関係なく十字を完全中央に置く */
      inset: 0;
      margin: auto;
      background: var(--accent);
    }

    .brand-mark::before { width: 12px; height: 2px; }
    .brand-mark::after { width: 2px; height: 12px; }

    .top-actions,
    .tool-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .spacer { flex: 1; }

    /* ツールバー内の論理区切り(ファイル/検索・表題欄/出力) */
    .tool-sep {
      width: 1px;
      height: 22px;
      background: var(--line);
      margin: 0 4px;
      align-self: center;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 38vw;
    }

    .tabbar {
      padding: 5px 10px;
      overflow-x: auto;
      gap: 6px;
    }

    .page-tab {
      min-width: 92px;
      max-width: 190px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .page-tab.active {
      border-color: var(--accent);
      background: #e6f4f1;
      color: #064e45;
    }

    /* ===== 3カラムレイアウト(左パレット/中央キャンバス/右パネル) ===== */
    .shell {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 304px;
    }

    /* ===== 左パネル(部品パレット)・右パネル共通のスクロール領域 ===== */
    .palette,
    .inspector {
      min-height: 0;
      overflow: auto;
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 12px;
    }

    .inspector {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #334150;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 6px 0 10px;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    details.palette-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px 8px;
      margin-top: 8px;
    }

    details.palette-group summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: #334150;
      user-select: none;
    }

    details.palette-group .palette-grid { margin-top: 8px; }

    .palette-item {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      grid-template-rows: 30px auto;
      align-items: center;
      justify-items: center;
      padding: 7px 6px;
      cursor: grab;
      user-select: none;
    }

    .palette-item:hover,
    .palette-item.active {
      border-color: var(--accent);
      background: #f1fbf8;
    }

    .palette-icon {
      width: 50px;
      height: 28px;
      color: #14202c;
    }

    /* 実描画アイコン: 図面用クラスはvector-effect併用のため、アイコン内では線幅を画面px固定にする */
    .palette-icon [class] { stroke-width: 1.35; }
    /* アイコンではタグ等の入力文字を表示しない(文字部品のアイコンのみ例外) */
    .palette-icon text { display: none; }
    .palette-icon.icon-keep-text text { display: initial; }

    .palette-label {
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .section {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 12px;
    }

    /* ===== 中央キャンバス ===== */
    /* キャンバス上部の操作ヒント(現在のツールで何ができるかを常時案内) */
    .canvas-hint {
      position: sticky;
      top: 8px;
      z-index: 5;
      width: max-content;
      max-width: 92%;
      margin: 0 auto -28px;
      padding: 4px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .93);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 2px 8px rgba(20, 31, 44, .08);
    }

    /* その場編集ボックス(ダブルクリック編集)。位置はJSがfixedで算出する */
    .inline-editor {
      position: fixed;
      z-index: 60;
      min-width: 56px;
      padding: 2px 6px;
      border: 1.5px solid var(--accent, #2563eb);
      border-radius: 4px;
      background: #fff;
      color: #16202b;
      font-family: inherit;
      box-shadow: 0 3px 12px rgba(20, 31, 44, .25);
      outline: none;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      position: relative;
      background:
        linear-gradient(90deg, rgba(40, 54, 70, .06) 1px, transparent 1px),
        linear-gradient(rgba(40, 54, 70, .06) 1px, transparent 1px),
        var(--bg);
      background-size: 20px 20px;
    }

    .stage {
      min-width: max-content;
      min-height: max-content;
      padding: 34px;
      display: grid;
      place-items: start center;
    }

    .drawing-page {
      background: #fff;
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
      overflow: visible;
    }

    .svg-text {
      font-family: "Yu Gothic UI", "Meiryo", sans-serif;
      fill: #101820;
    }

    .frame-line { stroke: #141a20; stroke-width: .25; fill: none; vector-effect: non-scaling-stroke; }
    .frame-thick { stroke: #141a20; stroke-width: .45; fill: none; vector-effect: non-scaling-stroke; }
    .frame-light { stroke: #5e6872; stroke-width: .18; fill: none; vector-effect: non-scaling-stroke; }
    .wire-line { stroke: #111820; stroke-width: .38; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; }
    .dash-line { stroke-dasharray: 3 2; }
    .symbol-fill { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }
    .symbol-line { stroke: #111820; stroke-width: .32; fill: none; vector-effect: non-scaling-stroke; stroke-linecap: square; stroke-linejoin: round; }
    .terminal-dot { fill: #fff; stroke: #111820; stroke-width: .32; vector-effect: non-scaling-stroke; }

    .element:hover .symbol-line,
    .element:hover .wire-line,
    .element:hover .symbol-fill {
      stroke: var(--accent-2);
    }

    .selection-box {
      fill: none;
      stroke: var(--accent);
      stroke-width: .5;
      stroke-dasharray: 2 1.2;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle {
      fill: #fff;
      stroke: var(--accent);
      stroke-width: .45;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selection-handle.resize-handle {
      pointer-events: all;
      cursor: nwse-resize;
    }

    .point-handle {
      fill: #fff;
      stroke: var(--accent-2);
      stroke-width: .55;
      vector-effect: non-scaling-stroke;
      pointer-events: all;
      cursor: crosshair;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .danger { color: var(--danger); }

    /* ===== 共通ダイアログ ===== */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(20, 31, 44, .42);
      z-index: 10;
    }

    .dialog-backdrop.hidden { display: none; }

    .dialog {
      width: min(760px, calc(100vw - 48px));
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    /* 印刷プレビュー等の広幅ダイアログ(openDialogの{wide:true}で有効化) */
    .dialog.wide {
      width: min(1100px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .dialog-title {
      font-weight: 700;
      font-size: 16px;
    }

    /* ===== ダイアログ内の一覧表 ===== */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .report-table th,
    .report-table td {
      border: 1px solid var(--line);
      padding: 6px 7px;
      text-align: left;
      vertical-align: top;
    }

    .report-table th {
      background: var(--panel-2);
      color: #334150;
      font-weight: 700;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 7px;
    }

    .swatch {
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      cursor: pointer;
    }

    .swatch.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ===== 印刷用シート(通常時は非表示) ===== */
    .print-sheets { display: none; }

    #fileInput,
    #terminalCsvInput,
    #plcCsvInput,
    #underlayInput,
    #underlayTwoUpInput,
    #dxfImportInput,
    #packImportInput { display: none; }

    /* ===== 印刷時: 画面UIを隠して印刷シートのみ表示 ===== */
    @media print {
      @page { margin: 0; }
      @page a4p { size: 210mm 297mm; margin: 0; }
      @page a4l { size: 297mm 210mm; margin: 0; }
      @page a3p { size: 297mm 420mm; margin: 0; }
      @page a3l { size: 420mm 297mm; margin: 0; }

      html,
      body {
        width: auto;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      .app { display: none; }
      .print-sheets { display: block; }

      .print-sheet {
        display: block;
        page-break-after: always;
        break-after: page;
        margin: 0;
      }

      .print-sheet.page-a4-portrait { page: a4p; }
      .print-sheet.page-a4-landscape { page: a4l; }
      .print-sheet.page-a3-portrait { page: a3p; }
      .print-sheet.page-a3-landscape { page: a3l; }

      .print-sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .print-sheet > svg {
        display: block;
        width: 100%;
        height: 100%;
        box-shadow: none;
      }
    }

    /* ================================================================
       デザイン/アニメーション強化レイヤ
       - 画面表示専用の装飾(印刷時は.appごと非表示のため出力へ影響しない)
       - 再レンダリングで作り直されるDOM(パレット/タブ/右パネル)には
         「登場アニメ」を付けない(操作のたびに再生されてしまうため)。
         hover/focus遷移・イベント駆動(ダイアログ開閉/ステータス更新)・
         無限ループ(選択枠の破線送り)のみを使う。
       - すべてのモーションはprefers-reduced-motion: reduceで無効化される。
       ================================================================ */
    :root {
      --ease: cubic-bezier(.2, .7, .3, 1);
      --shadow-1: 0 1px 2px rgba(20, 31, 44, .05), 0 2px 8px rgba(20, 31, 44, .07);
      --shadow-2: 0 2px 6px rgba(20, 31, 44, .08), 0 8px 22px rgba(20, 31, 44, .13);
      --focus-ring: 0 0 0 3px rgba(15, 111, 99, .20);
    }

    /* --- 基本コントロール: 状態遷移とフォーカスリング --- */
    button {
      transition: background-color .16s var(--ease), border-color .16s var(--ease),
                  color .16s var(--ease), box-shadow .16s var(--ease), transform .1s var(--ease);
    }
    button:hover { box-shadow: var(--shadow-1); }
    button:active { transform: translateY(1px); box-shadow: none; }
    button:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; transform: none; }
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .palette-item:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
    }
    input, select, textarea {
      transition: border-color .16s var(--ease), box-shadow .16s var(--ease);
    }
    button.primary { box-shadow: 0 2px 8px rgba(15, 111, 99, .26); }
    button.primary:hover { background: #0c5f55; border-color: #0c5f55; box-shadow: 0 4px 14px rgba(15, 111, 99, .32); }
    button.active { box-shadow: inset 0 0 0 1px var(--accent); }

    /* --- 上部バー: わずかなグラデーションで面の重なりを表現 --- */
    .topbar { background: linear-gradient(180deg, #ffffff, #fafcfd); }
    .brand-mark { transition: transform .35s var(--ease); }
    .brand:hover .brand-mark { transform: rotate(90deg); }

    /* --- ページタブ: アクセント下線+ホバー浮き --- */
    .page-tab { position: relative; transition: border-color .16s var(--ease), background-color .16s var(--ease), box-shadow .16s var(--ease); }
    .page-tab:hover { box-shadow: var(--shadow-1); }
    .page-tab.active::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 2px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
    }

    /* --- パレット: ホバーで浮き+アイコン微拡大(登場アニメは付けない) --- */
    .palette-item {
      transition: border-color .16s var(--ease), background-color .16s var(--ease),
                  box-shadow .2s var(--ease), transform .2s var(--ease);
    }
    .palette-item:hover { box-shadow: var(--shadow-2); transform: translateY(-1px); }
    .palette-item:active { cursor: grabbing; transform: translateY(0) scale(.985); box-shadow: var(--shadow-1); }
    .palette-icon { transition: transform .2s var(--ease); }
    .palette-item:hover .palette-icon { transform: scale(1.09); }

    /* --- 選択枠: 破線送り(マーチングアンツ)。ドラッグ中は再生成されるため実質静止=負荷なし --- */
    .selection-box { animation: ants 1.2s linear infinite; }
    @keyframes ants { to { stroke-dashoffset: -6.4; } }

    /* --- ダイアログ: 背景フェード+本体ポップイン(開いた時のみ再生) --- */
    .dialog-backdrop { animation: backdrop-in .18s ease-out; backdrop-filter: blur(2px); }
    .dialog-backdrop.hidden { animation: none; }
    .dialog { animation: dialog-in .2s var(--ease); }
    @keyframes backdrop-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dialog-in {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* --- ステータス/キャンバスヒント: 更新時にJSが.popを付け直して1回だけ再生 --- */
    .status { transition: color .2s var(--ease); }
    .status.pop { animation: status-pop .3s var(--ease); }
    @keyframes status-pop {
      from { opacity: .25; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .canvas-hint { transition: box-shadow .2s var(--ease); }
    .canvas-hint.pop { animation: hint-pop .26s var(--ease); }
    @keyframes hint-pop {
      from { opacity: .3; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- その場編集ボックス: 出現ポップ(dblclickイベント時のみ生成) --- */
    .inline-editor { animation: editor-pop .15s var(--ease); }
    @keyframes editor-pop {
      from { opacity: 0; transform: scale(.94); }
      to { opacity: 1; transform: scale(1); }
    }

    /* --- 一覧表・スウォッチ・折りたたみの触感 --- */
    .report-table tbody tr { transition: background-color .12s var(--ease); }
    .report-table tbody tr:hover { background: #f2f6fa; }
    .swatch { transition: transform .14s var(--ease), box-shadow .14s var(--ease); }
    .swatch:hover { transform: scale(1.12); box-shadow: var(--shadow-1); }
    details.attr-panel summary { transition: color .14s var(--ease); }
    details.attr-panel summary:hover { color: var(--accent); }

    /* --- スクロールバー(細身・角丸でパネルに馴染ませる) --- */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #c4cedb;
      border-radius: 8px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: #a7b5c4; }

    /* ================================================================
       ビジュアルリフレッシュ層(静的な見た目の刷新)
       - ダークツールバー / 紙の立体感 / タブ・パネルの質感 / 見出しのアクセントバー
       - 画面表示専用。印刷時は.appごと非表示のため出力へは影響しない。
       ================================================================ */

    /* --- 上部ツールバー: ダークスレートのアプリバー --- */
    .topbar {
      background: linear-gradient(180deg, #2a3950, #223044);
      border-bottom: 1px solid #17202e;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .06) inset, 0 2px 10px rgba(16, 24, 36, .25);
      color: #e7edf4;
    }
    .topbar .brand { color: #fff; letter-spacing: .01em; }
    .topbar .brand-mark { border-color: #4fd1bd; background: rgba(79, 209, 189, .08); }
    .topbar .brand-mark::before, .topbar .brand-mark::after { background: #4fd1bd; }
    .topbar button {
      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .16);
      color: #dfe7ee;
    }
    .topbar button:hover {
      background: rgba(255, 255, 255, .14);
      border-color: rgba(255, 255, 255, .3);
      box-shadow: 0 2px 8px rgba(10, 16, 24, .35);
    }
    .topbar button.primary {
      background: var(--accent);
      border-color: rgba(255, 255, 255, .18);
      color: #fff;
      box-shadow: 0 2px 10px rgba(9, 84, 74, .5);
    }
    .topbar button.primary:hover { background: #128576; }
    .topbar button.active {
      background: var(--accent);
      border-color: #4fd1bd;
      color: #fff;
      box-shadow: 0 0 0 1px rgba(79, 209, 189, .4), 0 2px 8px rgba(9, 84, 74, .45);
    }
    .topbar .tool-sep { background: rgba(255, 255, 255, .16); }
    .topbar .status { color: #9db0c2; }
    .topbar button:focus-visible { box-shadow: 0 0 0 3px rgba(79, 209, 189, .35); border-color: #4fd1bd; }

    /* --- ページタブ帯: 面を一段引いて、アクティブタブを紙のように浮かせる --- */
    .tabbar {
      background: #e8edf3;
      border-bottom: 1px solid #d2dae3;
      box-shadow: inset 0 6px 8px -8px rgba(31, 45, 61, .25);
    }
    .page-tab {
      background: transparent;
      border-color: transparent;
      color: #5a6a7a;
    }
    .page-tab:hover { background: #dde4ec; border-color: #ccd6e0; box-shadow: none; }
    .page-tab.active {
      background: #fff;
      border-color: #ccd6e0;
      color: var(--text);
      box-shadow: 0 1px 3px rgba(31, 45, 61, .12);
    }

    /* --- 作業領域: ドット方眼の下地で図面の「紙」を際立たせる --- */
    .workspace {
      background:
        radial-gradient(rgba(90, 106, 122, .16) 1px, transparent 1.1px),
        linear-gradient(180deg, #e9edf2, #e3e9ef);
      background-size: 16px 16px, 100% 100%;
    }
    .drawing-page {
      box-shadow:
        0 0 0 1px #c9d3dd,
        0 2px 6px rgba(31, 45, 61, .12),
        0 18px 44px rgba(31, 45, 61, .22);
    }
    .canvas-hint {
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(6px);
      border-color: rgba(31, 45, 61, .12);
      color: #46586a;
    }

    /* --- 左右パネル: 見出しへアクセントバー、面をわずかに色分け --- */
    .palette, .inspector { background: #fbfcfe; }
    .panel-title {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #2b3948;
    }
    .panel-title::before {
      content: "";
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: var(--accent);
      flex: none;
    }
    details.palette-group {
      background: #fff;
      border-color: #dbe3ea;
      box-shadow: 0 1px 2px rgba(31, 45, 61, .04);
    }
    details.palette-group summary { color: #3d4d5d; }
    details.palette-group[open] summary { color: var(--accent); }
    .palette-item { background: linear-gradient(180deg, #ffffff, #fafcfe); }
    .section { border-top-color: #e3e9ef; }

    /* --- 入力・スライダーの質感 --- */
    input, select, textarea { background: #fdfeff; border-color: #d3dce4; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 26px;
      padding: 0;
      border: 0;
      background: transparent;
      min-height: 26px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), #cfd9e2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      margin-top: -5.5px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--accent);
      box-shadow: 0 1px 4px rgba(31, 45, 61, .25);
      cursor: pointer;
    }

    /* --- ダイアログ: 角丸と見出し罫を上質に --- */
    .dialog { border-radius: 12px; border-color: #d8e0e8; }
    .dialog-header { border-bottom: 2px solid #eef2f6; position: relative; }
    .dialog-header::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 64px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
    }

    /* --- ページ並べて表示(1スロット=見出し+ページSVG。activeが編集対象) --- */
    .stage.multi-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 44px;
    }
    .stage.multi-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .page-slot { margin-bottom: 36px; flex: none; }
    .page-slot-head {
      display: flex;
      align-items: center;
      gap: 4px;
      width: max-content;
      margin: 0 auto 6px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      color: #5a6a7a;
      cursor: pointer;
      user-select: none;
      transition: color .16s var(--ease), background-color .16s var(--ease), border-color .16s var(--ease);
    }
    .page-slot-head:hover { background: #dde4ec; border-color: #ccd6e0; }
    .page-slot-head .slot-label { padding: 1px 6px; }
    .page-slot-head .slot-move {
      min-height: 0;
      padding: 1px 6px;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: 11px;
      box-shadow: none;
      border-radius: 999px;
    }
    .page-slot-head .slot-move:hover { background: rgba(20, 31, 44, .12); box-shadow: none; transform: none; }
    .page-slot-head .slot-move:disabled { opacity: .35; }
    .page-slot.active .page-slot-head {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 700;
    }
    .page-slot.active .drawing-page {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* --- 右クリックコンテキストメニュー --- */
    .context-menu {
      position: fixed;
      z-index: 70;
      min-width: 210px;
      padding: 6px;
      background: #fff;
      border: 1px solid #d8e0e8;
      border-radius: 10px;
      box-shadow: var(--shadow-2);
      display: flex;
      flex-direction: column;
      gap: 2px;
      animation: dialog-in .12s var(--ease);
    }
    .context-menu.hidden { display: none; }
    .context-menu button {
      border: 0;
      background: transparent;
      text-align: left;
      padding: 7px 10px;
      border-radius: 6px;
      min-height: 0;
      box-shadow: none;
      white-space: nowrap;
    }
    .context-menu button:hover { background: #eef4f2; color: var(--accent); box-shadow: none; transform: none; }
    .context-menu button:disabled { opacity: .45; }
    .context-sep { height: 1px; background: #e6ebf1; margin: 4px 6px; }

    /* --- モーション低減設定の尊重(全アニメ・遷移を実質停止) --- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 上部ツールバー: 新規/開く/復元/保存・検索・ヘルプ・表題欄・印刷/出力・ツール切替 -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Electrical Drawing Studio</span>
      </div>
      <div class="top-actions">
        <button type="button" id="newProjectBtn" title="新規プロジェクト">新規</button>
        <button type="button" id="openBtn" title="JSONを開く">開く</button>
        <button type="button" id="restoreBackupBtn" title="ブラウザ内の自動保存を復元">復元</button>
        <button type="button" id="saveBtn" class="primary" title="JSONで保存">保存</button>
        <span class="tool-sep" aria-hidden="true"></span>
        <button type="button" id="searchBtn" title="線番・タグ・文字を検索/置換">検索</button>
        <button type="button" id="helpBtn" title="使い方とショートカット">ヘルプ</button>
        <button type="button" id="titleBatchBtn" title="全ページの表題欄を一括更新">表題欄</button>
        <span class="tool-sep" aria-hidden="true"></span>
        <button type="button" id="printPreviewBtn" title="印刷イメージを画面で確認">プレビュー</button>
        <button type="button" id="printBtn" title="全ページをPDF印刷">PDF印刷</button>
        <button type="button" id="printTwoUpBtn" title="A3縦に2ページずつ面付けして印刷">A3面付</button>
        <button type="button" id="exportSvgBtn" title="現在ページをSVG出力">SVG</button>
        <button type="button" id="exportPngBtn" title="現在ページをPNG出力">PNG</button>
      </div>
      <div class="spacer"></div>
      <div class="tool-actions" role="toolbar" aria-label="作図ツール">
        <button type="button" class="icon active" data-tool="select" title="選択/移動（ショートカット: S または V）">S</button>
        <button type="button" class="icon" data-tool="wire" title="直交配線を引く（ショートカット: W）">W</button>
        <button type="button" class="icon" data-tool="text" title="文字を配置（ショートカット: T）">T</button>
        <button type="button" class="icon" id="undoBtn" title="元に戻す（Ctrl+Z）">U</button>
        <button type="button" class="icon" id="redoBtn" title="やり直し（Ctrl+Y）">R</button>
        <button type="button" class="icon" id="deleteBtn" title="選択を削除（Delete）">X</button>
      </div>
      <div class="status" id="status">A4縦の図枠付きページを作成しました。</div>
    </header>

    <!-- ページタブ(renderTabs()が中身を生成。ダブルクリックで改名) -->
    <nav class="tabbar" id="tabbar" aria-label="ページタブ"></nav>

    <!-- 本体3カラム。左=パレット/設定/機能メニュー、中央=SVGキャンバス、右=ページ設定/選択編集 -->
    <main class="shell">
      <!-- 左パネル: 部品パレット(renderPalette)・表示設定・配線/レイヤ・自動処理/機能メニュー -->
      <aside class="palette">
        <div class="panel-title">部品パレット</div>
        <button type="button" id="selectOnlyBtn" data-tool="select" style="width:100%;margin-bottom:8px">選択</button>
        <input id="paletteFilter" type="search" placeholder="部品検索" aria-label="部品検索">
        <div id="paletteGrid"></div>

        <div class="section">
          <div class="panel-title">表示</div>
          <label for="zoomRange">ズーム</label>
          <input id="zoomRange" type="range" min="0.8" max="24" step=".1" value="3.2">
          <div class="row-3" style="margin-top:8px">
            <button type="button" id="zoomOutBtn">縮小</button>
            <button type="button" id="zoomInBtn">拡大</button>
            <button type="button" id="actualSizeBtn">標準</button>
          </div>
          <button type="button" id="fitPageBtn" style="width:100%;margin-top:8px">全体表示</button>
          <label for="pageViewMode">ページ表示</label>
          <select id="pageViewMode" title="タブ=1ページずつ ／ 並べて表示=全ページを並べてどのページも直接編集（見出しの◀▶で並び替え）">
            <option value="tab">タブ（1ページずつ）</option>
            <option value="row">並べて表示（横）</option>
            <option value="column">並べて表示（縦）</option>
          </select>
          <div class="row">
            <div>
              <label for="gridSize">グリッド mm</label>
              <input id="gridSize" type="number" min="1" step="0.5" value="2.5">
            </div>
            <div>
              <label for="snapToggle">スナップ</label>
              <select id="snapToggle">
                <option value="on">ON</option>
                <option value="off">OFF</option>
              </select>
            </div>
          </div>
          <label for="objectSnapToggle">端点スナップ</label>
          <select id="objectSnapToggle">
            <option value="on">ON</option>
            <option value="off">OFF</option>
          </select>
          <label for="underlayOutputToggle">下絵をPDF/SVG/PNGに含める</label>
          <select id="underlayOutputToggle">
            <option value="off">OFF</option>
            <option value="on">ON</option>
          </select>
          <p class="muted">左の部品をドラッグして用紙に配置します。配線は W ツールでドラッグ、部品は選択後に移動できます。</p>
        </div>

        <div class="section">
          <div class="panel-title">配線・レイヤ</div>
          <label for="currentWireType">配線種別</label>
          <select id="currentWireType"></select>
          <label for="currentLayer">作図レイヤ</label>
          <select id="currentLayer"></select>
        </div>

        <div class="section">
          <div class="panel-title">自動処理・ツール</div>
          <div class="row">
            <button type="button" id="autoWireBtn" title="ページごとに同電位ネット単位で線番を自動付与">線番採番</button>
            <button type="button" id="auditBtn" title="未接続・未採番・重複などを一括チェック">監査</button>
          </div>
          <details class="attr-panel" style="margin-top:8px">
            <summary>採番の書式設定（線番 %S-%N ／ タグ %F%N）</summary>
            <label for="wireNumberFormat">線番書式（%S=シート %N=連番 %R=行）</label>
            <input id="wireNumberFormat" type="text" value="%S-%N">
            <label for="componentTagFormat">部品タグ書式（%F=種別接頭辞 %N=連番）</label>
            <input id="componentTagFormat" type="text" value="%F%N">
          </details>
          <label for="actionMenu">機能メニュー</label>
          <select id="actionMenu">
            <option value="">選択してください…</option>
            <optgroup label="自動処理">
              <option value="terminalNo">端子番号の振り直し</option>
              <option value="tagComponents">部品タグ採番</option>
              <option value="autoJunction">接続点生成</option>
              <option value="rotateAbout">指定回転（中心指定）</option>
              <option value="wireSequence">配線順序(FROM/TO)</option>
              <option value="addRung">ラング追加</option>
              <option value="rungShift">行挿入/行削除（行シフト）</option>
            </optgroup>
            <optgroup label="一括生成">
              <option value="rungCircuit">ラング回路（接点+コイル/ランプ）</option>
              <option value="estopChain">非常停止チェーン</option>
              <option value="powerOn">電源投入回路（自己保持）</option>
              <option value="brake">ブレーキ/整流回路</option>
              <option value="wireColumn">縦配線列</option>
              <option value="wireRow">横配線行</option>
              <option value="twistedPair">ツイストペア</option>
              <option value="motorCircuit">モータ分岐回路</option>
              <option value="plcUnit">PLCユニット</option>
              <option value="panelLink">盤レイアウト連携</option>
              <option value="dinRail">DINレール／配線ダクト</option>
              <option value="insertUserCircuit">ユーザー回路を挿入</option>
            </optgroup>
            <optgroup label="一覧・管理">
              <option value="projects">プロジェクト管理（ブラウザ内保存）</option>
              <option value="terminalEditor">端子台エディタ</option>
              <option value="cableManager">ケーブル・芯線エディタ</option>
              <option value="locationView">設置場所・接続ビュー</option>
              <option value="plcModuleManager">PLCモジュールDB</option>
              <option value="saveUserCircuit">選択範囲をユーザー回路登録</option>
              <option value="tagRules">部品タグ規則</option>
              <option value="wireTypeManager">配線種別管理</option>
              <option value="layerManager">レイヤ管理</option>
              <option value="catalog">部品カタログ</option>
              <option value="symbolManager">ユーザー部品管理</option>
              <option value="symbolBuilder">シンボルビルダー（マウス作図）</option>
              <option value="historyTimeline">履歴タイムライン（操作をさかのぼる）</option>
              <option value="revisionHistory">改訂履歴</option>
            </optgroup>
            <optgroup label="帳票・確認">
              <option value="crossRef">クロスリファレンス</option>
              <option value="reportCsv">帳票CSV出力</option>
              <option value="reportTable">図面要素一覧</option>
              <option value="insertReport">帳票表挿入</option>
              <option value="bom">部品集計表(BOM)</option>
              <option value="terminalPlan">端子台プラン表</option>
              <option value="indexGen">目次生成（全ページ一覧）</option>
              <option value="netlist">ネットリスト（ページ間統合）</option>
            </optgroup>
            <optgroup label="取込・出力">
              <option value="terminalCsv">端子CSV取込</option>
              <option value="plcCsv">PLC CSV取込</option>
              <option value="importDxf">DXF取込</option>
              <option value="exportDxf">DXF出力（現在ページ）</option>
              <option value="exportDxfAll">DXF出力（全ページ）</option>
              <option value="exportPack">標準パック出力</option>
              <option value="importPack">標準パック取込</option>
              <option value="titleLayout">表題欄レイアウト編集（JSON）</option>
              <option value="diffViewer">図面差分（旧版JSONと比較）</option>
            </optgroup>
          </select>
        </div>
      </aside>

      <!-- 中央: 図面キャンバス。drawPageSvg()がSVGを再構築し、pointerイベントで作図/選択する -->
      <section class="workspace" id="workspace">
        <div id="canvasHint" class="canvas-hint" aria-live="polite"></div>
        <div class="stage">
          <svg id="canvas" class="drawing-page" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="図面キャンバス"></svg>
        </div>
      </section>

      <!-- 右パネル: ページ設定・表題欄・テンプレート/下絵メニュー・選択中要素の編集(renderSelectionPanel) -->
      <aside class="inspector">
        <div class="panel-title">ページ設定</div>
        <label for="drawingStandard">標準</label>
        <select id="drawingStandard"></select>
        <label for="pageName">ページ名</label>
        <input id="pageName" type="text">
        <label><input id="showPageNameToggle" type="checkbox" style="width:auto;min-height:auto"> 図面上部にページ名を表示</label>
        <div class="row">
          <div>
            <label for="paperSize">用紙</label>
            <select id="paperSize">
              <option value="A4">A4</option>
              <option value="A3">A3</option>
            </select>
          </div>
          <div>
            <label for="paperOrientation">向き</label>
            <select id="paperOrientation">
              <option value="portrait">縦</option>
              <option value="landscape">横</option>
            </select>
          </div>
        </div>
        <label for="frameVariant">図枠/表題欄</label>
        <select id="frameVariant">
          <option value="compact">基本: 右下表題欄</option>
          <option value="detailed">詳細: 右下+改訂欄</option>
          <option value="side">側面表題欄</option>
          <option value="index">目次/表紙: 大型表欄</option>
          <option value="ladder">設備標準: 行番号+機器符号表</option>
          <option value="blank">枠線のみ</option>
        </select>

        <label for="drawingTitle">図名</label>
        <input id="drawingTitle" type="text">
        <details class="attr-panel">
          <summary>表題欄の詳細（図番・改訂・作成・設備/場所・側注記）</summary>
          <div class="row">
            <div>
              <label for="drawingNo">図番</label>
              <input id="drawingNo" type="text">
            </div>
            <div>
              <label for="revision">改訂</label>
              <input id="revision" type="text">
            </div>
          </div>
          <div class="row">
            <div>
              <label for="designer">作成</label>
              <input id="designer" type="text">
            </div>
            <div>
              <label for="drawDate">日付</label>
              <input id="drawDate" type="text">
            </div>
          </div>
          <div class="row">
            <div>
              <label for="pageInstallation">設備コード</label>
              <input id="pageInstallation" type="text">
            </div>
            <div>
              <label for="pageLocation">場所コード</label>
              <input id="pageLocation" type="text">
            </div>
          </div>
          <label for="pageSideNote">側注記（左余白の縦書き）</label>
          <input id="pageSideNote" type="text" placeholder="設備名など">
        </details>

        <div class="section">
          <div class="inline">
            <button type="button" id="addPageBtn">ページ追加</button>
            <button type="button" id="duplicatePageBtn">複製</button>
            <button type="button" id="deletePageBtn">削除</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="movePagePrevBtn">前へ</button>
            <button type="button" id="movePageNextBtn">後へ</button>
          </div>
          <label for="pageOrder">ページ順</label>
          <input id="pageOrder" type="number" min="1" step="1">
          <label for="templateMenu">テンプレートからページ追加</label>
          <select id="templateMenu">
            <option value="">選択してください…</option>
            <option value="facilityLadder">設備ラダー</option>
            <option value="acPower">AC電源回路（受電・分岐）</option>

      function alignLegacyTransformerTopTapConnections(data) {
        const near = (a, b) => Math.abs(Number(a) - Number(b)) < 0.02;
        const elementLists = [];

        elementLists.forEach(elements => {
          const moves = [];

      const MIGRATIONS = {
        // 1→2: schemaVersion欄の導入。構造変更はないが、欠落しがちな頁下位欄を補完する。
        1: data => {

        },
        // 2→3: 接続ピンの2.5mmグリッド正規化。接点系(幅8→10)・遮断器(12→12.5)・接点ブロック(14→15)・
        // 変圧器(14→15)・モータ端子・ブザー等の既定寸法を新ジオメトリへ合わせ、
        // 旧ピン位置で終端していた配線・接続点(junction)を新ピンへ追従させる。
        2: data => {
          const near = (a, b) => Math.abs(a - b) < 0.02;
          const elementLists = [];
          (Array.isArray(data.pages) ? data.pages : []).forEach(page => {
            if (isPlainObject(page) && Array.isArray(page.elements)) elementLists.push(page.elements);
          });
          const collectCustomSymbolTemplates = symbols => {
            (Array.isArray(symbols) ? symbols : []).forEach(symbol => {
              if (!isPlainObject(symbol)) return;
              if (Array.isArray(symbol.templates)) elementLists.push(symbol.templates);
              else if (isPlainObject(symbol.template)) elementLists.push([symbol.template]);
            });
          };
          collectCustomSymbolTemplates(data.customSymbols);
          (Array.isArray(data.standardPacks) ? data.standardPacks : []).forEach(pack => {
            if (isPlainObject(pack)) collectCustomSymbolTemplates(pack.customSymbols);
          });
          elementLists.forEach(els => {
            const moves = [];
            const addMove = (x0, y0, x1, y1) => { if (!near(x0, x1) || !near(y0, y1)) moves.push([x0, y0, x1, y1]); };
            els.forEach(el => {
              if (!isPlainObject(el)) return;
              const t = el.type;
              const x = Number(el.x || 0), y = Number(el.y || 0);
              const w = Number(el.w || 0), h = Number(el.h || 0);
              const angle = Number(el.rotation || 0) * Math.PI / 180;
              const cos = Math.cos(angle), sin = Math.sin(angle);
              const vertical = el.orientation === "vertical";
              let nextX = x, nextY = y;
              const globalAt = (originX, originY, localX, localY) => ({
                x: originX + localX * cos - localY * sin,
                y: originY + localX * sin + localY * cos
              });
              const shiftOrigin = (dx, dy) => {
                nextX = round(x + dx * cos - dy * sin);
                nextY = round(y + dx * sin + dy * cos);
                el.x = nextX;
                el.y = nextY;
              };
              const addLocalMove = (oldX, oldY, newX, newY) => {
                const before = globalAt(x, y, oldX, oldY);
                const after = globalAt(nextX, nextY, newX, newY);
                addMove(before.x, before.y, after.x, after.y);
              };
              const contactAy = { contactNO: 2.2, contactNC: 2.2, timerContactNO: 2.2, timerContactNC: 2.2, thermalRelay: 2.4, thermalElement: 3 };
              const contactAxV = { contactNO: 2.2, contactNC: 2.2, timerContactNO: 2.2, timerContactNC: 2.2, thermalRelay: 1.6, thermalElement: 0 };
              if (contactAy[t] !== undefined) {
                if (!vertical && near(w, 8)) {
                  shiftOrigin(-1, 0);
                  addLocalMove(0, contactAy[t], 0, contactAy[t]);
                  addLocalMove(8, contactAy[t], 10, contactAy[t]);
                  el.w = 10;
                } else if (vertical && near(h, 8)) {
                  shiftOrigin(0, -1);
                  addLocalMove(contactAxV[t], 0, contactAxV[t], 0);
                  addLocalMove(contactAxV[t], 8, contactAxV[t], 10);
                  el.h = 10;
                }
                return;
              }
              if (t === "contactBlock") {
                if (!vertical && near(w, 14)) {
                  shiftOrigin(-0.5, 0);
                  addLocalMove(0, 4, 0, 4);
                  addLocalMove(14, 4, 15, 4);
                  el.w = 15;
                } else if (vertical && near(h, 14)) {
                  shiftOrigin(0, -0.5);
                  addLocalMove(4, 0, 4, 0);
                  addLocalMove(4, 14, 4, 15);
                  el.h = 15;
                }
                return;
              }
              if (t === "breaker") {
                if (!vertical && near(w, 12)) {
                  addLocalMove(12, 3, 12.5, 3);
                  el.w = 12.5;
                } else if (vertical && near(h, 12)) {
                  addLocalMove(2, 12, 2, 12.5);
                  el.h = 12.5;
                }
                return;
              }
              if (t === "motor" && near(w, 16) && near(h, 16)) {
                addLocalMove(0.9, 2.4, 0.9, 3);
                addLocalMove(0.9, 13.6, 0.9, 13);
                addLocalMove(14.6, 14.6, 13.4, 15.5);
                return;
              }
              if (t === "transformer" && near(w, 14)) {
                shiftOrigin(-0.5, 0);
                addLocalMove(0, 5.5, 0, 5.5);
                addLocalMove(14, 5.5, 15, 5.5);
                addLocalMove(0, 15, 0, 15);
                addLocalMove(14, 15, 15, 15);
                addLocalMove(3.4, 0.9, 5, -4);
                addLocalMove(10.6, 0.9, 10, -4);
                el.w = 15;
                return;
              }
              const midPinWiden = { buzzer: [14, 15], fan: [14, 15], sensor: [24, 25], powerSupply: [34, 35] };

                shiftOrigin(0, oldFirstY - newFirstY);

                el.h = 25;

              }
              if (t === "terminalBox" && near(w, 22) && near(h, 18)) {

                const newFirstY = 15 * 0.5 / rows;
                shiftOrigin(0, oldFirstY - newFirstY);

                // h=7へ直し、ローカルY方向へ1mmずらして接続点の絶対位置を保つ。
                shiftOrigin(0, -1);
                el.h = 7;
                return;
              }
            });
            if (!moves.length) return;
            els.forEach(el => {
              if (!isPlainObject(el)) return;
              if (["wire", "line", "arrow", "mechanicalLink"].includes(el.type) && Array.isArray(el.points)) {
                el.points.forEach(pt => {

                  if (m) { pt[0] = round(m[2]); pt[1] = round(m[3]); }

              } else if (el.type === "junction") {
                const m = moves.find(mv => near(mv[0], Number(el.x || 0)) && near(mv[1], Number(el.y || 0)));

          return data;
        },
        // 3→4: CPの実測ジオメトリと、ユニット列端子の接続中心を統一する。
        // CPは旧右/下ピンに接続された線だけを新ピンへ追従させ、旧生成テンプレートの
        // 機械連動線は新しい弧頂点へ移す。端子台/PLC列は周囲の配線端点から旧来の
        // 左辺・右辺のどちらが端子中心だったかを判定し、中心を保ったまま幅10mmへ直す。
        3: data => {
          const near = (a, b, tolerance = .02) => Math.abs(Number(a) - Number(b)) < tolerance;
          const pointNear = (a, b, tolerance = .02) => near(a[0], b[0], tolerance) && near(a[1], b[1], tolerance);
          const elementLists = [];
          (Array.isArray(data.pages) ? data.pages : []).forEach(page => {
            if (isPlainObject(page) && Array.isArray(page.elements)) elementLists.push(page.elements);
          });
          const collectCustomSymbolTemplates = symbols => {
            (Array.isArray(symbols) ? symbols : []).forEach(symbol => {
              if (!isPlainObject(symbol)) return;
              if (Array.isArray(symbol.templates)) elementLists.push(symbol.templates);
              else if (isPlainObject(symbol.template)) elementLists.push([symbol.template]);
            });
          };
          collectCustomSymbolTemplates(data.customSymbols);
          (Array.isArray(data.standardPacks) ? data.standardPacks : []).forEach(pack => {
            if (isPlainObject(pack)) collectCustomSymbolTemplates(pack.customSymbols);
          });

          elementLists.forEach(elements => {
            const globalAt = (element, localX, localY) => {
              const angle = Number(element.rotation || 0) * Math.PI / 180;

            };
            const endpointElements = elements.filter(element => isPlainObject(element)
              && ["wire", "line", "arrow", "mechanicalLink"].includes(element.type)
              && Array.isArray(element.points) && element.points.length);
            const pathEndpoints = endpointElements.flatMap(element => {
              const points = element.points;
              return points.length === 1 ? [points[0]] : [points[0], points[points.length - 1]];
            });
            const terminals = elements.filter(element => isPlainObject(element) && element.type === "terminal");
            const terminalCenter = element => globalAt(
              element,
              Number(element.w || 1.8) / 2,
              Number(element.h || 1.8) / 2
            );

            // CPの旧ピンと機械連動線を先に収集する。寸法を更新した後でも旧座標を失わないよう、
            // 全て絶対座標へ展開してから線要素を一括変換する。
            const pinMoves = [];
            const linkMoves = [];
            elements.forEach(element => {
              if (!isPlainObject(element) || element.type !== "breaker" || element.symbolVariant !== "cp") return;
              const vertical = element.orientation === "vertical";
              const legacyHorizontal = !vertical && near(element.w, 10) && near(element.h, 5);
              const legacyVertical = vertical && near(element.w, 5) && near(element.h, 10);
              if (!legacyHorizontal && !legacyVertical) return;
              if (legacyVertical) {
                pinMoves.push({ before: globalAt(element, 2, 10), after: globalAt(element, 2, 12.5) });
                const after = globalAt(element, 4.35, 4.75);
                // 旧実測弧頂点、旧生成リンク中心、過去テンプレートの丸め座標を受け入れる。
                [[3.9, 5], [2, 5], [2.5, 5]].forEach(point => {
                  linkMoves.push({ before: globalAt(element, point[0], point[1]), after, element });
                });
                element.h = 12.5;
              } else {
                pinMoves.push({ before: globalAt(element, 10, 3), after: globalAt(element, 12.5, 3) });
                const after = globalAt(element, 4.75, .65);
                // 弧の旧頂点に加え、v3の自動生成ページで使われた中心線/丸め位置も移行する。
                [[5, 1.1], [5, 3], [5, .5]].forEach(point => {
                  linkMoves.push({ before: globalAt(element, point[0], point[1]), after, element });
                });
                element.w = 12.5;
              }
            });
            endpointElements.forEach(element => {
              element.points.forEach((point, pointIndex) => {
                if (pointIndex !== 0 && pointIndex !== element.points.length - 1) return;
                if (element.type === "mechanicalLink") {
                  const linkMove = linkMoves.find(move => pointNear(point, move.before, .08));
                  if (linkMove) {
                    point[0] = round(linkMove.after[0]);
                    point[1] = round(linkMove.after[1]);
                    linkMove.element.cpLinked = true;
                    return;
                  }
                }
                const pinMove = pinMoves.find(move => pointNear(point, move.before));
                if (pinMove) {
                  point[0] = round(pinMove.after[0]);
                  point[1] = round(pinMove.after[1]);
                }

            });
            elements.forEach(element => {
              if (!isPlainObject(element) || element.type !== "junction") return;
              const move = pinMoves.find(candidate => pointNear([element.x, element.y], candidate.before));
