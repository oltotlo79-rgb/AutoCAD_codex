      function importTerminalCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const terminals = normalizeTerminalCsvRows(rows);
            if (!terminals.length) {
              setStatus("端子CSVに有効な行がありません。");
              return;
            }
            addTerminalCsvPages(terminals, file.name || "terminal.csv");
          } catch (error) {
            alert("端子CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      function importPlcCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const ioRows = normalizePlcCsvRows(rows);
            if (!ioRows.length) {
              setStatus("PLC CSVに有効なI/O行がありません。");
              return;
            }
            addPlcCsvPages(ioRows, file.name || "plc.csv");
          } catch (error) {
            alert("PLC CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      function decodeTextBuffer(buffer) {
        const bytes = buffer instanceof ArrayBuffer ? buffer : new Uint8Array(buffer).buffer;
        const candidates = [];
        try {
          candidates.push(new TextDecoder("utf-8").decode(bytes));
        } catch (_) {
          // TextDecoder can fail on older browsers.
        }
        try {
          candidates.push(new TextDecoder("shift_jis").decode(bytes));
        } catch (_) {
          // Shift_JIS is optional in some environments.
        }
        if (!candidates.length) return "";
        return candidates.sort((a, b) => textDecodeScore(b) - textDecodeScore(a))[0].replace(/^\uFEFF/, "");
      }

      function textDecodeScore(text) {
        const bad = (text.match(/\uFFFD/g) || []).length * 20;
        const japanese = (text.match(/[ぁ-んァ-ン一-龠]/g) || []).length;
        const ascii = (text.match(/[A-Za-z0-9,\t\r\n_-]/g) || []).length;
        return japanese * 3 + ascii - bad;
      }

      function parseDelimitedRows(text) {
        const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const sample = source.split("\n").slice(0, 5).join("\n");
        const delimiter = (sample.match(/\t/g) || []).length > (sample.match(/,/g) || []).length ? "\t" : ",";
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let i = 0; i < source.length; i++) {
          const char = source[i];
          const next = source[i + 1];
          if (quoted) {
            if (char === '"' && next === '"') {
              cell += '"';
              i++;
            } else if (char === '"') {
              quoted = false;
            } else {
              cell += char;
            }
            continue;
          }
          if (char === '"' && cell === "") {
            quoted = true;
          } else if (char === delimiter) {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell);
        rows.push(row);
        return rows.map(cells => cells.map(cell => cell.trim())).filter(cells => cells.some(Boolean));
      }

      function normalizeTerminalCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          strip: ["strip", "terminalstrip", "tb", "端子台", "端子台名"],
          terminal: ["terminal", "term", "terminalno", "no", "番号", "端子", "端子番号", "端子no", "端子名"],
          wireNo: ["wireno", "wire", "wire_no", "wiring", "線番", "配線番号", "線番号"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          dest: ["dest", "destination", "to", "device", "接続先", "行先", "相手先", "機器"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          return {
            strip: value("strip") || "X1",
            terminal: value("terminal") || cells[0] || String(index + 1),
            wireNo: value("wireNo") || cells[1] || "",
            signal: value("signal") || cells[2] || "",
            dest: value("dest") || cells[3] || "",
            note: value("note") || cells[4] || ""
          };
        }).filter(row => row.terminal || row.wireNo || row.signal || row.dest || row.note);
      }

      function normalizePlcCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          address: ["address", "addr", "io", "i/o", "point", "plc", "アドレス", "io番号", "入出力番号", "点数"],
          direction: ["direction", "type", "iotype", "io_type", "inout", "入出力", "種別", "方向"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          wireNo: ["wireno", "wire", "wire_no", "線番", "配線番号", "線番号"],
          device: ["device", "dest", "destination", "to", "from", "接続先", "機器", "相手先"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          const address = value("address") || cells[0] || "";
          const signal = value("signal") || cells[1] || "";
          const wireNo = value("wireNo") || cells[2] || "";
          const device = value("device") || cells[3] || "";
          const note = value("note") || cells[4] || "";
          const direction = normalizeIoDirection(value("direction") || address);
          return { address: address || (direction === "output" ? "O" : "I") + String(index).padStart(2, "0"), direction, signal, wireNo, device, note };
        }).filter(row => row.address || row.signal || row.wireNo || row.device || row.note);
      }

      function normalizeIoDirection(text) {
        const value = normalizeHeader(text);
        if (value.startsWith("o") || value.includes("out") || value.includes("出力")) return "output";
        return "input";
      }

      function normalizeHeader(text) {
        return String(text || "").toLowerCase().replace(/[()\[\]{} 　._\-\/\\:：]/g, "");
      }

      function findHeaderIndex(headers, aliases) {
        const normalizedAliases = aliases.map(normalizeHeader);
        return headers.findIndex(header => normalizedAliases.includes(header));
      }

      function addTerminalCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "端子接続図",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "端子接続図 " + pageNo + "/" + totalPages
          });
          populateTerminalCsvPage(page, chunk, pageNo, totalPages, fileName, offset);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("端子CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 端子台配線図の型: レール + 横配線(線番は終点寄せ) + 端子小円 + ユニット列端子台。
      // 端子名はCSVの値を terminalLabels として端子円内に表示する。
      function populateTerminalCsvPage(page, rows, pageNo, totalPages, fileName, offset) {
        const stripName = mostCommon(rows.map(row => row.strip).filter(Boolean)) || "TB1";
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        const strip = {
          ...defaultElement("terminalStrip", 130.5, 31.75),
          x: 130.5,
          y: 31.75,
          w: 10.5,
          h: rows.length * 9.5,
          count: rows.length,
          start: 1 + offset,
          prefix: "",
          orientation: "vertical",
          terminalShape: "circle",
          stripStyle: "unit",
          label: stripName,
          terminalLabels: rows.map(row => row.terminal || "").join("\n"),
          note: "取込元: " + fileName
        };
        page.elements.push(strip);
        rows.forEach((row, index) => {
          const y = round(36.5 + 9.5 * index);
          page.elements.push(defaultElement("junction", 32.5, y));
          page.elements.push({
            ...defaultElement("wire", 32.5, y),
            points: [[32.5, y], [128.4, y]],
            wireNo: row.wireNo || "",
            wireNoAlign: "end",
            note: row.note || ""
          });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: 128.4, y: round(y - 0.9), label: "" });
          const desc = [row.signal, row.dest].filter(Boolean).join(" ");
          if (desc) page.elements.push(textElement(149.5, y - 1.2, desc, 2.3, 0, 42));
        });
      }

      function addPlcCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "制御盤",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "PLC I/O 接続図 " + pageNo + "/" + totalPages
          });
          populatePlcCsvPage(page, chunk, pageNo, totalPages, fileName);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("PLC CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 右にユニット列、左へ横配線+端子小円。行はラダー行グリッドに整列し、
      // 配線端点はユニットの端子アンカー位置と一致させる(ずれ無し)。
      function populatePlcCsvPage(page, rows, pageNo, totalPages, fileName) {
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22));
        page.elements.push(...facilityRailElements("N1", 146.5, "-", 22));
        const unit = {
          ...defaultElement("plcBlock", 130.5, 31.75),

        const page = currentPage();

        const cfg = ladderConfig(page);

        const nextIndex = rungYs.length + 1;
        const y = rungYs.length ? Math.max(...rungYs) + cfg.pitch : cfg.startY;
        if (y > cfg.endY) {
          setStatus("このページにはラングを追加する余白がありません。");
          return;
        }
        addLadderRungElements(page, cfg, y, nextIndex);
        commitHistory("ラングを追加しました。");
        render();

      function ladderConfig(page) {
        const size = pageSize(page);
        const portrait = size.h >= size.w;
        const leftRail = portrait ? 36 : 42;
        const rightRail = size.w - (portrait ? 34 : 58);
        const startY = portrait ? 54 : 46;
        const endY = size.h - (portrait ? 62 : 34);
        return { leftRail, rightRail, startY, endY, pitch: portrait ? 14 : 12 };
      }

      function ensureLadderRails(page, cfg) {
        if (page.elements.some(element => element.ladderRail)) return;
        addLadderRails(page, cfg);
      }

      function addLadderRails(page, cfg) {
        page.elements.push(ladderWire([[cfg.leftRail, cfg.startY - 10], [cfg.leftRail, cfg.endY + 6]], "L", { ladderRail: "left" }));
        page.elements.push(ladderWire([[cfg.rightRail, cfg.startY - 10], [cfg.rightRail, cfg.endY + 6]], "N", { ladderRail: "right" }));
        page.elements.push(ladderText("L", cfg.leftRail - 2, cfg.startY - 17, 3, "middle"));
        page.elements.push(ladderText("N", cfg.rightRail + 2, cfg.startY - 17, 3, "middle"));
      }

      function addLadderRungElements(page, cfg, y, index) {
        const rungNo = String(index).padStart(3, "0");
        page.elements.push(ladderText(rungNo, cfg.leftRail - 18, y, 2.6, "end"));
        page.elements.push(ladderWire([[cfg.leftRail, y], [cfg.rightRail, y]], "R" + rungNo, { ladderRung: true, rungNo }));
      }

      function ladderWire(points, wireNo, extra = {}) {
        return {
          id: uid("el"),
          type: "wire",
          points,
          wireNo,
          wireType: state.settings.currentWireType,
          stroke: state.settings.stroke,
          layer: "wires",
          ...extra
        };
      }

      function ladderText(text, x, y, fontSize, anchor = "start") {
        return {
          id: uid("el"),
          type: "text",
          x,
          y,
          w: 24,
          h: 5,
          text,
          fontSize,
          align: anchor,
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      function collectLadderRungYs(page) {
        return page.elements
          .filter(element => element.ladderRung && element.points?.length)
          .map(element => Number(element.points[0][1]))
          .filter(value => Number.isFinite(value))
          .sort((a, b) => a - b);
      }

      function buildInterlockPage() {
        const leftName = qs("#ilLeftName").value || "制御盤";
        const rightName = qs("#ilRightName").value || "相手設備";
        const outCount = Math.max(0, Math.min(8, Math.floor(Number(qs("#ilOutCount").value || 0))));
        const inCount = Math.max(0, Math.min(8, Math.floor(Number(qs("#ilInCount").value || 0))));
        const page = createPage({
          name: "インターロック",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "インターロック接続"
        });
        const boxTop = 33;
        const boxBottom = 255;
        const leftBox = { x1: 38, x2: 104 };
        const rightBox = { x1: 118, x2: 176 };
        page.elements.push({ ...defaultElement("rect", leftBox.x1, boxTop), w: leftBox.x2 - leftBox.x1, h: boxBottom - boxTop, label: "" });
        page.elements.push(textElement(leftBox.x1 + 2, boxTop - 3.5, leftName, 2.6, 0, 60));
        page.elements.push({
          ...defaultElement("line", rightBox.x1, boxTop),
          points: [[rightBox.x1, boxTop], [rightBox.x1, boxBottom]],
          dash: "6 1.5 1.5 1.5",
          label: ""
        });
        page.elements.push({
          ...defaultElement("line", rightBox.x2, boxTop),
          points: [[rightBox.x2, boxTop], [rightBox.x2, boxBottom]],
          dash: "6 1.5 1.5 1.5",
          label: ""
        });
        [[rightBox.x1, rightBox.x2, boxTop], [rightBox.x1, rightBox.x2, boxBottom]].forEach(([xa, xb, y]) => {
          page.elements.push({
            ...defaultElement("line", xa, y),
            points: [[xa, y], [xb, y]],
            dash: "6 1.5 1.5 1.5",
            label: ""
          });
        });
        page.elements.push(textElement(rightBox.x1 + 2, boxTop - 3.5, rightName, 2.6, 0, 60));
        let rowIndex = 2;
        for (let i = 0; i < outCount; i++, rowIndex += 2) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * rowIndex);
          page.elements.push({ ...defaultElement("wire", 46, y), points: [[46, y], [round(leftBox.x2 - 2.1), y]] });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(leftBox.x2 - 2.1), y: round(y - 0.9), label: "" });
          page.elements.push({
            ...defaultElement("arrow", leftBox.x2, y),
            points: [[round(leftBox.x2 - 0.3), y], [rightBox.x1 + 14, y]],
            label: "",
            arrowStyle: "open",
            signalRole: "source"
          });
        }
        for (let i = 0; i < inCount; i++, rowIndex += 2) {
          const y = round(LADDER_GRID.top + LADDER_GRID.pitch * rowIndex);
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(leftBox.x2 - 2.1), y: round(y - 0.9), label: "" });
          page.elements.push({
            ...defaultElement("arrow", rightBox.x1, y),
            points: [[rightBox.x1 + 14, y], [round(leftBox.x2 + 1.5), y]],
            label: "",
            arrowStyle: "open",

      function buildTwistedPairFromDialog() {
        const page = currentPage();
        if (!page) return;
        const count = Math.max(2, Math.min(8, Math.floor(Number(qs("#twCount").value || 4))));
        const pitch = Number(qs("#twPitch").value || 6.3);
        const x0 = Number(qs("#twX").value || 40);
        const y0 = Number(qs("#twY").value || 80);
        const span = Math.max(30, Number(qs("#twSpan").value || 60));
        const labels = String(qs("#twLabels").value || "").split(",").map(s => s.trim());
        const created = [];
        const yTop = y0;
        const yBot = y0 + pitch * (count - 1);
        const exL = x0 + 10;
        const exR = x0 + span - 10;
        for (let i = 0; i < count; i++) {
          const y = round(y0 + pitch * i);
          created.push({ ...defaultElement("wire", x0, y), points: [[x0, y], [round(x0 + span), y]] });
          created.push({ ...defaultElement("arrow", x0 - 4, y), points: [[x0 - 4, y], [x0, y]], label: "", arrowStyle: "chevron" });
          if (labels[i]) created.push(textElement(x0 - 12, y - 1.2, labels[i], 2.2, 0, 12));
        }
        const ellH = round((count - 1) * pitch + 5);
        [exL, exR].forEach(cx => {
          created.push({ ...defaultElement("circle", round(cx - 1.9), round(yTop - 2.5)), w: 3.8, h: ellH, label: "" });
        });
        const mid = (exL + exR) / 2;
        [[exL + 3, mid - 2], [mid + 2, exR - 3]].forEach(([xa, xb]) => {
          created.push({ ...defaultElement("line", xa, yTop), points: [[round(xa), yTop], [round(xb), yBot]], label: "" });
          created.push({ ...defaultElement("line", xa, yBot), points: [[round(xa), yBot], [round(xb), yTop]], label: "" });
        });
        created.push({ ...defaultElement("line", exL, yTop - 2), points: [[exL, round(yTop - 2)], [exR, round(yTop - 2)]], dash: "3 2", label: "" });
        created.push({ ...defaultElement("line", exL, yBot + 2), points: [[exL, round(yBot + 2)], [exR, round(yBot + 2)]], dash: "3 2", label: "" });
        page.elements.push(...created);
        setSelection(created.map(el => el.id));
        closeDialog();
        commitHistory("ツイストペアを生成しました。");
        render();
      }

      function buildMotorBranchFromDialog() {
        const page = currentPage();
        if (!page) return;
        const x0 = Number(qs("#mcX").value || 40);
        const y0 = Number(qs("#mcY").value || 65);
        const span = Math.max(70, Number(qs("#mcSpan").value || 96));

        const withBreaker = qs("#mcWithBreaker").checked;
        const withThermal = qs("#mcWithThermal").checked;
        const withGround = qs("#mcWithGround").checked;
        const created = [];

        const motorX = x0 + span;
        const motor = { ...defaultElement("motor", motorX, round(y0 - 2.4)), label: tag, tag };

        const stations = [];
        let cursor = x0 + 4;
        const breakers = [];
        if (withBreaker) {
          lineYs.forEach(y => {
            const el = { ...defaultElement("breaker", cursor, round(y - 3)), label: "", refNo: "" };
            breakers.push(el);
            created.push(el);
          });
          breakers[0].label = "CB-" + tag;
          stations.push([cursor, cursor + 12]);
          cursor += 22;
        }
        lineYs.forEach((y, i) => {
          created.push({ ...defaultElement("contactNO", cursor, round(y - 2.2)), label: i === 0 ? (qs("#mcContactTag").value || "MC") : "" });
        });
        stations.push([cursor, cursor + 8]);
        cursor += 18;

          lineYs.forEach((y, i) => {
            created.push({ ...defaultElement("thermalElement", cursor, round(y - 3)), label: i === 0 ? (qs("#mcThermalTag").value || "OL") : "" });
          });
          stations.push([cursor, cursor + 8]);
          cursor += 18;

        lineYs.forEach(y => {

          stations.forEach(([a, b]) => {
            created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), round(y)], [round(a), round(y)]] });
            sx = b;
          });
          created.push({ ...defaultElement("wire", sx, y), points: [[round(sx), round(y)], [round(motorX + 0.9), round(y)]] });

          created.push({ ...defaultElement("ground", round(gx - 2), gy + 8), label: "" });

        page.elements.push(...created);
        setSelection(created.map(el => el.id));

      // ===== BOM(部品集計表) =====
      function collectBomRows() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            if (!supportsElectricalAttributes(element)) return;
            if (!tagPrefix(element.type)) return;
            const key = [element.manufacturer || "", element.catalog || "", element.type].join("::");
            const row = map.get(key) || {
              type: paletteLabel(element.type),
              manufacturer: element.manufacturer || "",
              catalog: element.catalog || "",
              description: element.description || "",
              rating: element.rating || "",
              qty: 0,
              tags: []
            };
            row.qty += 1;
            const tag = componentTag(element);
            if (tag) row.tags.push(tag);
            map.set(key, row);
          });
        });
        return Array.from(map.values()).sort((a, b) =>
          a.type.localeCompare(b.type) || a.manufacturer.localeCompare(b.manufacturer) || a.catalog.localeCompare(b.catalog));
      }

      // ===== 端子台プラン表(端子ごとの配線・接続先一覧) =====
      function collectTerminalPlanRows() {
        const out = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => ["terminalStrip", "connector"].includes(element.type))
            .forEach(strip => {
              const count = Math.max(1, Number(strip.count || 1));
              const start = Number(strip.start || 1);
              const jumperPairs = terminalJumperPairs(strip);
              for (let i = 0; i < count; i++) {
                const node = terminalStripNodeGlobal(strip, i);
                // 端子小円を挟んで配線が届く構成があるため、許容は2.5mmとする
                const wires = page.elements.filter(wire => wire.type === "wire"
                  && wireEndpointsOf(wire).some(point => Math.hypot(point[0] - node.x, point[1] - node.y) <= 2.5));
                const wireNos = Array.from(new Set(wires.map(wire => wire.wireNo).filter(Boolean)));
                const dests = Array.from(new Set(wires.map(wire => {
                  const ends = wireEndpointsOf(wire);
                  const far = Math.hypot(ends[0][0] - node.x, ends[0][1] - node.y) <= 2.5 ? ends[1] : ends[0];
                  return nearestElementName(page, far[0], far[1], wire.id);
                }).filter(Boolean)));
                const no = start + i;
                const jumpers = jumperPairs
                  .filter(([a, b]) => a === no || b === no)
                  .map(pair => pair.join("-"))
                  .join(",");
                out.push({
                  page: page.name,
                  strip: strip.label || paletteLabel(strip.type),
                  terminal: terminalLabel(strip, i),
                  wireNo: wireNos.join(" / "),
                  dest: dests.join(" / "),
                  jumpers
                });
              }
            });
        });
        return out;
      }

      function dxfEntitiesToElements(text) {
        const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
        const page = currentPage();
        const H = pageSize(page).h;
        const flipY = y => round(H - Number(y || 0));
        const out = [];
        let inEntities = false;
        let current = null;
        const flush = () => {
          if (!current) return;
          const d = current.data;
          if (current.name === "LINE" && d[10] !== undefined && d[11] !== undefined) {
            out.push({ id: uid("el"), type: "line", points: [[round(d[10]), flipY(d[20])], [round(d[11]), flipY(d[21])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
          } else if (current.name === "CIRCLE" && d[40] !== undefined) {
            const r = Number(d[40]);
            out.push({ ...defaultElement("circle", round(d[10] - r), round(flipY(d[20]) - r)), w: round(r * 2), h: round(r * 2), label: "" });
          } else if (current.name === "TEXT" && d[1] !== undefined) {
            out.push({ ...defaultElement("text", round(d[10] || 0), flipY(d[20])), text: String(d[1]), fontSize: Number(d[40] || 2.5) });
          } else if (current.name === "ARC" && d[40] !== undefined) {
            // 円弧は12分割の折れ線として取り込む(CADのCCW角度→画面系へ変換)
            const r = Number(d[40]);
            const cx = Number(d[10] || 0);
            const cyCad = Number(d[20] || 0);
            let a0 = Number(d[50] || 0);
            let a1 = Number(d[51] || 0);
            if (a1 <= a0) a1 += 360;
            const steps = 12;
            let prev = null;
            for (let k = 0; k <= steps; k++) {
              const a = (a0 + (a1 - a0) * k / steps) * Math.PI / 180;
              const px = round(cx + r * Math.cos(a));
              const py = flipY(cyCad + r * Math.sin(a));
              if (prev) {
                out.push({ id: uid("el"), type: "line", points: [prev, [px, py]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
              }
              prev = [px, py];
            }
          } else if (current.name === "LWPOLYLINE" && (current.pts || []).filter(pt => pt.length === 2).length >= 2) {
            const pts = current.pts.filter(pt => pt.length === 2);
            for (let i = 1; i < pts.length; i++) {
              out.push({ id: uid("el"), type: "line", points: [[round(pts[i - 1][0]), flipY(pts[i - 1][1])], [round(pts[i][0]), flipY(pts[i][1])]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: "symbols" });
            }
          }
          current = null;
        };
        for (let i = 0; i + 1 < lines.length; i += 2) {
          const code = Number(lines[i].trim());
          const value = lines[i + 1].trim();
          if (code === 2 && value === "ENTITIES") {
            inEntities = true;
            continue;
          }
          if (code === 0) {
            if (value === "ENDSEC") {
              flush();
              inEntities = false;
              continue;
            }
            if (inEntities) {
              flush();
              current = { name: value, data: {}, pts: [] };
              continue;
            }
          }
          if (inEntities && current) {
            if (current.name === "LWPOLYLINE" && code === 10) current.pts.push([Number(value)]);
            else if (current.name === "LWPOLYLINE" && code === 20 && current.pts.length) current.pts[current.pts.length - 1].push(Number(value));
            else if (current.data[code] === undefined) current.data[code] = isNaN(Number(value)) ? value : Number(value);
          }
        }
        flush();
        return out;
      }

      // ===== 配線の結合・分割 =====
      function mergeSelectedWires() {
        const page = currentPage();
        const selected = selectedElements();
        if (selected.length !== 2 || selected.some(el => el.type !== "wire")) {
          setStatus("結合するには配線を2本選択してください。");
          return;
        }
        const [a, b] = selected;
        const pa = a.points || [];
        const pb = b.points || [];
        if (pa.length < 2 || pb.length < 2) return;
        const near = (p, q) => Math.abs(p[0] - q[0]) < .6 && Math.abs(p[1] - q[1]) < .6;
        let points = null;
        if (near(pa[pa.length - 1], pb[0])) points = [...pa, ...pb.slice(1)];
        else if (near(pa[pa.length - 1], pb[pb.length - 1])) points = [...pa, ...pb.slice(0, -1).reverse()];
        else if (near(pa[0], pb[0])) points = [...pa.slice().reverse(), ...pb.slice(1)];
        else if (near(pa[0], pb[pb.length - 1])) points = [...pb, ...pa.slice(1)];
        if (!points) {
          setStatus("端点が一致する配線を選択してください。");
          return;
        }
        a.points = orthogonalizePoints(points);
        page.elements = page.elements.filter(el => el.id !== b.id);
        selectSingle(a.id);
        commitHistory("配線を結合しました。");
        render();
      }

      function splitSelectedWire() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [];
        if (points.length < 2) return;
        let before;
        let after;
        if (points.length === 2) {
          const mid = [round((points[0][0] + points[1][0]) / 2), round((points[0][1] + points[1][1]) / 2)];
          before = [points[0], mid];
          after = [mid, points[1]];
        } else {
          const cut = Math.floor(points.length / 2);
          before = points.slice(0, cut + 1);
          after = points.slice(cut);
        }
        const second = deepClone(element);
        second.id = uid("el");
        second.points = after;
        second.hideWireNo = true;
        element.points = before;
        page.elements.push(second);
        setSelection([element.id, second.id]);
        commitHistory("配線を分割しました。");
        render();
      }

      function sendSelectedBackward() {

        const ids = new Set(selectedElements().map(element => element.id));
        if (!page || !ids.size) return;
        for (let i = 1; i < page.elements.length; i++) {
          if (ids.has(page.elements[i].id) && !ids.has(page.elements[i - 1].id)) {
            const item = page.elements[i];
            page.elements[i] = page.elements[i - 1];
            page.elements[i - 1] = item;

      // 選択全体の境界中心を回転中心として剛体回転する(複数選択対応)
      function rotateSelected(degrees) {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は回転できません。");
          return;
        }
        const boxes = selected.map(elementBounds).filter(Boolean);
        if (!boxes.length) return;
        const target = unionBounds(boxes);
        const cx = target.x + target.w / 2;
        const cy = target.y + target.h / 2;
        const angle = degrees * Math.PI / 180;
        const rot = point => [
          round(cx + (point[0] - cx) * Math.cos(angle) - (point[1] - cy) * Math.sin(angle)),
          round(cy + (point[0] - cx) * Math.sin(angle) + (point[1] - cy) * Math.cos(angle))
        ];
        selected.forEach(element => {
          if (element.points) {
            element.points = element.points.map(rot);
          } else {
            const p = rot([Number(element.x || 0), Number(element.y || 0)]);
            element.x = p[0];
            element.y = p[1];
            element.rotation = ((Number(element.rotation || 0) + degrees) % 360 + 360) % 360;
          }
        });
        commitHistory("要素を回転しました。");
        render();
      }

      function toggleSelectedLock() {
        const element = selectedElement();
        if (!element) return;
        element.locked = !element.locked;
        commitHistory(element.locked ? "要素をロックしました。" : "要素のロックを解除しました。");
        render();
      }

      function toggleSelectedWireGap() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        element.gapAtMid = !element.gapAtMid;
        commitHistory(element.gapAtMid ? "配線ギャップを追加しました。" : "配線ギャップを解除しました。");
        render();
      }

      function addIntersectionGapsToSelectedWire() {
        const page = currentPage();
        const element = selectedElement();
        if (!page || !element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const gaps = new Map((element.gapPoints || []).map(point => [pointKey(point[0], point[1]), [round(point[0]), round(point[1])]]));
        const segments = wireSegments(element);
        page.elements
          .filter(other => other.type === "wire" && other.id !== element.id)
          .forEach(other => {
            segments.forEach(segment => {
              wireSegments(other).forEach(otherSegment => {
                const point = segmentIntersection(segment, otherSegment);
                if (!point) return;
                if (segmentEndpointNear(segment, point.x, point.y) || segmentEndpointNear(otherSegment, point.x, point.y)) return;
                if (hasJunctionNear(page, point.x, point.y)) return;
                gaps.set(pointKey(point.x, point.y), [round(point.x), round(point.y)]);
              });
            });
          });
        const before = element.gapPoints?.length || 0;
        element.gapPoints = Array.from(gaps.values()).sort((a, b) => a[1] - b[1] || a[0] - b[0]);
        const added = element.gapPoints.length - before;
        if (!added) {
          setStatus("追加できる交差ギャップはありません。接続点がある交点は対象外です。");
          render();
          return;
        }
        commitHistory(added + "か所の交差ギャップを追加しました。");
        render();
      }

      function clearSelectedWireGaps() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const hadGap = element.gapAtMid || (element.gapPoints && element.gapPoints.length);
        element.gapAtMid = false;
        element.gapPoints = [];
        if (!hadGap) return;
        commitHistory("配線ギャップを全解除しました。");
        render();
      }

      function segmentEndpointNear(segment, x, y) {
        return (Math.abs(segment[0] - x) < .6 && Math.abs(segment[1] - y) < .6)
          || (Math.abs(segment[2] - x) < .6 && Math.abs(segment[3] - y) < .6);
      }

      function addSelectedWirePoint() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const points = element.points || [[0, 0], [20, 0]];
        const insertAt = Math.max(1, points.length - 1);
        const a = points[insertAt - 1];
        const b = points[insertAt];
        const point = points.length === 2 && Math.abs(a[0] - b[0]) > .001 && Math.abs(a[1] - b[1]) > .001
          ? [round(a[0]), round(b[1])]
          : [round((a[0] + b[0]) / 2), round((a[1] + b[1]) / 2)];
        points.splice(insertAt, 0, point);
        element.points = points;
        commitHistory("配線の中間点を追加しました。");
        render();
      }

      function removeSelectedWirePoint() {
        const element = selectedElement();
        if (!element || element.type !== "wire" || !element.points || element.points.length <= 2) return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        element.points.splice(element.points.length - 2, 1);
        commitHistory("配線の中間点を削除しました。");
        render();
      }

      function orthogonalizeSelectedWire() {
        const element = selectedElement();
        if (!element || element.type !== "wire") return;
        if (isElementLocked(element)) {
          setStatus("ロックされた配線は変更できません。");
          return;
        }
        const original = element.points || [[0, 0], [20, 0]];
        const normalized = orthogonalizePoints(original);
        if (JSON.stringify(original) === JSON.stringify(normalized)) {
          setStatus("この配線はすでに直交しています。");
          return;
        }
        element.points = normalized;
        commitHistory("配線を直交整形しました。");
        render();
      }

      function orthogonalizePoints(points) {
        const result = [];
        const addPoint = point => {
          const rounded = [round(point[0]), round(point[1])];
          const last = result[result.length - 1];
          if (!last || Math.abs(last[0] - rounded[0]) > .001 || Math.abs(last[1] - rounded[1]) > .001) result.push(rounded);
        };
        addPoint(points[0] || [0, 0]);
        for (let i = 1; i < points.length; i += 1) {
          const prev = result[result.length - 1];
          const target = points[i];
          if (Math.abs(prev[0] - target[0]) < .001 || Math.abs(prev[1] - target[1]) < .001) {
            addPoint(target);
          } else {
            addPoint([prev[0], target[1]]);
            addPoint(target);
          }
        }
        return result;
      }

      function applySelectedAreaAttributes() {
        const area = selectedElement();
        if (!area || !["installationBox", "locationBox"].includes(area.type)) return;
        if (isElementLocked(area)) {
          setStatus("ロックされた枠は変更できません。");
          return;
        }
        const value = String(area.label || "").trim();
        if (!value) {
          setStatus("枠のラベルを入力してください。");
          return;
        }
        const key = area.type === "installationBox" ? "installation" : "location";
        const box = elementBounds(area);
        const page = currentPage();
        let count = 0;
        page.elements.forEach(element => {
          if (element.id === area.id || !supportsElectricalAttributes(element) || isElementLocked(element)) return;
          const bounds = elementBounds(element);
          if (!bounds) return;
          const cx = bounds.x + bounds.w / 2;
          const cy = bounds.y + bounds.h / 2;
          if (cx < box.x || cx > box.x + box.w || cy < box.y || cy > box.y + box.h) return;
          element[key] = value;
          count += 1;
        });
        commitHistory(count + "個の部品へ" + (key === "installation" ? "設備" : "場所") + "属性を適用しました。");
        render();
      }

      function copySelectedInstallLocation() {
        const element = selectedElement();
        if (!element || !supportsElectricalAttributes(element)) return;
        const data = {};
        if (String(element.installation || "").trim()) data.installation = String(element.installation).trim();
        if (String(element.location || "").trim()) data.location = String(element.location).trim();
        if (!Object.keys(data).length) {
          setStatus("コピーできる設備/場所属性がありません。");
          return;
        }
        installLocationClipboard = data;
        setStatus("設備/場所属性をコピーしました。");
        render();
      }

      function pasteInstallLocationToSelection() {
        if (!installLocationClipboard) {
          setStatus("貼り付ける設備/場所属性がありません。");
          return;
        }
        const selected = selectedElements().filter(element => supportsElectricalAttributes(element) && !isElementLocked(element));
        let count = 0;
        selected.forEach(element => {
          let changed = false;
          Object.entries(installLocationClipboard).forEach(([key, value]) => {
            if (element[key] !== value) {
              element[key] = value;
              changed = true;
            }
          });
          if (changed) count += 1;
        });
        if (!count) {
          setStatus("設備/場所属性を貼り付ける対象がありません。");
          return;
        }
        commitHistory(count + "個の部品へ設備/場所属性を貼り付けました。");
        render();
      }

      function registerSelectedAsSymbol() {
        const selected = selectedElements();
        if (!selected.length) {
          setStatus("登録する要素を選択してください。");
          return;
        }
        const defaultName = selected.length === 1
          ? (selected[0].label || selected[0].text || paletteLabel(selected[0].type) || "ユーザー部品").toString()
          : "ユーザー回路" + selected.length + "要素";
        const label = prompt("ユーザー部品名", defaultName);
        if (!label) return;
        const boxes = selected.map(elementBounds).filter(Boolean);
        const origin = unionBounds(boxes);
        const templates = selected.map(element => normalizeSymbolTemplate(element, origin.x, origin.y));
        state.customSymbols.push({
          id: uid("sym"),
          label,
          template: deepClone(templates[0]),
          templates
        });
        commitHistory(selected.length > 1 ? "ユーザー回路を登録しました。" : "ユーザー部品を登録しました。");
        render();
      }

      function normalizeSymbolTemplate(element, originX, originY) {
        const template = deepClone(element);
        delete template.id;
        delete template.locked;
        if (template.points) {
          template.points = template.points.map(point => [round(point[0] - originX), round(point[1] - originY)]);
        } else {
          template.x = round(Number(template.x || 0) - originX);
          template.y = round(Number(template.y || 0) - originY);
        }
        return template;
      }

      function moveSelected(dx, dy) {
        const selected = selectedElements();
        if (!selected.length) return;
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は移動できません。");
          return;
        }
        selected.forEach(element => translateElement(element, dx, dy));
      }

      function translateElement(element, dx, dy) {
        if (element.points) {
          element.points = element.points.map(point => [round(point[0] + dx), round(point[1] + dy)]);
        } else {
          element.x = round(Number(element.x || 0) + dx);
          element.y = round(Number(element.y || 0) + dy);
        }
      }

      function alignSelected(mode) {
        const selected = selectedElements();
        if (selected.length < 2) {
          setStatus("整列するには2つ以上の要素を選択してください。");
          return;
        }
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は整列できません。");
          return;
        }
        const items = selected.map(element => ({ element, box: elementBounds(element) })).filter(item => item.box);
        const target = unionBounds(items.map(item => item.box));
        items.forEach(item => {
          let dx = 0;
          let dy = 0;
          if (mode === "left") dx = target.x - item.box.x;
          if (mode === "hcenter") dx = target.x + target.w / 2 - (item.box.x + item.box.w / 2);
          if (mode === "right") dx = target.x + target.w - (item.box.x + item.box.w);
          if (mode === "top") dy = target.y - item.box.y;
          if (mode === "vcenter") dy = target.y + target.h / 2 - (item.box.y + item.box.h / 2);
          if (mode === "bottom") dy = target.y + target.h - (item.box.y + item.box.h);
          translateElement(item.element, dx, dy);
        });
        commitHistory("要素を整列しました。");
        render();
      }

      function distributeSelected(axis) {
        const selected = selectedElements();
        if (selected.length < 3) {
          setStatus("均等配置するには3つ以上の要素を選択してください。");
          return;
        }
        if (selected.some(isElementLocked)) {
          setStatus("ロックされた要素は均等配置できません。");
          return;
        }
        const items = selected
          .map(element => ({ element, box: elementBounds(element) }))
          .filter(item => item.box)
          .sort((a, b) => centerOfBox(a.box, axis) - centerOfBox(b.box, axis));
        const first = centerOfBox(items[0].box, axis);
        const last = centerOfBox(items[items.length - 1].box, axis);
        const step = (last - first) / (items.length - 1);
        items.forEach((item, index) => {
          const delta = first + step * index - centerOfBox(item.box, axis);
          translateElement(item.element, axis === "x" ? delta : 0, axis === "y" ? delta : 0);
        });
        commitHistory("要素を均等配置しました。");
        render();
      }

      function centerOfBox(box, axis) {
        return axis === "x" ? box.x + box.w / 2 : box.y + box.h / 2;
      }

      function serializeActiveSvg() {
        const page = currentPage();
        const size = pageSize(page);
        const svg = svgEl("svg", { xmlns: svgNS, viewBox: "0 0 " + size.w + " " + size.h, width: size.w + "mm", height: size.h + "mm" });
        drawPageSvg(svg, page, { selection: false, scaled: false, grid: false, output: true });
        svg.style.width = null;
        svg.style.height = null;
        svg.setAttribute("width", size.w + "mm");
        svg.setAttribute("height", size.h + "mm");
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(svg);
      }

      function download(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function saveProject() {
        ensureProjectDefaults();
        syncPageTotals();
        const name = "electrical-drawing-" + new Date().toISOString().replace(/[:.]/g, "-") + ".json";
        download(name, JSON.stringify(state, null, 2), "application/json");
        setStatus("JSONを保存しました。");
      }

      function restoreLocalBackup() {
        let snapshot = "";
        try {
          snapshot = localStorage.getItem("electricalDrawingStudio.backup") || "";
        } catch (_) {
          setStatus("ブラウザ内バックアップを読めません。");
          return;
        }
        if (!snapshot) {
          setStatus("復元できるバックアップがありません。");
          return;
        }
        if (!confirm("ブラウザ内の自動保存データを復元しますか？\n現在の画面内容は置き換わります。")) return;
        try {
          const restored = JSON.parse(snapshot);
          if (!restored.pages || !Array.isArray(restored.pages)) throw new Error("pages が見つかりません。");
          Object.assign(state, restored);
          ensureProjectDefaults();
          setSelection([]);
          pageCounter = state.pages.length + 1;
          resetHistory();
          render();
          setStatus("ブラウザ内バックアップを復元しました。");
        } catch (error) {
          setStatus("復元に失敗しました: " + error.message);
        }
      }

      function importUnderlayImageFile(file) {
        return readUnderlayImageFile(file, (dataUrl, imageWidth, imageHeight) => addUnderlayImageElement(file.name, dataUrl, imageWidth, imageHeight));
      }

      function importTwoUpUnderlayImageFile(file) {
        return readUnderlayImageFile(file, (dataUrl, imageWidth, imageHeight) => addTwoUpUnderlayPages(file.name, dataUrl, imageWidth, imageHeight));
      }

      function readUnderlayImageFile(file, onLoad) {
        return new Promise(resolve => {
          if (!file || !String(file.type || "").startsWith("image/")) {
            setStatus("PNG/JPEG/WebP/SVG画像を選択してください。");
            resolve(false);
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            const dataUrl = String(reader.result || "");
            const image = new Image();
            image.onload = () => {
              Promise.resolve(onLoad(dataUrl, image.naturalWidth || image.width || 1, image.naturalHeight || image.height || 1))
                .then(() => resolve(true))
                .catch(error => {
                  setStatus("下絵画像の処理に失敗しました: " + error.message);
                  resolve(false);
                });
            };
            image.onerror = () => {
              Promise.resolve(onLoad(dataUrl, 16, 11))
                .then(() => resolve(true))
                .catch(error => {
                  setStatus("下絵画像の処理に失敗しました: " + error.message);
                  resolve(false);
                });
            };
            image.src = dataUrl;
          };
          reader.onerror = () => {
            setStatus("下絵画像を読み込めませんでした。");
            resolve(false);
          };
          reader.readAsDataURL(file);
        });
      }

      function addUnderlayImageElement(name, dataUrl, imageWidth, imageHeight) {
        const page = currentPage();
        if (!page) return;
        const element = buildUnderlayImageElement(page, name, dataUrl, imageWidth, imageHeight, "full");
        page.elements.unshift(element);
        selectSingle(element.id);
        commitHistory("下絵画像を挿入しました。");
        render();
      }

      async function addTwoUpUnderlayPages(name, dataUrl, imageWidth, imageHeight) {
        const base = currentPage();
        const baseTitle = base?.title || {};
        const baseIndex = state.pages.length + 1;
        const splitImages = await rotatedA3TwoUpImages(dataUrl);
        const pages = splitImages.map((item, index) => {
          const page = createPage({
            name: "P" + (baseIndex + index) + "-" + item.suffix,
            size: "A4",
            orientation: "portrait",
            frameVariant: base?.frameVariant || "detailed",
            title: baseTitle.title || "電気図面",
            drawingNo: baseTitle.drawingNo || "",
            revision: baseTitle.revision || "",
            designer: baseTitle.designer || "",
            date: baseTitle.date || today,
            facility: baseTitle.facility || "",
            installation: baseTitle.installation || "",
            location: baseTitle.location || ""
          });
          page.elements.unshift(buildUnderlayImageElement(page, name + " " + item.suffix, item.dataUrl, item.width, item.height, "full"));
          return page;
        });
        state.pages.push(...pages);
        state.activePageId = pages[0].id;
        setSelection([pages[0].elements[0].id]);
        commitHistory("2面下絵ページを作成しました。");
        render();
      }

      function rotatedA3TwoUpImages(dataUrl) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            try {
              const sourceW = image.naturalWidth || image.width || 1;
              const sourceH = image.naturalHeight || image.height || 1;
              const rotated = document.createElement("canvas");
              rotated.width = sourceH;
              rotated.height = sourceW;
              const ctx = rotated.getContext("2d");
              ctx.translate(rotated.width, 0);
              ctx.rotate(Math.PI / 2);
              ctx.drawImage(image, 0, 0);
              const halfW = Math.floor(rotated.width / 2);
              const items = [
                { suffix: "1", sx: 0, sw: halfW },
                { suffix: "2", sx: halfW, sw: rotated.width - halfW }
              ].map(item => {
                const canvas = document.createElement("canvas");
                canvas.width = item.sw;
                canvas.height = rotated.height;
                canvas.getContext("2d").drawImage(rotated, item.sx, 0, item.sw, rotated.height, 0, 0, item.sw, rotated.height);
                return {
                  suffix: item.suffix,
                  dataUrl: canvas.toDataURL("image/png"),
                  width: item.sw,
                  height: rotated.height
                };
              });
              resolve(items);
            } catch (error) {
              reject(error);
            }
          };
          image.onerror = () => reject(new Error("画像を回転分割できません。"));
          image.src = dataUrl;
        });
      }

      function selectCurrentUnderlay() {
        const page = currentPage();
        if (!page) return;
        const underlay = page.elements.find(element => element.type === "underlayImage");
        if (!underlay) {
          setStatus("このページに下絵画像はありません。");
          return;
        }
        selectSingle(underlay.id);
        setStatus("下絵を選択しました。位置調整する場合はロック解除してください。");
        render();
      }

      function buildUnderlayImageElement(page, name, dataUrl, imageWidth, imageHeight, cropPreset) {
        const size = pageSize(page);
        const margin = 12;
        const crop = underlayCropRect(cropPreset);
        const sourceWidth = Math.max(1, Number(imageWidth || 1) * crop.w);
        const sourceHeight = Math.max(1, Number(imageHeight || 1) * crop.h);
        let w = Math.max(20, size.w - margin * 2);
        let h = w * (sourceHeight / sourceWidth);
        if (h > size.h - margin * 2) {
          h = Math.max(20, size.h - margin * 2);
          w = h * (sourceWidth / sourceHeight);
        }
        return {
          id: uid("el"),
          type: "underlayImage",
          x: round((size.w - w) / 2),
          y: round((size.h - h) / 2),
          w: round(w),
          h: round(h),
          label: name || "下絵",
          imageData: dataUrl,
          opacity: .35,
          cropPreset: cropPreset || "full",
          rotation: 0,
          locked: true,
          stroke: "#5b626b",
          layer: "layout"
        };
      }

      function openProjectFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const loaded = JSON.parse(reader.result);
            if (!loaded.pages || !Array.isArray(loaded.pages)) throw new Error("pages が見つかりません。");
            state.app = loaded.app || state.app;
            state.version = loaded.version || state.version;
            state.settings = { ...state.settings, ...(loaded.settings || {}) };
            state.layers = loaded.layers || state.layers;
            state.wireTypes = loaded.wireTypes || state.wireTypes;
            state.customSymbols = loaded.customSymbols || [];
            state.project = { ...state.project, ...(loaded.project || {}) };
            ensureProjectDefaults();
            state.pages = loaded.pages;
            state.activePageId = loaded.activePageId || state.pages[0].id;
            pageCounter = state.pages.length + 1;
            setSelection([]);
            resetHistory();
            render();
            setStatus("JSONを読み込みました。");
          } catch (error) {
            setStatus("読み込みに失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      function exportSvg() {
        download((currentPage().name || "page") + ".svg", serializeActiveSvg(), "image/svg+xml");
        setStatus("SVGを書き出しました。");
      }

      function exportPng() {
        const svg = serializeActiveSvg();
        const page = currentPage();
        const size = pageSize(page);
        const scale = 4;
        const image = new Image();
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(size.w * scale);
          canvas.height = Math.round(size.h * scale);
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(pngBlob => {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(pngBlob);
            link.download = (page.name || "page") + ".png";
            link.click();
            URL.revokeObjectURL(link.href);
          }, "image/png");
        };
        image.src = url;
        setStatus("PNGを書き出しました。");
      }

      function syncPrintSheets() {
        const container = qs("#printSheets");
        container.innerHTML = "";
        if (printMode === "two-up") {
          syncPrintSheetsTwoUp(container);
          return;
        }
        state.pages.forEach(page => {
          const size = pageSize(page);
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-" + String(page.size || "A4").toLowerCase() + "-" + String(page.orientation || "portrait");
          sheet.style.width = size.w + "mm";
          sheet.style.height = size.h + "mm";
          const svg = svgEl("svg", { xmlns: svgNS, role: "img", "aria-label": page.name || "page" });
          drawPageSvg(svg, page, { selection: false, scaled: false, grid: false, output: true });
          sheet.appendChild(svg);
          container.appendChild(sheet);
        });
      }

      function syncPrintSheetsTwoUp(container) {
        for (let i = 0; i < state.pages.length; i += 2) {
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-a3-portrait";
          sheet.style.width = "297mm";
          sheet.style.height = "420mm";
          const svg = svgEl("svg", { xmlns: svgNS, viewBox: "0 0 297 420", width: "297mm", height: "420mm", role: "img", "aria-label": "A3 two-up" });
          svg.appendChild(svgEl("rect", { x: 0, y: 0, width: 297, height: 420, fill: "#fff" }));
          addTwoUpPageSvg(svg, state.pages[i], 10, 10, 277, 195);
          if (state.pages[i + 1]) addTwoUpPageSvg(svg, state.pages[i + 1], 10, 215, 277, 195);
          sheet.appendChild(svg);
          container.appendChild(sheet);
        }
      }

      function addTwoUpPageSvg(parent, page, x, y, w, h) {
        const size = pageSize(page);
        const scale = Math.min(w / size.w, h / size.h);
        const drawW = size.w * scale;
        const drawH = size.h * scale;
        const nested = svgEl("svg", {
          x: x + (w - drawW) / 2,
          y: y + (h - drawH) / 2,
          width: drawW,
          height: drawH,
          viewBox: "0 0 " + size.w + " " + size.h
        });
        drawPageSvg(nested, page, { selection: false, scaled: false, grid: false, output: true });
        nested.style.width = null;
        nested.style.height = null;
        nested.setAttribute("x", x + (w - drawW) / 2);
        nested.setAttribute("y", y + (h - drawH) / 2);
        nested.setAttribute("width", drawW);
        nested.setAttribute("height", drawH);
        parent.appendChild(nested);
      }

      function renderPrintSheets() {
        syncPrintSheets();
      }

      function printProject() {
        printMode = "single";
        renderPrintSheets();
        setStatus("印刷ダイアログでPDF保存を選択してください。");
        window.print();
      }

      function printProjectTwoUp() {
        printMode = "two-up";
        renderPrintSheets();
        setStatus("A3縦2面付けで印刷します。印刷ダイアログでPDF保存を選択してください。");
        window.print();
        printMode = "single";
      }

      // ===== ワイヤーネット解析(同電位グループ) =====
      function wireEndpointsOf(wire) {
        const points = wire.points || [];
        if (!points.length) return [];
        return [points[0], points[points.length - 1]];
      }

      function wiresTouch(a, b) {
        const ea = wireEndpointsOf(a);
        const eb = wireEndpointsOf(b);
        for (const p of ea) {
          for (const q of eb) {
            if (Math.abs(p[0] - q[0]) < .6 && Math.abs(p[1] - q[1]) < .6) return true;
          }
        }
        const segsA = wireSegments(a);
        const segsB = wireSegments(b);
        for (const p of ea) {
          if (segsB.some(segment => pointOnSegment(p[0], p[1], segment))) return true;
        }
        for (const q of eb) {
          if (segsA.some(segment => pointOnSegment(q[0], q[1], segment))) return true;
        }
        return false;
      }

      // ページ内の配線を電気的な接続グループ(ネット)に分割する。
      // 端点一致・T分岐(端点が他配線の線上)・接続点上の交差で結合する。
      function buildWireNets(page) {
        const wires = page.elements.filter(element => element.type === "wire");
        const parent = new Map();
        wires.forEach(wire => parent.set(wire.id, wire.id));
        const find = id => {
          while (parent.get(id) !== id) {
            parent.set(id, parent.get(parent.get(id)));
            id = parent.get(id);
          }
          return id;
        };
        const union = (a, b) => {
          const ra = find(a);
          const rb = find(b);
          if (ra !== rb) parent.set(ra, rb);
        };
        for (let i = 0; i < wires.length; i++) {
          for (let j = i + 1; j < wires.length; j++) {
            if (wiresTouch(wires[i], wires[j])) union(wires[i].id, wires[j].id);
          }
        }
        page.elements
          .filter(element => element.type === "junction")
          .forEach(junction => {
            const touching = wires.filter(wire =>
              wireSegments(wire).some(segment => pointOnSegment(junction.x || 0, junction.y || 0, segment)));
            for (let k = 1; k < touching.length; k++) union(touching[0].id, touching[k].id);
          });
        const nets = new Map();
        wires.forEach(wire => {
          const root = find(wire.id);
          const list = nets.get(root) || [];
          list.push(wire);
          nets.set(root, list);
        });
        return Array.from(nets.values());
      }

      function netSortKey(net) {
        let best = Infinity;
        net.forEach(wire => {
          wireEndpointsOf(wire).forEach(point => {
            const key = point[1] * 1000 + point[0];
            if (key < best) best = key;
          });
        });
        return best;
      }

      function netArrowLabels(page, net) {
        const labels = new Set();
        page.elements
          .filter(element => element.type === "arrow" && element.label && !element.ladderRail)
          .forEach(arrow => {
            const points = arrow.points || [];
            const touches = points.some(point =>
              net.some(wire => wireSegments(wire).some(segment => pointOnSegment(point[0], point[1], segment))
                || wireEndpointsOf(wire).some(end => Math.abs(end[0] - point[0]) < 4 && Math.abs(end[1] - point[1]) < 4)));
            if (touches) labels.add(arrow.label);
          });
        return labels;
      }

      function autoWireNumbers() {
        const format = state.settings.wireNumberFormat || "%S-%N";
        const allPages = confirm("全ページに線番を付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存の線番も上書きしますか？\nOK: 上書き / キャンセル: 未採番のみ");
        const startInput = prompt("開始番号", "1");
        if (startInput === null) return;
        let next = Number(startInput || 1);
        const pages = allPages ? state.pages : [currentPage()];
        let netCount = 0;
        const signalGroups = new Map(); // 信号矢印ラベル -> { value, members: [{net}] }
        const numberedNets = [];
        pages.forEach(page => {
          const nets = buildWireNets(page)
            .map(net => ({ net, key: netSortKey(net) }))
            .sort((a, b) => a.key - b.key)
            .map(item => item.net);
          nets.forEach(net => {
            const members = net.filter(wire => !wireStyle(wire).noNumber && !wire.ladderRail);
            if (!members.length) return;
            const fixed = members.find(wire => wire.fixedWireNo && wire.wireNo);
            const existing = members.find(wire => wire.wireNo);
            let value = null;
            if (fixed) value = fixed.wireNo;
            else if (!overwrite && existing) value = existing.wireNo;
            if (value === null) {
              value = formatWireNumber(format, page, next, members[0]);
              next += 1;
              netCount += 1;
            }
            members.forEach(wire => {
              if (!wire.fixedWireNo) wire.wireNo = value;
            });
            // ネット内は代表1本のみ表示(最長の配線)。他は自動的に非表示
            const visible = members.slice().sort((a, b) => {
              const lengthOf = wire => wireSegments(wire).reduce((sum, s) => sum + Math.hypot(s[2] - s[0], s[3] - s[1]), 0);
              return lengthOf(b) - lengthOf(a);
            });
            visible.forEach((wire, index) => {
              if (!wire.fixedWireNo) wire.hideWireNo = index !== 0;
            });
            const record = { page, net, members, fixed: Boolean(fixed) };
            numberedNets.push(record);
            netArrowLabels(page, net).forEach(label => {
              const group = signalGroups.get(label) || { value: null, members: [] };
              group.members.push(record);
              if (group.value === null) group.value = value;
              signalGroups.set(label, group);
            });
          });
        });
        // 信号矢印ラベルで結ばれたネットはページをまたいで同一線番を共有する
        let linked = 0;
        signalGroups.forEach(group => {
          if (group.members.length < 2 || group.value === null) return;
          group.members.forEach(record => {
            record.members.forEach(wire => {
              if (!wire.fixedWireNo && wire.wireNo !== group.value) {
                wire.wireNo = group.value;
                linked += 1;
              }
            });
          });
        });
        commitHistory(netCount + "ネットへ線番を付与しました。" + (linked ? "(信号リンクで" + linked + "本を共有)" : ""));
        render();
      }

      function formatWireNumber(format, page, number, element) {
        const pageIndex = state.pages.findIndex(item => item.id === page.id) + 1;
        return String(format || "%S-%N")
          .replaceAll("%S", page.title?.page || String(pageIndex))
          .replaceAll("%P", page.name || String(pageIndex))
          .replaceAll("%D", page.title?.drawingNo || "")
          .replaceAll("%I", page.title?.installation || "")
          .replaceAll("%L", page.title?.location || "")
          .replaceAll("%R", element ? String(elementLadderRow(element)).padStart(2, "0") : "")
          .replaceAll("%N", String(number).padStart(2, "0"));
      }

      function renumberTerminals() {
        const page = currentPage();
        const selected = selectedElement();
        const target = selected && ["terminal", "terminalStrip", "connector"].includes(selected.type)
          ? [selected]
          : page.elements.filter(element => ["terminal", "terminalStrip", "connector"].includes(element.type));
        if (!target.length) {
          setStatus("端子または端子台がありません。");
          return;
        }
        const startInput = prompt("端子開始番号", "1");
        if (startInput === null) return;
        const prefix = prompt("端子接頭辞", target[0].prefix || "") ?? "";
        let next = Number(startInput || 1);
        target.forEach(element => {
          if (element.type === "terminal") {
            element.label = prefix + String(next);
            next += 1;
          } else {
            element.prefix = prefix;
            element.start = next;
            next += Number(element.count || 1);
          }
        });
        commitHistory("端子番号を更新しました。");
        render();
      }

      function autoJunctions() {
        const allPages = confirm("全ページで接続点を生成しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const pages = allPages ? state.pages : [currentPage()];
        let added = 0;
        pages.forEach(page => {
          const points = detectJunctionPoints(page);
          points.forEach(point => {
            if (hasJunctionNear(page, point.x, point.y)) return;
            page.elements.push({
              id: uid("el"),
              type: "junction",
              x: point.x,
              y: point.y,
              w: 2,
              h: 2,
              r: 0.75,
              rotation: 0,
              stroke: state.settings.stroke
            });
            added += 1;
          });
        });
        commitHistory(added + "個の接続点を生成しました。");
        render();
      }

      function detectJunctionPoints(page) {
        const wires = page.elements.filter(element => element.type === "wire");
        const segments = [];
        wires.forEach(wire => {
          wireSegments(wire).forEach(segment => segments.push({ wire, segment }));
        });
        const hits = new Map();
        const endpoints = new Map();
        wires.forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            endpoints.set(key, (endpoints.get(key) || 0) + 1);
          });
        });
        endpoints.forEach((count, key) => {
          if (count > 1) hits.set(key, true);
        });
        for (let i = 0; i < segments.length; i++) {
          for (let j = i + 1; j < segments.length; j++) {
            if (segments[i].wire.id === segments[j].wire.id) continue;
            const point = segmentIntersection(segments[i].segment, segments[j].segment);
            if (point) hits.set(pointKey(point.x, point.y), true);
          }
        }
        return Array.from(hits.keys()).map(key => {
          const [x, y] = key.split(",").map(Number);
          return { x, y };
        });
      }

      function wireSegments(wire) {
        const points = wire.points || [[0, 0], [20, 0]];
        if (points.length > 2) {
          const segments = [];
          for (let i = 1; i < points.length; i += 1) {
            segments.push([points[i - 1][0], points[i - 1][1], points[i][0], points[i][1]]);
          }
          return segments;
        }
        const a = points[0];
        const b = points[points.length - 1];
        if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
          return [[a[0], a[1], b[0], b[1]]];
        }
        const c = [a[0], b[1]];
        return [
          [a[0], a[1], c[0], c[1]],
          [c[0], c[1], b[0], b[1]]
        ];
      }

      function segmentIntersection(a, b) {
        const aVertical = Math.abs(a[0] - a[2]) < .001;
        const bVertical = Math.abs(b[0] - b[2]) < .001;
        if (aVertical === bVertical) return null;
        const v = aVertical ? a : b;
        const h = aVertical ? b : a;
        const x = v[0];
        const y = h[1];
        if (between(x, h[0], h[2]) && between(y, v[1], v[3])) return { x: round(x), y: round(y) };
        return null;
      }

      function between(value, a, b) {
        return value >= Math.min(a, b) - .001 && value <= Math.max(a, b) + .001;
      }

      function pointKey(x, y) {
        return round(x) + "," + round(y);
      }

      function hasJunctionNear(page, x, y) {
        return page.elements.some(element => element.type === "junction" && Math.abs((element.x || 0) - x) < .6 && Math.abs((element.y || 0) - y) < .6);
      }

      function showTerminalEditor() {
        const rows = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => ["terminalStrip", "connector"].includes(element.type))
            .forEach(element => rows.push({ page, element }));
        });
        if (!rows.length) {
          openDialog("端子台エディタ", '<p class="muted">端子台またはコネクタがありません。</p>');
          return;
        }
        const html = `
          <table class="report-table">
            <thead><tr><th>ページ</th><th>種別</th><th>名称</th><th>端子数</th><th>開始</th><th>方向</th><th>形状</th><th>接頭辞</th><th>ジャンパ</th></tr></thead>
            <tbody>
              ${rows.map(({ page, element }) => `
                <tr data-terminal-row="${element.id}">

                  <td><input data-terminal-field="label" value="${escapeAttr(element.label || "")}"></td>
                  <td><input data-terminal-field="count" type="number" min="1" step="1" value="${Number(element.count || 1)}"></td>
                  <td><input data-terminal-field="start" type="number" step="1" value="${Number(element.start || 1)}"></td>
                  <td><select data-terminal-field="orientation"><option value="horizontal"${(element.orientation || "horizontal") === "horizontal" ? " selected" : ""}>横</option><option value="vertical"${element.orientation === "vertical" ? " selected" : ""}>縦</option></select></td>
                  <td><select data-terminal-field="terminalShape"><option value="circle"${(element.terminalShape || "circle") === "circle" ? " selected" : ""}>丸</option><option value="square"${element.terminalShape === "square" ? " selected" : ""}>角</option></select></td>
                  <td><input data-terminal-field="prefix" value="${escapeAttr(element.prefix || "")}"></td>
                  <td><input data-terminal-field="jumpers" value="${escapeAttr(element.jumpers || "")}" placeholder="1-2;3-5"></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
