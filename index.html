      function showCrossReference() {
        const groups = collectCrossReferences();
        const html = groups.length
          ? `<table class="report-table"><thead><tr><th>キー</th><th>分類</th><th>参照数</th><th>参照先</th></tr></thead><tbody>${groups.map(group => `<tr><td>${escapeHtml(group.key)}</td><td>${escapeHtml(group.kind)}</td><td>${group.items.length}</td><td>${group.items.map(item => `<button type="button" data-select-page="${item.pageId}" data-select-id="${item.id}" title="${escapeAttr(item.type)}">${escapeHtml(item.pageName)}:${escapeHtml(item.type)}</button>`).join(" ")}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">参照できる線番、部品タグ、信号矢印はありません。</p>';
        openDialog("クロスリファレンス", html);
        attachDialogSelection();
      }

      function showTitleBatchDialog() {
        const p = ensureProjectDefaults();
        const map = p.titleMap || DEFAULT_TITLE_MAP;
        const html = `
          <div class="row">
            <div><label>図名</label><input id="batchTitle" value="${escapeAttr(p.title || "")}"></div>
            <div><label>設備</label><input id="batchFacility" value="${escapeAttr(p.facility || "")}"></div>
          </div>
          <div class="row">
            <div><label>図番</label><input id="batchDrawingNo" value="${escapeAttr(p.drawingNo || "")}"></div>
            <div><label>改訂</label><input id="batchRevision" value="${escapeAttr(p.revision || "")}"></div>
          </div>
          <div class="row">
            <div><label>作成</label><input id="batchDesigner" value="${escapeAttr(p.designer || "")}"></div>
            <div><label>日付</label><input id="batchDate" value="${escapeAttr(p.date || today)}"></div>
          </div>
          <label style="margin-top:10px">表題欄マッピング</label>
          <table class="report-table">
            <thead><tr><th>表題欄</th><th>参照元</th></tr></thead>
            <tbody>${titleMapRows(map)}</tbody>
          </table>
          <label><input id="batchOnlyBlank" type="checkbox" style="width:auto;min-height:auto"> 空欄の項目だけ更新</label>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="applyTitleCurrentBtn">現在ページへ適用</button>
            <button type="button" id="applyTitleBatchBtn" class="primary">全ページへ適用</button>
          </div>
        `;
        openDialog("表題欄一括更新", html);
        qs("#applyTitleCurrentBtn").addEventListener("click", () => applyTitleBatch("current"));
        qs("#applyTitleBatchBtn").addEventListener("click", () => applyTitleBatch("all"));
      }

      function titleMapRows(map) {
        return TITLE_FIELDS.map(field => `
          <tr>
            <td>${escapeHtml(field.label)}</td>
            <td><select data-title-map="${escapeAttr(field.key)}">${titleSourceOptions(map[field.key] || DEFAULT_TITLE_MAP[field.key])}</select></td>
          </tr>
        `).join("");
      }

      function titleSourceOptions(current) {
        return TITLE_SOURCE_OPTIONS.map(option => {
          const selected = option.value === current ? " selected" : "";
          return `<option value="${escapeAttr(option.value)}"${selected}>${escapeHtml(option.label)}</option>`;
        }).join("");
      }

      function titleBatchValues() {
        return {
          title: qs("#batchTitle").value,
          facility: qs("#batchFacility").value,
          drawingNo: qs("#batchDrawingNo").value,
          revision: qs("#batchRevision").value,
          designer: qs("#batchDesigner").value,
          date: qs("#batchDate").value
        };
      }

      function titleMapValues() {
        const map = { ...DEFAULT_TITLE_MAP };
        qsa("[data-title-map]", qs("#dialogBody")).forEach(select => {
          map[select.dataset.titleMap] = select.value;
        });
        return map;
      }

      function applyTitleBatch(scope = "all") {
        const values = titleBatchValues();
        const map = titleMapValues();
        const onlyBlank = qs("#batchOnlyBlank").checked;
        state.project = { ...ensureProjectDefaults(), ...values, titleMap: map };
        const total = state.pages.length;
        const targets = scope === "current" ? [currentPage()].filter(Boolean) : state.pages;
        targets.forEach(page => {
          if (!page.title) page.title = {};
          const index = state.pages.indexOf(page);
          TITLE_FIELDS.forEach(field => {
            const resolved = resolveTitleSource(page, map[field.key], values, index, total);
            if (!resolved.apply) return;
            if (onlyBlank && page.title[field.key]) return;
            page.title[field.key] = resolved.value;
          });
        });
        closeDialog();
        commitHistory(scope === "current" ? "現在ページの表題欄を更新しました。" : "表題欄を一括更新しました。");
        render();
      }

      function resolveTitleSource(page, source, values, index, total) {
        if (source === "keep") return { apply: false, value: "" };
        if (source === "empty") return { apply: true, value: "" };
        const projectKey = String(source || "").replace(/^project\./, "");
        if (source?.startsWith("project.")) {
          const value = values[projectKey] || "";
          return { apply: value !== "", value };
        }
        if (source === "page.name") return { apply: true, value: page.name || "" };
        if (source === "page.number") return { apply: true, value: String(index + 1) };
        if (source === "page.numberTotal") return { apply: true, value: String(index + 1) + " / " + String(total) };
        return { apply: false, value: "" };
      }

      function collectCrossReferences() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const entries = crossRefEntries(element);
            entries.forEach(entry => {
              const key = entry.kind + "::" + entry.key;
              const list = map.get(key) || { key: entry.key, kind: entry.kind, items: [] };
              const type = element.type === "arrow" ? paletteLabel(element.type) + "/" + signalRoleLabel(element.signalRole) : paletteLabel(element.type);
              list.items.push({ pageId: page.id, pageName: page.name, id: element.id, type });
              map.set(key, list);
            });
          });
        });
        return Array.from(map.values()).sort((a, b) => a.kind.localeCompare(b.kind) || a.key.localeCompare(b.key));
      }

      function crossRefEntries(element) {
        const entries = [];
        if (element.type === "wire" && element.wireNo) entries.push({ kind: "線番", key: element.wireNo });
        if (element.type === "arrow" && element.label) entries.push({ kind: "信号", key: element.label });
        const tag = componentTag(element);
        if (!["wire", "arrow", "text", "table", "rect", "circle", "line", "underlayImage", "installationBox", "locationBox", "junction"].includes(element.type) && tag) {
          entries.push({ kind: "部品", key: tag });
        }
        return entries;
      }

      function attachDialogSelection() {
        qsa("[data-select-id]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const pageId = button.dataset.selectPage;
            const elementId = button.dataset.selectId;
            if (pageId) state.activePageId = pageId;
            selectSingle(elementId);
            closeDialog();
            render();
            setStatus("一覧から要素を選択しました。");
          });
        });
      }

      function csvCell(value) {
        const text = String(value ?? "");
        if (/[",\r\n]/.test(text)) return '"' + text.replaceAll('"', '""') + '"';
        return text;
      }

      function showAudit() {
        const issues = auditProject();
        const body = issues.length
          ? `<table class="report-table"><thead><tr><th>重要度</th><th>ページ</th><th>内容</th><th>対象</th><th>選択</th></tr></thead><tbody>${issues.map(issue => `<tr><td>${issue.level}</td><td>${escapeHtml(issue.page)}</td><td>${escapeHtml(issue.message)}</td><td>${escapeHtml(issue.target)}</td><td>${auditSelectionButton(issue)}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">検出された問題はありません。</p>';
        openDialog("図面監査", body);
        attachDialogSelection();
      }

      function auditSelectionButton(issue) {
        if (!issue.elementId) return "";
        return `<button type="button" data-select-page="${escapeAttr(issue.pageId || "")}" data-select-id="${escapeAttr(issue.elementId)}">選択</button>`;
      }

      function auditProject() {
        const issues = [];
        const arrows = new Map();
        const terminalNames = new Map();
        const componentTags = new Map();
        state.pages.forEach(page => {
          const size = pageSize(page);
          const wireNos = new Map();
          if (!page.title?.title) {
            issues.push({ level: "注意", page: page.name, message: "図名が未入力です。", target: "表題欄" });
          }
          page.elements.forEach(element => {
            const label = componentTag(element) || element.text || element.wireNo || "";
            if (element.type === "wire") {
              if (!element.wireNo) issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "線番が未入力です。", target: element.id });
              if (element.wireNo) {
                const current = wireNos.get(element.wireNo) || 0;
                wireNos.set(element.wireNo, current + 1);
              }
            }
            if (["contactNO", "contactNC", "pushButton", "coil", "fuse", "breaker", "lamp", "buzzer", "powerSupply", "transformer", "ground", "motor", "fan", "resistor", "diode", "deviceBox", "plcBlock", "cableMarker"].includes(element.type) && !label) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "ラベルが未入力です。", target: element.type });
            }
            const prefix = tagPrefix(element.type);
            if (prefix) {
              if (!element.tag) {
                issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグが未採番です。", target: element.label || paletteLabel(element.type) });
              } else {
                const key = element.type + "::" + element.tag;
                const list = componentTags.get(key) || [];
                list.push({ page: page.name, pageId: page.id, elementId: element.id, type: paletteLabel(element.type), tag: element.tag });
                componentTags.set(key, list);
              }
              if (element.fixedTag && !element.tag) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグ固定ですがタグが空です。", target: element.label || paletteLabel(element.type) });
              }
            }
            if (["terminalStrip", "connector"].includes(element.type) && Number(element.count || 0) <= 0) {
              issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "端子数が不正です。", target: element.label || element.id });
            }
            if (["terminalStrip", "connector"].includes(element.type) && element.label) {
              const key = page.name + "::" + element.label;
              terminalNames.set(key, (terminalNames.get(key) || 0) + 1);
            }
            if (element.type === "arrow") {
              if (!element.label) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "信号矢印の参照名が未入力です。", target: element.id });
              } else {
                const role = element.signalRole || "reference";
                const group = arrows.get(element.label) || { source: [], destination: [], reference: [] };
                (group[role] || group.reference).push(page.name);
                arrows.set(element.label, group);
              }
            }
            const box = elementBounds(element);
            if (box && (box.x < 0 || box.y < 0 || box.x + box.w > size.w || box.y + box.h > size.h)) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "用紙外にはみ出しています。", target: label || element.type });
            }
          });
          wireNos.forEach((count, wireNo) => {
            if (count > 1) issues.push({ level: "情報", page: page.name, message: "同じ線番が複数あります。", target: wireNo });
          });
          auditFloatingWireEnds(page).forEach(item => issues.push(item));
        });
        arrows.forEach((group, label) => {
          if (group.source.length && !group.destination.length) {
            issues.push({ level: "注意", page: group.source[0], message: "受信先の信号矢印がありません。", target: label });
          }
          if (group.destination.length && !group.source.length) {
            issues.push({ level: "注意", page: group.destination[0], message: "発信元の信号矢印がありません。", target: label });
          }
          if (!group.source.length && !group.destination.length && group.reference.length === 1) {
            issues.push({ level: "注意", page: group.reference[0], message: "対応する信号矢印がありません。", target: label });
          }
        });
        terminalNames.forEach((count, key) => {
          if (count > 1) {
            const [page, name] = key.split("::");
            issues.push({ level: "注意", page, message: "同一ページ内で端子台名称が重複しています。", target: name });
          }
        });
        componentTags.forEach(items => {
          if (items.length > 1) {
            const first = items[0];
            const pages = Array.from(new Set(items.map(item => item.page))).join(", ");
            issues.push({ level: "注意", page: first.page, pageId: first.pageId, elementId: first.elementId, message: "同一部品種別で部品タグが重複しています。", target: first.type + " " + first.tag + " (" + pages + ")" });
          }
        });
        return issues;
      }

      function auditFloatingWireEnds(page) {
        const issues = [];
        const endpointCounts = new Map();
        page.elements.filter(element => element.type === "wire").forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            endpointCounts.set(key, (endpointCounts.get(key) || 0) + 1);
          });
        });
        page.elements.filter(element => element.type === "wire").forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            if ((endpointCounts.get(key) || 0) > 1) return;
            if (hasConnectionTargetNear(page, point[0], point[1], wire.id)) return;
            issues.push({
              level: "注意",
              page: page.name,
              pageId: page.id,
              elementId: wire.id,
              message: "配線端点が未接続の可能性があります。",
              target: (wire.wireNo || wire.id) + " @ " + key
            });
          });
        });
        return issues;
      }

      function hasConnectionTargetNear(page, x, y, selfId) {
        return page.elements.some(element => {
          if (element.id === selfId) return false;
          if (element.type === "wire") {
            return wireSegments(element).some(segment => pointOnSegment(x, y, segment));
          }
          if (element.type === "junction") {
            return Math.abs((element.x || 0) - x) <= 1.2 && Math.abs((element.y || 0) - y) <= 1.2;
          }
          const box = elementBounds(element);
          if (!box) return false;
          return x >= box.x - 2 && x <= box.x + box.w + 2 && y >= box.y - 2 && y <= box.y + box.h + 2;
        });
      }

      function pointOnSegment(x, y, segment) {
        const vertical = Math.abs(segment[0] - segment[2]) < .001;
        if (vertical) return Math.abs(x - segment[0]) < .6 && between(y, segment[1], segment[3]);
        return Math.abs(y - segment[1]) < .6 && between(x, segment[0], segment[2]);
      }

      function openDialog(title, html) {
        qs("#dialogTitle").textContent = title;
        qs("#dialogBody").innerHTML = html;
        qs("#dialogBackdrop").classList.remove("hidden");
      }

      function closeDialog() {
        qs("#dialogBackdrop").classList.add("hidden");
      }

      function exportDxf() {
        const page = currentPage();
        const dxf = buildDxf(page);
        download((page.name || "page") + ".dxf", dxf, "application/dxf");
        setStatus("DXFを書き出しました。");
      }

      function buildDxf(page) {
        const out = [];
        dxfHeader(out);
        dxfFrame(out, page);
        page.elements.forEach(element => dxfElement(out, page, element));
        out.push("0", "ENDSEC", "0", "EOF");
        return out.join("\n") + "\n";
      }

      function dxfHeader(out) {
        out.push(
          "0", "SECTION",
          "2", "HEADER",
          "9", "$INSUNITS",
          "70", "4",
          "0", "ENDSEC",
          "0", "SECTION",
          "2", "ENTITIES"
        );
      }

      function dxfFrame(out, page) {
        const size = pageSize(page);
        const margin = frameMargin(size);
        dxfRect(out, page, "FRAME", margin, margin, size.w - margin * 2, size.h - margin * 2);
        dxfRect(out, page, "FRAME", margin + 4, margin + 4, size.w - (margin + 4) * 2, size.h - (margin + 4) * 2);
        if (page.frameVariant !== "blank") {
          const titleW = page.frameVariant === "side" ? Math.min(44, Math.max(34, size.w * .15)) : Math.min(124, size.w - margin * 2 - 12);
          const titleH = page.frameVariant === "side" ? 88 : 48;
          const x = size.w - margin - titleW;
          const y = size.h - margin - titleH;
          dxfRect(out, page, "TITLE", x, y, titleW, titleH);
          dxfText(out, page, "TITLE", x + 3, y + 8, 2.8, page.title?.title || "");
          dxfText(out, page, "TITLE", x + 3, y + 16, 2.4, page.title?.drawingNo || "");
        }
      }

      function dxfElement(out, page, element) {
        if (element.type === "underlayImage") return;
        if (element.type === "wire") {
          const layer = "WIRE_" + String(element.wireType || "control").toUpperCase();
          const points = element.points || [[0, 0], [20, 0]];
          dxfWireSegments(element).forEach(segment => dxfLine(out, page, layer, segment[0], segment[1], segment[2], segment[3]));
          if (element.wireNo) {
            const mid = wireLabelPoint(points);
            dxfText(out, page, "WIRENO", mid.x + 1.5, mid.y - 1.8, 2.4, element.wireNo);
          }
          return;
        }
        if (element.type === "line") {
          const points = element.points || [[0, 0], [20, 0]];
          const a = points[0];
          const b = points[points.length - 1];
          dxfLine(out, page, "GEOMETRY", a[0], a[1], b[0], b[1]);
          if (element.label) {
            const mid = pathMid(a, b);
            dxfText(out, page, "TEXT", mid.x, mid.y - 3, 2.4, element.label);
          }
          return;
        }
        if (element.type === "arrow") {
          const points = element.points || [[0, 0], [20, 0]];
          const a = points[0];
          const b = points[points.length - 1];
          dxfLine(out, page, "SYMBOL", a[0], a[1], b[0], b[1]);
          if (element.label) dxfText(out, page, "TEXT", (a[0] + b[0]) / 2, (a[1] + b[1]) / 2 - 3, 2.4, element.label);
          return;
        }
        if (element.type === "text") {
          dxfText(out, page, "TEXT", element.x || 0, element.y || 0, element.fontSize || 3.5, element.text || "");
          return;
        }
        if (element.type === "installationBox" || element.type === "locationBox") {
          const w = Number(element.w || 120);
          const h = Number(element.h || 80);
          const prefix = element.type === "installationBox" ? "INST" : "LOC";
          dxfRectLocal(out, page, "AREA", element, 0, 0, w, h);
          dxfLineLocal(out, page, "AREA", element, 0, 7, Math.min(w, Math.max(24, String(element.label || "").length * 3.1 + 14)), 7);
          dxfTextLocal(out, page, "AREA", element, 2, 4.8, 2.5, prefix + ": " + (element.label || ""));
          return;
        }
        if (element.type === "rect") {
          const w = Number(element.w || 34);
          const h = Number(element.h || 22);
          dxfRectLocal(out, page, "GEOMETRY", element, 0, 0, w, h);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, h / 2, 2.6, element.label);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "circle") {
          const w = Number(element.w || 22);
          const h = Number(element.h || 22);
          if (Math.abs(w - h) < .01) {
            dxfCircleLocal(out, page, "GEOMETRY", element, w / 2, h / 2, w / 2);
          } else {
            dxfEllipseApproxLocal(out, page, "GEOMETRY", element, w / 2, h / 2, w / 2, h / 2);
          }
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, h / 2, 2.6, element.label);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "terminal") {
          dxfTerminalLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "terminalStrip" || element.type === "connector") {
          const count = Math.max(1, Number(element.count || 8));
          const vertical = element.orientation === "vertical";
          const shape = element.terminalShape || "circle";
          const pitchSize = element.type === "connector" ? 7 : 8;
          const w = Number(element.w || (vertical ? 12 : count * pitchSize));
          const h = Number(element.h || (vertical ? count * pitchSize : 12));
          if (vertical) {
            const pitch = h / count;
            dxfLineLocal(out, page, "SYMBOL", element, w / 2, 0, w / 2, h);
            for (let i = 0; i < count; i++) {
              const cy = pitch * i + pitch / 2;
              dxfTerminalNodeLocal(out, page, "SYMBOL", element, w / 2, cy, Math.min(2.8, pitch * .32), shape);
              dxfTextLocal(out, page, "TEXT", element, w / 2 - 1.1, cy + .65, 1.7, (element.prefix || "") + String(Number(element.start || 1) + i));
            }
            if (element.label) dxfTextLocal(out, page, "TEXT", element, w + 3, 0, 2.5, element.label);
          } else {
            const pitch = w / count;
            dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, w, h / 2);
            for (let i = 0; i < count; i++) {
              const cx = pitch * i + pitch / 2;
              dxfTerminalNodeLocal(out, page, "SYMBOL", element, cx, h / 2, Math.min(2.8, pitch * .32), shape);
              dxfTextLocal(out, page, "TEXT", element, cx - 1.1, h / 2 + .65, 1.7, (element.prefix || "") + String(Number(element.start || 1) + i));
            }
            if (element.label) dxfTextLocal(out, page, "TEXT", element, 0, -3, 2.5, element.label);
          }
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "table") {
          const rows = Math.max(1, Number(element.rows || 6));
          const cols = Math.max(1, Number(element.cols || 4));
          const w = Number(element.w || 78);
          const h = Number(element.h || 44);
          dxfRectLocal(out, page, "TABLE", element, 0, 0, w, h);
          for (let i = 1; i < rows; i++) dxfLineLocal(out, page, "TABLE", element, 0, h * i / rows, w, h * i / rows);
          for (let i = 1; i < cols; i++) dxfLineLocal(out, page, "TABLE", element, w * i / cols, 0, w * i / cols, h);
          String(element.cellText || "").split(/\r?\n/).slice(0, rows).forEach((line, rowIndex) => {
            const cells = line.includes("\t") ? line.split("\t") : line.split(",");
            cells.slice(0, cols).forEach((cell, colIndex) => {
              dxfTextLocal(out, page, "TEXT", element, colIndex * (w / cols) + 1.5, rowIndex * (h / rows) + h / rows / 2, 2.2, cell.trim());
            });
          });
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, -4, 2.5, element.label);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (["contactNO", "contactNC", "pushButton", "selectorSwitch", "limitSwitch"].includes(element.type)) {
          dxfContactLocal(out, page, element, element.type === "contactNC");
          if (element.type === "pushButton") dxfPushButtonActuatorLocal(out, page, element);
          if (element.type === "selectorSwitch") dxfSelectorSwitchActuatorLocal(out, page, element);
          if (element.type === "limitSwitch") dxfLimitSwitchActuatorLocal(out, page, element);

        if (element.type === "fuse") {
          dxfFuseLocal(out, page, element);

        if (element.type === "breaker") {
          dxfBreakerLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;

          dxfCoilLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "lamp") {
          dxfLampLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "buzzer") {
          dxfBuzzerLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "solenoidValve") {

          return;

        if (element.type === "sensor") {

        if (element.type === "ground") {
          dxfGroundLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "motor") {
          dxfMotorLocal(out, page, element);

        }
        if (element.type === "resistor") {
          dxfResistorLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);

        }
        if (element.type === "diode") {

          dxfVisibleAttributes(out, page, element);

        if (element.type === "fan") {

        if (element.type === "terminalBox") {
          dxfTerminalBoxLocal(out, page, element);
          dxfVisibleAttributes(out, page, element);
          return;
        }
        const box = elementBounds(element);
        if (["deviceBox", "plcBlock"].includes(element.type)) {
          dxfRectLocal(out, page, "SYMBOL", element, 0, 0, box.w, box.h);
          dxfTextLocal(out, page, "TEXT", element, box.w / 2 - 6, box.h / 2, 2.5, element.label || element.type);
          String(element.pinText || "").split(/\r?\n/).forEach((line, index) => {
            if (!line.trim()) return;
            dxfTextLocal(out, page, "TEXT", element, 2, 5 + index * 4, 2, line.trim());
          });
          dxfVisibleAttributes(out, page, element);
          return;
        }
        if (element.type === "junction") {
          dxfCircleLocal(out, page, "SYMBOL", element, 0, 0, Number(element.r || 6));
          if (element.label) dxfTextLocal(out, page, "TEXT", element, -4, -8, 2.4, element.label);
          dxfVisibleAttributes(out, page, element);

      function dxfContactLocal(out, page, element, closed) {
        if (element.orientation === "vertical") {
          const w = Number(element.w || 10);
          const h = Number(element.h || 16);
          const cx = w / 2;
          const upper = Math.max(4.2, h * .34);
          const lower = Math.min(h - 4.2, h * .66);
          const r = Math.min(1.05, Math.max(.75, w * .1));
          const bladeX = Math.min(w - 1, cx + Math.max(2.5, w * .34));
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, upper - r);
          dxfLineLocal(out, page, "SYMBOL", element, cx, lower + r, cx, h);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, upper, r);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, lower, r);
          dxfLineLocal(out, page, "SYMBOL", element, cx + r, lower - .2, bladeX, upper + (closed ? .2 : 2.4));
          if (closed) dxfLineLocal(out, page, "SYMBOL", element, bladeX - .1, lower - .9, cx + r, upper + .9);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, -Math.max(5, String(element.label).length * 1.35), h / 2 + .8, 2.2, element.label);
          return;
        }
        const w = Number(element.w || 10);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const left = Math.max(2.4, w * .3);
        const right = Math.min(w - 2.4, w * .7);
        const r = Math.min(.7, Math.max(.5, h * .09));
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, left - .7, cy);
        dxfLineLocal(out, page, "SYMBOL", element, right + .7, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, left, cy, r);
        dxfCircleLocal(out, page, "SYMBOL", element, right, cy, r);
        dxfLineLocal(out, page, "SYMBOL", element, left + .55, cy - .1, right - .3, closed ? cy + .05 : cy - 2.25);
        if (closed) dxfLineLocal(out, page, "SYMBOL", element, right - .35, cy - 2.2, right - .35, cy + 2.2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfTerminalLocal(out, page, element) {
        const label = element.label || "1";
        const w = Number(element.w || 10);
        const h = Number(element.h || 6);
        const r = Math.min(2.45, Math.max(1.8, Math.min(w, h) * .36));
        const cx = w / 2;
        const cy = h / 2;
        const shape = element.terminalShape || "circle";
        if (element.orientation === "vertical") {
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, cy - r);
          dxfLineLocal(out, page, "SYMBOL", element, cx, cy + r, cx, h);
          dxfTerminalNodeLocal(out, page, "SYMBOL", element, cx, cy, r, shape);
          dxfTextLocal(out, page, "TEXT", element, cx + r + .8, cy + .55, 1.8, label);
          return;
        }
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfTerminalNodeLocal(out, page, "SYMBOL", element, cx, cy, r, shape);
        dxfTextLocal(out, page, "TEXT", element, cx - String(label).length * .5, cy + .6, 1.8, label);
      }

      function dxfPushButtonActuatorLocal(out, page, element) {
        const w = Number(element.w || (element.orientation === "vertical" ? 8 : 10));
        const h = Number(element.h || (element.orientation === "vertical" ? 14 : 8));
        if (element.orientation === "vertical") {
          const cx = w / 2;
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, 2.6);
          dxfLineLocal(out, page, "SYMBOL", element, Math.max(0, cx - 4), 0, Math.min(w, cx + 4), 0);
          return;
        }
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, Math.max(1.2, h / 2 - 1.8));
        dxfLineLocal(out, page, "SYMBOL", element, Math.max(0, cx - 4), 0, Math.min(w, cx + 4), 0);
      }

      function dxfSelectorSwitchActuatorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 9);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx - 2.7, 1, cx + 2.7, 4.2);
        dxfLineLocal(out, page, "SYMBOL", element, cx + 2.7, 1, cx - 2.7, 4.2);
        dxfLineLocal(out, page, "SYMBOL", element, cx, 1, cx, Math.max(2.8, h / 2 - 1));
      }

      function dxfLimitSwitchActuatorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 8);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx - 4.2, 1, cx + 4.2, 1);
        dxfLineLocal(out, page, "SYMBOL", element, cx, 1, cx, Math.max(2.6, h / 2 - .9));
        dxfCircleLocal(out, page, "SYMBOL", element, cx + 4.8, 1, .8);
      }

      function dxfFuseLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 4.5);
        const lead = Math.min(3.5, Math.max(2.6, w * .24));
        const bodyX = lead;
        const bodyW = Math.max(5, w - lead * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, bodyX, h / 2);
        dxfRectLocal(out, page, "SYMBOL", element, bodyX, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, h / 2, w, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + 1.1, h - .8, bodyX + bodyW - 1.1, .8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);

      function dxfBreakerLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const left = Math.max(3, w * .32);
        const right = Math.min(w - 3, w * .72);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, left - .65, cy);
        dxfLineLocal(out, page, "SYMBOL", element, right + .65, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, left, cy, .65);
        dxfCircleLocal(out, page, "SYMBOL", element, right, cy, .65);
        dxfLineLocal(out, page, "SYMBOL", element, left + .7, cy - .2, right - .3, Math.max(1.1, cy - 2.25));
        dxfLineLocal(out, page, "SYMBOL", element, right - 1.1, cy + 1.7, right + 1.1, cy + 1.7);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfCoilLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 6);
        const cy = h / 2;
        const bodyX = Math.max(2.6, w * .24);
        const bodyW = Math.max(6, w - bodyX * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, bodyX, .8, bodyW, h - 1.6);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .35, 1.1, bodyX + bodyW * .35, h - 1.1);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .65, 1.1, bodyX + bodyW * .65, h - 1.1);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfLampLocal(out, page, element) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 10);
        if ((element.lampVariant || "pilot") === "cylinder") {
          const cy = h / 2;
          const bodyX = Math.max(3.5, w * .3);
          const bodyW = Math.max(5.5, w - bodyX * 2);
          const bodyY = Math.max(1.6, h * .18);
          const bodyH = h - bodyY * 2;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX, bodyY + 1, bodyX, bodyY + bodyH - 1);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, bodyY + 1, bodyX + bodyW, bodyY + bodyH - 1);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + 1, bodyW / 2, 1.2);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + bodyH - 1, bodyW / 2, 1.2);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        const r = Number(element.r || Math.min(w, h) * .34);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfLineLocal(out, page, "SYMBOL", element, cx - r * .45, cy, cx, cy - r * .32);
        dxfLineLocal(out, page, "SYMBOL", element, cx, cy - r * .32, cx + r * .45, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfBuzzerLocal(out, page, element) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 9);
        const cy = h / 2;
        if ((element.buzzerVariant || "horn") === "horn") {
          const throat = Math.max(4.2, w * .26);
          const mouthX = w - .4;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, throat - .8, cy);
          dxfCircleLocal(out, page, "SYMBOL", element, throat, cy, .85);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy - 2.3, throat + 6.8, cy - 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy - 2.4, mouthX, cy - 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy + 2.3, throat + 6.8, cy + 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy + 2.4, mouthX, cy + 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, mouthX, cy - 4.9, w, cy - 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy - 2, w, cy + 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy + 2, mouthX, cy + 4.9);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .24, cy, w * .62, 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, 2.2, w * .62, h - 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, h - 2.2, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .72, h * .3, w * .86, h * .42);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .42, w * .86, h * .58);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .58, w * .72, h * .7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .84, h * .18, w, h * .38);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .38, w, h * .62);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .62, w * .84, h * .82);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfSolenoidValveLocal(out, page, element) {
        const w = Number(element.w || 26);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const coilW = Math.max(7, w * .28);
        const bodyX = coilW + 2;
        const bodyW = Math.max(8, w - bodyX - 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 2.5, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 2.5, 2, coilW, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, 2, bodyX + bodyW, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, bodyX, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, h - 2, bodyX, 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, 2, bodyX + bodyW, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfSensorLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 14);
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 4, 2, w - 8, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, 7, 5, w - 10, 5);
        dxfLineLocal(out, page, "SYMBOL", element, 7, h - 5, w - 7, h - 5);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy - 4, w, cy - 8);
        dxfLineLocal(out, page, "SYMBOL", element, w - 3, cy, w + 2, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy + 4, w, cy + 8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfCableBundleLocal(out, page, element) {
        const w = Number(element.w || 32);
        const h = Number(element.h || 18);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .2, w, h * .2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .5, w, h * .5);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .8, w, h * .8);
        dxfRectLocal(out, page, "SYMBOL", element, w * .42, 1.5, w * .18, h - 3);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfTerminalBoxLocal(out, page, element) {
        const w = Number(element.w || 22);
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        dxfRectLocal(out, page, "SYMBOL", element, 0, 0, w, h);
        for (let i = 1; i < rows; i++) dxfLineLocal(out, page, "SYMBOL", element, 0, h * i / rows, w, h * i / rows);
        for (let i = 0; i < rows; i++) {
          const y = h * (i + .5) / rows;
          dxfLineLocal(out, page, "SYMBOL", element, -5, y, 0, y);
          dxfLineLocal(out, page, "SYMBOL", element, w, y, w + 5, y);
        }
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      function dxfGroundLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 14);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .42, h * .45, cx + w * .42, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .28, h * .68, cx + w * .28, h * .68);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .14, h * .88, cx + w * .14, h * .88);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, h + 4, 2.3, element.label);
      }

      function dxfMotorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        const r = Number(element.r || Math.min(w, h) * .35);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfTextLocal(out, page, "TEXT", element, cx - 1.5, cy + .8, 3.4, "M");
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfResistorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 6);
        const lead = Math.min(4, Math.max(3, w * .22));
        const bodyW = Math.max(6, w - lead * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfRectLocal(out, page, "SYMBOL", element, lead, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, lead + bodyW, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfDiodeLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 10);
        const lead = Math.min(4, Math.max(3, w * .2));
        const barX = w - lead - 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, 1.2, barX, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, lead, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, h - 1.2, lead, 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, 1.2, barX, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfFanLocal(out, page, element) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        const r = Number(element.r || Math.min(w, h) * .38);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .25, cy - r * .55, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .36, cy + r * .45, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx - r * .55, cy + r * .1, r * .36, r * .16);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfTransformerLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const leftX = Math.max(5, w * .3);
        const rightX = Math.min(w - 5, w * .7);
        const coreA = w / 2 - 1.2;
        const coreB = w / 2 + 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, leftX - 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, rightX + 4, cy, w, cy);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, leftX - 2.7, cy, 3.2, h / 2 - 2);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, rightX + 2.7, cy, 3.2, h / 2 - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreA, 2, coreA, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreB, 2, coreB, h - 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      function dxfVisibleAttributes(out, page, element) {
        if (!supportsElectricalAttributes(element)) return;
        const lines = visibleAttributeLines(element);
        if (!lines.length) return;
        const defaults = attributeDisplayDefaults(element);
        lines.forEach((line, index) => {
          dxfTextLocal(out, page, "ATTR", element, defaults.x, defaults.y + index * defaults.fontSize * 1.35, defaults.fontSize, line);
        });
      }

      function cadY(page, y) {
        return pageSize(page).h - y;
      }

      function dxfWireSegments(element) {
        const gaps = wireGapMarkers(element);
        if (!gaps.length) return wireSegments(element);
        return wireSegments(element).flatMap(segment => splitSegmentForDxfGaps(segment, gaps));
      }

      function splitSegmentForDxfGaps(segment, gaps) {
        const vertical = Math.abs(segment[0] - segment[2]) < .001;
        const fixed = vertical ? segment[0] : segment[1];
        const start = vertical ? segment[1] : segment[0];
        const end = vertical ? segment[3] : segment[2];
        const min = Math.min(start, end);
        const max = Math.max(start, end);
        const gapHalf = 3.2;
        const intervals = gaps
          .filter(gap => pointOnSegment(gap.x, gap.y, segment))
          .map(gap => {
            const center = vertical ? gap.y : gap.x;
            return { start: Math.max(min, center - gapHalf), end: Math.min(max, center + gapHalf) };
          })
          .filter(interval => interval.end > interval.start)
          .sort((a, b) => a.start - b.start);
        if (!intervals.length) return [segment];
        const merged = [];
        intervals.forEach(interval => {
          const last = merged[merged.length - 1];
          if (last && interval.start <= last.end) {
            last.end = Math.max(last.end, interval.end);
          } else {
            merged.push({ ...interval });
          }
        });
        const pieces = [];
        let cursor = min;
        merged.forEach(interval => {
          if (interval.start - cursor > .05) pieces.push([cursor, interval.start]);
          cursor = Math.max(cursor, interval.end);
        });
        if (max - cursor > .05) pieces.push([cursor, max]);
        return pieces.map(([a, b]) => vertical ? [fixed, a, fixed, b] : [a, fixed, b, fixed]);
      }

      function dxfLine(out, page, layer, x1, y1, x2, y2) {
        out.push("0", "LINE", "8", layer, "10", round(x1), "20", round(cadY(page, y1)), "11", round(x2), "21", round(cadY(page, y2)));
      }

      function dxfText(out, page, layer, x, y, size, text) {
        String(text || "").split("\n").forEach((line, index) => {
          out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y + index * size * 1.25)), "40", round(size), "1", line);
        });
      }

      function dxfCircle(out, page, layer, x, y, r) {
        out.push("0", "CIRCLE", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(r));
      }

      function dxfRect(out, page, layer, x, y, w, h) {
        dxfLine(out, page, layer, x, y, x + w, y);
        dxfLine(out, page, layer, x + w, y, x + w, y + h);
        dxfLine(out, page, layer, x + w, y + h, x, y + h);
        dxfLine(out, page, layer, x, y + h, x, y);
      }

      function localPoint(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return [
          Number(element.x || 0) + x * cos - y * sin,
          Number(element.y || 0) + x * sin + y * cos
        ];
      }

      function dxfLineLocal(out, page, layer, element, x1, y1, x2, y2) {
        const a = localPoint(element, x1, y1);
        const b = localPoint(element, x2, y2);
        dxfLine(out, page, layer, a[0], a[1], b[0], b[1]);
      }

      function dxfTextLocal(out, page, layer, element, x, y, size, text) {
        const p = localPoint(element, x, y);
        dxfText(out, page, layer, p[0], p[1], size, text);
      }

      function dxfCircleLocal(out, page, layer, element, x, y, r) {
        const p = localPoint(element, x, y);
        dxfCircle(out, page, layer, p[0], p[1], r);
      }

      function dxfRectLocal(out, page, layer, element, x, y, w, h) {
        dxfLineLocal(out, page, layer, element, x, y, x + w, y);
        dxfLineLocal(out, page, layer, element, x + w, y, x + w, y + h);
        dxfLineLocal(out, page, layer, element, x + w, y + h, x, y + h);
        dxfLineLocal(out, page, layer, element, x, y + h, x, y);
      }

      function dxfTerminalNodeLocal(out, page, layer, element, cx, cy, r, shape) {
        if (shape === "square") {
          dxfRectLocal(out, page, layer, element, cx - r, cy - r, r * 2, r * 2);
          return;
        }
        dxfCircleLocal(out, page, layer, element, cx, cy, r);
      }

      function dxfEllipseApproxLocal(out, page, layer, element, cx, cy, rx, ry) {
        const steps = 32;
        let prev = null;
        for (let i = 0; i <= steps; i++) {
          const angle = Math.PI * 2 * i / steps;
          const point = [cx + Math.cos(angle) * rx, cy + Math.sin(angle) * ry];
          if (prev) dxfLineLocal(out, page, layer, element, prev[0], prev[1], point[0], point[1]);
          prev = point;
        }
      }

        const svg = qs("#canvas");
        svg.addEventListener("dragover", event => {
          event.preventDefault();

        });
        svg.addEventListener("drop", event => {

          const type = event.dataTransfer.getData("text/plain");
          const point = canvasPoint(event);
          if (type) placeElement(type, point.x, point.y);
        });
        svg.addEventListener("pointerdown", onCanvasPointerDown);
        svg.addEventListener("pointermove", onCanvasPointerMove);
        svg.addEventListener("pointerup", onCanvasPointerUp);
        svg.addEventListener("pointercancel", onCanvasPointerUp);
        svg.addEventListener("dblclick", onCanvasDoubleClick);
        svg.addEventListener("wheel", onCanvasWheel, { passive: false });

        window.addEventListener("keydown", onKeyDown);
      }

      function onCanvasWheel(event) {
        if (!event.ctrlKey && !event.metaKey) return;
        event.preventDefault();
        const delta = event.deltaY < 0 ? .25 : -.25;
        setZoom(state.settings.zoom + delta, false);
      }

      function onCanvasPointerDown(event) {
        const svg = qs("#canvas");
        const point = canvasPoint(event, { connectionOnly: activeTool === "wire", raw: activeTool === "select" });
        const pointHandle = event.target.closest("[data-point-index]");
        if (pointHandle) {
          const element = selectedElement();
          const pointIndex = Number(pointHandle.dataset.pointIndex);
          if (!element || !element.points?.[pointIndex]) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "point",
            elementId: element.id,
            pointIndex,
            start: point,
            original: deepClone(element)
          };
          svg.setPointerCapture(event.pointerId);
          event.stopPropagation();
          render();
          return;
        }
        const resizeHandle = event.target.closest("[data-resize-handle]");
        if (resizeHandle) {
          const element = selectedElement();
          if (!element || !canResizeElement(element)) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "resize",
            elementId: element.id,
            handle: resizeHandle.dataset.resizeHandle,
            start: point,
            original: deepClone(element),
            originalBox: elementBounds(element)
          };
          svg.setPointerCapture(event.pointerId);
          event.stopPropagation();
          render();
          return;
        }
        const targetElement = event.target.closest("[data-id]");
        if (activeTool === "wire" || activeTool === "arrow" || activeTool === "line") {
          const element = defaultElement(activeTool, point.x, point.y);
          element.points = [[point.x, point.y], [point.x, point.y]];
          currentPage().elements.push(element);
          selectSingle(element.id);
          dragState = { mode: "draw", elementId: element.id, start: point };
          svg.setPointerCapture(event.pointerId);
          render();
          return;
        }
        if (activeTool !== "select" && activeTool !== "wire" && activeTool !== "arrow") {
          placeElement(activeTool, point.x, point.y);
          return;
        }
        if (targetElement) {
          const targetId = targetElement.dataset.id;
          if (event.shiftKey) {
            toggleSelection(targetId);
            render();
            return;
          }
          if (!selectedIds.includes(targetId)) selectSingle(targetId);
          const element = selectedElement();
          if (isElementLocked(element)) {
            setStatus("ロックされた要素です。ロック解除すると移動できます。");
            render();
            return;
          }
          if (selectedElements().some(isElementLocked)) {
            setStatus("ロックされた要素が含まれています。ロック解除すると移動できます。");
            render();
            return;
          }
          dragState = {
            mode: "move",
            elementId: targetId,
            start: point,
            originals: selectedElements().map(item => deepClone(item)),
            attachedWires: currentPage().elements
              .filter(item => item.type === "wire" && !currentSelectionIdSet().has(item.id))
              .map(item => deepClone(item))
          };
          svg.setPointerCapture(event.pointerId);
          render();
        } else {
          if (!event.shiftKey) setSelection([]);
          dragState = { mode: "marquee", start: point, current: point, append: event.shiftKey, originalIds: [...selectedIds] };
          svg.setPointerCapture(event.pointerId);
          render();
        }
      }

      function onCanvasPointerMove(event) {
        if (!dragState) return;
        const page = currentPage();
        const activeDragElement = page?.elements.find(item => item.id === dragState.elementId);
        const point = canvasPoint(event, {
          excludeSelected: ["move", "resize", "point", "draw"].includes(dragState.mode),
          connectionOnly: activeDragElement?.type === "wire" && ["draw", "point"].includes(dragState.mode)
        });
        if (dragState.mode === "marquee") {
          dragState.current = point;
          render();
          return;
        }
        if (dragState.mode === "resize") {
          applyResizeDrag(point);
          render();
          return;
        }
        if (dragState.mode === "point") {
          applyPointDrag(point);
          render();
          return;
        }
        const element = selectedElement();
        if (!element) return;
        if (dragState.mode === "draw") {
          element.points[element.points.length - 1] = [point.x, point.y];
          render();
          return;
        }
        if (dragState.mode === "move") {
          let dx = point.x - dragState.start.x;
          let dy = point.y - dragState.start.y;
          const snapDelta = movementSnapDelta(dragState.originals || [], dx, dy);
          dx += snapDelta.dx;
          dy += snapDelta.dy;
          (dragState.originals || []).forEach(original => {
            const target = page.elements.find(item => item.id === original.id);
            if (!target) return;
            if (target.points) {
              target.points = original.points.map(p => [p[0] + dx, p[1] + dy]);
            } else {
              target.x = Number(original.x || 0) + dx;
              target.y = Number(original.y || 0) + dy;
            }
          });
          syncAttachedWireEndpoints(page, dragState.originals || [], dragState.attachedWires || [], dx, dy);
          render();
        }
      }

      function syncAttachedWireEndpoints(page, originals, wireOriginals, dx, dy) {
        const pairs = [];
        originals.forEach(original => {
          if (!original || original.points) return;
          const oldAnchors = componentConnectionAnchors(original);
          if (!oldAnchors.length) return;
          const moved = deepClone(original);
          moved.x = Number(moved.x || 0) + dx;
          moved.y = Number(moved.y || 0) + dy;
          const newAnchors = componentConnectionAnchors(moved);
          oldAnchors.forEach((oldAnchor, index) => {
            const next = newAnchors[index];
            if (next) pairs.push({ oldAnchor, newAnchor: next });
          });
        });
        if (!pairs.length) return;
        const selectedSet = currentSelectionIdSet();
        wireOriginals.forEach(originalWire => {
          const wire = page.elements.find(item => item.id === originalWire.id);
          if (!wire || selectedSet.has(wire.id) || !wire.points) return;
          const lastIndex = originalWire.points.length - 1;
          wire.points = originalWire.points.map((point, index) => {
            if (index !== 0 && index !== lastIndex) return [round(point[0]), round(point[1])];
            let pair = null;
            pairs.forEach(item => {
              const d = Math.hypot(point[0] - item.oldAnchor.x, point[1] - item.oldAnchor.y);
              if (d <= SNAP_RADIUS_MM && (!pair || d < pair.d)) pair = { ...item, d };
            });
            return pair ? [round(pair.newAnchor.x), round(pair.newAnchor.y)] : [round(point[0]), round(point[1])];
          });
        });
      }

      function componentConnectionAnchors(element) {
        if (!element || element.points) return [];
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        return elementConnectionAnchors(element);
      }

      function movementSnapDelta(originals, dx, dy) {
        if (!state.settings.objectSnap || !originals.length) return { dx: 0, dy: 0 };
        const page = currentPage();
        const excludeIds = new Set(originals.map(original => original.id));
        const targets = collectSnapAnchors(page, excludeIds);
        let best = null;
        originals.flatMap(original => movedElementAnchors(original, dx, dy)).forEach(source => {
          targets.forEach(target => {
            const d = Math.hypot(target.x - source.x, target.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: target.x - source.x, dy: target.y - source.y };
            }
          });
          const segmentTarget = closestSegmentSnapPoint(page, source.x, source.y, excludeIds);
          if (segmentTarget) {
            const d = Math.hypot(segmentTarget.x - source.x, segmentTarget.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: segmentTarget.x - source.x, dy: segmentTarget.y - source.y };
            }
          }
        });
        return best ? { dx: best.dx, dy: best.dy } : { dx: 0, dy: 0 };
      }

      function movedElementAnchors(original, dx, dy) {
        const element = deepClone(original);
        if (element.points) {
          element.points = element.points.map(point => [point[0] + dx, point[1] + dy]);
          return (element.points || []).map(point => ({ x: point[0], y: point[1] }));
        }
        element.x = Number(element.x || 0) + dx;
        element.y = Number(element.y || 0) + dy;
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        const anchors = elementConnectionAnchors(element);
        if (anchors.length) return anchors;
        const box = elementBounds(element);
        return box ? [{ x: box.x + box.w / 2, y: box.y + box.h / 2 }] : [];
      }

      function snapPointElementConnections(element, page) {
        if (!element || !page || !element.points?.length || !state.settings.objectSnap) return;
        const excludeIds = new Set([element.id]);
        const lastIndex = element.points.length - 1;
        const targetIndices = element.type === "wire" ? [0, lastIndex] : element.points.map((_, index) => index);
        targetIndices.forEach(index => {
          const point = element.points[index];
          if (!point) return;
          const snapped = snapConnectionPoint(page, point[0], point[1], excludeIds);
          element.points[index] = [round(snapped.x), round(snapped.y)];
        });
      }

      function snapConnectionPoint(page, x, y, excludeIds = new Set()) {
        const anchor = closestAnchor(collectConnectionAnchors(page, excludeIds), x, y);
        if (anchor) return { x: anchor.x, y: anchor.y };
        const segment = closestSegmentSnapPoint(page, x, y, excludeIds);
        return segment || { x, y };
      }

      function onCanvasPointerUp(event) {
        if (!dragState) return;
        const finishedDrag = dragState;
        try {
          qs("#canvas").releasePointerCapture(event.pointerId);
        } catch (_) {
          // The pointer may already be released by the browser.
        }
        if (dragState.mode === "marquee") {
          applyMarqueeSelection(dragState);
          dragState = null;
          render();
          return;
        }
        const page = currentPage();
        const touchedIds = finishedDrag.mode === "move"
          ? (finishedDrag.originals || []).map(original => original.id)
          : [finishedDrag.elementId].filter(Boolean);
        touchedIds.forEach(id => snapPointElementConnections(page?.elements.find(item => item.id === id), page));
        const element = selectedElement();
        if (element && element.points) {
          const a = element.points[0];
          const b = element.points[element.points.length - 1];
          if (Math.abs(a[0] - b[0]) < .5 && Math.abs(a[1] - b[1]) < .5) {
            currentPage().elements = currentPage().elements.filter(item => item.id !== element.id);
            setSelection([]);
          }
        }
        dragState = null;
        commitHistory("作図を更新しました。");
        render();
      }

      function applyMarqueeSelection(marquee) {
        const page = currentPage();
        if (!page) return;
        const rect = normalizedRect(marquee.start, marquee.current || marquee.start);
        if (rect.w < .8 && rect.h < .8) {
          if (!marquee.append) setSelection([]);
          return;
        }
        const hits = page.elements
          .filter(element => element.type !== "underlayImage")
          .filter(isElementVisible)
          .filter(element => {
            const box = elementBounds(element);
            return box && boundsIntersect(rect, box);
          })
          .map(element => element.id);
        if (marquee.append) {
          setSelection(Array.from(new Set([...(marquee.originalIds || []), ...hits])));
        } else {
          setSelection(hits);
        }
      }

      function applyResizeDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        const box = dragState.originalBox;
        if (!element || !box) return;
        const minSize = 2.5;
        let x = box.x;
        let y = box.y;
        let w = box.w;
        let h = box.h;
        const right = box.x + box.w;
        const bottom = box.y + box.h;
        if (dragState.handle.includes("e")) {
          w = Math.max(minSize, point.x - box.x);
        }
        if (dragState.handle.includes("s")) {
          h = Math.max(minSize, point.y - box.y);
        }
        if (dragState.handle.includes("w")) {
          x = Math.min(point.x, right - minSize);
          w = right - x;
        }
        if (dragState.handle.includes("n")) {
          y = Math.min(point.y, bottom - minSize);
          h = bottom - y;
        }
        element.x = round(x);
        element.y = round(y);
        element.w = round(w);
        element.h = round(h);
      }

      function applyPointDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        if (!element || !element.points?.[dragState.pointIndex]) return;
        element.points[dragState.pointIndex] = [round(point.x), round(point.y)];
      }

      function onCanvasDoubleClick(event) {
        const targetElement = event.target.closest("[data-id]");
        if (!targetElement) return;
        selectSingle(targetElement.dataset.id);
        const element = selectedElement();
        if (!element) return;
        if (element.type === "text") {
          const text = prompt("文字を入力", element.text || "");
          if (text !== null) {
            element.text = text;
            commitHistory("文字を更新しました。");
            render();
          }
        } else if (element.type === "wire") {
          const text = prompt("線番を入力", element.wireNo || "");
          if (text !== null) {
            element.wireNo = text;
            commitHistory("線番を更新しました。");
            render();
          }
        } else {
          const text = prompt("ラベルを入力", element.label || "");
          if (text !== null) {
            element.label = text;
            commitHistory("ラベルを更新しました。");
            render();
          }
        }
      }

      function onKeyDown(event) {
        const tag = document.activeElement?.tagName;
        const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(tag);
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          saveProject();
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          restoreHistory(historyIndex - 1);
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
          event.preventDefault();
          restoreHistory(historyIndex + 1);
          return;
        }
        if (editing) return;
        if (!event.ctrlKey && !event.metaKey && !event.altKey) {
          const toolShortcuts = { s: "select", v: "select", w: "wire", t: "text", l: "line", r: "rect", c: "circle" };
          const tool = toolShortcuts[event.key.toLowerCase()];
          if (tool) {
            event.preventDefault();
            setActiveTool(tool);
            return;
          }
        }
        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
          event.preventDefault();
          copySelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v") {
          event.preventDefault();
          pasteClipboard();
        }
        const nudge = event.shiftKey ? 5 : 1;
        const arrows = { ArrowLeft: [-nudge, 0], ArrowRight: [nudge, 0], ArrowUp: [0, -nudge], ArrowDown: [0, nudge] };
        if (arrows[event.key] && selectedElement()) {
          event.preventDefault();
          moveSelected(arrows[event.key][0], arrows[event.key][1]);
          commitHistory("要素を移動しました。");
          render();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "d") {
          event.preventDefault();
          duplicateSelected();
        }
      }

      attachEvents();
      initProject();
    })();
  </script>
</body>
</html>
