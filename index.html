          solenoidValve: { ...base, w: 25, h: 16, label: "SOL" },
          sensor: { ...base, w: 25, h: 14, label: "SEN" },
          powerSupply: { ...base, w: 35, h: 25, label: "PS" },
          transformer: { ...base, w: 15, h: 17, label: "Tr1" },
          meter: { ...base, w: 10, h: 4.4, label: "V" },
          inductor: { ...base, w: 10, h: 3, label: "L" },
          heater: { ...base, w: 10, h: 4.4, label: "H" },
          timerContactNO: { ...base, w: 10, h: 4.4, label: "T", orientation: "horizontal", refNo: "" },
          timerContactNC: { ...base, w: 10, h: 4.4, label: "T", orientation: "horizontal", refNo: "" },
          floatSwitch: { ...base, w: 10, h: 6, label: "FS", orientation: "horizontal" },
          thermoSwitch: { ...base, w: 10, h: 5, label: "TS", orientation: "horizontal" },
          flowSwitch: { ...base, w: 10, h: 6, label: "FLS", orientation: "horizontal" },
          footSwitch: { ...base, w: 10, h: 6.5, label: "FTS", orientation: "horizontal" },
          logicGate: { ...base, w: 10, h: 10, label: "" },
          photocoupler: { ...base, w: 10, h: 8, label: "PC" },
          bell: { ...base, w: 10, h: 5.4, label: "BL" },
          battery: { ...base, w: 10, h: 4.4, label: "BT" },
          rectifierBox: { ...base, w: 10, h: 6, label: "REC" },
          currentTransformer: { ...base, w: 10, h: 4.4, label: "CT" },
          arrester: { ...base, w: 10, h: 6, label: "AR" },
          transistor: { ...base, w: 10, h: 6, label: "TR" },
          disconnector: { ...base, w: 10, h: 5, label: "DS", orientation: "horizontal" },
          outlet: { ...base, w: 10, h: 6, label: "SC" },
          beacon: { ...base, w: 10, h: 6, label: "SL" },
          ground: { ...base, w: 4, h: 5, label: "E" },
          motor: { ...base, w: 16, h: 16, label: "M" },
          fan: { ...base, w: 15, h: 15, r: 5, label: "FAN" },
          resistor: { ...base, w: 10, h: 2.6, label: "R", orientation: "horizontal", resistorStyle: "box" },
          capacitor: { ...base, w: 10, h: 4.4, label: "C" },
          diode: { ...base, w: 10, h: 4.4, label: "D" },
          thermalRelay: { ...base, w: 10, h: 4, label: "THR", orientation: "horizontal", refNo: "" },
          thermalElement: { ...base, w: 10, h: 3, label: "OL", orientation: "horizontal" },
          positionMark: { ...base, w: 4, h: 6, label: "入", markStyle: "box" },
          polarityMark: { ...base, w: 2.6, h: 2.6, label: "", sign: "+" },
          deviceBox: { ...base, w: 30, h: 25, label: "機器", pins: 4, pinText: "1\n2\n3\n4", rightPinText: "" },
          plcBlock: { ...base, w: 50, h: 60, label: "PLC", rows: 8, pinText: "I00\nI01\nI02\nI03\nO00\nO01\nO02\nO03" },
          connector: { ...base, w: 70, h: 10, count: 10, start: 1, prefix: "", orientation: "horizontal", terminalShape: "circle", label: "CN" },
          cableMarker: { ...base, w: 28, h: 12, label: "C" },
          cableBundle: { ...base, w: 32, h: 18, label: "CBL" },
          terminalBox: { ...base, w: 22.5, h: 15, label: "TB", rows: 3 },
          table: { ...base, w: 86, h: 48, rows: 6, cols: 4, label: "表", colWidths: "", rowHeights: "", tableFontSize: 2.2, cellText: "No.\t項目\t内容\t備考" },
          junction: { ...base, w: 2, h: 2, r: 0.5, label: "" },
          arrow: { id: uid("el"), type: "arrow", points: [[x, y], [x + 30, y]], label: "REF", signalRole: "reference", arrowStyle: "open", arrowAtStart: false, stroke: state.settings.stroke, layer: defaultLayerFor("arrow") },
          dimension: { id: uid("el"), type: "dimension", points: [[x, y], [x + 30, y]], label: "", dimOffset: 6, stroke: state.settings.stroke, layer: "notes" },
          wire: { id: uid("el"), type: "wire", points: [[x, y], [x + 30, y]], wireNo: "", wireNoAlign: "mid", fixedWireNo: false, hideWireNo: false, gapAtMid: false, fromOverride: "", toOverride: "", wireType: state.settings.currentWireType, stroke: state.settings.stroke, layer: "wires" }
        };
        return deepClone(defaults[type] || defaults.deviceBox);
      }

      // 種別→既定レイヤ(settings.currentLayerを優先しつつ推定)。
      function defaultLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "arc" || type === "polygon" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return state.settings.currentLayer || "layout";
        if (type === "mechanicalLink") return state.settings.currentLayer || "symbols";
        return state.settings.currentLayer || "symbols";
      }

      // 種別→推定レイヤ(配線=wires、注記=notes等)。
      function inferredLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "arc" || type === "polygon" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return "layout";
        if (type === "mechanicalLink") return "symbols";
        return "symbols";
      }

      // ポインタイベント→用紙mm座標へ変換(getScreenCTMの逆行列)。raw指定でスナップなしの生座標。
      function canvasPoint(event, options = {}) {
        // 並べて表示ではイベントの発生したページSVG基準で座標変換する(単一表示は#canvas)
        const svg = (event.target && event.target.closest && event.target.closest("svg.drawing-page")) || qs("#canvas");
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
        if (options.raw) return { x: transformed.x, y: transformed.y };
        return snapPoint(transformed.x, transformed.y, options);
      }

      // 1値をグリッドへスナップ(設定OFF時は素通し)。
      function snap(value) {
        if (!state.settings.snap) return value;
        return snapToGrid(value);
      }

      // スナップON/OFFに関係なく、現在設定のグリッドへ数値を丸める内部ヘルパ。
      function snapToGrid(value) {
        const grid = Number(state.settings.grid || 2.5);
        return round(Math.round(Number(value || 0) / grid) * grid);
      }

      // 座標スナップの本体。優先順: 接続点/端点吸着(objectSnap) → 設備標準ページの行磁気(9.5mmピッチ) → グリッド。
      // optionsで接続点限定(connectionOnly)などを制御。
      function snapPoint(x, y, options = {}) {
        const gridPoint = { x: snap(x), y: snap(y) };
        const activePage = currentPage();
        if (activePage && activePage.frameVariant === "ladder" && state.settings.snap) {
          const row = LADDER_GRID.top + LADDER_GRID.pitch * Math.round((y - LADDER_GRID.top) / LADDER_GRID.pitch);
          if (Math.abs(row - y) <= 2 && row >= LADDER_GRID.top && row <= LADDER_GRID.top + LADDER_GRID.pitch * LADDER_GRID.rows) {
            gridPoint.y = round(row);
          }
        }
        if (!state.settings.objectSnap) return gridPoint;
        const excludeIds = options.excludeIds || (options.excludeSelected ? currentSelectionIdSet() : new Set());
        const anchors = options.connectionOnly
          ? collectConnectionAnchors(currentPage(), excludeIds)
          : collectSnapAnchors(currentPage(), excludeIds);
        const best = closestAnchor(anchors, x, y);
        if (best) return { x: best.x, y: best.y };
        const segmentSnap = closestSegmentSnapPoint(currentPage(), x, y, excludeIds);
        return segmentSnap || gridPoint;
      }

      // 選択中ID集合をSetで返す(スナップ除外などの下請け)。
      function currentSelectionIdSet() {
        return new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []));
      }

      // 端点スナップ候補(配線端点・図形角など)を収集。excludeIdsは除外(自分自身への吸着防止)。
      function collectSnapAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = collectConnectionAnchors(page, excludeIds);
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.points || element.type === "junction" || element.type === "terminalStrip" || element.type === "connector") return;
          const box = elementBounds(element);
          if (!box) return;
          anchors.push({ x: box.x, y: box.y });
          anchors.push({ x: box.x + box.w, y: box.y });
          anchors.push({ x: box.x, y: box.y + box.h });
          anchors.push({ x: box.x + box.w, y: box.y + box.h });
          anchors.push({ x: box.x + box.w / 2, y: box.y + box.h / 2 });
        });
        return anchors;
      }

      // 接続点スナップ候補(端子・シンボル接続点・端子台ノード)を収集。
      function collectConnectionAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = [];
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.type === "wire" || element.type === "line" || element.type === "mechanicalLink" || element.type === "arrow" || element.type === "polygon") {
            // 多角形は各頂点が吸着先になる(配線・直線の端点も同様)
            (element.points || []).forEach(point => anchors.push({ x: point[0], y: point[1], elementId: element.id, kind: "point" }));
            return;
          }
          if (element.type === "arc") {
            // 円弧・楕円弧は両端点を吸着先にする
            arcEndpoints(element).forEach(point => anchors.push({ ...point, elementId: element.id, kind: "point" }));
            return;
          }
          if (element.type === "junction") {
            anchors.push({ x: element.x || 0, y: element.y || 0, elementId: element.id, kind: "junction" });
            return;
          }
          if (element.type === "terminalStrip" || element.type === "connector") {
            const geo = terminalStripGeometry(element);
            for (let i = 0; i < (geo.nodes || geo.count); i++) {
              anchors.push({ ...terminalStripNodeGlobal(element, i), elementId: element.id, kind: "terminal" });
            }
            return;
          }
          elementConnectionAnchors(element).forEach(anchor => anchors.push({ ...anchor, elementId: element.id, kind: "terminal" }));
        });
        return anchors;
      }

      // 候補点群から半径内で最も近い1点を返す。
      function closestAnchor(anchors, x, y, radius = SNAP_RADIUS_MM) {
        let best = null;
        anchors.forEach(anchor => {
          const d = Math.hypot(anchor.x - x, anchor.y - y);
          if (d <= radius && (!best || d < best.d)) best = { ...anchor, d };
        });
        return best;
      }

      // 既存配線セグメント上への吸着点(垂線の足)を探す。
      function closestSegmentSnapPoint(page, x, y, activeIds = new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []))) {
        if (!page) return null;
        let best = null;
        page.elements.forEach(element => {
          if (activeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (!["wire", "line", "mechanicalLink", "arrow"].includes(element.type)) return;
          wireSegments(element).forEach(segment => {
            const point = closestPointOnSegment(x, y, segment);
            const d = Math.hypot(point.x - x, point.y - y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) best = { ...point, d };
          });
        });
        return best ? { x: round(best.x), y: round(best.y) } : null;
      }

      // 点→線分への最近点を計算。
      function closestPointOnSegment(x, y, segment) {
        const [x1, y1, x2, y2] = segment;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy;
        if (lengthSq < .0001) return { x: x1, y: y1 };
        const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / lengthSq));
        return { x: x1 + dx * t, y: y1 + dy * t };
      }

      // 要素種別ごとの接続点(配線が刺さる点)一覧。geoシンボルはgeoAnchors()を使用。
      function elementConnectionAnchors(element) {
        const fromGeo = geoAnchors(element);
        if (fromGeo) return fromGeo;
        const anchors = [];
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        const add = (x, y) => anchors.push(localAnchor(element, x, y));
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          for (let i = 0; i < geo.nodes; i++) {
            const node = terminalStripNodeLocal(element, i);
            add(node.x, node.y);
          }
          return anchors;
        }
        if (element.type === "terminal") {
          const cx = w / 2;
          const cy = h / 2;
          add(cx, cy);
          if (element.orientation === "vertical") {
            add(cx, 0);
            add(cx, h);
          } else {
            add(0, cy);
            add(w, cy);
          }
          return anchors;
        }
        if (["contactNO", "contactNC", "contactBlock", "pushButton", "selectorSwitch", "limitSwitch"].includes(element.type)) {
          if (element.orientation === "vertical") {
            add(w / 2, 0);
            add(w / 2, h);
          } else {
            add(0, h / 2);
            add(w, h / 2);
          }
          return anchors;
        }
        if (["fuse", "breaker"].includes(element.type) && element.orientation === "vertical") {
          add(w / 2, 0);
          add(w / 2, h);
          return anchors;
        }
        if (["coil", "fuse", "breaker", "lamp", "buzzer", "meter", "inductor", "heater", "bell", "battery", "rectifierBox", "currentTransformer", "arrester", "disconnector", "beacon", "solenoidValve", "sensor", "powerSupply", "transformer", "motor", "fan", "resistor", "capacitor", "diode", "thermalRelay", "cableMarker", "cableBundle"].includes(element.type)) {
          add(0, h / 2);
          add(w, h / 2);
          return anchors;
        }
        if (element.type === "terminalBox") {
          const rows = Math.max(2, Number(element.rows || 3));
          for (let i = 0; i < rows; i++) {
            const y = terminalBoxPinY(element, i);
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "ground") {
          add(w / 2, 0);
          return anchors;
        }
        if (element.type === "cableMarker") {
          return `
            <label>ケーブルタグ</label><input data-bind="cableTag" type="text" value="${escapeAttr(element.cableTag || element.label || "")}">
            <div class="row">
              <div><label>芯番号</label><input data-bind="coreNo" type="text" value="${escapeAttr(element.coreNo || "")}"></div>
              <div><label>芯色</label><input data-bind="coreColor" type="text" value="${escapeAttr(element.coreColor || "")}"></div>
            </div>
            <div class="row">
              <div><label>線径</label><input data-bind="gauge" type="text" value="${escapeAttr(element.gauge || "")}"></div>
              <div><label>状態</label><select data-bind="coreStatus"><option value="used"${(element.coreStatus || "used") === "used" ? " selected" : ""}>使用</option><option value="spare"${element.coreStatus === "spare" ? " selected" : ""}>予備</option></select></div>
            </div>
            <label><input data-bind="shielded" type="checkbox" ${element.shielded ? "checked" : ""} style="width:auto;min-height:auto"> シールド</label>
          `;
        }
        if (element.type === "deviceBox") {
          const pins = Math.max(0, Number(element.pins || 4));
          for (let i = 0; i < pins; i++) {
            const y = deviceBoxPinY(element, i);
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "plcBlock") {
          if ((element.plcStyle || "grid") === "unit") {
            const geo = plcUnitGeometry(element);
            for (let i = 0; i < geo.rows; i++) add(geo.cx, geo.pitch * i + geo.pitch / 2);
            return anchors;
          }
          const rows = Math.max(2, Number(element.rows || 8));
          for (let i = 1; i <= rows; i++) {
            const y = plcGridPinY(element, i - 1);
            add(0, y);
          }
          return anchors;
        }
        return anchors;
      }

      function primaryConnectionPoint(element) {
        if (!element || element.points) return null;
        const anchors = elementConnectionAnchors(element);
        return anchors && anchors.length ? anchors[0] : null;
      }

      // 要素ローカル座標の接続点→絶対座標(回転考慮)。
      function localAnchor(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        return {
          x: Number(element.x || 0) + x * Math.cos(angle) - y * Math.sin(angle),
          y: Number(element.y || 0) + x * Math.sin(angle) + y * Math.cos(angle)
        };
      }

      // クリック点を中心に配置する種別集合(インライン部品など)。
      function centerPlacedTypes() {
        return new Set([
          "terminal",
          "contactNO",
          "contactNC",
          "timerContactNO",
          "timerContactNC",
          "contactBlock",
          "thermalElement",
          "pressureSwitch",
          "floatSwitch",
          "thermoSwitch",
          "flowSwitch",
          "footSwitch",
          "bell",
          "battery",
          "rectifierBox",
          "currentTransformer",
          "arrester",
          "transistor",
          "disconnector",
          "outlet",
          "beacon",
          "logicGate",
          "photocoupler",
          "positionMark",
          "polarityMark",
          "pushButton",
          "selectorSwitch",
          "limitSwitch",
          "coil",
          "fuse",
          "breaker",
          "lamp",
          "buzzer",
          "resistor",
          "capacitor",
          "diode",
          "thermalRelay",
          "motor",
          "fan",
          "transformer",
          "meter",
          "inductor",
          "heater",
          "solenoidValve",
          "sensor",
          "powerSupply",
          "deviceBox",
          "terminalBox",
          "plcBlock",
          "cableMarker",
          "cableBundle"
        ]);
      }

      // 既存配線上へ置いた時に配線を自動分割する種別集合。
      function wireBreakingTypes() {
        return new Set([
          "contactNO",
          "contactNC",
          "timerContactNO",
          "timerContactNC",
          "contactBlock",
          "thermalElement",
          "pressureSwitch",
          "floatSwitch",
          "thermoSwitch",
          "flowSwitch",
          "footSwitch",
          "terminal",
          "pushButton",
          "selectorSwitch",
          "limitSwitch",
          "coil",
          "bell",
          "battery",
          "rectifierBox",
          "currentTransformer",
          "arrester",
          "fuse",
          "breaker",
          "lamp",
          "buzzer",
          "resistor",
          "capacitor",
          "diode",
          "thermalRelay",
          "meter",
          "inductor",
          "heater",
          "disconnector",
          "beacon",
          "motor",
          "fan"
        ]);
      }

      // 配置時の新規要素を生成(中心合わせ・向き自動判定込み)。
      function defaultElementAtPlacement(type, x, y) {
        const element = defaultElement(type, x, y);
        // 別名種別(非常停止ボタン等)は生成後のelement.typeで配置方法を判定する
        const kind = element.type;
        autoOrientElementForPlacement(element, x, y);
        if (centerPlacedTypes().has(kind)) {
          const w = Number(element.w || defaultElement(kind).w || 0);
          const h = Number(element.h || defaultElement(kind).h || 0);
          element.x = round(x - w / 2);
          element.y = round(y - h / 2);
          // 中心合わせだけでは接続ピンがグリッドに乗らない部品があるため、
          // 第1ピンを「配線軸=スナップ点に正確一致」「直交軸=最寄りグリッド」へ合わせる。
          const anchors = elementConnectionAnchors(element);
          if (anchors && anchors.length) {
            const pin = anchors[0];
            if (element.orientation === "vertical") {
              element.x = round(Number(element.x) + (x - pin.x));
              element.y = round(Number(element.y) + (snap(pin.y) - pin.y));
            } else {
              element.y = round(Number(element.y) + (y - pin.y));
              element.x = round(Number(element.x) + (snap(pin.x) - pin.x));
            }
          }
        } else if (kind === "ground") {
          const w = Number(element.w || defaultElement(kind).w || 0);
          element.x = round(x - w / 2);
          element.y = round(y);
        } else if (kind === "terminalStrip" || kind === "connector") {
          // 端子台/コネクタは先頭端子ノードをスナップ点へ合わせる(行・グリッドに端子が乗るように)。
          const node = terminalStripNodeGlobal(element, 0);
          element.x = round(Number(element.x) + (x - node.x));
          element.y = round(Number(element.y) + (y - node.y));
        }
        return element;
      }

      // 配置先の近傍配線の向きから要素の縦横を自動決定。
      function autoOrientElementForPlacement(element, x, y) {
        if (!["fuse", "breaker", "resistor"].includes(element.type)) return;
        const segment = closestAxisSegment(currentPage(), x, y);
        if (!segment || !segment.vertical) return;
        element.orientation = "vertical";
        if (!resizeGeoElementForOrientation(element)) resizeProtectiveElementForOrientation(element);
      }

      // 配置点近傍の水平/垂直配線セグメントを探す(向き自動判定の下請け)。
      function closestAxisSegment(page, x, y) {
        if (!page) return null;
        let best = null;
        page.elements.forEach(element => {
          if (element.type !== "wire" || !isElementVisible(element)) return;
          wireSegments(element).forEach(segment => {
            const [x1, y1, x2, y2] = segment;
            const horizontal = Math.abs(y1 - y2) < .01;
            const vertical = Math.abs(x1 - x2) < .01;
            if (!horizontal && !vertical) return;
            const point = closestPointOnSegment(x, y, segment);
            const d = Math.hypot(point.x - x, point.y - y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) best = { horizontal, vertical, d };
          });
        });
        return best;
      }

      // パレット種別を用紙へ配置する入口。配線分割・スナップ・履歴記録まで行う。
      function placeElement(type, x, y) {
        const page = currentPage();
        if (!page) return;
        noteRecentPaletteType(type);
        if (String(type).startsWith("custom:")) {
          placeCustomSymbol(type.slice("custom:".length), x, y);
          return;
        }
        if (String(type).startsWith("circuit:")) {
          const circuit = BUILTIN_CIRCUITS.find(c => c.id === type.slice("circuit:".length));
          if (circuit) {
            placeTemplates(circuit.templates, x, y,
              circuit.label + "を配置しました。タグ(CR1等)は右パネルで実際の番号へ変更してください。");
          }
          return;
        }
        if (type === "terminalSheet") {
          addTerminalSheet(page, x, y);
          commitHistory("端子配線セットを配置しました。");
          cancelPlacementMode(true);
          return;
        }
        const element = defaultElementAtPlacement(type, x, y);
        page.elements.push(element);
        breakWiresForInlineElement(page, element);
        selectSingle(element.id);
        // バリエーションを持つ部品は、初心者向けにデザイン切替の案内を出す
        const variantKey = element.type === "pushButton"
          ? ((element.pbStyle || "momentary") === "emergency" ? "pushButtonEmergency" : "")
          : element.type;
        const hasVariants = !!SYMBOL_VARIANT_OPTIONS[variantKey] || ["resistor", "lamp"].includes(element.type);
        commitHistory(hasVariants
          ? paletteLabel(element.type) + "を配置しました。右パネルの「シンボルデザイン」で形状を切り替えられます。"
          : "要素を配置しました。");
        setActiveTool("select");
        render();
      }

      // インライン部品の左右端子位置で既存配線を2本へ分割(部品を線が貫通しないように)。
      function breakWiresForInlineElement(page, element) {
        if (!page || !element || !wireBreakingTypes().has(element.type)) return;
        const anchors = elementConnectionAnchors(element);
        if (anchors.length < 2) return;
        const a = anchors[0];
        const b = anchors[anchors.length - 1];
        const horizontal = Math.abs(a.y - b.y) < .35;
        const vertical = Math.abs(a.x - b.x) < .35;
        if (!horizontal && !vertical) return;
        const low = horizontal ? Math.min(a.x, b.x) : Math.min(a.y, b.y);
        const high = horizontal ? Math.max(a.x, b.x) : Math.max(a.y, b.y);
        const axis = horizontal ? a.y : a.x;
        const replacement = [];
        let changed = false;
        page.elements.forEach(item => {
          if (item.id === element.id || item.type !== "wire" || !Array.isArray(item.points) || item.points.length !== 2) {
            replacement.push(item);
            return;
          }
          const [p0, p1] = item.points;
          const wireHorizontal = Math.abs(p0[1] - p1[1]) < .01;
          const wireVertical = Math.abs(p0[0] - p1[0]) < .01;
          if ((horizontal && !wireHorizontal) || (vertical && !wireVertical)) {
            replacement.push(item);
            return;
          }
          const wireAxis = horizontal ? p0[1] : p0[0];
          if (Math.abs(wireAxis - axis) > .45) {
            replacement.push(item);
            return;
          }
          const start = horizontal ? p0[0] : p0[1];
          const end = horizontal ? p1[0] : p1[1];
          const min = Math.min(start, end);
          const max = Math.max(start, end);
          if (low <= min + .6 || high >= max - .6 || low >= high) {
            replacement.push(item);
            return;
          }
          const beforeEnd = horizontal ? [round(low), round(wireAxis)] : [round(wireAxis), round(low)];
          const afterStart = horizontal ? [round(high), round(wireAxis)] : [round(wireAxis), round(high)];
          const leftFirst = start <= end;
          const before = deepClone(item);
          const after = deepClone(item);
          before.id = uid("el");
          after.id = uid("el");
          before.points = leftFirst ? [p0, beforeEnd] : [p0, afterStart];
          after.points = leftFirst ? [afterStart, p1] : [beforeEnd, p1];
          before.points = before.points.map(point => [round(point[0]), round(point[1])]);
          after.points = after.points.map(point => [round(point[0]), round(point[1])]);
          after.hideWireNo = true;
          replacement.push(before, after);
          changed = true;
        });
        if (changed) page.elements = replacement;
      }

      // ユーザー部品(単品/回路スニペット)を配置。テンプレート列を相対座標のままオフセット展開。
      // テンプレート要素列を(x,y)オフセットで現在ページへ展開する共通処理。
      function placeTemplates(templates, x, y, doneMessage) {
        const page = currentPage();
        if (!page || !templates.length) return;
        const placed = templates.map(template => {
          const element = deepClone(template);
          element.id = uid("el");
          element.locked = false;
          if (element.points) {
            element.points = element.points.map(point => [point[0] + x, point[1] + y]);
          } else {
            element.x = Number(element.x || 0) + x;
            element.y = Number(element.y || 0) + y;
          }
          return element;
        });
        page.elements.push(...placed);
        setSelection(placed.map(element => element.id));
        commitHistory(doneMessage);
        setActiveTool("select");
        render();
      }

      // ユーザー部品(登録回路)をクリック位置へ配置する。テンプレ座標へオフセットを加えて複製し、IDを再発行する。
      function placeCustomSymbol(id, x, y) {
        const symbol = (state.customSymbols || []).find(item => item.id === id);
        const page = currentPage();
        if (!symbol || !page) return;
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        const placed = templates.map(template => {
          const element = deepClone(template);
          element.id = uid("el");
          element.locked = false;
          if (element.points) {
            element.points = element.points.map(point => [point[0] + x, point[1] + y]);
          } else {
            element.x = Number(element.x || 0) + x;
            element.y = Number(element.y || 0) + y;
          }
          return element;
        });
        page.elements.push(...placed);
        setSelection(placed.map(element => element.id));
        commitHistory(placed.length > 1 ? "ユーザー回路を配置しました。" : "ユーザー部品を配置しました。");
        setActiveTool("select");
        render();
      }

      // 端子配線セット(既定値)を現在ページへ配置。
      function addTerminalSheet(page, x, y) {
        addReferenceTerminalWiringSet(page, x, y, {
          title: "",
          terminalPrefix: "",
          wirePrefix: "W",
          signalPrefix: "SIG"
        });
        setSelection([]);
      }

      // 端子配線セットの本体生成(横配線+端子小円+ユニット列端子台、線番は終点寄せ)。
      function addReferenceTerminalWiringSet(page, x, y, options = {}) {
        // 端子台配線図の型:
        // 左から横配線 → ユニット列端子台(波形破断線+端子円)、線番は終点寄せ表示
        const count = Math.max(1, Number(options.count || 16));
        const startNo = Number(options.start || 1);
        const pitch = Math.max(TEMPLATE_GRID_STEP, Number(options.pitch || TEMPLATE_CIRCUIT_PITCH));
        // 端子円中心をグリッド点(x+97.5)に置き、配線も同じ中心まで届かせる。
        const ringX = round(x + 97.5);
        const stripW = 10;
        const stripX = round(ringX - stripW / 2);
        const strip = {
          ...defaultElement("terminalStrip", stripX, y),
          x: stripX,
          y: round(y),
          w: stripW,
          h: count * pitch,
          pitch,
          count,
          start: startNo,
          prefix: options.terminalPrefix || "",
          orientation: "vertical",
          terminalShape: "circle",
          stripStyle: "unit",
          label: options.label || "TB1"
        };
        for (let i = 0; i < count; i++) {
          const cy = round(y + pitch * i + pitch / 2);
          const wireNo = (options.wirePrefix || "W") + String(startNo + i).padStart(2, "0");
          page.elements.push({
            ...defaultElement("wire", x, cy),
            points: [[round(x), cy], [ringX, cy]],
            wireNo,
            wireNoAlign: "end",
            wireNoDx: -2.5
          });
          if (options.signalPrefix) {
            // 右母線(x=147.5)を避け、説明は母線の右側へ置く。
            page.elements.push(textElement(149.5, cy - 1.2, options.signalPrefix + String(startNo + i).padStart(2, "0"), 2.3, 0, 42));
          }
        }
        // 白抜き端子円で配線終端を隠すため、配線・注記より後に描画する。
        page.elements.push(strip);
        if (options.title) {
          page.elements.push(textElement(x, y - 8, options.title, 3.4, 0, 92));
        }
      }

      // 文字要素を生成(座標・サイズ・回転・幅)。テンプレート生成系で多用。
      function textElement(x, y, text, fontSize = 2.4, rotation = 0, w = 24) {
        return {
          id: uid("el"),
          type: "text",
          x: round(x),
          y: round(y),
          w,
          h: Math.max(5, fontSize * 1.7),
          text,
          fontSize,
          rotation,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      // アクティブツール切替(select/wire/種別名/custom:id)。パレットの強調表示も更新。
      function setActiveTool(tool) {
        activeTool = tool;
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === tool));
        qs("#selectOnlyBtn")?.classList.toggle("active", tool === "select");
        renderPalette();
        setStatus(tool === "select" ? "選択ツールです。" : toolDisplayLabel(tool) + "を配置できます。");
        updateCanvasHint();
      }

      // 進行中ドラッグの取消(Esc)。作図中=作成途中の要素を破棄、移動中=開始時位置へ復元、
      // それ以外(リサイズ/点編集等)は復元情報がある場合のみ戻し、なければ中断だけ行う。
      // いずれもcommit前の仮変更なので履歴には何も積まれない。
      function cancelActiveDrag() {
        const page = currentPage();
        const drag = dragState;
        dragState = null;
        if (!page || !drag) {
          render();
          return;
        }
        if (drag.mode === "draw") {
          const drawing = selectedElement();
          if (drawing) page.elements = page.elements.filter(item => item.id !== drawing.id);
          setSelection([]);
        } else if (drag.mode === "move" && Array.isArray(drag.originals)) {
          drag.originals.forEach(original => {
            const target = page.elements.find(item => item.id === original.id);
            if (!target) return;
            if (original.points) target.points = deepClone(original.points);
            else {
              target.x = original.x;
              target.y = original.y;
            }
          });
          (drag.attachedWires || []).forEach(original => {
            const target = page.elements.find(item => item.id === original.id);
            if (target && Array.isArray(original.points)) target.points = deepClone(original.points);
          });
        } else if (drag.original && (drag.elementId || drag.original.id)) {
          const target = page.elements.find(item => item.id === (drag.elementId || drag.original.id));
          if (target) Object.assign(target, deepClone(drag.original));
        }
        render();
        setStatus("操作を取り消しました。");
      }

      // 配置モードを抜けて選択ツールへ戻る(Escや配置完了時)。
      function cancelPlacementMode(clearSelection = false) {
        activeTool = "select";
        if (clearSelection) setSelection([]);
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === "select"));
        render();
        setStatus("選択ツールです。");
      }

      // 標準プリセット/標準パックを適用(グリッド・線番書式など)。
      function applyStandard(id) {
        const pack = (state.standardPacks || []).find(item => item.id === id);
        if (pack) {
          const errors = validateStandardPack(pack);
          if (errors.length) {
            setStatus("標準パックを適用できません: " + errors.slice(0, 3).join(" ／ "));
            return false;
          }
          state.settings.standard = id;
          applyStandardPack(pack);
          return true;
        }
        const standard = STANDARDS.find(item => item.id === id) || STANDARDS[0];
        state.settings.standard = standard.id;
        state.settings.grid = standard.grid;
        state.settings.wireNumberFormat = standard.wireNumberFormat;
        state.settings.componentTagFormat = standard.componentTagFormat || "%F%N";
        if (standard.componentTagPrefixes) state.settings.componentTagPrefixes = { ...standard.componentTagPrefixes };
        const page = currentPage();
        if (page && !page.frameVariant) page.frameVariant = standard.frameVariant;
        return true;
      }

      // 用紙全体が収まるようズームを自動調整。
      function fitPageToWorkspace() {
        const page = currentPage();
        if (!page) return;
        const size = pageSize(page);
        const workspace = qs("#workspace");
        const w = Math.max(240, workspace.clientWidth - 90);
        const h = Math.max(240, workspace.clientHeight - 90);
        state.settings.zoom = clampZoom(Math.min(w / size.w, h / size.h));
        commitHistory("用紙全体を表示しました。");
        render();
      }

      // 空ページを追加してアクティブ化。
      function addPage() {
        const base = currentPage();
        const page = createPage({
          name: "P" + (state.pages.length + 1),
          size: base?.size || "A4",
          orientation: base?.orientation || "portrait",
          frameVariant: base?.frameVariant || "detailed"
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("ページを追加しました。");
        render();
      }

      // 現在ページを複製(要素IDは振り直し)。
      // 末尾のアドレス/番号にオフセットを加算する。X060+10hex→X070、CR1+1→CR2 のように
      // 接頭辞と桁数を保ったまま加算する。16進判定: 数字部にA-Fを含む、または接頭辞がX/Y/B/W系。
      function offsetAddressToken(text, offset) {
        const match = String(text || "").match(/^(.*?)([0-9A-Fa-f]+)$/);
        if (!match || !offset) return text;
        const prefix = match[1];
        const digits = match[2];
        const hexPrefix = /^(X|Y|B|W|SB|SW|RX|RY)$/i.test(prefix.trim());
        const isHex = hexPrefix || /[A-Fa-f]/.test(digits);
        if (!isHex && !/^\d+$/.test(digits)) return text;
        const value = parseInt(digits, isHex ? 16 : 10) + offset;
        if (!Number.isFinite(value) || value < 0) return text;
        const raw = value.toString(isHex ? 16 : 10).toUpperCase();
        return prefix + raw.padStart(digits.length, "0");
      }

      // 複製ページの要素へアドレスオフセットを適用する(線番/タグ/ラベル/PLCピン文字)。
      function applyAddressOffsetToElements(elements, offset) {
        if (!offset) return;
        elements.forEach(element => {
          if (element.wireNo) element.wireNo = offsetAddressToken(element.wireNo, offset);
          if (element.tag) element.tag = offsetAddressToken(element.tag, offset);
          if (element.label) element.label = offsetAddressToken(element.label, offset);
          if (element.pinText) {
            element.pinText = String(element.pinText).split(/\r?\n/)
              .map(line => offsetAddressToken(line, offset)).join("\n");
          }
        });
      }

      // ページ複製ダイアログ: 複製数と、線番/タグ/アドレスへの一括オフセットを指定できる。
      // 見本様式のX060→X070…のような同型ページ量産を1操作で行うための機能。
      function showDuplicatePageDialog() {
        const page = currentPage();
        if (!page) return;
        openDialog("ページ複製", `
          <p class="muted">現在ページを複製します。オフセットを指定すると、複製ページの
          線番・タグ・ラベル・PLCピン文字の末尾番号へ一括加算します
          （例: オフセット16 → X060はX070、CR1はCR17。16進アドレスは16進で加算）。</p>
          <div class="row">
            <div><label>複製数</label><input id="dupCount" type="number" min="1" max="20" step="1" value="1"></div>
            <div><label>1枚ごとのオフセット(10進。0=変更なし)</label><input id="dupOffset" type="number" step="1" value="0"></div>
          </div>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="dupRunBtn" class="primary">複製</button>
          </div>`);
        qs("#dupRunBtn").addEventListener("click", () => {
          const count = Math.max(1, Math.min(20, Math.floor(Number(qs("#dupCount").value || 1))));
          const offset = Math.floor(Number(qs("#dupOffset").value || 0));
          duplicatePage(count, offset);
          closeDialog();
        });
      }

      // 現在ページをcount枚複製する。offset指定時は線番/タグ/ピン文字/頁名の末尾番号を
      // 1枚ごとに一括加算する(X/Y/B/W等の接頭辞・桁数を保持、16進アドレスは16進で加算)。
      function duplicatePage(count = 1, offset = 0) {
        const page = currentPage();
        if (!page) return;
        let last = null;
        for (let i = 1; i <= count; i++) {
          const copy = deepClone(page);
          copy.id = uid("page");
          copy.name = offset ? offsetAddressToken(page.name, offset * i) : page.name + " copy" + (count > 1 ? i : "");
          copy.elements = copy.elements.map(element => ({ ...element, id: uid("el") }));
          applyAddressOffsetToElements(copy.elements, offset * i);
          if (copy.title && copy.title.title) copy.title.title = offsetAddressToken(copy.title.title, offset * i);
          state.pages.push(copy);
          last = copy;
        }
        state.activePageId = last.id;
        setSelection([]);
        commitHistory(offset
          ? `ページを${count}枚複製し、アドレスを+${offset}ずつオフセットしました。`
          : "ページを複製しました。");
        render();
      }

      // 現在ページを削除(最後の1枚は不可)。
      function deletePage() {
        if (state.pages.length <= 1) {
          setStatus("最後の1ページは削除できません。");
          return;
        }
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        if (index < 0) {
          state.activePageId = state.pages[0].id;
          setSelection([]);
          render();
          setStatus("アクティブページ情報を修復しました。もう一度削除してください。");
          return;
        }
        state.pages.splice(index, 1);
        state.activePageId = state.pages[Math.max(0, index - 1)].id;
        setSelection([]);
        commitHistory("ページを削除しました。");
        render();
      }

      // 現在ページを前後へ並び替え。
      function movePage(delta) {
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        const next = index + delta;
        if (index < 0 || next < 0 || next >= state.pages.length) {
          setStatus("これ以上ページを移動できません。");
          return;
        }
        const [page] = state.pages.splice(index, 1);
        state.pages.splice(next, 0, page);
        commitHistory("ページ順を変更しました。");
        render();
      }

      // 端子接続図ページ(端子配線セット入り)をテンプレートとして追加。
      function addSampleTerminalPage() {
        const page = createPage({
          name: "端子接続図" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "端子接続図"
        });
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
        page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
        page.elements.push(textElement(40, 24.5, "(DC24V)", 1.9, 0, 20));
        addReferenceTerminalWiringSet(page, 32.5, 32.5, {
          label: "TB1",
          terminalPrefix: "",
          wirePrefix: "W",
          signalPrefix: "SIG",
          count: 16
        });
        for (let i = 0; i < 16; i++) {
          page.elements.push(defaultElement("junction", 32.5, round(37.5 + TEMPLATE_CIRCUIT_PITCH * i)));
        }
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("端子接続図ページを追加しました。");
        render();
      }

      // 端子CSV/TSVを読み込み、端子接続図ページ群を生成する入口。
      function importTerminalCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const terminals = normalizeTerminalCsvRows(rows);
            if (!terminals.length) {
              setStatus("端子CSVに有効な行がありません。");
              return;
            }
            addTerminalCsvPages(terminals, file.name || "terminal.csv");
          } catch (error) {
            alert("端子CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      // PLC I/O CSV/TSVを読み込み、PLC接続図ページ群を生成する入口。
      function importPlcCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const ioRows = normalizePlcCsvRows(rows);
            if (!ioRows.length) {
              setStatus("PLC CSVに有効なI/O行がありません。");
              return;
            }
            addPlcCsvPages(ioRows, file.name || "plc.csv");
          } catch (error) {
            alert("PLC CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      // CSVバイト列をUTF-8/Shift_JIS判定つきで文字列化。
      function decodeTextBuffer(buffer) {
        const bytes = buffer instanceof ArrayBuffer ? buffer : new Uint8Array(buffer).buffer;
        const candidates = [];
        try {
          candidates.push(new TextDecoder("utf-8").decode(bytes));
        } catch (_) {
          // 旧ブラウザではTextDecoderが失敗することがある。
        }
        try {
          candidates.push(new TextDecoder("shift_jis").decode(bytes));
        } catch (_) {
          // 環境によってはShift_JISデコーダが無いことがある。
        }
        if (!candidates.length) return "";
        return candidates.sort((a, b) => textDecodeScore(b) - textDecodeScore(a))[0].replace(/^\uFEFF/, "");
      }

      // デコード結果の妥当性スコア(文字化け判定)。
      function textDecodeScore(text) {
        const bad = (text.match(/\uFFFD/g) || []).length * 20;
        const japanese = (text.match(/[ぁ-んァ-ン一-龠]/g) || []).length;
        const ascii = (text.match(/[A-Za-z0-9,\t\r\n_-]/g) || []).length;
        return japanese * 3 + ascii - bad;
      }

      // CSV/TSVパーサ(引用符・改行対応、区切りはタブ/カンマ自動判定)。
      function parseDelimitedRows(text) {
        const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const sample = source.split("\n").slice(0, 5).join("\n");
        const delimiter = (sample.match(/\t/g) || []).length > (sample.match(/,/g) || []).length ? "\t" : ",";
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let i = 0; i < source.length; i++) {
          const char = source[i];
          const next = source[i + 1];
          if (quoted) {
            if (char === '"' && next === '"') {
              cell += '"';
              i++;
            } else if (char === '"') {
              quoted = false;
            } else {
              cell += char;
            }
            continue;
          }
          if (char === '"' && cell === "") {
            quoted = true;
          } else if (char === delimiter) {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell);
        rows.push(row);
        return rows.map(cells => cells.map(cell => cell.trim())).filter(cells => cells.some(Boolean));
      }

      // 端子CSVの見出し(和英エイリアス対応)を正規化して行オブジェクト化。
      function normalizeTerminalCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          strip: ["strip", "terminalstrip", "tb", "端子台", "端子台名"],
          terminal: ["terminal", "term", "terminalno", "no", "番号", "端子", "端子番号", "端子no", "端子名"],
          wireNo: ["wireno", "wire", "wire_no", "wiring", "線番", "配線番号", "線番号"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          dest: ["dest", "destination", "to", "device", "接続先", "行先", "相手先", "機器"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          return {
            strip: value("strip") || "X1",
            terminal: value("terminal") || cells[0] || String(index + 1),
            wireNo: value("wireNo") || cells[1] || "",
            signal: value("signal") || cells[2] || "",
            dest: value("dest") || cells[3] || "",
            note: value("note") || cells[4] || ""
          };
        }).filter(row => row.terminal || row.wireNo || row.signal || row.dest || row.note);
      }

      // PLC CSVの見出しを正規化して行オブジェクト化。
      function normalizePlcCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          address: ["address", "addr", "io", "i/o", "point", "plc", "アドレス", "io番号", "入出力番号", "点数"],
          direction: ["direction", "type", "iotype", "io_type", "inout", "入出力", "種別", "方向"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          wireNo: ["wireno", "wire", "wire_no", "線番", "配線番号", "線番号"],
          device: ["device", "dest", "destination", "to", "from", "接続先", "機器", "相手先"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          const address = value("address") || cells[0] || "";
          const signal = value("signal") || cells[1] || "";
          const wireNo = value("wireNo") || cells[2] || "";
          const device = value("device") || cells[3] || "";
          const note = value("note") || cells[4] || "";
          const direction = normalizeIoDirection(value("direction") || address);
          return { address: address || (direction === "output" ? "O" : "I") + String(index).padStart(2, "0"), direction, signal, wireNo, device, note };
        }).filter(row => row.address || row.signal || row.wireNo || row.device || row.note);
      }

      // 入出力表記(in/out/入力/出力)をinput/outputへ正規化。
      function normalizeIoDirection(text) {
        const value = normalizeHeader(text);
        if (value.startsWith("o") || value.includes("out") || value.includes("出力")) return "output";
        return "input";
      }

      // 見出し文字列の正規化(小文字化・空白除去)。
      function normalizeHeader(text) {
        return String(text || "").toLowerCase().replace(/[()\[\]{} 　._\-\/\\:：]/g, "");
      }

      // 見出し行からエイリアス一致する列番号を探す。
      function findHeaderIndex(headers, aliases) {
        const normalizedAliases = aliases.map(normalizeHeader);
        return headers.findIndex(header => normalizedAliases.includes(header));
      }

      // 端子CSV行を17行/頁で分割し、端子接続図ページ群を生成。
      function addTerminalCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "端子接続図",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "端子接続図 " + pageNo + "/" + totalPages
          });
          populateTerminalCsvPage(page, chunk, pageNo, totalPages, fileName, offset);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("端子CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 端子台配線図の型: レール + 横配線(線番は終点寄せ) + ユニット列端子台。
      // 端子名はCSVの値を terminalLabels として端子円内に表示する。
      function populateTerminalCsvPage(page, rows, pageNo, totalPages, fileName, offset) {
        const stripName = mostCommon(rows.map(row => row.strip).filter(Boolean)) || "TB1";
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
        page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
        const strip = {
          ...defaultElement("terminalStrip", 125, 32.5),
          x: 125,
          y: 32.5,
          w: 10,
          h: rows.length * TEMPLATE_CIRCUIT_PITCH,
          pitch: TEMPLATE_CIRCUIT_PITCH,
          count: rows.length,
          start: 1 + offset,
          prefix: "",
          orientation: "vertical",
          terminalShape: "circle",
          stripStyle: "unit",
          label: stripName,
          terminalLabels: rows.map(row => row.terminal || "").join("\n"),
          note: "取込元: " + fileName
        };
        rows.forEach((row, index) => {
          const y = round(37.5 + TEMPLATE_CIRCUIT_PITCH * index);
          page.elements.push(defaultElement("junction", 32.5, y));
          page.elements.push({
            ...defaultElement("wire", 32.5, y),
            points: [[32.5, y], [130, y]],
            wireNo: row.wireNo || "",
            wireNoAlign: "end",
            wireNoDx: -2.5,
            note: row.note || ""
          });
          const desc = [row.signal, row.dest].filter(Boolean).join(" ");
          if (desc) page.elements.push(textElement(149.5, y - 1.2, desc, 2.3, 0, 42));
        });
        // 端子円を配線より前に積むと導体が番号を貫通するため、最後に重ねる。
        page.elements.push(strip);
      }

      // PLC CSV行を17点/頁で分割し、PLC接続図ページ群を生成。
      function addPlcCsvPages(rows, fileName) {
        const perPage = 17;
        const created = [];
        for (let offset = 0; offset < rows.length; offset += perPage) {
          const chunk = rows.slice(offset, offset + perPage);
          const pageNo = Math.floor(offset / perPage) + 1;
          const totalPages = Math.ceil(rows.length / perPage);
          const page = createPage({
            name: "制御盤",
            size: "A4",
            orientation: "portrait",
            frameVariant: "ladder",
            title: "PLC I/O 接続図 " + pageNo + "/" + totalPages
          });
          populatePlcCsvPage(page, chunk, pageNo, totalPages, fileName);
          state.pages.push(page);
          created.push(page);
        }
        state.activePageId = created[0].id;
        setSelection([]);
        commitHistory("PLC CSVから" + created.length + "ページを追加しました。");
        render();
      }

      // 右にユニット列、左へ横配線+端子小円。行はラダー行グリッドに整列し、
      // 配線端点はユニットの端子アンカー位置と一致させる(ずれ無し)。
      function populatePlcCsvPage(page, rows, pageNo, totalPages, fileName) {
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
        page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
        const unit = {
          ...defaultElement("plcBlock", 125, 32.5),
          plcStyle: "unit",
          rows: rows.length,
          w: 10,
          h: rows.length * TEMPLATE_CIRCUIT_PITCH,
          pitch: TEMPLATE_CIRCUIT_PITCH,
          label: "PLC(" + pageNo + "/" + totalPages + ")",
          pinText: rows.map(row => row.address).join("\n"),
          note: "取込元: " + fileName
        };
        rows.forEach((row, index) => {
          const y = round(37.5 + TEMPLATE_CIRCUIT_PITCH * index);
          const plcName = (unit.label || "PLC") + ":" + row.address;
          const deviceName = row.device || row.signal || "";
          const input = row.direction !== "output";
          page.elements.push(defaultElement("junction", 32.5, y));
          page.elements.push({
            ...defaultElement("wire", 32.5, y),
            points: [[32.5, y], [130, y]],
            wireNo: row.wireNo || "",
            wireNoAlign: "end",
            wireNoDx: -5,
            fromOverride: input ? deviceName : plcName,
            toOverride: input ? plcName : deviceName,
            note: row.note || ""
          });
          page.elements.push(textElement(149.5, y - 1.2, [input ? "入力" : "出力", row.signal, deviceName].filter(Boolean).join(" "), 2.3, 0, 42));
        });
        // PLC端子円を配線の上へ重ね、円内のアドレスを導体から保護する。
        page.elements.push(unit);
      }

      // 配列の最頻値(CSVのユニット名決定などに使用)。
      function mostCommon(values) {
        const counts = new Map();
        values.forEach(value => counts.set(value, (counts.get(value) || 0) + 1));
        return Array.from(counts.entries()).sort((a, b) => b[1] - a[1])[0]?.[0] || "";
      }

      // 目次ページ(空の目次表つき)をテンプレートとして追加。
      // 図枠は基本(compact)にする: index図枠は自前の空目次グリッドを持つため、
      // 表要素と二重になり罫線と文字が重なってしまう。
      function addIndexPage() {
        const page = createPage({
          name: "目次" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "compact",
          title: "図面目次"
        });
        page.elements.push({ ...textElement(102.5, 31, "図面目次", 4, 0, 40), align: "middle" });
        page.elements.push({
          id: uid("el"),
          type: "table",
          x: 27.5,
          y: 40,
          w: 150,
          h: 170,
          rows: 16,
          cols: 4,
          label: "",
          cellText: "No.\t図番\t図名\t備考\n1\t\t\t\n2\t\t\t\n3\t\t\t",
          rotation: 0,
          stroke: state.settings.stroke
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("目次ページを追加しました。");
        render();
      }

      // 汎用ラダーページ(左右母線+ラング)をテンプレートとして追加。
      function addLadderPage() {
        const page = createPage({
          name: "ラダー" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "detailed",
          title: "ラダー回路図"
        });
        const cfg = ladderConfig(page);
        page.elements.push({
          id: uid("el"),
          type: "text",
          x: 20,
          y: 26,
          w: 80,
          h: 8,
          text: "ラダー回路図",
          fontSize: 4,
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes"
        });
        addLadderRails(page, cfg);
        for (let i = 0; i < 10; i++) {
          addLadderRungElements(page, cfg, cfg.startY + i * cfg.pitch, i + 1);
        }
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("ラダーページを追加しました。");
        render();
      }

      // 現在のラダーページへラング(横1行)を追加。
      function addRungToCurrentPage() {
        const page = currentPage();
        if (!page) return;
        const cfg = ladderConfig(page);
        ensureLadderRails(page, cfg);
        const rungYs = collectLadderRungYs(page);
        const nextIndex = rungYs.length + 1;
        const y = rungYs.length ? Math.max(...rungYs) + cfg.pitch : cfg.startY;
        if (y > cfg.endY) {
          setStatus("このページにはラングを追加する余白がありません。");
          return;
        }
        addLadderRungElements(page, cfg, y, nextIndex);
        commitHistory("ラングを追加しました。");
        render();
      }

      // ===== 行挿入/行削除(設備標準の行シフト。ACEのラング挿入相当) =====
      // 指定行から下の全要素を行ピッチ単位で下げ(挿入)/上げ(削除)る。
      // 配線は境界をまたぐ点だけが動くため、縦レールは自動で伸縮する。
      function showRungShiftDialog() {
        const page = currentPage();
        if (!page) return;
        openDialog("行挿入/行削除（行シフト）", `
          <p class="muted">指定した行番号から下の要素をまとめて移動します。
          「挿入」= 指定行の位置に空行を作る(下へ移動)。「削除」= 指定行を詰める(上へ移動)。
          縦の配線は境界をまたぐ部分が自動で伸び縮みします。設備標準図枠の行番号(00〜20)が基準です。</p>
          <div class="row">
            <div><label>操作</label><select id="rsMode"><option value="insert">行を挿入</option><option value="delete">行を削除</option></select></div>
            <div><label>対象行番号(00〜20)</label><input id="rsRow" type="number" min="0" max="20" step="1" value="10"></div>
          </div>
          <label>行数</label>
          <input id="rsCount" type="number" min="1" max="10" step="1" value="1">
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="rsRunBtn" class="primary">実行</button>
          </div>`);
        qs("#rsRunBtn").addEventListener("click", () => {
          const mode = qs("#rsMode").value;
          const row = Math.max(0, Math.min(LADDER_GRID.rows, Math.floor(Number(qs("#rsRow").value || 0))));
          const count = Math.max(1, Math.min(10, Math.floor(Number(qs("#rsCount").value || 1))));
          shiftLadderRows(row, count, mode === "insert" ? 1 : -1);
        });
      }

      // 行シフト本体。direction=1で挿入(下へ)、-1で削除(上へ)。削除は帯内に要素があると中止する。
      function shiftLadderRows(fromRow, count, direction) {
        const page = currentPage();
        if (!page) return;
        const pitch = LADDER_GRID.pitch;
        const boundaryY = LADDER_GRID.top + pitch * fromRow - pitch / 2;
        const dy = direction * count * pitch;
        const refYOf = el => {
          if (el.points) return Math.min(...el.points.map(p => p[1]));
          const anchors = componentConnectionAnchors(el);
          return anchors && anchors.length ? anchors[0].y : Number(el.y || 0);
        };
        if (direction < 0) {
          // 削除帯[fromRow, fromRow+count)に載っている部品があれば中止(配線は跨ぎ可)
          const bandTop = boundaryY;
          const bandBottom = boundaryY + count * pitch;
          const blocking = page.elements.filter(el => !el.points && !isFrameLikeType(el.type) && refYOf(el) >= bandTop && refYOf(el) < bandBottom);
          if (blocking.length) {
            setStatus("削除対象の行に部品が " + blocking.length + " 個あります。先に移動または削除してください。");
            return;
          }
        }
        let movedCount = 0;
        page.elements.forEach(el => {
          if (isElementLocked(el)) return;
          if (el.points) {
            let touched = false;
            const threshold = direction < 0 ? boundaryY + count * pitch : boundaryY;
            el.points = el.points.map(p => {
              if (p[1] >= threshold - .01) { touched = true; return [p[0], round(p[1] + dy)]; }
              return [p[0], p[1]];
            });
            if (touched) movedCount += 1;
          } else {
            const threshold = direction < 0 ? boundaryY + count * pitch : boundaryY;
            if (refYOf(el) >= threshold - .01) {
              el.y = round(Number(el.y || 0) + dy);
              movedCount += 1;
            }
          }
        });
        closeDialog();
        commitHistory(direction > 0
          ? "行" + String(fromRow).padStart(2, "0") + "へ" + count + "行挿入しました(" + movedCount + "要素を移動)。"
          : "行" + String(fromRow).padStart(2, "0") + "から" + count + "行削除しました(" + movedCount + "要素を移動)。");
        render();
      }

      // 行シフトの対象外にする図枠系要素の種別か(表・下絵・図枠部品は行に属さない)。
      function isFrameLikeType(type) {
        return ["table", "underlayImage", "cloud", "rect", "text"].includes(type);
      }

      // 汎用ラダーページの母線位置・行ピッチ設定を返す。
      function ladderConfig(page) {
        const size = pageSize(page);
        const portrait = size.h >= size.w;
        // 母線・ラング位置は2.5mmグリッドに乗せる(スナップ配置した部品と揃うように)
        const leftRail = portrait ? 35 : 42.5;
        const rightRail = size.w - (portrait ? 35 : 57.5);
        const startY = portrait ? 55 : 45;
        const endY = size.h - (portrait ? 62 : 35);
        return { leftRail, rightRail, startY, endY, pitch: portrait ? 15 : 12.5 };
      }

      // 母線が無ければ追加(汎用ラダー用)。
      function ensureLadderRails(page, cfg) {
        if (page.elements.some(element => element.ladderRail)) return;
        addLadderRails(page, cfg);
      }

      // 左右母線(P1/N1縦線)を生成。
      function addLadderRails(page, cfg) {
        // 母線名は上端の専用文字だけで表示し、長い縦線の中央へ線番を重複表示しない。
        page.elements.push(ladderWire([[cfg.leftRail, cfg.startY - 10], [cfg.leftRail, cfg.endY + 5]], "", { ladderRail: "left", hideWireNo: true }));
        page.elements.push(ladderWire([[cfg.rightRail, cfg.startY - 10], [cfg.rightRail, cfg.endY + 5]], "", { ladderRail: "right", hideWireNo: true }));
        page.elements.push(ladderText("L", cfg.leftRail - 2, cfg.startY - 17, 3, "middle"));
        page.elements.push(ladderText("N", cfg.rightRail + 2, cfg.startY - 17, 3, "middle"));
      }

      // ラング1行分(横配線+線番)を生成。
      function addLadderRungElements(page, cfg, y, index) {
        const rungNo = String(index).padStart(3, "0");
        page.elements.push(ladderText(rungNo, cfg.leftRail - 18, y, 2.6, "end"));
        page.elements.push(ladderWire([[cfg.leftRail, y], [cfg.rightRail, y]], "R" + rungNo, { ladderRung: true, rungNo }));
      }

      // ラダー用配線要素の生成ヘルパ。
      function ladderWire(points, wireNo, extra = {}) {
        return {
          id: uid("el"),
          type: "wire",
          points,
          wireNo,
          wireType: state.settings.currentWireType,
          stroke: state.settings.stroke,
          layer: "wires",
          ...extra
        };
      }

      // ラダー用文字要素の生成ヘルパ。
      function ladderText(text, x, y, fontSize, anchor = "start") {
        return {
          id: uid("el"),
          type: "text",
          x,
          y,
          w: 24,
          h: 5,
          text,
          fontSize,
          align: anchor,
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      // 現在ページの縦レールX座標(左端/右端)を実測して返す。ensureRails時は不足する
      // P1/N1レールを設備標準位置(32.5 / 147.5)へ追加し、一括生成回路が必ず実母線へ届くようにする。
      function ladderRailSpanX(page, ensureRails = false) {
        const railXs = () => (page.elements || [])
          .filter(el => el.ladderRail && el.points?.length >= 2 && Math.abs(el.points[0][0] - el.points[el.points.length - 1][0]) < 0.01)
          .map(el => Number(el.points[0][0]))
          .filter(Number.isFinite);
        let xs = railXs();
        if (ensureRails && xs.length < 2) {
          if (!xs.length) {
            page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
            page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
          } else if (xs[0] < 90) {
            page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
          } else {
            page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
          }
          xs = railXs();
        }
        if (!xs.length) return { left: 32.5, right: 147.5 };
        return { left: Math.min(...xs), right: Math.max(...xs) };
      }

      // 既存ラングのy座標一覧(次のラング位置決め用)。
      function collectLadderRungYs(page) {
        return page.elements
          .filter(element => element.ladderRung && element.points?.length)
          .map(element => Number(element.points[0][1]))
          .filter(value => Number.isFinite(value))
          .sort((a, b) => a - b);
      }

      // 機器配置図ページ(盤外形枠つき)をテンプレートとして追加。

        const items = [

      // ===== 設備ラダーページ(複数レール対応) =====
      function facilityRailElements(name, x, sign, markY) {
        const items = [];
        items.push({ ...defaultElement("polarityMark", round(x - 1.3), markY), label: name, sign });
        items.push({
          ...defaultElement("wire", x, 30),
          points: [[x, 30], [x, TEMPLATE_RAIL_BOTTOM]],
          wireNo: "",
          hideWireNo: true,
          ladderRail: name,
          wireType: state.settings.currentWireType
        });
        items.push({ ...defaultElement("arrow", x, 35), points: [[x, 35], [x, 30]], label: "", arrowStyle: "fork", ladderRail: name });
        items.push({ ...defaultElement("arrow", x, 212.5), points: [[x, 212.5], [x, TEMPLATE_RAIL_BOTTOM]], label: "", arrowStyle: "fork", ladderRail: name });
        return items;
      }

      // 設備ラダーページ追加ダイアログを開く(レール名/注記)。
      function showFacilityLadderDialog() {
        openDialog("設備ラダーページ", `

      // ダイアログ入力から設備標準ラダーページ(複数左レール+右レール)を追加。
      function addFacilityLadderPage() {
        const rails = String(qs("#ladRails")?.value || "P1").split(",").map(s => s.trim()).filter(Boolean);
        const rightName = String(qs("#ladRight")?.value || "N1").trim() || "N1";
        const note = String(qs("#ladNote")?.value || "").trim();
        const page = createPage({
          name: "リレー回路" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "リレー回路"
        });
        (rails.length ? rails : ["P1"]).forEach((name, i) => {
          // 複数レールは右方向へ展開する(左へ広げると図枠の行番号帯(x≈25.5)を貫通するため)。
          // ピッチ5mm=2.5mmグリッド整合(タップ配線がグリッドに乗る)。
          const x = round(32.5 + 5 * i);
          page.elements.push(...facilityRailElements(name, x, "+", 22.4)); // 全レール同じ高さ(段差をつけると3本目の⊕が線上端へ食い込む)
          // 下端レール名: fork矢の開脚(y217〜220)を避け、矢の先端より下へ中央合わせで置く
          page.elements.push(textElement(round(x - name.length * 0.62), 222.4, name, 2.2, 0, 12));
        });
        page.elements.push(...facilityRailElements(rightName, 147.5, "-", 22.4));
        page.elements.push(textElement(round(147.5 - rightName.length * 0.62), 222.4, rightName, 2.2, 0, 12));
        if (note) page.elements.push(textElement(40, 24.5, note, 1.9, 0, 20));
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("設備ラダーページを追加しました。");
        render();
      }

      // ===== PLC入出力回路ページ(設備標準の型) =====
      // 組込プリセット。プロジェクト保存のプリセットは state.plcModules に追加される。
      const PLC_MODULE_PRESETS = [
        { label: "入力16点 X000", direction: "input", unit: "UNIT-1", start: "X000", count: 16 },
        { label: "入力8点 X000", direction: "input", unit: "UNIT-1", start: "X000", count: 8 },
        { label: "出力16点 Y000", direction: "output", unit: "UNIT-1", start: "Y000", count: 16 },
        { label: "出力8点 Y000", direction: "output", unit: "UNIT-1", start: "Y000", count: 8 }
      ];

      // PLCモジュールプリセット(組込+プロジェクト保存分)を結合して返す。
      function allPlcModulePresets() {
        return [...PLC_MODULE_PRESETS, ...(state.plcModules || [])];
      }

      // PLC出力回路ページを生成(ユニット列左置き→端子→線番付き配線→コイル→右レール)。
      function addPlcOutputCircuitPage(unitName, addresses) {
        const count = addresses.length;
        const page = createPage({
          name: "制御盤",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "出力回路(" + addresses[0] + ")"
        });
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
        page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
        page.elements.push(textElement(40, 24.5, "(DC24V)", 1.9, 0, 20));
        const unitX = 47.5; // ユニット中央(47.5+5=52.5)=端子中心=グリッド点
        addresses.forEach((address, i) => {
          const y = round(37.5 + TEMPLATE_CIRCUIT_PITCH * i);
          // 端子中心52.5=グリッド点。配線はユニット列の端子円中心まで届かせる。
          page.elements.push({ ...defaultElement("wire", 52.5, y), points: [[52.5, y], [135, y]], wireNo: "", wireNoAlign: "start" });
          page.elements.push({ ...defaultElement("coil", 135, round(y - 2.2)), label: "", tag: "" });
          page.elements.push({ ...defaultElement("wire", 145, y), points: [[145, y], [147.5, y]] });
        });
        page.elements.push({
          ...defaultElement("plcBlock", unitX, 32.5),
          plcStyle: "unit",
          rows: count,
          w: 10,
          h: count * TEMPLATE_CIRCUIT_PITCH,
          pitch: TEMPLATE_CIRCUIT_PITCH,
          label: unitName,
          pinText: addresses.join("\n")
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("PLC出力回路ページを追加しました。");
        render();
      }

      // ダイアログ入力からPLC入力回路ページを生成(フィーダ母線+接点+端子+ユニット列右置き)。出力指定時はaddPlcOutputCircuitPageへ委譲。
      function addPlcInputCircuitPage() {
        const unitName = qs("#plcInUnit")?.value || "PLC";
        const direction = qs("#plcInDir")?.value || "input";
        const start = qs("#plcInStart")?.value || (direction === "output" ? "Y000" : "X000");
        const count = Math.max(1, Math.min(17, Math.floor(Number(qs("#plcInCount")?.value || 16))));
        const withContacts = (qs("#plcInContacts")?.value || "on") === "on";
        const addresses = plcAddressSequence(start, count);
        if (direction === "output") {
          addPlcOutputCircuitPage(unitName, addresses);
          return;
        }
        const page = createPage({
          name: "制御盤",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "入力回路(" + addresses[0] + ")"
        });
        page.elements.push(...facilityRailElements("P1", 32.5, "+", 22.4));
        page.elements.push(...facilityRailElements("N1", 147.5, "-", 22.4));
        page.elements.push(textElement(40, 24.5, "(DC24V)", 1.9, 0, 20));
        const unit = {
          ...defaultElement("plcBlock", 125, 32.5),
          plcStyle: "unit",
          rows: count,
          w: 10,
          h: count * TEMPLATE_CIRCUIT_PITCH,
          pitch: TEMPLATE_CIRCUIT_PITCH,
          label: unitName,
          pinText: addresses.join("\n")
        };
        const feederX = 47.5;
        if (withContacts && addresses.length) {
          const yFirst = 37.5;
          const yLast = round(yFirst + TEMPLATE_CIRCUIT_PITCH * (addresses.length - 1));
          page.elements.push(defaultElement("junction", 32.5, yFirst));
          page.elements.push({ ...defaultElement("wire", 32.5, yFirst), points: [[32.5, yFirst], [feederX, yFirst]] });
          if (addresses.length > 1) {
            page.elements.push({ ...defaultElement("wire", feederX, yFirst), points: [[feederX, yFirst], [feederX, yLast]] });
          }
        }
        addresses.forEach((address, i) => {
          const y = round(37.5 + TEMPLATE_CIRCUIT_PITCH * i);
          if (withContacts) {
            page.elements.push(defaultElement("junction", feederX, y));
            page.elements.push({ ...defaultElement("contactNO", 52.5, y - 2.2), label: "" });
            page.elements.push({ ...defaultElement("wire", feederX, y), points: [[feederX, y], [52.5, y]] });
            page.elements.push({ ...defaultElement("wire", 62.5, y), points: [[62.5, y], [130, y]], wireNo: "", wireNoAlign: "end" });
          } else {
            page.elements.push(defaultElement("junction", 32.5, y));
            page.elements.push({ ...defaultElement("wire", 32.5, y), points: [[32.5, y], [130, y]], wireNo: "", wireNoAlign: "end" });
          }
          // 端子中心130=ユニット中央=グリッド点。配線端は描画円中心と一致する。
        });
        // 白抜き端子円を最後に描き、配線がアドレス文字を横切らないようにする。
        page.elements.push(unit);
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("PLC入力回路ページを追加しました。");
        render();
      }

      function buildInterlockPage() {
        const leftName = qs("#ilLeftName").value || "制御盤";
        const rightName = qs("#ilRightName").value || "相手設備";
        const outCount = Math.max(0, Math.min(8, Math.floor(Number(qs("#ilOutCount").value || 0))));
        const inCount = Math.max(0, Math.min(8, Math.floor(Number(qs("#ilInCount").value || 0))));
        if (outCount + inCount > 10) {
          setStatus("インターロック信号は送り・受け合計10本以下にしてください。");
          return;
        }
        const page = createPage({
          name: "インターロック",
          size: "A4",
          orientation: "portrait",
          frameVariant: "ladder",
          title: "インターロック接続"
        });
        const boxTop = 32.5;
        const boxBottom = TEMPLATE_RAIL_BOTTOM; // 図枠下部の機器符号表帯(y224〜)より上の方眼線まで
        const leftBox = { x1: 37.5, x2: 105 };
        const rightBox = { x1: 117.5, x2: 175 };
        page.elements.push({ ...defaultElement("rect", leftBox.x1, boxTop), w: leftBox.x2 - leftBox.x1, h: boxBottom - boxTop, label: "" });
        page.elements.push(textElement(leftBox.x1 + 2, boxTop - 3.5, leftName, 2.6, 0, 60));
        page.elements.push({
          ...defaultElement("line", rightBox.x1, boxTop),
          points: [[rightBox.x1, boxTop], [rightBox.x1, boxBottom]],
          dash: "6 1.5 1.5 1.5",
          label: ""
        });
        page.elements.push({
          ...defaultElement("line", rightBox.x2, boxTop),
          points: [[rightBox.x2, boxTop], [rightBox.x2, boxBottom]],
          dash: "6 1.5 1.5 1.5",
          label: ""
        });
        [[rightBox.x1, rightBox.x2, boxTop], [rightBox.x1, rightBox.x2, boxBottom]].forEach(([xa, xb, y]) => {
          page.elements.push({
            ...defaultElement("line", xa, y),
            points: [[xa, y], [xb, y]],
            dash: "6 1.5 1.5 1.5",
            label: ""
          });
        });
        page.elements.push(textElement(rightBox.x1 + 2, boxTop - 3.5, rightName, 2.6, 0, 60));
        let signalIndex = 0;
        const nextSignalY = () => round(45 + 17.5 * signalIndex++);
        // 境界端子は中心102.5=グリッド点。配線は円中心まで届かせ、後から積む端子円が隠す
        const termCx = round(leftBox.x2 - 2.5);
        for (let i = 0; i < outCount; i++) {
          const y = nextSignalY();
          page.elements.push({ ...defaultElement("wire", 45, y), points: [[45, y], [termCx, y]] });
          page.elements.push({
            ...defaultElement("arrow", termCx, y),
            points: [[termCx, y], [rightBox.x1 + 15, y]],
            label: "",
            arrowStyle: "open",
            signalRole: "source"
          });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(termCx - 0.9), y: round(y - 0.9), label: "" });
        }
        for (let i = 0; i < inCount; i++) {
          const y = nextSignalY();
          page.elements.push({
            ...defaultElement("arrow", rightBox.x1, y),
            points: [[rightBox.x1 + 15, y], [termCx, y]],
            label: "",
            arrowStyle: "open",
            signalRole: "destination"
          });
          page.elements.push({ ...defaultElement("wire", 45, y), points: [[45, y], [termCx, y]] });
          page.elements.push({ ...defaultElement("terminal", 0, 0), x: round(termCx - 0.9), y: round(y - 0.9), label: "" });
        }
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        closeDialog();
        commitHistory("インターロック接続ページを追加しました。");
        render();
      }

      // ツイストペア表現(導体+交差線+楕円束マーク+シールド破線)の要素列を生成(配置は呼び出し側)。
      function makeTwistedPairElements(options) {
        const count = Math.max(2, Math.min(8, Math.floor(Number(options.count || 4))));
        const pitch = Math.max(state.settings.snap ? Number(state.settings.grid || 2.5) : .1, snap(Number(options.pitch || 5)));
        const x0 = snap(Number(options.x0 || 40));
        const y0 = snap(Number(options.y0 || 80));
        const span = Math.max(20, snap(Number(options.span || 60)));
        const labels = Array.isArray(options.labels) ? options.labels : [];
        const created = [];
        const yTop = y0;
        const yBot = y0 + pitch * (count - 1);
        // 楕円束は両端寄り(短スパンでも中央の撚り交差が確保できるように上限10mm)。
        // 交差線・シールド破線・楕円束も2.5mmグリッドに乗せる(マージンは2.5の倍数へ切下げ)
        const margin = Math.min(10, Math.max(2.5, Math.floor(span / 5 / 2.5) * 2.5));
        const exL = round(x0 + margin);
        const exR = round(x0 + span - margin);
        for (let i = 0; i < count; i++) {
          const y = round(y0 + pitch * i);
          created.push({ ...defaultElement("wire", x0, y), points: [[x0, y], [round(x0 + span), y]] });
          created.push({ ...defaultElement("arrow", x0 - 5, y), points: [[x0 - 5, y], [x0, y]], label: "", arrowStyle: "chevron" });
          // 信号名はシェブロンの左に右寄せで置く(左側の縦レール等と重ならないように)
          if (labels[i]) created.push(textElement(round(x0 - 6.2 - String(labels[i]).length * 1.15), y - 1.2, labels[i], 2.2, 0, 12));
        }
        const ellH = round((count - 1) * pitch + 5);
        [exL, exR].forEach(cx => {
          created.push({ ...defaultElement("circle", round(cx - 2), round(yTop - 2.5)), w: 4, h: ellH, label: "" });
        });
        const mid = round(Math.round((exL + exR) / 2 / 2.5) * 2.5);
        [[exL + 2.5, mid - 2.5], [mid + 2.5, exR - 2.5]].forEach(([xa, xb]) => {
          created.push({ ...defaultElement("line", xa, yTop), points: [[round(xa), yTop], [round(xb), yBot]], label: "" });
          created.push({ ...defaultElement("line", xa, yBot), points: [[round(xa), yBot], [round(xb), yTop]], label: "" });
        });
        created.push({ ...defaultElement("line", exL, yTop - 2.5), points: [[exL, round(yTop - 2.5)], [exR, round(yTop - 2.5)]], dash: "3 2", label: "" });
        created.push({ ...defaultElement("line", exL, yBot + 2.5), points: [[exL, round(yBot + 2.5)], [exR, round(yBot + 2.5)]], dash: "3 2", label: "" });
        return created;
      }

      // モータ分岐回路(遮断器3極+MC接点+サーマル+モータ+接地)の要素列を生成(配置は呼び出し側)。
      function makeMotorBranchElements(options) {
        const x0 = snap(Number(options.x0 || 40));
        const y0 = snap(Number(options.y0 || 65));
        const span = Math.max(70, snap(Number(options.span || 95)));
        const tag = options.tag || "M1";
        const pitch = 5; // モータ端子ピッチ(2.5mmグリッド整合)
        const withBreaker = options.withBreaker !== false;
        const withThermal = options.withThermal !== false;
        const withGround = options.withGround !== false;
        const contactTag = options.contactTag || "MC1";
        const thermalTag = options.thermalTag || "OL1";
        const created = [];
        const lineYs = [y0, y0 + pitch, y0 + pitch * 2];
        const motorX = round(x0 + span - 0.9); // モータ第1ピン(x+0.9)が終端グリッド点(x0+span)に乗るよう補正
        const motor = { ...defaultElement("motor", motorX, round(y0 - 3)), label: tag, tag };
        created.push(motor);
        const stations = [];
        let cursor = x0 + 5; // 各機器の左ピンを2.5mmグリッドに乗せる(ピッチも2.5の倍数)
        const breakers = [];
        if (withBreaker) {
          lineYs.forEach(y => {

          cursor += 22.5;
