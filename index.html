        const cx = w / 2;
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: cx - r, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: cx + r, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx, cy, r, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (cx - r * .45) + " " + cy + " C " + (cx - r * .15) + " " + (cy - r * .45) + " " + (cx + r * .15) + " " + (cy - r * .45) + " " + (cx + r * .45) + " " + cy, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, cx, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      function drawCylinderLamp(g, element, stroke, w, h) {
        const cy = h / 2;
        const bodyX = Math.max(3.5, w * .3);
        const bodyW = Math.max(5.5, w - bodyX * 2);
        const bodyY = Math.max(1.6, h * .18);
        const bodyH = h - bodyY * 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: bodyX, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " " + (bodyY + 1) + " C " + bodyX + " " + (bodyY - .4) + " " + (bodyX + bodyW) + " " + (bodyY - .4) + " " + (bodyX + bodyW) + " " + (bodyY + 1), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " " + (bodyY + 1) + " V " + (bodyY + bodyH - 1) + " C " + bodyX + " " + (bodyY + bodyH + .4) + " " + (bodyX + bodyW) + " " + (bodyY + bodyH + .4) + " " + (bodyX + bodyW) + " " + (bodyY + bodyH - 1) + " V " + (bodyY + 1), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      function drawBuzzer(g, element, stroke) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 9);
        if ((element.buzzerVariant || "horn") === "speaker") {
          drawSpeakerBuzzer(g, element, stroke, w, h);
          return;
        }
        const cy = h / 2;
        const throat = Math.max(4.2, w * .26);
        const mouthX = w - .4;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: throat - .8, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("circle", { cx: throat, cy, r: .85, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (throat + .7) + " " + (cy - 2.3) + " C " + (throat + 2.6) + " " + (cy - 4.5) + " " + (throat + 5.2) + " " + (cy - 4.2) + " " + (throat + 6.8) + " " + (cy - 2.4) + " L " + mouthX + " " + (cy - 4.9), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (throat + .7) + " " + (cy + 2.3) + " C " + (throat + 2.6) + " " + (cy + 4.5) + " " + (throat + 5.2) + " " + (cy + 4.2) + " " + (throat + 6.8) + " " + (cy + 2.4) + " L " + mouthX + " " + (cy + 4.9), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + mouthX + " " + (cy - 4.9) + " C " + w + " " + (cy - 2) + " " + w + " " + (cy + 2) + " " + mouthX + " " + (cy + 4.9), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      function drawSpeakerBuzzer(g, element, stroke, w, h) {
        const cy = h / 2;
        g.appendChild(svgEl("path", { d: "M 0 " + cy + " H " + (w * .24) + " L " + (w * .62) + " 2.2 V " + (h - 2.2) + " L " + (w * .24) + " " + cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w * .72) + " " + (h * .3) + " C " + (w * .9) + " " + (h * .42) + " " + (w * .9) + " " + (h * .58) + " " + (w * .72) + " " + (h * .7), class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w * .84) + " " + (h * .18) + " C " + w + " " + (h * .38) + " " + w + " " + (h * .62) + " " + (w * .84) + " " + (h * .82), class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -2.2, { fontSize: 1.9, anchor: "middle" }));
      }

      function drawSolenoidValve(g, element, stroke) {
        const w = Number(element.w || 26);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const coilW = Math.max(7, w * .28);
        const bodyX = coilW + 2;
        const bodyW = Math.max(8, w - bodyX - 2);
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: 2.5, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: 2.5, y: 2, width: coilW, height: h - 4, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("path", { d: "M " + bodyX + " 2 L " + (bodyX + bodyW) + " " + cy + " L " + bodyX + " " + (h - 2) + " Z", class: "symbol-line", stroke, fill: "none" }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: 2, x2: bodyX + bodyW, y2: h - 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: bodyX + bodyW, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      function drawSensor(g, element, stroke) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 14);
        const cy = h / 2;
        g.appendChild(svgEl("line", { x1: 0, y1: cy, x2: 4, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: w - 4, y1: cy, x2: w, y2: cy, class: "symbol-line", stroke }));
        g.appendChild(svgEl("rect", { x: 4, y: 2, width: w - 8, height: h - 4, class: "symbol-fill", stroke }));
        g.appendChild(svgEl("line", { x1: 7, y1: 5, x2: w - 10, y2: 5, class: "symbol-line", stroke }));
        g.appendChild(svgEl("line", { x1: 7, y1: h - 5, x2: w - 7, y2: h - 5, class: "symbol-line", stroke }));
        g.appendChild(svgEl("path", { d: "M " + (w - 4) + " " + (cy - 4) + " l 4 -4 M " + (w - 3) + " " + cy + " h 5 M " + (w - 4) + " " + (cy + 4) + " l 4 4", class: "symbol-line", stroke }));
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      function drawDeviceBox(g, element, stroke) {
        const w = Number(element.w || 42);
        const h = Number(element.h || 28);
        const pins = Math.max(0, Number(element.pins || 4));
        const labels = String(element.pinText || "").split(/\r?\n/);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        multilineText(g, element.label || "機器", w / 2, h / 2 - 2, 3.8, { fontSize: 2.6, anchor: "middle" });
        for (let i = 0; i < pins; i++) {
          const y = h * (i + 1) / (pins + 1);
          g.appendChild(svgEl("line", { x1: -7, y1: y, x2: 0, y2: y, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: w, y1: y, x2: w + 7, y2: y, class: "symbol-line", stroke }));
          if (labels[i]) {
            g.appendChild(textEl(labels[i], 2, y, { fontSize: 2.1 }));
          }
        }
      }

      function drawPlcBlock(g, element, stroke) {
        const w = Number(element.w || 48);
        const rows = Math.max(2, Number(element.rows || 8));
        const h = Number(element.h || rows * 6 + 10);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        g.appendChild(textEl(element.label || "PLC", w / 2, 5, { fontSize: 2.5, anchor: "middle" }));
        const labels = String(element.pinText || "").split(/\r?\n/);
        for (let i = 1; i <= rows; i++) {
          const y = 8 + i * ((h - 10) / rows);
          g.appendChild(svgEl("line", { x1: 0, y1: y, x2: w, y2: y, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: -8, y1: y - 3, x2: 0, y2: y - 3, class: "symbol-line", stroke }));
          g.appendChild(textEl(labels[i - 1] || String(i).padStart(2, "0"), 3, y - 3, { fontSize: 2 }));
        }
      }

      function drawConnector(g, element, stroke) {
        const count = Math.max(1, Number(element.count || 8));
        const vertical = element.orientation === "vertical";
        const shape = element.terminalShape || "circle";
        const w = Number(element.w || (vertical ? 10 : count * 7));
        const h = Number(element.h || (vertical ? count * 7 : 10));
        if (vertical) {
          const pitch = h / count;
          g.appendChild(svgEl("line", { x1: w / 2, y1: 0, x2: w / 2, y2: h, class: "symbol-line", stroke }));
          for (let i = 0; i < count; i++) {
            const cy = pitch * i + pitch / 2;
            drawTerminalNode(g, w / 2, cy, Math.min(2.7, pitch * .33), shape, stroke);
            g.appendChild(textEl(String(i + 1), w + 3, cy, { fontSize: 2 }));
          }
          if (element.label) g.appendChild(textEl(element.label, w + 3, -3, { fontSize: 2.4 }));
        } else {
          const pitch = w / count;
          g.appendChild(svgEl("line", { x1: 0, y1: h / 2, x2: w, y2: h / 2, class: "symbol-line", stroke }));
          for (let i = 0; i < count; i++) {
            const cx = pitch * i + pitch / 2;
            drawTerminalNode(g, cx, h / 2, Math.min(2.7, pitch * .33), shape, stroke);
            g.appendChild(textEl(String(i + 1), cx, h + 4, { fontSize: 2, anchor: "middle" }));
          }
          if (element.label) g.appendChild(textEl(element.label, 0, -3, { fontSize: 2.4 }));
        }
      }

      function drawCableMarker(g, element, stroke) {
        const w = Number(element.w || 28);
        const h = Number(element.h || 12);
        g.appendChild(svgEl("line", { x1: -12, y1: h / 2, x2: w + 12, y2: h / 2, class: "symbol-line", stroke }));
        g.appendChild(svgEl("ellipse", { cx: w / 2, cy: h / 2, rx: w / 2, ry: h / 2, class: "symbol-fill", stroke }));
        g.appendChild(textEl(element.label || "C", w / 2, h / 2, { fontSize: 2.4, anchor: "middle" }));
      }

      function drawCableBundle(g, element, stroke) {
        const w = Number(element.w || 32);
        const h = Number(element.h || 18);
        const mid = h / 2;
        g.appendChild(svgEl("rect", { x: w * .38, y: 1.5, width: w * .22, height: h - 3, class: "symbol-fill", stroke }));
        [-5, 0, 5].forEach(offset => {
          g.appendChild(svgEl("path", {
            d: "M 0 " + (mid + offset) + " C " + (w * .3) + " " + (mid + offset) + " " + (w * .62) + " " + (mid - offset) + " " + w + " " + (mid - offset),
            class: "symbol-line",
            stroke
          }));
        });
        if (element.label) g.appendChild(textEl(element.label, w / 2, -3, { fontSize: 2.4, anchor: "middle" }));
      }

      function drawTerminalBox(g, element, stroke) {
        const w = Number(element.w || 22);
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        for (let i = 1; i < rows; i++) {
          g.appendChild(svgEl("line", { x1: 0, y1: h * i / rows, x2: w, y2: h * i / rows, class: "symbol-line", stroke }));
        }
        for (let i = 0; i < rows; i++) {
          const y = h * (i + .5) / rows;
          g.appendChild(svgEl("line", { x1: -6, y1: y, x2: 0, y2: y, class: "symbol-line", stroke }));
          g.appendChild(svgEl("line", { x1: w, y1: y, x2: w + 6, y2: y, class: "symbol-line", stroke }));
        }
        if (element.label) g.appendChild(textEl(element.label, w / 2, h + 4, { fontSize: 2.2, anchor: "middle" }));
      }

      function drawTable(g, element, stroke) {
        const rows = Math.max(1, Number(element.rows || 6));
        const cols = Math.max(1, Number(element.cols || 4));
        const w = Number(element.w || 78);
        const h = Number(element.h || 44);
        g.appendChild(svgEl("rect", { x: 0, y: 0, width: w, height: h, class: "symbol-fill", stroke }));
        for (let i = 1; i < rows; i++) {
          const y = h * i / rows;
          g.appendChild(svgEl("line", { x1: 0, y1: y, x2: w, y2: y, class: "symbol-line", stroke }));
        }
        for (let i = 1; i < cols; i++) {
          const x = w * i / cols;
          g.appendChild(svgEl("line", { x1: x, y1: 0, x2: x, y2: h, class: "symbol-line", stroke }));
        }
        drawTableCells(g, element, rows, cols, w, h);
        if (element.label) g.appendChild(textEl(element.label, w / 2, -4, { fontSize: 2.5, anchor: "middle" }));
      }

      function drawTableCells(g, element, rows, cols, w, h) {
        const text = String(element.cellText || "");
        if (!text.trim()) return;
        const rowData = text.split(/\r?\n/).slice(0, rows);
        const cellW = w / cols;
        const cellH = h / rows;
        rowData.forEach((line, rowIndex) => {
          const cells = line.includes("\t") ? line.split("\t") : line.split(",");
          cells.slice(0, cols).forEach((cell, colIndex) => {
            g.appendChild(textEl(cell.trim(), colIndex * cellW + 1.5, rowIndex * cellH + cellH / 2, { fontSize: 2.2 }));
          });
        });
      }

      function drawArrow(g, element, stroke) {
        const points = element.points || [[element.x || 0, element.y || 0], [(element.x || 0) + 30, element.y || 0]];
        const a = points[0];
        const b = points[points.length - 1];
        g.appendChild(svgEl("line", { x1: a[0], y1: a[1], x2: b[0], y2: b[1], class: "symbol-line", stroke }));
        const angle = Math.atan2(b[1] - a[1], b[0] - a[0]);
        const len = 4;
        const p1 = [b[0] - len * Math.cos(angle - .6), b[1] - len * Math.sin(angle - .6)];
        const p2 = [b[0] - len * Math.cos(angle + .6), b[1] - len * Math.sin(angle + .6)];
        g.appendChild(svgEl("path", { d: "M " + p1[0] + " " + p1[1] + " L " + b[0] + " " + b[1] + " L " + p2[0] + " " + p2[1], class: "symbol-line", stroke }));
        if (element.label) {
          const mid = pathMid(a, b);
          g.appendChild(textEl(element.label, mid.x, mid.y - 3, { fontSize: 2.4, anchor: "middle" }));
        }
      }

      function drawJunction(g, element, stroke) {
        g.appendChild(svgEl("circle", { cx: 0, cy: 0, r: Number(element.r || 1.45), fill: stroke }));
      }

      function drawSelection(svg) {
        const selected = selectedElements();
        const boxes = selected.map(elementBounds).filter(Boolean);
        if (!boxes.length) return;
        boxes.forEach(box => {
          svg.appendChild(svgEl("rect", {
            x: box.x - 2,
            y: box.y - 2,
            width: box.w + 4,
            height: box.h + 4,
            class: "selection-box"
          }));
        });
        const box = boxes.length === 1 ? boxes[0] : unionBounds(boxes);
        const handles = [
          [box.x - 2, box.y - 2],
          [box.x + box.w + 2, box.y - 2],
          [box.x - 2, box.y + box.h + 2],
          [box.x + box.w + 2, box.y + box.h + 2]
        ];
        const resizeHandles = ["nw", "ne", "sw", "se"];
        const resizable = selected.length === 1 && canResizeElement(selected[0]) && !isElementLocked(selected[0]);
        handles.forEach(([x, y], index) => {
          svg.appendChild(svgEl("rect", {
            x: x - 1.5,
            y: y - 1.5,
            width: 3,
            height: 3,
            class: "selection-handle" + (resizable ? " resize-handle" : ""),
            "data-resize-handle": resizable ? resizeHandles[index] : null
          }));
        });
        if (selected.length === 1 && selected[0].points && !isElementLocked(selected[0])) {
          selected[0].points.forEach((point, index) => {
            svg.appendChild(svgEl("rect", {
              x: point[0] - 1.7,
              y: point[1] - 1.7,
              width: 3.4,
              height: 3.4,
              class: "point-handle",
              "data-point-index": index
            }));
          });
        }
      }

      function canResizeElement(element) {
        return !!element && !element.points && element.type !== "junction";
      }

      function drawMarquee(svg) {
        if (!dragState || dragState.mode !== "marquee") return;
        const rect = normalizedRect(dragState.start, dragState.current || dragState.start);
        if (rect.w < .5 && rect.h < .5) return;
        svg.appendChild(svgEl("rect", {
          x: rect.x,
          y: rect.y,
          width: rect.w,
          height: rect.h,
          class: "selection-box"
        }));
      }

      function normalizedRect(a, b) {
        const x1 = Math.min(a.x, b.x);
        const y1 = Math.min(a.y, b.y);
        const x2 = Math.max(a.x, b.x);
        const y2 = Math.max(a.y, b.y);
        return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
      }

      function boundsIntersect(a, b) {
        return a.x <= b.x + b.w && a.x + a.w >= b.x && a.y <= b.y + b.h && a.y + a.h >= b.y;
      }

      function unionBounds(boxes) {
        const minX = Math.min(...boxes.map(box => box.x));
        const minY = Math.min(...boxes.map(box => box.y));
        const maxX = Math.max(...boxes.map(box => box.x + box.w));
        const maxY = Math.max(...boxes.map(box => box.y + box.h));
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
      }

      function elementBounds(element) {
        if (element.type === "wire" || element.type === "arrow" || element.type === "line") {
          const points = element.points || [[0, 0], [0, 0]];
          const xs = points.map(p => p[0]);
          const ys = points.map(p => p[1]);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          return { x: minX, y: minY, w: Math.max(1, Math.max(...xs) - minX), h: Math.max(1, Math.max(...ys) - minY) };
        }
        if (element.type === "junction") {
          const r = Number(element.r || 1.45);
          return { x: element.x - r, y: element.y - r, w: r * 2, h: r * 2 };
        }
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return { x: Number(element.x || 0), y: Number(element.y || 0), w, h };
      }

      function setSelection(ids) {
        selectedIds = Array.from(new Set(ids.filter(Boolean)));
        selectedId = selectedIds.length ? selectedIds[0] : null;
      }

      function selectSingle(id) {
        setSelection(id ? [id] : []);
      }

      function toggleSelection(id) {
        if (!id) return;
        if (selectedIds.includes(id)) setSelection(selectedIds.filter(item => item !== id));
        else setSelection([...selectedIds, id]);
      }

      function selectedElements() {
        const page = currentPage();
        if (!page) return [];
        const ids = selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []);
        return ids.map(id => page.elements.find(element => element.id === id)).filter(Boolean);
      }

      function selectedElement() {
        return selectedElements()[0] || null;
      }

      function syncInspector() {
        const page = currentPage();
        if (!page) return;
        renderStandardSelect();
        setValue("drawingStandard", state.settings.standard || "general");
        setValue("pageName", page.name);
        setValue("paperSize", page.size);
        setValue("paperOrientation", page.orientation);
        setValue("frameVariant", page.frameVariant);
        setValue("drawingNo", page.title.drawingNo);
        setValue("revision", page.title.revision);
        setValue("drawingTitle", page.title.title);
        setValue("designer", page.title.designer);
        setValue("drawDate", page.title.date);
        setValue("pageInstallation", page.title.installation || "");
        setValue("pageLocation", page.title.location || "");
        setValue("zoomRange", state.settings.zoom);
        setValue("gridSize", state.settings.grid);
        setValue("snapToggle", state.settings.snap ? "on" : "off");
        setValue("objectSnapToggle", state.settings.objectSnap ? "on" : "off");
        setValue("underlayOutputToggle", state.settings.outputUnderlays ? "on" : "off");
        setValue("wireNumberFormat", state.settings.wireNumberFormat || "%S-%N");
        setValue("componentTagFormat", state.settings.componentTagFormat || "%F%N");
        renderWireTypeSelect();
        setValue("currentWireType", state.settings.currentWireType || "control");
        renderLayerSelect();
        setValue("currentLayer", state.settings.currentLayer || "symbols");
        renderSelectionPanel();
      }

      function clampZoom(value) {
        const input = qs("#zoomRange");
        const min = Number(input?.min || .8);
        const max = Number(input?.max || 8);
        const zoom = Number(value);
        return Math.max(min, Math.min(max, Number.isFinite(zoom) ? zoom : 3.2));
      }

      function setZoom(value, save = false) {
        state.settings.zoom = clampZoom(value);
        setValue("zoomRange", state.settings.zoom);
        if (save) commitHistory("ズームを変更しました。");
        render();
      }

      function renderStandardSelect() {
        const select = qs("#drawingStandard");
        if (!select) return;
        const html = STANDARDS.map(standard => `<option value="${escapeAttr(standard.id)}">${escapeHtml(standard.label)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      function renderWireTypeSelect() {
        const select = qs("#currentWireType");
        if (!select) return;
        const html = (state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}">${escapeHtml(type.label)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      function renderLayerSelect() {
        const select = qs("#currentLayer");
        if (!select) return;
        const html = (state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}">${escapeHtml(layer.label)}</option>`).join("");
        if (select.innerHTML !== html) select.innerHTML = html;
      }

      function setValue(id, value) {
        const el = qs("#" + id);
        if (el && el.value !== String(value ?? "")) el.value = value ?? "";
      }

      function renderSelectionPanel() {
        const panel = qs("#selectionPanel");
        const selected = selectedElements();
        if (selected.length > 1) {
          panel.innerHTML = `
            <div class="panel-title">複数選択: ${selected.length}件</div>
            <p class="muted">Shiftクリックで選択を追加/解除できます。選択中の要素をまとめて移動、コピー、複製、削除できます。</p>
            <div class="row" style="margin-top:8px">
              <button type="button" id="copyElementBtn">コピー</button>
              <button type="button" id="pasteElementBtn">貼付</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="duplicateElementBtn">複製</button>
              <button type="button" id="deleteElementBtn">削除</button>
            </div>
            <button type="button" id="pasteInstallLocationBtn" style="width:100%;margin-top:8px" ${installLocationClipboard ? "" : "disabled"}>設備/場所貼付</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="bringForwardBtn">前面へ</button>
              <button type="button" id="sendBackwardBtn">背面へ</button>
            </div>
            <button type="button" id="registerSymbolBtn" style="width:100%;margin-top:8px">回路として登録</button>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-align="left">左揃え</button>
              <button type="button" data-align="hcenter">中揃え</button>
              <button type="button" data-align="right">右揃え</button>
            </div>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-align="top">上揃え</button>
              <button type="button" data-align="vcenter">中央</button>
              <button type="button" data-align="bottom">下揃え</button>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" data-distribute="x">横均等</button>
              <button type="button" data-distribute="y">縦均等</button>
            </div>
            <div class="row-3" style="margin-top:8px">
              <button type="button" data-nudge="-1,0">←</button>
              <button type="button" data-nudge="0,-1">↑</button>
              <button type="button" data-nudge="1,0">→</button>
            </div>
            <button type="button" data-nudge="0,1" style="width:100%;margin-top:8px">↓ 1mm移動</button>
          `;
          attachSelectionActionButtons(panel);
          qs("#pasteInstallLocationBtn", panel)?.addEventListener("click", pasteInstallLocationToSelection);
          qs("#registerSymbolBtn", panel)?.addEventListener("click", registerSelectedAsSymbol);
          return;
        }
        const element = selectedElement();
        if (!element) {
          panel.innerHTML = '<div class="panel-title">選択中の要素</div><p class="muted">図形を選択すると、位置・寸法・記号名・線番を編集できます。</p>';
          return;
        }
        const typeName = paletteLabel(element.type);
        const isWireLike = element.type === "wire" || element.type === "arrow" || element.type === "line";
        panel.innerHTML = `
          <div class="panel-title">選択中: ${typeName}</div>
          ${isWireLike ? wireFields(element) : normalFields(element)}
          ${labelFields(element)}
          ${specificFields(element)}
          ${electricalAttributeFields(element)}
          <label>所属レイヤ</label>
          <select data-bind="layer">${layerOptions(element.layer || inferredLayerFor(element.type))}</select>
          <label>属性メモ</label>
          <textarea data-bind="note">${escapeHtml(element.note || "")}</textarea>
          <label for="selStroke">線色</label>
          <div class="swatches" id="swatches">
            ${["#111820", "#0f6f63", "#b42318", "#1f5fbf", "#6f42c1", "#5b626b"].map(color => `<button type="button" class="swatch${(element.stroke || state.settings.stroke) === color ? " active" : ""}" data-color="${color}" style="background:${color}" title="${color}"></button>`).join("")}
          </div>
          <button type="button" id="registerSymbolBtn" style="width:100%;margin-top:12px">ユーザー部品に登録</button>
          <button type="button" id="toggleLockBtn" style="width:100%;margin-top:8px" ${isLayerLocked(element.layer || inferredLayerFor(element.type)) ? "disabled" : ""}>${isLayerLocked(element.layer || inferredLayerFor(element.type)) ? "レイヤロック中" : (element.locked ? "ロック解除" : "ロック")}</button>
          <div class="row" style="margin-top:8px">
            <button type="button" id="copyElementBtn">コピー</button>
            <button type="button" id="pasteElementBtn">貼付</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="duplicateElementBtn">複製</button>
            <button type="button" id="deleteElementBtn">削除</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="bringForwardBtn">前面へ</button>
            <button type="button" id="sendBackwardBtn">背面へ</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button type="button" id="rotateLeftBtn">左90°</button>
            <button type="button" id="rotateRightBtn">右90°</button>
          </div>
          <div class="row-3" style="margin-top:8px">
            <button type="button" data-nudge="-1,0">←</button>
            <button type="button" data-nudge="0,-1">↑</button>
            <button type="button" data-nudge="1,0">→</button>
          </div>
          <button type="button" data-nudge="0,1" style="width:100%;margin-top:8px">↓ 1mm移動</button>
        `;
        qsa("[data-bind]", panel).forEach(input => {
          input.addEventListener("change", () => updateSelectedFromInput(input));
          input.addEventListener("input", () => {
            if (input.tagName === "TEXTAREA" || input.dataset.live === "true") updateSelectedFromInput(input, false);
          });
        });
        qsa(".swatch", panel).forEach(button => {
          button.addEventListener("click", () => {
            const selected = selectedElement();
            if (!selected) return;
            selected.stroke = button.dataset.color;
            commitHistory("線色を変更しました。");
            render();
          });
        });
        qs("#registerSymbolBtn", panel)?.addEventListener("click", registerSelectedAsSymbol);
        qs("#toggleLockBtn", panel)?.addEventListener("click", toggleSelectedLock);
        qs("#toggleWireGapBtn", panel)?.addEventListener("click", toggleSelectedWireGap);
        qs("#addIntersectionGapsBtn", panel)?.addEventListener("click", addIntersectionGapsToSelectedWire);
        qs("#clearWireGapsBtn", panel)?.addEventListener("click", clearSelectedWireGaps);
        qs("#addWirePointBtn", panel)?.addEventListener("click", addSelectedWirePoint);
        qs("#removeWirePointBtn", panel)?.addEventListener("click", removeSelectedWirePoint);
        qs("#orthogonalizeWireBtn", panel)?.addEventListener("click", orthogonalizeSelectedWire);
        qs("#applyAreaAttributesBtn", panel)?.addEventListener("click", applySelectedAreaAttributes);
        qs("#copyInstallLocationBtn", panel)?.addEventListener("click", copySelectedInstallLocation);
        qs("#pasteInstallLocationBtn", panel)?.addEventListener("click", pasteInstallLocationToSelection);
        attachSelectionActionButtons(panel);
        qs("#rotateLeftBtn", panel)?.addEventListener("click", () => rotateSelected(-90));
        qs("#rotateRightBtn", panel)?.addEventListener("click", () => rotateSelected(90));
      }

      function attachSelectionActionButtons(panel) {
        qs("#copyElementBtn", panel)?.addEventListener("click", copySelected);
        qs("#pasteElementBtn", panel)?.addEventListener("click", pasteClipboard);
        qs("#duplicateElementBtn", panel)?.addEventListener("click", duplicateSelected);
        qs("#deleteElementBtn", panel)?.addEventListener("click", deleteSelected);
        qs("#bringForwardBtn", panel)?.addEventListener("click", bringSelectedForward);
        qs("#sendBackwardBtn", panel)?.addEventListener("click", sendSelectedBackward);
        qsa("[data-align]", panel).forEach(button => {
          button.addEventListener("click", () => alignSelected(button.dataset.align));
        });
        qsa("[data-distribute]", panel).forEach(button => {
          button.addEventListener("click", () => distributeSelected(button.dataset.distribute));
        });
        qsa("[data-nudge]", panel).forEach(button => {
          button.addEventListener("click", () => {
            const [dx, dy] = button.dataset.nudge.split(",").map(Number);
            moveSelected(dx, dy);
            commitHistory("要素を移動しました。");
            render();
          });
        });
      }

      function layerOptions(current) {
        return (state.layers || []).map(layer => `<option value="${escapeAttr(layer.id)}"${current === layer.id ? " selected" : ""}>${escapeHtml(layer.label)}</option>`).join("");
      }

      function paletteLabel(type) {
        if (String(type).startsWith("custom:")) {
          const id = String(type).slice("custom:".length);
          return (state.customSymbols || []).find(symbol => symbol.id === id)?.label || "ユーザー部品";
        }
        if (type === "underlayImage") return "下絵画像";
        return (PALETTE.find(item => item.type === type) || { label: type }).label;
      }

      function normalFields(element) {
        return `
          <div class="row">
            <div><label>X mm</label><input data-bind="x" data-kind="number" type="number" step="0.5" value="${round(element.x || 0)}"></div>
            <div><label>Y mm</label><input data-bind="y" data-kind="number" type="number" step="0.5" value="${round(element.y || 0)}"></div>
          </div>
          <div class="row">
            <div><label>幅 mm</label><input data-bind="w" data-kind="number" type="number" step="0.5" value="${round(element.w || defaultElement(element.type).w || 20)}"></div>
            <div><label>高さ mm</label><input data-bind="h" data-kind="number" type="number" step="0.5" value="${round(element.h || defaultElement(element.type).h || 10)}"></div>
          </div>
          <label>回転 deg</label>
          <input data-bind="rotation" data-kind="number" type="number" step="90" value="${round(element.rotation || 0)}">
        `;
      }

      function wireFields(element) {
        const points = element.points || [[0, 0], [20, 0]];
        const options = (state.wireTypes || []).map(type => `<option value="${escapeAttr(type.id)}"${element.wireType === type.id ? " selected" : ""}>${escapeHtml(type.label)}</option>`).join("");
        const pointRows = points.map((point, index) => {
          const label = index === 0 ? "始点" : (index === points.length - 1 ? "終点" : "中間" + index);
          return `
            <div class="row">
              <div><label>${label} X</label><input data-bind="p${index}x" data-kind="number" type="number" step="0.5" value="${round(point[0])}"></div>
              <div><label>${label} Y</label><input data-bind="p${index}y" data-kind="number" type="number" step="0.5" value="${round(point[1])}"></div>
            </div>
          `;
        }).join("");
        return `
          ${element.type === "wire" ? `<label>配線種別</label><select data-bind="wireType">${options}</select>` : ""}
          ${pointRows}
        `;
      }

      function labelFields(element) {
        if (element.type === "text") {
          return `
            <label>文字</label>
            <textarea data-bind="text">${escapeHtml(element.text || "")}</textarea>
            <label>文字サイズ mm</label>
            <input data-bind="fontSize" data-kind="number" type="number" step="0.2" value="${round(element.fontSize || 3.5)}">
          `;
        }
        if (element.type === "wire") {
          return `
            <label>線番</label>
            <input data-bind="wireNo" type="text" value="${escapeAttr(element.wireNo || "")}">
            <label><input data-bind="fixedWireNo" type="checkbox" ${element.fixedWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番固定</label>
            <label><input data-bind="hideWireNo" type="checkbox" ${element.hideWireNo ? "checked" : ""} style="width:auto;min-height:auto"> 線番非表示</label>
            <div class="row">
              <div><label>FROM</label><input data-bind="fromOverride" type="text" value="${escapeAttr(element.fromOverride || "")}"></div>
              <div><label>TO</label><input data-bind="toOverride" type="text" value="${escapeAttr(element.toOverride || "")}"></div>
            </div>
          `;
        }
        if (element.type === "line") {
          return `
            <label>線ラベル</label>
            <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
          `;
        }
        return `
          <label>ラベル</label>
          <input data-bind="label" type="text" value="${escapeAttr(element.label || "")}">
        `;
      }

      function specificFields(element) {
        if (element.type === "wire") {
          const pointCount = element.points?.length || 2;
          const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
          return `
            <div class="row" style="margin-top:8px">
              <button type="button" id="addWirePointBtn">中間点追加</button>
              <button type="button" id="removeWirePointBtn" ${pointCount <= 2 ? "disabled" : ""}>中間点削除</button>
            </div>
            <button type="button" id="orthogonalizeWireBtn" style="width:100%;margin-top:8px">直交整形</button>
            <button type="button" id="toggleWireGapBtn" style="width:100%;margin-top:8px">${element.gapAtMid ? "中央ギャップ解除" : "中央ギャップ追加"}</button>
            <div class="row" style="margin-top:8px">
              <button type="button" id="addIntersectionGapsBtn">交差ギャップ追加</button>
              <button type="button" id="clearWireGapsBtn" ${gapCount ? "" : "disabled"}>全解除</button>
            </div>
            <p class="muted">ギャップ数: ${gapCount}</p>
          `;
        }
        if (element.type === "underlayImage") {
          const crop = element.cropPreset || "full";
          return `
            <label>透明度</label>
            <input data-bind="opacity" data-kind="number" type="number" min="0.05" max="1" step="0.05" value="${round(element.opacity ?? .35)}">
            <label>表示範囲</label>
            <select data-bind="cropPreset">
              <option value="full"${crop === "full" ? " selected" : ""}>全体</option>
              <option value="top"${crop === "top" ? " selected" : ""}>上半分</option>
              <option value="bottom"${crop === "bottom" ? " selected" : ""}>下半分</option>
              <option value="left"${crop === "left" ? " selected" : ""}>左半分</option>
              <option value="right"${crop === "right" ? " selected" : ""}>右半分</option>
            </select>
            <p class="muted">下絵は初期状態でロックされます。位置やサイズを調整する場合はロック解除してください。</p>
          `;
        }
        if (element.type === "installationBox" || element.type === "locationBox") {
          const target = element.type === "installationBox" ? "設備" : "場所";
          return `
            <label>枠線破線</label>
            <input data-bind="dash" type="text" value="${escapeAttr(element.dash || "4 2")}" placeholder="4 2">
            <button type="button" id="applyAreaAttributesBtn" style="width:100%;margin-top:8px">枠内へ${target}属性を適用</button>
          `;
        }
        if (element.type === "arrow") {
          const role = element.signalRole || "reference";
          return `
            <label>信号矢印種別</label>
            <select data-bind="signalRole">
              <option value="reference"${role === "reference" ? " selected" : ""}>参照</option>
              <option value="source"${role === "source" ? " selected" : ""}>発信元</option>
              <option value="destination"${role === "destination" ? " selected" : ""}>受信先</option>
            </select>
          `;
        }
        if (["contactNO", "contactNC", "pushButton"].includes(element.type)) {
          const orientation = element.orientation || "horizontal";
          return `
            <label>接点方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横向き標準</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦配線上の回転配置用</option>
            </select>
          `;
        }
        if (element.type === "lamp") {
          const variant = element.lampVariant || "pilot";
          return `
            <label>ランプ形状</label>
            <select data-bind="lampVariant">
              <option value="pilot"${variant === "pilot" ? " selected" : ""}>丸形パイロット</option>
              <option value="cylinder"${variant === "cylinder" ? " selected" : ""}>筒形表示灯</option>
            </select>
          `;
        }
        if (element.type === "buzzer") {
          const variant = element.buzzerVariant || "horn";
          return `
            <label>ブザー形状</label>
            <select data-bind="buzzerVariant">
              <option value="horn"${variant === "horn" ? " selected" : ""}>ホーン</option>
              <option value="speaker"${variant === "speaker" ? " selected" : ""}>スピーカー</option>
            </select>
          `;
        }
        if (element.type === "terminal") {
          const shape = element.terminalShape || "circle";
          const orientation = element.orientation || "horizontal";
          return `
            <label>方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦</option>
            </select>
            <label>端子形状</label>
            <select data-bind="terminalShape">
              <option value="circle"${shape === "circle" ? " selected" : ""}>丸</option>
              <option value="square"${shape === "square" ? " selected" : ""}>角</option>
            </select>
          `;
        }
        if (["terminalStrip", "connector"].includes(element.type)) {
          const orientation = element.orientation || "horizontal";
          const shape = element.terminalShape || "circle";
          return `
            <div class="row">
              <div><label>端子数</label><input data-bind="count" data-kind="number" type="number" min="1" step="1" value="${Number(element.count || 8)}"></div>
              <div><label>開始番号</label><input data-bind="start" data-kind="number" type="number" step="1" value="${Number(element.start || 1)}"></div>
            </div>
            <label>方向</label>
            <select data-bind="orientation">
              <option value="horizontal"${orientation === "horizontal" ? " selected" : ""}>横</option>
              <option value="vertical"${orientation === "vertical" ? " selected" : ""}>縦</option>
            </select>
            <label>端子形状</label>
            <select data-bind="terminalShape">
              <option value="circle"${shape === "circle" ? " selected" : ""}>丸</option>
              <option value="square"${shape === "square" ? " selected" : ""}>角</option>
            </select>
            <label>接頭辞</label>
            <input data-bind="prefix" type="text" value="${escapeAttr(element.prefix || "")}">
          `;
        }
        if (element.type === "table") {
          return `
            <div class="row">
              <div><label>行</label><input data-bind="rows" data-kind="number" type="number" min="1" step="1" value="${Number(element.rows || 6)}"></div>
              <div><label>列</label><input data-bind="cols" data-kind="number" type="number" min="1" step="1" value="${Number(element.cols || 4)}"></div>
            </div>
            <label>セル文字（タブ/カンマ区切り）</label>
            <textarea data-bind="cellText">${escapeHtml(element.cellText || "")}</textarea>
          `;
        }
        if (element.type === "plcBlock") {
          return `
            <label>I/O行数</label>
            <input data-bind="rows" data-kind="number" type="number" min="2" step="1" value="${Number(element.rows || 8)}">
            <label>I/O名（1行1点）</label>
            <textarea data-bind="pinText">${escapeHtml(element.pinText || "")}</textarea>
          `;
        }
        if (element.type === "deviceBox") {
          return `
            <label>左右ピン数</label>
            <input data-bind="pins" data-kind="number" type="number" min="0" step="1" value="${Number(element.pins || 4)}">
            <label>ピン名（1行1点）</label>
            <textarea data-bind="pinText">${escapeHtml(element.pinText || "")}</textarea>
          `;
        }
        if (element.type === "line") {
          return `
            <div class="row">
              <div><label>線幅</label><input data-bind="strokeWidth" data-kind="number" type="number" min="0.1" step="0.1" value="${round(element.strokeWidth || .32)}"></div>
              <div><label>破線</label><input data-bind="dash" type="text" value="${escapeAttr(element.dash || "")}" placeholder="3 2"></div>
            </div>
          `;
        }
        return "";
      }

      function signalRoleLabel(role) {
        const labels = { source: "発信元", destination: "受信先", reference: "参照" };
        return labels[role || "reference"] || labels.reference;
      }

      function electricalAttributeFields(element) {
        if (!supportsElectricalAttributes(element)) return "";
        return `
          <details class="attr-panel" open>
            <summary>電気属性</summary>
            <label>タグ</label>
            <input data-bind="tag" type="text" value="${escapeAttr(element.tag || "")}">
            <label><input data-bind="fixedTag" type="checkbox" ${element.fixedTag ? "checked" : ""} style="width:auto;min-height:auto"> 部品タグ固定</label>
            <label>説明</label>
            <textarea data-bind="description">${escapeHtml(element.description || "")}</textarea>
            <div class="row">
              <div><label>設備</label><input data-bind="installation" type="text" value="${escapeAttr(element.installation || "")}"></div>
              <div><label>場所</label><input data-bind="location" type="text" value="${escapeAttr(element.location || "")}"></div>
            </div>
            <div class="row" style="margin-top:8px">
              <button type="button" id="copyInstallLocationBtn">設備/場所コピー</button>
              <button type="button" id="pasteInstallLocationBtn" ${installLocationClipboard ? "" : "disabled"}>設備/場所貼付</button>
            </div>
            <div class="row">
              <div><label>メーカー</label><input data-bind="manufacturer" type="text" value="${escapeAttr(element.manufacturer || "")}"></div>
              <div><label>品番</label><input data-bind="catalog" type="text" value="${escapeAttr(element.catalog || "")}"></div>
            </div>
            <div class="row">
              <div><label>定格</label><input data-bind="rating" type="text" value="${escapeAttr(element.rating || "")}"></div>
              <div><label>項目</label><input data-bind="item" type="text" value="${escapeAttr(element.item || "")}"></div>
            </div>
            ${attributeDisplayControls(element)}
          </details>
        `;
      }

      function attributeDisplayControls(element) {
        const defaults = attributeDisplayDefaults(element);
        const checkboxes = ATTRIBUTE_DISPLAY_FIELDS.map(field => `<label><input data-bind="${escapeAttr(field.prop)}" type="checkbox" ${element[field.prop] ? "checked" : ""} style="width:auto;min-height:auto"> ${escapeHtml(field.label)}</label>`);
        const rows = [];
        for (let i = 0; i < checkboxes.length; i += 2) {
          rows.push(`<div class="row">${checkboxes.slice(i, i + 2).map(item => `<div>${item}</div>`).join("")}</div>`);
        }
        return `
          <label>図面表示</label>
          ${rows.join("")}
          <div class="row">
            <div><label>表示X</label><input data-bind="attrX" data-kind="number" type="number" step="0.5" value="${round(defaults.x)}"></div>
            <div><label>表示Y</label><input data-bind="attrY" data-kind="number" type="number" step="0.5" value="${round(defaults.y)}"></div>
          </div>
          <label>表示文字サイズ mm</label>
          <input data-bind="attrFontSize" data-kind="number" type="number" min="1" step="0.2" value="${round(defaults.fontSize)}">
        `;
      }

      function attributeDisplayDefaults(element) {
        const w = Number(element.w || defaultElement(element.type).w || 18);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        return {
          x: element.attrX ?? (w + 3),
          y: element.attrY ?? (h + 3),
          fontSize: element.attrFontSize || 2.2
        };
      }

      function supportsElectricalAttributes(element) {
        if (!element) return false;
        return !["text", "wire", "line", "rect", "circle", "underlayImage", "installationBox", "locationBox", "table", "arrow", "junction"].includes(element.type);
      }

      function updateSelectedFromInput(input, save = true) {
        const element = selectedElement();
        if (!element) return;
        const key = input.dataset.bind;
        const value = input.type === "checkbox" ? input.checked : (input.dataset.kind === "number" ? Number(input.value) : input.value);
        const pointMatch = key.match(/^p(\d+)(x|y)$/);
        if (pointMatch && element.points?.[Number(pointMatch[1])]) {
          element.points[Number(pointMatch[1])][pointMatch[2] === "x" ? 0 : 1] = value;
        } else {
          element[key] = value;
          if (key === "tag" && supportsElectricalAttributes(element) && !element.label) element.label = value;
          if (["orientation", "count"].includes(key) && ["terminalStrip", "connector"].includes(element.type)) resizeTerminalElementForOrientation(element);
          if (key === "orientation" && element.type === "terminal") resizeSingleTerminalForOrientation(element);
          if (key === "orientation" && ["contactNO", "contactNC", "pushButton"].includes(element.type)) resizeContactElementForOrientation(element);
        }
        if (save) commitHistory("要素を更新しました。");
        render();
      }

      function resizeContactElementForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 10;
          element.h = element.type === "pushButton" ? 18 : 16;
          return;
        }
        element.w = 14;
        element.h = element.type === "pushButton" ? 12 : 10;
      }

      function resizeTerminalElementForOrientation(element) {
        const count = Math.max(1, Number(element.count || 8));
        const pitch = element.type === "connector" ? 7 : 8;
        if (element.orientation === "vertical") {
          element.w = element.type === "connector" ? 10 : 12;
          element.h = count * pitch;
        } else {
          element.w = count * pitch;
          element.h = element.type === "connector" ? 10 : 12;
        }
      }

      function resizeSingleTerminalForOrientation(element) {
        if (element.orientation === "vertical") {
          element.w = 6;
          element.h = 10;
          return;
        }
        element.w = 10;
        element.h = 6;
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      }

      function escapeAttr(text) {
        return escapeHtml(text).replace(/\n/g, " ");
      }

      function round(value) {
        return Math.round(Number(value || 0) * 100) / 100;
      }

      function defaultElement(type, x = 30, y = 30) {
        const base = { id: uid("el"), type, x, y, rotation: 0, stroke: state.settings.stroke, layer: defaultLayerFor(type) };
        const defaults = {
          text: { ...base, w: 40, h: 8, text: "文字", fontSize: 3.5 },
          line: { id: uid("el"), type: "line", points: [[x, y], [x + 30, y]], label: "", strokeWidth: .32, dash: "", stroke: state.settings.stroke, layer: defaultLayerFor("line") },
          rect: { ...base, w: 34, h: 22, label: "" },
          circle: { ...base, w: 22, h: 22, label: "" },
          underlayImage: { ...base, w: 160, h: 110, label: "下絵", imageData: "", opacity: .35, cropPreset: "full", locked: true, layer: "layout" },
          installationBox: { ...base, w: 120, h: 80, label: "INST1", dash: "4 2", layer: "layout" },
          locationBox: { ...base, w: 120, h: 80, label: "LOC1", dash: "4 2", layer: "layout" },
          terminal: { ...base, w: 10, h: 6, label: "1", orientation: "horizontal", terminalShape: "circle" },
          terminalStrip: { ...base, w: 110, h: 12, count: 12, start: 1, prefix: "", orientation: "horizontal", terminalShape: "circle", label: "X1" },
          contactNO: { ...base, w: 10, h: 7, label: "NO", orientation: "horizontal" },
          contactNC: { ...base, w: 10, h: 7, label: "NC", orientation: "horizontal" },
          pushButton: { ...base, w: 10, h: 8, label: "PB", orientation: "horizontal" },
          selectorSwitch: { ...base, w: 12, h: 9, label: "SS", orientation: "horizontal" },
          limitSwitch: { ...base, w: 12, h: 8, label: "LS", orientation: "horizontal" },
          coil: { ...base, w: 12, h: 6, label: "CR" },
          fuse: { ...base, w: 12, h: 4.5, label: "F" },
          breaker: { ...base, w: 12, h: 7, label: "CB" },
          lamp: { ...base, w: 10, h: 10, r: 3.5, label: "PL", lampVariant: "pilot" },
          buzzer: { ...base, w: 14, h: 9, label: "BZ", buzzerVariant: "horn" },
          solenoidValve: { ...base, w: 26, h: 16, label: "SOL" },
          sensor: { ...base, w: 24, h: 14, label: "SEN" },
          powerSupply: { ...base, w: 34, h: 24, label: "PS" },
          transformer: { ...base, w: 24, h: 16, label: "T" },
          ground: { ...base, w: 9, h: 10, label: "E" },
          motor: { ...base, w: 14, h: 14, r: 5, label: "M" },
          fan: { ...base, w: 14, h: 14, r: 5, label: "FAN" },
          resistor: { ...base, w: 12, h: 4.5, label: "R" },
          diode: { ...base, w: 12, h: 7, label: "D" },
          deviceBox: { ...base, w: 46, h: 30, label: "機器", pins: 4, pinText: "1\n2\n3\n4" },
          plcBlock: { ...base, w: 50, h: 60, label: "PLC", rows: 8, pinText: "I00\nI01\nI02\nI03\nO00\nO01\nO02\nO03" },
          connector: { ...base, w: 70, h: 10, count: 10, start: 1, prefix: "", orientation: "horizontal", terminalShape: "circle", label: "CN" },
          cableMarker: { ...base, w: 28, h: 12, label: "C" },
          cableBundle: { ...base, w: 32, h: 18, label: "CBL" },
          terminalBox: { ...base, w: 22, h: 18, label: "TB", rows: 3 },
          table: { ...base, w: 86, h: 48, rows: 6, cols: 4, label: "表", cellText: "No.\t項目\t内容\t備考" },
          junction: { ...base, w: 4, h: 4, r: 1.45, label: "" },
          arrow: { id: uid("el"), type: "arrow", points: [[x, y], [x + 30, y]], label: "REF", signalRole: "reference", stroke: state.settings.stroke, layer: defaultLayerFor("arrow") },
          wire: { id: uid("el"), type: "wire", points: [[x, y], [x + 30, y]], wireNo: "", fixedWireNo: false, hideWireNo: false, gapAtMid: false, fromOverride: "", toOverride: "", wireType: state.settings.currentWireType, stroke: state.settings.stroke, layer: "wires" }
        };
        return deepClone(defaults[type] || defaults.deviceBox);
      }

      function defaultLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return state.settings.currentLayer || "layout";
        return state.settings.currentLayer || "symbols";
      }

      function inferredLayerFor(type) {
        if (type === "wire") return "wires";
        if (type === "text" || type === "table") return "notes";
        if (type === "rect" || type === "circle" || type === "line" || type === "underlayImage" || type === "installationBox" || type === "locationBox") return "layout";
        return "symbols";
      }

      function canvasPoint(event, options = {}) {
        const svg = qs("#canvas");
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
        if (options.raw) return { x: transformed.x, y: transformed.y };
        return snapPoint(transformed.x, transformed.y, options);
      }

      function snap(value) {
        if (!state.settings.snap) return value;
        const grid = Number(state.settings.grid || 2.5);
        return Math.round(value / grid) * grid;
      }

      function snapPoint(x, y, options = {}) {
        const gridPoint = { x: snap(x), y: snap(y) };
        if (!state.settings.objectSnap) return gridPoint;
        const excludeIds = options.excludeIds || (options.excludeSelected ? currentSelectionIdSet() : new Set());
        const anchors = options.connectionOnly
          ? collectConnectionAnchors(currentPage(), excludeIds)
          : collectSnapAnchors(currentPage(), excludeIds);
        const best = closestAnchor(anchors, x, y);
        if (best) return { x: best.x, y: best.y };
        const segmentSnap = closestSegmentSnapPoint(currentPage(), x, y, excludeIds);
        return segmentSnap || gridPoint;
      }

      function currentSelectionIdSet() {
        return new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []));
      }

      function collectSnapAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = collectConnectionAnchors(page, excludeIds);
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.points || element.type === "junction" || element.type === "terminalStrip" || element.type === "connector") return;
          const box = elementBounds(element);
          if (!box) return;
          anchors.push({ x: box.x, y: box.y });
          anchors.push({ x: box.x + box.w, y: box.y });
          anchors.push({ x: box.x, y: box.y + box.h });
          anchors.push({ x: box.x + box.w, y: box.y + box.h });
          anchors.push({ x: box.x + box.w / 2, y: box.y + box.h / 2 });
        });
        return anchors;
      }

      function collectConnectionAnchors(page, excludeIds = new Set()) {
        if (!page) return [];
        const anchors = [];
        page.elements.forEach(element => {
          if (excludeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (element.type === "wire" || element.type === "line" || element.type === "arrow") {
            (element.points || []).forEach(point => anchors.push({ x: point[0], y: point[1], elementId: element.id, kind: "point" }));
            return;
          }
          if (element.type === "junction") {
            anchors.push({ x: element.x || 0, y: element.y || 0, elementId: element.id, kind: "junction" });
            return;
          }
          if (element.type === "terminalStrip" || element.type === "connector") {
            const geo = terminalStripGeometry(element);
            for (let i = 0; i < geo.count; i++) {
              anchors.push({ ...terminalStripNodeGlobal(element, i), elementId: element.id, kind: "terminal" });
            }
            return;
          }
          elementConnectionAnchors(element).forEach(anchor => anchors.push({ ...anchor, elementId: element.id, kind: "terminal" }));
        });
        return anchors;
      }

      function closestAnchor(anchors, x, y, radius = SNAP_RADIUS_MM) {
        let best = null;
        anchors.forEach(anchor => {
          const d = Math.hypot(anchor.x - x, anchor.y - y);
          if (d <= radius && (!best || d < best.d)) best = { ...anchor, d };
        });
        return best;
      }

      function closestSegmentSnapPoint(page, x, y, activeIds = new Set(selectedIds.length ? selectedIds : (selectedId ? [selectedId] : []))) {
        if (!page) return null;
        let best = null;
        page.elements.forEach(element => {
          if (activeIds.has(element.id)) return;
          if (!isElementVisible(element)) return;
          if (!["wire", "line", "arrow"].includes(element.type)) return;
          wireSegments(element).forEach(segment => {
            const point = closestPointOnSegment(x, y, segment);
            const d = Math.hypot(point.x - x, point.y - y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) best = { ...point, d };
          });
        });
        return best ? { x: round(best.x), y: round(best.y) } : null;
      }

      function closestPointOnSegment(x, y, segment) {
        const [x1, y1, x2, y2] = segment;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy;
        if (lengthSq < .0001) return { x: x1, y: y1 };
        const t = Math.max(0, Math.min(1, ((x - x1) * dx + (y - y1) * dy) / lengthSq));
        return { x: x1 + dx * t, y: y1 + dy * t };
      }

      function elementConnectionAnchors(element) {
        const anchors = [];
        const w = Number(element.w || defaultElement(element.type).w || 20);
        const h = Number(element.h || defaultElement(element.type).h || 10);
        const add = (x, y) => anchors.push(localAnchor(element, x, y));
        if (element.type === "terminal") {
          const cx = w / 2;
          const cy = h / 2;
          add(cx, cy);
          if (element.orientation === "vertical") {
            add(cx, 0);
            add(cx, h);
          } else {
            add(0, cy);
            add(w, cy);
          }
          return anchors;
        }
        if (["contactNO", "contactNC", "pushButton", "selectorSwitch", "limitSwitch"].includes(element.type)) {
          if (element.orientation === "vertical") {
            add(w / 2, 0);
            add(w / 2, h);
          } else {
            add(0, h / 2);
            add(w, h / 2);
          }
          return anchors;
        }
        if (["coil", "fuse", "breaker", "lamp", "buzzer", "solenoidValve", "sensor", "transformer", "motor", "fan", "resistor", "diode", "cableMarker", "cableBundle"].includes(element.type)) {
          add(0, h / 2);
          add(w, h / 2);
          return anchors;
        }
        if (element.type === "terminalBox") {
          const rows = Math.max(2, Number(element.rows || 3));
          for (let i = 0; i < rows; i++) {
            const y = h * (i + .5) / rows;
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "ground") {
          add(w / 2, 0);
          return anchors;
        }
        if (element.type === "deviceBox") {
          const pins = Math.max(0, Number(element.pins || 4));
          for (let i = 0; i < pins; i++) {
            const y = h * (i + 1) / (pins + 1);
            add(0, y);
            add(w, y);
          }
          return anchors;
        }
        if (element.type === "plcBlock") {
          const rows = Math.max(2, Number(element.rows || 8));
          for (let i = 1; i <= rows; i++) {
            const y = 8 + i * ((h - 10) / rows) - 3;
            add(0, y);
          }
          return anchors;
        }
        return anchors;
      }

      function localAnchor(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        return {
          x: Number(element.x || 0) + x * Math.cos(angle) - y * Math.sin(angle),
          y: Number(element.y || 0) + x * Math.sin(angle) + y * Math.cos(angle)
        };
      }

      function placeElement(type, x, y) {
        const page = currentPage();
        if (!page) return;
        if (String(type).startsWith("custom:")) {
          placeCustomSymbol(type.slice("custom:".length), x, y);
          return;
        }
        if (type === "terminalSheet") {
          addTerminalSheet(page, x, y);
          commitHistory("端子配線セットを配置しました。");
          cancelPlacementMode(true);
          return;
        }
        const element = defaultElement(type, x, y);
        page.elements.push(element);
        selectSingle(element.id);
        commitHistory("要素を配置しました。");
        setActiveTool("select");
        render();
      }

      function placeCustomSymbol(id, x, y) {
        const symbol = (state.customSymbols || []).find(item => item.id === id);
        const page = currentPage();
        if (!symbol || !page) return;
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        const placed = templates.map(template => {
          const element = deepClone(template);
          element.id = uid("el");
          element.locked = false;
          if (element.points) {
            element.points = element.points.map(point => [point[0] + x, point[1] + y]);
          } else {
            element.x = Number(element.x || 0) + x;
            element.y = Number(element.y || 0) + y;
          }
          return element;
        });
        page.elements.push(...placed);
        setSelection(placed.map(element => element.id));
        commitHistory(placed.length > 1 ? "ユーザー回路を配置しました。" : "ユーザー部品を配置しました。");
        setActiveTool("select");
        render();
      }

      function addTerminalSheet(page, x, y) {
        addReferenceTerminalWiringSet(page, x, y, {
          title: "",
          terminalPrefix: "",
          wirePrefix: "W",
          signalPrefix: "SIG"
        });
        setSelection([]);
      }

      function addReferenceTerminalWiringSet(page, x, y, options = {}) {
        const pitch = 8.6;
        const stripW = 12;
        const groupCount = 8;
        const groupH = groupCount * pitch;
        const gap = 15;
        const busX = x + 8;
        const stripX = x + 132;
        const topY = y + 6;
        const lowerY = topY + groupH + gap;
        const inlineX = x + 42;
        const rightTextX = stripX + 18;
        const leftStrip = referenceTerminalStrip(stripX, topY, stripW, groupH, groupCount, 1, options.label || "X1", "vertical");
        const rightStrip = referenceTerminalStrip(stripX, lowerY, stripW, groupH, groupCount, 11, "", "vertical");
        page.elements.push(leftStrip, rightStrip);
        const nodes = [];
        [leftStrip, rightStrip].forEach(strip => {
          for (let i = 0; i < strip.count; i++) nodes.push(terminalStripNodeGlobal(strip, i));
        });
        if (options.title) {
          page.elements.push(textElement(x - 4, y - 24, options.title, 3.4, 0, 92));
        }
        page.elements.push({
          id: uid("el"),
          type: "arrow",
          points: [[busX, nodes[0].y - 14], [busX, nodes[nodes.length - 1].y + 20]],
          label: "",
          signalRole: "reference",
          stroke: state.settings.stroke,
          layer: "wires"
        });
        page.elements.push({
          id: uid("el"),
          type: "arrow",
          points: [[stripX + stripW / 2, nodes[0].y - 14], [stripX + stripW / 2, nodes[nodes.length - 1].y + 20]],
          label: "",
          stroke: state.settings.stroke,
          layer: "wires"
        });
        nodes.forEach((node, index) => {
          const no = String(index + 1).padStart(2, "0");
          const terminalNo = index < 8 ? index + 1 : index + 3;
          const wireStartX = index < 8 ? busX : busX + 18;
          const wireNo = (options.wirePrefix || "W") + no;
          page.elements.push({
            id: uid("el"),
            type: "wire",
            points: [[wireStartX, round(node.y)], [round(node.x), round(node.y)]],
            wireNo,
            fixedWireNo: false,
            hideWireNo: false,
            wireType: state.settings.currentWireType,
            stroke: state.settings.stroke,
            layer: "wires"
          });
          page.elements.push(horizontalTerminalAt(inlineX, node.y, no, "square"));
          page.elements.push({
            id: uid("el"),
            type: "junction",
            x: round(wireStartX),
            y: round(node.y),
            w: 4,
            h: 4,
            r: 1.05,
            label: "",
            stroke: state.settings.stroke,
            layer: "symbols"
          });
          page.elements.push(textElement(rightTextX, node.y - 1.2, (options.signalPrefix || "SIG") + String(terminalNo).padStart(2, "0"), 2.2, 0, 42));
          page.elements.push(textElement(inlineX - 7.5, node.y - 2.7, wireNo, 1.9, 0, 16));
        });
      }

      function referenceTerminalStrip(x, y, w, h, count, start, label, orientation = "horizontal") {
        return {
          ...defaultElement("terminalStrip", x, y),
          x,
          y,
          w,
          h,
          count,
          start,
          prefix: "",
          orientation,
          terminalShape: "circle",
          label,
          rotation: 0,
          layer: "symbols"
        };
      }

      function horizontalTerminalAt(cx, cy, label, shape = "square") {
        const w = 9;
        const h = 6;
        return {
          ...defaultElement("terminal", cx - w / 2, cy - h / 2),
          x: round(cx - w / 2),
          y: round(cy - h / 2),
          w,
          h,
          label,
          orientation: "horizontal",
          terminalShape: shape,
          rotation: 0,
          layer: "symbols"
        };
      }

      function verticalTerminalAt(cx, cy, label, shape = "square") {
        const w = 6;
        const h = 10;
        return {
          ...defaultElement("terminal", cx - w / 2, cy - h / 2),
          x: round(cx - w / 2),
          y: round(cy - h / 2),
          w,
          h,
          label,
          orientation: "vertical",
          terminalShape: shape,
          rotation: 0,
          layer: "symbols"
        };
      }

      function textElement(x, y, text, fontSize = 2.4, rotation = 0, w = 24) {
        return {
          id: uid("el"),
          type: "text",
          x: round(x),
          y: round(y),
          w,
          h: Math.max(5, fontSize * 1.7),
          text,
          fontSize,
          rotation,
          stroke: state.settings.stroke,
          layer: "notes"
        };
      }

      function setActiveTool(tool) {
        activeTool = tool;
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === tool));
        qs("#selectOnlyBtn")?.classList.toggle("active", tool === "select");
        renderPalette();
        setStatus(tool === "select" ? "選択ツールです。" : paletteLabel(tool) + "を配置できます。");
      }

      function cancelPlacementMode(clearSelection = false) {
        activeTool = "select";
        if (clearSelection) setSelection([]);
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === "select"));
        render();
        setStatus("選択ツールです。");
      }

      function applyStandard(id) {
        const standard = STANDARDS.find(item => item.id === id) || STANDARDS[0];
        state.settings.standard = standard.id;
        state.settings.grid = standard.grid;
        state.settings.wireNumberFormat = standard.wireNumberFormat;
        state.settings.componentTagFormat = standard.componentTagFormat || "%F%N";
        if (standard.componentTagPrefixes) state.settings.componentTagPrefixes = { ...standard.componentTagPrefixes };
        const page = currentPage();
        if (page && !page.frameVariant) page.frameVariant = standard.frameVariant;
      }

      function fitPageToWorkspace() {
        const page = currentPage();
        if (!page) return;
        const size = pageSize(page);
        const workspace = qs("#workspace");
        const w = Math.max(240, workspace.clientWidth - 90);
        const h = Math.max(240, workspace.clientHeight - 90);
        state.settings.zoom = clampZoom(Math.min(w / size.w, h / size.h));
        commitHistory("用紙全体を表示しました。");
        render();
      }

      function addPage() {
        const base = currentPage();
        const page = createPage({
          name: "P" + (state.pages.length + 1),
          size: base?.size || "A4",
          orientation: base?.orientation || "portrait",
          frameVariant: base?.frameVariant || "detailed"
        });
        state.pages.push(page);
        state.activePageId = page.id;
        setSelection([]);
        commitHistory("ページを追加しました。");
        render();
      }

      function duplicatePage() {
        const page = currentPage();
        if (!page) return;
        const copy = deepClone(page);
        copy.id = uid("page");
        copy.name = page.name + " copy";
        copy.elements = copy.elements.map(element => ({ ...element, id: uid("el") }));
        state.pages.push(copy);
        state.activePageId = copy.id;
        setSelection([]);
        commitHistory("ページを複製しました。");
        render();
      }

      function deletePage() {
        if (state.pages.length <= 1) {
          setStatus("最後の1ページは削除できません。");
          return;
        }
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        state.pages.splice(index, 1);
        state.activePageId = state.pages[Math.max(0, index - 1)].id;
        setSelection([]);
        commitHistory("ページを削除しました。");
        render();
      }

      function movePage(delta) {
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        const next = index + delta;
        if (index < 0 || next < 0 || next >= state.pages.length) {
          setStatus("これ以上ページを移動できません。");
          return;
        }
        const [page] = state.pages.splice(index, 1);
        state.pages.splice(next, 0, page);
        commitHistory("ページ順を変更しました。");
        render();
      }

      function addSampleTerminalPage() {
        const page = createPage({

      function importTerminalCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const terminals = normalizeTerminalCsvRows(rows);
            if (!terminals.length) {
              setStatus("端子CSVに有効な行がありません。");
              return;
            }
            addTerminalCsvPages(terminals, file.name || "terminal.csv");
          } catch (error) {
            alert("端子CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      function importPlcCsvFile(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const text = decodeTextBuffer(reader.result);
            const rows = parseDelimitedRows(text);
            const ioRows = normalizePlcCsvRows(rows);
            if (!ioRows.length) {
              setStatus("PLC CSVに有効なI/O行がありません。");
              return;
            }
            addPlcCsvPages(ioRows, file.name || "plc.csv");
          } catch (error) {
            alert("PLC CSVを読み込めませんでした。\n" + error.message);
          }
        });
        reader.readAsArrayBuffer(file);
      }

      function decodeTextBuffer(buffer) {
        const bytes = buffer instanceof ArrayBuffer ? buffer : new Uint8Array(buffer).buffer;
        const candidates = [];
        try {
          candidates.push(new TextDecoder("utf-8").decode(bytes));
        } catch (_) {
          // TextDecoder can fail on older browsers.
        }
        try {
          candidates.push(new TextDecoder("shift_jis").decode(bytes));
        } catch (_) {
          // Shift_JIS is optional in some environments.
        }
        if (!candidates.length) return "";
        return candidates.sort((a, b) => textDecodeScore(b) - textDecodeScore(a))[0].replace(/^\uFEFF/, "");
      }

      function textDecodeScore(text) {
        const bad = (text.match(/\uFFFD/g) || []).length * 20;
        const japanese = (text.match(/[ぁ-んァ-ン一-龠]/g) || []).length;
        const ascii = (text.match(/[A-Za-z0-9,\t\r\n_-]/g) || []).length;
        return japanese * 3 + ascii - bad;
      }

      function parseDelimitedRows(text) {
        const source = String(text || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const sample = source.split("\n").slice(0, 5).join("\n");
        const delimiter = (sample.match(/\t/g) || []).length > (sample.match(/,/g) || []).length ? "\t" : ",";
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let i = 0; i < source.length; i++) {
          const char = source[i];
          const next = source[i + 1];
          if (quoted) {
            if (char === '"' && next === '"') {
              cell += '"';
              i++;
            } else if (char === '"') {
              quoted = false;
            } else {
              cell += char;
            }
            continue;
          }
          if (char === '"' && cell === "") {
            quoted = true;
          } else if (char === delimiter) {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell);
        rows.push(row);
        return rows.map(cells => cells.map(cell => cell.trim())).filter(cells => cells.some(Boolean));
      }

      function normalizeTerminalCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          strip: ["strip", "terminalstrip", "tb", "端子台", "端子台名"],
          terminal: ["terminal", "term", "terminalno", "no", "番号", "端子", "端子番号", "端子no", "端子名"],
          wireNo: ["wireno", "wire", "wire_no", "wiring", "線番", "配線番号", "線番号"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          dest: ["dest", "destination", "to", "device", "接続先", "行先", "相手先", "機器"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          return {
            strip: value("strip") || "X1",
            terminal: value("terminal") || cells[0] || String(index + 1),
            wireNo: value("wireNo") || cells[1] || "",
            signal: value("signal") || cells[2] || "",
            dest: value("dest") || cells[3] || "",
            note: value("note") || cells[4] || ""
          };
        }).filter(row => row.terminal || row.wireNo || row.signal || row.dest || row.note);
      }

      function normalizePlcCsvRows(rows) {
        if (!rows.length) return [];
        const aliases = {
          address: ["address", "addr", "io", "i/o", "point", "plc", "アドレス", "io番号", "入出力番号", "点数"],
          direction: ["direction", "type", "iotype", "io_type", "inout", "入出力", "種別", "方向"],
          signal: ["signal", "name", "description", "信号", "信号名", "名称", "用途"],
          wireNo: ["wireno", "wire", "wire_no", "線番", "配線番号", "線番号"],
          device: ["device", "dest", "destination", "to", "from", "接続先", "機器", "相手先"],
          note: ["note", "memo", "remarks", "備考", "メモ"]
        };
        const first = rows[0].map(normalizeHeader);
        const indexes = Object.fromEntries(Object.keys(aliases).map(key => [key, findHeaderIndex(first, aliases[key])]));
        const hasHeader = Object.values(indexes).some(index => index >= 0);
        const body = hasHeader ? rows.slice(1) : rows;
        return body.map((cells, index) => {
          const value = key => {
            const col = indexes[key];
            return col >= 0 ? (cells[col] || "").trim() : "";
          };
          const address = value("address") || cells[0] || "";
          const signal = value("signal") || cells[1] || "";
          const wireNo = value("wireNo") || cells[2] || "";
          const device = value("device") || cells[3] || "";
          const note = value("note") || cells[4] || "";
          const direction = normalizeIoDirection(value("direction") || address);
          return { address: address || (direction === "output" ? "O" : "I") + String(index).padStart(2, "0"), direction, signal, wireNo, device, note };
        }).filter(row => row.address || row.signal || row.wireNo || row.device || row.note);
      }

      function normalizeIoDirection(text) {
        const value = normalizeHeader(text);
        if (value.startsWith("o") || value.includes("out") || value.includes("出力")) return "output";
        return "input";
      }

      function normalizeHeader(text) {
        return String(text || "").toLowerCase().replace(/[()\[\]{} 　._\-\/\\:：]/g, "");
      }

      function findHeaderIndex(headers, aliases) {
        const normalizedAliases = aliases.map(normalizeHeader);
        return headers.findIndex(header => normalizedAliases.includes(header));
      }
