            if (element.reportTable) return;
            if (element.type === "underlayImage") return;
            const base = {
              pageId: page.id,
              page: page.name || "P" + (pageIndex + 1),
              sheet: page.title?.page || String(pageIndex + 1),
              type: element.type,
              id: element.id,
              ...electricalAttributeColumns(element)
            };
            if (element.type === "wire") {
              const endpoints = wireEndpointNames(page, element);
              const gapCount = (element.gapAtMid ? 1 : 0) + (element.gapPoints?.length || 0);
              rows.push({ record: "wire", ...base, name: element.wireNo || "", x: endpoints.p0[0], y: endpoints.p0[1], x2: endpoints.p1[0], y2: endpoints.p1[1], detail: joinDetails([wireStyle(element).label, "net=" + sheetNo + "-" + (netIndexByWire.get(element.id) || ""), signalByWire.get(element.id) ? "signal=" + signalByWire.get(element.id) : "", "from=" + endpoints.from, "to=" + endpoints.to, endpoints.manual ? "sequence=manual" : "", element.fixedWireNo ? "fixed=true" : "", element.hideWireNo ? "hidden=true" : "", gapCount ? "gap=true" : "", gapCount ? "gapCount=" + gapCount : "", noteDetail(element)]) });
            } else if (element.type === "terminal") {
              rows.push({ record: "terminal", ...base, name: element.label || "", x: element.x || 0, y: element.y || 0, x2: "", y2: "", detail: joinDetails(["single", electricalAttributeDetail(element), noteDetail(element)]) });
            } else if (["terminalStrip", "connector"].includes(element.type)) {
              const count = Number(element.count || 1);
              const totalNodes = element.stripStyle === "unit" && Number(element.levels) === 2 ? count * 2 : count;
              for (let i = 0; i < totalNodes; i++) {
                rows.push({
                  record: "terminal",
                  ...base,
                  name: terminalLabel(element, i),
                  x: Number(element.x || 0),
                  y: Number(element.y || 0),
                  x2: "",
                  y2: "",
                  detail: joinDetails([element.label || element.type, electricalAttributeDetail(element), noteDetail(element)])
                });
              }
            } else {
              rows.push({
                record: "component",
                ...base,
                name: componentTag(element) || element.text || "",
                x: element.x || "",
                y: element.y || "",
                x2: "",
                y2: "",
                detail: componentDetail(element)
              });
            }
          });
        });
        return rows;
      }

      // 部品1個の詳細文字列(種別+属性)。
      function componentDetail(element) {
        const details = [electricalAttributeDetail(element), noteDetail(element)];
        if (element.fixedTag) details.unshift("fixedTag=true");
        if (element.type === "arrow") details.unshift("role=" + signalRoleLabel(element.signalRole));
        if (element.type === "table") details.unshift("rows=" + (element.rows || ""), "cols=" + (element.cols || ""), element.colWidths ? "colWidths=" + element.colWidths : "", element.rowHeights ? "rowHeights=" + element.rowHeights : "", "cells=" + String(element.cellText || "").replace(/\r?\n/g, " / "));
        if (element.type === "plcBlock") details.unshift("rows=" + (element.rows || ""), "io=" + String(element.pinText || "").replace(/\r?\n/g, " / "));
        if (element.type === "deviceBox") details.unshift("pins=" + (element.pins || ""), "leftPins=" + String(element.pinText || "").replace(/\r?\n/g, " / "), "rightPins=" + String(element.rightPinText || "").replace(/\r?\n/g, " / "));
        if (["installationBox", "locationBox"].includes(element.type)) details.unshift("area=" + (element.type === "installationBox" ? "installation" : "location"), "value=" + (element.label || ""));
        return joinDetails(details);
      }

      // 配線両端の自動FROM/TO名(近傍要素名)を推定。
      function wireEndpointNames(page, element) {
        const p0 = element.points?.[0] || [0, 0];
        const p1 = element.points?.[element.points.length - 1] || [0, 0];
        const autoFrom = nearestElementName(page, p0[0], p0[1], element.id);
        const autoTo = nearestElementName(page, p1[0], p1[1], element.id);
        const from = String(element.fromOverride || "").trim() || autoFrom;
        const to = String(element.toOverride || "").trim() || autoTo;
        return {
          p0,
          p1,
          autoFrom,
          autoTo,
          from,
          to,
          manual: Boolean(String(element.fromOverride || "").trim() || String(element.toOverride || "").trim())
        };
      }

      // 指定点から4mm以内で最も近い要素の表示名(タグ/文字/線番)。
      function nearestElementName(page, x, y, selfId) {
        let best = null;
        page.elements.forEach(element => {
          if (element.id === selfId || element.type === "wire" || element.type === "line") return;
          const box = elementBounds(element);
          if (!box) return;
          const cx = Math.max(box.x, Math.min(x, box.x + box.w));
          const cy = Math.max(box.y, Math.min(y, box.y + box.h));
          const d = Math.hypot(cx - x, cy - y);
          if (d <= 4 && (!best || d < best.d)) {
            best = { d, name: componentTag(element) || element.text || element.wireNo || paletteLabel(element.type) };
          }
        });
        return best?.name || "";
      }

      // 配線順序(FROM/TO)ダイアログを開く(自動推定の確認+手動上書き、全ページFrom-To CSVつき)。
      function showWireSequenceDialog() {
        const page = currentPage();
        const wires = (page?.elements || []).filter(element => element.type === "wire");
        const html = wires.length
          ? `<table class="report-table"><thead><tr><th>線番</th><th>自動FROM</th><th>FROM</th><th>自動TO</th><th>TO</th><th>選択</th></tr></thead><tbody>${wires.map(element => {
              const endpoints = wireEndpointNames(page, element);
              return `<tr data-wire-sequence-row data-id="${escapeAttr(element.id)}">
                <td>${escapeHtml(element.wireNo || "")}</td>
                <td>${escapeHtml(endpoints.autoFrom || "")}</td>
                <td><input data-wire-sequence-field="fromOverride" value="${escapeAttr(element.fromOverride || "")}"></td>
                <td>${escapeHtml(endpoints.autoTo || "")}</td>
                <td><input data-wire-sequence-field="toOverride" value="${escapeAttr(element.toOverride || "")}"></td>
                <td><button type="button" data-select-page="${escapeAttr(page.id)}" data-select-id="${escapeAttr(element.id)}">選択</button></td>
              </tr>`;
            }).join("")}</tbody></table>
            <div class="inline" style="justify-content:flex-end;margin-top:12px">
              <button type="button" id="wireFromToCsvBtn">From-To一覧CSV（全ページ）</button>
              <button type="button" id="applyWireSequenceBtn" class="primary">配線順序を更新</button>
            </div>`
          : `<p class="muted">現在ページに配線がありません。</p>
             <div class="inline" style="justify-content:flex-end;margin-top:12px">
               <button type="button" id="wireFromToCsvBtn">From-To一覧CSV（全ページ）</button>
             </div>`;
        openDialog("配線順序", html);
        attachDialogSelection();
        qs("#applyWireSequenceBtn")?.addEventListener("click", applyWireSequenceDialog);
        qs("#wireFromToCsvBtn")?.addEventListener("click", exportWireFromToCsv);
      }

      // 全ページの配線From-To行(手動上書き優先)を収集。
      function collectWireFromToRows() {
        const rows = [];
        state.pages.forEach(page => {
          page.elements
            .filter(element => element.type === "wire" && !element.ladderRail)
            .forEach(wire => {
              const endpoints = wireEndpointNames(page, wire);
              rows.push({
                page: page.name || "",
                wireNo: wire.wireNo || "",
                from: wire.fromOverride || endpoints.autoFrom || "",
                to: wire.toOverride || endpoints.autoTo || "",
                wireType: wire.wireType || ""
              });
            });
        });
        return rows;
      }

      // 配線From-To一覧をwire-from-to.csvへ出力。
      function exportWireFromToCsv() {
        const rows = collectWireFromToRows();
        if (!rows.length) {
          setStatus("配線がないため From-To 一覧を出力できません。");
          return;
        }
        const headers = ["page", "wireNo", "from", "to", "wireType"];
        const csv = [headers.join(","), ...rows.map(row => headers.map(h => csvCell(row[h])).join(","))].join("\r\n");
        download("wire-from-to.csv", csv, "text/csv;charset=utf-8");
        setStatus(`From-To一覧CSVを書き出しました（${rows.length}行）。`);
      }

      // 配線順序ダイアログの手動FROM/TOを要素へ反映。
      function applyWireSequenceDialog() {
        const page = currentPage();
        if (!page) return;
        qsa("[data-wire-sequence-row]", qs("#dialogBody")).forEach(row => {
          const element = page.elements.find(item => item.id === row.dataset.id);
          if (!element || element.type !== "wire") return;
          qsa("[data-wire-sequence-field]", row).forEach(input => {
            element[input.dataset.wireSequenceField] = input.value;
          });
        });
        closeDialog();
        commitHistory("配線順序を更新しました。");
        render();
      }

      // 全要素帳票をelectrical-report.csvへ出力(列は固定の英語キー)。
      function exportReportCsv() {
        const headers = ["record", "page", "sheet", "type", "id", "tag", "name", "description", "installation", "location", "manufacturer", "catalog", "rating", "item", "x", "y", "x2", "y2", "detail"];
        const rows = collectReportRows();
        const csv = [
          headers.join(","),
          ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))
        ].join("\r\n");
        download("electrical-report.csv", csv, "text/csv;charset=utf-8");
        setStatus("帳票CSVを書き出しました。");
      }

      // 図面要素一覧ダイアログを開く(要素ジャンプつき)。
      function showReportTable() {
        const rows = collectReportRows();
        const html = `<table class="report-table"><thead><tr><th>種別</th><th>ページ</th><th>名称</th><th>詳細</th><th>選択</th></tr></thead><tbody>${rows.map(row => {
          return `<tr><td>${escapeHtml(row.type)}</td><td>${escapeHtml(row.page)}</td><td>${escapeHtml(row.name)}</td><td>${escapeHtml(row.detail)}</td><td><button type="button" data-select-page="${escapeAttr(row.pageId || "")}" data-select-id="${escapeAttr(row.id)}">選択</button></td></tr>`;
        }).join("")}</tbody></table>`;
        openDialog("図面要素一覧", html);
        attachDialogSelection();
      }

      // 帳票種別ごとの選択可能な列の一覧(先頭側=既定でON)。
      const REPORT_COLUMN_POOL = {
        all: ["種別", "ページ", "タグ/名称", "詳細", "設備", "場所"],
        component: ["ページ", "タグ/名称", "説明", "品番", "メーカー", "定格", "設備", "場所"],
        wire: ["ページ", "線番", "FROM", "TO", "詳細"],
        terminal: ["ページ", "端子", "種別", "詳細"]
      };
      // 帳票種別ごとの既定列(列選択が未保存のときに使用)。
      const REPORT_DEFAULT_COLUMNS = {
        all: ["種別", "ページ", "タグ/名称", "詳細"],
        component: ["ページ", "タグ/名称", "説明", "品番"],
        wire: ["ページ", "線番", "FROM", "TO"],
        terminal: ["ページ", "端子", "種別", "詳細"]
      };

      // 帳票表挿入ダイアログを開く(種別/行数/フィルタ/列構成チェック)。列選択はsettings.reportColumnsへ保存。
      function showInsertReportDialog() {
        const html = `
          <label for="insertReportKind">帳票種別</label>
          <select id="insertReportKind">
            <option value="all">全要素</option>
            <option value="component">部品</option>
            <option value="wire">配線</option>
            <option value="terminal">端子</option>
          </select>
          <div class="row">
            <div><label for="insertReportRows">最大行数</label><input id="insertReportRows" type="number" min="3" max="30" step="1" value="12"></div>
            <div><label for="insertReportTitle">表題</label><input id="insertReportTitle" value="帳票"></div>
          </div>
          <div class="row">
            <div><label for="insertReportInstallation">設備フィルタ</label><input id="insertReportInstallation" placeholder="例: 盤内"></div>
            <div><label for="insertReportLocation">場所フィルタ</label><input id="insertReportLocation" placeholder="例: LOC-A"></div>
          </div>
          <label style="margin-top:8px">列構成（チェックした列のみ挿入。設定はプロジェクトへ保存）</label>
          <div id="insertReportColumns" class="inline" style="flex-wrap:wrap"></div>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="runInsertReportBtn" class="primary">現在ページへ挿入</button>
          </div>
        `;
        openDialog("帳票表挿入", html);
        const renderColumns = () => {
          const kind = qs("#insertReportKind").value;
          const selected = reportHeaders(kind);
          qs("#insertReportColumns").innerHTML = (REPORT_COLUMN_POOL[kind] || []).map(column => `
            <label style="display:inline-flex;align-items:center;gap:4px;margin:0">
              <input type="checkbox" data-report-column="${escapeAttr(column)}" style="width:auto;min-height:auto"${selected.includes(column) ? " checked" : ""}>
              <span style="font-size:12px">${escapeHtml(column)}</span>
            </label>`).join("");
        };
        renderColumns();
        qs("#insertReportKind").addEventListener("change", renderColumns);
        qs("#runInsertReportBtn").addEventListener("click", () => {
          const kind = qs("#insertReportKind").value;
          const chosen = qsa("[data-report-column]", qs("#dialogBody"))
            .filter(input => input.checked)
            .map(input => input.dataset.reportColumn);
          if (chosen.length) state.settings.reportColumns[kind] = chosen;
          insertReportTableFromDialog();
        });
      }

      // ダイアログ入力から帳票行を絞り込み、表要素として現在ページへ挿入。
      function insertReportTableFromDialog() {
        const page = currentPage();
        if (!page) return;
        const kind = qs("#insertReportKind").value;
        const maxRows = Math.max(3, Math.min(30, Number(qs("#insertReportRows").value || 12)));
        const title = qs("#insertReportTitle").value || "帳票";
        const filters = {
          installation: qs("#insertReportInstallation").value.trim(),
          location: qs("#insertReportLocation").value.trim()
        };
        const rows = filterReportRows(kind, filters).slice(0, maxRows);
        if (!rows.length) {
          setStatus("挿入できる帳票行がありません。");
          return;
        }
        const table = buildReportTableElement(page, kind, title, rows);
        page.elements.push(table);
        selectSingle(table.id);
        closeDialog();
        commitHistory("帳票表を挿入しました。");
        render();
      }

      // 帳票行を種別・設備・場所で絞り込む。
      function filterReportRows(kind, filters = {}) {
        let rows = collectReportRows();
        if (kind !== "all") rows = rows.filter(row => row.record === kind);
        if (filters.installation) rows = rows.filter(row => String(row.installation || "") === filters.installation);
        if (filters.location) rows = rows.filter(row => String(row.location || "") === filters.location);
        return rows;
      }

      // 帳票行→表要素(ヘッダ行+タブ区切りセル)を構築。列はreportHeaders()に従う。
      function buildReportTableElement(page, kind, title, rows) {
        const headers = reportHeaders(kind);
        const body = rows.map(row => headers.map(header => reportCellValue(row, header)).join("\t"));
        const size = pageSize(page);
        const rowCount = rows.length + 1;
        return {
          id: uid("el"),
          type: "table",
          x: 22,
          y: 42,
          w: Math.min(size.w - 44, 180),
          h: Math.min(size.h - 86, Math.max(28, rowCount * 7)),
          rows: rowCount,
          cols: headers.length,
          label: title,
          cellText: [headers.join("\t"), ...body].join("\n"),
          rotation: 0,
          stroke: state.settings.stroke,
          layer: "notes",
          reportTable: true
        };
      }

      // 帳票列: プロジェクト設定(reportColumns)に有効な選択があればそれを、なければ既定を返す。
      function reportHeaders(kind) {
        const pool = REPORT_COLUMN_POOL[kind] || REPORT_COLUMN_POOL.all;
        const saved = (state.settings.reportColumns || {})[kind];
        if (Array.isArray(saved)) {
          const valid = saved.filter(column => pool.includes(column));
          if (valid.length) return valid;
        }
        return [...(REPORT_DEFAULT_COLUMNS[kind] || REPORT_DEFAULT_COLUMNS.all)];
      }

      // 帳票行×列名→セル文字列(タブ・改行は無害化)。列を増やす時はこの対応表へ追加する。
      function reportCellValue(row, header) {
        const from = detailValue(row.detail, "from");
        const to = detailValue(row.detail, "to");
        const map = {
          "種別": row.record || row.type || "",
          "ページ": row.page || "",
          "タグ/名称": row.tag || row.name || "",
          "説明": row.description || "",
          "品番": row.catalog || "",
          "メーカー": row.manufacturer || "",
          "定格": row.rating || "",
          "設備": row.installation || "",
          "場所": row.location || "",
          "線番": row.name || "",
          "FROM": from,
          "TO": to,
          "端子": row.name || "",
          "詳細": row.detail || ""
        };
        return String(map[header] || "").replace(/\t/g, " ").replace(/\r?\n/g, " / ");
      }

      // 詳細文字列から「key=値」を取り出す。
      function detailValue(detail, key) {
        const match = String(detail || "").match(new RegExp(key + "=([^;]*)"));
        return match ? match[1].trim() : "";
      }

      // クイックガイド(はじめの5ステップ+ショートカット表)を開く。
      // ヘルプダイアログ。クイックガイド+分野別のアコーディオン詳解で構成する。
      function showHelpDialog() {
        const section = (title, body, open = false) => `
          <details class="attr-panel"${open ? " open" : ""} style="margin-top:8px">
            <summary><b>${title}</b></summary>
            <div style="padding:4px 2px 2px">${body}</div>
          </details>`;
        openDialog("使い方ガイド", `
          <div class="panel-title">はじめの5ステップ</div>
          <ol style="margin:6px 0 4px;padding-left:20px;line-height:1.8">
            <li>右パネルの<b>「テンプレートからページ追加」</b>で骨組みを作る（設備ラダー／AC電源回路／PLC入出力回路など）</li>
            <li>左の<b>部品パレット</b>から部品をドラッグして配置（<b>回路ライブラリ</b>なら回路ごと1クリック）</li>

            <li>「線番採番」→「監査」→上部の<b>プレビュー→PDF印刷</b>で仕上げ</li>
          </ol>
          <p class="muted" style="margin:0 0 6px">キャンバス上部のヒントが常に「次にできること」を案内します。困ったらまずそこを見てください。</p>

          ${section("画面の見かた", `
            <ul style="margin:4px 0;padding-left:18px;line-height:1.8">
              <li><b>上部ツールバー</b>: ファイル（新規/開く/復元/保存）｜検索・ヘルプ・表題欄｜出力（プレビュー/PDF/A3面付/SVG/PNG）｜作図ツール（S/W/T）と取消/やり直し/削除</li>
              <li><b>ページタブ</b>: クリックで切替、<b>ダブルクリックで名前変更</b></li>
              <li><b>左パネル</b>: 部品パレット（最近使用/検索つき）→ 表示（ズーム/<b>ページ表示</b>/グリッド/スナップ）→ 配線・レイヤ → 自動処理・機能メニュー</li>
              <li><b>右パネル</b>: ページ設定 → テンプレート/下絵 → 選択中要素の編集（選択すると自動スクロール）</li>
              <li><b>ステータスバー</b>（右上）: 直前の操作結果。長文はマウスを乗せると全文表示</li>
              <li><b>右クリック</b>: 要素の上=編集メニュー（複製/回転/ロック/参照ジャンプ等）、空白=貼付/全体表示</li>
            </ul>`)}

          ${section("部品の配置", `

      // 検索・置換ダイアログを開く(線番/タグ/文字/属性メモ対象)。
      function showSearchDialog() {
        const html = `
          <label for="searchQuery">検索語</label>
          <div class="inline">
            <input id="searchQuery" placeholder="線番、タグ、説明、品番、端子名">
            <button type="button" id="runSearchBtn" class="primary">検索</button>
          </div>
          <label for="replaceValue" style="margin-top:10px">置換後の文字列（一括置換用）</label>
          <div class="inline">
            <input id="replaceValue" placeholder="置換後">
            <button type="button" id="runReplaceBtn">一括置換</button>
          </div>
          <div id="searchResults" style="margin-top:12px"></div>
        `;
        openDialog("図面検索", html);
        qs("#runSearchBtn").addEventListener("click", runSearch);
        qs("#runReplaceBtn").addEventListener("click", runReplaceAll);
        qs("#searchQuery").addEventListener("keydown", event => {
          if (event.key === "Enter") runSearch();
        });
      }

      // 検索一致箇所を一括置換(対象フィールドを走査)。
      // 一括置換の対象(ページ/要素/フィールド/変更前)を全ページから収集する。
      const REPLACE_FIELDS = ["wireNo", "label", "text", "tag", "note", "cellText", "pinText", "rightPinText", "terminalLabels", "description", "fromOverride", "toOverride"];
      const REPLACE_FIELD_LABELS = { wireNo: "線番", label: "ラベル", text: "文字", tag: "タグ", note: "属性メモ", cellText: "表セル", pinText: "ピン文字", rightPinText: "右ピン文字", terminalLabels: "端子名", description: "説明", fromOverride: "FROM", toOverride: "TO" };

      // 一括置換の対象(ページ/要素/フィールド/変更前値)を全ページから収集する。
      // REPLACE_FIELDSにある文字列フィールドのみが対象(数値・配列は対象外)。
      function collectReplaceMatches(query) {
        const matches = [];
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            REPLACE_FIELDS.forEach(field => {
              const value = element[field];
              if (typeof value === "string" && value.includes(query)) {
                matches.push({ page, element, field, before: value });
              }
            });
          });
        });
        return matches;
      }

      // 一括置換: 即時適用せず、対象一覧をプレビューし行ごとに選択してから1回のUndo単位で適用する。
      function runReplaceAll() {
        const query = qs("#searchQuery").value;
        const replacement = qs("#replaceValue").value;
        if (!query) {
          setStatus("置換する検索語を入力してください。");
          return;
        }
        const matches = collectReplaceMatches(query);
        if (!matches.length) {
          setStatus("置換対象が見つかりませんでした。");
          return;
        }
        const LIMIT = 400;
        const shown = matches.slice(0, LIMIT);
        openDialog("一括置換プレビュー", `
          <p class="muted">「${escapeHtml(query)}」→「${escapeHtml(replacement)}」の置換対象 <b>${matches.length}件</b>。
          適用したい行にチェックを入れて「選択した置換を実行」を押してください。適用は1回のUndo（Ctrl+Z）でまとめて戻せます。
          「取消」する場合はこのままダイアログを閉じてください（図面は変わりません）。</p>
          <div class="inline" style="gap:8px;margin-bottom:6px">
            <button type="button" id="replaceCheckAllBtn">全選択</button>
            <button type="button" id="replaceUncheckAllBtn">全解除</button>
          </div>
          <div style="max-height:340px;overflow:auto">
            <table class="report-table">
              <thead><tr><th></th><th>ページ</th><th>種別</th><th>項目</th><th>変更前</th><th>変更後</th></tr></thead>
              <tbody>${shown.map((m, index) => `<tr>
                <td><input type="checkbox" data-replace-row="${index}" checked style="width:auto;min-height:0"></td>
                <td>${escapeHtml(m.page.name || "")}</td>
                <td>${escapeHtml(paletteLabel(m.element.type) || m.element.type)}</td>
                <td>${escapeHtml(REPLACE_FIELD_LABELS[m.field] || m.field)}</td>
                <td>${escapeHtml(m.before)}</td>
                <td>${escapeHtml(m.before.replaceAll(query, replacement))}</td>
              </tr>`).join("")}</tbody>
            </table>
          </div>
          ${matches.length > LIMIT ? `<p class="muted" style="color:#b45309">対象が${matches.length}件あるため先頭${LIMIT}件のみ表示・適用対象にしています。検索語を絞って複数回に分けてください。</p>` : ""}
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="replaceApplyBtn" class="primary">選択した置換を実行</button>
          </div>`, { wide: true });
        qs("#replaceCheckAllBtn").addEventListener("click", () => qsa("[data-replace-row]", qs("#dialogBody")).forEach(cb => { cb.checked = true; }));
        qs("#replaceUncheckAllBtn").addEventListener("click", () => qsa("[data-replace-row]", qs("#dialogBody")).forEach(cb => { cb.checked = false; }));
        qs("#replaceApplyBtn").addEventListener("click", () => {
          const selected = qsa("[data-replace-row]", qs("#dialogBody"))
            .filter(cb => cb.checked)
            .map(cb => shown[Number(cb.dataset.replaceRow)])
            .filter(Boolean);
          if (!selected.length) {
            setStatus("置換する行が選択されていません。");
            return;
          }
          selected.forEach(m => {
            m.element[m.field] = String(m.element[m.field]).replaceAll(query, replacement);
          });
          commitHistory(selected.length + "箇所を置換しました。");
          closeDialog();
          render();
        });
      }

      // 検索を実行し一致要素の一覧(ジャンプつき)を表示。
      function runSearch() {
        const query = qs("#searchQuery").value.trim().toLowerCase();
        const results = query ? findElements(query) : [];
        const body = qs("#searchResults");
        body.innerHTML = results.length
          ? `<table class="report-table"><thead><tr><th>ページ</th><th>種別</th><th>内容</th><th>選択</th></tr></thead><tbody>${results.map(result => `<tr><td>${escapeHtml(result.pageName)}</td><td>${escapeHtml(result.type)}</td><td>${escapeHtml(result.text)}</td><td><button type="button" data-select-page="${result.pageId}" data-select-id="${result.id}">選択</button></td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">該当する要素はありません。</p>';
        attachDialogSelection();
      }

      // 検索語に一致する要素を全ページから収集。
      function findElements(query) {
        const results = [];
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const text = elementSearchText(element);
            if (text.toLowerCase().includes(query)) {
              results.push({
                pageId: page.id,
                pageName: page.name,
                id: element.id,
                type: paletteLabel(element.type),
                text
              });
            }
          });
        });
        return results;
      }

      // ===== シンボルビルダー(簡易・テキスト定義) =====
      // 1行1プリミティブ: line x1 y1 x2 y2 / rect x y w h / circle cx cy r /
      // text x y サイズ 文字列 / anchor x y (接続点=小端子として生成)
      function parseSymbolScript(text) {
        const templates = [];
        const errors = [];
        String(text || "").split(/\r?\n/).forEach((rawLine, index) => {
          const line = rawLine.trim();
          if (!line || line.startsWith("#")) return;
          const parts = line.split(/[\s,]+/);
          const cmd = (parts[0] || "").toLowerCase();
          const nums = parts.slice(1).map(Number);
          const base = { label: "", rotation: 0, stroke: state.settings.stroke, layer: "symbols" };
          if (cmd === "line" && nums.length >= 4 && nums.slice(0, 4).every(Number.isFinite)) {
            templates.push({ ...base, type: "line", points: [[nums[0], nums[1]], [nums[2], nums[3]]], strokeWidth: .32, dash: "" });
          } else if (cmd === "rect" && nums.length >= 4 && nums.slice(0, 4).every(Number.isFinite)) {
            templates.push({ ...base, type: "rect", x: nums[0], y: nums[1], w: nums[2], h: nums[3] });
          } else if (cmd === "circle" && nums.length >= 3 && nums.slice(0, 3).every(Number.isFinite)) {
            templates.push({ ...base, type: "circle", x: nums[0] - nums[2], y: nums[1] - nums[2], w: nums[2] * 2, h: nums[2] * 2 });
          } else if (cmd === "ellipse" && nums.length >= 4 && nums.slice(0, 4).every(Number.isFinite)) {
            templates.push({ ...base, type: "circle", x: nums[0] - nums[2], y: nums[1] - nums[3], w: nums[2] * 2, h: nums[3] * 2 });
          } else if (cmd === "arc" && nums.length >= 5 && nums.slice(0, 5).every(Number.isFinite)) {
            templates.push({ ...base, type: "arc", x: nums[0] - nums[2], y: nums[1] - nums[2], w: nums[2] * 2, h: nums[2] * 2, a0: nums[3], a1: nums[4] });
          } else if (cmd === "earc" && nums.length >= 6 && nums.slice(0, 6).every(Number.isFinite)) {
            templates.push({ ...base, type: "arc", x: nums[0] - nums[2], y: nums[1] - nums[3], w: nums[2] * 2, h: nums[3] * 2, a0: nums[4], a1: nums[5] });
          } else if (cmd === "text" && nums.length >= 3 && Number.isFinite(nums[0]) && Number.isFinite(nums[1]) && parts.length >= 5) {
            templates.push({ ...base, type: "text", x: nums[0], y: nums[1], w: 24, h: 5, text: parts.slice(4).join(" "), fontSize: Number.isFinite(nums[2]) && nums[2] > 0 ? nums[2] : 2.5, layer: "notes" });
          } else if (cmd === "anchor" && nums.length >= 2 && nums.slice(0, 2).every(Number.isFinite)) {
            templates.push({ ...base, type: "terminal", x: nums[0] - 0.9, y: nums[1] - 0.9, w: 1.8, h: 1.8, orientation: "horizontal", terminalShape: "circle" });
          } else {
            errors.push((index + 1) + "行目: " + rawLine);
          }
        });
        return { templates, errors };
      }

      // ===== 改訂履歴管理 =====
      function showRevisionHistory(draftRevisions) {
        // 行追加・削除はダイアログ内の下書きだけを更新し、「適用」まではstateを変更しない。
        const revisions = Array.isArray(draftRevisions) ? draftRevisions : deepClone(state.project.revisions || []);
        const rows = revisions.map((entry, index) => `
          <tr data-rev-row="${index}">
            <td><input data-rev-field="rev" value="${escapeAttr(entry.rev || "")}" style="width:56px"></td>
            <td><input data-rev-field="date" value="${escapeAttr(entry.date || "")}" style="width:110px"></td>
            <td><input data-rev-field="note" value="${escapeAttr(entry.note || "")}"></td>
            <td><button type="button" data-rev-delete="${index}">削除</button></td>
          </tr>`).join("");
        openDialog("改訂履歴", `
          <p class="muted">プロジェクト全体の改訂履歴です。図枠「詳細: 右下+改訂欄」の改訂欄に最新5件が表示され、
          最新の改訂記号は表題欄一括更新の「改訂」既定値になります。</p>
          <table class="report-table">
            <thead><tr><th>改訂</th><th>日付</th><th>内容</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="addRevisionBtn">行追加</button>
            <button type="button" id="applyRevisionBtn" class="primary">適用</button>
          </div>`);
        const collect = (includeEmpty = false) => {
          const list = [];
          qsa("[data-rev-row]", qs("#dialogBody")).forEach(row => {
            const entry = {};
            qsa("[data-rev-field]", row).forEach(input => { entry[input.dataset.revField] = input.value; });
            if (includeEmpty || entry.rev || entry.date || entry.note) list.push(entry);
          });
          return list;
        };
        qsa("[data-rev-delete]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const index = Number(button.dataset.revDelete);
            const revisions = collect(true);
            if (!Number.isInteger(index) || index < 0 || index >= revisions.length) return;
            revisions.splice(index, 1);
            showRevisionHistory(revisions);
          });
        });
        qs("#addRevisionBtn").addEventListener("click", () => {
          const revisions = collect(true);
          revisions.push({ rev: "", date: state.project.date || today, note: "" });
          showRevisionHistory(revisions);
        });
        qs("#applyRevisionBtn").addEventListener("click", () => {
          state.project.revisions = collect();
          const latest = state.project.revisions[state.project.revisions.length - 1];
          if (latest && latest.rev) state.project.revision = latest.rev;
          closeDialog();
          commitHistory("改訂履歴を更新しました。");
          render();
        });
      }

      // ユーザー部品のテンプレート列をビルダーのスクリプト表記へ逆変換する。
      // スクリプトで表現できるのは line/rect/circle/text/anchor(端子)の5種のみ。
      // 回路スニペット(接点やコイルを含む登録)は対象外として null を返す。
      function symbolToScript(symbol) {
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        const lines = [];
        for (const template of templates) {
          const n = value => String(round(Number(value) || 0));
          if (template.type === "line" && Array.isArray(template.points) && template.points.length >= 2) {
            lines.push(["line", n(template.points[0][0]), n(template.points[0][1]), n(template.points[1][0]), n(template.points[1][1])].join(" "));
          } else if (template.type === "rect") {
            lines.push(["rect", n(template.x), n(template.y), n(template.w), n(template.h)].join(" "));
          } else if (template.type === "circle") {
            const rx = Number(template.w || 0) / 2;
            const ry = Number(template.h || 0) / 2;
            if (Math.abs(rx - ry) < .005) {
              lines.push(["circle", n(Number(template.x) + rx), n(Number(template.y) + ry), n(rx)].join(" "));
            } else {
              lines.push(["ellipse", n(Number(template.x) + rx), n(Number(template.y) + ry), n(rx), n(ry)].join(" "));
            }
          } else if (template.type === "arc") {
            const rx = Number(template.w || 0) / 2;
            const ry = Number(template.h || 0) / 2;
            const cx = Number(template.x) + rx;
            const cy = Number(template.y) + ry;
            if (Math.abs(rx - ry) < .005) {
              lines.push(["arc", n(cx), n(cy), n(rx), n(template.a0 ?? 0), n(template.a1 ?? 90)].join(" "));
            } else {
              lines.push(["earc", n(cx), n(cy), n(rx), n(ry), n(template.a0 ?? 0), n(template.a1 ?? 90)].join(" "));
            }
          } else if (template.type === "text") {
            lines.push(["text", n(template.x), n(template.y), n(template.fontSize || 2.5), template.text || ""].join(" "));
          } else if (template.type === "terminal") {
            lines.push(["anchor", n(Number(template.x) + 0.9), n(Number(template.y) + 0.9)].join(" "));
          } else {
            return null;
          }
        }
        return lines.join("\n");
      }

      // editId を渡すと既存ユーザー部品の編集モードで開く(保存時にIDを維持して置換)。
      // 上段=マウス作図キャンバス(GUI)、下段=スクリプト。両者は常に同期する
      // (GUI操作→スクリプト再生成、スクリプト編集→キャンバス再描画)。
      function showSymbolBuilder(editId) {
        const editing = typeof editId === "string"
          ? (state.customSymbols || []).find(symbol => symbol.id === editId)
          : null;
        const initialScript = editing
          ? (symbolToScript(editing) || "")
          : "# 例: 箱と左右リード+接続点\nanchor 0 6\nline 0 6 4 6\nrect 4 0 12 12\nline 16 6 20 6\nanchor 20 6";
        openDialog(editing ? "シンボルビルダー（編集）" : "シンボルビルダー", `
          <div class="inline" style="flex-wrap:wrap;gap:6px;margin-bottom:6px">
            <span class="muted" style="font-size:11px">作図ツール:</span>
            <button type="button" data-sb-tool="select" class="active">選択/移動</button>
            <button type="button" data-sb-tool="line">直線</button>
            <button type="button" data-sb-tool="rect">矩形</button>
            <button type="button" data-sb-tool="circle">円</button>
            <button type="button" data-sb-tool="ellipse">楕円</button>
            <button type="button" data-sb-tool="arc">円弧</button>
            <button type="button" data-sb-tool="text">文字</button>
            <button type="button" data-sb-tool="anchor">接続点</button>
            <button type="button" data-sb-tool="delete">削除</button>
            <label style="margin:0 0 0 8px">スナップ</label>
            <select id="sbSnap" style="width:auto"><option value="1">1mm</option><option value="0.5">0.5mm</option><option value="0.25">0.25mm</option></select>
            <label style="margin:0 0 0 8px">文字内容</label>
            <input id="sbTextContent" value="文字" style="width:90px">
          </div>
          <svg id="sbCanvas" viewBox="-2 -2 28 20" style="display:block;width:100%;max-width:660px;aspect-ratio:28/20;background:#fff;border:1px solid #c9d2dc;border-radius:4px;cursor:crosshair;touch-action:none"></svg>
          <p class="muted" style="margin:4px 0 8px;font-size:11px">直線/矩形/円/楕円=ドラッグ、円弧=中心から弧の始点へドラッグ(90°で作成) ／ 文字・接続点=クリック ／
          選択ツール=クリックで選択・ドラッグで移動、<b>青□ハンドル=変形</b>(端点・角・半径)、<b>橙○ハンドル=弧の開始/終了角</b>(5°刻み)。
          円は半径ハンドルの片方だけ動かすと楕円に、円弧も同様に楕円弧になります ／ 文字は選択して「文字内容」欄で書換え ／ Deleteキーで削除 ／ 赤丸=配線が吸着する接続点</p>
          <label>部品名</label>
          <input id="sbName" value="${escapeAttr(editing ? editing.label || "" : "新しい部品")}">
          <details style="margin-top:6px">
            <summary class="muted">スクリプト定義（上のキャンバスと同期。直接編集も可）</summary>
            <p class="muted" style="font-size:11px">1行に1プリミティブ（座標はmm・左上原点）:
            <code>line x1 y1 x2 y2</code> ／ <code>rect x y 幅 高</code> ／ <code>circle cx cy r</code> ／
            <code>ellipse cx cy rx ry</code> ／ <code>arc cx cy r 開始角 終了角</code> ／
            <code>earc cx cy rx ry 開始角 終了角</code>（角度は0=右・時計回り、開始=終了で全周） ／
            <code>text x y サイズ 文字列</code> ／ <code>anchor x y</code>（接続点） ／ <code>#</code>=コメント</p>
            <textarea id="sbScript" style="min-height:120px;width:100%;font-family:var(--mono)">${escapeHtml(initialScript)}</textarea>
            <div class="inline" style="flex-wrap:wrap;margin-top:6px">
              <span class="muted" style="font-size:11px">クイック挿入:</span>
              <button type="button" data-sb-snippet="line 0 0 10 0">直線</button>
              <button type="button" data-sb-snippet="rect 0 0 12 8">矩形</button>
              <button type="button" data-sb-snippet="circle 6 6 4">円</button>
              <button type="button" data-sb-snippet="ellipse 8 5 6 3">楕円</button>
              <button type="button" data-sb-snippet="arc 8 8 6 180 270">円弧</button>
              <button type="button" data-sb-snippet="earc 8 8 6 3 180 360">楕円弧</button>
              <button type="button" data-sb-snippet="text 0 0 2.5 文字">文字</button>
              <button type="button" data-sb-snippet="anchor 0 0">接続点</button>
            </div>
          </details>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="sbPreviewBtn">プレビュー</button>
            <button type="button" id="sbSaveBtn" class="primary">${editing ? "上書き保存" : "パレットへ登録"}</button>
          </div>
          <div id="sbPreviewArea" style="margin-top:10px"></div>`, { wide: true });
        const buildPreview = () => {
          const parsed = parseSymbolScript(qs("#sbScript").value);
          const area = qs("#sbPreviewArea");
          if (parsed.errors.length) {
            area.innerHTML = '<p class="danger">解釈できない行があります:<br>' + parsed.errors.map(escapeHtml).join("<br>") + "</p>";
            return null;
          }
          if (!parsed.templates.length) {
            area.innerHTML = '<p class="muted">プリミティブがありません。</p>';
            return null;
          }
          area.innerHTML = symbolPreviewSvg({ templates: parsed.templates });
          return parsed.templates;
        };
        // ===== GUI作図キャンバス(スクリプトと双方向同期) =====
        let sbTemplates = parseSymbolScript(qs("#sbScript").value).templates;
        let sbTool = "select";
        let sbSel = -1;
        let sbDrag = null; // { mode: "draw"|"move", start:[x,y], original? }
        const sbSvg = qs("#sbCanvas");
        const sbSnapStep = () => Number(qs("#sbSnap").value || 1);
        const sbSnapV = v => round(Math.round(v / sbSnapStep()) * sbSnapStep());
        const sbPointOf = event => {
          const r = sbSvg.getBoundingClientRect();
          return [
            -2 + (event.clientX - r.left) / r.width * 28,
            -2 + (event.clientY - r.top) / r.height * 20
          ];
        };
        // GUI変更→スクリプト書き戻し+再描画(scriptが常に保存の正)
        const sbSyncScript = () => {
          const script = symbolToScript({ templates: sbTemplates });
          if (script !== null) qs("#sbScript").value = script;
          sbRenderCanvas();
          buildPreview();
        };
        // 線分と点の距離(選択ヒット用)
        const sbDistSeg = (px, py, x1, y1, x2, y2) => {
          const dx = x2 - x1, dy = y2 - y1;
          const len2 = dx * dx + dy * dy;
          const t = len2 ? Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / len2)) : 0;
          return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
        };
        const sbHitAt = (mx, my) => {
          for (let i = sbTemplates.length - 1; i >= 0; i--) {
            const t = sbTemplates[i];
            if (t.type === "line") {
              if (sbDistSeg(mx, my, t.points[0][0], t.points[0][1], t.points[1][0], t.points[1][1]) < .9) return i;
            } else {
              const b = elementBounds({ ...t, x: t.x || 0, y: t.y || 0 });
              if (b && mx >= b.x - .6 && mx <= b.x + b.w + .6 && my >= b.y - .6 && my <= b.y + b.h + .6) return i;
            }
          }
          return -1;
        };
        // 選択プリミティブの変形ハンドル一覧。a0/a1=弧の角度ハンドル(橙)、他=寸法/端点(青)。
        const sbHandlesFor = t => {
          if (!t) return [];
          if (t.type === "line") {
            return [
              { id: "p0", x: t.points[0][0], y: t.points[0][1] },
              { id: "p1", x: t.points[1][0], y: t.points[1][1] }
            ];
          }
          if (t.type === "rect") {
            const x = Number(t.x || 0), y = Number(t.y || 0), w = Number(t.w || 0), h = Number(t.h || 0);
            return [
              { id: "nw", x, y }, { id: "ne", x: x + w, y },
              { id: "sw", x, y: y + h }, { id: "se", x: x + w, y: y + h }
            ];
          }
          if (t.type === "circle" || t.type === "arc") {
            const rx = Number(t.w || 0) / 2, ry = Number(t.h || 0) / 2;
            const cx = Number(t.x || 0) + rx, cy = Number(t.y || 0) + ry;
            const handles = [];
            if (t.type === "arc") {
              const rad = d => d * Math.PI / 180;
              const a0 = Number(t.a0 ?? 0), a1 = Number(t.a1 ?? 90);
              handles.push(
                { id: "a0", x: cx + rx * Math.cos(rad(a0)), y: cy + ry * Math.sin(rad(a0)) },
                { id: "a1", x: cx + rx * Math.cos(rad(a1)), y: cy + ry * Math.sin(rad(a1)) }
              );
            }
            handles.push({ id: "rx", x: cx + rx, y: cy }, { id: "ry", x: cx, y: cy + ry });
            return handles;
          }
          return [];
        };
        const sbRenderCanvas = ghost => {
          if (!sbSvg) return;
          sbSvg.innerHTML = "";
          // 方眼(1mm細・5mm中・原点軸濃)
          for (let gx = -2; gx <= 26; gx += 1) {
            sbSvg.appendChild(svgEl("line", { x1: gx, y1: -2, x2: gx, y2: 18, stroke: gx === 0 ? "#9fb0c0" : (gx % 5 === 0 ? "#d7dfe7" : "#edf1f5"), "stroke-width": gx === 0 ? .1 : .05 }));
          }
          for (let gy = -2; gy <= 18; gy += 1) {
            sbSvg.appendChild(svgEl("line", { x1: -2, y1: gy, x2: 26, y2: gy, stroke: gy === 0 ? "#9fb0c0" : (gy % 5 === 0 ? "#d7dfe7" : "#edf1f5"), "stroke-width": gy === 0 ? .1 : .05 }));
          }
          sbTemplates.forEach((template, index) => {
            const clone = deepClone(template);
            clone.id = "sbpv" + index;
            drawElement(sbSvg, clone);
          });
          // 接続点を赤リングで強調
          sbTemplates.forEach(t => {
            if (t.type !== "terminal") return;
            sbSvg.appendChild(svgEl("circle", { cx: Number(t.x) + 0.9, cy: Number(t.y) + 0.9, r: 1.3, fill: "none", stroke: "#d23", "stroke-width": .18, "stroke-dasharray": ".5 .35", "pointer-events": "none" }));
          });
          // 選択枠+変形ハンドル(青□=寸法/端点、橙○=弧の角度)
          if (sbSel >= 0 && sbTemplates[sbSel]) {
            const b = elementBounds({ ...sbTemplates[sbSel], x: sbTemplates[sbSel].x || 0, y: sbTemplates[sbSel].y || 0 });
            if (b) sbSvg.appendChild(svgEl("rect", { x: b.x - .5, y: b.y - .5, width: b.w + 1, height: b.h + 1, fill: "none", stroke: "#2563eb", "stroke-width": .15, "stroke-dasharray": ".8 .5", "pointer-events": "none" }));
            sbHandlesFor(sbTemplates[sbSel]).forEach(hd => {
              if (hd.id === "a0" || hd.id === "a1") {
                sbSvg.appendChild(svgEl("circle", { cx: hd.x, cy: hd.y, r: .55, fill: "#f59e0b", stroke: "#b45309", "stroke-width": .12, "pointer-events": "none" }));
              } else {
                sbSvg.appendChild(svgEl("rect", { x: hd.x - .45, y: hd.y - .45, width: .9, height: .9, fill: "#2563eb", stroke: "#1e40af", "stroke-width": .12, "pointer-events": "none" }));
              }
            });
          }
          // ドラッグ中ゴースト
          if (ghost) {
            const attrs = { fill: "none", stroke: "#2563eb", "stroke-width": .2, opacity: .6, "pointer-events": "none" };
            if (ghost.kind === "line") sbSvg.appendChild(svgEl("line", { ...attrs, x1: ghost.a[0], y1: ghost.a[1], x2: ghost.b[0], y2: ghost.b[1] }));
            if (ghost.kind === "rect") sbSvg.appendChild(svgEl("rect", { ...attrs, x: Math.min(ghost.a[0], ghost.b[0]), y: Math.min(ghost.a[1], ghost.b[1]), width: Math.abs(ghost.b[0] - ghost.a[0]), height: Math.abs(ghost.b[1] - ghost.a[1]) }));
            if (ghost.kind === "circle") sbSvg.appendChild(svgEl("circle", { ...attrs, cx: ghost.a[0], cy: ghost.a[1], r: Math.max(.3, Math.hypot(ghost.b[0] - ghost.a[0], ghost.b[1] - ghost.a[1])) }));
            if (ghost.kind === "ellipse") sbSvg.appendChild(svgEl("ellipse", { ...attrs, cx: ghost.a[0], cy: ghost.a[1], rx: Math.max(.3, Math.abs(ghost.b[0] - ghost.a[0])), ry: Math.max(.3, Math.abs(ghost.b[1] - ghost.a[1])) }));
            if (ghost.kind === "arc") {
              const r = Math.max(.3, Math.hypot(ghost.b[0] - ghost.a[0], ghost.b[1] - ghost.a[1]));
              sbSvg.appendChild(svgEl("circle", { ...attrs, "stroke-dasharray": ".6 .5", cx: ghost.a[0], cy: ghost.a[1], r }));
              sbSvg.appendChild(svgEl("line", { ...attrs, x1: ghost.a[0], y1: ghost.a[1], x2: ghost.b[0], y2: ghost.b[1] }));
            }
          }
        };
        // ツール切替
        qsa("[data-sb-tool]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            sbTool = button.dataset.sbTool;
            qsa("[data-sb-tool]", qs("#dialogBody")).forEach(b => b.classList.toggle("active", b === button));
            sbSvg.style.cursor = sbTool === "select" ? "default" : (sbTool === "delete" ? "not-allowed" : "crosshair");
          });
        });
        // キャンバス操作: クリック配置(文字/接続点/削除)、ドラッグ作図(線/矩形/円)、選択移動
        sbSvg.addEventListener("pointerdown", event => {
          event.preventDefault();
          const [rawX, rawY] = sbPointOf(event);
          const x = sbSnapV(rawX);
          const y = sbSnapV(rawY);
          if (sbTool === "anchor") {
            sbTemplates.push({ label: "", rotation: 0, stroke: state.settings.stroke, layer: "symbols", type: "terminal", x: x - 0.9, y: y - 0.9, w: 1.8, h: 1.8, orientation: "horizontal", terminalShape: "circle" });
            sbSel = sbTemplates.length - 1;
            sbSyncScript();
            return;
          }
          if (sbTool === "text") {
            const content = qs("#sbTextContent").value || "文字";
            sbTemplates.push({ label: "", rotation: 0, stroke: state.settings.stroke, layer: "notes", type: "text", x, y, w: 24, h: 5, text: content, fontSize: 2.5 });
            sbSel = sbTemplates.length - 1;
            sbSyncScript();
            return;
          }
          if (sbTool === "delete") {
            const hit = sbHitAt(rawX, rawY);
            if (hit >= 0) {
              sbTemplates.splice(hit, 1);
              sbSel = -1;
              sbSyncScript();
            }
            return;
          }
          if (sbTool === "select") {
            // 変形ハンドルを優先ヒット(選択中のみ)
            if (sbSel >= 0 && sbTemplates[sbSel]) {
              const handle = sbHandlesFor(sbTemplates[sbSel]).find(hd => Math.hypot(rawX - hd.x, rawY - hd.y) < .9);
              if (handle) {
                sbDrag = { mode: "reshape", handle: handle.id, original: deepClone(sbTemplates[sbSel]) };
                return;
              }
            }
            const hit = sbHitAt(rawX, rawY);
            sbSel = hit;
            // 文字を選択したら「文字内容」欄へ内容を反映(そのまま書き換え可能)
            if (hit >= 0 && sbTemplates[hit].type === "text") qs("#sbTextContent").value = sbTemplates[hit].text || "";
            if (hit >= 0) sbDrag = { mode: "move", start: [x, y], original: deepClone(sbTemplates[hit]) };
            sbRenderCanvas();
            return;
          }
          // line / rect / circle / ellipse / arc: ドラッグ開始
          sbDrag = { mode: "draw", start: [x, y] };
        });
        sbSvg.addEventListener("pointermove", event => {
          if (!sbDrag) return;
          const [rawX, rawY] = sbPointOf(event);
          const x = sbSnapV(rawX);
          const y = sbSnapV(rawY);
          if (sbDrag.mode === "draw") {
            sbRenderCanvas({ kind: sbTool, a: sbDrag.start, b: [x, y] });
            return;
          }
          if (sbDrag.mode === "move" && sbSel >= 0) {
            const dx = x - sbDrag.start[0];
            const dy = y - sbDrag.start[1];
            const target = sbTemplates[sbSel];
            const original = sbDrag.original;
            if (target.type === "line") {
              target.points = original.points.map(p => [round(p[0] + dx), round(p[1] + dy)]);
            } else {
              target.x = round(Number(original.x || 0) + dx);
              target.y = round(Number(original.y || 0) + dy);
            }
            sbRenderCanvas();
            return;
          }
          if (sbDrag.mode === "reshape" && sbSel >= 0) {
            const target = sbTemplates[sbSel];
            const original = sbDrag.original;
            const handle = sbDrag.handle;
            if (target.type === "line") {
              target.points = handle === "p0"
                ? [[x, y], [original.points[1][0], original.points[1][1]]]
                : [[original.points[0][0], original.points[0][1]], [x, y]];
            } else if (target.type === "rect") {
              // 反対側の角を固定してリサイズ
              const fx = handle === "nw" || handle === "sw" ? Number(original.x) + Number(original.w) : Number(original.x);
              const fy = handle === "nw" || handle === "ne" ? Number(original.y) + Number(original.h) : Number(original.y);
              target.x = round(Math.min(x, fx));
              target.y = round(Math.min(y, fy));
              target.w = round(Math.max(sbSnapStep(), Math.abs(x - fx)));
              target.h = round(Math.max(sbSnapStep(), Math.abs(y - fy)));
            } else if (target.type === "circle" || target.type === "arc") {
              const orx = Number(original.w) / 2;
              const ory = Number(original.h) / 2;
              const cx = Number(original.x) + orx;
              const cy = Number(original.y) + ory;
              if (handle === "rx") {
                const rx = Math.max(sbSnapStep() / 2, Math.abs(x - cx));
                target.x = round(cx - rx);
                target.w = round(rx * 2);
              } else if (handle === "ry") {
                const ry = Math.max(sbSnapStep() / 2, Math.abs(y - cy));
                target.y = round(cy - ry);
                target.h = round(ry * 2);
              } else if (handle === "a0" || handle === "a1") {
                // 楕円パラメータ角(5°刻み)。rx/ryで正規化してから角度を取る
                const rx = Number(target.w) / 2 || .1;
                const ry = Number(target.h) / 2 || .1;
                const ccx = Number(target.x) + rx;
                const ccy = Number(target.y) + ry;
                let angle = Math.atan2((rawY - ccy) / ry, (rawX - ccx) / rx) * 180 / Math.PI;
                angle = Math.round(angle / 5) * 5;
                target[handle] = ((angle % 360) + 360) % 360;
              }
            }
            sbRenderCanvas();
          }
        });
        const sbFinishDrag = event => {
          if (!sbDrag) return;
          const drag = sbDrag;
          sbDrag = null;
          const [rawX, rawY] = sbPointOf(event);
          const x = sbSnapV(rawX);
          const y = sbSnapV(rawY);
          if (drag.mode === "move" || drag.mode === "reshape") {
            sbSyncScript();
            return;
          }
          const [ax, ay] = drag.start;
          if (Math.abs(x - ax) < .01 && Math.abs(y - ay) < .01) {
            sbRenderCanvas();
            return; // ゼロ寸法は破棄
          }
          const base = { label: "", rotation: 0, stroke: state.settings.stroke, layer: "symbols" };
          if (sbTool === "line") {
            sbTemplates.push({ ...base, type: "line", points: [[ax, ay], [x, y]], strokeWidth: .32, dash: "" });
          } else if (sbTool === "rect") {
            sbTemplates.push({ ...base, type: "rect", x: Math.min(ax, x), y: Math.min(ay, y), w: Math.abs(x - ax), h: Math.abs(y - ay) });
          } else if (sbTool === "circle") {
            const r = round(Math.max(sbSnapStep(), Math.hypot(x - ax, y - ay)));
            sbTemplates.push({ ...base, type: "circle", x: ax - r, y: ay - r, w: r * 2, h: r * 2 });
          } else if (sbTool === "ellipse") {
            const rx = round(Math.max(sbSnapStep() / 2, Math.abs(x - ax)));
            const ry = round(Math.max(sbSnapStep() / 2, Math.abs(y - ay)));
            sbTemplates.push({ ...base, type: "circle", x: ax - rx, y: ay - ry, w: rx * 2, h: ry * 2 });
          } else if (sbTool === "arc") {
            // 中心=ドラッグ始点、半径=距離、開始角=離した方向(5°刻み)、掃引90°で作成→ハンドルで調整
            const r = round(Math.max(sbSnapStep(), Math.hypot(x - ax, y - ay)));
            let a0 = Math.atan2(rawY - ay, rawX - ax) * 180 / Math.PI;
            a0 = ((Math.round(a0 / 5) * 5) % 360 + 360) % 360;
            sbTemplates.push({ ...base, type: "arc", x: ax - r, y: ay - r, w: r * 2, h: r * 2, a0, a1: (a0 + 90) % 360 });
          }
          sbSel = sbTemplates.length - 1;
          sbSyncScript();
        };
        sbSvg.addEventListener("pointerup", sbFinishDrag);
        sbSvg.addEventListener("pointerleave", event => { if (sbDrag && sbDrag.mode === "draw") sbFinishDrag(event); });
        // Deleteキーで選択プリミティブを削除(入力欄フォーカス中は無効)
        qs("#dialogBody").addEventListener("keydown", event => {
          if (event.key !== "Delete" && event.key !== "Backspace") return;
          const tag = document.activeElement?.tagName;
          if (["INPUT", "TEXTAREA", "SELECT"].includes(tag)) return;
          if (sbSel >= 0) {
            event.preventDefault();
            sbTemplates.splice(sbSel, 1);
            sbSel = -1;
            sbSyncScript();
          }
        });
        // 「文字内容」欄: 文字プリミティブ選択中は内容をその場で書き換えられる
        qs("#sbTextContent").addEventListener("input", () => {
          const target = sbSel >= 0 ? sbTemplates[sbSel] : null;
          if (target && target.type === "text") {
            target.text = qs("#sbTextContent").value || "文字";
            sbRenderCanvas();
          }
        });
        qs("#sbTextContent").addEventListener("change", () => {
          const target = sbSel >= 0 ? sbTemplates[sbSel] : null;
          if (target && target.type === "text") sbSyncScript();
        });
        // スクリプト手編集→キャンバス反映
        qs("#sbScript").addEventListener("input", () => {
          const parsed = parseSymbolScript(qs("#sbScript").value);
          if (!parsed.errors.length) {
            sbTemplates = parsed.templates;
            sbSel = -1;
            sbRenderCanvas();
          }
        });
        sbRenderCanvas();
        qsa("[data-sb-snippet]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const textarea = qs("#sbScript");
            textarea.value = textarea.value.replace(/\s*$/, "") + "\n" + button.dataset.sbSnippet;
            const parsed = parseSymbolScript(textarea.value);
            if (!parsed.errors.length) { sbTemplates = parsed.templates; sbRenderCanvas(); }
            buildPreview();
          });
        });
        qs("#sbPreviewBtn").addEventListener("click", () => {
          const parsed = parseSymbolScript(qs("#sbScript").value);
          if (!parsed.errors.length) { sbTemplates = parsed.templates; sbSel = -1; sbRenderCanvas(); }
          buildPreview();
        });
        qs("#sbSaveBtn").addEventListener("click", () => {
          const templates = buildPreview();
          if (!templates) return;
          const label = qs("#sbName").value || "ユーザー部品";
          if (editing) {
            editing.label = label;
            editing.template = deepClone(templates[0]);
            editing.templates = deepClone(templates);
          } else {
            state.customSymbols.push({
              id: uid("sym"),
              label,
              template: deepClone(templates[0]),
              templates: deepClone(templates)
            });
          }
          closeDialog();
          commitHistory(editing ? "ユーザー部品を上書き保存しました。" : "シンボルビルダーで部品を登録しました。");
          render();
        });
        if (editing) buildPreview();
      }

      // ユーザー部品のプレビューSVG(外接枠にフィット)を生成。
      function symbolPreviewSvg(symbol) {
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        if (!templates.length) return "";
        const boxes = templates.map(template => elementBounds({ ...template, x: template.x || 0, y: template.y || 0 })).filter(Boolean);
        if (!boxes.length) return "";
        const bounds = unionBounds(boxes);
        const pad = 3;
        const svg = svgEl("svg", {
          xmlns: svgNS,
          viewBox: (bounds.x - pad) + " " + (bounds.y - pad) + " " + (bounds.w + pad * 2) + " " + (bounds.h + pad * 2),
          width: 96,
          height: 52,
          style: "background:#fff;border:1px solid #d6dde5;border-radius:4px"
        });
        templates.forEach(template => {
          const clone = deepClone(template);
          clone.id = uid("pv");
          drawElement(svg, clone);
        });
        return svg.outerHTML;
      }

      // ユーザー部品管理ダイアログを開く(プレビュー/編集/改名/削除)。編集はスクリプト表現可能な部品のみ。
      function showSymbolManager() {
        const symbols = state.customSymbols || [];
        const html = symbols.length
          ? `<table class="report-table"><thead><tr><th>プレビュー</th><th>部品名</th><th>内容</th><th>操作</th></tr></thead><tbody>${symbols.map(symbol => `<tr><td>${symbolPreviewSvg(symbol)}</td><td>${escapeHtml(symbol.label)}</td><td>${escapeHtml(symbolSummary(symbol))}</td><td>${symbolToScript(symbol) !== null ? `<button type="button" data-edit-symbol="${escapeAttr(symbol.id)}">編集</button> ` : ""}<button type="button" data-rename-symbol="${escapeAttr(symbol.id)}">改名</button> <button type="button" data-delete-symbol="${escapeAttr(symbol.id)}">削除</button></td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">登録済みのユーザー部品はありません。図形を選択して「ユーザー部品に登録」を押すと追加できます。配線を接続したい回路には端子や接点を含めて登録してください（接続点として機能します）。</p>';
        openDialog("ユーザー部品管理", html);
        qsa("[data-edit-symbol]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => showSymbolBuilder(button.dataset.editSymbol));
        });
        qsa("[data-rename-symbol]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const symbol = (state.customSymbols || []).find(item => item.id === button.dataset.renameSymbol);
            if (!symbol) return;
            const label = prompt("ユーザー部品名", symbol.label || "");
            if (!label) return;
            symbol.label = label;
            commitHistory("ユーザー部品名を変更しました。");
            showSymbolManager();
            renderPalette();
          });
        });
        qsa("[data-delete-symbol]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const id = button.dataset.deleteSymbol;
            state.customSymbols = (state.customSymbols || []).filter(symbol => symbol.id !== id);
            commitHistory("ユーザー部品を削除しました。");
            showSymbolManager();
            renderPalette();
          });
        });
      }

      // ユーザー部品の内容要約(単品=種別名/複数=n要素の回路)。
      function symbolSummary(symbol) {
        const templates = (symbol.templates || [symbol.template]).filter(Boolean);
        if (templates.length > 1) return templates.length + "要素の回路";
        return paletteLabel(templates[0]?.type || "");
      }

      // 配線種別管理ダイアログを開く(色/太さ/破線/線番対象の編集)。
      function showWireTypeManager() {
        const html = `
          <table class="report-table">
            <thead><tr><th>名称</th><th>色</th><th>線幅</th><th>破線</th><th>採番外</th></tr></thead>
            <tbody>
              ${(state.wireTypes || []).map(type => `
                <tr data-wire-type-row="${escapeAttr(type.id)}">
                  <td><input data-wire-type-field="label" value="${escapeAttr(type.label || type.id)}"></td>
                  <td><input data-wire-type-field="color" type="color" value="${escapeAttr(type.color || "#111820")}"></td>
                  <td><input data-wire-type-field="width" type="number" min="0.1" step="0.05" value="${Number(type.width || .38)}"></td>
                  <td><input data-wire-type-field="dash" value="${escapeAttr(type.dash || "")}" placeholder="3 2"></td>
                  <td><input data-wire-type-field="noNumber" type="checkbox" ${type.noNumber ? "checked" : ""} style="width:auto;min-height:auto"></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="addWireTypeBtn">種別追加</button>
            <button type="button" id="applyWireTypeBtn" class="primary">適用</button>
          </div>
        `;
        openDialog("配線種別管理", html);
        qs("#addWireTypeBtn").addEventListener("click", addWireTypeFromDialog);
        qs("#applyWireTypeBtn").addEventListener("click", applyWireTypeManager);
      }

      // 配線種別を1件追加。
      function addWireTypeFromDialog() {
        const id = prompt("配線種別ID（半角英数字）", "wire" + ((state.wireTypes || []).length + 1));
        if (!id) return;
        const normalized = id.trim().replace(/[^A-Za-z0-9_-]/g, "");
        if (!normalized) {
          setStatus("配線種別IDが不正です。");
          return;
        }
        if ((state.wireTypes || []).some(type => type.id === normalized)) {
          setStatus("同じIDの配線種別があります。");
          return;
        }
        const label = prompt("配線種別名", normalized) || normalized;
        state.wireTypes.push({ id: normalized, label, color: "#111820", width: .38, dash: "", noNumber: false });
        commitHistory("配線種別を追加しました。");
        showWireTypeManager();
        render();
      }

      // 配線種別ダイアログの編集をstateへ反映。
      function applyWireTypeManager() {
        qsa("[data-wire-type-row]", qs("#dialogBody")).forEach(row => {
          const type = (state.wireTypes || []).find(item => item.id === row.dataset.wireTypeRow);
          if (!type) return;
          qsa("[data-wire-type-field]", row).forEach(input => {
            const key = input.dataset.wireTypeField;
            if (key === "width") type[key] = Number(input.value || .38);
            else type[key] = input.type === "checkbox" ? input.checked : input.value;
          });
        });
        closeDialog();
        commitHistory("配線種別を更新しました。");
        render();
      }

      // レイヤ管理ダイアログを開く(表示/ロック/色)。
      function showLayerManager() {
        const html = `
          <table class="report-table">
            <thead><tr><th>表示</th><th>ロック</th><th>レイヤ名</th><th>色</th></tr></thead>
            <tbody>
              ${(state.layers || []).map(layer => `
                <tr data-layer-row="${escapeAttr(layer.id)}">
                  <td><input data-layer-field="visible" type="checkbox" ${layer.visible !== false ? "checked" : ""} style="width:auto;min-height:auto"></td>
                  <td><input data-layer-field="locked" type="checkbox" ${layer.locked ? "checked" : ""} style="width:auto;min-height:auto"></td>
                  <td><input data-layer-field="label" value="${escapeAttr(layer.label)}"></td>
                  <td><input data-layer-field="color" type="color" value="${escapeAttr(layer.color || "#111820")}"></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="applyLayerManagerBtn" class="primary">適用</button>
          </div>
        `;
        openDialog("レイヤ管理", html);
        qs("#applyLayerManagerBtn").addEventListener("click", applyLayerManager);
      }

      // レイヤダイアログの編集をstateへ反映。
      function applyLayerManager() {
        qsa("[data-layer-row]", qs("#dialogBody")).forEach(row => {
          const layer = layerFor(row.dataset.layerRow);
          if (!layer) return;
          qsa("[data-layer-field]", row).forEach(input => {
            const key = input.dataset.layerField;
            layer[key] = input.type === "checkbox" ? input.checked : input.value;
          });
        });
        closeDialog();
        commitHistory("レイヤ設定を更新しました。");
        render();
      }

      // 要素の検索対象文字列(ラベル+線番+属性連結)。
      function elementSearchText(element) {
        return [
          element.type,
          element.tag,
          element.label,
          element.type === "arrow" ? signalRoleLabel(element.signalRole) : "",
          element.description,
          element.installation,
          element.location,
          element.manufacturer,
          element.catalog,
          element.rating,
          element.item,
          element.text,
          element.wireNo,
          element.prefix,
          element.cellText,
          element.pinText,
          element.note
        ].filter(Boolean).join(" ");
      }

      // クロスリファレンスダイアログを開く(線番/信号/タグの使用箇所+コイル→接点一覧)。
      function showCrossReference() {
        const xref = buildCrossRefCache();
        const coilRows = [];
        xref.coils.forEach((coil, tag) => {
          const children = xref.contacts.get(tag) || [];
          coilRows.push(`<tr>
            <td>${escapeHtml(tag)}</td>
            <td>${escapeHtml(coil.address)}</td>
            <td>${children.length}</td>
            <td>${children.map(item => `<button type="button" data-select-page="${item.page.id}" data-select-id="${item.element.id}">${escapeHtml(item.address)}${item.closed ? "(b)" : ""}</button>`).join(" ")}</td>
            <td><button type="button" data-select-page="${coil.page.id}" data-select-id="${coil.element.id}">コイルへ</button></td>
          </tr>`);
        });
        const coilHtml = coilRows.length
          ? `<div class="panel-title">コイル→接点(頁+行アドレス)</div>
             <table class="report-table"><thead><tr><th>タグ</th><th>コイル位置</th><th>接点数</th><th>接点位置</th><th></th></tr></thead><tbody>${coilRows.join("")}</tbody></table>`
          : "";
        const groups = collectCrossReferences();
        const html = groups.length || coilRows.length
          ? `${coilHtml}
             <div class="panel-title" style="margin-top:12px">全参照一覧</div>
             <table class="report-table"><thead><tr><th>キー</th><th>分類</th><th>参照数</th><th>参照先</th></tr></thead><tbody>${groups.map(group => `<tr><td>${escapeHtml(group.key)}</td><td>${escapeHtml(group.kind)}</td><td>${group.items.length}</td><td>${group.items.map(item => `<button type="button" data-select-page="${item.pageId}" data-select-id="${item.id}" title="${escapeAttr(item.type)}">${escapeHtml(item.pageName)}:${escapeHtml(item.type)}</button>`).join(" ")}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">参照できる線番、部品タグ、信号矢印はありません。</p>';
        openDialog("クロスリファレンス", html);
        attachDialogSelection();
      }

      // 表題欄一括更新ダイアログを開く(値+マッピング編集)。
      function showTitleBatchDialog() {
        const p = ensureProjectDefaults();
        const map = p.titleMap || DEFAULT_TITLE_MAP;
        const html = `
          <div class="row">
            <div><label>図名</label><input id="batchTitle" value="${escapeAttr(p.title || "")}"></div>
            <div><label>設備</label><input id="batchFacility" value="${escapeAttr(p.facility || "")}"></div>
          </div>
          <div class="row">
            <div><label>図番</label><input id="batchDrawingNo" value="${escapeAttr(p.drawingNo || "")}"></div>
            <div><label>改訂</label><input id="batchRevision" value="${escapeAttr(p.revision || "")}"></div>
          </div>
          <div class="row">
            <div><label>作成</label><input id="batchDesigner" value="${escapeAttr(p.designer || "")}"></div>
            <div><label>日付</label><input id="batchDate" value="${escapeAttr(p.date || today)}"></div>
          </div>
          <label style="margin-top:10px">表題欄マッピング</label>
          <table class="report-table">
            <thead><tr><th>表題欄</th><th>参照元</th></tr></thead>
            <tbody>${titleMapRows(map)}</tbody>
          </table>
          <label><input id="batchOnlyBlank" type="checkbox" style="width:auto;min-height:auto"> 空欄の項目だけ更新</label>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">
            <button type="button" id="applyTitleCurrentBtn">現在ページへ適用</button>
            <button type="button" id="applyTitleBatchBtn" class="primary">全ページへ適用</button>
          </div>
        `;
        openDialog("表題欄一括更新", html);
        qs("#applyTitleCurrentBtn").addEventListener("click", () => applyTitleBatch("current"));
        qs("#applyTitleBatchBtn").addEventListener("click", () => applyTitleBatch("all"));
      }

      // 表題欄マッピング編集行のHTMLを生成。
      function titleMapRows(map) {
        return TITLE_FIELDS.map(field => `
          <tr>
            <td>${escapeHtml(field.label)}</td>
            <td><select data-title-map="${escapeAttr(field.key)}">${titleSourceOptions(map[field.key] || DEFAULT_TITLE_MAP[field.key])}</select></td>
          </tr>
        `).join("");
      }

      // マッピング参照元セレクトのHTMLを生成。
      function titleSourceOptions(current) {
        return TITLE_SOURCE_OPTIONS.map(option => {
          const selected = option.value === current ? " selected" : "";
          return `<option value="${escapeAttr(option.value)}"${selected}>${escapeHtml(option.label)}</option>`;
        }).join("");
      }

      // 一括更新ダイアログの入力値を収集。
      function titleBatchValues() {
        return {
          title: qs("#batchTitle").value,
          facility: qs("#batchFacility").value,
          drawingNo: qs("#batchDrawingNo").value,
          revision: qs("#batchRevision").value,
          designer: qs("#batchDesigner").value,
          date: qs("#batchDate").value
        };
      }

      // マッピングセレクトの選択値を収集。
      function titleMapValues() {
        const map = { ...DEFAULT_TITLE_MAP };
        qsa("[data-title-map]", qs("#dialogBody")).forEach(select => {
          map[select.dataset.titleMap] = select.value;
        });
        return map;
      }

      // 表題欄一括更新を実行(scope=current/all、空欄のみ更新オプション対応)。
      function applyTitleBatch(scope = "all") {
        const values = titleBatchValues();
        const map = titleMapValues();
        const onlyBlank = qs("#batchOnlyBlank").checked;
        state.project = { ...ensureProjectDefaults(), ...values, titleMap: map };
        const total = state.pages.length;
        const targets = scope === "current" ? [currentPage()].filter(Boolean) : state.pages;
        targets.forEach(page => {
          if (!page.title) page.title = {};
          const index = state.pages.indexOf(page);
          TITLE_FIELDS.forEach(field => {
            const resolved = resolveTitleSource(page, map[field.key], values, index, total);
            if (!resolved.apply) return;
            if (onlyBlank && page.title[field.key]) return;
            page.title[field.key] = resolved.value;
          });
        });
        closeDialog();
        commitHistory(scope === "current" ? "現在ページの表題欄を更新しました。" : "表題欄を一括更新しました。");
        render();
      }

      // マッピング参照元(手入力/プロジェクト値/ページ名/頁番号)→実際の値へ解決。
      function resolveTitleSource(page, source, values, index, total) {
        if (source === "keep") return { apply: false, value: "" };
        if (source === "empty") return { apply: true, value: "" };
        const projectKey = String(source || "").replace(/^project\./, "");
        if (source?.startsWith("project.")) {
          const value = values[projectKey] || "";
          return { apply: value !== "", value };
        }
        if (source === "page.name") return { apply: true, value: page.name || "" };
        if (source === "page.number") return { apply: true, value: String(index + 1) };
        if (source === "page.numberTotal") return { apply: true, value: String(index + 1) + " / " + String(total) };
        return { apply: false, value: "" };
      }

      // 線番・信号・タグの使用箇所を全ページから収集。
      function collectCrossReferences() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const entries = crossRefEntries(element);
            entries.forEach(entry => {
              const key = entry.kind + "::" + entry.key;
              const list = map.get(key) || { key: entry.key, kind: entry.kind, items: [] };
              const type = element.type === "arrow" ? paletteLabel(element.type) + "/" + signalRoleLabel(element.signalRole) : paletteLabel(element.type);
              list.items.push({ pageId: page.id, pageName: page.name, id: element.id, type });
              map.set(key, list);
            });
          });
        });
        return Array.from(map.values()).sort((a, b) => a.kind.localeCompare(b.kind) || a.key.localeCompare(b.key));
      }

      // 要素1個からクロス参照キー(線番/ラベル/タグ)を抽出。
      function crossRefEntries(element) {
        const entries = [];
        if (element.type === "wire" && element.wireNo) entries.push({ kind: "線番", key: element.wireNo });
        if (element.type === "arrow" && element.label) entries.push({ kind: "信号", key: element.label });
        const tag = componentTag(element);
        if (!["wire", "arrow", "text", "table", "rect", "circle", "line", "underlayImage", "installationBox", "locationBox", "junction"].includes(element.type) && tag) {
          entries.push({ kind: "部品", key: tag });
        }
        return entries;
      }

      // ダイアログ内の[data-select-page/-id]ボタンへ「該当要素へジャンプ」動作を付ける。
      function attachDialogSelection() {
        qsa("[data-select-id]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            closeDialog();
            jumpToElement(button.dataset.selectPage, button.dataset.selectId);
            setStatus("一覧から要素を選択しました。");
          });
        });
      }

      // 指定要素へジャンプ(ページ切替+選択+ワークスペースを要素中心へスクロール)。
      // 監査/検索/一覧のジャンプとクロスリファレンスのサーフィン移動が共用する。
      function jumpToElement(pageId, elementId) {
        if (pageId && state.activePageId !== pageId) state.activePageId = pageId;
        selectSingle(elementId);
        render();
        setTimeout(() => {
          const g = document.querySelector('#canvas g[data-id="' + CSS.escape(elementId || "") + '"]');
          const workspace = qs(".workspace");
          if (!g || !workspace) return;
          const r = g.getBoundingClientRect();
          const wr = workspace.getBoundingClientRect();
          workspace.scrollLeft += (r.left + r.width / 2) - (wr.left + wr.width / 2);
          workspace.scrollTop += (r.top + r.height / 2) - (wr.top + wr.height / 2);
        }, 0);
      }

      // CSVセルのエスケープ(引用符・改行対応)。
      function csvCell(value) {
        const text = String(value ?? "");
        if (/[",\r\n]/.test(text)) return '"' + text.replaceAll('"', '""') + '"';
        return text;
      }

      // 図面監査のルール一覧(key/label)。ON/OFFはsettings.auditRules(既定は全ON)。
      const AUDIT_RULES = [
        { key: "wireNo", label: "未採番配線" },
        { key: "net", label: "ネット整合" },
        { key: "emptyLabel", label: "空ラベル" },
        { key: "offPage", label: "用紙外" },
        { key: "floating", label: "未接続端点" },
        { key: "relay", label: "コイル/接点" },
        { key: "signal", label: "信号矢印の相手" },
        { key: "panel", label: "盤配置" }
      ];

      // 監査ルールが有効か(未設定はtrue)。
      function auditRuleOn(key) {
        const rules = state.settings.auditRules || {};
        return rules[key] !== false;
      }

      // 図面監査ダイアログを開く(ルールのトグル+指摘一覧+要素ジャンプ)。
      function showAudit() {
        const issues = auditProject();
        const ruleControls = AUDIT_RULES.map(rule =>
          `<label style="display:inline-flex;align-items:center;gap:4px;margin:0 10px 6px 0;font-size:12px"><input type="checkbox" data-audit-rule="${rule.key}" ${auditRuleOn(rule.key) ? "checked" : ""} style="width:auto;min-height:auto">${rule.label}</label>`).join("");
        const body = issues.length
          ? `<table class="report-table"><thead><tr><th>重要度</th><th>ページ</th><th>内容</th><th>対象</th><th>選択</th></tr></thead><tbody>${issues.map(issue => `<tr><td>${issue.level}</td><td>${escapeHtml(issue.page)}</td><td>${escapeHtml(issue.message)}</td><td>${escapeHtml(issue.target)}</td><td>${auditSelectionButton(issue)}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">検出された問題はありません。</p>';
        openDialog("図面監査", `<div><span class="muted">検査ルール（外すと対象外。標準パックにも保存されます）:</span><div style="margin:6px 0 10px">${ruleControls}</div></div>` + body);
        attachDialogSelection();
        qsa("[data-audit-rule]", qs("#dialogBody")).forEach(input => {
          input.addEventListener("change", () => {
            state.settings.auditRules = state.settings.auditRules || {};
            state.settings.auditRules[input.dataset.auditRule] = input.checked;
            commitHistory("監査ルールを変更しました。");
            showAudit();
          });
        });
      }

      // 監査指摘行のジャンプボタンHTMLを生成。
      function auditSelectionButton(issue) {
        if (!issue.elementId) return "";
        return `<button type="button" data-select-page="${escapeAttr(issue.pageId || "")}" data-select-id="${escapeAttr(issue.elementId)}">選択</button>`;
      }

      // 図面監査の本体。ルール別に全ページを走査し指摘を収集する:
      // wireNo=未採番配線 / net=同一ネット内の線番不整合 / emptyLabel=空ラベル / offPage=用紙外 /
      // floating=未接続端点 / relay=コイルと接点の対応+接点数上限 / panel=盤配置(タグ部品とフットプリントの対応)。
      function auditProject() {
        const issues = [];
        const arrows = new Map();
        const terminalNames = new Map();
        const componentTags = new Map();
        state.pages.forEach(page => {
          const size = pageSize(page);
          if (!page.title?.title) {
            issues.push({ level: "注意", page: page.name, message: "図名が未入力です。", target: "表題欄" });
          }
          page.elements.forEach(element => {
            const label = componentTag(element) || element.text || element.wireNo || "";
            if (element.type === "wire") {
              if (auditRuleOn("wireNo") && !element.wireNo && !element.ladderRail && !wireStyle(element).noNumber) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "線番が未入力です。", target: element.id });
              }
            }
            if (auditRuleOn("emptyLabel") && ["contactNO", "contactNC", "pushButton", "coil", "fuse", "breaker", "lamp", "buzzer", "powerSupply", "transformer", "ground", "motor", "fan", "resistor", "diode", "deviceBox", "plcBlock", "cableMarker"].includes(element.type) && !label) {
              issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "ラベルが未入力です。", target: element.type });
            }
            // 信号矢印はlabelがページ間参照名であり、部品タグの採番対象ではない。
            const prefix = element.type === "arrow" ? "" : tagPrefix(element.type);
            if (prefix) {
              if (!element.tag) {
                issues.push({ level: "注意", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグが未採番です。", target: element.label || paletteLabel(element.type) });
              } else {
                // 同一リレーの複数接点は同じタグを共有するのが正常。親部品だけ重複監査へ載せる。
                if (!contactChildTypes().has(element.type)) {
                  const key = element.type + "::" + element.tag;
                  const list = componentTags.get(key) || [];
                  list.push({ page: page.name, pageId: page.id, elementId: element.id, type: paletteLabel(element.type), tag: element.tag });
                  componentTags.set(key, list);
                }
              }
              if (element.fixedTag && !element.tag) {
                issues.push({ level: "警告", page: page.name, pageId: page.id, elementId: element.id, message: "部品タグ固定ですがタグが空です。", target: element.label || paletteLabel(element.type) });
              }
            }
