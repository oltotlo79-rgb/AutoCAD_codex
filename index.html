        dxfRectLocal(out, page, "SYMBOL", element, bodyX, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, h / 2, w, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + 1.1, h - .8, bodyX + bodyW - 1.1, .8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // 遮断器のDXF出力。
      function dxfBreakerLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        if (element.orientation === "vertical") {
          const cx = w / 2;
          const upper = Math.max(3, h * .32);
          const lower = Math.min(h - 3, h * .72);
          const bladeX = Math.max(1.1, cx - Math.min(2.25, w * .32));
          dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, upper - .65);
          dxfLineLocal(out, page, "SYMBOL", element, cx, lower + .65, cx, h);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, upper, .65);
          dxfCircleLocal(out, page, "SYMBOL", element, cx, lower, .65);
          dxfLineLocal(out, page, "SYMBOL", element, cx + .2, upper + .7, bladeX, lower - .3);
          dxfLineLocal(out, page, "SYMBOL", element, cx + 1.7, lower - 1.1, cx + 1.7, lower + 1.1);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w + 2.2, h / 2 + .7, 1.9, element.label);
          return;
        }
        const cy = h / 2;
        const left = Math.max(3, w * .32);
        const right = Math.min(w - 3, w * .72);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, left - .65, cy);
        dxfLineLocal(out, page, "SYMBOL", element, right + .65, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, left, cy, .65);
        dxfCircleLocal(out, page, "SYMBOL", element, right, cy, .65);
        dxfLineLocal(out, page, "SYMBOL", element, left + .7, cy - .2, right - .3, Math.max(1.1, cy - 2.25));
        dxfLineLocal(out, page, "SYMBOL", element, right - 1.1, cy + 1.7, right + 1.1, cy + 1.7);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // コイルのDXF出力。
      function dxfCoilLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 6);
        const cy = h / 2;
        const bodyX = Math.max(2.6, w * .24);
        const bodyW = Math.max(6, w - bodyX * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, bodyX, .8, bodyW, h - 1.6);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .35, 1.1, bodyX + bodyW * .35, h - 1.1);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW * .65, 1.1, bodyX + bodyW * .65, h - 1.1);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // 表示灯のDXF出力(筒形対応)。
      function dxfLampLocal(out, page, element) {
        const w = Number(element.w || 10);
        const h = Number(element.h || 10);
        if ((element.lampVariant || "pilot") === "cylinder") {
          const cy = h / 2;
          const bodyX = Math.max(3.5, w * .3);
          const bodyW = Math.max(5.5, w - bodyX * 2);
          const bodyY = Math.max(1.6, h * .18);
          const bodyH = h - bodyY * 2;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, bodyX, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX, bodyY + 1, bodyX, bodyY + bodyH - 1);
          dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, bodyY + 1, bodyX + bodyW, bodyY + bodyH - 1);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + 1, bodyW / 2, 1.2);
          dxfEllipseApproxLocal(out, page, "SYMBOL", element, bodyX + bodyW / 2, bodyY + bodyH - 1, bodyW / 2, 1.2);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        const r = Number(element.r || Math.min(w, h) * .34);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfLineLocal(out, page, "SYMBOL", element, cx - r * .45, cy, cx, cy - r * .32);
        dxfLineLocal(out, page, "SYMBOL", element, cx, cy - r * .32, cx + r * .45, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // ブザーのDXF出力。
      function dxfBuzzerLocal(out, page, element) {
        const w = Number(element.w || 14);
        const h = Number(element.h || 9);
        const cy = h / 2;
        if ((element.buzzerVariant || "horn") === "horn") {
          const throat = Math.max(4.2, w * .26);
          const mouthX = w - .4;
          dxfLineLocal(out, page, "SYMBOL", element, 0, cy, throat - .8, cy);
          dxfCircleLocal(out, page, "SYMBOL", element, throat, cy, .85);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy - 2.3, throat + 6.8, cy - 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy - 2.4, mouthX, cy - 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, throat + .7, cy + 2.3, throat + 6.8, cy + 2.4);
          dxfLineLocal(out, page, "SYMBOL", element, throat + 6.8, cy + 2.4, mouthX, cy + 4.9);
          dxfLineLocal(out, page, "SYMBOL", element, mouthX, cy - 4.9, w, cy - 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy - 2, w, cy + 2);
          dxfLineLocal(out, page, "SYMBOL", element, w, cy + 2, mouthX, cy + 4.9);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
          return;
        }
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .24, cy, w * .62, 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, 2.2, w * .62, h - 2.2);
        dxfLineLocal(out, page, "SYMBOL", element, w * .62, h - 2.2, w * .24, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w * .72, h * .3, w * .86, h * .42);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .42, w * .86, h * .58);
        dxfLineLocal(out, page, "SYMBOL", element, w * .86, h * .58, w * .72, h * .7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .84, h * .18, w, h * .38);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .38, w, h * .62);
        dxfLineLocal(out, page, "SYMBOL", element, w, h * .62, w * .84, h * .82);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // 電磁弁のDXF出力。
      function dxfSolenoidValveLocal(out, page, element) {
        const w = Number(element.w || 26);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const coilW = Math.max(7, w * .28);
        const bodyX = coilW + 2;
        const bodyW = Math.max(8, w - bodyX - 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 2.5, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 2.5, 2, coilW, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, 2, bodyX + bodyW, cy);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, bodyX, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX, h - 2, bodyX, 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, 2, bodyX + bodyW, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, bodyX + bodyW, cy, w, cy);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // センサのDXF出力。
      function dxfSensorLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 14);
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy, w, cy);
        dxfRectLocal(out, page, "SYMBOL", element, 4, 2, w - 8, h - 4);
        dxfLineLocal(out, page, "SYMBOL", element, 7, 5, w - 10, 5);
        dxfLineLocal(out, page, "SYMBOL", element, 7, h - 5, w - 7, h - 5);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy - 4, w, cy - 8);
        dxfLineLocal(out, page, "SYMBOL", element, w - 3, cy, w + 2, cy);
        dxfLineLocal(out, page, "SYMBOL", element, w - 4, cy + 4, w, cy + 8);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // ケーブル束のDXF出力。
      function dxfCableBundleLocal(out, page, element) {
        const w = Number(element.w || 32);
        const h = Number(element.h || 18);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .2, w, h * .2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .5, w, h * .5);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h * .8, w, h * .8);
        dxfRectLocal(out, page, "SYMBOL", element, w * .42, 1.5, w * .18, h - 3);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // 端子箱のDXF出力。
      function dxfTerminalBoxLocal(out, page, element) {
        const w = Number(element.w || 22);
        const h = Number(element.h || 18);
        const rows = Math.max(2, Number(element.rows || 3));
        dxfRectLocal(out, page, "SYMBOL", element, 0, 0, w, h);
        for (let i = 1; i < rows; i++) dxfLineLocal(out, page, "SYMBOL", element, 0, h * i / rows, w, h * i / rows);
        for (let i = 0; i < rows; i++) {
          const y = h * (i + .5) / rows;
          dxfLineLocal(out, page, "SYMBOL", element, -5, y, 0, y);
          dxfLineLocal(out, page, "SYMBOL", element, w, y, w + 5, y);
        }
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // 接地のDXF出力。
      function dxfGroundLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 14);
        const cx = w / 2;
        dxfLineLocal(out, page, "SYMBOL", element, cx, 0, cx, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .42, h * .45, cx + w * .42, h * .45);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .28, h * .68, cx + w * .28, h * .68);
        dxfLineLocal(out, page, "SYMBOL", element, cx - w * .14, h * .88, cx + w * .14, h * .88);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, h + 4, 2.3, element.label);
      }

      // モータのDXF出力。
      function dxfMotorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 18);
        const r = Number(element.r || Math.min(w, h) * .35);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfTextLocal(out, page, "TEXT", element, cx - 1.5, cy + .8, 3.4, "M");
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      // 抵抗のDXF出力。
      function dxfResistorLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 6);
        const lead = Math.min(4, Math.max(3, w * .22));
        const bodyW = Math.max(6, w - lead * 2);
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfRectLocal(out, page, "SYMBOL", element, lead, 0, bodyW, h);
        dxfLineLocal(out, page, "SYMBOL", element, lead + bodyW, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      // コンデンサのDXF出力。
      function dxfCapacitorLocal(out, page, element) {
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const cy = h / 2;
        const leftPlate = w / 2 - 1.2;
        const rightPlate = w / 2 + 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, leftPlate, cy);
        dxfLineLocal(out, page, "SYMBOL", element, rightPlate, cy, w, cy);
        dxfLineLocal(out, page, "SYMBOL", element, leftPlate, 1, leftPlate, h - 1);
        dxfLineLocal(out, page, "SYMBOL", element, rightPlate, 1, rightPlate, h - 1);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .65, -2.2, 1.9, element.label);
      }

      // ダイオードのDXF出力。
      function dxfDiodeLocal(out, page, element) {
        const w = Number(element.w || 18);
        const h = Number(element.h || 10);
        const lead = Math.min(4, Math.max(3, w * .2));
        const barX = w - lead - 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, lead, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, 1.2, barX, h / 2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, lead, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, lead, h - 1.2, lead, 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, 1.2, barX, h - 1.2);
        dxfLineLocal(out, page, "SYMBOL", element, barX, h / 2, w, h / 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      // サーマルリレーのDXF出力。
      function dxfThermalRelayLocal(out, page, element) {
        dxfContactLocal(out, page, element, false);
        const w = Number(element.w || 12);
        const h = Number(element.h || 7);
        const y = h + 1.1;
        dxfLineLocal(out, page, "SYMBOL", element, w * .25, y, w * .38, y - 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .38, y - 1.7, w * .5, y + 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .5, y + 1.7, w * .63, y - 1.7);
        dxfLineLocal(out, page, "SYMBOL", element, w * .63, y - 1.7, w * .88, y);
      }

      // ファンのDXF出力。
      function dxfFanLocal(out, page, element) {
        const w = Number(element.w || 16);
        const h = Number(element.h || 16);
        const r = Number(element.r || Math.min(w, h) * .38);
        const cx = w / 2;
        const cy = h / 2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, cx - r, cy);
        dxfLineLocal(out, page, "SYMBOL", element, cx + r, cy, w, cy);
        dxfCircleLocal(out, page, "SYMBOL", element, cx, cy, r);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .25, cy - r * .55, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx + r * .36, cy + r * .45, r * .36, r * .16);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, cx - r * .55, cy + r * .1, r * .36, r * .16);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, cx - String(element.label).length * .8, -3, 2.4, element.label);
      }

      // トランスのDXF出力。
      function dxfTransformerLocal(out, page, element) {
        const w = Number(element.w || 24);
        const h = Number(element.h || 16);
        const cy = h / 2;
        const leftX = Math.max(5, w * .3);
        const rightX = Math.min(w - 5, w * .7);
        const coreA = w / 2 - 1.2;
        const coreB = w / 2 + 1.2;
        dxfLineLocal(out, page, "SYMBOL", element, 0, cy, leftX - 4, cy);
        dxfLineLocal(out, page, "SYMBOL", element, rightX + 4, cy, w, cy);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, leftX - 2.7, cy, 3.2, h / 2 - 2);
        dxfEllipseApproxLocal(out, page, "SYMBOL", element, rightX + 2.7, cy, 3.2, h / 2 - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreA, 2, coreA, h - 2);
        dxfLineLocal(out, page, "SYMBOL", element, coreB, 2, coreB, h - 2);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2 - String(element.label).length * .8, -3, 2.4, element.label);
      }

      // 表示中の電気属性文字のDXF出力。
      function dxfVisibleAttributes(out, page, element) {
        if (!supportsElectricalAttributes(element)) return;
        const lines = visibleAttributeLines(element);
        if (!lines.length) return;
        const defaults = attributeDisplayDefaults(element);
        lines.forEach((line, index) => {
          dxfTextLocal(out, page, "ATTR", element, defaults.x, defaults.y + index * defaults.fontSize * 1.35, defaults.fontSize, line);
        });
      }

      // 画面y(下向き)→CAD y(上向き)への反転変換。
      function cadY(page, y) {
        return pageSize(page).h - y;
      }

      // 配線をDXF用線分列へ展開(ギャップで分割)。
      function dxfWireSegments(element) {
        const gaps = wireGapMarkers(element);
        if (!gaps.length) return wireSegments(element);
        return wireSegments(element).flatMap(segment => splitSegmentForDxfGaps(segment, gaps));
      }

      // 1線分をギャップ位置で複数線分へ分割。
      function splitSegmentForDxfGaps(segment, gaps) {
        const vertical = Math.abs(segment[0] - segment[2]) < .001;
        const fixed = vertical ? segment[0] : segment[1];
        const start = vertical ? segment[1] : segment[0];
        const end = vertical ? segment[3] : segment[2];
        const min = Math.min(start, end);
        const max = Math.max(start, end);
        const gapHalf = 3.2;
        const intervals = gaps
          .filter(gap => pointOnSegment(gap.x, gap.y, segment))
          .map(gap => {
            const center = vertical ? gap.y : gap.x;
            return { start: Math.max(min, center - gapHalf), end: Math.min(max, center + gapHalf) };
          })
          .filter(interval => interval.end > interval.start)
          .sort((a, b) => a.start - b.start);
        if (!intervals.length) return [segment];
        const merged = [];
        intervals.forEach(interval => {
          const last = merged[merged.length - 1];
          if (last && interval.start <= last.end) {
            last.end = Math.max(last.end, interval.end);
          } else {
            merged.push({ ...interval });
          }
        });
        const pieces = [];
        let cursor = min;
        merged.forEach(interval => {
          if (interval.start - cursor > .05) pieces.push([cursor, interval.start]);
          cursor = Math.max(cursor, interval.end);
        });
        if (max - cursor > .05) pieces.push([cursor, max]);
        return pieces.map(([a, b]) => vertical ? [fixed, a, fixed, b] : [a, fixed, b, fixed]);
      }

      // LINEエンティティ出力(絶対座標、線種指定可)。
      function dxfLine(out, page, layer, x1, y1, x2, y2, ltype) {
        out.push("0", "LINE", "8", layer);
        if (ltype) out.push("6", ltype);
        out.push("10", round(x1), "20", round(cadY(page, y1)), "11", round(x2), "21", round(cadY(page, y2)));
      }

      // TEXTエンティティ出力(絶対座標)。
      function dxfText(out, page, layer, x, y, size, text) {
        String(text || "").split("\n").forEach((line, index) => {
          out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y + index * size * 1.25)), "40", round(size), "1", line);
        });
      }

      // CIRCLEエンティティ出力(絶対座標)。
      function dxfCircle(out, page, layer, x, y, r) {
        out.push("0", "CIRCLE", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(r));
      }

      // 矩形をLINE4本で出力(絶対座標)。
      function dxfRect(out, page, layer, x, y, w, h) {
        dxfLine(out, page, layer, x, y, x + w, y);
        dxfLine(out, page, layer, x + w, y, x + w, y + h);
        dxfLine(out, page, layer, x + w, y + h, x, y + h);
        dxfLine(out, page, layer, x, y + h, x, y);
      }

      // 要素ローカルmm座標→回転を考慮した用紙絶対座標。dxfXxxLocal系の共通変換。
      function localPoint(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return [
          Number(element.x || 0) + x * cos - y * sin,
          Number(element.y || 0) + x * sin + y * cos
        ];
      }

      // 要素ローカル座標指定のLINE出力。
      function dxfLineLocal(out, page, layer, element, x1, y1, x2, y2, ltype) {
        const a = localPoint(element, x1, y1);
        const b = localPoint(element, x2, y2);
        dxfLine(out, page, layer, a[0], a[1], b[0], b[1], ltype);
      }

      // 要素ローカル座標指定のTEXT出力。
      function dxfTextLocal(out, page, layer, element, x, y, size, text) {
        const p = localPoint(element, x, y);
        dxfText(out, page, layer, p[0], p[1], size, text);
      }

      // 要素ローカル座標指定のCIRCLE出力。
      function dxfCircleLocal(out, page, layer, element, x, y, r) {
        const p = localPoint(element, x, y);
        dxfCircle(out, page, layer, p[0], p[1], r);
      }

      // 要素ローカル座標指定の矩形出力(線種指定可)。
      function dxfRectLocal(out, page, layer, element, x, y, w, h, ltype) {
        dxfLineLocal(out, page, layer, element, x, y, x + w, y, ltype);
        dxfLineLocal(out, page, layer, element, x + w, y, x + w, y + h, ltype);
        dxfLineLocal(out, page, layer, element, x + w, y + h, x, y + h, ltype);
        dxfLineLocal(out, page, layer, element, x, y + h, x, y, ltype);
      }

      // 端子1点(円/角)のDXF出力。
      function dxfTerminalNodeLocal(out, page, layer, element, cx, cy, r, shape) {
        if (shape === "square") {
          dxfRectLocal(out, page, layer, element, cx - r, cy - r, r * 2, r * 2);
          return;
        }
        dxfCircleLocal(out, page, layer, element, cx, cy, r);
      }

      // 楕円を折れ線近似でDXF出力。
      function dxfEllipseApproxLocal(out, page, layer, element, cx, cy, rx, ry) {
        const steps = 32;
        let prev = null;
        for (let i = 0; i <= steps; i++) {
          const angle = Math.PI * 2 * i / steps;
          const point = [cx + Math.cos(angle) * rx, cy + Math.sin(angle) * ry];
          if (prev) dxfLineLocal(out, page, layer, element, prev[0], prev[1], point[0], point[1]);
          prev = point;
        }
      }

      // ページ設定入力(用紙/向き/図枠/図名等)の変更をstateへ反映する共通ハンドラ。
      function updatePageField(id, apply) {
        qs("#" + id).addEventListener("change", event => {
          const page = currentPage();
          if (!page) return;
          apply(page, event.target.value);
          commitHistory("ページ設定を更新しました。");
          render();
        });

        const svg = qs("#canvas");

          const type = event.dataTransfer.getData("text/plain");
          const point = canvasPoint(event);
          if (type) placeElement(type, point.x, point.y);
        });
        svg.addEventListener("pointerdown", onCanvasPointerDown);
        svg.addEventListener("pointermove", onCanvasPointerMove);
        svg.addEventListener("pointerup", onCanvasPointerUp);
        svg.addEventListener("pointercancel", onCanvasPointerUp);
        svg.addEventListener("dblclick", onCanvasDoubleClick);
        svg.addEventListener("wheel", onCanvasWheel, { passive: false });

        window.addEventListener("keydown", onKeyDown);
      }

      // Ctrl+ホイールでズーム(カーソル位置基準)。
      function onCanvasWheel(event) {
        if (!event.ctrlKey && !event.metaKey) return;
        event.preventDefault();
        const delta = event.deltaY < 0 ? .25 : -.25;
        setZoom(state.settings.zoom + delta, false);
      }

      // キャンバス押下の入口。優先順: 点編集ハンドル → リサイズハンドル → 作図ツール(配線/直線等の開始) →
      // 部品配置 → 要素選択(移動開始) → 空白(範囲選択開始)。選択はevent.targetのdata-id基準。
      function onCanvasPointerDown(event) {
        const svg = qs("#canvas");
        const point = canvasPoint(event, { connectionOnly: activeTool === "wire", raw: activeTool === "select" });
        const pointHandle = event.target.closest("[data-point-index]");
        if (pointHandle) {
          const element = selectedElement();
          const pointIndex = Number(pointHandle.dataset.pointIndex);
          if (!element || !element.points?.[pointIndex]) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "point",
            elementId: element.id,
            pointIndex,
            start: point,
            original: deepClone(element)
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          event.stopPropagation();
          render();
          return;
        }
        const resizeHandle = event.target.closest("[data-resize-handle]");
        if (resizeHandle) {
          const element = selectedElement();
          if (!element || !canResizeElement(element)) return;
          if (isElementLocked(element)) {
            setStatus("ロックされた要素は変更できません。");
            render();
            return;
          }
          dragState = {
            mode: "resize",
            elementId: element.id,
            handle: resizeHandle.dataset.resizeHandle,
            start: point,
            original: deepClone(element),
            originalBox: elementBounds(element)
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          event.stopPropagation();
          render();
          return;
        }
        const targetElement = event.target.closest("[data-id]");
        if (activeTool === "wire" || activeTool === "arrow" || activeTool === "line" || activeTool === "mechanicalLink" || activeTool === "dimension") {
          const element = defaultElement(activeTool, point.x, point.y);
          element.points = [[point.x, point.y], [point.x, point.y]];
          currentPage().elements.push(element);
          selectSingle(element.id);
          dragState = { mode: "draw", elementId: element.id, start: point };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
          return;
        }
        if (activeTool !== "select" && activeTool !== "wire" && activeTool !== "arrow" && activeTool !== "mechanicalLink") {
          placeElement(activeTool, point.x, point.y);
          return;
        }
        if (targetElement) {
          const targetId = targetElement.dataset.id;
          if (event.shiftKey) {
            toggleSelection(targetId);
            render();
            return;
          }
          if (!selectedIds.includes(targetId)) selectSingle(targetId);
          expandSelectionToGroups();
          const element = selectedElement();
          if (isElementLocked(element)) {
            setStatus("ロックされた要素です。ロック解除すると移動できます。");
            render();
            return;
          }
          if (selectedElements().some(isElementLocked)) {
            setStatus("ロックされた要素が含まれています。ロック解除すると移動できます。");
            render();
            return;
          }
          dragState = {
            mode: "move",
            elementId: targetId,
            start: point,
            originals: selectedElements().map(item => deepClone(item)),
            attachedWires: currentPage().elements
              .filter(item => item.type === "wire" && !currentSelectionIdSet().has(item.id))
              .map(item => deepClone(item))
          };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
        } else {
          if (!event.shiftKey) setSelection([]);
          dragState = { mode: "marquee", start: point, current: point, append: event.shiftKey, originalIds: [...selectedIds] };
          try { svg.setPointerCapture(event.pointerId); } catch (_) { /* 合成イベント等でキャプチャ不可の場合は無視 */ }
          render();
        }
      }

      // ドラッグ中の処理。dragState.modeで分岐: draw=配線/直線の終点更新(直交スナップ)、move=選択移動
      // (グリッド/行スナップした差分で全要素+接続配線端点を追従)、resize/point/marqueeも同様。
      function onCanvasPointerMove(event) {
        if (!dragState) return;
        const page = currentPage();
        const activeDragElement = page?.elements.find(item => item.id === dragState.elementId);
        const point = canvasPoint(event, {
          excludeSelected: ["move", "resize", "point", "draw"].includes(dragState.mode),
          connectionOnly: activeDragElement?.type === "wire" && ["draw", "point"].includes(dragState.mode)
        });
        if (dragState.mode === "marquee") {
          dragState.current = point;
          render();
          return;
        }
        if (dragState.mode === "resize") {
          applyResizeDrag(point);
          render();
          return;
        }
        if (dragState.mode === "point") {
          applyPointDrag(point);
          render();
          return;
        }
        const element = selectedElement();
        if (!element) return;
        if (dragState.mode === "draw") {
          element.points[element.points.length - 1] = [point.x, point.y];
          render();
          return;
        }
        if (dragState.mode === "move") {
          let dx = point.x - dragState.start.x;
          let dy = point.y - dragState.start.y;
          if (state.settings.snap) {
            const gridStep = Number(state.settings.grid || 2.5);
            const rawDy = dy;
            dx = Math.round(dx / gridStep) * gridStep;
            dy = Math.round(dy / gridStep) * gridStep;
            if (page && page.frameVariant === "ladder" && (dragState.originals || []).length) {
              // 行磁気スナップは要素中心ではなく接続ピンの高さを基準にする
              // (押しボタン等ピンが中心にない部品でも配線高さが行に乗るように)。
              const first = dragState.originals[0];
              const anchors0 = elementConnectionAnchors(first);
              const box0 = elementBounds(first);
              const cy0 = anchors0 && anchors0.length ? anchors0[0].y : (box0 ? box0.y + box0.h / 2 : null);
              if (cy0 !== null) {
                const targetY = cy0 + rawDy;
                const row = LADDER_GRID.top + LADDER_GRID.pitch * Math.round((targetY - LADDER_GRID.top) / LADDER_GRID.pitch);
                if (Math.abs(row - targetY) <= 2.5) dy = round(row - cy0);
              }
            }
          }
          const snapDelta = movementSnapDelta(dragState.originals || [], dx, dy);
          dx += snapDelta.dx;
          dy += snapDelta.dy;
          (dragState.originals || []).forEach(original => {
            const target = page.elements.find(item => item.id === original.id);
            if (!target) return;
            if (target.points) {
              target.points = original.points.map(p => [p[0] + dx, p[1] + dy]);
            } else {
              target.x = Number(original.x || 0) + dx;
              target.y = Number(original.y || 0) + dy;
            }
          });
          syncAttachedWireEndpoints(page, dragState.originals || [], dragState.attachedWires || [], dx, dy);
          render();
        }
      }

      // 部品移動に合わせ、部品接続点に刺さっていた配線端点を追従させる。
      function syncAttachedWireEndpoints(page, originals, wireOriginals, dx, dy) {
        const pairs = [];
        originals.forEach(original => {
          if (!original || original.points) return;
          const oldAnchors = componentConnectionAnchors(original);
          if (!oldAnchors.length) return;
          const moved = deepClone(original);
          moved.x = Number(moved.x || 0) + dx;
          moved.y = Number(moved.y || 0) + dy;
          const newAnchors = componentConnectionAnchors(moved);
          oldAnchors.forEach((oldAnchor, index) => {
            const next = newAnchors[index];
            if (next) pairs.push({ oldAnchor, newAnchor: next });
          });
        });
        if (!pairs.length) return;
        const selectedSet = currentSelectionIdSet();
        wireOriginals.forEach(originalWire => {
          const wire = page.elements.find(item => item.id === originalWire.id);
          if (!wire || selectedSet.has(wire.id) || !wire.points) return;
          const lastIndex = originalWire.points.length - 1;
          wire.points = originalWire.points.map((point, index) => {
            if (index !== 0 && index !== lastIndex) return [round(point[0]), round(point[1])];
            let pair = null;
            pairs.forEach(item => {
              const d = Math.hypot(point[0] - item.oldAnchor.x, point[1] - item.oldAnchor.y);
              if (d <= SNAP_RADIUS_MM && (!pair || d < pair.d)) pair = { ...item, d };
            });
            return pair ? [round(pair.newAnchor.x), round(pair.newAnchor.y)] : [round(point[0]), round(point[1])];
          });
        });
      }

      // 移動追従で使う要素の接続点一覧(配線を除く)。
      function componentConnectionAnchors(element) {
        if (!element || element.points) return [];
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.nodes || geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        return elementConnectionAnchors(element);
      }

      // 移動差分をグリッド/設備標準行ピッチへスナップした値に補正(設置後のズレ防止)。
      function movementSnapDelta(originals, dx, dy) {
        if (!state.settings.objectSnap || !originals.length) return { dx: 0, dy: 0 };
        const page = currentPage();
        const excludeIds = new Set(originals.map(original => original.id));
        const targets = collectSnapAnchors(page, excludeIds);
        let best = null;
        originals.flatMap(original => movedElementAnchors(original, dx, dy)).forEach(source => {
          targets.forEach(target => {
            const d = Math.hypot(target.x - source.x, target.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: target.x - source.x, dy: target.y - source.y };
            }
          });
          const segmentTarget = closestSegmentSnapPoint(page, source.x, source.y, excludeIds);
          if (segmentTarget) {
            const d = Math.hypot(segmentTarget.x - source.x, segmentTarget.y - source.y);
            if (d <= SNAP_RADIUS_MM && (!best || d < best.d)) {
              best = { d, dx: segmentTarget.x - source.x, dy: segmentTarget.y - source.y };
            }
          }
        });
        return best ? { dx: best.dx, dy: best.dy } : { dx: 0, dy: 0 };
      }

      // 移動後の接続点位置を計算(追従判定用)。
      function movedElementAnchors(original, dx, dy) {
        const element = deepClone(original);
        if (element.points) {
          element.points = element.points.map(point => [point[0] + dx, point[1] + dy]);
          return (element.points || []).map(point => ({ x: point[0], y: point[1] }));
        }
        element.x = Number(element.x || 0) + dx;
        element.y = Number(element.y || 0) + dy;
        if (element.type === "junction") return [{ x: element.x || 0, y: element.y || 0 }];
        if (element.type === "terminalStrip" || element.type === "connector") {
          const geo = terminalStripGeometry(element);
          return Array.from({ length: geo.nodes || geo.count }, (_, index) => terminalStripNodeGlobal(element, index));
        }
        const anchors = elementConnectionAnchors(element);
        if (anchors.length) return anchors;
        const box = elementBounds(element);
        return box ? [{ x: box.x + box.w / 2, y: box.y + box.h / 2 }] : [];
      }

      // 移動後の要素の接続点を近傍の配線端点へ吸着。
      function snapPointElementConnections(element, page) {
        if (!element || !page || !element.points?.length || !state.settings.objectSnap) return;
        const excludeIds = new Set([element.id]);
        const lastIndex = element.points.length - 1;
        const targetIndices = element.type === "wire" ? [0, lastIndex] : element.points.map((_, index) => index);
        targetIndices.forEach(index => {
          const point = element.points[index];
          if (!point) return;
          const snapped = snapConnectionPoint(page, point[0], point[1], excludeIds);
          element.points[index] = [round(snapped.x), round(snapped.y)];
        });
      }

      // 接続点候補への吸着(半径内で最近点)。
      function snapConnectionPoint(page, x, y, excludeIds = new Set()) {
        const anchor = closestAnchor(collectConnectionAnchors(page, excludeIds), x, y);
        if (anchor) return { x: anchor.x, y: anchor.y };
        const segment = closestSegmentSnapPoint(page, x, y, excludeIds);
        return segment || { x, y };
      }

      // ドラッグ確定。mode別に履歴記録し、marqueeなら範囲内要素を選択。
      function onCanvasPointerUp(event) {
        if (!dragState) return;
        const finishedDrag = dragState;
        try {
          qs("#canvas").releasePointerCapture(event.pointerId);
        } catch (_) {
          // ブラウザ側で既にポインタ解放済みの場合があるため失敗は無視する。
        }
        if (dragState.mode === "marquee") {
          applyMarqueeSelection(dragState);
          dragState = null;
          render();
          return;
        }
        const page = currentPage();
        const touchedIds = finishedDrag.mode === "move"
          ? (finishedDrag.originals || []).map(original => original.id)
          : [finishedDrag.elementId].filter(Boolean);
        touchedIds.forEach(id => snapPointElementConnections(page?.elements.find(item => item.id === id), page));
        const element = selectedElement();
        if (element && element.points) {
          const a = element.points[0];
          const b = element.points[element.points.length - 1];
          if (Math.abs(a[0] - b[0]) < .5 && Math.abs(a[1] - b[1]) < .5) {
            currentPage().elements = currentPage().elements.filter(item => item.id !== element.id);
            setSelection([]);
          }
        }
        dragState = null;
        commitHistory("作図を更新しました。");
        render();
      }

      // 範囲選択の確定(交差する表示中要素を選択、Shiftで追加)。
      function applyMarqueeSelection(marquee) {
        const page = currentPage();
        if (!page) return;
        const rect = normalizedRect(marquee.start, marquee.current || marquee.start);
        if (rect.w < .8 && rect.h < .8) {
          if (!marquee.append) setSelection([]);
          return;
        }
        const hits = page.elements
          .filter(element => element.type !== "underlayImage")
          .filter(isElementVisible)
          .filter(element => {
            const box = elementBounds(element);
            return box && boundsIntersect(rect, box);
          })
          .map(element => element.id);
        if (marquee.append) {
          setSelection(Array.from(new Set([...(marquee.originalIds || []), ...hits])));
        } else {
          setSelection(hits);
        }
      }

      // 角ハンドルドラッグによるリサイズ確定処理(最小寸法クランプ)。
      function applyResizeDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        const box = dragState.originalBox;
        if (!element || !box) return;
        const minSize = 2.5;
        let x = box.x;
        let y = box.y;
        let w = box.w;
        let h = box.h;
        const right = box.x + box.w;
        const bottom = box.y + box.h;
        if (dragState.handle.includes("e")) {
          w = Math.max(minSize, point.x - box.x);
        }
        if (dragState.handle.includes("s")) {
          h = Math.max(minSize, point.y - box.y);
        }
        if (dragState.handle.includes("w")) {
          x = Math.min(point.x, right - minSize);
          w = right - x;
        }
        if (dragState.handle.includes("n")) {
          y = Math.min(point.y, bottom - minSize);
          h = bottom - y;
        }
        element.x = round(x);
        element.y = round(y);
        element.w = round(w);
        element.h = round(h);
      }

      // 折れ点ハンドルのドラッグ反映。
      function applyPointDrag(point) {
        const page = currentPage();
        const element = page?.elements.find(item => item.id === dragState.elementId);
        if (!element || !element.points?.[dragState.pointIndex]) return;
        element.points[dragState.pointIndex] = [round(point.x), round(point.y)];
      }

      // ダブルクリック編集(文字=本文、配線=線番、他=ラベルのプロンプト)。
      function onCanvasDoubleClick(event) {
        const targetElement = event.target.closest("[data-id]");
        if (!targetElement) return;
        selectSingle(targetElement.dataset.id);
        const element = selectedElement();
        if (!element) return;
        if (element.type === "text") {
          const text = prompt("文字を入力", element.text || "");
          if (text !== null) {
            element.text = text;
            commitHistory("文字を更新しました。");
            render();
          }
        } else if (element.type === "wire") {
          const text = prompt("線番を入力", element.wireNo || "");
          if (text !== null) {
            element.wireNo = text;
            commitHistory("線番を更新しました。");
            render();
          }
        } else {
          const text = prompt("ラベルを入力", element.label || "");
          if (text !== null) {
            element.label = text;
            commitHistory("ラベルを更新しました。");
            render();
          }
        }
      }

      // キーボードショートカット。S/V=選択 W=配線 T=文字 L=直線 R=矩形 C=円、Ctrl+C/V/D/Z/Y/S、
      // Delete=削除、矢印=1mm移動(Shiftで5mm)、Esc=配置キャンセル。入力欄フォーカス中は無視。
      function onKeyDown(event) {
        const tag = document.activeElement?.tagName;
        const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(tag);
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          saveProject();
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          restoreHistory(historyIndex - 1);
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
          event.preventDefault();
          restoreHistory(historyIndex + 1);
          return;
        }
        if (editing) return;
        if (!event.ctrlKey && !event.metaKey && !event.altKey) {
          const toolShortcuts = { s: "select", v: "select", w: "wire", t: "text", l: "line", r: "rect", c: "circle" };
          const tool = toolShortcuts[event.key.toLowerCase()];
          if (tool) {
            event.preventDefault();
            setActiveTool(tool);
            return;
          }
        }
        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
          event.preventDefault();
          copySelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v") {
          event.preventDefault();
          pasteClipboard();
        }
        const nudge = event.shiftKey ? 5 : 1;
        const arrows = { ArrowLeft: [-nudge, 0], ArrowRight: [nudge, 0], ArrowUp: [0, -nudge], ArrowDown: [0, nudge] };
        if (arrows[event.key] && selectedElement()) {
          event.preventDefault();
          moveSelected(arrows[event.key][0], arrows[event.key][1]);
          commitHistory("要素を移動しました。");
          render();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "d") {
          event.preventDefault();
          duplicateSelected();
        }
      }

      attachEvents();
      initProject();
    })();
  </script>
</body>
</html>
