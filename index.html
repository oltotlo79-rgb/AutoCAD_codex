          diode: { ...base, w: 24, h: 16, label: "D" },
          deviceBox: { ...base, w: 46, h: 30, label: "機器", pins: 4, pinText: "1\n2\n3\n4" },
          plcBlock: { ...base, w: 50, h: 60, label: "PLC", rows: 8, pinText: "I00\nI01\nI02\nI03\nO00\nO01\nO02\nO03" },
          connector: { ...base, w: 70, h: 10, count: 10, start: 1, prefix: "", label: "CN" },
          cableMarker: { ...base, w: 28, h: 12, label: "C" },
          table: { ...base, w: 86, h: 48, rows: 6, cols: 4, label: "表", cellText: "No.\t項目\t内容\t備考" },
          junction: { ...base, w: 4, h: 4, r: 1.45, label: "" },
          arrow: { id: uid("el"), type: "arrow", points: [[x, y], [x + 30, y]], label: "REF", stroke: state.settings.stroke },
          wire: { id: uid("el"), type: "wire", points: [[x, y], [x + 30, y]], wireNo: "", wireType: state.settings.currentWireType, stroke: state.settings.stroke }
        };
        return deepClone(defaults[type] || defaults.deviceBox);
      }

      function canvasPoint(event) {
        const svg = qs("#canvas");
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        const transformed = point.matrixTransform(svg.getScreenCTM().inverse());
        return { x: snap(transformed.x), y: snap(transformed.y) };
      }

      function snap(value) {
        if (!state.settings.snap) return value;
        const grid = Number(state.settings.grid || 2.5);
        return Math.round(value / grid) * grid;
      }

      function placeElement(type, x, y) {
        const page = currentPage();
        if (!page) return;
        if (String(type).startsWith("custom:")) {
          placeCustomSymbol(type.slice("custom:".length), x, y);
          return;
        }
        if (type === "terminalSheet") {
          addTerminalSheet(page, x, y);
          commitHistory("端子配線セットを配置しました。");
          render();
          return;
        }
        const element = defaultElement(type, x, y);
        page.elements.push(element);
        selectedId = element.id;
        commitHistory("要素を配置しました。");
        setActiveTool("select");
        render();
      }

      function placeCustomSymbol(id, x, y) {
        const symbol = (state.customSymbols || []).find(item => item.id === id);
        const page = currentPage();
        if (!symbol || !page) return;
        const element = deepClone(symbol.template);
        element.id = uid("el");
        if (element.points) {
          element.points = element.points.map(point => [point[0] + x, point[1] + y]);
        } else {
          element.x = x;
          element.y = y;
        }
        page.elements.push(element);
        selectedId = element.id;
        commitHistory("ユーザー部品を配置しました。");
        setActiveTool("select");
        render();
      }

      function addTerminalSheet(page, x, y) {
        const strip = defaultElement("terminalStrip", x, y);
        strip.w = 138;
        strip.count = 16;
        strip.label = "X1";
        page.elements.push(strip);
        for (let i = 0; i < strip.count; i++) {
          const px = x + (strip.w / strip.count) * i + (strip.w / strip.count) / 2;
          page.elements.push({
            id: uid("el"),
            type: "wire",
            points: [[px, y + 7], [px, y + 72]],
            wireNo: "W" + String(i + 1).padStart(2, "0"),
            wireType: state.settings.currentWireType,
            stroke: state.settings.stroke
          });
          page.elements.push({
            id: uid("el"),
            type: "text",
            x: px - 3,
            y: y + 79,
            w: 12,
            h: 5,
            text: String(i + 1).padStart(2, "0"),
            fontSize: 2.5,
            rotation: -90,
            stroke: state.settings.stroke
          });
        }
        selectedId = strip.id;
      }

      function setActiveTool(tool) {
        activeTool = tool;
        qsa("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === tool));
        renderPalette();
        setStatus(tool === "select" ? "選択ツールです。" : paletteLabel(tool) + "を配置できます。");
      }

      function applyStandard(id) {
        const standard = STANDARDS.find(item => item.id === id) || STANDARDS[0];
        state.settings.standard = standard.id;
        state.settings.grid = standard.grid;
        state.settings.wireNumberFormat = standard.wireNumberFormat;
        const page = currentPage();
        if (page && !page.frameVariant) page.frameVariant = standard.frameVariant;
      }

      function addPage() {
        const base = currentPage();
        const page = createPage({
          name: "P" + (state.pages.length + 1),
          size: base?.size || "A4",
          orientation: base?.orientation || "portrait",
          frameVariant: base?.frameVariant || "detailed"
        });
        state.pages.push(page);
        state.activePageId = page.id;
        selectedId = null;
        commitHistory("ページを追加しました。");
        render();
      }

      function duplicatePage() {
        const page = currentPage();
        if (!page) return;
        const copy = deepClone(page);
        copy.id = uid("page");
        copy.name = page.name + " copy";
        copy.elements = copy.elements.map(element => ({ ...element, id: uid("el") }));
        state.pages.push(copy);
        state.activePageId = copy.id;
        selectedId = null;
        commitHistory("ページを複製しました。");
        render();
      }

      function deletePage() {
        if (state.pages.length <= 1) {
          setStatus("最後の1ページは削除できません。");
          return;
        }
        const index = state.pages.findIndex(page => page.id === state.activePageId);
        state.pages.splice(index, 1);
        state.activePageId = state.pages[Math.max(0, index - 1)].id;
        selectedId = null;
        commitHistory("ページを削除しました。");
        render();
      }

      function addSampleTerminalPage() {
        const page = createPage({
          name: "端子図" + (state.pages.length + 1),
          size: "A4",
          orientation: "landscape",
          frameVariant: "side",
          title: "端子接続図"
        });
        const startX = 42;
        const startY = 50;
        const stripW = 178;
        const count = 20;
        page.elements.push({
          id: uid("el"),
          type: "text",
          x: 18,
          y: 28,
          w: 70,
          h: 8,
          text: "端子接続図",
          fontSize: 4,
          rotation: 0,
          stroke: state.settings.stroke
        });
        page.elements.push({
          id: uid("el"),
          type: "terminalStrip",
          x: startX,
          y: startY,
          w: stripW,
          h: 12,
          count,
          start: 1,
          prefix: "",
          label: "X1",
          rotation: 0,
          stroke: state.settings.stroke
        });
        for (let i = 0; i < count; i++) {
          const pitch = stripW / count;
          const x = startX + pitch * i + pitch / 2;
          const y2 = i % 5 === 4 ? 142 : 156;
          page.elements.push({
            id: uid("el"),
            type: "wire",
            points: [[x, startY + 8], [x, y2]],
            wireNo: "W" + String(i + 1).padStart(2, "0"),
            wireType: state.settings.currentWireType,
            stroke: state.settings.stroke
          });
          page.elements.push({
            id: uid("el"),
            type: "text",
            x: x - 2,
            y: startY - 9,
            w: 24,
            h: 5,
            text: "信号" + String(i + 1).padStart(2, "0"),
            fontSize: 2.4,
            rotation: -90,
            stroke: state.settings.stroke
          });
          page.elements.push({
            id: uid("el"),
            type: "terminal",
            x,
            y: y2,
            w: 20,
            h: 10,
            label: String(i + 1).padStart(2, "0"),
            rotation: 90,
            stroke: state.settings.stroke
          });
        }
        page.elements.push({
          id: uid("el"),
          type: "arrow",
          points: [[18, 160], [238, 160]],
          label: "次ページへ",
          stroke: state.settings.stroke
        });
        state.pages.push(page);
        state.activePageId = page.id;
        selectedId = null;
        commitHistory("見本風ページを追加しました。");
        render();
      }

      function addIndexPage() {
        const page = createPage({
          name: "目次" + (state.pages.length + 1),
          size: "A4",
          orientation: "portrait",
          frameVariant: "index",
          title: "図面目次"
        });
        page.elements.push({
          id: uid("el"),
          type: "table",
          x: 28,
          y: 52,
          w: 150,
          h: 170,
          rows: 16,
          cols: 4,
          label: "図面目次",
          cellText: "No.\t図番\t図名\t備考\n1\t\t\t\n2\t\t\t\n3\t\t\t",
          rotation: 0,
          stroke: state.settings.stroke
        });
        state.pages.push(page);
        state.activePageId = page.id;
        selectedId = null;
        commitHistory("目次ページを追加しました。");
        render();
      }

      function addIoPage() {
        const page = createPage({
          name: "I-O" + (state.pages.length + 1),
          size: "A4",
          orientation: "landscape",
          frameVariant: "side",
          title: "PLC I/O 接続図"
        });
        page.elements.push({
          id: uid("el"),
          type: "text",
          x: 18,
          y: 26,
          w: 80,
          h: 8,
          text: "PLC I/O 接続図",
          fontSize: 4,
          rotation: 0,
          stroke: state.settings.stroke
        });
        const plc = defaultElement("plcBlock", 118, 46);
        plc.w = 58;
        plc.h = 94;
        plc.rows = 16;
        plc.label = "PLC-01";
        plc.pinText = "I00\nI01\nI02\nI03\nI04\nI05\nI06\nI07\nO00\nO01\nO02\nO03\nO04\nO05\nO06\nO07";
        page.elements.push(plc);
        for (let i = 0; i < 16; i++) {
          const y = 58 + i * 5;
          const left = i < 8;
          const x1 = left ? 30 : 176;

      function deleteSelected() {
        const page = currentPage();
        if (!page || !selectedId) return;
        page.elements = page.elements.filter(element => element.id !== selectedId);
        selectedId = null;
        commitHistory("要素を削除しました。");
        render();
      }

      function duplicateSelected() {
        const element = selectedElement();
        const page = currentPage();
        if (!element || !page) return;
        const copy = deepClone(element);
        copy.id = uid("el");
        if (copy.points) copy.points = copy.points.map(point => [point[0] + 6, point[1] + 6]);
        else {
          copy.x = Number(copy.x || 0) + 6;
          copy.y = Number(copy.y || 0) + 6;
        }
        page.elements.push(copy);
        selectedId = copy.id;
        commitHistory("要素を複製しました。");

      function copySelected() {
        const element = selectedElement();
        if (!element) return;
        clipboardElement = deepClone(element);
        setStatus("選択中の要素をコピーしました。Ctrl+Vで貼り付けできます。");
      }

      function pasteClipboard() {
        if (!clipboardElement) {
          setStatus("貼り付ける要素がありません。");
          return;
        }
        const page = currentPage();
        if (!page) return;
        const copy = deepClone(clipboardElement);
        copy.id = uid("el");
        if (copy.points) {
          copy.points = copy.points.map(point => [point[0] + 6, point[1] + 6]);
        } else {
          copy.x = Number(copy.x || 0) + 6;
          copy.y = Number(copy.y || 0) + 6;
        }
        page.elements.push(copy);
        selectedId = copy.id;
        clipboardElement = deepClone(copy);
        commitHistory("貼り付けました。");

      function bringSelectedForward() {
        const page = currentPage();
        if (!page || !selectedId) return;
        const index = page.elements.findIndex(element => element.id === selectedId);
        if (index < 0 || index === page.elements.length - 1) return;
        const [element] = page.elements.splice(index, 1);
        page.elements.splice(index + 1, 0, element);
        commitHistory("要素を前面へ移動しました。");
        render();
      }

      function sendSelectedBackward() {
        const page = currentPage();
        if (!page || !selectedId) return;
        const index = page.elements.findIndex(element => element.id === selectedId);
        if (index <= 0) return;
        const [element] = page.elements.splice(index, 1);
        page.elements.splice(index - 1, 0, element);
        commitHistory("要素を背面へ移動しました。");
        render();
      }

      function registerSelectedAsSymbol() {
        const element = selectedElement();
        if (!element) {
          setStatus("登録する要素を選択してください。");
          return;
        }
        const defaultName = (element.label || element.text || paletteLabel(element.type) || "ユーザー部品").toString();
        const label = prompt("ユーザー部品名", defaultName);
        if (!label) return;
        const template = deepClone(element);
        delete template.id;
        if (template.points) {
          const xs = template.points.map(point => point[0]);
          const ys = template.points.map(point => point[1]);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          template.points = template.points.map(point => [point[0] - minX, point[1] - minY]);
        } else {
          template.x = 0;
          template.y = 0;
        }
        state.customSymbols.push({
          id: uid("sym"),
          label,
          template
        });
        commitHistory("ユーザー部品を登録しました。");
        render();
      }

      function moveSelected(dx, dy) {
        const element = selectedElement();
        if (!element) return;
        if (element.points) {
          element.points = element.points.map(point => [point[0] + dx, point[1] + dy]);
        } else {
          element.x = Number(element.x || 0) + dx;
          element.y = Number(element.y || 0) + dy;
        }
      }

      function serializeActiveSvg() {
        const page = currentPage();
        const size = pageSize(page);
        const clone = qs("#canvas").cloneNode(true);
        clone.setAttribute("xmlns", svgNS);
        clone.setAttribute("width", size.w + "mm");
        clone.setAttribute("height", size.h + "mm");
        clone.querySelectorAll(".selection-box,.selection-handle").forEach(node => node.remove());
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
      }

      function download(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function saveProject() {
        syncPageTotals();
        const name = "electrical-drawing-" + new Date().toISOString().replace(/[:.]/g, "-") + ".json";
        download(name, JSON.stringify(state, null, 2), "application/json");
        setStatus("JSONを保存しました。");
      }

      function restoreLocalBackup() {
        let snapshot = "";
        try {
          snapshot = localStorage.getItem("electricalDrawingStudio.backup") || "";
        } catch (_) {
          setStatus("ブラウザ内バックアップを読めません。");
          return;
        }
        if (!snapshot) {
          setStatus("復元できるバックアップがありません。");
          return;
        }
        if (!confirm("ブラウザ内の自動保存データを復元しますか？\n現在の画面内容は置き換わります。")) return;
        try {
          const restored = JSON.parse(snapshot);
          if (!restored.pages || !Array.isArray(restored.pages)) throw new Error("pages が見つかりません。");
          Object.assign(state, restored);
          selectedId = null;
          pageCounter = state.pages.length + 1;
          resetHistory();
          render();
          setStatus("ブラウザ内バックアップを復元しました。");
        } catch (error) {
          setStatus("復元に失敗しました: " + error.message);
        }
      }

      function openProjectFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const loaded = JSON.parse(reader.result);
            if (!loaded.pages || !Array.isArray(loaded.pages)) throw new Error("pages が見つかりません。");
            state.app = loaded.app || state.app;
            state.version = loaded.version || state.version;
            state.settings = { ...state.settings, ...(loaded.settings || {}) };
            state.wireTypes = loaded.wireTypes || state.wireTypes;
            state.customSymbols = loaded.customSymbols || [];
            state.project = { ...state.project, ...(loaded.project || {}) };
            state.pages = loaded.pages;
            state.activePageId = loaded.activePageId || state.pages[0].id;
            pageCounter = state.pages.length + 1;
            selectedId = null;
            resetHistory();
            render();
            setStatus("JSONを読み込みました。");
          } catch (error) {
            setStatus("読み込みに失敗しました: " + error.message);
          }
        };
        reader.readAsText(file);
      }

      function exportSvg() {
        download((currentPage().name || "page") + ".svg", serializeActiveSvg(), "image/svg+xml");
        setStatus("SVGを書き出しました。");
      }

      function exportPng() {
        const svg = serializeActiveSvg();
        const page = currentPage();
        const size = pageSize(page);
        const scale = 4;
        const image = new Image();
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(size.w * scale);
          canvas.height = Math.round(size.h * scale);
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(pngBlob => {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(pngBlob);
            link.download = (page.name || "page") + ".png";
            link.click();
            URL.revokeObjectURL(link.href);
          }, "image/png");
        };
        image.src = url;
        setStatus("PNGを書き出しました。");
      }

      function syncPrintSheets() {
        const container = qs("#printSheets");
        container.innerHTML = "";
        if (printMode === "two-up") {
          syncPrintSheetsTwoUp(container);
          return;
        }
        state.pages.forEach(page => {
          const size = pageSize(page);
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-" + String(page.size || "A4").toLowerCase() + "-" + String(page.orientation || "portrait");
          sheet.style.width = size.w + "mm";
          sheet.style.height = size.h + "mm";
          const svg = svgEl("svg", { xmlns: svgNS, role: "img", "aria-label": page.name || "page" });
          drawPageSvg(svg, page, { selection: false, scaled: false });
          sheet.appendChild(svg);
          container.appendChild(sheet);
        });
      }

      function syncPrintSheetsTwoUp(container) {
        for (let i = 0; i < state.pages.length; i += 2) {
          const sheet = document.createElement("div");
          sheet.className = "print-sheet page-a3-portrait";
          sheet.style.width = "297mm";
          sheet.style.height = "420mm";
          const svg = svgEl("svg", { xmlns: svgNS, viewBox: "0 0 297 420", width: "297mm", height: "420mm", role: "img", "aria-label": "A3 two-up" });
          svg.appendChild(svgEl("rect", { x: 0, y: 0, width: 297, height: 420, fill: "#fff" }));
          addTwoUpPageSvg(svg, state.pages[i], 10, 10, 277, 195);
          if (state.pages[i + 1]) addTwoUpPageSvg(svg, state.pages[i + 1], 10, 215, 277, 195);
          sheet.appendChild(svg);
          container.appendChild(sheet);
        }
      }

      function addTwoUpPageSvg(parent, page, x, y, w, h) {
        const size = pageSize(page);
        const scale = Math.min(w / size.w, h / size.h);
        const drawW = size.w * scale;
        const drawH = size.h * scale;
        const nested = svgEl("svg", {
          x: x + (w - drawW) / 2,
          y: y + (h - drawH) / 2,
          width: drawW,
          height: drawH,
          viewBox: "0 0 " + size.w + " " + size.h
        });
        drawPageSvg(nested, page, { selection: false, scaled: false });
        nested.style.width = null;
        nested.style.height = null;
        nested.setAttribute("x", x + (w - drawW) / 2);
        nested.setAttribute("y", y + (h - drawH) / 2);
        nested.setAttribute("width", drawW);
        nested.setAttribute("height", drawH);
        parent.appendChild(nested);
      }

      function renderPrintSheets() {
        syncPrintSheets();
      }

      function printProject() {
        printMode = "single";
        renderPrintSheets();
        setStatus("印刷ダイアログでPDF保存を選択してください。");

      function printProjectTwoUp() {

        window.print();

      function autoWireNumbers() {
        const format = state.settings.wireNumberFormat || "%S-%N";
        const allPages = confirm("全ページに線番を付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存の線番も上書きしますか？\nOK: 上書き / キャンセル: 未採番のみ");
        const startInput = prompt("開始番号", "1");
        if (startInput === null) return;
        let next = Number(startInput || 1);
        const pages = allPages ? state.pages : [currentPage()];
        let count = 0;
        pages.forEach(page => {
          page.elements
            .filter(element => element.type === "wire")
            .forEach(element => {
              if (wireStyle(element).noNumber) return;
              if (!overwrite && element.wireNo) return;
              element.wireNo = formatWireNumber(format, page, next);
              next += 1;
              count += 1;
            });
        });
        commitHistory(count + "本の配線に線番を付与しました。");
        render();
      }

      function formatWireNumber(format, page, number) {
        const pageIndex = state.pages.findIndex(item => item.id === page.id) + 1;
        return String(format || "%S-%N")
          .replaceAll("%S", page.title?.page || String(pageIndex))
          .replaceAll("%P", page.name || String(pageIndex))
          .replaceAll("%D", page.title?.drawingNo || "")
          .replaceAll("%N", String(number).padStart(2, "0"));
      }

      function renumberTerminals() {
        const page = currentPage();
        const selected = selectedElement();
        const target = selected && ["terminal", "terminalStrip", "connector"].includes(selected.type)
          ? [selected]
          : page.elements.filter(element => ["terminal", "terminalStrip", "connector"].includes(element.type));
        if (!target.length) {
          setStatus("端子または端子台がありません。");
          return;
        }
        const startInput = prompt("端子開始番号", "1");
        if (startInput === null) return;
        const prefix = prompt("端子接頭辞", target[0].prefix || "") ?? "";
        let next = Number(startInput || 1);
        target.forEach(element => {

            next += 1;
          } else {
            element.prefix = prefix;

        render();

      function autoJunctions() {
        const allPages = confirm("全ページで接続点を生成しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const pages = allPages ? state.pages : [currentPage()];
        let added = 0;
        pages.forEach(page => {
          const points = detectJunctionPoints(page);
          points.forEach(point => {
            if (hasJunctionNear(page, point.x, point.y)) return;
            page.elements.push({
              id: uid("el"),
              type: "junction",
              x: point.x,
              y: point.y,
              w: 4,
              h: 4,
              r: 1.35,
              rotation: 0,
              stroke: state.settings.stroke
            });
            added += 1;
          });
        });
        commitHistory(added + "個の接続点を生成しました。");
        render();
      }

      function detectJunctionPoints(page) {
        const wires = page.elements.filter(element => element.type === "wire");
        const segments = [];
        wires.forEach(wire => {
          wireSegments(wire).forEach(segment => segments.push({ wire, segment }));
        });
        const hits = new Map();
        const endpoints = new Map();
        wires.forEach(wire => {
          const pts = wire.points || [];
          [pts[0], pts[pts.length - 1]].filter(Boolean).forEach(point => {
            const key = pointKey(point[0], point[1]);
            endpoints.set(key, (endpoints.get(key) || 0) + 1);
          });
        });
        endpoints.forEach((count, key) => {
          if (count > 1) hits.set(key, true);
        });
        for (let i = 0; i < segments.length; i++) {
          for (let j = i + 1; j < segments.length; j++) {
            if (segments[i].wire.id === segments[j].wire.id) continue;
            const point = segmentIntersection(segments[i].segment, segments[j].segment);
            if (point) hits.set(pointKey(point.x, point.y), true);
          }
        }
        return Array.from(hits.keys()).map(key => {
          const [x, y] = key.split(",").map(Number);
          return { x, y };
        });
      }

      function wireSegments(wire) {
        const points = wire.points || [[0, 0], [20, 0]];
        const a = points[0];
        const b = points[points.length - 1];
        if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
          return [[a[0], a[1], b[0], b[1]]];
        }
        const c = [a[0], b[1]];
        return [
          [a[0], a[1], c[0], c[1]],
          [c[0], c[1], b[0], b[1]]
        ];
      }

      function segmentIntersection(a, b) {
        const aVertical = Math.abs(a[0] - a[2]) < .001;
        const bVertical = Math.abs(b[0] - b[2]) < .001;
        if (aVertical === bVertical) return null;
        const v = aVertical ? a : b;
        const h = aVertical ? b : a;
        const x = v[0];
        const y = h[1];
        if (between(x, h[0], h[2]) && between(y, v[1], v[3])) return { x: round(x), y: round(y) };
        return null;
      }

      function between(value, a, b) {
        return value >= Math.min(a, b) - .001 && value <= Math.max(a, b) + .001;
      }

      function pointKey(x, y) {
        return round(x) + "," + round(y);
      }

      function hasJunctionNear(page, x, y) {
        return page.elements.some(element => element.type === "junction" && Math.abs((element.x || 0) - x) < .6 && Math.abs((element.y || 0) - y) < .6);
      }

      function applyTerminalEditor() {
        qsa("[data-terminal-row]").forEach(row => {
          const element = findElementById(row.dataset.terminalRow);
          if (!element) return;
          qsa("[data-terminal-field]", row).forEach(input => {
            const key = input.dataset.terminalField;
            element[key] = input.type === "number" ? Number(input.value || 0) : input.value;
          });
        });
        closeDialog();
        commitHistory("端子台情報を更新しました。");
        render();

      function findElementById(id) {
        for (const page of state.pages) {
          const element = page.elements.find(item => item.id === id);
          if (element) return element;
        }
        return null;
      }

      function autoTagComponents() {
        const allPages = confirm("全ページの部品タグを付与しますか？\nOK: 全ページ / キャンセル: 現在ページのみ");
        const overwrite = confirm("既存ラベルも上書きしますか？\nOK: 上書き / キャンセル: 未入力のみ");
        const pages = allPages ? state.pages : [currentPage()];
        const counters = {};
        let count = 0;
        pages.forEach(page => {
          page.elements.forEach(element => {
            const prefix = tagPrefix(element.type);
            if (!prefix) return;
            if (!overwrite && element.label) return;
            counters[prefix] = (counters[prefix] || 0) + 1;
            element.label = prefix + String(counters[prefix]).padStart(2, "0");
            count += 1;
          });
        });
        commitHistory(count + "個の部品タグを付与しました。");
        render();
      }

      function tagPrefix(type) {
        const map = {
          contactNO: "CR",
          contactNC: "CR",
          pushButton: "PB",
          coil: "CR",
          fuse: "F",
          breaker: "CB",
          lamp: "PL",
          buzzer: "BZ",
          powerSupply: "PS",
          ground: "E",
          motor: "M",
          resistor: "R",
          diode: "D",
          deviceBox: "DEV",
          plcBlock: "PLC",
          connector: "CN",
          cableMarker: "C",
          arrow: "REF"
        };
        return map[type] || "";
      }

      function collectReportRows() {
        const rows = [];
        state.pages.forEach((page, pageIndex) => {
          page.elements.forEach(element => {
            const base = {
              pageId: page.id,
              page: page.name || "P" + (pageIndex + 1),
              sheet: page.title?.page || String(pageIndex + 1),
              type: element.type,
              id: element.id
            };
            if (element.type === "wire") {
              const p0 = element.points?.[0] || [0, 0];
              const p1 = element.points?.[element.points.length - 1] || [0, 0];
              rows.push({ record: "wire", ...base, name: element.wireNo || "", x: p0[0], y: p0[1], x2: p1[0], y2: p1[1], detail: wireStyle(element).label });
            } else if (element.type === "terminal") {
              rows.push({ record: "terminal", ...base, name: element.label || "", x: element.x || 0, y: element.y || 0, x2: "", y2: "", detail: "single" });
            } else if (["terminalStrip", "connector"].includes(element.type)) {
              const count = Number(element.count || 1);
              for (let i = 0; i < count; i++) {
                rows.push({
                  record: "terminal",
                  ...base,
                  name: (element.prefix || "") + String(Number(element.start || 1) + i),
                  x: Number(element.x || 0),
                  y: Number(element.y || 0),
                  x2: "",
                  y2: "",
                  detail: element.label || element.type
                });
              }
            } else {
              rows.push({
                record: "component",
                ...base,
                name: element.label || element.text || "",
                x: element.x || "",
                y: element.y || "",
                x2: "",
                y2: "",
                detail: componentDetail(element)
              });
            }
          });
        });
        return rows;
      }

      function componentDetail(element) {
        if (element.type === "table") return "rows=" + (element.rows || "") + "; cols=" + (element.cols || "") + "; cells=" + String(element.cellText || "").replace(/\r?\n/g, " / ");
        if (element.type === "plcBlock") return "rows=" + (element.rows || "") + "; io=" + String(element.pinText || "").replace(/\r?\n/g, " / ");
        if (element.type === "deviceBox") return "pins=" + (element.pins || "") + "; pinText=" + String(element.pinText || "").replace(/\r?\n/g, " / ");
        return "";
      }

      function exportReportCsv() {
        const headers = ["record", "page", "sheet", "type", "id", "name", "x", "y", "x2", "y2", "detail"];
        const rows = collectReportRows();
        const csv = [
          headers.join(","),
          ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))
        ].join("\r\n");
        download("electrical-report.csv", csv, "text/csv;charset=utf-8");
        setStatus("帳票CSVを書き出しました。");
      }

      function showReportTable() {
        const rows = collectReportRows();
        const html = `<table class="report-table"><thead><tr><th>種別</th><th>ページ</th><th>名称</th><th>詳細</th><th>選択</th></tr></thead><tbody>${rows.map(row => {
          return `<tr><td>${escapeHtml(row.type)}</td><td>${escapeHtml(row.page)}</td><td>${escapeHtml(row.name)}</td><td>${escapeHtml(row.detail)}</td><td><button type="button" data-select-page="${escapeAttr(row.pageId || "")}" data-select-id="${escapeAttr(row.id)}">選択</button></td></tr>`;
        }).join("")}</tbody></table>`;
        openDialog("図面要素一覧", html);
        attachDialogSelection();
      }

      function showSearchDialog() {
        const html = `
          <label for="searchQuery">検索語</label>
          <div class="inline">
            <input id="searchQuery" placeholder="線番、タグ、文字、端子名">
            <button type="button" id="runSearchBtn" class="primary">検索</button>
          </div>
          <div id="searchResults" style="margin-top:12px"></div>
        `;
        openDialog("図面検索", html);
        qs("#runSearchBtn").addEventListener("click", runSearch);
        qs("#searchQuery").addEventListener("keydown", event => {
          if (event.key === "Enter") runSearch();
        });
      }

      function runSearch() {
        const query = qs("#searchQuery").value.trim().toLowerCase();
        const results = query ? findElements(query) : [];
        const body = qs("#searchResults");
        body.innerHTML = results.length
          ? `<table class="report-table"><thead><tr><th>ページ</th><th>種別</th><th>内容</th><th>選択</th></tr></thead><tbody>${results.map(result => `<tr><td>${escapeHtml(result.pageName)}</td><td>${escapeHtml(result.type)}</td><td>${escapeHtml(result.text)}</td><td><button type="button" data-select-page="${result.pageId}" data-select-id="${result.id}">選択</button></td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">該当する要素はありません。</p>';
        attachDialogSelection();
      }

      function findElements(query) {
        const results = [];
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const text = elementSearchText(element);
            if (text.toLowerCase().includes(query)) {
              results.push({
                pageId: page.id,
                pageName: page.name,
                id: element.id,
                type: paletteLabel(element.type),
                text
              });
            }
          });
        });
        return results;
      }

      function elementSearchText(element) {
        return [
          element.type,
          element.label,
          element.text,
          element.wireNo,
          element.prefix,
          element.cellText,
          element.pinText
        ].filter(Boolean).join(" ");
      }

      function showCrossReference() {
        const groups = collectCrossReferences();
        const html = groups.length
          ? `<table class="report-table"><thead><tr><th>キー</th><th>分類</th><th>参照数</th><th>参照先</th></tr></thead><tbody>${groups.map(group => `<tr><td>${escapeHtml(group.key)}</td><td>${escapeHtml(group.kind)}</td><td>${group.items.length}</td><td>${group.items.map(item => `<button type="button" data-select-page="${item.pageId}" data-select-id="${item.id}" title="${escapeAttr(item.type)}">${escapeHtml(item.pageName)}:${escapeHtml(item.type)}</button>`).join(" ")}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">参照できる線番、部品タグ、信号矢印はありません。</p>';
        openDialog("クロスリファレンス", html);
        attachDialogSelection();
      }

        const p = state.project || {};
        const html = `
          <div class="row">
            <div><label>図名</label><input id="batchTitle" value="${escapeAttr(p.title || "")}"></div>
            <div><label>設備</label><input id="batchFacility" value="${escapeAttr(p.facility || "")}"></div>
          </div>
          <div class="row">
            <div><label>図番</label><input id="batchDrawingNo" value="${escapeAttr(p.drawingNo || "")}"></div>
            <div><label>改訂</label><input id="batchRevision" value="${escapeAttr(p.revision || "")}"></div>
          </div>
          <div class="row">
            <div><label>作成</label><input id="batchDesigner" value="${escapeAttr(p.designer || "")}"></div>
            <div><label>日付</label><input id="batchDate" value="${escapeAttr(p.date || today)}"></div>
          </div>
          <label><input id="batchOnlyBlank" type="checkbox" style="width:auto;min-height:auto"> 空欄の項目だけ更新</label>
          <div class="inline" style="justify-content:flex-end;margin-top:12px">

          </div>
        `;

      function applyTitleBatch() {
        const values = {
          title: qs("#batchTitle").value,
          facility: qs("#batchFacility").value,
          drawingNo: qs("#batchDrawingNo").value,
          revision: qs("#batchRevision").value,
          designer: qs("#batchDesigner").value,
          date: qs("#batchDate").value
        };
        const onlyBlank = qs("#batchOnlyBlank").checked;
        state.project = { ...state.project, ...values };
        state.pages.forEach(page => {
          Object.entries(values).forEach(([key, value]) => {
            if (!value) return;
            if (onlyBlank && page.title?.[key]) return;
            page.title[key] = value;
          });
        });
        closeDialog();
        commitHistory("表題欄を一括更新しました。");
        render();
      }

      function collectCrossReferences() {
        const map = new Map();
        state.pages.forEach(page => {
          page.elements.forEach(element => {
            const entries = crossRefEntries(element);
            entries.forEach(entry => {
              const key = entry.kind + "::" + entry.key;
              const list = map.get(key) || { key: entry.key, kind: entry.kind, items: [] };
              list.items.push({ pageId: page.id, pageName: page.name, id: element.id, type: paletteLabel(element.type) });
              map.set(key, list);
            });
          });
        });
        return Array.from(map.values()).sort((a, b) => a.kind.localeCompare(b.kind) || a.key.localeCompare(b.key));
      }

      function crossRefEntries(element) {
        const entries = [];
        if (element.type === "wire" && element.wireNo) entries.push({ kind: "線番", key: element.wireNo });
        if (element.type === "arrow" && element.label) entries.push({ kind: "信号", key: element.label });
        if (!["wire", "arrow", "text", "table", "rect", "circle", "line", "junction"].includes(element.type) && element.label) {
          entries.push({ kind: "部品", key: element.label });
        }
        return entries;
      }

      function attachDialogSelection() {
        qsa("[data-select-id]", qs("#dialogBody")).forEach(button => {
          button.addEventListener("click", () => {
            const pageId = button.dataset.selectPage;
            const elementId = button.dataset.selectId;
            if (pageId) state.activePageId = pageId;
            selectedId = elementId;
            closeDialog();
            render();
            setStatus("一覧から要素を選択しました。");
          });
        });
      }

      function csvCell(value) {
        const text = String(value ?? "");
        if (/[",\r\n]/.test(text)) return '"' + text.replaceAll('"', '""') + '"';
        return text;
      }

      function showAudit() {
        const issues = auditProject();
        const body = issues.length
          ? `<table class="report-table"><thead><tr><th>重要度</th><th>ページ</th><th>内容</th><th>対象</th></tr></thead><tbody>${issues.map(issue => `<tr><td>${issue.level}</td><td>${escapeHtml(issue.page)}</td><td>${escapeHtml(issue.message)}</td><td>${escapeHtml(issue.target)}</td></tr>`).join("")}</tbody></table>`
          : '<p class="muted">検出された問題はありません。</p>';
        openDialog("図面監査", body);
      }

      function auditProject() {
        const issues = [];
        const arrows = new Map();
        const terminalNames = new Map();
        state.pages.forEach(page => {
          const size = pageSize(page);
          const wireNos = new Map();
          if (!page.title?.title) {
            issues.push({ level: "注意", page: page.name, message: "図名が未入力です。", target: "表題欄" });
          }
          page.elements.forEach(element => {
            const label = element.label || element.text || element.wireNo || "";
            if (element.type === "wire") {
              if (!element.wireNo) issues.push({ level: "警告", page: page.name, message: "線番が未入力です。", target: element.id });
              if (element.wireNo) {
                const current = wireNos.get(element.wireNo) || 0;
                wireNos.set(element.wireNo, current + 1);
              }
            }
            if (["contactNO", "contactNC", "pushButton", "coil", "fuse", "breaker", "lamp", "buzzer", "powerSupply", "ground", "motor", "resistor", "diode", "deviceBox", "plcBlock", "cableMarker"].includes(element.type) && !label) {
              issues.push({ level: "注意", page: page.name, message: "ラベルが未入力です。", target: element.type });
            }
            if (["terminalStrip", "connector"].includes(element.type) && Number(element.count || 0) <= 0) {
              issues.push({ level: "警告", page: page.name, message: "端子数が不正です。", target: element.label || element.id });
            }
            if (["terminalStrip", "connector"].includes(element.type) && element.label) {
              const key = page.name + "::" + element.label;
              terminalNames.set(key, (terminalNames.get(key) || 0) + 1);
            }
            if (element.type === "arrow") {
              if (!element.label) {
                issues.push({ level: "警告", page: page.name, message: "信号矢印の参照名が未入力です。", target: element.id });
              } else {
                const list = arrows.get(element.label) || [];
                list.push(page.name);
                arrows.set(element.label, list);
              }
            }
            const box = elementBounds(element);
            if (box && (box.x < 0 || box.y < 0 || box.x + box.w > size.w || box.y + box.h > size.h)) {
              issues.push({ level: "注意", page: page.name, message: "用紙外にはみ出しています。", target: label || element.type });
            }
          });
          wireNos.forEach((count, wireNo) => {
            if (count > 1) issues.push({ level: "情報", page: page.name, message: "同じ線番が複数あります。", target: wireNo });
          });
        });
        arrows.forEach((pages, label) => {
          if (pages.length === 1) {
            issues.push({ level: "注意", page: pages[0], message: "対応する信号矢印がありません。", target: label });
          }
        });
        terminalNames.forEach((count, key) => {
          if (count > 1) {
            const [page, name] = key.split("::");
            issues.push({ level: "注意", page, message: "同一ページ内で端子台名称が重複しています。", target: name });
          }
        });
        return issues;
      }

      function openDialog(title, html) {
        qs("#dialogTitle").textContent = title;
        qs("#dialogBody").innerHTML = html;
        qs("#dialogBackdrop").classList.remove("hidden");
      }

      function closeDialog() {
        qs("#dialogBackdrop").classList.add("hidden");
      }

      function exportDxf() {
        const page = currentPage();
        const dxf = buildDxf(page);
        download((page.name || "page") + ".dxf", dxf, "application/dxf");
        setStatus("DXFを書き出しました。");
      }

      function buildDxf(page) {
        const out = [];
        dxfHeader(out);
        dxfFrame(out, page);
        page.elements.forEach(element => dxfElement(out, page, element));
        out.push("0", "ENDSEC", "0", "EOF");
        return out.join("\n") + "\n";
      }

      function dxfHeader(out) {
        out.push(
          "0", "SECTION",
          "2", "HEADER",
          "9", "$INSUNITS",
          "70", "4",
          "0", "ENDSEC",
          "0", "SECTION",
          "2", "ENTITIES"
        );
      }

      function dxfFrame(out, page) {
        const size = pageSize(page);
        const margin = frameMargin(size);
        dxfRect(out, page, "FRAME", margin, margin, size.w - margin * 2, size.h - margin * 2);
        dxfRect(out, page, "FRAME", margin + 4, margin + 4, size.w - (margin + 4) * 2, size.h - (margin + 4) * 2);
        if (page.frameVariant !== "blank") {
          const titleW = page.frameVariant === "side" ? Math.min(44, Math.max(34, size.w * .15)) : Math.min(124, size.w - margin * 2 - 12);
          const titleH = page.frameVariant === "side" ? 88 : 48;
          const x = size.w - margin - titleW;
          const y = size.h - margin - titleH;
          dxfRect(out, page, "TITLE", x, y, titleW, titleH);
          dxfText(out, page, "TITLE", x + 3, y + 8, 2.8, page.title?.title || "");
          dxfText(out, page, "TITLE", x + 3, y + 16, 2.4, page.title?.drawingNo || "");
        }
      }

      function dxfElement(out, page, element) {
        if (element.type === "wire") {
          const layer = "WIRE_" + String(element.wireType || "control").toUpperCase();
          const points = element.points || [[0, 0], [20, 0]];
          const a = points[0];
          const b = points[points.length - 1];
          if (Math.abs(a[0] - b[0]) < .001 || Math.abs(a[1] - b[1]) < .001) {
            dxfLine(out, page, layer, a[0], a[1], b[0], b[1]);
          } else {
            dxfLine(out, page, layer, a[0], a[1], a[0], b[1]);
            dxfLine(out, page, layer, a[0], b[1], b[0], b[1]);
          }
          if (element.wireNo) {
            const mid = pathMid(a, b);
            dxfText(out, page, "WIRENO", mid.x + 1.5, mid.y - 1.8, 2.4, element.wireNo);
          }
          return;
        }
        if (element.type === "line") {
          const points = element.points || [[0, 0], [20, 0]];
          const a = points[0];
          const b = points[points.length - 1];
          dxfLine(out, page, "GEOMETRY", a[0], a[1], b[0], b[1]);
          if (element.label) {
            const mid = pathMid(a, b);
            dxfText(out, page, "TEXT", mid.x, mid.y - 3, 2.4, element.label);
          }
          return;
        }
        if (element.type === "arrow") {
          const points = element.points || [[0, 0], [20, 0]];
          const a = points[0];
          const b = points[points.length - 1];
          dxfLine(out, page, "SYMBOL", a[0], a[1], b[0], b[1]);
          if (element.label) dxfText(out, page, "TEXT", (a[0] + b[0]) / 2, (a[1] + b[1]) / 2 - 3, 2.4, element.label);
          return;
        }
        if (element.type === "text") {
          dxfText(out, page, "TEXT", element.x || 0, element.y || 0, element.fontSize || 3.5, element.text || "");
          return;
        }
        if (element.type === "rect") {
          const w = Number(element.w || 34);
          const h = Number(element.h || 22);
          dxfRectLocal(out, page, "GEOMETRY", element, 0, 0, w, h);
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, h / 2, 2.6, element.label);
          return;
        }
        if (element.type === "circle") {
          const w = Number(element.w || 22);
          const h = Number(element.h || 22);
          if (Math.abs(w - h) < .01) {
            dxfCircleLocal(out, page, "GEOMETRY", element, w / 2, h / 2, w / 2);
          } else {
            dxfEllipseApproxLocal(out, page, "GEOMETRY", element, w / 2, h / 2, w / 2, h / 2);
          }
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, h / 2, 2.6, element.label);
          return;
        }
        if (element.type === "terminalStrip" || element.type === "connector") {
          const count = Math.max(1, Number(element.count || 8));
          const w = Number(element.w || count * 8);
          const h = Number(element.h || 12);
          const pitch = w / count;
          dxfLineLocal(out, page, "SYMBOL", element, 0, h / 2, w, h / 2);
          for (let i = 0; i < count; i++) {
            const cx = pitch * i + pitch / 2;
            dxfCircleLocal(out, page, "SYMBOL", element, cx, h / 2, Math.min(3.1, pitch * .35));
            dxfTextLocal(out, page, "TEXT", element, cx - 1.2, h / 2 + .8, 1.8, (element.prefix || "") + String(Number(element.start || 1) + i));
          }
          if (element.label) dxfTextLocal(out, page, "TEXT", element, 0, -3, 2.5, element.label);
          return;
        }
        if (element.type === "table") {
          const rows = Math.max(1, Number(element.rows || 6));
          const cols = Math.max(1, Number(element.cols || 4));
          const w = Number(element.w || 78);
          const h = Number(element.h || 44);
          dxfRectLocal(out, page, "TABLE", element, 0, 0, w, h);
          for (let i = 1; i < rows; i++) dxfLineLocal(out, page, "TABLE", element, 0, h * i / rows, w, h * i / rows);
          for (let i = 1; i < cols; i++) dxfLineLocal(out, page, "TABLE", element, w * i / cols, 0, w * i / cols, h);
          String(element.cellText || "").split(/\r?\n/).slice(0, rows).forEach((line, rowIndex) => {
            const cells = line.includes("\t") ? line.split("\t") : line.split(",");
            cells.slice(0, cols).forEach((cell, colIndex) => {
              dxfTextLocal(out, page, "TEXT", element, colIndex * (w / cols) + 1.5, rowIndex * (h / rows) + h / rows / 2, 2.2, cell.trim());
            });
          });
          if (element.label) dxfTextLocal(out, page, "TEXT", element, w / 2, -4, 2.5, element.label);
          return;
        }
        const box = elementBounds(element);
        if (["deviceBox", "plcBlock"].includes(element.type)) {
          dxfRectLocal(out, page, "SYMBOL", element, 0, 0, box.w, box.h);
          dxfTextLocal(out, page, "TEXT", element, box.w / 2 - 6, box.h / 2, 2.5, element.label || element.type);
          String(element.pinText || "").split(/\r?\n/).forEach((line, index) => {
            if (!line.trim()) return;
            dxfTextLocal(out, page, "TEXT", element, 2, 5 + index * 4, 2, line.trim());
          });
          return;
        }
        if (element.type === "lamp" || element.type === "junction") {
          dxfCircleLocal(out, page, "SYMBOL", element, 0, 0, Number(element.r || 6));
          if (element.label) dxfTextLocal(out, page, "TEXT", element, -4, -8, 2.4, element.label);
          return;
        }
        dxfRectLocal(out, page, "SYMBOL", element, 0, 0, box.w, box.h);
        if (element.label) dxfTextLocal(out, page, "TEXT", element, 1, -3, 2.4, element.label);
      }

      function cadY(page, y) {
        return pageSize(page).h - y;
      }

      function dxfLine(out, page, layer, x1, y1, x2, y2) {
        out.push("0", "LINE", "8", layer, "10", round(x1), "20", round(cadY(page, y1)), "11", round(x2), "21", round(cadY(page, y2)));
      }

      function dxfText(out, page, layer, x, y, size, text) {
        String(text || "").split("\n").forEach((line, index) => {
          out.push("0", "TEXT", "8", layer, "10", round(x), "20", round(cadY(page, y + index * size * 1.25)), "40", round(size), "1", line);
        });
      }

      function dxfCircle(out, page, layer, x, y, r) {
        out.push("0", "CIRCLE", "8", layer, "10", round(x), "20", round(cadY(page, y)), "40", round(r));
      }

      function dxfRect(out, page, layer, x, y, w, h) {
        dxfLine(out, page, layer, x, y, x + w, y);
        dxfLine(out, page, layer, x + w, y, x + w, y + h);
        dxfLine(out, page, layer, x + w, y + h, x, y + h);
        dxfLine(out, page, layer, x, y + h, x, y);
      }

      function localPoint(element, x, y) {
        const angle = Number(element.rotation || 0) * Math.PI / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        return [
          Number(element.x || 0) + x * cos - y * sin,
          Number(element.y || 0) + x * sin + y * cos
        ];
      }

      function dxfLineLocal(out, page, layer, element, x1, y1, x2, y2) {
        const a = localPoint(element, x1, y1);
        const b = localPoint(element, x2, y2);
        dxfLine(out, page, layer, a[0], a[1], b[0], b[1]);
      }

      function dxfTextLocal(out, page, layer, element, x, y, size, text) {
        const p = localPoint(element, x, y);
        dxfText(out, page, layer, p[0], p[1], size, text);
      }

      function dxfCircleLocal(out, page, layer, element, x, y, r) {
        const p = localPoint(element, x, y);
        dxfCircle(out, page, layer, p[0], p[1], r);
      }

      function dxfRectLocal(out, page, layer, element, x, y, w, h) {
        dxfLineLocal(out, page, layer, element, x, y, x + w, y);
        dxfLineLocal(out, page, layer, element, x + w, y, x + w, y + h);
        dxfLineLocal(out, page, layer, element, x + w, y + h, x, y + h);
        dxfLineLocal(out, page, layer, element, x, y + h, x, y);
      }

      function dxfEllipseApproxLocal(out, page, layer, element, cx, cy, rx, ry) {
        const steps = 32;
        let prev = null;
        for (let i = 0; i <= steps; i++) {
          const angle = Math.PI * 2 * i / steps;
          const point = [cx + Math.cos(angle) * rx, cy + Math.sin(angle) * ry];
          if (prev) dxfLineLocal(out, page, layer, element, prev[0], prev[1], point[0], point[1]);
          prev = point;
        }
      }

      function updatePageField(id, apply) {
        qs("#" + id).addEventListener("change", event => {
          const page = currentPage();
          if (!page) return;
          apply(page, event.target.value);
          commitHistory("ページ設定を更新しました。");
          render();
        });
      }

      function attachEvents() {
        qs("#newProjectBtn").addEventListener("click", () => {
          if (confirm("現在の内容を破棄して新規作成しますか？")) initProject();
        });
        qs("#openBtn").addEventListener("click", () => qs("#fileInput").click());
        qs("#restoreBackupBtn").addEventListener("click", restoreLocalBackup);
        qs("#fileInput").addEventListener("change", event => {
          const file = event.target.files[0];
          if (file) openProjectFile(file);
          event.target.value = "";
        });
        qs("#saveBtn").addEventListener("click", saveProject);
        qs("#searchBtn").addEventListener("click", showSearchDialog);
        qs("#titleBatchBtn").addEventListener("click", showTitleBatchDialog);
        qs("#printBtn").addEventListener("click", printProject);
        qs("#printTwoUpBtn").addEventListener("click", printProjectTwoUp);
        qs("#exportSvgBtn").addEventListener("click", exportSvg);
        qs("#exportPngBtn").addEventListener("click", exportPng);
        qs("#autoWireBtn").addEventListener("click", autoWireNumbers);
        qs("#terminalNoBtn").addEventListener("click", renumberTerminals);
        qs("#autoJunctionBtn").addEventListener("click", autoJunctions);
        qs("#terminalEditorBtn").addEventListener("click", showTerminalEditor);
        qs("#tagComponentsBtn").addEventListener("click", autoTagComponents);
        qs("#crossRefBtn").addEventListener("click", showCrossReference);
        qs("#reportCsvBtn").addEventListener("click", exportReportCsv);
        qs("#copyReportBtn").addEventListener("click", showReportTable);
        qs("#auditBtn").addEventListener("click", showAudit);
        qs("#exportDxfBtn").addEventListener("click", exportDxf);
        qs("#dialogClose").addEventListener("click", closeDialog);
        qs("#undoBtn").addEventListener("click", () => restoreHistory(historyIndex - 1));
        qs("#redoBtn").addEventListener("click", () => restoreHistory(historyIndex + 1));
        qs("#deleteBtn").addEventListener("click", deleteSelected);
        qs("#addPageBtn").addEventListener("click", addPage);
        qs("#duplicatePageBtn").addEventListener("click", duplicatePage);
        qs("#deletePageBtn").addEventListener("click", deletePage);
        qs("#sampleTerminalPageBtn").addEventListener("click", addSampleTerminalPage);
        qs("#indexPageBtn").addEventListener("click", addIndexPage);
        qs("#ioPageBtn").addEventListener("click", addIoPage);
        qs("#layoutPageBtn").addEventListener("click", addLayoutPage);
        qsa("[data-tool]").forEach(button => {
          button.addEventListener("click", () => setActiveTool(button.dataset.tool));
        });
        qs("#zoomRange").addEventListener("input", event => {
          state.settings.zoom = Number(event.target.value);
          render();
        });
        qs("#zoomRange").addEventListener("change", () => commitHistory("ズームを変更しました。"));
        qs("#gridSize").addEventListener("change", event => {
          state.settings.grid = Number(event.target.value || 2.5);
          commitHistory("グリッドを変更しました。");
          render();
        });
        qs("#snapToggle").addEventListener("change", event => {
          state.settings.snap = event.target.value === "on";
          commitHistory("スナップを変更しました。");
          render();
        });
        qs("#wireNumberFormat").addEventListener("change", event => {
          state.settings.wireNumberFormat = event.target.value || "%S-%N";
          commitHistory("線番書式を変更しました。");
          render();
        });
        qs("#currentWireType").addEventListener("change", event => {
          state.settings.currentWireType = event.target.value || "control";
          commitHistory("配線種別を変更しました。");
          render();
        });
        updatePageField("pageName", (page, value) => { page.name = value || page.name; });
        qs("#drawingStandard").addEventListener("change", event => {
          applyStandard(event.target.value);
          commitHistory("標準設定を変更しました。");
          render();
        });
        updatePageField("paperSize", (page, value) => { page.size = value; });
        updatePageField("paperOrientation", (page, value) => { page.orientation = value; });
        updatePageField("frameVariant", (page, value) => { page.frameVariant = value; });
        updatePageField("drawingNo", (page, value) => { page.title.drawingNo = value; });
        updatePageField("revision", (page, value) => { page.title.revision = value; });
        updatePageField("drawingTitle", (page, value) => { page.title.title = value; });
        updatePageField("designer", (page, value) => { page.title.designer = value; });
        updatePageField("drawDate", (page, value) => { page.title.date = value; });

        const svg = qs("#canvas");
        svg.addEventListener("dragover", event => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "copy";
        });
        svg.addEventListener("drop", event => {
          event.preventDefault();
          const type = event.dataTransfer.getData("text/plain");
          const point = canvasPoint(event);
          if (type) placeElement(type, point.x, point.y);
        });
        svg.addEventListener("pointerdown", onCanvasPointerDown);
        svg.addEventListener("pointermove", onCanvasPointerMove);
        svg.addEventListener("pointerup", onCanvasPointerUp);
        svg.addEventListener("pointercancel", onCanvasPointerUp);
        svg.addEventListener("dblclick", onCanvasDoubleClick);

        window.addEventListener("keydown", onKeyDown);
      }

      function onCanvasPointerDown(event) {
        const svg = qs("#canvas");
        const point = canvasPoint(event);
        const targetElement = event.target.closest("[data-id]");
        if (activeTool === "wire" || activeTool === "arrow" || activeTool === "line") {
          const element = defaultElement(activeTool, point.x, point.y);
          element.points = [[point.x, point.y], [point.x, point.y]];
          currentPage().elements.push(element);
          selectedId = element.id;
          dragState = { mode: "draw", elementId: element.id, start: point };
          svg.setPointerCapture(event.pointerId);
          render();
          return;
        }
        if (activeTool !== "select" && activeTool !== "wire" && activeTool !== "arrow") {
          placeElement(activeTool, point.x, point.y);
          return;
        }
        if (targetElement) {
          selectedId = targetElement.dataset.id;
          const element = selectedElement();
          dragState = {
            mode: "move",
            elementId: selectedId,
            start: point,
            original: deepClone(element)
          };
          svg.setPointerCapture(event.pointerId);
          render();
        } else {
          selectedId = null;
          render();
        }
      }

      function onCanvasPointerMove(event) {
        if (!dragState) return;
        const point = canvasPoint(event);
        const element = selectedElement();
        if (!element) return;
        if (dragState.mode === "draw") {
          element.points[element.points.length - 1] = [point.x, point.y];
          render();
          return;
        }
        if (dragState.mode === "move") {
          const dx = point.x - dragState.start.x;
          const dy = point.y - dragState.start.y;
          if (element.points) {
            element.points = dragState.original.points.map(p => [p[0] + dx, p[1] + dy]);
          } else {
            element.x = Number(dragState.original.x || 0) + dx;
            element.y = Number(dragState.original.y || 0) + dy;
          }
          render();
        }
      }

      function onCanvasPointerUp(event) {
        if (!dragState) return;
        try {
          qs("#canvas").releasePointerCapture(event.pointerId);
        } catch (_) {
          // The pointer may already be released by the browser.
        }
        const element = selectedElement();
        if (element && element.points) {
          const a = element.points[0];
          const b = element.points[element.points.length - 1];
          if (Math.abs(a[0] - b[0]) < .5 && Math.abs(a[1] - b[1]) < .5) {
            currentPage().elements = currentPage().elements.filter(item => item.id !== element.id);
            selectedId = null;
          }
        }
        dragState = null;
        commitHistory("作図を更新しました。");
        render();
      }

      function onCanvasDoubleClick(event) {
        const targetElement = event.target.closest("[data-id]");
        if (!targetElement) return;
        selectedId = targetElement.dataset.id;
        const element = selectedElement();
        if (!element) return;
        if (element.type === "text") {
          const text = prompt("文字を入力", element.text || "");
          if (text !== null) {
            element.text = text;
            commitHistory("文字を更新しました。");
            render();
          }
        } else if (element.type === "wire") {
          const text = prompt("線番を入力", element.wireNo || "");
          if (text !== null) {
            element.wireNo = text;
            commitHistory("線番を更新しました。");
            render();
          }
        } else {
          const text = prompt("ラベルを入力", element.label || "");
          if (text !== null) {
            element.label = text;
            commitHistory("ラベルを更新しました。");
            render();
          }
        }
      }

      function onKeyDown(event) {
        const tag = document.activeElement?.tagName;
        const editing = ["INPUT", "TEXTAREA", "SELECT"].includes(tag);
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          saveProject();
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          restoreHistory(historyIndex - 1);
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "y") {
          event.preventDefault();
          restoreHistory(historyIndex + 1);
          return;
        }
        if (editing) return;
        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
          event.preventDefault();
          copySelected();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v") {
          event.preventDefault();
          pasteClipboard();
        }
        const nudge = event.shiftKey ? 5 : 1;
        const arrows = { ArrowLeft: [-nudge, 0], ArrowRight: [nudge, 0], ArrowUp: [0, -nudge], ArrowDown: [0, nudge] };
        if (arrows[event.key] && selectedElement()) {
          event.preventDefault();
          moveSelected(arrows[event.key][0], arrows[event.key][1]);
          commitHistory("要素を移動しました。");
          render();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "d") {
          event.preventDefault();
          duplicateSelected();
        }
      }

      attachEvents();
      initProject();
    })();
  </script>
</body>
</html>
